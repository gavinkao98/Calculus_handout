name: Handout Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # quote_lint.py is stdlib-only; enforces CONTENT_SPEC §8 (curly quotes /
      # curly apostrophe) on rendered prose, excluding math primes, attributes,
      # code and comments. A failure means a fragment has an ASCII " or ' in prose.
      - name: Lint prose quotes (CONTENT_SPEC §8)
        run: python handout/quote_lint.py

      # doc_lint.py is stdlib-only; verifies relative markdown links in active
      # guidance docs resolve to existing files (archives / legacy excluded).
      # A failure means a doc references a moved/renamed/deleted file.
      - name: Lint doc links (broken relative links)
        run: python tools/doc_lint.py

      # build.py is stdlib-only (pathlib/re); no pip install needed.
      - name: Assemble handout (fragments -> print standalone)
        run: python handout/build.py

      # The print standalones are committed; a fresh build must reproduce them
      # byte-for-byte. A diff here means a fragment was edited without re-running
      # build.py (or build is out of sync). Run `python handout/build.py` locally
      # and commit the regenerated chapterN-print-standalone.html.
      - name: Verify committed standalones are in sync with fragments
        run: git diff --exit-code -- 'handout/chapter*-print-standalone.html'
