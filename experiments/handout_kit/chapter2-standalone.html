      var fp = function (x) { return 2 * x + 4; };
      var dom = [-6.4, 2.4];
      var common = { w: 460, xmin: -6.8, xmax: 2.8, xlabel: "x", ylabel: "y" };

      // --- top panel: f ---
      var top = buildPlot(Object.assign({}, common, {
        h: 250, ymin: -8, ymax: 14,
        xticks: [{ x: -2, tex: "-2" }],
        aria: "Graph of f(x)=x^2+4x-2, a parabola with its minimum at x=-2 where f=-6.",
        items: [
          { type: "vline", x: -2, cls: "refline" },
          { type: "curve", fn: f, domain: dom, samples: 200, cls: "curve" },
          { type: "dot", x: -2, y: -6, r: 3 },
          { type: "text", x: 2.45, y: 12, tex: "y\\!=\\!f(x)", cls: "a-curve", anchor: "start" },
          { type: "text", x: -2.35, y: -6, tex: "\\text{min}", cls: "a-pt", anchor: "end" },
        ],
      }));

      // --- bottom panel: f' (same horizontal scale as the top) ---
      var bot = buildPlot(Object.assign({}, common, {
        h: 210, ymin: -9, ymax: 9,
        xticks: [{ x: -2, tex: "-2" }],
        aria: "Graph of f'(x)=2x+4, a line crossing zero at x=-2; negative to the left, positive to the right.",
        items: [
          { type: "vline", x: -2, cls: "refline" },
          { type: "curve", fn: fp, domain: dom, samples: 12, cls: "curve" },
          { type: "dot", x: -2, y: 0, r: 3 },
          { type: "text", x: 2.45, y: 7, tex: "y\\!=\\!f'(x)", cls: "a-curve", anchor: "start" },
          { type: "text", x: -5.6, y: -4.5, tex: "f'<0", cls: "a-pt", anchor: "start" },
          { type: "text", x: -1.4, y: 4.5, tex: "f'>0", cls: "a-pt", anchor: "start" },
        ],
      }));

      return { layout: "stack", panels: [{ svg: top + bot }] };
    },

  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();
</script>

const { useState, useEffect, useRef } = React;

const CHAPTER = {
  brand: "Chapter 2 — Derivatives",
  fragments: ["sec-2-1", "sec-2-2", "sec-2-3", "sec-2-4", "sec-2-5"],
};

const TWEAK_DEFAULTS = {
  "theme": "Light",
  "accent": "#1f4e79",
  "textSize": 17,
  "lineHeight": 1.62,
  "align": "Justified",
  "density": "Comfortable",
  "figures": true
};
const ACCENTS = ["#1f4e79", "#176b6b", "#5b4b8a", "#9a5b2e"];

function renderMath(root) {
  if (!root) return;
  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  } else {
    setTimeout(function() { renderMath(root); }, 150);
  }
}

function buildNav(page, navEl) {
  if (!navEl) return;
  navEl.innerHTML = "";
  var brand = document.createElement("span");
  brand.className = "brand"; brand.textContent = CHAPTER.brand;
  navEl.appendChild(brand);
  [...page.querySelectorAll(".sec")].forEach(function(s, i) {
    var head = s.querySelector(".sec-head, .chapter-head");
    if (!head) return;
    head.id = "sec-" + i;
    var no = s.querySelector(".sec-no");
    var chTitle = s.querySelector(".ch-title");
    var secTitle = s.querySelector(".sec-title");
    var label = null;
    if (chTitle) label = "Overview";
    else if (no) label = "§" + no.textContent.trim();
    else if (secTitle && /summary/i.test(secTitle.textContent)) label = "Summary";
    if (!label) return;
    var a = document.createElement("a");
    a.href = "#sec-" + i; a.textContent = label;
    navEl.appendChild(a);
  });
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [html, setHtml] = useState(null);
  const paperRef = useRef(null);
  const navRef = useRef(null);

  useEffect(() => {
    const parts = CHAPTER.fragments.map(id => {
      const tpl = document.getElementById("frag-" + id);
      return tpl ? tpl.innerHTML : "";
    });
    setHtml(parts.join("\n"));
  }, []);

  useEffect(() => {
    if (!html) return;
    let cancelled = false;
    const run = () => {
      if (cancelled || !paperRef.current) return;
      if (window.hydrateFigures) window.hydrateFigures(paperRef.current);
      buildNav(paperRef.current, navRef.current);
      renderMath(paperRef.current);
    };
    (document.fonts ? document.fonts.ready : Promise.resolve()).then(run);
    return () => { cancelled = true; };
  }, [html]);

  const docClass = [
    t.theme === "Dark" ? "theme-dark" : "",
    t.align === "Left" ? "align-left" : "",
    t.density === "Compact" ? "density-compact" : "",
    t.figures ? "" : "hide-figures",
  ].filter(Boolean).join(" ");

  const paperStyle = {
    "--fs-base": t.textSize + "px",
    "--lh-user": t.lineHeight,
  };

  return (
    <div id="doc" className={docClass} style={{ "--accent": t.accent }}>
      <nav className="chbar" ref={navRef}></nav>
      <div className="reader">
        <div className="paper skin-hs vivid" style={paperStyle} ref={paperRef}>
          {html
            ? <div className="page" dangerouslySetInnerHTML={{ __html: html }} />
            : <div className="page" style={{ padding: 80, color: "#999" }}>Loading…</div>}
        </div>
      </div>
      <div className="hint" onClick={() => { if (window.__toggleTweaks) window.__toggleTweaks(); }} style={{ cursor: "pointer", pointerEvents: "auto" }}>Open <b>Tweaks</b> to restyle</div>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme} options={["Light", "Dark"]} onChange={v => setTweak("theme", v)} />
        <TweakColor label="Accent" value={t.accent} options={ACCENTS} onChange={v => setTweak("accent", v)} />
        <TweakSection label="Typography" />
        <TweakSlider label="Text size" value={t.textSize} min={15} max={21} step={0.5} unit="px" onChange={v => setTweak("textSize", v)} />
        <TweakSlider label="Line height" value={t.lineHeight} min={1.45} max={1.85} step={0.01} onChange={v => setTweak("lineHeight", v)} />
        <TweakRadio label="Alignment" value={t.align} options={["Justified", "Left"]} onChange={v => setTweak("align", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={["Comfortable", "Compact"]} onChange={v => setTweak("density", v)} />
        <TweakToggle label="Show figures" value={t.figures} onChange={v => setTweak("figures", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
