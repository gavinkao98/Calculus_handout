<html lang="en">

<title>Calculus Handout — Print build</title>

<!-- ====================================================================
     列印版範本 (template-print.html) —— A4 單頁講義
     -------------------------------------------------------------------
     用法：複製 → 改名 → 只改下面的 CHAPTER 設定區塊。
     開啟後內建分頁器會把內容打包成 A4 頁，按右上角按鈕即可列印 / 存 PDF。
     共用樣式在 shared/，每章小節檔在自己的資料夾。
     ==================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sugina-dev/latin-modern-web@1.0.1/style/latinmodern-roman.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared/skin-hs.css" />
<link rel="stylesheet" href="shared/figs.css" />
<link rel="stylesheet" href="shared/print.css" />
<script src="shared/plot.js"></script>

<style>
  .print-toolbar {
    position: fixed; top: 14px; right: 16px; z-index: 1000;
    display: flex; align-items: center; gap: 10px; font-family: "Inter", system-ui, sans-serif;
  }
  .print-toolbar button {
    font: 600 13px "Inter", sans-serif; color: #fff; background: #1f4e79;
    border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
  }
  .print-toolbar button:disabled { opacity: .5; cursor: default; }
  .print-toolbar button:not(:disabled):hover { background: #1a4368; }
  .print-toolbar .status {
    font-size: 12px; color: #e8eaf0; background: rgba(0,0,0,.4);
    padding: 6px 11px; border-radius: 999px; backdrop-filter: blur(6px);
  }
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: "Inter", system-ui, sans-serif; color: #cdd2dc; background: #6f727b; z-index: 900;
  }
  /* offscreen measuring surface — body content width = 210mm − 24mm − 18mm = 168mm ≈ 635px */
  #source { position: absolute; left: -10000px; top: 0; width: 635px; }
</style>
</head>
<body>

<div id="boot">Preparing …</div>

<div class="print-toolbar">
  <span class="status" id="status">Preparing …</span>
  <button id="printBtn" disabled>Print / Save as PDF</button>
</div>

<div id="source"><div class="paper skin-hs vivid"><div class="page" id="page"></div></div></div>
<div id="pages"></div>

<script>
/* ╔══════════════════════════════════════════════════════════════════╗
   ║  CHAPTER 設定區塊 —— 每章只需要改這裡                                ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const CHAPTER = {
  dir: "exp-ch03",                                      // 這一章的資料夾
  runningHead: "Chapter 3 \u00b7 Chain Rule and Trigonometric Derivatives", // 頁首跑馬字（第 2 頁起）
  fragments: [
    "sec-3-1",
    "sec-3-2",
    "sec-3-3",
  ],
  macros: {},
};
/* ╚══════════════════════════════════════════════════════════════════╝ */

const FRAGMENTS = CHAPTER.fragments;
const RUNNING_HEAD = CHAPTER.runningHead;

function loadScript(src) {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = src; s.onload = () => resolve(true);
    s.onerror = () => { console.warn("no figures.js for", src); resolve(false); };
    document.head.appendChild(s);
  });
}

function renderMath(root) {
  if (!window.renderMathInElement || !root) return;
  try {
    window.renderMathInElement(root, {
      delimiters: [
        { left: "\\[", right: "\\]", display: true },
        { left: "\\(", right: "\\)", display: false },
      ],
      throwOnError: false, trust: true,
      macros: CHAPTER.macros || {},
    });
  } catch (e) { console.warn("katex", e); }
}

function waitFor(test, tries) {
  return new Promise((resolve) => {
    let n = 0;
    const tick = () => {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

const isHeading = (el) =>
  el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");

function isDisplayChild(n) {
  return n.nodeType === 1 &&
    ((n.classList && n.classList.contains("katex-display")) ||
     (n.querySelector && !!n.querySelector(".katex-display")));
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";

function liCount(el) { return [...el.children].filter((x) => x.tagName === "LI").length; }

function countBodyUnits(bodyEl) {
  let n = 0;
  [...bodyEl.children].forEach((ch) => {
    if (ch.tagName === "P" && ch.querySelector(".katex-display")) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    const b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(".katex-display")) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  const els = contentKids(bodyEl);
  return els.length > 0 && els.every((c) => c.tagName === "OL" || c.tagName === "UL");
}

function contentKids(bodyEl) {
  return [...bodyEl.children].filter(
    (c) => !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"))
  );
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    const b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    const kids = contentKids(b);
    const hasPara = kids.some(
      (c) => c.tagName === "P" && c.querySelector(".katex-display") && explodeParagraph2(c) > 1
    );
    if (hasPara || (kids.length >= 2 && !kids.every((c) => c.tagName === "OL" || c.tagName === "UL"))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(".katex-display") && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  let n = 0, hasBuf = false;
  [...p.childNodes].forEach((node) => {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  const parts = [];
  let buf = [];
  const flush = () => {
    const hasContent = buf.some((n) => (n.textContent && n.textContent.trim()) || n.nodeType === 1);
    if (hasContent) {
      const np = document.createElement("p");
      np.className = p.className;
      buf.forEach((n) => np.appendChild(n));
      parts.push(np);
    } else {
      buf.forEach((n) => n.parentNode && n.parentNode.removeChild(n));
    }
    buf = [];
  };
  [...p.childNodes].forEach((node) => {
    if (isDisplayChild(node)) {
      flush();
      const np = document.createElement("p");
      np.className = p.className;
      np.appendChild(node);
      parts.push(np);
    } else {
      buf.push(node);
    }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  const items = [...listEl.children].filter((x) => x.tagName === "LI");
  if (items.length < 2) return [listEl];
  const tag = listEl.tagName.toLowerCase();
  return items.map((li, i) => {
    const nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  const units = [];
  [...bodyEl.children].forEach((ch) => {
    if (ch.tagName === "P" && ch.querySelector(".katex-display") && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach((u) => units.push(u));
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach((u) => units.push(u));
    } else {
      units.push(ch);
    }
  });
  return units;
}

function splitEnvOverflow(env) {
  const bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  const kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  const parts = [env];
  kids.forEach((k) => {
    const cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    const b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [...block.children];
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { const ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  const pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  let idx = 0, body = null;

  const newSheet = () => {
    const sheet = document.createElement("div");
    sheet.className = "sheet";
    const header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    const footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };

  newSheet();
  const fits = () => body.scrollHeight <= body.clientHeight + 1;
  const FREE_THRESHOLD = 130;

  const moveToFreshPage = (block) => {
    let carry = null;
    if (body.childElementCount > 0) {
      const last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };

  const place = (block) => {
    body.appendChild(block);
    if (fits()) return;
    const blockH = block.getBoundingClientRect().height;
    body.removeChild(block);

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      const lastEl = body.lastElementChild;
      const used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      const remaining = body.clientHeight - used;

      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }

      const kids = [...block.children];
      const ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      const solParts = splitParts(sol);

      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }

      const first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }

      for (let i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }

    const mode = splitMode(block);
    const want = (mode !== "none" && blockH > body.clientHeight);
    if (want) {
      const parts = splitParts(block);
      if (parts.length > 1) { parts.forEach(place); return; }
    }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      const parts = splitParts(block);
      if (parts.length > 1) { body.removeChild(block); parts.forEach(place); }
    }
  };

  blocks.forEach(place);
  return idx;
}

async function build() {
  const status = document.getElementById("status");
  await loadScript("./" + CHAPTER.dir + "/figures.js");
  const parts = await Promise.all(
    FRAGMENTS.map((f) => fetch("./" + CHAPTER.dir + "/" + f + ".html").then((r) => r.text()))
  );
  const page = document.getElementById("page");
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  await waitFor(() => !!window.renderMathInElement, 120);
  renderMath(page);
  if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }

  const blocks = [];
  page.querySelectorAll(":scope > .sec").forEach((sec) => {
    [...sec.children].forEach((ch) => blocks.push(ch));
  });

  status.textContent = "Paginating …";
  await new Promise((r) => setTimeout(r, 60));

  const n = paginate(blocks);
  const src = document.getElementById("source");
  if (src) src.remove();

  status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
  const btn = document.getElementById("printBtn");
  btn.disabled = false;
  btn.addEventListener("click", () => window.print());

  const boot = document.getElementById("boot");
  if (boot) boot.remove();
}

window.addEventListener("DOMContentLoaded", build);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1f4e79"/>

    <line x1="36" y1="32" x2="64" y2="32" stroke="#1f4e79" stroke-width="2"/>
    <line x1="36" y1="40" x2="64" y2="40" stroke="#c8ccd6" stroke-width="2"/>
    <line x1="36" y1="46" x2="58" y2="46" stroke="#c8ccd6" stroke-width="2"/>
    <text x="50" y="70" font-family="Inter, sans-serif" font-size="9" fill="#82868f" text-anchor="middle">A4</text>
  </svg>
</template>
</body>
</html>
