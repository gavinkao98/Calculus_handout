     共用樣式與引擎都在 shared/，每一章的小節檔放在自己的資料夾。
     完整說明見 讀我-排版指南.md。
     ==================================================================== -->

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; }
  #root { min-height: 100vh; }
  .chbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 9px 18px; background: rgba(233,230,223,.93); backdrop-filter: blur(8px);
    border-bottom: 1px solid #d8d2c6; font-family: "Inter", system-ui, sans-serif;
  }
  .theme-dark .chbar { background: rgba(10,12,16,.86); border-color: rgba(255,255,255,.08); }
  .chbar .brand { font-size: 12.5px; font-weight: 700; color: #1f4e79; margin-right: 8px; letter-spacing: .01em; }
  .theme-dark .chbar .brand { color: #9db8e0; }
  .chbar a {
    font-size: 12px; font-weight: 600; color: #565a63; text-decoration: none;
    padding: 4px 9px; border-radius: 999px;
  }
  .chbar a:hover { background: rgba(31,78,121,.1); color: #1f4e79; }
  .theme-dark .chbar a { color: #aab0c0; }
  .theme-dark .chbar a:hover { background: rgba(157,184,224,.14); color: #cdddf6; }

  .reader { max-width: 840px; margin: 0 auto; padding: 30px 34px 140px; }
  .reader .paper.skin-hs {
    border-radius: 6px;
    box-shadow: 0 6px 44px rgba(20, 24, 40, .12), 0 1px 3px rgba(0,0,0,.06);
    height: auto;
  }
  .theme-dark .reader .paper.skin-hs {
    box-shadow: 0 10px 60px rgba(0, 0, 0, .55), 0 0 0 1px rgba(255,255,255,.04);
  }
  .paper .sec-head, .paper .chapter-head { scroll-margin-top: 64px; }

  .hint {
    position: fixed; right: 16px; bottom: 14px; z-index: 20;
    font-family: "Inter", system-ui, sans-serif; font-size: 12px;
    color: #8a8e98; background: rgba(255,255,255,.7); backdrop-filter: blur(6px);
    padding: 6px 11px; border-radius: 999px; border: 1px solid rgba(0,0,0,.06);
    pointer-events: none;
  }
  .theme-dark .hint { color: #8a8fa2; background: rgba(20,24,32,.6); border-color: rgba(255,255,255,.08); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared/tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  CHAPTER 設定區塊 —— 每章只需要改這裡                                ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const CHAPTER = {
  // 空白章節骨架（new-chapter/）的預覽：示範所有環境與標記。
  dir: "new-chapter",
  brand: "New chapter",
  fragments: ["sec-intro", "sec-markup-reference", "sec-summary"],
  macros: {},
};
/* ╚══════════════════════════════════════════════════════════════════╝ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "Light",
  "accent": "#1f4e79",
  "textSize": 17,
  "lineHeight": 1.62,
  "prose": "Latin Modern",
  "align": "Justified",
  "density": "Comfortable",
  "figures": true
}/*EDITMODE-END*/;

const ACCENTS = ["#1f4e79", "#176b6b", "#5b4b8a", "#9a5b2e"];
const PROSE_STACKS = {
  "Latin Modern": '"Latin Modern Roman", "Source Serif 4", Georgia, serif',
  "Modern": '"Source Serif 4", "Spectral", Georgia, serif',
};

// load the chapter's figure registry (figures.js) on demand
function loadScript(src) {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = src; s.onload = () => resolve(true);
    s.onerror = () => { console.warn("no figures.js for", src); resolve(false); };
    document.head.appendChild(s);
  });
}

function renderMath(root) {
  if (!window.renderMathInElement || !root) return;
  try {
    window.renderMathInElement(root, {
      delimiters: [
        { left: "\\[", right: "\\]", display: true },
        { left: "\\(", right: "\\)", display: false },
      ],
      throwOnError: false, trust: true,
      macros: CHAPTER.macros || {},
    });
  } catch (e) { console.warn("katex", e); }
}

function buildNav(page, navEl) {
  if (!navEl) return;
  navEl.innerHTML = "";
  const brand = document.createElement("span");
  brand.className = "brand";
  brand.textContent = CHAPTER.brand;
  navEl.appendChild(brand);

  [...page.querySelectorAll(".sec")].forEach((s, i) => {
    const head = s.querySelector(".sec-head, .chapter-head");
    if (!head) return;
    head.id = "sec-" + i;
    const no = s.querySelector(".sec-no");
    const chTitle = s.querySelector(".ch-title");
    const secTitle = s.querySelector(".sec-title");
    let label = null;
    if (chTitle) label = "Overview";
    else if (no) label = "\u00a7" + no.textContent.trim();
    else if (secTitle && /summary/i.test(secTitle.textContent)) label = "Summary";
    if (!label) return;
    const a = document.createElement("a");
    a.href = "#sec-" + i;
    a.textContent = label;
    navEl.appendChild(a);
  });
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [html, setHtml] = useState(null);
  const paperRef = useRef(null);
  const navRef = useRef(null);

  useEffect(() => {
    const base = "./" + CHAPTER.dir + "/";
    // load figures.js (optional) then the section fragments
    loadScript(base + "figures.js").then(() =>
      Promise.all(CHAPTER.fragments.map((f) => fetch(base + f + ".html").then((r) => r.text())))
        .then((parts) => setHtml(parts.join("\n")))
        .catch((e) => console.error("fragment load failed", e))
    );
  }, []);

  useEffect(() => {
    if (!html) return;
    let cancelled = false, tries = 0;
    const run = () => {
      if (cancelled || !paperRef.current) return;
      if (window.hydrateFigures) window.hydrateFigures(paperRef.current);
      buildNav(paperRef.current, navRef.current);
      const tick = () => {
        if (cancelled) return;
        if (window.renderMathInElement) renderMath(paperRef.current);
        else if (tries++ < 80) setTimeout(tick, 50);
      };
      tick();
    };
    (document.fonts ? document.fonts.ready : Promise.resolve()).then(run);
    return () => { cancelled = true; };
  }, [html]);

  const docClass = [
    t.theme === "Dark" ? "theme-dark" : "",
    t.align === "Left" ? "align-left" : "",
    t.density === "Compact" ? "density-compact" : "",
    t.figures ? "" : "hide-figures",
  ].filter(Boolean).join(" ");

  const paperStyle = {
    "--fs-base": t.textSize + "px",
    "--lh-user": t.lineHeight,
    "--serif": PROSE_STACKS[t.prose] || PROSE_STACKS["Latin Modern"],
  };

  return (
    <div id="doc" className={docClass} style={{ "--accent": t.accent }}>
      <nav className="chbar" ref={navRef}></nav>
      <div className="reader">
        <div className="paper skin-hs vivid" style={paperStyle} ref={paperRef}>
          {html
            ? <div className="page" dangerouslySetInnerHTML={{ __html: html }} />
            : <div className="page" style={{ padding: 80, color: "#999" }}>Loading…</div>}
        </div>
      </div>

      <div className="hint">Open <b>Tweaks</b> to restyle</div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme} options={["Light", "Dark"]}
          onChange={(v) => setTweak("theme", v)} />
        <TweakColor label="Accent" value={t.accent} options={ACCENTS}
          onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Typography" />
        <TweakSlider label="Text size" value={t.textSize} min={15} max={21} step={0.5} unit="px"
          onChange={(v) => setTweak("textSize", v)} />
        <TweakSlider label="Line height" value={t.lineHeight} min={1.45} max={1.85} step={0.01}
          onChange={(v) => setTweak("lineHeight", v)} />
        <TweakRadio label="Prose face" value={t.prose} options={["Latin Modern", "Modern"]}
          onChange={(v) => setTweak("prose", v)} />
        <TweakRadio label="Alignment" value={t.align} options={["Justified", "Left"]}
          onChange={(v) => setTweak("align", v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={["Comfortable", "Compact"]}
          onChange={(v) => setTweak("density", v)} />
        <TweakToggle label="Show figures" value={t.figures}
          onChange={(v) => setTweak("figures", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

    <line x1="14" y1="50" x2="86" y2="50" stroke="#9db8e0" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="50" y="92" font-family="Georgia, serif" font-size="12" fill="#cdddf6" text-anchor="middle">Calc</text>

</template>
</body>
