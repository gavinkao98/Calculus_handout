StylesPath = styles
MinAlertLevel = suggestion

Vocab = AItexture

[*.{html,md}]
BasedOnStyles = AItexture
# reject.txt 走內建 Vale.Avoid——降為 warning（本層恆 advisory，決定性「擋」在 Mode B 人審 C）
Vale.Avoid = warning
# 只掃散文：略過行內與區塊數學、程式碼
BlockIgnores = (?s) *(\$\$.*?\$\$), (?s)(<code>.*?</code>)
TokenIgnores = (\$[^$\n]+\$), (\\\([^)]*\\\)), (\\[a-zA-Z]+\{[^}]*\})
