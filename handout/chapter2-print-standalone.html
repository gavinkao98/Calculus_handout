  <!-- expansion:intuition — convert the picture into the formula: the two strips give f'g and fg'; the corner is second-order and vanishes -->
  <p>Dividing the added area by \(h\) and letting \(h \to 0\), the two strips contribute \(g\,\dfrac{\Delta f}{h} \to g\,f'\) and \(f\,\dfrac{\Delta g}{h} \to f\,g'\), while the corner contributes \(\dfrac{\Delta f\,\Delta g}{h} = \dfrac{\Delta f}{h}\,\Delta g \to f' \cdot 0 = 0\), since \(\Delta f/h\) stays finite (tending to \(f'\)) while \(\Delta g \to 0\). The surviving pieces are exactly the two terms of the product rule.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">2.6</span><span class="env-name">The product rule</span></p>
    <div class="env-body">
      <p>If \(f\) and \(g\) are differentiable at \(x\), then their product \(fg\) is differentiable at \(x\), and</p>
      <p>\[ (fg)'(x) = f'(x)\,g(x) + f(x)\,g'(x), \qquad\text{i.e.}\qquad \frac{d}{dx}(fg) = \left(\frac{d}{dx}f\right)g + f\left(\frac{d}{dx}g\right). \]</p>
    </div>
  </section>

  <!-- proof follows the manuscript's add-and-subtract technique (seed); the lim g(x+h)=g(x) step is justified by §2.3 Theorem 2.1 (faithfulness: supply the hypothesis the manuscript uses implicitly) -->
  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>We start from the definition and apply a useful trick: add and subtract \(f(x)\,g(x+h)\) in the numerator, which lets us isolate the change in \(f\) from the change in \(g\):</p>
      <p>\[ \begin{aligned}
        f(x+h)g(x+h) - f(x)g(x)
          &= \bigl[f(x+h)g(x+h) - f(x)g(x+h)\bigr] + \bigl[f(x)g(x+h) - f(x)g(x)\bigr] \\[2pt]
          &= \bigl[f(x+h) - f(x)\bigr]\,g(x+h) + f(x)\,\bigl[g(x+h) - g(x)\bigr].
      \end{aligned} \]</p>
      <p>Dividing by \(h\),</p>
      <p>\[ \frac{f(x+h)g(x+h) - f(x)g(x)}{h} = \frac{f(x+h) - f(x)}{h}\,g(x+h) \;+\; f(x)\,\frac{g(x+h) - g(x)}{h}. \]</p>
      <p>Now let \(h \to 0\) and evaluate each piece with the limit laws of §1.5. The two difference quotients tend to \(f'(x)\) and \(g'(x)\). For the remaining factor, \(g(x+h) \to g(x)\): this is exactly the statement that \(g\) is continuous at \(x\), which holds because \(g\), being differentiable at \(x\), is continuous there (Theorem 2.1, §2.3). Therefore</p>
      <p>\[ (fg)'(x) = f'(x)\,g(x) + f(x)\,g'(x). \]</p>
    </div>
  </section>

  <!-- expansion:example — inline mini-application of the product rule, anchoring it before the manuscript's worked example -->
  <p>The rule is quick to apply once it is in hand. For instance,</p>
  <p>\[ \frac{d}{dx}\bigl(x^{2} e^{x}\bigr) = (2x)\,e^{x} + x^{2}\,e^{x} = x(x + 2)\,e^{x}, \]</p>
  <p>where we used the power rule (Theorem 2.3) for \(x^{2}\) and \((e^{x})' = e^{x}\) (Theorem 2.5) for the exponential factor. The manuscript records the following companion example.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">2.19</span></p>
      <div class="env-body">
        <p>Differentiate \(h(x) = x\,e^{x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Here \(h\) is a product of \(f(x) = x\) and \(g(x) = e^{x}\), with \(f'(x) = 1\) and \(g'(x) = e^{x}\) (Theorem 2.5). The product rule gives</p>
        <p>\[ h'(x) = f'(x)\,g(x) + f(x)\,g'(x) = (1)\,e^{x} + x\,e^{x} = e^{x}(1 + x). \]</p>
        <p>Notice that neither factor alone produces the answer: the term \(e^{x}\) comes from differentiating \(x\) while keeping \(e^{x}\), and the term \(x\,e^{x}\) from keeping \(x\) while differentiating \(e^{x}\) — the two strips of Figure 2.4 in algebraic form.</p>
      </div>
    </section>
  </div>

  <!-- expansion:application — product rule in economics: marginal revenue R'(q)=p'(q)q+p(q) [pass: enrichment] -->
  <p>The product rule has a clean reading in economics. Suppose a firm sells \(q\) units at a price \(p(q)\) that depends on how many are sold; its revenue is the product \(R(q) = p(q)\,q\). The product rule gives the <em>marginal revenue</em> \(R'(q) = p'(q)\,q + p(q)\): selling one more unit changes revenue in two ways at once — through the price change \(p'(q)\) spread over all \(q\) units, and through the price \(p(q)\) fetched by the extra unit itself. The two strips of Figure 2.4 return here as two competing economic effects.</p>

  <h3 class="subsec-head">The quotient rule</h3>

  <!-- expansion:intuition — bridge to the quotient, reusing the same add-and-subtract idea; introduce the manuscript's Δx notation -->
  <p>The same add-and-subtract idea handles a quotient \(f/g\). Here the manuscript writes the increment as \(\Delta x\) rather than \(h\); the two symbols mean the same thing, as the next caution records.</p>

  <!-- expansion:caution — ROADMAP notation pitfall, deliberately deferred from §2.2 to here: Δx ≡ h -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The increment in the variable is written either \(h\) or \(\Delta x\); in derivative computations the two are synonymous. Reading \(\Delta x\) as “a small change in \(x\),” the difference quotient \(\bigl(f(x + \Delta x) - f(x)\bigr)/\Delta x\) is identical to the \(h\)-form, and \(\Delta x \to 0\) means the same as \(h \to 0\). We switch to \(\Delta x\) below only to match the manuscript.</p>
    </div>
  </section>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">2.7</span><span class="env-name">The quotient rule</span></p>
    <div class="env-body">
      <p>If \(f\) and \(g\) are differentiable at \(x\) and \(g(x) \ne 0\), then the quotient \(f/g\) is differentiable at \(x\), and</p>
      <p>\[ \left(\frac{f}{g}\right)'(x) = \frac{f'(x)\,g(x) - f(x)\,g'(x)}{\bigl[g(x)\bigr]^{2}}. \]</p>
    </div>
  </section>

  <!-- expansion:intuition — why the quotient rule carries a minus sign and a g²: g sits in the denominator [pass: enrichment] -->
  <p>Before the proof, it helps to see why the rule has this shape. Like the product rule, its numerator pairs each function with the derivative of the other — but joined by a <em>minus</em> sign instead of a plus, and the whole expression is divided by \(g^{2}\). The minus sign reflects that \(g\) sits in the denominator: making \(g\) larger makes the quotient \(f/g\) smaller, so the effect of \(g'\) is subtracted rather than added. The \(g^{2}\) is the footprint of differentiating \(1/g\): already in the simplest case \(f = 1\), the derivative of \(1/x\) was \(-1/x^{2}\) in §2.2 — the same minus sign and the same square that the quotient rule carries in general.</p>

  <!-- proof follows the manuscript: combine over a common denominator, add and subtract f(x)g(x) on the numerator, keep Δx notation; needs g continuous (so g(x+Δx)→g(x)) and g(x)≠0 (so the denominator tends to g(x)^2 ≠ 0) -->
  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Combining the two fractions over a common denominator,</p>
      <p>\[ \frac{f(x+\Delta x)}{g(x+\Delta x)} - \frac{f(x)}{g(x)} = \frac{f(x+\Delta x)\,g(x) - f(x)\,g(x+\Delta x)}{g(x+\Delta x)\,g(x)}. \]</p>
      <p>On the numerator we play the same trick as before, now adding and subtracting \(f(x)\,g(x)\):</p>
      <p>\[ \begin{aligned}
        f(x+\Delta x)\,g(x) - f(x)\,g(x+\Delta x)
          &= \bigl[f(x+\Delta x)\,g(x) - f(x)\,g(x)\bigr] - \bigl[f(x)\,g(x+\Delta x) - f(x)\,g(x)\bigr] \\[2pt]
          &= \bigl[f(x+\Delta x) - f(x)\bigr]\,g(x) - f(x)\,\bigl[g(x+\Delta x) - g(x)\bigr].
      \end{aligned} \]</p>
      <p>Dividing the whole difference by \(\Delta x\), the difference quotient becomes</p>
      <p>\[ \frac{1}{g(x+\Delta x)\,g(x)}\left( \frac{f(x+\Delta x) - f(x)}{\Delta x}\,g(x) - f(x)\,\frac{g(x+\Delta x) - g(x)}{\Delta x} \right). \]</p>
      <p>Let \(\Delta x \to 0\). The two difference quotients tend to \(f'(x)\) and \(g'(x)\); and \(g(x+\Delta x) \to g(x)\) because \(g\) is continuous at \(x\) (Theorem 2.1, §2.3), so the denominator tends to \(g(x)\,g(x) = \bigl[g(x)\bigr]^{2}\), which is nonzero since \(g(x) \ne 0\). Hence</p>
      <p>\[ \left(\frac{f}{g}\right)'(x) = \frac{f'(x)\,g(x) - f(x)\,g'(x)}{\bigl[g(x)\bigr]^{2}}. \]</p>
    </div>
  </section>

  <!-- expansion:caution — ROADMAP pitfall: quotient-rule asymmetry; numerator term order matters -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Unlike the product rule, the quotient rule is <em>not</em> symmetric in \(f\) and \(g\): the numerator is \(f'g - f g'\), with the derivative of the <em>top</em> coming first. Swapping the order to \(f g' - f' g\) flips the sign of the whole derivative, and forgetting the \(g^{2}\) in the denominator changes the answer entirely. A reliable mnemonic reads the numerator as “(derivative of top)(bottom) minus (top)(derivative of bottom), all over bottom squared.”</p>
    </div>
  </section>

  <!-- expansion:example — inline mini-application that fulfils the promise made in §2.2 (Example 2.8): recover (1/x)' = −1/x^2 in one line -->
  <p>As a first check, the quotient rule recovers a derivative we computed laboriously from first principles in §2.2. Taking the numerator to be the constant \(1\) and the denominator \(x\),</p>
  <p>\[ \frac{d}{dx}\!\left(\frac{1}{x}\right) = \frac{(0)(x) - (1)(1)}{x^{2}} = -\frac{1}{x^{2}}, \]</p>
  <p>matching the derivative \(-1/x^{2}\) found in Example 2.8 — obtained here in a single line, exactly as promised there.</p>

  <!-- expansion:example — new worked example (approved 2026-06-08, decision E/F): a genuine rational quotient that exercises the full formula and the numerator order -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">2.20</span></p>
      <div class="env-body">
        <p>Differentiate \(f(x) = \dfrac{x}{x^{2} + 1}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>This is a genuine quotient — no algebra simplifies it to a power — so the quotient rule applies, with top \(x\) and bottom \(x^{2} + 1\). Their derivatives are \(1\) and \(2x\), and the bottom never vanishes, so the rule is valid for every \(x\). Taking care with the order of the numerator terms,</p>
        <p>\[ \begin{aligned}
          f'(x) &= \frac{(1)\bigl(x^{2} + 1\bigr) - (x)(2x)}{\bigl(x^{2} + 1\bigr)^{2}} \\[2pt]
                &= \frac{x^{2} + 1 - 2x^{2}}{\bigl(x^{2} + 1\bigr)^{2}}
                 = \frac{1 - x^{2}}{\bigl(x^{2} + 1\bigr)^{2}}.
        \end{aligned} \]</p>
        <p>Had we mistakenly written the numerator as \((x)(2x) - (1)(x^{2}+1)\), every sign would be wrong. As a sanity check on the result, \(f'(0) = 1 > 0\) (the curve rises through the origin) and \(f'(\pm 1) = 0\), the two points where \(x/(x^{2}+1)\) reaches its largest and smallest values.</p>
      </div>
    </section>
  </div>

  <figure class="figure" data-fig="quotient-example-graph"></figure>

  <!-- expansion:example — error-spotting on the quotient rule, the worked counterpart to the asymmetry Caution above [source: CLP-1 §2.6 prob_s2.6 Conceptual Q1 "spot the error: 2x/(x+1)"; official solution, rewritten] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">2.21</span></p>
      <div class="env-body">
        <p>A student differentiates \(f(x) = \dfrac{2x}{x + 1}\) as follows:</p>
        <p>\[ \begin{aligned}
          f'(x) &= \frac{2(x + 1) + 2x}{(x + 1)^{2}} \\[4pt]
                &= \frac{2(x + 1)}{(x + 1)^{2}} = \frac{2}{x + 1}.
        \end{aligned} \]</p>
        <p>Spot <em>all</em> the errors in this work, and give the correct derivative.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>There are two errors.</p>
        <p><em>Error 1 — wrong sign in the quotient rule.</em> The quotient rule carries a <em>minus</em> sign in the numerator,</p>
        <p>\[ \left(\frac{f}{g}\right)' = \frac{f'g - fg'}{g^{2}}, \]</p>
        <p>but the student wrote a plus. With top \(2x\) and bottom \(x + 1\), the correct numerator is</p>
        <p>\[ (2)(x + 1) - (2x)(1) = 2x + 2 - 2x = 2, \]</p>
        <p>not \(2(x + 1) + 2x\).</p>
        <p><em>Error 2 — incorrect simplification.</em> Even within the student's own (wrong) numerator, \(2(x + 1) + 2x = 4x + 2\), not \(2(x + 1)\); the \(2x\) term was simply dropped.</p>
        <p>Carrying out the rule correctly,</p>
        <p>\[ f'(x) = \frac{(2)(x + 1) - (2x)(1)}{(x + 1)^{2}} = \frac{2}{(x + 1)^{2}}. \]</p>
        <p>Note that the denominator is \((x + 1)^{2}\), not \((x + 1)\) — a third common slip the student was heading toward.</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Choosing the right rule</h3>

  <!-- expansion:intuition — motivate the strategy box: with several rules now available, the first task on any problem is to read its shape and pick the rule -->
  <p>With the constant, power, sum, constant-multiple, product, and quotient rules all in hand, differentiating a given expression is now less about computing limits and more about <em>recognizing</em> which rule its structure calls for. Reading that structure — and simplifying first when possible — is the skill the next box organizes.</p>

  <!-- expansion:strategy — ROADMAP assigns "Selecting among the basic rules" to §2.5; 3 steps incl. the "simplify first" judgment (decision C) -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">2.2</span><span class="env-name">Selecting among the basic rules</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Read the <em>outermost</em> structure of the expression. Is it a single power or polynomial, a sum or difference, a product of two functions, or a quotient of two functions?</li>
        <li>Before reaching for the product or quotient rule, ask whether algebra simplifies the expression first: a quotient like \(\dfrac{x^{4} - x}{x}\) becomes the polynomial \(x^{3} - 1\), and a product like \(x^{2}\cdot x^{3}\) becomes \(x^{5}\). A rule you can avoid is a rule you cannot misapply.</li>
        <li>Apply the matching rule: the power, sum, and constant-multiple rules for polynomials and powers; the product rule (Theorem 2.6) for a genuine product; the quotient rule (Theorem 2.7) for a genuine quotient. For compound expressions, the rules combine — a sum of products, a product with a polynomial factor, and so on.</li>
      </ol>
      <p>The point is to spend a moment on the shape of the problem before computing: the same expression can be far easier under one rule than another, and some apparent quotients are not quotients at all once simplified.</p>
    </div>
  </section>

  <!-- expansion:caution — a constant factor or constant denominator needs the constant-multiple rule, not the product/quotient rule [pass: enrichment] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Not every product or quotient on the page calls for the product or quotient rule. A constant factor is handled by the constant-multiple rule: \(\dfrac{d}{dx}(5x^{3}) = 5 \cdot 3x^{2} = 15x^{2}\), with no need to "differentiate" the \(5\). A constant denominator is likewise just a constant multiple, since \(\dfrac{x^{2}}{3} = \tfrac{1}{3}x^{2}\) gives \(\dfrac{d}{dx}\dfrac{x^{2}}{3} = \tfrac{2}{3}x\). The product and quotient rules are needed only when <em>both</em> parts genuinely depend on \(x\); using them when one part is constant still reaches the answer, but by a longer route with more chances to slip.</p>
    </div>
  </section>

  <!-- expansion:example — new worked example (approved 2026-06-08, decision E): rule-selection/diagnosis anchoring Strategy 2.2; (b) is the simplify-first lesson -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">2.22</span></p>
      <div class="env-body">
        <p>For each function, first decide which rule applies, then differentiate:
        \[ \text{(a)}\ \ y = x^{3} e^{x}, \qquad \text{(b)}\ \ y = \frac{x^{4} - x}{x}, \qquad \text{(c)}\ \ y = \frac{x^{2}}{e^{x}}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p><em>(a)</em> A genuine product of \(x^{3}\) and \(e^{x}\); use the product rule:</p>
        <p>\[ y' = (3x^{2})\,e^{x} + x^{3}\,e^{x} = x^{2} e^{x}(3 + x). \]</p>
        <p><em>(b)</em> This <em>looks</em> like a quotient, but it simplifies first — for \(x \ne 0\), \(\dfrac{x^{4} - x}{x} = x^{3} - 1\) — so the power rule finishes it with no quotient rule at all:</p>
        <p>\[ y' = 3x^{2}. \]</p>
        <p><em>(c)</em> A genuine quotient that does not simplify; use the quotient rule, with top \(x^{2}\) and bottom \(e^{x}\):</p>
        <p>\[ y' = \frac{(2x)\,e^{x} - x^{2}\,e^{x}}{\bigl(e^{x}\bigr)^{2}} = \frac{e^{x}\bigl(2x - x^{2}\bigr)}{e^{2x}} = \frac{2x - x^{2}}{e^{x}}. \]</p>
        <p>The three parts share no single rule; the work was choosing correctly, and in (b) recognizing that the cleanest move was not to use the quotient rule at all.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — quotient rule with the exponential in the numerator (opposite arrangement to Example 2.22(c)); the sign of f' locates where the function rises and falls [source: CLP-1 §2.7 prob_s2.7 Procedural "f(x)=e^x/(2x)"; official solution, rewritten] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">2.23</span></p>
      <div class="env-body">
        <p>Differentiate \(f(x) = \dfrac{e^{x}}{2x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The quotient rule with top \(e^{x}\) and bottom \(2x\) gives</p>
        <p>\[ \begin{aligned}
          f'(x) &= \frac{(e^{x})(2x) - (e^{x})(2)}{(2x)^{2}} \\[2pt]
                &= \frac{2e^{x}(x - 1)}{4x^{2}}
                 = \frac{(x - 1)\,e^{x}}{2x^{2}}.
        \end{aligned} \]</p>
        <p>The derivative of the top is again \(e^{x}\) (Theorem 2.5), and the derivative of the bottom is just \(2\). The sign of \(f'(x)\) changes at \(x = 1\): for \(0 < x < 1\) we have \(f'(x) < 0\) (the function is decreasing), while for \(x > 1\) we have \(f'(x) > 0\) (the function is increasing).</p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close the chapter's differentiation rules; one-line forward fence to Ch3 chain rule (no preview), per decision G -->
  <p>The product and quotient rules complete the basic differentiation toolkit of this chapter: together with the constant, power, sum, and constant-multiple rules and the derivative of \(e^{x}\), they let us differentiate any algebraic or exponential combination built by adding, scaling, multiplying, and dividing. One important way of combining functions remains untouched — <em>composition</em>, forming \(f\bigl(g(x)\bigr)\) — and it needs a rule of its own, the chain rule, which opens the next chapter.</p>

(function () {

    var map = {};

    map[(-PI).toFixed(4)] = "-\\pi";
    map[(-PI / 2).toFixed(4)] = "-\\tfrac{\\pi}{2}";
    map[(PI / 2).toFixed(4)] = "\\tfrac{\\pi}{2}";
    map[PI.toFixed(4)] = "\\pi";
    map[(2 * PI).toFixed(4)] = "2\\pi";
    map[(0).toFixed(4)] = "0";
    var hit = map[v.toFixed(4)];
    if (hit != null) return hit;
    if (Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v)); // plain integers

  }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 2 — Derivatives",
  runningHead: "Chapter 2 · Derivatives",
  fragments: ["sec-2-1", "sec-2-2", "sec-2-3", "sec-2-4", "sec-2-5"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }

}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";

    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";

      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);

      var FIG_MIN_SCALE = 0.55;

        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;

        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;

      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
</body>
</html>
