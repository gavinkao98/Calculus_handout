<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.6</span>Derivatives and the Shape of a Graph</h2>
  </header>

  <!-- expansion:intuition — section opener: first derivative = rising/falling; second derivative = the way it bends (concavity) -->
  <p>The first derivative reports whether a graph rises or falls; it does not report the <em>manner</em> of the rise. A curve can climb while easing off, bending like the top of a hill, or climb while steepening, cupped like the inside of a bowl. That distinction — the way a graph bends — is <em>concavity</em>, and it is exactly what the second derivative measures. With rise-and-fall from the first derivative and bend from the second, the qualitative shape of a graph is fully in hand.</p>

  <h3 class="subsec-head">Concavity</h3>

  <p>Bending is a statement about how the slope changes. Where a graph is cupped upward, the tangent lines turn steadily counter-clockwise as you move right — the slope <em>increases</em>. Where it is cupped downward, the slope <em>decreases</em>. Take that as the definition.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.5</span><span class="env-name">Concavity</span></p>
    <div class="env-body">
      <p>Let \(f\) be differentiable on an open interval \(I\). The graph of \(f\) is <em>concave up</em> on \(I\) if \(f'\) is increasing on \(I\), and <em>concave down</em> on \(I\) if \(f'\) is decreasing on \(I\).</p>
      <p class="informal">Equivalently: a concave-up graph lies <em>above</em> each of its tangent lines (it cups upward, holding water), and a concave-down graph lies <em>below</em> them (it sheds water). The tangent turning steadily one way is the slope moving steadily one way.</p>
    </div>
  </section>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — concave up/down vs tangent lines (Def 5.5); registered in chapter5 FIGS as "concavity-tangents"] -->
  <figure class="figure" data-fig="concavity-tangents">
    <figcaption><span class="fig-no">Figure 5.8</span> Concavity read from tangent lines: a concave-up arc lies above every tangent and its slopes increase from left to right; a concave-down arc lies below its tangents, with decreasing slopes.</figcaption>
  </figure>

  <p>Since “\(f'\) increasing” is itself a statement the derivative can test — apply the sign of \((f')' = f''\) — concavity is read directly off the second derivative.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">5.2</span><span class="env-name">Concavity Test</span></p>
    <div class="env-body">
      <p>Suppose \(f''\) exists on an open interval \(I\).</p>
      <ul>
        <li>If \(f''(x) > 0\) for all \(x \in I\), then \(f\) is concave up on \(I\).</li>
        <li>If \(f''(x) < 0\) for all \(x \in I\), then \(f\) is concave down on \(I\).</li>
      </ul>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose \(f''(x) > 0\) on \(I\). To show \(f'\) is increasing on \(I\), take any \(x_{1} < x_{2}\) in \(I\) and apply the monotonicity corollary (Corollary 4.3) to \(f'\) on the closed subinterval \([x_{1}, x_{2}]\): there \(f'\) is continuous and differentiable with derivative \((f')' = f'' > 0\), so \(f'(x_{1}) < f'(x_{2})\). Since this holds for every such pair, \(f'\) is increasing on \(I\), and by Definition 5.5 the graph is concave up. The concave-down case is the same argument applied to \(-f\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>Where concavity switches from one sense to the other, the graph has a special point.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.6</span><span class="env-name">Inflection point</span></p>
    <div class="env-body">
      <p>A point on the graph of \(f\), where \(f\) is continuous, is an <em>inflection point</em> if the concavity changes there — from up to down, or from down to up.</p>
    </div>
  </section>

  <!-- expansion:caution — inflection candidates are where f''=0 or DNE, but concavity must actually change -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>At an inflection point \(c\) where \(f''(c)\) exists, \(f''(c)\) must equal \(0\). For if the concavity changes at \(c\), then \(f'\) switches from increasing to decreasing (or the reverse) there, so \(f'\) has a local extremum at \(c\); Fermat’s theorem (Theorem 4.10) applied to \(f'\) then forces its derivative \(f''(c) = 0\). So the candidates for inflection are the points where \(f'' = 0\) or \(f''\) fails to exist. But \(f''(c) = 0\) alone does <em>not</em> make an inflection: the concavity must genuinely change sign there. The function \(f(x) = x^{4}\) has \(f''(0) = 0\), yet it is concave up on both sides of \(0\) — no inflection. Always confirm the change, never infer it from \(f'' = 0\).</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.18: concavity intervals and inflection points from the sign of f'' -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.18</span></p>
      <div class="env-body">
        <p>Find the intervals of concavity and the inflection points of \(f(x) = x^{4} - 4x^{3}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Differentiate twice: \(f'(x) = 4x^{3} - 12x^{2}\), and</p>
        <p>\[ f''(x) = 12x^{2} - 24x = 12x(x - 2). \]</p>
        <p>The second derivative is zero at \(x = 0\) and \(x = 2\), the candidate inflection points. Its sign, from the factors \(12x\) and \(x - 2\), is</p>
        <p>\[ \begin{aligned}
          &f’’(x) > 0 \text{ on } (-\infty, 0), \qquad f’’(x) < 0 \text{ on } (0, 2), \\
          &f’’(x) > 0 \text{ on } (2, \infty).
        \end{aligned} \]</p>
        <p>So \(f\) is concave up on \((-\infty, 0)\), concave down on \((0, 2)\), and concave up again on \((2, \infty)\). The concavity genuinely changes at both candidates, so both are inflection points: \((0, 0)\) and \((2, -16)\), using \(f(2) = 16 - 32 = -16\). The curve cups upward, flattens and rolls over near the origin, sags through the middle, and cups upward once more past \(x = 2\). <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The Second Derivative Test</h3>

  <p>Concavity gives a second way to classify a critical number, often faster than tracking the sign of \(f'\) across it. At a point where the tangent is horizontal, the concavity alone decides max or min: a horizontal tangent in a valley (concave up) is a minimum; on a ridge (concave down), a maximum.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">5.3</span><span class="env-name">Second Derivative Test</span></p>
    <div class="env-body">
      <p>Suppose \(f'(c) = 0\) and \(f''(c)\) exists.</p>
      <ul>
        <li>If \(f''(c) > 0\), then \(f\) has a local minimum at \(c\).</li>
        <li>If \(f''(c) < 0\), then \(f\) has a local maximum at \(c\).</li>
        <li>If \(f''(c) = 0\), the test is inconclusive: \(c\) may be a local maximum, a local minimum, or neither.</li>
      </ul>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose \(f''(c) > 0\). By definition \(f''(c)\) is the derivative of \(f'\) at \(c\), and since \(f'(c) = 0\),</p>
      <p>\[ f''(c) = \lim_{h \to 0} \frac{f'(c + h) - f'(c)}{h} = \lim_{h \to 0} \frac{f'(c + h)}{h} > 0. \]</p>
      <p>A limit that is positive forces the quotient to be positive for all small nonzero \(h\): there is a \(\delta > 0\) with \(f'(c + h)/h > 0\) whenever \(0 < |h| < \delta\). So \(f'(c + h)\) shares the sign of \(h\) — it is negative for \(h < 0\) and positive for \(h > 0\). That is exactly \(f'\) changing from negative to positive at \(c\), and the First Derivative Test (Theorem 5.1) delivers a local minimum. The case \(f''(c) < 0\) is identical with signs reversed, giving a local maximum. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:caution — the inconclusive case: f''(c)=0 tells you nothing; fall back to the first-derivative test -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>When \(f''(c) = 0\) the test is silent — genuinely so, not merely cautious. At \(x = 0\), the three functions \(x^{4}\), \(-x^{4}\), and \(x^{3}\) all have first and second derivatives zero, yet the first has a minimum, the second a maximum, and the third neither (an inflection with a horizontal tangent). No amount of staring at \(f''(0) = 0\) distinguishes them. When the second derivative vanishes at a critical number, abandon it and return to the First Derivative Test, checking the sign of \(f'\) on either side.</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.19: second-derivative test on the §5.4 cubic, contrasting speed with the first-derivative test -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.19</span></p>
      <div class="env-body">
        <p>Use the Second Derivative Test to classify the critical numbers of \(f(x) = x^{3} - 3x^{2} + 1\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The critical numbers are the zeros of \(f'(x) = 3x^{2} - 6x = 3x(x - 2)\), namely \(x = 0\) and \(x = 2\). The second derivative is \(f''(x) = 6x - 6\). Evaluate it at each critical number:</p>
        <p>\[ f''(0) = -6 < 0, \qquad f''(2) = 6 > 0. \]</p>
        <p>So \(x = 0\) is a local maximum (value \(f(0) = 1\)) and \(x = 2\) is a local minimum (value \(f(2) = -3\)). This is the same verdict the First Derivative Test reached in Example 5.13, obtained here with two evaluations rather than a sign chart — the trade the Second Derivative Test offers when \(f''\) is easy to compute and nonzero. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close: shape toolkit complete; §5.7 adds L'Hôpital for the limits that govern behavior at infinity, before §5.8 synthesizes into a full sketch -->
  <p>Rise and fall, peak and valley, cupping and inflection — the first two derivatives supply the entire vocabulary for the shape of a graph. Before assembling that vocabulary into a complete curve sketch, which §5.8 does, one gap remains: the behaviour of a graph far out and near its asymptotes is governed by limits that often arrive in indeterminate form. The next section supplies the tool for those — L’Hôpital’s rule — after which every feature a sketch needs is computable.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.7</span>L’Hôpital’s Rule</h2>
  </header>

  <!-- expansion:intuition — section opener: indeterminate forms; the ratio of derivatives resolves them; but the tool needs a stronger MVT -->
  <p>Some limits refuse to be read off. When \(x \to a\) drives both \(f(x)\) and \(g(x)\) to \(0\), the quotient \(f(x)/g(x)\) approaches the meaningless symbol \(\tfrac{0}{0}\): the answer could be anything, depending on how fast each part vanishes. The same impasse arises when both race to \(\infty\), giving \(\tfrac{\infty}{\infty}\). These are the <em>indeterminate forms</em>, and \(f'\!/g'\) — the ratio of the <em>rates</em> at which numerator and denominator move — is exactly the extra information needed to break the tie. <em>L’Hôpital’s rule</em> makes that precise: under the right conditions, the limit of \(f/g\) equals the limit of \(f'\!/g'\). Proving it needs a two-function refinement of the Mean Value Theorem, which is worth having in its own right.</p>

  <h3 class="subsec-head">The Generalized Mean Value Theorem</h3>

  <p>The Mean Value Theorem compares a function’s rise to the run of \(x\). The generalization compares the rises of <em>two</em> functions to each other, as both traverse the same interval.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">5.4</span><span class="env-name">Generalized Mean Value Theorem (Cauchy’s form)</span></p>
    <div class="env-body">
      <p>If \(f\) and \(g\) are continuous on \([a, b]\) and differentiable on \((a, b)\), then there is a point \(c \in (a, b)\) with</p>
      <p>\[ \bigl[f(b) - f(a)\bigr]\,g'(c) = \bigl[g(b) - g(a)\bigr]\,f'(c). \]</p>
      <p>If moreover \(g'(x) \ne 0\) throughout \((a, b)\), then \(g(b) \ne g(a)\) and the conclusion can be written as a ratio,</p>
      <p>\[ \frac{f(b) - f(a)}{g(b) - g(a)} = \frac{f'(c)}{g'(c)}. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Imitate the Mean Value Theorem’s proof, using an auxiliary function tuned to have equal endpoint values. Set</p>
      <p>\[ h(x) = \bigl[f(b) - f(a)\bigr]\,g(x) - \bigl[g(b) - g(a)\bigr]\,f(x). \]</p>
      <p>As a combination of \(f\) and \(g\), \(h\) is continuous on \([a, b]\) and differentiable on \((a, b)\). At the endpoints,</p>
      <p>\[ h(a) = f(b)g(a) - g(b)f(a) = h(b), \]</p>
      <p>as a short expansion of each side confirms, so \(h(a) = h(b)\). By Rolle’s theorem (Theorem 4.11) there is a \(c \in (a, b)\) with \(h'(c) = 0\). Since</p>
      <p>\[ h'(x) = \bigl[f(b) - f(a)\bigr]\,g'(x) - \bigl[g(b) - g(a)\bigr]\,f'(x), \]</p>
      <p>setting \(h'(c) = 0\) gives the stated identity. For the ratio form, note that if \(g'(x) \ne 0\) on \((a, b)\) then \(g(b) \ne g(a)\) — otherwise Rolle applied to \(g\) alone would produce a zero of \(g'\) — so dividing by \([g(b) - g(a)]\,g'(c)\) is legitimate. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p class="informal">Taking \(g(x) = x\) recovers the ordinary Mean Value Theorem: \(g'(c) = 1\) and \(g(b) - g(a) = b - a\), and the identity becomes \(f(b) - f(a) = (b - a)f'(c)\). The generalization is the Mean Value Theorem with the run measured by a second function instead of by \(x\).</p>

  <h3 class="subsec-head">L’Hôpital’s rule</h3>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">5.5</span><span class="env-name">L’Hôpital’s Rule</span></p>
    <div class="env-body">
      <p>Suppose \(f\) and \(g\) are differentiable with \(g'(x) \ne 0\) near \(a\) (except possibly at \(a\)), where \(a\) may be a real number or \(\pm\infty\). Suppose further that</p>
      <p>\[ \lim_{x \to a} \frac{f'(x)}{g'(x)} = L \qquad (L \text{ finite or } \pm\infty). \]</p>
      <p>If either</p>
      <ul>
        <li>\(\displaystyle \lim_{x \to a} f(x) = \lim_{x \to a} g(x) = 0\) &nbsp;(the form \(\tfrac{0}{0}\)), or</li>
        <li>\(\displaystyle \lim_{x \to a} g(x) = \pm\infty\) &nbsp;(the form \(\tfrac{\ast}{\infty}\), including \(\tfrac{\infty}{\infty}\)),</li>
      </ul>
      <p>then</p>
      <p>\[ \lim_{x \to a} \frac{f(x)}{g(x)} = L. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof of the \(\tfrac{0}{0}\) case, \(a\) finite</span></p>
    <div class="env-body">
      <p>Take \(a\) real and \(\lim_{x \to a} f = \lim_{x \to a} g = 0\). Because only the values near \(a\) matter, <em>define</em> \(f(a) = g(a) = 0\); this makes \(f\) and \(g\) continuous at \(a\), matching their limits. Fix \(x\) slightly greater than \(a\). On \([a, x]\), both functions are continuous and differentiable, and \(g' \ne 0\) on \((a, x)\), so the Generalized Mean Value Theorem (Theorem 5.4) supplies a point \(c\) between \(a\) and \(x\) with</p>
      <p>\[ \frac{f(x)}{g(x)} = \frac{f(x) - f(a)}{g(x) - g(a)} = \frac{f'(c)}{g'(c)}, \]</p>
      <p>the first equality because \(f(a) = g(a) = 0\). As \(x \to a^{+}\), the trapped point \(c\) is squeezed to \(a\) as well, so \(f'(c)/g'(c) \to L\), and therefore \(f(x)/g(x) \to L\). The left-hand limit \(x \to a^{-}\) is identical, using intervals \([x, a]\); together they give the two-sided limit \(L\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:formula — the remaining cases are fenced to the Proof-Track appendix (§D.3) per the depth policy -->
  <p>The \(\tfrac{\ast}{\infty}\) case and the cases where \(a = \pm\infty\) hold under the same hypotheses, but their proofs are more delicate — the tidy substitution \(f(a) = g(a) = 0\) is unavailable when the functions blow up, and the estimate must be managed by hand. Following this handout’s proof-track policy of keeping the heaviest arguments out of the main line, we state these cases as part of Theorem 5.5 and defer their proof to the Proof-Track appendix (§D.3).</p>

  <!-- expansion:caution — L'Hopital's three traps: wrong form, quotient rule, and the converse -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Three cautions travel with the rule. First, <em>check the form</em>: L’Hôpital applies only to \(\tfrac{0}{0}\) and \(\tfrac{\ast}{\infty}\). Applied to a limit that is not indeterminate — where the numerator and denominator have honest finite limits — it is unjustified and may give a wrong answer. Second, differentiate the numerator and denominator <em>separately</em>: \(f'\!/g'\) is not the derivative of the quotient \(f/g\), and the quotient rule has no place here. Third, the rule is one-directional: if \(\lim f'\!/g'\) fails to exist, that says nothing about \(\lim f/g\), which may still exist — so a failed application is inconclusive, not a proof of divergence.</p>
    </div>
  </section>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.5</span><span class="env-name">Indeterminate forms</span></p>
    <div class="env-body">
      <p>To evaluate an indeterminate limit:</p>
      <ol class="steps">
        <li><strong>\(\tfrac{0}{0}\) or \(\tfrac{\ast}{\infty}\):</strong> apply L’Hôpital’s rule directly. If the resulting limit is again indeterminate, apply it again — differentiating repeatedly until an answer emerges.</li>
        <li><strong>\(0 \cdot \infty\):</strong> rewrite the product \(f\cdot g\) as a quotient, \(\dfrac{f}{1/g}\) or \(\dfrac{g}{1/f}\), turning it into \(\tfrac{0}{0}\) or \(\tfrac{\infty}{\infty}\).</li>
        <li><strong>\(\infty - \infty\):</strong> combine over a common denominator (or otherwise rearrange) to reach a single quotient.</li>
        <li><strong>\(1^{\infty}\), \(0^{0}\), \(\infty^{0}\):</strong> take logarithms. If \(y = f^{g}\) with \(f > 0\) near the point, then \(\ln y = g\ln f\), a \(0 \cdot \infty\) form; find \(\lim \ln y\), then exponentiate — \(\lim y = e^{\lim \ln y}\).</li>
      </ol>
    </div>
  </section>

  <!-- expansion:example — Example 5.20: 0/0 requiring L'Hopital twice -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.20</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle \lim_{x \to 0} \frac{e^{x} - 1 - x}{x^{2}}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>As \(x \to 0\), numerator and denominator both tend to \(0\): the form is \(\tfrac{0}{0}\). Apply L’Hôpital’s rule, differentiating top and bottom:</p>
        <p>\[ \lim_{x \to 0} \frac{e^{x} - 1 - x}{x^{2}} = \lim_{x \to 0} \frac{e^{x} - 1}{2x}. \]</p>
        <p>This is again \(\tfrac{0}{0}\), so apply the rule a second time:</p>
        <p>\[ \lim_{x \to 0} \frac{e^{x} - 1}{2x} = \lim_{x \to 0} \frac{e^{x}}{2} = \frac{1}{2}. \]</p>
        <p>So the limit is \(\tfrac{1}{2}\). Each pass peeled off one order of vanishing; the answer records that \(e^{x} - 1 - x\) behaves like \(\tfrac{1}{2}x^{2}\) near \(0\), the same fact a second-order approximation would give. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.21: infinity/infinity, establishing the log-vs-power growth comparison -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.21</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle \lim_{x \to \infty} \frac{\ln x}{x}\), and more generally \(\displaystyle \lim_{x \to \infty} \frac{\ln x}{x^{p}}\) for any \(p > 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Both \(\ln x\) and \(x\) tend to \(\infty\), the form \(\tfrac{\infty}{\infty}\). By L’Hôpital’s rule,</p>
        <p>\[ \lim_{x \to \infty} \frac{\ln x}{x} = \lim_{x \to \infty} \frac{1/x}{1} = \lim_{x \to \infty} \frac{1}{x} = 0. \]</p>
        <p>The same computation with \(x^{p}\) below gives \(\dfrac{1/x}{p\,x^{p-1}} = \dfrac{1}{p\,x^{p}} \to 0\). So</p>
        <p>\[ \lim_{x \to \infty} \frac{\ln x}{x^{p}} = 0 \qquad \text{for every } p > 0. \]</p>
        <p>This is a growth comparison worth naming: the logarithm grows more slowly than <em>every</em> positive power of \(x\), however small the power. A parallel argument (apply the rule \(\lceil p \rceil\) times) shows \(x^{p}/e^{x} \to 0\), so any power is in turn outpaced by the exponential. In shorthand,</p>
        <p>\[ \ln x \ \ll\ x^{p} \ \ll\ e^{x} \qquad (x \to \infty), \]</p>
        <p>an ordering that becomes useful whenever a curve to be sketched mixes logarithms, powers, and exponentials. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example [pass: enrichment] [source: CLP-1 §3.7 problem "2010H" (limit of log x over x as x→0+), official solution incl. the misuse remark, CC BY-NC-SA 4.0; adjudicated ADOPT in the M4 gap-check (Codex, 2026-07-07)] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.22</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle \lim_{x \to 0^{+}} \frac{\ln x}{x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Check the form first. As \(x \to 0^{+}\) the numerator \(\ln x \to -\infty\) while the denominator \(x \to 0^{+}\): a hugely negative number divided by a tiny positive one. This is not an indeterminate form at all — nothing competes — so the quotient simply runs away:</p>
        <p>\[ \lim_{x \to 0^{+}} \frac{\ln x}{x} = -\infty. \]</p>
        <p>Now watch what happens if the form-check is skipped. Differentiating top and bottom as though L’Hôpital’s rule applied would give \(\dfrac{1/x}{1} = \dfrac{1}{x} \to +\infty\) — not merely the wrong magnitude but the wrong <em>sign</em>. The hypotheses of Theorem 5.5 are not decoration. Note the contrast with Example 5.21: the same quotient \(\ln x / x\) taken at \(x \to \infty\) genuinely is \(\infty/\infty\), and there the rule legitimately gave \(0\). Whether the rule applies is a property of the <em>point</em>, not of the formula. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.23: 0*inf recast, then 0^0 via logarithms; connects to Ch3 x^x -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.23</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle \lim_{x \to 0^{+}} x \ln x\), and use it to find \(\displaystyle \lim_{x \to 0^{+}} x^{x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>As \(x \to 0^{+}\), \(x \to 0\) while \(\ln x \to -\infty\): the product is the indeterminate form \(0 \cdot \infty\). Recast it as a quotient to expose a form the rule accepts — put the \(\ln x\) on top and \(1/x\) below:</p>
        <p>\[ \lim_{x \to 0^{+}} x \ln x = \lim_{x \to 0^{+}} \frac{\ln x}{1/x}, \]</p>
        <p>now \(\tfrac{-\infty}{\infty}\). L’Hôpital’s rule gives</p>
        <p>\[ \lim_{x \to 0^{+}} \frac{\ln x}{1/x} = \lim_{x \to 0^{+}} \frac{1/x}{-1/x^{2}} = \lim_{x \to 0^{+}} (-x) = 0. \]</p>
        <p>So \(x \ln x \to 0\). For \(x^{x}\), the form is \(0^{0}\); take logarithms. Since \(\ln(x^{x}) = x \ln x \to 0\), and the exponential is continuous,</p>
        <p>\[ \lim_{x \to 0^{+}} x^{x} = \lim_{x \to 0^{+}} e^{x \ln x} = e^{0} = 1. \]</p>
        <p>The curve \(x^{x}\), whose derivative Chapter 3 found by logarithmic differentiation (Example 3.10), thus approaches \(1\) as \(x \to 0^{+}\) — a value the bare form \(0^{0}\) could never have predicted. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close: L'Hopital completes the limit toolkit; §5.8 assembles everything into curve sketching -->
  <p>L’Hôpital’s rule closes the last gap in the analytic toolkit. Every feature a graph can show — where it rises and falls, peaks and dips, bends and inflects, and how it behaves far out and near its asymptotes — is now computable, the last of these through the indeterminate limits this section resolved. Section 5.8 gathers the whole apparatus into a single disciplined procedure: reading a curve’s complete shape off its formula.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.8</span>Curve Sketching</h2>
  </header>

  <!-- expansion:intuition — section opener: assemble every tool into one procedure to draw a curve from its formula -->
  <p>Everything this chapter built now converges on a single task: drawing the graph of a function from its formula alone, without plotting a cloud of points. Each tool contributes one layer. The domain says where the curve lives; limits at the edges and at infinity give its asymptotes; the first derivative marks where it rises and falls and locates its peaks and valleys; the second derivative says which way it bends and where it changes. Laid over one another, these layers determine the shape completely. What remains is to run them in a fixed order, so that nothing is missed.</p>

  <h3 class="subsec-head">Asymptotes</h3>

  <p>An <em>asymptote</em> is a straight line the curve approaches arbitrarily closely as \(x\) or \(y\) runs off to infinity. Three kinds arise: vertical asymptotes are detected by the infinite limits of Chapter 1, horizontal and slant asymptotes by limits as \(x \to \pm\infty\).</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.7</span><span class="env-name">Asymptotes</span></p>
    <div class="env-body">
      <p>The line \(x = a\) is a <em>vertical asymptote</em> of \(f\) if \(f(x) \to +\infty\) or \(-\infty\) as \(x \to a\) from one side or both.</p>
      <p>The line \(y = L\) is a <em>horizontal asymptote</em> if \(f(x) \to L\) as \(x \to +\infty\) or \(x \to -\infty\).</p>
      <p>The line \(y = mx + b\) (with \(m \ne 0\)) is a <em>slant asymptote</em> if \(f(x) - (mx + b) \to 0\) as \(x \to +\infty\) or \(x \to -\infty\): the curve draws ever closer to the line without leveling off.</p>
    </div>
  </section>

  <p>Vertical-asymptote candidates come from zeros of a denominator or a logarithm’s argument approaching \(0\), confirmed by a one-sided infinite limit — a factor that cancels leaves a hole, not an asymptote; horizontal ones are read from the limit at infinity; a slant asymptote appears when a function grows linearly but is not itself a line — for a rational function, when the numerator’s degree is exactly one more than the denominator’s, so that dividing out leaves a linear part plus a remainder that decays.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.6</span><span class="env-name">Sketching a curve</span></p>
    <div class="env-body">
      <p>To sketch \(y = f(x)\), gather the following in order and then draw what they dictate:</p>
      <ol class="steps">
        <li><strong>Domain.</strong> Where is \(f\) defined?</li>
        <li><strong>Intercepts.</strong> The \(y\)-intercept \(f(0)\), and the \(x\)-intercepts where \(f(x) = 0\), when they are easy to find.</li>
        <li><strong>Symmetry.</strong> Is \(f\) even (\(f(-x) = f(x)\), symmetric across the \(y\)-axis), odd (\(f(-x) = -f(x)\), symmetric through the origin), or periodic? Any symmetry halves the work.</li>
        <li><strong>Asymptotes.</strong> Vertical (where \(f \to \pm\infty\)), horizontal (\(\lim_{x \to \pm\infty} f\)), and slant.</li>
        <li><strong>Increase, decrease, and local extrema.</strong> From the sign of \(f'\) (§5.4).</li>
        <li><strong>Concavity and inflection.</strong> From the sign of \(f''\) (§5.6).</li>
        <li><strong>Assemble.</strong> Plot the intercepts, extrema, and inflection points, draw the asymptotes as guide lines, and connect the pieces so the rise-fall and concavity data are honoured.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:example — Example 5.24: a rational function with vertical and horizontal asymptotes -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.24</span></p>
      <div class="env-body">
        <p>Sketch the curve \(y = \dfrac{x^{2}}{x^{2} - 1}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Run the checklist.</p>
        <p><strong>Domain.</strong> The denominator vanishes at \(x = \pm 1\), so the domain is all \(x\) with \(x \ne \pm 1\). <strong>Intercepts.</strong> Both are at the origin: \(f(0) = 0\), and \(x^{2} = 0\) only at \(x = 0\). <strong>Symmetry.</strong> Replacing \(x\) by \(-x\) leaves the function unchanged, so it is even — symmetric across the \(y\)-axis.</p>
        <p><strong>Asymptotes.</strong> Near \(x = 1\) and \(x = -1\) the denominator \(\to 0\) while the numerator \(\to 1\), so \(f \to \pm\infty\): vertical asymptotes \(x = \pm 1\). At infinity,</p>
        <p>\[ \lim_{x \to \pm\infty} \frac{x^{2}}{x^{2} - 1} = 1, \]</p>
        <p>so \(y = 1\) is a horizontal asymptote. <strong>First derivative.</strong> By the quotient rule,</p>
        <p>\[ \begin{aligned}
          f’(x) &= \frac{2x(x^{2} - 1) - x^{2}(2x)}{(x^{2} - 1)^{2}} = \frac{-2x}{(x^{2} - 1)^{2}}.
        \end{aligned} \]</p>
        <p>The denominator is positive wherever it is defined, so \(f'\) has the sign of \(-2x\): positive for \(x < 0\), negative for \(x > 0\). Thus \(f\) increases on \((-\infty, -1)\) and \((-1, 0)\), decreases on \((0, 1)\) and \((1, \infty)\), with a local maximum at \((0, 0)\). <strong>Second derivative.</strong> Differentiating again and simplifying,</p>
        <p>\[ f''(x) = \frac{2(3x^{2} + 1)}{(x^{2} - 1)^{3}}. \]</p>
        <p>The numerator is always positive, so \(f''\) has the sign of \((x^{2} - 1)^{3}\), that is, of \(x^{2} - 1\): concave up on \((-\infty, -1)\) and \((1, \infty)\), concave down on \((-1, 1)\). There is no inflection point, since \(x = \pm 1\) are outside the domain.</p>
        <p><strong>Assemble.</strong> Between the asymptotes lies an arch peaking at the origin and falling toward \(-\infty\) at both \(x = \pm 1\); outside them, two branches descend from \(+\infty\) at the asymptotes toward the horizontal line \(y = 1\), staying above it. The even symmetry mirrors the left half onto the right. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — full sketch of x^2/(x^2-1) (Ex 5.24); registered in chapter5 FIGS as "rational-asymptotes"] -->
  <figure class="figure" data-fig="rational-asymptotes">
    <figcaption><span class="fig-no">Figure 5.9</span> The completed graph of \(y = x^{2}/(x^{2} - 1)\) from Example 5.24: vertical asymptotes \(x = \pm 1\), horizontal asymptote \(y = 1\), a central arch with its local maximum at the origin, and two outer branches — all read off the checklist.</figcaption>
  </figure>

  <!-- expansion:example — Example 5.25: a slant asymptote -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.25</span></p>
      <div class="env-body">
        <p>Sketch the curve \(y = x + \dfrac{1}{x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p><strong>Domain.</strong> All \(x \ne 0\). <strong>Intercepts.</strong> None: \(f(0)\) is undefined, and \(x + 1/x = 0\) would need \(x^{2} = -1\). <strong>Symmetry.</strong> \(f(-x) = -x - 1/x = -f(x)\), so \(f\) is odd — symmetric through the origin.</p>
        <p><strong>Asymptotes.</strong> As \(x \to 0\), the term \(1/x \to \pm\infty\), so \(x = 0\) is a vertical asymptote. There is no horizontal asymptote, but the function is already split into a linear part and a decaying remainder: \(f(x) - x = 1/x \to 0\) as \(x \to \pm\infty\), so \(y = x\) is a slant asymptote. <strong>First derivative.</strong></p>
        <p>\[ f'(x) = 1 - \frac{1}{x^{2}}, \]</p>
        <p>which is zero at \(x = \pm 1\), positive for \(|x| > 1\), and negative for \(0 < |x| < 1\). So \(f\) has a local maximum at \((-1, -2)\) and a local minimum at \((1, 2)\) — the maximum value lying <em>below</em> the minimum value, which is possible here because the two sit on branches separated by the asymptote. <strong>Second derivative.</strong></p>
        <p>\[ f''(x) = \frac{2}{x^{3}}, \]</p>
        <p>positive for \(x > 0\) and negative for \(x < 0\): concave up on the right, concave down on the left, with no inflection (the sign change is across the excluded point \(x = 0\)).</p>
        <p><strong>Assemble.</strong> For \(x > 0\) the curve falls from \(+\infty\) along the vertical asymptote to the minimum \((1, 2)\), then rises toward the slant line \(y = x\); the odd symmetry produces the mirror-image branch for \(x < 0\), rising to the maximum \((-1, -2)\) and dropping toward \(y = x\) from below. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — slant asymptote of x + 1/x (Ex 5.25); registered in chapter5 FIGS as "slant-asymptote"] -->
  <figure class="figure" data-fig="slant-asymptote">
    <figcaption><span class="fig-no">Figure 5.10</span> The graph of \(y = x + 1/x\) from Example 5.25 hugs the slant asymptote \(y = x\) at both ends, with the \(y\)-axis as its vertical asymptote; the local maximum value \(-2\) sits below the local minimum value \(2\).</figcaption>
  </figure>

  <!-- expansion:caution [pass: enrichment] — asymptotes describe end behaviour, not forbidden territory (sin x / x crosses its horizontal asymptote infinitely often); adjudicated ADOPT in the M4 gap-check (Codex, 2026-07-07) -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>An asymptote describes where a curve is <em>heading</em>, not territory it may never touch. Both graphs in this section happen to stay on one side of their horizontal and slant asymptotes, which can plant a false rule: nothing prevents a curve from crossing such an asymptote — even infinitely often. The graph of \(y = (\sin x)/x\) has the horizontal asymptote \(y = 0\), yet it crosses that line at every nonzero multiple of \(\pi\). Vertical asymptotes are different in kind: they mark places where the nearby values blow up, not lines the graph runs alongside — usually the function is not even defined there, and an isolated value assigned at that point changes nothing about the blow-up. Approach is a statement about the far end of the graph; en route, anything is allowed.</p>
    </div>
  </section>

  <!-- expansion:summary — close: shape fully readable from the formula; §5.9 turns to the inverse problem — finding a root numerically -->
  <p>With the checklist, a formula unfolds into a shape: no plotting, just the systematic reading of domain, limits, and two derivatives. Every question this chapter posed about a function’s behaviour — its rates, its extremes, its bends, its ends — now has a computable answer, and they combine into a single picture. The final section turns the machinery around. Instead of describing a known function, it asks how to <em>find</em> something a function conceals — a solution of \(f(x) = 0\) that no formula surrenders — by putting the tangent line to work as an engine of approximation.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.9</span>Newton’s Method</h2>
  </header>

  <!-- expansion:intuition — section opener: solving f(x)=0 when no formula gives the root; the tangent line as an engine -->
  <p>The chapter closes by turning the derivative to a new purpose: not describing a function, but <em>solving</em> one. Many equations \(f(x) = 0\) have roots that resist an explicit formula — the cubic \(x^{3} - x - 1 = 0\) yields nothing to simple factoring, and a transcendental equation like \(\cos x = x\) has no elementary closed form at all — yet the roots are real and can be pinned down to any precision. <em>Newton’s method</em> does the pinning, and its engine is the linear approximation of §5.3: near a point, a curve is almost its tangent line, and a line’s root is trivial to find. Follow the tangent to where it crosses the axis, and — from a good starting guess — you land nearer the curve’s own root; repeat, and you close in fast.</p>

  <p>Make it precise. Start with a guess \(x_{0}\) near the root. The tangent line to \(y = f(x)\) at \(\bigl(x_{0}, f(x_{0})\bigr)\) is</p>
  <p>\[ y - f(x_{0}) = f'(x_{0})(x - x_{0}). \]</p>
  <p>Set \(y = 0\) and solve for \(x\) to find where this tangent meets the axis; call it \(x_{1}\):</p>
  <p>\[ x_{1} = x_{0} - \frac{f(x_{0})}{f'(x_{0})}. \]</p>
  <p>Now \(x_{1}\) is a better guess. Repeating from \(x_{1}\) gives \(x_{2}\), and in general each guess produces the next by the same rule.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — one Newton step: slide down the tangent (opener / Strategy 5.7); registered in chapter5 FIGS as "newton-step"] -->
  <figure class="figure" data-fig="newton-step">
    <figcaption><span class="fig-no">Figure 5.11</span> One step of Newton’s method: from the guess \(x_{0}\), slide down the tangent line to where it crosses the axis; that crossing \(x_{1}\) is already much closer to the root \(r\).</figcaption>
  </figure>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.7</span><span class="env-name">Newton’s method</span></p>
    <div class="env-body">
      <p>To approximate a root of \(f(x) = 0\):</p>
      <ol class="steps">
        <li>Choose a starting value \(x_{0}\) reasonably near the root — a rough sketch or a sign change of \(f\) will locate one.</li>
        <li>Generate successive approximations by the iteration</li>
      </ol>
      <p>\[ x_{n+1} = x_{n} - \frac{f(x_{n})}{f'(x_{n})}, \qquad n = 0, 1, 2, \dots \]</p>
      <p>Continue until consecutive values agree to the precision required; the common value is the root to that precision. The method needs \(f'(x_{n}) \ne 0\) at each step — a horizontal tangent has no finite intercept and stalls the process.</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.26: sqrt(2) via Newton — the ancient Babylonian iteration as a special case -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.26</span></p>
      <div class="env-body">
        <p>Use Newton’s method to approximate \(\sqrt{2}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The number \(\sqrt{2}\) is the positive root of \(f(x) = x^{2} - 2\). With \(f'(x) = 2x\), the iteration is</p>
        <p>\[ x_{n+1} = x_{n} - \frac{x_{n}^{2} - 2}{2x_{n}} = \frac{1}{2}\left(x_{n} + \frac{2}{x_{n}}\right), \]</p>
        <p>a formula that averages each guess with the number it divides into \(2\). Starting from \(x_{0} = 1.5\):</p>
        <p>\[ x_{1} = \tfrac{1}{2}\!\left(1.5 + \tfrac{2}{1.5}\right) = 1.41667, \quad x_{2} = 1.414216, \quad x_{3} = 1.4142136. \]</p>
        <p>Against the true value \(\sqrt{2} = 1.41421356\ldots\), the third step is already correct to seven decimals. The number of correct digits roughly <em>doubles</em> at each step — the hallmark of Newton’s method near a simple root. This particular iteration is ancient: it is the Babylonian rule for square roots, which turns out to be Newton’s method applied to \(x^{2} - 2\). <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.27: a root no formula gives -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.27</span></p>
      <div class="env-body">
        <p>Approximate the real root of \(x^{3} - x - 1 = 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(f(x) = x^{3} - x - 1\). Since \(f(1) = -1 < 0\) and \(f(2) = 5 > 0\), the Intermediate Value Theorem (Theorem 4.9(b)) guarantees a root between \(1\) and \(2\); a glance shows it is near \(1.3\). With \(f'(x) = 3x^{2} - 1\), the iteration is</p>
        <p>\[ x_{n+1} = x_{n} - \frac{x_{n}^{3} - x_{n} - 1}{3x_{n}^{2} - 1}. \]</p>
        <p>Starting from \(x_{0} = 1.5\):</p>
        <p>\[ x_{1} = 1.34783, \quad x_{2} = 1.32520, \quad x_{3} = 1.324718, \quad x_{4} = 1.324718. \]</p>
        <p>The values have settled by the fourth step, so the root is \(1.324718\) to six decimals — a value beyond the reach of simple factoring, yet found in four steps of arithmetic. The Intermediate Value Theorem certified that the root exists; Newton’s method located it. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — Newton can fail: needs f'!=0, sensitive to the start, can diverge or cycle -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Newton’s method is fast but not foolproof. It requires \(f'(x_{n}) \ne 0\) at every step; a guess landing where the tangent is horizontal has nowhere to go. More subtly, the method is only <em>locally</em> reliable: started too far from a root, or near a point where the curve turns the wrong way, the iterates can overshoot, wander off to infinity, or fall into a repeating cycle that never converges. The concavity of §5.6 is a reliable guide: on an arc where \(f''\) keeps one sign and \(f' \ne 0\), a guess started on the side where \(f\) and \(f''\) agree in sign closes in steadily, while a poorly placed start can be thrown clear. In practice a rough sketch to seed the first guess is worth more than any number of blind iterations.</p>
    </div>
  </section>

  <h3 class="subsec-head">Chapter summary</h3>

  <!-- expansion:summary — chapter-level 4-strand summary (final section of Chapter 5), per CONTENT_SPEC §4 -->
  <p>Chapter 5 set out to turn the derivative from an object of study into an instrument, and it did so along four strands.</p>
  <ul>
    <li><strong>Local tools.</strong> Implicit differentiation freed the derivative from explicit formulas, differentiating equations and inverse relations directly (§5.1); related rates ran the same move with time as the variable, converting one known rate into another (§5.2); and linear approximation read the derivative as the function’s best straight-line stand-in, with differentials propagating small errors (§5.3).</li>
    <li><strong>Extremes and optimization.</strong> Chapter 4’s Extreme Value Theorem guaranteed absolute extrema on closed intervals, and Fermat’s theorem narrowed interior extrema to critical numbers; the Closed Interval Method checked critical numbers and endpoints, and the First and Second Derivative Tests (§5.4, §5.6) classified the local extrema at critical numbers; and optimization applied the whole machinery to quantities worth making largest or smallest (§5.5).</li>
    <li><strong>Shape and indeterminate limits.</strong> Concavity and inflection completed the reading of a graph (§5.6); L’Hôpital’s rule, powered by a generalized Mean Value Theorem, resolved the indeterminate limits that govern behaviour at infinity (§5.7); and curve sketching gathered every feature into one disciplined procedure (§5.8).</li>
    <li><strong>Numerical root-finding.</strong> Newton’s method turned the tangent line into an engine for solving \(f(x) = 0\), reaching roots no formula can express (§5.9).</li>
  </ul>
  <p>Underneath all four runs a single idea: the derivative, a statement about one instant, controls the behaviour of a function across whole intervals — its rise and fall, its extremes, its bends, its roots. The next chapter reverses the direction of travel. Having spent three chapters taking functions apart with the derivative, it asks the opposite question — how to build a function up by accumulation — and finds, in the Fundamental Theorem of Calculus, that the two operations are inverse to one another.</p>

</article>

      parts.push('<path d="M' + axBase.toFixed(1) + ',' + ay0.toFixed(1) + ' V' + (ay1 + 1).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      if (cfg.xlabel) pushLabel({ px: ax1 + 1, py: ayBase + 4, tex: cfg.xlabel, anchor: "start", vAnchor: "top", cls: "a-ax", size: 13 });
      if (cfg.ylabel) pushLabel({ px: axBase - 5, py: ay1 + 1, tex: cfg.ylabel, anchor: "end", vAnchor: "top", cls: "a-ax", size: 13 });
      (cfg.xticks || []).forEach(function(t) {
        var px = SX(t.x);
        parts.push('<line x1="' + px.toFixed(1) + '" y1="' + (ayBase - 3).toFixed(1) + '" x2="' + px.toFixed(1) + '" y2="' + (ayBase + 3).toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.x));
        if (tex != null) pushLabel({ px: px, py: ayBase + 6, tex: tex, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: px, py: ayBase + 6, text: t.label, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
      });
      (cfg.yticks || []).forEach(function(t) {
        var py = SY(t.y);
        parts.push('<line x1="' + (axBase - 3).toFixed(1) + '" y1="' + py.toFixed(1) + '" x2="' + (axBase + 3).toFixed(1) + '" y2="' + py.toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.y));
        if (tex != null) pushLabel({ px: axBase - 6, py: py, tex: tex, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: axBase - 6, py: py, text: t.label, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
      });
    }
    (cfg.items || []).forEach(function(it) {
      if (it.type === "curve") {
        var cls = it.cls || "curve", n = it.samples || 240, a = it.domain[0], b = it.domain[1];
        var d = "", pen = false;
        for (var i = 0; i <= n; i++) {
          var x = a + (b - a) * (i / n), y = it.fn(x);
          if (!isFinite(y) || y < ymin - (ymax - ymin) * 0.04 || y > ymax + (ymax - ymin) * 0.04) { pen = false; continue; }

          d += (pen ? "L" : "M") + px + "," + py + " "; pen = true;
        }
        if (d) parts.push('<path d="' + d.trim() + '" class="' + cls + '"/>');
      } else if (it.type === "vline") {
        parts.push('<line x1="' + SX(it.x).toFixed(1) + '" y1="' + SY(ymin).toFixed(1) + '" x2="' + SX(it.x).toFixed(1) + '" y2="' + SY(ymax).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "hline") {
        var ha = it.from != null ? it.from : xmin, hb = it.to != null ? it.to : xmax;
        parts.push('<line x1="' + SX(ha).toFixed(1) + '" y1="' + SY(it.y).toFixed(1) + '" x2="' + SX(hb).toFixed(1) + '" y2="' + SY(it.y).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "seg") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="' + (it.cls || "curve") + '"/>');
      } else if (it.type === "dot") {
        var r = it.r || 3.0;
        if (it.hollow) parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>');
        else parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" class="dot"/>');
      } else if (it.type === "arrow") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      } else if (it.type === "text") {
        pushLabel({ px: SX(it.x), py: SY(it.y), tex: it.tex, text: it.tex == null ? it.text : null, anchor: it.anchor || "middle", vAnchor: it.vAnchor || "middle", dx: it.dx || 0, dy: it.dy || 0, cls: it.cls || "a-pt", size: it.size });
      }
    });
    if (labels.length) {
      var M = 52;
      var spans = labels.map(function(L) {
        var left = (L.px + (L.dx || 0) + M).toFixed(1);
        var top = (L.py + (L.dy || 0) + M).toFixed(1);
        var tf = anchorTransform(L.anchor, L.vAnchor);
        var fs = L.size ? "font-size:" + L.size + "px;" : "";
        var body = L.tex != null ? "\\(" + L.tex + "\\)" : esc(L.text == null ? "" : L.text);
        return '<span class="fig-lbl ' + (L.cls || "") + '" style="left:' + left + 'px;top:' + top + 'px;transform:' + tf + ';' + fs + '">' + body + '</span>';
      }).join("");
      parts.push('<foreignObject x="' + (-M) + '" y="' + (-M) + '" width="' + (w + 2 * M) + '" height="' + (h + 2 * M) + '" class="fig-fo" requiredExtensions="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml" class="fig-lyr">' + spans + '</div></foreignObject>');
    }
    parts.push('</svg>');
    return parts.join("");
  }
  window.buildPlot = buildPlot;
  window.PIVAL = PI;
})();

        { type: "seg", x1: 1.25, y1: 0.4, x2: 2.75, y2: 0.4, cls: "tangent" },
        { type: "seg", x1: 2.25, y1: 0.225, x2: 3.65, y2: 1.205, cls: "tangent" },
      ], "A concave-up arc with tangent lines at three points; the arc stays above every tangent and the tangent slopes increase from left to right.");
      const svgDn = mk(dn, [
        { type: "seg", x1: 0.35, y1: 0.995, x2: 1.75, y2: 1.975, cls: "tangent" },
        { type: "seg", x1: 1.25, y1: 1.8, x2: 2.75, y2: 1.8, cls: "tangent" },
        { type: "seg", x1: 2.25, y1: 1.975, x2: 3.65, y2: 0.995, cls: "tangent" },
      ], "A concave-down arc with tangent lines at three points; the arc stays below every tangent and the tangent slopes decrease from left to right.");
      return { layout: "pair", panels: [
        { svg: svgUp, note: "Concave up: above its tangents, slopes increasing." },
        { svg: svgDn, note: "Concave down: below its tangents, slopes decreasing." },
      ] };
    },

    /* §5.8 — The finished sketch of y = x^2/(x^2-1) (Example 5.24).
       Flagship synthesis figure: central arch peaking at the origin, vertical
       asymptotes x = ±1, horizontal asymptote y = 1, two outer branches
       descending toward it from above. buildPlot's window clipping breaks the
       curve at the poles automatically. */
    "rational-asymptotes": () => {
      const svg = buildPlot({
        w: 320, h: 250, xmin: -3.6, xmax: 3.6, ymin: -3.2, ymax: 4.2,
        xlabel: "x", ylabel: "y",
        aria: "The graph of y equals x squared over x squared minus one: a central arch between the vertical asymptotes x equals minus one and x equals one, peaking at the origin, and two outer branches falling from plus infinity toward the horizontal asymptote y equals one.",
        items: [
          { type: "curve", fn: (x) => (x * x) / (x * x - 1), domain: [-3.5, 3.5], samples: 560 },
          { type: "vline", x: 1, cls: "refline" },
          { type: "vline", x: -1, cls: "refline" },
          { type: "hline", y: 1, cls: "refline" },
          { type: "dot", x: 0, y: 0 },
          { type: "text", x: 3.45, y: 0.66, tex: "y=1", anchor: "end", cls: "a-ax", size: 12 },
          { type: "text", x: -1.12, y: -2.75, tex: "x=-1", anchor: "end", cls: "a-ax", size: 12 },
          { type: "text", x: 1.12, y: -2.75, tex: "x=1", anchor: "start", cls: "a-ax", size: 12 },
        ],
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §5.8 — y = x + 1/x and its slant asymptote y = x (Example 5.25).
       Both ends hug the dashed line y = x; the y-axis is the vertical
       asymptote (the axis itself — no extra line drawn). The two marked
       extrema make the surprising order visible: the local maximum value -2
       sits below the local minimum value 2. */
    "slant-asymptote": () => {
      const svg = buildPlot({
        w: 300, h: 265, xmin: -4.3, xmax: 4.3, ymin: -5.3, ymax: 5.3,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: 1, tex: "1" }, { x: -1, tex: "-1" }],
        yticks: [{ y: 2, tex: "2" }, { y: -2, tex: "-2" }],
        aria: "The two branches of y equals x plus one over x, hugging the dashed slant asymptote y equals x at both ends, with the vertical axis as vertical asymptote. The local minimum at one comma two and the local maximum at minus one comma minus two are marked.",
        items: [
          { type: "seg", x1: -4.15, y1: -4.15, x2: 4.15, y2: 4.15, cls: "idline" },
          { type: "curve", fn: (x) => x + 1 / x, domain: [-4.15, 4.15], samples: 560 },
          { type: "dot", x: 1, y: 2 },
          { type: "dot", x: -1, y: -2 },
          { type: "text", x: 3.3, y: 2.72, tex: "y=x", anchor: "start", cls: "a-ax", size: 12 },
        ],
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §5.9 — One Newton step (opener / Strategy 5.7).
       Generic convex increasing curve (drawn with f(x) = x^2 - 2, but no
       formula shown): from the guess x0, ride the tangent down to the axis;
       the crossing x1 lands much nearer the root r. Axis ticks name x0, x1, r;
       the iteration formula lives in the prose above. f'(x0) is visibly
       nonzero (steep tangent). */
    "newton-step": () => {
      const svg = buildPlot({
        w: 320, h: 235, xmin: -0.15, xmax: 2.95, ymin: -2.5, ymax: 4.9,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: 1.4142, tex: "r" }, { x: 1.6006 }, { x: 2.35, tex: "x_{0}" }],
        aria: "An increasing curve crossing the axis at the root r. From the guess x zero, a dashed vertical rises to the curve; the tangent line there slides down and crosses the axis at x one, which lies much closer to r than x zero did.",
        items: [
          { type: "curve", fn: (x) => x * x - 2, domain: [0, 2.6], samples: 240 },
          { type: "seg", x1: 1.5, y1: -0.47, x2: 2.6, y2: 4.7, cls: "tangent" },
          { type: "seg", x1: 2.35, y1: 0, x2: 2.35, y2: 3.5225, cls: "idline" },
          { type: "dot", x: 2.35, y: 3.5225 },
          { type: "dot", x: 1.6006, y: 0, r: 2.6 },
          { type: "text", x: 1.62, y: -0.62, tex: "x_{1}", anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 },
          { type: "dot", x: 1.4142, y: 0, r: 2.6 },
          { type: "text", x: 0.32, y: -2.1, tex: "y=f(x)", anchor: "start", cls: "a-pt", size: 12 },
        ],
      });
      return { layout: "single", panels: [{ svg }] };
    },
  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 5 — Applications of Differentiation",
  runningHead: "Chapter 5 · Applications of Differentiation",
  fragments: ["sec-5-1", "sec-5-2", "sec-5-3", "sec-5-4", "sec-5-5", "sec-5-6", "sec-5-7", "sec-5-8", "sec-5-9"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      var _probe = document.createElement("div");
      _probe.style.height = "0"; _probe.style.margin = "0"; _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em"; block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;
        body.removeChild(block);
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var remainingAtInsert = 0;
    if (mode !== "none") {
      var splitProbe = document.createElement("div");
      splitProbe.style.height = "0"; splitProbe.style.margin = "0"; splitProbe.style.padding = "0";
      body.appendChild(splitProbe);
      remainingAtInsert = body.clientHeight - (splitProbe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(splitProbe);
    }
    var want = (mode !== "none" && (blockH > body.clientHeight || remainingAtInsert >= FREE_THRESHOLD));
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
