<style>
/* ============================================================
   skin-hs.css — inlined + modified: Times New Roman + MathJax
   ============================================================ */
.paper {
  --c-primary: oklch(0.50 0.13 245);
  --c-caution: oklch(0.50 0.155 25);
  --c-aux: oklch(0.55 0.01 260);
  --c-axis: #474b54;
  --ink: #1b1c1f;
  --ink-soft: #565a63;
  --ink-faint: #8a8e98;
  --paper: #ffffff;
  --rule: #e5e7eb;
  --fig-w-pair: 250px;     /* 並排(pair)圖每張的預設寬度（整體一次調） */
  --fig-w-single: 100%;    /* 單張/triple/grid 圖的預設最大寬度（整體一次調） */
  /* 個別覆寫：在任一 <figure> 標籤加 style="--fig-w: 320px" 即可只改那一張 */
  --serif: "New Computer Modern", "Latin Modern Roman", "Times New Roman", Times, Georgia, serif;
  --ui: "Inter", -apple-system, system-ui, sans-serif;
  --a-concept:  oklch(0.50 0.13 55);
  --a-result:   oklch(0.50 0.13 245);
  --a-practice: oklch(0.50 0.13 152);
  --a-aside:    oklch(0.50 0.02 260);
  --a-caution:  oklch(0.50 0.155 25);
  --a-strategy: oklch(0.50 0.13 290);
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: var(--fs-base, 17.5px);
  line-height: var(--lh-base, 1.62);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  box-sizing: border-box;
}
.paper *, .paper *::before, .paper *::after { box-sizing: border-box; }
.paper .page { padding: 52px 58px 64px; max-width: 760px; margin: 0 auto; }
.skin-hs .page { hyphens: auto; -webkit-hyphens: auto; }
.skin-hs p, .skin-hs li { text-align: justify; text-justify: inter-word; }
.paper p { margin: 0 0 .85em; text-wrap: pretty; }
.paper em { font-style: italic; }
.paper .informal { font-style: italic; color: var(--ink-soft); }
.paper ol { margin: .2em 0 .9em; padding-left: 1.5em; }
.paper li { margin: .35em 0; text-wrap: pretty; }
.paper .warmup { counter-reset: wu; list-style: none; padding-left: 0; }
.paper .warmup > li { counter-increment: wu; position: relative; padding-left: 2.1em; }
.paper .warmup > li::before {
  content: "(" counter(wu, lower-alpha) ")";
  position: absolute; left: 0; top: 0;
  font-family: var(--ui); font-size: .82em; color: var(--ink-faint); line-height: 1.85;
}
.paper mjx-container[display="true"] { margin: .55em 0 !important; overflow-x: auto; overflow-y: hidden; }
.paper mjx-container[display="true"]::-webkit-scrollbar { display: none; }
.paper .qed { display: block; text-align: right; margin: -1.62em 0 0; height: 1.62em; pointer-events: none; }
.paper .qed::after {
  content: ""; display: inline-block; width: .56em; height: .56em;
  border: 1.3px solid var(--ink-soft);
}
.paper .env-body > :has(+ .qed) { margin-bottom: 0; display: flow-root; }
.paper .env-body::after { content: ""; display: block; clear: both; }
.paper .sec-head {
  margin-top: 2.7em; padding-top: 1.35em;
  border-top: 1px solid var(--rule); margin-bottom: 1.5em;
}
.sheet-body > .sec-head:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
.paper .sec-kicker {
  font-family: var(--ui); font-size: .7rem; letter-spacing: .14em;
  text-transform: uppercase; color: var(--c-primary); font-weight: 700; margin-bottom: .55em;
}
.paper .sec-title { font-weight: 600; font-size: 2rem; line-height: 1.12; letter-spacing: -.012em; margin: 0; }
.paper .sec-no { color: var(--c-primary); margin-right: .5em; font-weight: 600; }
.paper .subsec-head {
  font-family: var(--ui); font-weight: 600; font-size: 1.08rem; margin: 1.9em 0 .65em;
  display: flex; align-items: center; gap: .55em; color: var(--ink);
}
.paper .subsec-head::before { content: ""; width: 18px; height: 3px; background: var(--c-primary); border-radius: 2px; }
.paper .figure { margin: 1.7em 0; text-align: center; }
.paper .figure-art { display: flex; justify-content: center; }
.paper .figure-art--pair { gap: 26px; }
.paper .fig-svg { width: 100%; max-width: var(--fig-w, var(--fig-w-pair)); height: auto; }
.paper .figure-art:not(.figure-art--pair) .fig-svg { max-width: var(--fig-w, var(--fig-w-single)); }
.paper figcaption {
  font-family: var(--ui); font-size: .8em; line-height: 1.5;
  color: var(--ink-soft); margin-top: .7em; text-wrap: pretty;
  max-width: none; text-align: left; display: table; margin-inline: auto;
}
.paper .fig-no { font-weight: 600; color: var(--ink); margin-right: .4em; }
.paper figcaption mjx-container { font-size: .95em; }
.paper .axis { stroke: var(--c-axis); stroke-width: 1.25; fill: none; stroke-linecap: round; }
.paper .curve { stroke: var(--c-primary); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.paper .refline { stroke: var(--c-caution); stroke-width: 1.3; stroke-dasharray: 4.5 3.5; fill: none; stroke-linecap: round; opacity: .85; }
.paper .secant { stroke: var(--c-aux); stroke-width: 1.6; stroke-dasharray: 5 3.5; fill: none; stroke-linecap: round; }
.paper .tangent { stroke: var(--c-caution); stroke-width: 2; fill: none; stroke-linecap: round; }
.paper .curve-log { stroke: var(--c-caution); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.paper .idline { stroke: var(--c-aux); stroke-width: 1.3; stroke-dasharray: 4.5 3.5; fill: none; stroke-linecap: round; opacity: .85; }
.paper .dot { fill: var(--ink); }
.paper .bubble { stroke: var(--c-aux); stroke-width: 1.4; fill: none; }
.paper .arrow-fwd { stroke: var(--c-primary); stroke-width: 2; fill: none; }
.paper .arrow-bwd { stroke: var(--c-caution); stroke-width: 2; fill: none; }
.paper .fig-svg text { font-family: var(--ui); font-size: 13px; }
.paper .axlab { fill: var(--c-aux); font-style: italic; }
.paper .lab-curve { fill: var(--c-primary); font-style: italic; }
.paper .lab-ref, .paper .lab-ref-b { fill: var(--c-caution); }
.paper .ptlab { fill: var(--ink-soft); font-size: 12px; }
.paper .setlab { fill: var(--ink); font-weight: 600; font-size: 14.5px; text-anchor: middle; }

/* env blocks */
.skin-hs .env {
  --accent: var(--a-aside);
  margin: 1.2em 0; padding-left: 16px;
  border-left: 2.5px solid color-mix(in srgb, var(--accent) 38%, var(--paper));
}
.skin-hs .env-definition  { --accent: var(--a-concept); }
.skin-hs .env-theorem, .skin-hs .env-proposition, .skin-hs .env-corollary { --accent: var(--a-result); }
.skin-hs .env-example, .skin-hs .env-solution, .skin-hs .env-exercise { --accent: var(--a-practice); }
.skin-hs .env-remark { --accent: var(--a-aside); }
.skin-hs .env-head {
  display: flex; align-items: baseline; gap: .5em; flex-wrap: wrap;
  margin: 0 0 .55em; font-family: var(--ui);
}
.skin-hs .env-kicker {
  font-size: .62rem; letter-spacing: .07em; text-transform: uppercase; font-weight: 700;
  color: var(--paper); background: var(--accent); padding: 3px 10px; border-radius: 999px; line-height: 1.5;
}
.skin-hs .env-num { font-weight: 700; color: var(--accent); font-size: .94em; }
.skin-hs .env-name { font-style: italic; font-weight: 400; color: var(--ink-soft); font-family: var(--serif); font-size: 1em; }
.skin-hs .env-body > p:first-child { margin-top: 0; }
.skin-hs .env-body > :last-child { margin-bottom: 0; }
.skin-hs .env-theorem .env-body, .skin-hs .env-proposition .env-body { font-style: italic; }
.skin-hs .env-theorem .env-body mjx-container, .skin-hs .env-proposition .env-body mjx-container { font-style: normal; }
.skin-hs .env-definition em { font-style: italic; }
.skin-hs .env-remark { color: var(--ink-soft); font-size: .97em; }
.skin-hs .env-remark .env-kicker { background: transparent; color: var(--a-aside); border: 1px solid color-mix(in srgb, var(--a-aside) 45%, var(--paper)); }
.skin-hs .env-proof { --accent: var(--a-result); }
.skin-hs .env-proof .env-kicker {
  background: transparent; color: var(--a-result); font-style: italic; letter-spacing: .04em;
  border: 1px solid color-mix(in srgb, var(--a-result) 45%, var(--paper));
}
.skin-hs .qed-proof::after { border-color: var(--ink); }
.skin-hs .workedexample {
  margin: 1.6em 0; padding-left: 16px;
  border-left: 2.5px solid color-mix(in srgb, var(--a-practice) 38%, var(--paper));
  display: flow-root;
}
.skin-hs .workedexample .env { margin: .7em 0; padding-left: 0; border-left: 0; }
.skin-hs .env-solution .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid color-mix(in srgb, var(--a-practice) 45%, var(--paper)); }
.skin-hs > .env-cont { margin-top: 0; padding-top: .82em; }
.skin-hs > .env:has(+ .env-cont) { margin-bottom: 0; display: flow-root; }
.skin-hs > .env-example:has(+ .env-solution) { margin-bottom: 0; }
.skin-hs > .env-example + .env-solution { margin-top: 0; padding-top: .72em; }
.skin-hs > .env-cont, .skin-hs > .env-example, .skin-hs > .env-solution { display: flow-root; }
.skin-hs .env-exercise .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid var(--a-practice); }
.skin-hs .env-caution, .skin-hs .env-strategy {
  padding: 15px 20px; border-radius: 8px; margin: 1.4em 0;
  border-left-width: 4px; border-left-style: solid;
}
.skin-hs .env-caution {
  --accent: var(--a-caution);
  background: color-mix(in srgb, var(--a-caution) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-caution) 22%, var(--paper));
  border-left-color: var(--a-caution);
}
.skin-hs .env-strategy {
  --accent: var(--a-strategy);
  background: color-mix(in srgb, var(--a-strategy) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-strategy) 22%, var(--paper));
  border-left-color: var(--a-strategy);
}
.skin-hs .env-caution .env-name, .skin-hs .env-strategy .env-name { color: var(--ink-soft); }
.skin-hs .env-strategy .steps { margin-bottom: 0; }
.skin-hs.vivid .env { border-left-color: color-mix(in srgb, var(--accent) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .workedexample { border-left-color: color-mix(in srgb, var(--a-practice) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .env-kicker { font-size: .64rem; padding: 3.5px 11px; }

/* ============================================================
   figs.css — inlined + modified for MathJax
   ============================================================ */
.paper .fig-svg { height: auto; max-width: 100%; overflow: visible; }
.paper .figure-art { display: flex; justify-content: center; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
.paper .figure-art--pair { gap: 24px; }
.paper .figure-art--pair .fig-panel { flex: 1 1 220px; max-width: 300px; }
.paper .figure-art--triple { gap: 18px; }
.paper .figure-art--triple .fig-panel { flex: 1 1 190px; max-width: 240px; }
.paper .figure-art--grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; justify-items: center; }
.paper .figure-art--grid .fig-panel { max-width: 240px; }
.paper .fig-panel { display: flex; flex-direction: column; align-items: center; }
.paper .fig-note {
  font-family: var(--ui); font-size: .8em; line-height: 1.45;
  color: var(--ink-soft); margin-top: .55em; text-align: center; text-wrap: pretty;
}
.paper .fig-note mjx-container { font-size: .98em; }
.paper .fig-fo { overflow: visible; }
.paper .fig-lyr { position: relative; width: 100%; height: 100%; font-family: var(--serif); }
.paper .fig-lbl {
  position: absolute; white-space: nowrap; line-height: 1; font-size: 15px;
  text-shadow: 0 0 2px var(--paper), 0 0 2px var(--paper), 0 0 1px var(--paper);
}
.paper .fig-lbl mjx-container { font-size: 1em; }
.paper .fig-lbl.a-curve { color: var(--c-primary); }
.paper .fig-lbl.a-ref   { color: var(--c-caution); }
.paper .fig-lbl.a-ax    { color: var(--ink-soft); }
.paper .fig-lbl.a-pt    { color: var(--ink); }
.paper .tbl-wrap { overflow-x: auto; overflow-y: hidden; margin: 1em 0; }
.paper table.tbl {
  border-collapse: collapse; margin: 0 auto; font-family: var(--ui); font-size: .96em;

.paper table.tbl th, .paper table.tbl td { padding: .3em .8em; text-align: center; white-space: nowrap; }
.paper table.tbl thead th { border-bottom: 1.1px solid var(--ink-soft); font-weight: 500; }
.paper table.tbl .rowlab { text-align: right; padding-right: 1em; color: var(--ink-soft); }
.paper table.tbl mjx-container { font-size: .98em; }
.paper .sec + .sec { margin-top: 2.6em; padding-top: 2.2em; border-top: 1px solid var(--rule); }
.paper .para-head { font-weight: 600; margin: 1.1em 0 .4em; }
.paper ul { margin: .3em 0 .95em; padding-left: 1.3em; }
.paper ul li { margin: .35em 0; text-align: justify; }
.paper ul li::marker { color: var(--a-result); }
.paper .chapter-head { margin-bottom: 1.6em; }
.paper .chapter-head .ch-kicker {
  font-family: var(--ui); font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--a-result); font-weight: 700; margin-bottom: .6em;
}
.paper .chapter-head .ch-title { font-weight: 600; font-size: 2.5rem; line-height: 1.08; letter-spacing: -.02em; margin: 0; }
.paper .lead { font-size: 1.05em; }

/* ============================================================
   print.css — inlined (A4 sheet layout + paginator)
   ============================================================ */
@page { size: A4; margin: 0; }
.sheet {
  position: relative; box-sizing: border-box;
  width: 210mm; height: 297mm;
  padding: 20mm 28mm 20mm 32mm;
  background: #fff; overflow: hidden;
}
.sheet-header {
  position: absolute; top: 11mm; left: 32mm; right: 28mm;
  font: 500 8.5pt "Inter", sans-serif; color: #9aa0ac; letter-spacing: .02em;
}
.sheet-footer {
  position: absolute; bottom: 8.5mm; left: 0; right: 0;
  text-align: center; font: 500 9pt "Inter", sans-serif; color: #82868f;
}
.sheet-body { height: 100%; --accent: oklch(0.50 0.13 245); }
.sheet-body.paper { box-shadow: none; border-radius: 0; max-width: none; background: #fff; }
.sheet-body .page { padding: 0; max-width: none; margin: 0; }
.sheet-body.paper { font-size: 12pt; line-height: 1.55; }
.sheet, .sheet * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.sheet-body > :first-child { margin-top: 0 !important; }
.sheet-body .sec + .sec { border-top: 0; margin-top: 0; padding-top: 0; }
.sheet-body .qed { margin-top: -1.55em; height: 1.55em; }
.sheet-body .env-body::after { display: none; content: none; }
.sheet-body .env-cont { margin-top: 0; }
.sheet-body .env-cont > .env-body > :first-child { margin-top: 0; }
@media screen {
  body { background: #6f727b; margin: 0; }
  .sheet { box-shadow: 0 3px 18px rgba(0,0,0,.3); margin: 9mm auto; }
}
@media print {
  body { background: #fff; margin: 0; }
  .sheet { box-shadow: none; margin: 0; break-after: page; }
  .sheet:last-child { break-after: auto; }
  .print-toolbar, #boot { display: none !important; }
}

/* ============================================================
   page-level
   ============================================================ */
.print-toolbar {
  position: fixed; top: 14px; right: 16px; z-index: 1000;
  display: flex; align-items: center; gap: 10px; font-family: "Inter", system-ui, sans-serif;
}
.print-toolbar button {
  font: 600 13px "Inter", sans-serif; color: #fff; background: oklch(0.50 0.13 245);
  border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.25);
}
.print-toolbar button:disabled { opacity: .5; cursor: default; }
.print-toolbar button:not(:disabled):hover { background: oklch(0.45 0.13 245); }
.print-toolbar .status {
  font-size: 12px; color: #e8eaf0; background: rgba(0,0,0,.4);
  padding: 6px 11px; border-radius: 999px; backdrop-filter: blur(6px);
}
#boot {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: "Inter", system-ui, sans-serif; color: #cdd2dc; background: #6f727b; z-index: 900;
}
#source { position: absolute; left: -10000px; top: 0; width: 683px; }
</style>

<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Chapter 5</div>
    <h1 class="ch-title">Applications of Differentiation</h1>
  </header>

  <p class="lead">Chapters 2 through 4 built the derivative and the rules for computing it — the limit definition, the power, product, quotient, and chain rules, the derivatives of the exponential, logarithm, and trigonometric functions, and the Mean Value Theorem that ties the sign of a derivative to the behaviour of the function. That machinery is now an instrument. This chapter turns it on the questions calculus was invented to answer: how fast one quantity changes when another does, how good a straight-line estimate of a curved function is, where a function is largest or smallest, which way it bends, how to read a graph off its formula, and how to hunt down a root you cannot solve for. The derivative stops being an object to compute and becomes a tool to think with.</p>

  <p class="para-head">By the end of this chapter, you will be able to:</p>
  <ul>
    <li>use implicit differentiation to find \(dy/dx\) for a curve defined by an equation;</li>
    <li>solve related-rates problems by differentiating a relation with respect to time;</li>
    <li>use linear approximation and differentials to estimate values and bound errors;</li>
    <li>locate absolute and local extrema, and solve optimization problems;</li>
    <li>determine concavity and inflection points, and apply the first- and second-derivative tests;</li>
    <li>evaluate limits of indeterminate form with L’Hôpital’s rule;</li>
    <li>sketch a curve from its analytic features;</li>
    <li>approximate a root with Newton’s method.</li>
  </ul>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.1</span>Implicit Differentiation</h2>
  </header>

  <!-- expansion:intuition — section opener: motivate implicit diff from curves that are not graphs; the crux is d/dx[y^n]=n y^{n-1} y' via the chain rule -->
  <p>Every function we have differentiated so far arrived as a formula \(y = f(x)\), with \(y\) served up explicitly in terms of \(x\). But a great many curves are given instead by an <em>equation</em> relating \(x\) and \(y\) — the circle \(x^{2} + y^{2} = 25\), say, or the looping curve \(x^{3} + y^{3} = 6xy\) — where no single formula \(y = f(x)\) describes the whole picture. The circle fails the vertical-line test twice over; solving for \(y\) splits it into two half-circles \(y = \pm\sqrt{25 - x^{2}}\), and the second curve resists solving for \(y\) altogether. Yet each still has a tangent line at (almost) every point, and so a slope \(dy/dx\) worth computing.</p>

  <p><em>Implicit differentiation</em> computes that slope directly from the equation, without first solving for \(y\). The device is the chain rule. We regard \(y\) as an (unspecified) differentiable function of \(x\) on the stretch of curve we care about, and differentiate both sides of the equation with respect to \(x\). Every term built from \(y\) then carries a factor \(dy/dx\): since \(y\) depends on \(x\),</p>
  <p>\[ \frac{d}{dx}\bigl[y^{n}\bigr] = n\,y^{n-1}\,\frac{dy}{dx}, \qquad \frac{d}{dx}\bigl[\sin y\bigr] = \cos y\,\frac{dy}{dx}, \]</p>
  <p>and so on, exactly as the chain rule (Theorem 3.3) demands. The differentiated equation is then a <em>linear</em> equation in the unknown \(dy/dx\), which we solve by ordinary algebra.</p>

  <!-- expansion:caution — the single most common implicit-diff error: forgetting the dy/dx factor on a y-term -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The one indispensable habit is to attach \(dy/dx\) to every \(y\)-term. Differentiating \(x^{2}\) with respect to \(x\) gives \(2x\); differentiating \(y^{2}\) with respect to \(x\) gives \(2y\,\dfrac{dy}{dx}\), <em>not</em> \(2y\). The extra factor is the chain rule registering that \(y\) is itself a function of \(x\). Dropping it is the standard mistake, and it silently corrupts every line below.</p>
    </div>
  </section>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.1</span><span class="env-name">Implicit differentiation</span></p>
    <div class="env-body">
      <p>To find \(dy/dx\) for a curve given by an equation in \(x\) and \(y\):</p>
      <ol class="steps">
        <li>Differentiate both sides of the equation with respect to \(x\), treating \(y\) as a function of \(x\). Each \(y\)-term acquires a factor \(dy/dx\) through the chain rule; product and quotient terms such as \(xy\) still obey the product and quotient rules.</li>
        <li>Gather every term containing \(dy/dx\) on one side and everything else on the other.</li>
        <li>Factor out \(dy/dx\) and divide, solving for it. The result is generally an expression in <em>both</em> \(x\) and \(y\) — to get a numerical slope, substitute the coordinates of a point on the curve.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:example — Example 5.1: the circle, the archetypal implicit curve; slope in terms of x and y -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.1</span></p>
      <div class="env-body">
        <p>The circle \(x^{2} + y^{2} = 25\) passes through \((3, 4)\). Find \(dy/dx\), and the equation of the tangent line there.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Differentiate both sides with respect to \(x\). The term \(x^{2}\) gives \(2x\); the term \(y^{2}\) gives \(2y\,\dfrac{dy}{dx}\) by the chain rule; the constant \(25\) gives \(0\):</p>
        <p>\[ 2x + 2y\,\frac{dy}{dx} = 0. \]</p>
        <p>Solving for the derivative,</p>
        <p>\[ \frac{dy}{dx} = -\frac{x}{y}. \]</p>
        <p>The slope depends on both coordinates, as implicit differentiation usually delivers. At \((3, 4)\) it is \(dy/dx = -\tfrac{3}{4}\), so the tangent line is</p>
        <p>\[ y - 4 = -\tfrac{3}{4}(x - 3). \]</p>
        <p>The answer squares with plain geometry: the radius to \((3, 4)\) has slope \(\tfrac{4}{3}\), and a tangent to a circle is perpendicular to the radius, with slope \(-\tfrac{3}{4}\) — the negative reciprocal, exactly as found. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — circle + tangent perpendicular to radius (Ex 5.1); registered in chapter5 FIGS as "tangent-radius-circle"] -->
  <figure class="figure" data-fig="tangent-radius-circle">
    <figcaption><span class="fig-no">Figure 5.1</span> The circle \(x^{2} + y^{2} = 25\) with its tangent line at \((3, 4)\): the tangent is perpendicular to the radius, so its slope is the negative reciprocal of the radius’s slope \(\tfrac{4}{3}\).</figcaption>
  </figure>

  <!-- expansion:example — Example 5.2: a curve that cannot be solved for y (folium-type); product rule inside implicit diff -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.2</span></p>
      <div class="env-body">
        <p>Find the slope of the curve \(x^{3} + y^{3} = 6xy\) at the point \((3, 3)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Here \(y\) cannot be isolated, but the method does not need it. Differentiate both sides with respect to \(x\). On the left, \(x^{3}\) gives \(3x^{2}\) and \(y^{3}\) gives \(3y^{2}\,\dfrac{dy}{dx}\). On the right, \(6xy\) is a product, so the product rule applies — and the \(y\)-factor again carries its \(dy/dx\):</p>
        <p>\[ 3x^{2} + 3y^{2}\,\frac{dy}{dx} = 6\!\left(y + x\,\frac{dy}{dx}\right). \]</p>
        <p>Collect the \(dy/dx\) terms on the left and the rest on the right:</p>
        <p>\[ 3y^{2}\,\frac{dy}{dx} - 6x\,\frac{dy}{dx} = 6y - 3x^{2}, \qquad (3y^{2} - 6x)\,\frac{dy}{dx} = 6y - 3x^{2}. \]</p>
        <p>Dividing through (and cancelling the common factor \(3\)),</p>
        <p>\[ \frac{dy}{dx} = \frac{2y - x^{2}}{y^{2} - 2x}. \]</p>
        <p>At \((3, 3)\), which does lie on the curve since \(3^{3} + 3^{3} = 54 = 6\cdot 3\cdot 3\), this is</p>
        <p>\[ \frac{dy}{dx} = \frac{2(3) - 3^{2}}{3^{2} - 2(3)} = \frac{6 - 9}{9 - 6} = \frac{-3}{3} = -1. \]</p>
        <p>The tangent at \((3, 3)\) has slope \(-1\), a fact we could not have reached by solving for \(y\). <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.3: the inverse-function derivative via the framework; names what Ch3 §3.3 (Ex 3.14) did by the composition-identity route (closes Ch3 open-q) -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.3</span></p>
      <div class="env-body">
        <p>Recover the derivative of \(\arcsin x\) by implicit differentiation.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Write \(y = \arcsin x\), so that \(y\) is the angle in \([-\tfrac{\pi}{2}, \tfrac{\pi}{2}]\) with</p>
        <p>\[ \sin y = x. \]</p>
        <p>This is exactly the kind of relation implicit differentiation is built for. Differentiate both sides with respect to \(x\); the left side gives \(\cos y\,\dfrac{dy}{dx}\) by the chain rule:</p>
        <p>\[ \cos y\,\frac{dy}{dx} = 1, \qquad \frac{dy}{dx} = \frac{1}{\cos y}. \]</p>
        <p>To express this in \(x\), use \(\cos^{2} y = 1 - \sin^{2} y = 1 - x^{2}\). On the principal interval \([-\tfrac{\pi}{2}, \tfrac{\pi}{2}]\) cosine is non-negative, so \(\cos y = \sqrt{1 - x^{2}}\), and</p>
        <p>\[ \frac{d}{dx}\arcsin x = \frac{1}{\sqrt{1 - x^{2}}}, \qquad -1 < x < 1. \]</p>
        <p>Chapter 3 obtained this same derivative (Example 3.14) by differentiating the identity \(\arcsin(\sin x) = x\) — the <em>composition-identity route</em>. Implicit differentiation is the general framework behind that manoeuvre: an inverse function, defined by a relation its defining function satisfies, yields its derivative the same way — differentiate the relation and solve — on any branch where it is differentiable and the division that solving requires is legitimate. The restriction to the open interval \((-1, 1)\) persists: at \(x = \pm 1\) the curve \(\sin y = x\) has a vertical tangent, and \(\cos y = 0\) makes \(1/\cos y\) undefined. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:intuition — the framework is honest only where y really is a differentiable function of x; flag the branch/vertical-tangent restriction (seam guard: no F_x/F_y / implicit function theorem — that is Ch14) -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Implicit differentiation assumes what it uses: that near the point in question, the curve <em>is</em> the graph of some differentiable function \(y\) of \(x\). Where that fails, the formula for \(dy/dx\) does too. On the circle \(x^{2} + y^{2} = 25\) the point \((5, 0)\) has \(y = 0\), and \(dy/dx = -x/y\) is undefined — the tangent there is vertical, and no function \(y = f(x)\) describes the curve through that point. The rule of thumb: a formula for \(dy/dx\) that goes infinite or turns into \(0/0\) is a warning that the branch assumption needs separate analysis — it may signal a vertical tangent, a self-crossing, or another singular point, a place where “\(y\) as a function of \(x\)” has broken down. (The precise conditions under which an equation \(F(x, y) = 0\) does define \(y\) as a differentiable function of \(x\) belong to the multivariable calculus of Chapter 14; here we work on the branches where it plainly does.)</p>
    </div>
  </section>

  <h3 class="subsec-head">Higher derivatives</h3>

  <p>The method feeds on its own output: once \(dy/dx\) is known implicitly, differentiating again gives \(d^{2}y/dx^{2}\).</p>

  <!-- expansion:example — Example 5.4: second derivative implicitly; substitute the first derivative and the original equation to simplify -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.4</span></p>
      <div class="env-body">
        <p>For the circle \(x^{2} + y^{2} = 25\), find \(d^{2}y/dx^{2}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>From Example 5.1, \(dy/dx = -x/y\). Differentiate this quotient with respect to \(x\), remembering that \(y\) is a function of \(x\), so the quotient rule applies and \(y' = dy/dx\) reappears:</p>
        <p>\[ \frac{d^{2}y}{dx^{2}} = -\frac{d}{dx}\!\left(\frac{x}{y}\right) = -\frac{(1)\,y - x\,\dfrac{dy}{dx}}{y^{2}} = -\frac{\,y - x\!\left(-\dfrac{x}{y}\right)}{y^{2}}. \]</p>
        <p>Substituting \(dy/dx = -x/y\) has already cleared the derivative from the right-hand side. Simplify the numerator over the common denominator \(y\):</p>
        <p>\[ \frac{d^{2}y}{dx^{2}} = -\frac{\dfrac{y^{2} + x^{2}}{y}}{y^{2}} = -\frac{x^{2} + y^{2}}{y^{3}}. \]</p>
        <p>Finally, every point on the curve satisfies \(x^{2} + y^{2} = 25\), so the original equation simplifies the answer to</p>
        <p>\[ \frac{d^{2}y}{dx^{2}} = -\frac{25}{y^{3}}. \]</p>
        <p>Using the defining equation to tidy the result is a hallmark of implicit differentiation: the constraint that pins the curve down is available at every stage. On the upper half-circle \(y > 0\) the second derivative is negative, recording that the arc bends downward — the shape §5.6 will call concave down — as the picture of a circle’s top demands. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close: implicit diff as a technique that unlocks §5.2 (related rates differentiate a relation w.r.t. t) without previewing its content -->
  <p>Implicit differentiation is less a new rule than a new liberty: the chain rule, applied to an equation instead of a formula. That liberty is what the next section needs. There, the variable tying the equation together is not \(x\) but time, and differentiating a relation with respect to \(t\) turns known rates of change into unknown ones.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.2</span>Related Rates</h2>
  </header>

  <!-- expansion:intuition — section opener: when quantities are tied by an equation and all move with time, their rates are tied too; differentiate the relation w.r.t. t -->
  <p>The previous section differentiated an equation with respect to \(x\). Nothing forces the differentiating variable to be \(x\). When several quantities are bound together by an equation and all of them drift with time, differentiating that equation <em>with respect to time</em> binds their rates of change together in the same way. This is the setting of a <em>related-rates</em> problem: one rate is known, another is wanted, and an equation of geometry or physics links the quantities themselves. The link between the quantities becomes, on differentiation, a link between their speeds.</p>

  <p>The mechanism is implicit differentiation with \(t\) in the driving seat. Each quantity is a function of time, so differentiating a term in it produces its rate through the chain rule: if \(V\) and \(r\) are related by \(V = \tfrac{4}{3}\pi r^{3}\), then</p>
  <p>\[ \frac{dV}{dt} = 4\pi r^{2}\,\frac{dr}{dt}, \]</p>
  <p>the factor \(dr/dt\) appearing for exactly the reason \(dy/dx\) appeared in §5.1 — \(r\) depends on \(t\). Read the equation as it stands and it relates a volume to a radius; differentiate it and it relates the rate the volume grows to the rate the radius grows. Here \(dx/dt\), \(dr/dt\), and their kin are <em>rates with respect to time</em>, the derivative measuring how fast a quantity changes as the clock runs.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.2</span><span class="env-name">Solving a related-rates problem</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Name the changing quantities and give them variables. Record which rates are <em>given</em> and which one is <em>wanted</em>, each as a derivative with respect to \(t\).</li>
        <li>Find an equation relating the quantities — from geometry, similar triangles, or a physical law. It must hold at <em>every</em> instant, not only the one asked about.</li>
        <li>Differentiate both sides with respect to \(t\). Each variable is a function of time, so the chain rule brings in its rate; the equation becomes a relation among the rates.</li>
        <li>Now — and only now — substitute the numerical values that hold at the instant in question, and solve for the unknown rate.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:caution — THE related-rates pitfall: substitute the instant's values AFTER differentiating, never before -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Substitute the instant’s numbers only after differentiating, never before. A quantity that is changing must be carried as a variable through the differentiation; if you fix it to its momentary value first, you have frozen something that is actually moving, and its rate — the very thing the chain rule was about to produce — silently drops to zero. Plug in the numbers on the last line, not the first.</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.5: the sliding ladder — the archetypal related-rates problem, a right-triangle relation -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.5</span></p>
      <div class="env-body">
        <p>A \(10\)-foot ladder leans against a wall. Its base is pulled away from the wall at \(1\) foot per second. How fast is the top sliding down when the base is \(6\) feet from the wall?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(x\) be the distance from the wall to the base and \(y\) the height of the top, both functions of time. The ladder’s length is fixed, so the Pythagorean relation holds at every instant:</p>
        <p>\[ x^{2} + y^{2} = 100. \]</p>
        <p>We are given \(dx/dt = 1\) and want \(dy/dt\) at the moment \(x = 6\). Differentiate the relation with respect to \(t\) — <em>before</em> putting in any numbers:</p>
        <p>\[ 2x\,\frac{dx}{dt} + 2y\,\frac{dy}{dt} = 0, \qquad \frac{dy}{dt} = -\frac{x}{y}\,\frac{dx}{dt}. \]</p>
        <p>At the instant \(x = 6\), the relation gives \(y = \sqrt{100 - 36} = 8\). Substituting \(x = 6\), \(y = 8\), and \(dx/dt = 1\),</p>
        <p>\[ \frac{dy}{dt} = -\frac{6}{8}\,(1) = -\frac{3}{4}. \]</p>
        <p>The top slides down at \(\tfrac{3}{4}\) foot per second. The minus sign is the geometry speaking: as \(x\) grows, \(y\) shrinks, so \(dy/dt\) is negative. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — sliding-ladder right triangle (Ex 5.5); registered in chapter5 FIGS as "ladder-triangle"] -->
  <figure class="figure" data-fig="ladder-triangle">
    <figcaption><span class="fig-no">Figure 5.2</span> The sliding ladder of Example 5.5: wall, ground, and ladder form a right triangle with legs \(x\) and \(y\) and fixed hypotenuse \(10\); the base slides outward at \(1\ \text{ft/s}\) while the top slides down.</figcaption>
  </figure>

  <!-- expansion:example — Example 5.6: inflating sphere — a volume-radius relation; solving for the rate of the "inner" variable -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.6</span></p>
      <div class="env-body">
        <p>Air is pumped into a spherical balloon at \(100\) cubic centimetres per second. How fast is the radius growing when the radius is \(25\) centimetres?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(V\) and \(r\) be the volume and radius at time \(t\). They are related by the volume of a sphere,</p>
        <p>\[ V = \tfrac{4}{3}\pi r^{3}. \]</p>
        <p>We are given \(dV/dt = 100\) and want \(dr/dt\) when \(r = 25\). Differentiating with respect to \(t\),</p>
        <p>\[ \frac{dV}{dt} = 4\pi r^{2}\,\frac{dr}{dt}, \qquad \frac{dr}{dt} = \frac{1}{4\pi r^{2}}\,\frac{dV}{dt}. \]</p>
        <p>At \(r = 25\),</p>
        <p>\[ \frac{dr}{dt} = \frac{100}{4\pi (25)^{2}} = \frac{100}{2500\pi} = \frac{1}{25\pi} \ \text{cm/s} \approx 0.0127 \ \text{cm/s}. \]</p>
        <p>The radius creeps outward even as the volume pours in quickly, because a large sphere hides a great deal of volume in a thin outer shell: the same \(100\ \text{cm}^{3}/\text{s}\) would swell a small balloon far faster. The factor \(r^{2}\) in the denominator is that shell effect made precise. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.7: the walking shadow — a similar-triangles relation; two rates from one setup -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.7</span></p>
      <div class="env-body">
        <p>A street lamp is \(15\) feet tall. A person \(6\) feet tall walks away from the lamp at \(5\) feet per second. How fast is the person’s shadow lengthening, and how fast is the tip of the shadow moving?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(x\) be the person’s distance from the lamp and \(s\) the length of the shadow they cast beyond themselves. The lamp, the person, and the shadow’s tip form two similar right triangles: the large one from the lamp’s top down to the tip, base \(x + s\) and height \(15\); the small one from the person’s head to the tip, base \(s\) and height \(6\). Similar triangles equate the ratios of height to base:</p>
        <p>\[ \frac{15}{x + s} = \frac{6}{s}. \]</p>
        <p>Cross-multiplying, \(15s = 6(x + s)\), so \(15s = 6x + 6s\) and \(9s = 6x\); that is, \(s = \tfrac{2}{3}x\). This relation holds at all times, so differentiate with respect to \(t\):</p>
        <p>\[ \frac{ds}{dt} = \frac{2}{3}\,\frac{dx}{dt} = \frac{2}{3}\,(5) = \frac{10}{3} \ \text{ft/s}. \]</p>
        <p>The shadow lengthens at \(\tfrac{10}{3}\) feet per second — and, notably, this rate does not depend on where the person is, since \(s\) is a fixed multiple of \(x\). The tip of the shadow sits at distance \(x + s\) from the lamp, so its speed is</p>
        <p>\[ \frac{d}{dt}(x + s) = \frac{dx}{dt} + \frac{ds}{dt} = 5 + \frac{10}{3} = \frac{25}{3} \ \text{ft/s}. \]</p>
        <p>The tip outruns the person: it carries the person’s own \(5\ \text{ft/s}\) plus the shadow’s growth. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — streetlight similar triangles (Ex 5.7); registered in chapter5 FIGS as "streetlight-similar"] -->
  <figure class="figure" data-fig="streetlight-similar">
    <figcaption><span class="fig-no">Figure 5.3</span> The streetlight of Example 5.7: the lamp of height \(15\), the walker of height \(6\), and the shadow tip line up, so the large triangle with base \(x + s\) and the small one with base \(s\) are similar.</figcaption>
  </figure>

  <!-- expansion:summary — close: the pattern is one relation differentiated once; §5.3 turns to the derivative as a local straight-line stand-in -->
  <p>Every problem here followed one pattern: a single equation, differentiated once with respect to time, turning a known rate into an unknown one. What made it work was the chain rule ferrying each rate out of the relation that hid it. The next section stays local in a different sense — it asks how well the derivative, the rate at a single instant, approximates the function itself just next door.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.3</span>Linear Approximation and Differentials</h2>
  </header>

  <!-- expansion:intuition — section opener: the tangent line is the best straight-line stand-in near a point; this is exactly Ch3's remainder form read forward (seam: cross-ref Def 3.1, not new) -->
  <p>A differentiable function, seen up close, looks straight. This is not a metaphor but the content of the derivative: Chapter 3 recorded differentiability at \(x_{0}\) in its remainder form (Definition 3.1),</p>
  <p>\[ f(x_{0} + h) = f(x_{0}) + f'(x_{0})\,h + R(h), \qquad \frac{R(h)}{h} \to 0 \ \text{ as } h \to 0, \]</p>
  <p>which says that the curve equals a straight line — the one through \((x_{0}, f(x_{0}))\) with slope \(f'(x_{0})\) — plus a remainder \(R(h)\) that dies away faster than \(h\) itself. Drop the remainder and a usable approximation is left: near \(x_{0}\), the function is very nearly its tangent line. This section takes that idea at face value and puts it to work estimating values, and then repackages it in the language of <em>differentials</em>.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — tangent-line approximation of sqrt(x) at 4 (Def 5.1 / Ex 5.8); registered in chapter5 FIGS as "sqrt-linearization"] -->
  <figure class="figure" data-fig="sqrt-linearization">
    <figcaption><span class="fig-no">Figure 5.4</span> Linear approximation near \(x = 4\): the tangent line \(L\) is barely distinguishable from \(y = \sqrt{x}\) close to the point of tangency and drifts away far from it — compare the two at \(x = 9\).</figcaption>
  </figure>

  <h3 class="subsec-head">Linearization</h3>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.1</span><span class="env-name">Linearization</span></p>
    <div class="env-body">
      <p>Let \(f\) be differentiable at \(a\). The <em>linearization</em> of \(f\) at \(a\) is the tangent-line function</p>
      <p>\[ L(x) = f(a) + f'(a)(x - a). \]</p>
      <p>The approximation \(f(x) \approx L(x)\), valid for \(x\) near \(a\), is the <em>linear approximation</em> (or <em>tangent-line approximation</em>) of \(f\) at \(a\).</p>
    </div>
  </section>

  <p>Writing \(h = x - a\) turns \(L\) back into the remainder form: \(f(a + h) \approx f(a) + f'(a)h\), the equation above with \(R\) discarded. The approximation is good precisely when \(R(h)\) is negligible — that is, when \(x\) is close to \(a\). How close is close enough depends on how sharply the curve bends away from its tangent, a matter the second derivative will make quantitative in §5.6.</p>

  <!-- expansion:example — Example 5.8: the archetypal use — estimate a root by linearizing at a nearby exact value -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.8</span></p>
      <div class="env-body">
        <p>Use a linear approximation to estimate \(\sqrt{4.05}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Take \(f(x) = \sqrt{x}\) and linearize at \(a = 4\), a nearby point where the value is exact: \(f(4) = 2\). Since \(f'(x) = \dfrac{1}{2\sqrt{x}}\), we have \(f'(4) = \dfrac{1}{4}\), so</p>
        <p>\[ L(x) = 2 + \tfrac{1}{4}(x - 4). \]</p>
        <p>Then</p>
        <p>\[ \sqrt{4.05} \approx L(4.05) = 2 + \tfrac{1}{4}(0.05) = 2 + 0.0125 = 2.0125. \]</p>
        <p>The true value is \(\sqrt{4.05} = 2.012461\ldots\), so the estimate is right to four decimal places. The work was one multiplication, and it succeeded because \(4.05\) sits close to the anchor \(4\), where the square-root curve barely departs from its tangent. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.9: the general rule (1+x)^n ~ 1+nx from one linearization at 0; applied to cbrt(1.03) -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.9</span></p>
      <div class="env-body">
        <p>Show that \((1 + x)^{n} \approx 1 + nx\) for \(x\) near \(0\), and use it to estimate \(\sqrt[3]{1.03}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Linearize \(f(x) = (1 + x)^{n}\) at \(a = 0\), for real \(n\) and \(x\) near \(0\) so that \(1 + x > 0\) and the power is defined. Here \(f(0) = 1\) and \(f'(x) = n(1 + x)^{n-1}\), so \(f'(0) = n\), giving</p>
        <p>\[ L(x) = 1 + nx, \qquad \text{so} \qquad (1 + x)^{n} \approx 1 + nx \ \text{ for } x \text{ near } 0. \]</p>
        <p>This one linearization serves every power at once. For \(\sqrt[3]{1.03}\), write it as \((1 + 0.03)^{1/3}\) and apply the rule with \(n = \tfrac{1}{3}\), \(x = 0.03\):</p>
        <p>\[ \sqrt[3]{1.03} \approx 1 + \tfrac{1}{3}(0.03) = 1.01. \]</p>
        <p>The true value is \(1.00990\ldots\). The rule \((1 + x)^{n} \approx 1 + nx\) is worth remembering; it is the linear approximation that underlies a great many quick estimates. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Differentials</h3>

  <!-- expansion:intuition — the differential is the tangent-line rise; distinguish dy (along tangent) from Δy (along curve) -->
  <p>The linear approximation has a classical notation that makes it portable — the language of <em>differentials</em>, which turns the estimate into a statement about small changes. Suppose \(y = f(x)\). Let the input change by an amount we now call \(dx\), the <em>differential of \(x\)</em>, a genuinely independent small number. The corresponding rise <em>along the tangent line</em> is the <em>differential of \(y\)</em>.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.2</span><span class="env-name">Differential</span></p>
    <div class="env-body">
      <p>For a differentiable function \(y = f(x)\), the <em>differential</em> \(dy\) is defined in terms of an independent differential \(dx\) by</p>
      <p>\[ dy = f'(x)\,dx. \]</p>
    </div>
  </section>

  <p>The point of the notation is a contrast. The <em>actual</em> change in \(y\) when \(x\) moves by \(dx = \Delta x\) is</p>
  <p>\[ \Delta y = f(x + \Delta x) - f(x), \]</p>
  <p>the rise along the <em>curve</em>; the differential \(dy = f'(x)\,dx\) is the rise along the <em>tangent</em>. They are not equal — they differ by exactly the remainder \(R\) of Definition 3.1 attached to the base point \(x\) — but for small \(dx\) the difference is negligible, and \(dy \approx \Delta y\) is the linear approximation wearing new clothes. This form is the natural one for propagating a measurement error: a small uncertainty \(dx\) in a measured quantity produces an uncertainty of about \(dy = f'(x)\,dx\) in anything computed from it.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — dy along tangent vs Delta-y along curve (Def 5.2); registered in chapter5 FIGS as "dy-vs-deltay"] -->
  <figure class="figure" data-fig="dy-vs-deltay">
    <figcaption><span class="fig-no">Figure 5.5</span> Over the same step \(dx\), the differential \(dy\) is the rise of the tangent line, while \(\Delta y\) is the rise of the curve; their gap is the remainder \(R\), which dies away faster than \(dx\).</figcaption>
  </figure>

  <!-- expansion:intuition [pass: enrichment] — Leibniz-notation closure: with Definition 5.2, dy/dx is an honest ratio of differentials (recalls Remark 3.2's "single symbol" caution; forward seam to the substitution method's du); adjudicated ADOPT in the M4 gap-check (Codex, 2026-07-07) -->
  <p>The differential notation also settles an old account. When \(dy/dx\) first appeared, Remark 3.2 was careful to call it a single symbol — suggestive, but not a fraction. Definition 5.2 upgrades it: with \(dx\) an independent quantity and \(dy = f'(x)\,dx\) built from it, the quotient \(dy/dx\) is a genuine ratio of two numbers, and it equals the derivative exactly. Leibniz’s fraction bar is now honest. The upgrade works forward, not backward — the chain-rule manipulations that <em>looked</em> like cancelling \(dx\)’s were licensed by Theorem 3.3, not by this definition — but from here on the bookkeeping power of treating \(dx\) as a real quantity is available, and integral calculus will lean on it heavily when a change of variable rides entirely on the differential.</p>

  <!-- expansion:example — Example 5.10 (differentials): error propagation, the canonical use of differentials -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.10</span></p>
      <div class="env-body">
        <p>The radius of a sphere is measured as \(21\) cm, with a possible error of up to \(0.05\) cm. Use differentials to estimate the greatest resulting error in the computed volume, and the relative error.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The volume is \(V = \tfrac{4}{3}\pi r^{3}\), so \(dV = 4\pi r^{2}\,dr\). With \(r = 21\) and the error \(dr = 0.05\),</p>
        <p>\[ dV = 4\pi (21)^{2}(0.05) = 88.2\pi \approx 277 \ \text{cm}^{3}. \]</p>
        <p>So an error of half a millimetre in the radius swings the computed volume by nearly \(280\ \text{cm}^{3}\). The <em>relative</em> error is more telling, and simpler:</p>
        <p>\[ \frac{dV}{V} = \frac{4\pi r^{2}\,dr}{\tfrac{4}{3}\pi r^{3}} = 3\,\frac{dr}{r} = 3\cdot\frac{0.05}{21} \approx 0.0071, \]</p>
        <p>about \(0.71\%\). The relative error in the volume is three times the relative error in the radius — the exponent \(3\) surfacing as a multiplier, a rule of thumb that holds for any power law. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — the approximation is local and one-sided in quality: error grows with distance and with curvature -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>A linear approximation is only a <em>local</em> promise. Its error is the remainder \(R\); in the smooth cases we meet, that error typically grows as \(x\) moves away from the anchor \(a\), and it is larger where the graph bends sharply. Estimating \(\sqrt{4.05}\) from \(a = 4\) is excellent; estimating \(\sqrt{9}\) from the same \(a = 4\) would be poor, because \(9\) is nowhere near \(4\). Trust the tangent line only in the immediate neighbourhood of the point where it touches, and read §5.6 for what the second derivative says about how quickly that trust runs out.</p>
    </div>
  </section>

  <!-- expansion:summary — close: linear approximation = derivative as local model; §5.4 turns from local behavior to the global question of largest/smallest -->
  <p>Linear approximation is the derivative cashing in its definition: the number \(f'(a)\) is not only a slope but a working forecast of the function’s values nearby. That local reading — the function as its tangent line — recurs throughout calculus, generalized to curved approximations in Chapter 11 and to surfaces in Chapter 14. The next section changes the question entirely, from how a function behaves <em>near</em> a point to where, across a whole interval, it takes its largest and smallest values.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.4</span>Maximum and Minimum Values</h2>
  </header>

  <!-- expansion:intuition — section opener: the optimization question; global vs local extrema; the derivative locates candidates -->
  <p>Of all the questions calculus answers, the most insistent in practice is: where is a quantity largest or smallest? Maximum profit, minimum cost, least material, greatest range — each asks for an extreme value of a function, and the derivative is built to find them. The strategy rests on a simple observation made rigorous in Chapter 4: at a smooth peak or valley in the interior of a curve, the tangent is horizontal, so the derivative vanishes. Extremes therefore hide at a short list of places, and the work is to enumerate the list and test it.</p>

  <p>Two kinds of extreme must be kept apart. Chapter 4 defined the <em>absolute</em> (or global) maximum and minimum of a function on a domain (Definition 4.3): the single largest and smallest values it attains anywhere on that domain. Alongside these sits a local notion — largest or smallest only in comparison with nearby points.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.3</span><span class="env-name">Local maximum and minimum</span></p>
    <div class="env-body">
      <p>A function \(f\) has a <em>local maximum</em> (or <em>relative maximum</em>) at \(c\) if \(f(c) \ge f(x)\) for every \(x\) in the domain of \(f\) lying in some open interval around \(c\); it has a <em>local minimum</em> at \(c\) if \(f(c) \le f(x)\) for every such \(x\).</p>
      <p class="informal">A local maximum is a point that is highest <em>in its own neighbourhood</em> — the top of one hill, not necessarily the highest hill. An absolute maximum is highest everywhere; a local one need only win locally.</p>
    </div>
  </section>

  <h3 class="subsec-head">Where extrema can occur: critical numbers</h3>

  <p>The engine that narrows the search is Fermat’s theorem from Chapter 4 (Theorem 4.10): if \(f\) has a local extremum at an <em>interior</em> point \(c\) and \(f'(c)\) exists, then \(f'(c) = 0\). Contrapositively, a local extremum in the interior can occur only where the derivative is zero or fails to exist. Those places deserve a name.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">5.4</span><span class="env-name">Critical number</span></p>
    <div class="env-body">
      <p>A <em>critical number</em> of \(f\) is a number \(c\) in the domain of \(f\) at which either \(f'(c) = 0\) or \(f'(c)\) does not exist.</p>
    </div>
  </section>

  <p>Fermat’s theorem, recast, reads: every interior local extremum occurs at a critical number. This is the workhorse — it shrinks the hunt for extrema from a whole interval to a finite list of suspects.</p>

  <!-- expansion:caution — critical number is necessary, not sufficient: a critical number need not be an extremum -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>A critical number is a <em>candidate</em>, not a guarantee. The converse of Fermat’s theorem is false: \(f'(c) = 0\) does not force an extremum at \(c\). The function \(f(x) = x^{3}\) has \(f'(0) = 0\), yet \(0\) is neither a maximum nor a minimum — the curve passes straight through with a momentary flat spot. Critical numbers must always be tested, never assumed to be extrema.</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.11: finding critical numbers, exhibiting both f'=0 and f' DNE -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.11</span></p>
      <div class="env-body">
        <p>Find the critical numbers of \(f(x) = x^{3/5}(4 - x)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Expand and differentiate: \(f(x) = 4x^{3/5} - x^{8/5}\), so</p>
        <p>\[ f'(x) = \tfrac{12}{5}x^{-2/5} - \tfrac{8}{5}x^{3/5} = \frac{4}{5}x^{-2/5}(3 - 2x) = \frac{4(3 - 2x)}{5\,x^{2/5}}. \]</p>
        <p>Two kinds of critical number appear. Setting the numerator to zero, \(f'(x) = 0\) when \(3 - 2x = 0\), that is \(x = \tfrac{3}{2}\). And \(f'(x)\) <em>does not exist</em> where the denominator vanishes, at \(x = 0\) — yet \(x = 0\) is in the domain of \(f\) (indeed \(f(0) = 0\)), so it too is a critical number. The critical numbers are</p>
        <p>\[ x = 0 \quad\text{and}\quad x = \tfrac{3}{2}. \]</p>
        <p>Both must be kept: the first is where the tangent is vertical, the second where it is horizontal. Which, if either, is an extremum is a separate question, settled below. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Absolute extrema on a closed interval</h3>

  <p>On a closed interval the search closes completely. The Extreme Value Theorem (Theorem 4.9(a)) guarantees that a function continuous on \([a, b]\) <em>attains</em> an absolute maximum and minimum there; Fermat’s theorem says each is either an interior critical number or an endpoint. So the absolute extremes are found by checking a finite list.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.3</span><span class="env-name">The Closed Interval Method</span></p>
    <div class="env-body">
      <p>To find the absolute maximum and minimum of a function \(f\) continuous on a closed interval \([a, b]\):</p>
      <ol class="steps">
        <li>Find the critical numbers of \(f\) that lie in the open interval \((a, b)\), and evaluate \(f\) at each.</li>
        <li>Evaluate \(f\) at the two endpoints \(a\) and \(b\).</li>
        <li>The largest of these values is the absolute maximum; the smallest is the absolute minimum.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:example — Example 5.12: the closed-interval method on a cubic -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.12</span></p>
      <div class="env-body">
        <p>Find the absolute maximum and minimum of \(f(x) = x^{3} - 3x^{2} + 1\) on \([-\tfrac{1}{2}, 4]\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The function is a polynomial, hence continuous on the closed interval, so the method applies. Its derivative is</p>
        <p>\[ f'(x) = 3x^{2} - 6x = 3x(x - 2), \]</p>
        <p>which is defined everywhere and zero at \(x = 0\) and \(x = 2\); both lie in \((-\tfrac{1}{2}, 4)\). Evaluate \(f\) at these critical numbers and at the endpoints:</p>
        <p>\[ f(-\tfrac{1}{2}) = \tfrac{1}{8}, \qquad f(0) = 1, \qquad f(2) = -3, \qquad f(4) = 17. \]</p>
        <p>The largest value is \(17\) and the smallest is \(-3\). So the absolute maximum is \(17\), attained at the endpoint \(x = 4\), and the absolute minimum is \(-3\), attained at the interior critical number \(x = 2\). Notice that the maximum sat at an endpoint, not a critical number — which is exactly why the endpoints must be checked. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Classifying local extrema: the First Derivative Test</h3>

  <p>The Closed Interval Method finds absolute extremes by brute evaluation, but says nothing about the <em>character</em> of an interior critical number — whether it is a local max, a local min, or neither. The sign of the derivative on either side settles it, and the Mean Value Theorem’s monotonicity corollary (Corollary 4.3) is what makes the reasoning rigorous.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">5.1</span><span class="env-name">First Derivative Test</span></p>
    <div class="env-body">
      <p>Suppose \(f\) is continuous at a critical number \(c\), and differentiable on an open interval around \(c\) except possibly at \(c\) itself.</p>
      <ul>
        <li>If \(f'\) changes from positive to negative at \(c\) — positive just left, negative just right — then \(f\) has a <em>local maximum</em> at \(c\).</li>
        <li>If \(f'\) changes from negative to positive at \(c\), then \(f\) has a <em>local minimum</em> at \(c\).</li>
        <li>If \(f'\) does not change sign at \(c\) (positive on both sides, or negative on both), then \(f\) has neither.</li>
      </ul>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Fix a point \(u\) just left of \(c\) and a point \(v\) just right, both close enough that the stated sign conditions hold, so \(u < c < v\). On each side, \(f\) is continuous on the closed piece — \([u, c]\) or \([c, v]\) — and differentiable on its interior, so the monotonicity corollary (Corollary 4.3) governs each: applied to \(f\) directly wherever \(f' > 0\), and to \(-f\) wherever \(f' < 0\), since a negative derivative for \(f\) is a positive one for \(-f\), making \(-f\) strictly increase and \(f\) strictly decrease. Continuity of \(f\) at \(c\) lets each comparison reach the value \(f(c)\). The four sign patterns read off directly:</p>
      <ul>
        <li>positive then negative: \(f\) strictly increases up to \(c\) and strictly decreases after, so \(f(u) < f(c)\) and \(f(v) < f(c)\) — a <em>local maximum</em>;</li>
        <li>negative then positive: the reverse, \(f(u) > f(c)\) and \(f(v) > f(c)\) — a <em>local minimum</em>;</li>
        <li>positive on both sides: \(f(u) < f(c) < f(v)\), so \(f\) climbs straight through \(c\) — neither;</li>
        <li>negative on both sides: \(f(u) > f(c) > f(v)\), so \(f\) falls straight through — neither.</li>
      </ul>
      <p>In the two changing cases \(f(c)\) beats its neighbours on both sides (or is beaten on both), delivering the local extremum; in the two unchanging cases \(f\) passes monotonically through \(c\), which is therefore neither. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:example — Example 5.13: applying the first-derivative test, reusing the cubic to contrast with the closed-interval method -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.13</span></p>
      <div class="env-body">
        <p>Classify the local extrema of \(f(x) = x^{3} - 3x^{2} + 1\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>From \(f'(x) = 3x(x - 2)\), the critical numbers are \(x = 0\) and \(x = 2\). Track the sign of \(f'\) across them. The factors \(3x\) and \(x - 2\) give</p>
        <p>\[ f'(x) > 0 \text{ on } (-\infty, 0), \qquad f'(x) < 0 \text{ on } (0, 2), \qquad f'(x) > 0 \text{ on } (2, \infty). \]</p>
        <p>At \(x = 0\), \(f'\) changes from positive to negative: a <em>local maximum</em>, with value \(f(0) = 1\). At \(x = 2\), \(f'\) changes from negative to positive: a <em>local minimum</em>, with value \(f(2) = -3\). These are the same two interior values the Closed Interval Method turned up in Example 5.12; the First Derivative Test now explains their roles — the hill at \(x = 0\) and the valley at \(x = 2\) — independently of any interval. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example [pass: enrichment] [source: AI — running-example extension honouring Ex 5.11's "settled below"; adjudicated ADOPT in the M4 gap-check (Codex, 2026-07-07); sympy-recomputed] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.14</span></p>
      <div class="env-body">
        <p>Classify the critical numbers of \(f(x) = x^{3/5}(4 - x)\) found in Example 5.11.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Example 5.11 produced two critical numbers: \(x = \tfrac{3}{2}\), where \(f'\) vanishes, and \(x = 0\), where \(f'\) does not exist. The First Derivative Test handles both — its hypotheses ask only that \(f\) be continuous at the critical number and differentiable on either side, not at the point itself. From</p>
        <p>\[ f'(x) = \frac{4(3 - 2x)}{5x^{2/5}}, \]</p>
        <p>the denominator \(5x^{2/5} = 5\bigl(x^{1/5}\bigr)^{2}\) is positive for every \(x \ne 0\), so the sign of \(f'\) is the sign of \(3 - 2x\): positive on \((-\infty, 0)\), positive again on \((0, \tfrac{3}{2})\), and negative on \((\tfrac{3}{2}, \infty)\).</p>
        <p>At \(x = \tfrac{3}{2}\) the derivative changes from positive to negative, so \(f\) has a local maximum there, of value \(f\bigl(\tfrac{3}{2}\bigr) = \bigl(\tfrac{3}{2}\bigr)^{3/5} \cdot \tfrac{5}{2} \approx 3.19\). At \(x = 0\) the derivative does not change sign — positive on both sides — so \(x = 0\) is neither a maximum nor a minimum: the graph climbs through the origin with a vertical tangent and keeps climbing. A critical number can fail to be an extremum in two ways, and this function exhibits the second — not a flat spot on a rising curve (that was \(x^{3}\) at \(0\)), but a point of vertical tangency the curve simply passes through. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close: extrema located and classified; §5.5 applies the machinery to real optimization; the second-derivative test waits for §5.6 -->
  <p>The derivative has done its defining work: it flags where a function can turn, and its sign says which way. That is enough to solve genuine optimization problems, which the next section takes up — real quantities to maximize or minimize, with the modelling that turns a word problem into a function on an interval. A second, sometimes faster classifier — the sign of the <em>second</em> derivative — waits until §5.6, once concavity is in hand.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">5.5</span>Optimization Problems</h2>
  </header>

  <!-- expansion:intuition — section opener: the hard part is modeling — words to a one-variable function on an interval; then §5.4 finishes it -->
  <p>The previous section built the tools for finding extreme values; this one aims them at problems posed in words. A container is to hold a fixed volume with the least metal; a field is to enclose the most area with a fixed length of fence; a beam is to be as strong as the log allows. In every case a real quantity is to be made largest or smallest, and the calculus is the easy part. The work is the <em>modelling</em>: turning the situation into a function of a single variable on a definite interval, at which point Section 5.4 takes over.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">5.4</span><span class="env-name">Solving an optimization problem</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Identify the quantity to be optimized and name it; identify the quantities it depends on and give them symbols. A diagram almost always helps.</li>
        <li>Write the target quantity as a formula in those symbols.</li>
        <li>Use the <em>constraint</em> of the problem to eliminate all but one variable, so the target becomes a function of a single variable. Determine the interval of values that variable may take — the feasible domain.</li>
        <li>Find the absolute extremum on that interval by the methods of §5.4: the Closed Interval Method when the domain is closed, or the sign of the derivative (with the behaviour at the ends) when it is open.</li>
        <li>Translate the answer back into the terms of the original problem, and check that it is sensible.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:caution — the feasible domain and its ends are part of the problem, not an afterthought -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The feasible domain is part of the problem, not a formality. A length or radius cannot be negative, a fraction of a sheet cannot exceed the sheet, and these limits fix the interval on which the extremum is sought. When that interval is open — a radius ranging over \(r > 0\), say — the Closed Interval Method does not apply directly; instead confirm that the single interior critical number is the extremum by the sign of the derivative around it, and check that the quantity does not do better as the variable runs to the ends of its range.</p>
    </div>
  </section>

  <!-- expansion:example — Example 5.15: the fence-by-a-river problem, a fixed-perimeter area maximization -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.15</span></p>
      <div class="env-body">
        <p>A farmer has \(2400\) feet of fencing and wants to enclose a rectangular field bordering a straight river, with no fence needed along the river. What dimensions enclose the greatest area?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(x\) be the length of each of the two sides perpendicular to the river and \(y\) the side parallel to it. Only three sides are fenced, so the constraint is</p>
        <p>\[ 2x + y = 2400. \]</p>
        <p>The area to maximize is \(A = xy\). Eliminate \(y\) with the constraint, \(y = 2400 - 2x\):</p>
        <p>\[ A(x) = x(2400 - 2x) = 2400x - 2x^{2}, \qquad 0 \le x \le 1200. \]</p>
        <p>The endpoints \(x = 0\) and \(x = 1200\) both give zero area (a degenerate rectangle), while interior values give positive area, so the maximum — which the Extreme Value Theorem guarantees on this closed interval — must be interior. Differentiating, \(A'(x) = 2400 - 4x\), which vanishes at \(x = 600\); and \(A'\) runs from positive to negative there, so by the First Derivative Test it is a maximum. Then \(y = 2400 - 1200 = 1200\), and</p>
        <p>\[ A(600) = 600 \cdot 1200 = 720{,}000 \ \text{ft}^{2}. \]</p>
        <p>The best field is \(600\) feet deep and \(1200\) feet along the river. The fence divides itself equally between the two directions — \(1200\) feet across the river side, \(1200\) feet split between the two perpendicular sides — a balance that recurs throughout these problems. <span class="qed"></span></p>
      </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — riverside fence, three fenced sides (Ex 5.15); registered in chapter5 FIGS as "fence-river"] -->
  <figure class="figure" data-fig="fence-river">
    <figcaption><span class="fig-no">Figure 5.6</span> The riverside field of Example 5.15: only three sides are fenced — two of length \(x\) and one of length \(y\) — because the river bounds the fourth.</figcaption>
  </figure>
    </section>
  </div>

  <!-- expansion:example — Example 5.16: the minimal-surface can, an open-domain minimization justified by the sign of the derivative -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.16</span></p>
      <div class="env-body">
        <p>A cylindrical can is to hold a fixed volume \(V\). What proportions use the least metal — that is, minimize the total surface area?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(r\) be the radius and \(h\) the height. The can has two circular ends and a curved wall, so its surface area is \(A = 2\pi r^{2} + 2\pi r h\), and its volume fixes the constraint \(V = \pi r^{2} h\). Solve the constraint for \(h = V/(\pi r^{2})\) and substitute, leaving a function of \(r\) alone on the open domain \(r > 0\):</p>
        <p>\[ A(r) = 2\pi r^{2} + 2\pi r \cdot \frac{V}{\pi r^{2}} = 2\pi r^{2} + \frac{2V}{r}. \]</p>
        <p>Differentiate and set to zero:</p>
        <p>\[ A'(r) = 4\pi r - \frac{2V}{r^{2}} = 0 \quad\Longrightarrow\quad 4\pi r^{3} = 2V \quad\Longrightarrow\quad r^{3} = \frac{V}{2\pi}. \]</p>
        <p>This lone critical number is the minimum: \(A'(r) < 0\) for smaller \(r\) and \(A'(r) > 0\) for larger, and \(A(r) \to \infty\) both as \(r \to 0^{+}\) (the \(2V/r\) term) and as \(r \to \infty\) (the \(2\pi r^{2}\) term), so no boundary value competes. To read off the shape, note \(V = 2\pi r^{3}\) at the optimum, hence</p>
        <p>\[ h = \frac{V}{\pi r^{2}} = \frac{2\pi r^{3}}{\pi r^{2}} = 2r. \]</p>
        <p>The most economical can is exactly as tall as it is wide: the height equals the diameter. (Real cans are usually taller, because the top and bottom seams cost extra metal the bare-area model ignores — a reminder that the answer is only as good as the quantity it optimizes.) <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example — Example 5.17: geometry — the largest rectangle inscribed in a semicircle -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">5.17</span></p>
      <div class="env-body">
        <p>Find the dimensions of the rectangle of greatest area that can be inscribed in a semicircle of radius \(R\), with its base on the diameter.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Place the semicircle as the upper half of \(x^{2} + y^{2} = R^{2}\). Let the rectangle’s upper-right corner be \((x, y)\) on the arc, with \(0 \le x \le R\). By symmetry the rectangle has width \(2x\) and height \(y = \sqrt{R^{2} - x^{2}}\), so its area is</p>
        <p>\[ A(x) = 2x\sqrt{R^{2} - x^{2}}, \qquad 0 \le x \le R. \]</p>
        <p>Both endpoints give \(A = 0\) while interior values give positive area, so the maximum is interior. Differentiate by the product rule:</p>
        <p>\[ \begin{aligned}
          A’(x) &= 2\sqrt{R^{2} - x^{2}} + 2x \cdot \frac{-x}{\sqrt{R^{2} - x^{2}}} \\
          &= \frac{2(R^{2} - x^{2}) - 2x^{2}}{\sqrt{R^{2} - x^{2}}} = \frac{2(R^{2} - 2x^{2})}{\sqrt{R^{2} - x^{2}}}.
        \end{aligned} \]</p>
        <p>On \((0, R)\) the denominator is positive, so the sign of \(A'\) is the sign of \(R^{2} - 2x^{2}\): positive for \(x < R/\sqrt{2}\), negative beyond. The derivative changes from positive to negative at \(x = R/\sqrt{2}\), a maximum. There the height is \(y = \sqrt{R^{2} - R^{2}/2} = R/\sqrt{2}\), so the rectangle is \(R\sqrt{2}\) wide and \(R/\sqrt{2}\) tall, with area</p>
        <p>\[ A = R\sqrt{2} \cdot \frac{R}{\sqrt{2}} = R^{2}. \]</p>
        <p>The largest inscribed rectangle has area \(R^{2}\) — one quarter of the full circle’s \(2R \times 2R\) bounding square, equivalently half of the semicircle’s \(2R \times R\) bounding rectangle, and twice as wide as it is tall. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-06 tier-1/2 — rectangle inscribed in a semicircle (Ex 5.17); registered in chapter5 FIGS as "semicircle-rectangle"] -->
  <figure class="figure" data-fig="semicircle-rectangle">
    <figcaption><span class="fig-no">Figure 5.7</span> A rectangle inscribed in a semicircle of radius \(R\) (Example 5.17): the upper corner \((x, y)\) rides on the arc, so the width is \(2x\) and the height is \(y = \sqrt{R^{2} - x^{2}}\).</figcaption>
  </figure>

  <!-- expansion:summary — close: optimization = modeling + §5.4; §5.6 adds concavity, sharpening classification and completing the reading of a graph -->
  <p>Every problem here reduced to the same two moves: model the quantity as a function on an interval, then locate its extreme with the derivative. The modelling changed from problem to problem; the calculus did not. Section 5.6 returns to the analytic side and adds the missing piece — how the <em>second</em> derivative records the way a curve bends, which both classifies extrema more quickly and, with everything gathered so far, lets a graph be read off its formula.</p>

</article>
