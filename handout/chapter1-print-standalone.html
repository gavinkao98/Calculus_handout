<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Chapter 1</div>
    <h1 class="ch-title">Inverse Functions and Limits</h1>
  </header>

  <p class="lead">This chapter develops two ideas that together form the starting point of calculus. The first is the inverse of a function: when a function sends each input to a distinct output, we can ask how to recover the input from the output. This leads to one-to-one functions, inverse functions, and the inverse trigonometric functions. The second is the limit of a function. Many quantities of interest in calculus — the instantaneous rate of change of a moving object, the slope of a tangent line, the behavior of a function near a hole in its graph — depend not on the value of the function at a single point but on its behavior as the input approaches that point. We study limits first informally through tables and graphs, then through algebraic laws that let us compute them systematically, and finally through the precise \(\varepsilon\)-\(\delta\) definition that places every preceding argument on a rigorous footing.</p>

  <p class="para-head">By the end of this chapter, you will be able to:</p>
  <ul>
    <li>decide when a function is one-to-one and find its inverse when it exists;</li>
    <li>work with the inverse trigonometric functions \(\arcsin\), \(\arccos\), \(\arctan\), and their companions, together with their principal intervals;</li>
    <li>estimate the value of a limit from tables, graphs, and algebraic simplification, and handle one-sided and infinite limits;</li>
    <li>compute limits using the limit laws, factoring and rationalisation, and the squeeze theorem;</li>
    <li>state and apply the precise \(\varepsilon\)-\(\delta\) definition of a limit to verify a given limit rigorously.</li>
  </ul>
</article>

    <h2 class="sec-title"><span class="sec-no">1.1</span>Inverse Functions</h2>
  </header>

  <p>Recall that a function \(f\) assigns a value to every input in its domain. The reverse process — recovering the input from the output — is the subject of this section. We proceed in three stages: identify which functions admit inversion (the one-to-one property), define the inverse function for those that do, and give an explicit procedure for constructing it. Before the formal definitions, two simple examples show when inversion is possible and when it is not.</p>

  <ol class="warmup">
    <li>\(f(x) = x\) on \([0, 1]\). Here \(f(0) = 0\), \(f(\tfrac{1}{2}) = \tfrac{1}{2}\), \(f(\tfrac{1}{8}) = \tfrac{1}{8}\); each input produces its own distinct output.</li>
    <li>\(f(x) = x^{2}\) on \([-1, 1]\). Here \(f(0) = 0\), \(f(\tfrac{1}{2}) = \tfrac{1}{4}\), and \(f(-\tfrac{1}{2}) = \tfrac{1}{4}\); two different inputs produce the same output.</li>
  </ol>

  <p>The difference between these two cases is the central point. In the first, every output corresponds to exactly one input. In the second, the output \(\tfrac{1}{4}\) corresponds to both \(\tfrac{1}{2}\) and \(-\tfrac{1}{2}\), so there is no unambiguous way to go backwards from output to input.</p>

  <h3 class="subsec-head">One-to-one functions</h3>

  <p>A function can be reversed only when each output comes from exactly one input. This motivates the following definition.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.1</span></p>
    <div class="env-body">
      <p>Let \(f\) be a function with domain \(A\). We say that \(f\) is <em>one-to-one</em> if
      \[ f(x_{1}) \neq f(x_{2}) \qquad \text{whenever } x_{1} \neq x_{2}. \]
      Equivalently, \(f\) is one-to-one if
      \[ f(x_{1}) = f(x_{2}) \implies x_{1} = x_{2}. \]</p>
      <p class="informal">Informally, a function is one-to-one when different inputs always produce different outputs.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.1</span></p>
      <div class="env-body">
        <p>A class of students is assigned identification numbers, arranged so that no two students share a number. Define \(f(\mathrm{student})\) to be that student's identification number. Is \(f\) one-to-one?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>By construction, no two students share a number, so distinct students always produce distinct identification numbers. Therefore \(f\) is one-to-one.</p>
      </div>
    </section>
  </div>

  <p>Now we return to the two mathematical examples from the opening.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.2</span></p>
      <div class="env-body">
        <p>Determine which of the following functions are one-to-one on their given domains:
        \[ \begin{aligned} f(x) &= x, & x &\in [0, 1],\\ g(x) &= x^{2}, & x &\in [-1, 1]. \end{aligned} \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The function \(f(x) = x\) is one-to-one on \([0, 1]\) because each input is sent to itself, so distinct inputs always give distinct outputs.</p>
        <p>The function \(g(x) = x^{2}\) is not one-to-one on \([-1, 1]\) because
        \[ \begin{aligned} g\!\left(\tfrac{1}{2}\right) &= \left(\tfrac{1}{2}\right)^{2} = \tfrac{1}{4},\\ g\!\left(-\tfrac{1}{2}\right) &= \left(-\tfrac{1}{2}\right)^{2} = \tfrac{1}{4}. \end{aligned} \]
        Two different inputs produce the same output, so \(g\) is not one-to-one.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — algebraic one-to-one test where the cubic-like shape misleads [source: Mooculus digInInversesOfFunctions L293] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.3</span></p>
      <div class="env-body">
        <p>Determine whether each function is one-to-one on \(\mathbb{R}\):
        \[ h(x) = x^{3} - 4x, \qquad k(x) = x^{3} + 4. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>For \(h\), we look for two different inputs with the same output. Since \(h(x) = x(x^{2} - 4) = x(x - 2)(x + 2)\), we have \(h(0) = h(2) = 0\) with \(0 \neq 2\), so \(h\) is <em>not</em> one-to-one — even though its formula looks similar to \(x^{3}\).</p>
        <p>For \(k\), suppose \(k(x_{1}) = k(x_{2})\). Then \(x_{1}^{3} + 4 = x_{2}^{3} + 4\), so \(x_{1}^{3} = x_{2}^{3}\), and taking cube roots gives \(x_{1} = x_{2}\). Therefore \(k\) <em>is</em> one-to-one. The lesson: two formulas of the same general shape can behave differently; when in doubt, test the definition directly.</p>
      </div>
    </section>
  </div>

  <p>Looking at the graph of a function gives a quick way to decide whether it is one-to-one.</p>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.1</span><span class="env-name">Horizontal line test</span></p>
    <div class="env-body">
      <p>A horizontal line \(y = c\) meets the graph of \(f\) at a point \((x, c)\) exactly when \(f(x) = c\). Therefore, <em>a function is one-to-one if and only if no horizontal line intersects its graph more than once</em>. If the line \(y = c\) meets the graph at two distinct points \((x_{1}, c)\) and \((x_{2}, c)\), then \(f(x_{1}) = c = f(x_{2})\) with \(x_{1} \neq x_{2}\), so \(f\) fails to be one-to-one. Conversely, if every horizontal line meets the graph at most once, each output corresponds to at most one input. Figure 1.1 shows the two situations.</p>
    </div>
  </section>

  <figure class="figure" data-fig="hlt">
    <figcaption><span class="fig-no">Figure 1.1</span> Geometric interpretation of the horizontal line test.</figcaption>
  </figure>

  <h3 class="subsec-head">Inverse functions</h3>

  <p>If \(f\) is one-to-one, then we can define a second function that undoes \(f\): given an output of \(f\), it returns the unique input that produced it.</p>

  <!-- expansion:intuition — role-swap gloss motivating why domain and range trade places [pass: enrichment] -->
  <p>The idea is simply that the inverse trades the roles of input and output. Where \(f\) reads as a question — “given the input \(x\), what is the output?” — the inverse reads the same correspondence in reverse: “given that output, which input produced it?” This is why the domain and range change places: the outputs of \(f\) are exactly the inputs of \(f^{-1}\), and the inputs of \(f\) are exactly the outputs of \(f^{-1}\).</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.2</span></p>
    <div class="env-body">
      <p>Let \(f\) be a one-to-one function with domain \(A\) and range \(B\). The <em>inverse function</em> of \(f\), denoted by \(f^{-1}\), has domain \(B\) and range \(A\), and is defined, for every \(y \in B\), by
      \[ f^{-1}(y) = x \quad \Longleftrightarrow \quad f(x) = y. \]</p>
    </div>
  </section>

  <!-- expansion:caution — f^{-1} is the inverse function, not the reciprocal [pass: enrichment] [source: Mooculus digInInversesOfFunctions L95-101] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.1</span></p>
    <div class="env-body">
      <p>The superscript \(-1\) in \(f^{-1}\) denotes the <em>inverse function</em>, not a reciprocal. That is, \(f^{-1}(x)\) is the inverse evaluated at \(x\), whereas \(\bigl(f(x)\bigr)^{-1} = 1 / f(x)\) is the reciprocal of the value \(f(x)\); these are generally different. The same warning applies to the inverse trigonometric notation \(\sin^{-1} x\) in the next section.</p>
    </div>
  </section>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.2</span></p>
    <div class="env-body">
      <p>When we focus on the inverse function itself, it is often convenient to use \(x\) as its independent variable. In that case, we write
      \[ f^{-1}(x) = y \quad \Longleftrightarrow \quad f(y) = x. \]</p>
    </div>
  </section>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">1.1</span></p>
    <div class="env-body">
      <p>A function has an inverse if and only if it is one-to-one.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose first that \(f\) has an inverse \(f^{-1}\). If \(f(x_{1}) = f(x_{2})\), applying \(f^{-1}\) to both sides gives
      \[ f^{-1}\!\bigl(f(x_{1})\bigr) = f^{-1}\!\bigl(f(x_{2})\bigr), \]
      so \(x_{1} = x_{2}\). Therefore \(f\) is one-to-one. Conversely, suppose \(f\) is one-to-one with domain \(A\) and range \(B\). For each \(y \in B\) there exists some \(x \in A\) with \(f(x) = y\), and the one-to-one property forces this \(x\) to be unique. The correspondence \(y \mapsto x\) therefore defines an inverse function \(f^{-1} : B \to A\).</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.4</span></p>
      <div class="env-body">
        <p>Find the inverse of each function.</p>
        <ol class="prompt-list"><li>\(f(x) = x\).</li><li>\(g(x) = x^{3}\).</li></ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>Since \(f(x) = x\) leaves every input unchanged, \(f\) is its own inverse, so \(f^{-1}(x) = x\).</li>
          <li>To find the inverse of \(g\), let \(y = x^{3}\). Solving for \(x\) gives \(x = \sqrt[3]{y}\). Interchanging the names of the variables, \(g^{-1}(x) = \sqrt[3]{x}\). As a check, \(g\!\bigl(g^{-1}(x)\bigr) = \bigl(\sqrt[3]{x}\bigr)^{3} = x\).</li>
        </ol>
      </div>
    </section>
  </div>

  <p>The defining relation
  \[ f^{-1}(y) = x \Longleftrightarrow f(x) = y \]
  yields two composition identities.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.1</span></p>
    <div class="env-body">
      <p>Let \(f\) be a one-to-one function with domain \(A\) and range \(B\). Then
      \[ \begin{aligned} f^{-1}\!\bigl(f(x)\bigr) &= x \quad \text{for every } x \in A, \\ f\!\bigl(f^{-1}(y)\bigr) &= y \quad \text{for every } y \in B. \end{aligned} \]</p>
    </div>
  </section>

  <p>Figure 1.2 illustrates both identities: \(f\) and \(f^{-1}\) travel between \(A\) and \(B\) in opposite directions, and composing them recovers the original input.</p>

  <figure class="figure" id="fig-map">
    <div class="figure-art">
      <svg viewBox="0 0 360 200" style="width:340px" class="fig-svg" role="img" aria-label="A one-to-one function and its inverse mapping between sets A and B.">

        </defs>
        <ellipse cx="72" cy="105" rx="46" ry="68" class="bubble"/>

        <circle cx="288" cy="92" r="3.2" class="dot"/>

        <text x="300" y="96" class="ptlab">f(x)</text>

        <path d="M278,98 Q180,144 82,98" class="arrow-bwd" marker-end="url(#ahb)"/>

    <figcaption><span class="fig-no">Figure 1.2</span> A one-to-one function and its inverse. Going forward by \(f\) and back by \(f^{-1}\) recovers the input: \(f^{-1}\!\bigl(f(x)\bigr) = x\).</figcaption>
  </figure>

  <p>Graphically, if the graph of \(f^{-1}\) is drawn in the same coordinate plane as the graph of \(f\), the two graphs are reflections of one another across the line \(y = x\). The point \((a, b)\) lies on the graph of \(f\) exactly when \((b, a)\) lies on the graph of \(f^{-1}\).</p>

  <!-- expansion:example — restrict the domain to repair a non-invertible function (x^2 to sqrt x), the bridge to the next section [source: Mooculus digInInversesOfFunctions L407-453] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.5</span></p>
      <div class="env-body">
        <p>The function \(f(x) = x^{2}\) is not one-to-one on \(\mathbb{R}\). Restrict its domain so that the restricted function is one-to-one, and find the inverse of the restricted function.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>This example illustrates why not every function can be reversed — and how restricting the domain repairs it. On the interval \([0, \infty)\) the function \(f(x) = x^{2}\) is one-to-one: if \(x_{1}^{2} = x_{2}^{2}\) with \(x_{1}, x_{2} \ge 0\), then \(x_{1} = x_{2}\). To find the inverse, write \(x = \bigl(f^{-1}(x)\bigr)^{2}\); since \(f^{-1}(x) \ge 0\), taking the positive square root gives
        \[ f^{-1}(x) = \sqrt{x}, \qquad x \ge 0. \]
        This is exactly why \(\sqrt{x}\) means the <em>positive</em> square root: the convention makes the square root the inverse of the restricted squaring function. Figure 1.3 shows the restricted parabola, its inverse, and the mirror line \(y = x\). The same idea — restrict first, then invert — is the key to the inverse trigonometric functions of the next section.</p>
        <figure class="figure" data-fig="restrict-x2">
          <figcaption><span class="fig-no">Figure 1.3</span> The squaring function restricted to \([0, \infty)\), its inverse \(\sqrt{x}\), and the mirror line \(y = x\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Finding the inverse of a function</h3>

  <p>When \(f\) is one-to-one, we can usually construct its inverse by a short procedure.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">1.1</span><span class="env-name">Finding the inverse of a one-to-one function</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Write \(y = f(x)\).</li>
        <li>Solve this equation for \(x\) in terms of \(y\).</li>
        <li>Interchange the names \(x\) and \(y\). The resulting equation gives \(y = f^{-1}(x)\).</li>
      </ol>
    </div>
  </section>

  <p>Note that this procedure assumes \(f\) is already one-to-one: applying it blindly to \(y = x^{2}\), for instance, yields \(x = \pm\sqrt{y}\) — two values, not a function. Always verify one-to-one first, or restrict the domain (as in Example 1.5).</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.6</span></p>
      <div class="env-body">
        <p>Find the inverse of \(f(x) = x^{3} + 2\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(y = x^{3} + 2\). Solving for \(x\) gives
        \[ \begin{aligned} x^{3} &= y - 2,\\ x &= \sqrt[3]{y - 2}. \end{aligned} \]
        Interchanging the variables, \(y = \sqrt[3]{x - 2}\), so \(f^{-1}(x) = \sqrt[3]{x - 2}\). As a check,
        \[ f\!\bigl(f^{-1}(x)\bigr) = \left(\sqrt[3]{x - 2}\right)^{3} + 2 = (x - 2) + 2 = x. \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — invert a rational function and verify both compositions (Proposition 1.1 in action on a non-polynomial) [source: APEX §2.7 #7, solution authored] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.7</span></p>
      <div class="env-body">
        <p>Find the inverse of \(f(x) = \frac{3}{x - 5}\) (for \(x \neq 5\)), and verify your answer by computing both \(f\!\bigl(f^{-1}(x)\bigr)\) and \(f^{-1}\!\bigl(f(x)\bigr)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(y = \frac{3}{x - 5}\). Solving for \(x\):
        \[ x - 5 = \frac{3}{y}, \quad\text{so}\quad x = 5 + \frac{3}{y}. \]
        Interchanging the variables,
        \[ f^{-1}(x) = 5 + \frac{3}{x} = \frac{5x + 3}{x}, \qquad x \neq 0. \]
        Verification, in both directions:
        \[ \begin{aligned} f\!\bigl(f^{-1}(x)\bigr) &= \frac{3}{\bigl(5 + \tfrac{3}{x}\bigr) - 5} = \frac{3}{3/x} = x, \\ f^{-1}\!\bigl(f(x)\bigr) &= 5 + \frac{3}{3/(x - 5)} = 5 + (x - 5) = x. \end{aligned} \]
        Both compositions return the input, confirming Proposition 1.1. Note how the domains pair up: \(f\) excludes \(x = 5\) and \(f^{-1}\) excludes \(x = 0\), matching the fact that \(f\) never takes the value \(0\) and \(f^{-1}\) never takes the value \(5\).</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — applied inverse: Celsius to Fahrenheit and back [source: Mooculus digInInversesOfFunctions L181-227] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.8</span></p>
      <div class="env-body">
        <p>The function \(f(t) = \tfrac{9}{5} t + 32\) converts a temperature of \(t\) degrees Celsius into degrees Fahrenheit. What practical question does \(f^{-1}\) answer? Find a formula for \(f^{-1}(t)\), and verify your formula by computing \(f^{-1}\!\bigl(f(t)\bigr)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Since \(f\) converts Celsius to Fahrenheit, its inverse \(f^{-1}\) converts a Fahrenheit reading back into Celsius. Writing \(t = \tfrac{9}{5} f^{-1}(t) + 32\) and solving,
        \[ f^{-1}(t) = \tfrac{5}{9}\,(t - 32). \]
        As a check,
        \[ f^{-1}\!\bigl(f(t)\bigr) = \tfrac{5}{9}\!\left(\tfrac{9}{5} t + 32 - 32\right) = \tfrac{5}{9}\cdot\tfrac{9}{5}\,t = t. \]</p>
      </div>
    </section>
  </div>

</article>

<template id="frag-sec-1-2">
<!-- §1.2 Inverse Trigonometric Functions. Content verbatim from ch01_foundations.tex;
     worked examples E1.2-a/b/c + O1.2-d supplemented from open banks (2026-06-12),
     audit-approved. Figures renumbered 1.3-1.6 -> 1.4-1.7 (new Fig 1.3 added in §1.1). -->
<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">1.2</span>Inverse Trigonometric Functions</h2>
  </header>

  <p>The trigonometric functions are not one-to-one on all of \(\mathbb{R}\), so they do not have inverse functions on their full domains. Inverse trigonometric functions arise whenever we know a ratio and want to recover an angle: from the slope of a ramp, we get an angle of inclination via \(\arctan\); from a ratio of sides in a right triangle, we get an angle via \(\arcsin\) or \(\arccos\). To build these inverses, we must first restrict the domain of each trigonometric function to an interval on which it is one-to-one.</p>

  <p>Consider the sine function on \(\mathbb{R}\). As Figure 1.4 shows, a horizontal line can intersect the graph of \(y = \sin x\) more than once, so \(\sin\) is not one-to-one on \(\mathbb{R}\).</p>

  <figure class="figure" data-fig="sine-not-1to1">
    <figcaption><span class="fig-no">Figure 1.4</span> The sine function on \(\mathbb{R}\) is not one-to-one.</figcaption>
  </figure>

  <h3 class="subsec-head">The inverse sine function</h3>

  <p>To define the inverse sine, we restrict \(\sin x\) to the interval
  \[ -\tfrac{\pi}{2} \le x \le \tfrac{\pi}{2}. \]
  On this interval, \(\sin x\) is one-to-one and its values cover the range \([-1, 1]\). The restricted branch is shown in Figure 1.5.</p>

  <figure class="figure" data-fig="restricted-sine">
    <figcaption><span class="fig-no">Figure 1.5</span> Restricted branch of the sine function used to define \(\arcsin x\).</figcaption>
  </figure>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.3</span></p>
    <div class="env-body">
      <p>The <em>inverse sine function</em>, denoted \(\arcsin x\) or \(\sin^{-1} x\), is defined by
      \[ \arcsin x = y \quad \Longleftrightarrow \quad \sin y = x \ \text{ and } \ -\tfrac{\pi}{2} \le y \le \tfrac{\pi}{2}. \]
      Its domain is \([-1, 1]\) and its range is \(\left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\).</p>
    </div>
  </section>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.2</span></p>
    <div class="env-body">
      <p>The notation \(\sin^{-1} x\) is also used for \(\arcsin x\). It does <em>not</em> mean the reciprocal \(\bigl(\sin x\bigr)^{-1} = 1 / \sin x\). When reading a source that uses \(\sin^{-1}\), check the context to decide which is meant.</p>
    </div>
  </section>

  <p>The composition identities for \(\arcsin\) take the following form.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.2</span><span class="env-name">Inverse sine identities</span></p>
    <div class="env-body">
      <p>\[ \begin{aligned} \sin(\arcsin x) = x, &\qquad -1 \le x \le 1,\\ \arcsin(\sin x) = x, &\qquad -\tfrac{\pi}{2} \le x \le \tfrac{\pi}{2}. \end{aligned} \]</p>
    </div>
  </section>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.3</span></p>
    <div class="env-body">
      <p>The identity \(\arcsin(\sin x) = x\) holds only when \(x \in \left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\). Outside this interval, the right-hand side is replaced by the unique value in \(\left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\) with the same sine; for instance,
      \[ \arcsin(\sin \pi) = \arcsin(0) = 0 \neq \pi. \]</p>
    </div>
  </section>

  <!-- expansion:strategy — the reference-triangle method for evaluating trig(inverse-trig) expressions [source: CLP-1 §2.12; Stewart §1.6] -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">1.2</span><span class="env-name">The reference-triangle method</span></p>
    <div class="env-body">
      <p>To evaluate a trigonometric function of an inverse trigonometric expression — such as \(\tan(\arcsin x)\) or \(\cos(\arctan x)\):</p>
      <ol class="steps">
        <li>Set \(\theta\) equal to the inverse trigonometric expression, so that the known ratio is read directly from the definition (e.g. \(\theta = \arcsin x\) gives \(\sin\theta = x\)).</li>
        <li>Draw a right triangle using positive side lengths for the magnitude of the known ratio; keep track of the sign separately from the principal-value interval.</li>
        <li>Find the missing side by the Pythagorean theorem.</li>
        <li>Read the desired value from the completed triangle. Determine the sign from the principal-value interval, not from the triangle alone.</li>
      </ol>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.9</span></p>
      <div class="env-body">
        <p>Evaluate the following expressions.</p>
        <ol class="prompt-list">
          <li>\(\arcsin\!\left(\tfrac{1}{2}\right)\).</li>
          <li>\(\tan\!\bigl(\arcsin\!\left(\tfrac{1}{3}\right)\bigr)\).</li>
        </ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>We need the angle \(y \in \left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\) with \(\sin y = \tfrac{1}{2}\). Since \(\sin(\pi/6) = \tfrac{1}{2}\), we have \(\arcsin\!\left(\tfrac{1}{2}\right) = \tfrac{\pi}{6}\).</li>
          <li>Let \(\theta = \arcsin\!\left(\tfrac{1}{3}\right)\), so \(\sin\theta = \tfrac{1}{3}\) with \(\theta \in \left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\). Because \(\sin\theta > 0\), the angle \(\theta\) lies in the first quadrant, and in a right triangle with hypotenuse \(3\) and opposite side \(1\), the adjacent side is
          \[ a = \sqrt{3^{2} - 1^{2}} = \sqrt{8} = 2\sqrt{2}. \]
          <figure class="figure" data-fig="arcsin-triangle">
            <figcaption><span class="fig-no">Figure 1.6</span> Right triangle with \(\sin\theta = \tfrac{1}{3}\).</figcaption>
          </figure>
          Therefore \(\tan\!\bigl(\arcsin\!\left(\tfrac{1}{3}\right)\bigr) = \tan\theta = \tfrac{1}{2\sqrt{2}}\).</li>
        </ol>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The inverse cosine function</h3>

  <!-- expansion:intuition — why [0,π] is the natural restriction for cosine [pass: enrichment] -->
  <p>As with sine, we first choose an interval on which the function is one-to-one and still runs through all of its values. Cosine decreases steadily from \(1\) to \(-1\) as the angle goes from \(0\) to \(\pi\), so the interval \([0, \pi]\) sweeps the entire range \([-1, 1]\) exactly once — the natural analogue of the choice \(\left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\) made for sine.</p>

  <p>The cosine function is one-to-one on the interval \(0 \le x \le \pi\), shown in Figure 1.7.</p>

  <figure class="figure" data-fig="restricted-cosine">
    <figcaption><span class="fig-no">Figure 1.7</span> Restricted branch of the cosine function used to define \(\arccos x\).</figcaption>
  </figure>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.4</span></p>
    <div class="env-body">
      <p>The <em>inverse cosine function</em>, denoted \(\arccos x\) or \(\cos^{-1} x\), is defined by
      \[ \arccos x = y \quad \Longleftrightarrow \quad \cos y = x \ \text{ and } \ 0 \le y \le \pi. \]
      Its domain is \([-1, 1]\) and its range is \([0, \pi]\).</p>
    </div>
  </section>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.3</span><span class="env-name">Inverse cosine identities</span></p>
    <div class="env-body">
      <p>\[ \begin{aligned} \cos(\arccos x) = x, &\qquad -1 \le x \le 1,\\ \arccos(\cos x) = x, &\qquad 0 \le x \le \pi. \end{aligned} \]</p>
    </div>
  </section>

  <!-- expansion:example — domain of a composition: range of inner feeds domain of outer [source: CLP-1 §2.12 #1 (a)(c)] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.10</span></p>
      <div class="env-body">
        <p>Find the domain of each function.</p>
        <ol class="prompt-list">
          <li>\(f(x) = \arcsin(\cos x)\).</li>
          <li>\(h(x) = \sin(\arccos x)\).</li>
        </ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>Whatever \(x\) is, \(\cos x\) lies in \([-1, 1]\), and \([-1, 1]\) is exactly the domain of \(\arcsin\). So every real \(x\) is allowed: the domain of \(f\) is \(\mathbb{R}\).</li>
          <li>The inner function \(\arccos x\) requires \(x \in [-1, 1]\); its output is an angle, and \(\sin\) accepts any angle. So the domain of \(h\) is \([-1, 1]\).</li>
        </ol>
        <p>To find the domain of a composition, first make sure the input is allowed by the <em>inner</em> function. Then make sure the output of the inner function is allowed by the <em>outer</em> function.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — principal value as an applied trap (arccos returns one value, not all) [source: CLP-1 §2.12 #2] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.11</span></p>
      <div class="env-body">
        <p>A particle starts moving at time \(t = 10\), and it bobs up and down so that its height at time \(t \ge 10\) is \(\cos t\). True or false: the particle has height \(1\) at time \(t = \arccos(1)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>False. The equation \(\cos t = 1\) holds for infinitely many \(t\), but \(\arccos\) returns only the principal value \(t = 0\) — and the particle is not even moving at \(t = 0\), since its motion starts at \(t = 10\). The particle does reach height \(1\) at the times \(t = 2\pi n\) for integers \(n \ge 2\), but \(\arccos(1) = 0\) is not one of them.</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The inverse tangent function</h3>

  <!-- expansion:intuition — why arctan accepts all of R, tying the open interval to the unbounded domain [pass: enrichment] -->
  <p>On the open interval \(\left(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right)\), the tangent function climbs continuously from \(-\infty\) to \(+\infty\), taking each real number as a value exactly once. This is why the inverse tangent, unlike \(\arcsin\) and \(\arccos\), accepts <em>every</em> real number as input: its domain is all of \(\mathbb{R}\).</p>

  <p>The tangent function is one-to-one on the interval \(-\tfrac{\pi}{2} < x < \tfrac{\pi}{2}\), shown in Figure 1.8.</p>

  <figure class="figure" data-fig="restricted-tangent">
    <figcaption><span class="fig-no">Figure 1.8</span> Restricted branch of the tangent function used to define \(\arctan x\).</figcaption>
  </figure>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.5</span></p>
    <div class="env-body">
      <p>The <em>inverse tangent function</em>, denoted \(\arctan x\) or \(\tan^{-1} x\), is defined by
      \[ \arctan x = y \quad \Longleftrightarrow \quad \tan y = x \ \text{ and } \ -\tfrac{\pi}{2} < y < \tfrac{\pi}{2}. \]
      Its domain is \(\mathbb{R}\) and its range is \(\left(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right)\).</p>
    </div>
  </section>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.4</span><span class="env-name">Inverse tangent identities</span></p>
    <div class="env-body">
      <p>\[ \begin{aligned} \tan(\arctan x) = x, &\qquad x \in \mathbb{R},\\ \arctan(\tan x) = x, &\qquad -\tfrac{\pi}{2} < x < \tfrac{\pi}{2}. \end{aligned} \]</p>
    </div>
  </section>

  <!-- expansion:caution — the arccos/arctan analogues of the arcsin(sin x) domain restriction [pass: enrichment] [source: parallels CLP-1 §2.12; mirrors the sine-case caution above] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.4</span></p>
    <div class="env-body">
      <p>As with the sine case, the “cancellation” identities hold only on each principal range. That is, \(\arccos(\cos x) = x\) only when \(x \in [0, \pi]\), and \(\arctan(\tan x) = x\) only when \(x \in \left(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right)\). Outside these intervals the left-hand side returns the equivalent angle that <em>does</em> lie in the principal range; for instance,
      \[ \begin{aligned} \arccos(\cos 2\pi) &= \arccos(1) = 0 \neq 2\pi, \\ \arctan(\tan \pi) &= \arctan(0) = 0 \neq \pi. \end{aligned} \]
      By contrast, the reverse direction is always safe on the natural domain: \(\cos(\arccos y) = y\) for every \(y \in [-1, 1]\), and \(\tan(\arctan y) = y\) for every real \(y\).</p>
    </div>
  </section>

  <!-- expansion:example — exact values with negative inputs, obtuse principal value, and the triangle method [source: Stitz-Zeager via Mooculus 10_06_ex_131-154] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.12</span></p>
      <div class="env-body">
        <p>Find the exact value of each expression.</p>
        <ol class="prompt-list">
          <li>\(\sin\!\bigl(\arccos(-\tfrac{1}{2})\bigr)\).</li>
          <li>\(\sec(\arctan 10)\).</li>
          <li>\(\tan\!\bigl(\arcsin(-\tfrac{2\sqrt{5}}{5})\bigr)\).</li>
        </ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>\(\arccos(-\tfrac{1}{2})\) is the angle in \([0, \pi]\) whose cosine is \(-\tfrac{1}{2}\): that is \(\tfrac{2\pi}{3}\), and \(\sin\tfrac{2\pi}{3} = \tfrac{\sqrt{3}}{2}\). Note the principal value lands in the <em>second</em> quadrant — negative inputs to \(\arccos\) always do.</li>
          <li>Let \(\theta = \arctan 10\), so \(\tan\theta = 10\) with \(\theta \in \left(0, \tfrac{\pi}{2}\right)\). In a right triangle with opposite side \(10\) and adjacent side \(1\), the hypotenuse is \(\sqrt{101}\), so \(\sec(\arctan 10) = \sqrt{101}\).
          <figure class="figure" data-fig="arctan10-triangle">
            <figcaption><span class="fig-no">Figure 1.9</span> Right triangle with \(\tan\theta = 10\).</figcaption>
          </figure>
          </li>
          <li>Let \(\theta = \arcsin\!\bigl(-\tfrac{2\sqrt{5}}{5}\bigr)\), so \(\sin\theta = -\tfrac{2}{\sqrt{5}}\) with \(\theta \in \left[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right]\). Because \(\sin\theta < 0\), the angle lies in the fourth quadrant, where cosine is positive: \(\cos\theta = \sqrt{1 - \tfrac{4}{5}} = \tfrac{1}{\sqrt{5}}\). Therefore \(\tan\theta = \frac{-2/\sqrt{5}}{1/\sqrt{5}} = -2\). The sign came from the <em>range</em> of \(\arcsin\), not from guessing.</li>
        </ol>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.13</span></p>
      <div class="env-body">
        <p>Simplify the expression \(\cos(\arctan x)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(y = \arctan x\), so \(\tan y = x\) with \(-\tfrac{\pi}{2} < y < \tfrac{\pi}{2}\). We want \(\cos y\). Using the identity \(1 + \tan^{2} y = \sec^{2} y\),
        \[ \sec^{2} y = 1 + x^{2}. \]
        Since \(y \in \left(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\right)\) we have \(\cos y > 0\) and hence \(\sec y > 0\), so \(\sec y = \sqrt{1 + x^{2}}\). Therefore
        \[ \cos(\arctan x) = \cos y = \frac{1}{\sec y} = \frac{1}{\sqrt{1 + x^{2}}}. \]</p>
        <figure class="figure" data-fig="arctan-general-triangle">
          <figcaption><span class="fig-no">Figure 1.10</span> Right triangle with \(\tan y = x\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The remaining inverse trigonometric functions</h3>

  <p>The remaining inverse trigonometric functions are used less frequently, but they are defined in the same spirit. Each definition below specifies a <em>principal range</em> — the interval its output angle is restricted to; the corresponding input domains are collected together after all three.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.6</span></p>
    <div class="env-body">
      <p>The <em>inverse cosecant function</em>, denoted \(\arccsc x\) or \(\csc^{-1} x\), is defined by
      \[ \arccsc x = y \quad \Longleftrightarrow \quad \csc y = x \ \text{ and } \ y \in \left(0, \tfrac{\pi}{2}\right] \cup \left(\pi, \tfrac{3\pi}{2}\right]. \]</p>
    </div>
  </section>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.7</span></p>
    <div class="env-body">
      <p>The <em>inverse secant function</em>, denoted \(\arcsec x\) or \(\sec^{-1} x\), is defined by
      \[ \arcsec x = y \quad \Longleftrightarrow \quad \sec y = x \ \text{ and } \ y \in \left[0, \tfrac{\pi}{2}\right) \cup \left[\pi, \tfrac{3\pi}{2}\right). \]</p>
    </div>
  </section>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.8</span></p>
    <div class="env-body">
      <p>The <em>inverse cotangent function</em>, denoted \(\arccot x\) or \(\cot^{-1} x\), is defined by
      \[ \arccot x = y \quad \Longleftrightarrow \quad \cot y = x \ \text{ and } \ y \in (0, \pi). \]</p>
    </div>
  </section>

  <p>The domains of \(\arccsc\) and \(\arcsec\) are \((-\infty, -1] \cup [1, \infty)\), while the domain of \(\arccot\) is \(\mathbb{R}\). The principal ranges are the intervals specified in the definitions above.</p>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.3</span></p>
    <div class="env-body">
      <p>For \(\arcsec x\), another common choice of principal range is \(y \in \left[0, \tfrac{\pi}{2}\right) \cup \left(\tfrac{\pi}{2}, \pi\right]\). In this text we use \(y \in \left[0, \tfrac{\pi}{2}\right) \cup \left[\pi, \tfrac{3\pi}{2}\right)\) because it makes the differentiation formulas for the inverse secant simpler. When consulting other sources or software, always check which convention is in use, since different branch choices can lead to different values.</p>
    </div>
  </section>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.4</span></p>
    <div class="env-body">
      <p>For \(\arccsc x\), another common choice of principal range is \(y \in \left[-\tfrac{\pi}{2}, 0\right) \cup \left(0, \tfrac{\pi}{2}\right]\). In this text we use \(y \in \left(0, \tfrac{\pi}{2}\right] \cup \left(\pi, \tfrac{3\pi}{2}\right]\) so that the chosen branch parallels the one selected for \(\arcsec x\). Once the principal range is fixed consistently, either convention gives a valid inverse function.</p>
    </div>
  </section>

  <!-- expansion:example — domains of the remaining inverse trig functions + the branch convention has visible consequences [source: CLP-1 §2.12 #5, recomputed for this text's arccsc principal range] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.14</span></p>
      <div class="env-body">
        <p>Let \(f(x) = \arcsin x + \arccsc x\). Find the domain of \(f\), and evaluate \(f\) at every point of its domain.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>\(\arcsin\) requires \(|x| \le 1\) while \(\arccsc\) requires \(|x| \ge 1\), so the domain is just the two points \(x = \pm 1\). At \(x = 1\): \(\arcsin 1 = \tfrac{\pi}{2}\) and \(\arccsc 1 = \tfrac{\pi}{2}\) (the angle in \(\left(0, \tfrac{\pi}{2}\right]\) with cosecant \(1\)), so \(f(1) = \pi\). At \(x = -1\): \(\arcsin(-1) = -\tfrac{\pi}{2}\), and under this text's principal range for \(\arccsc\) the angle with cosecant \(-1\) is \(\arccsc(-1) = \tfrac{3\pi}{2}\), so \(f(-1) = -\tfrac{\pi}{2} + \tfrac{3\pi}{2} = \pi\). So \(f\) is the constant \(\pi\) on its two-point domain.</p>
        <p>Under the alternative convention of Remark 1.4 (\(\arccsc(-1) = -\tfrac{\pi}{2}\)) one gets \(f(-1) = -\pi\) instead — a concrete instance of branch conventions changing answers, which is why this text fixes its conventions explicitly.</p>
      </div>
    </section>
  </div>

</article>

<template id="frag-sec-1-3">
<!-- §1.3 The Limit of a Function. Content verbatim from ch01_foundations.tex;
     worked examples E1.3-a + O1.3-b supplemented from open banks (2026-06-12),
     audit-approved. Figure 1.7 -> 1.8; new Fig 1.9 (read-from-graph). -->
<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">1.3</span>The Limit of a Function</h2>
  </header>

  <p>A frequent setting in calculus is the need to study a ratio of changes. If \(s(t)\) is the position of a moving object at time \(t\), the ratio
  \[ \frac{s(t + h) - s(t)}{h} \]
  is the <em>average velocity</em> of the object from time \(t\) to time \(t + h\). Very often we want the <em>instantaneous velocity</em> — how fast the object is moving at a single moment — rather than the average. To describe this, we let \(h\) shrink toward zero and ask what value the ratio approaches. More generally, for any function \(f\), the ratio
  \[ \frac{f(y) - f(x)}{y - x} \]
  measures how \(f\) changes between two inputs. We may want to know what this ratio does as \(y\) gets closer and closer to \(x\), without ever equalling \(x\). This is the motivation for the concept of a limit.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.9</span></p>
    <div class="env-body">
      <p>Suppose that \(f(x)\) is defined for all \(x\) near a number \(a\), except possibly at \(a\) itself. We write
      \[ \lim_{x \to a} f(x) = L \]
      and say that the <em>limit</em> of \(f(x)\) as \(x\) approaches \(a\) is \(L\) if \(f(x)\) can be made arbitrarily close to \(L\) whenever \(x\) is sufficiently close to \(a\) but not equal to \(a\).</p>
    </div>
  </section>

  <p>An alternative notation for the same idea is
  \[ f(x) \to L \qquad \text{as } x \to a, \]
  read “\(f(x)\) tends to \(L\) as \(x\) tends to \(a\).”</p>

  <p>When we consider \(\lim_{x \to a} f(x)\), we are concerned with the values of \(f(x)\) for \(x\) near \(a\), not with the value of \(f(a)\). In particular, \(f(a)\) need not be defined at all. Figure 1.11 shows three functions whose values at \(a\) are different (and one is undefined), yet which all share the same limit as \(x \to a\).</p>

  <figure class="figure" data-fig="limit-same-near-a">
    <figcaption><span class="fig-no">Figure 1.11</span> Three functions with the same limit as \(x \to a\).</figcaption>
  </figure>

  <!-- expansion:example — read limits off a graph, including a point where the limit differs from f(a) [source: CLP-1 §1.3 #1] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.15</span></p>
      <div class="env-body">
        <p>The graph of a function \(f\) is shown in Figure 1.12. Evaluate the following, or state that the limit does not exist:</p>
        <ol class="prompt-list">
          <li>\(\lim_{x \to -2} f(x)\).</li>
          <li>\(\lim_{x \to 0} f(x)\).</li>
          <li>\(\lim_{x \to 2} f(x)\).</li>
        </ol>
        <figure class="figure" data-fig="read-limit-graph">
          <figcaption><span class="fig-no">Figure 1.12</span> A function whose limit at \(x = 2\) differs from its value there.</figcaption>
        </figure>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>As \(x\) approaches \(-2\) from either side, the curve approaches height \(1\), so \(\lim_{x \to -2} f(x) = 1\).</li>
          <li>As \(x\) approaches \(0\), the curve approaches height \(0\), so \(\lim_{x \to 0} f(x) = 0\).</li>
          <li>As \(x\) approaches \(2\), the curve approaches height \(2\). The open dot at \((2, 2)\) and the solid dot at \((2, -2)\) tell us \(f(2) = -2\), but the limit ignores the value <em>at</em> the point: \(\lim_{x \to 2} f(x) = 2\), even though \(f(2) = -2\).</li>
        </ol>
      </div>
    </section>
  </div>

  <!-- expansion:example — construct a curve with a prescribed limit/value mismatch (the reverse skill) [source: CLP-1 §1.3 #5] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.16</span></p>
      <div class="env-body">
        <p>Sketch the graph of a function \(f\) with \(\lim_{x \to 3} f(x) = 10\) and \(f(3) = 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Many answers are possible. Take any curve that approaches height \(10\) as \(x \to 3\) — for instance a straight line through \((3, 10)\) — and then move the single point at \(x = 3\) down to height \(0\), marking an open dot at \((3, 10)\) and a solid dot at \((3, 0)\). Near \(x = 3\), but not at it, the values approach \(10\), so \(\lim_{x \to 3} f(x) = 10\); the relocated point makes \(f(3) = 0\). The limit and the value at the point are independent, so nothing prevents this mismatch.</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.17</span></p>
      <div class="env-body">
        <p>Guess the value of
        \[ \lim_{x \to 1} \frac{x - 1}{x^{2} - 1}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The expression is not defined at \(x = 1\), but we can examine its values for \(x\) near \(1\):</p>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead>
              <tr><th>\(x\)</th><th>0.9</th><th>0.99</th><th>0.999</th><th>1.001</th><th>1.01</th><th>1.1</th></tr>
            </thead>
            <tbody>
              <tr><td class="rowlab">\(\frac{x - 1}{x^{2} - 1}\)</td><td>0.5263</td><td>0.5025</td><td>0.5003</td><td>0.4998</td><td>0.4975</td><td>0.4762</td></tr>
            </tbody>
          </table>
        </div>
        <p>The values are getting close to \(\tfrac{1}{2}\) as \(x\) approaches \(1\), so we guess
        \[ \lim_{x \to 1} \frac{x - 1}{x^{2} - 1} = \tfrac{1}{2}. \]</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.18</span></p>
      <div class="env-body">
        <p>Guess the value of
        \[ \lim_{t \to 0} \frac{\sqrt{t^{2} + 9} - 3}{t^{2}}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We evaluate the expression for values of \(t\) close to \(0\):</p>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead>
              <tr><th>\(t\)</th><th>\(-0.1\)</th><th>\(-0.01\)</th><th>0.01</th><th>0.1</th></tr>
            </thead>
            <tbody>
              <tr><td class="rowlab">\(\frac{\sqrt{t^{2} + 9} - 3}{t^{2}}\)</td><td>0.166620</td><td>0.166666</td><td>0.166666</td><td>0.166620</td></tr>
            </tbody>
          </table>
        </div>
        <p>These values are close to \(\tfrac{1}{6} = 0.166666\dots\), so we guess
        \[ \lim_{t \to 0} \frac{\sqrt{t^{2} + 9} - 3}{t^{2}} = \tfrac{1}{6}. \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — a finite table can suggest a limit that does not exist [pass: enrichment] [source: Mooculus digInWhatIsALimit, sin(pi/x) two-table example] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.5</span></p>
    <div class="env-body">
      <p class="ragged">A table of values can only ever <em>suggest</em> a limit; it can never confirm one, and it can mislead. Consider \(f(x) = \sin(\pi / x)\) as \(x \to 0\). Sampling \(x = 0.1, 0.01, 0.001, \dots\) gives \(\sin(10\pi), \sin(100\pi), \dots = 0\) every time, suggesting the limit is \(0\). But sampling \(x = 0.3, 0.03, 0.003, \dots\) gives \(\sin\!\left(\tfrac{10\pi}{3}\right), \sin\!\left(\tfrac{100\pi}{3}\right), \dots = -\tfrac{\sqrt{3}}{2}\) every time, suggesting \(-\tfrac{\sqrt{3}}{2}\).</p>
      <p class="ragged">In truth, near \(0\) the graph keeps oscillating between \(-1\) and \(1\), no matter how closely we zoom in — \(f\) runs through every value in \([-1, 1]\) infinitely often as \(x \to 0\), so the limit does not exist. The definition requires \(f(x)\) to be close to a single \(L\) for <em>all</em> \(x\) sufficiently near \(0\) — not merely for a convenient list of samples.</p>
    </div>
  </section>

  <!-- expansion:application — close the instantaneous-velocity thread opened at the start of the section [pass: enrichment] [source: Mooculus digInInstantaneousVelocity, ball example; units converted to SI] -->
  <p>We can now close the loop opened at the start of the section. Suppose a ball thrown upward has height \(s(t) = 30t - 5t^{2}\) metres at time \(t\) seconds. Its average velocity over the interval from \(t\) to \(4\) is
  \[ \frac{s(4) - s(t)}{4 - t} = \frac{40 - (30t - 5t^{2})}{4 - t} = \frac{5(t - 2)(t - 4)}{4 - t} = -5(t - 2), \qquad t \neq 4. \]
  The <em>instantaneous</em> velocity at \(t = 4\) is the value this average approaches as the interval shrinks to nothing:
  \[ v(4) = \lim_{t \to 4} \frac{s(4) - s(t)}{4 - t} = \lim_{t \to 4} \bigl[-5(t - 2)\bigr] = -10 \text{ m/s}. \]
  Notice that the original ratio has the indeterminate form \(\tfrac{0}{0}\) at \(t = 4\) — both \(s(4) - s(t)\) and \(4 - t\) tend to \(0\) — so the cancellation that produced \(-5(t - 2)\) was what made the limit accessible.</p>

  <p>The limits above were guessed by looking at function values near the point of interest. In the following sections, we will develop systematic methods for evaluating limits and study more subtle behavior such as one-sided limits and infinite limits.</p>

</article>
</template>

<template id="frag-sec-1-4">
<!-- §1.4 One-Sided and Infinite Limits. Content verbatim from ch01_foundations.tex;
     worked examples E1.4-a/b/c supplemented from open banks (2026-06-12), audit-approved.
     Figures 1.8-1.10 -> 1.10-1.12 (two new figures added upstream in §1.1, §1.3). -->
<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">1.4</span>One-Sided and Infinite Limits</h2>
  </header>

  <p>Near a point \(a\), a function can behave differently depending on which side \(x\) approaches from, and in some cases the values of the function do not approach any finite number at all. These two observations lead to one-sided limits and infinite limits.</p>

  <h3 class="subsec-head">One-sided limits</h3>

  <p>Sometimes we only want to consider one side of the approach to \(a\) — for instance because the function is defined by different formulas on the two sides, or because the graph jumps at \(a\).</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.10</span></p>
    <div class="env-body">
      <p>We write
      \[ \lim_{x \to a^{-}} f(x) = L \]
      and say that the <em>left-hand limit</em> of \(f(x)\) as \(x\) approaches \(a\) is \(L\) if \(f(x)\) approaches \(L\) as \(x\) approaches \(a\) through values less than \(a\). Similarly,
      \[ \lim_{x \to a^{+}} f(x) = L \]
      is the <em>right-hand limit</em>, describing the approach through values greater than \(a\).</p>
    </div>
  </section>

  <figure class="figure" data-fig="one-sided-limits">
    <figcaption><span class="fig-no">Figure 1.13</span> A function whose left-hand and right-hand limits at \(a\) are different.</figcaption>
  </figure>

  <p>The two one-sided limits together determine the two-sided limit.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.5</span><span class="env-name">Criterion for a two-sided limit</span></p>
    <div class="env-body">
      <p>\[ \lim_{x \to a} f(x) = L \quad \Longleftrightarrow \quad \lim_{x \to a^{-}} f(x) = L \ \text{ and } \ \lim_{x \to a^{+}} f(x) = L. \]</p>
    </div>
  </section>

  <p>If the two one-sided limits differ, then the two-sided limit does not exist.</p>

  <!-- expansion:example — use the criterion in both directions, including the "not enough information" case [source: CLP-1 §1.3 #8, #9] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.19</span></p>
      <div class="env-body">
        <p>Suppose \(f\) is defined on all of \(\mathbb{R}\).</p>
        <ol class="prompt-list">
          <li>If \(\lim_{x \to -2} f(x) = 16\), what is \(\lim_{x \to -2^{-}} f(x)\)?</li>
          <li>If instead all we know is \(\lim_{x \to -2^{-}} f(x) = 16\), what can we say about \(\lim_{x \to -2} f(x)\)?</li>
        </ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>For the two-sided limit to equal \(16\), <em>both</em> one-sided limits must equal \(16\); in particular \(\lim_{x \to -2^{-}} f(x) = 16\).</li>
          <li>Not enough information. If the right-hand limit also equals \(16\), then \(\lim_{x \to -2} f(x) = 16\); if it differs or fails to exist, the two-sided limit does not exist.</li>
        </ol>
        <p>The criterion transfers information from the two-sided limit to each side, but only <em>both</em> sides together determine the two-sided limit.</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.20</span></p>
      <div class="env-body">
        <p>Let
        \[ f(x) = \begin{cases} x + 1, & x < 2,\\[4pt] 4 - x, & x \ge 2. \end{cases} \]
        Evaluate \(\lim_{x \to 2^{-}} f(x)\) and \(\lim_{x \to 2^{+}} f(x)\), and determine whether \(\lim_{x \to 2} f(x)\) exists.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>From the left we use the branch \(f(x) = x + 1\), so \(\lim_{x \to 2^{-}} f(x) = 3\).</p>
        <p>From the right we use the branch \(f(x) = 4 - x\), so \(\lim_{x \to 2^{+}} f(x) = 2\).</p>
        <p>Since the left-hand and right-hand limits differ, \(\lim_{x \to 2} f(x)\) does not exist.</p>
        <figure class="figure" data-fig="piecewise-jump">
          <figcaption><span class="fig-no">Figure 1.14</span> Graph of the piecewise function of Example 1.20, showing a jump at \(x = 2\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Infinite limits</h3>

  <p>In some cases, the values of \(f(x)\) do not approach any finite number as \(x \to a\). Instead, they grow arbitrarily large positive or arbitrarily large negative.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.21</span></p>
      <div class="env-body">
        <p>Consider \(f(x) = \frac{1}{x^{2}}\). What happens to \(f(x)\) as \(x \to 0\)?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>If \(x\) is close to \(0\), then \(x^{2}\) is a very small positive number, so \(\frac{1}{x^{2}}\) is very large. For instance,
        \[ \frac{1}{(0.1)^{2}} = 100, \qquad \frac{1}{(0.01)^{2}} = 10{,}000. \]
        The values of \(\frac{1}{x^{2}}\) grow without bound as \(x \to 0\), so no finite \(L\) satisfies the informal definition of the limit; the limit does not exist.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — 1/x versus 1/x^2: the boundary between DNE and ∞ [source: CLP-1 §1.3 #13, #14, #15] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.22</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{x \to 0^{-}} \frac{1}{x}, \qquad \lim_{x \to 0^{+}} \frac{1}{x}, \qquad\text{and}\qquad \lim_{x \to 0} \frac{1}{x}, \]
        and contrast the results with \(\lim_{x \to 0} 1/x^{2}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>As \(x\) approaches \(0\) from the left, \(1/x\) is negative with larger and larger magnitude, so
        \[ \lim_{x \to 0^{-}} \frac{1}{x} = -\infty. \]
        From the right, \(1/x\) is positive and grows without bound, so
        \[ \lim_{x \to 0^{+}} \frac{1}{x} = \infty. \]
        Because the two one-sided behaviors disagree, the two-sided limit does not exist. Since the values do not all grow in the <em>same</em> signed direction, we do <strong>not</strong> write \(\lim_{x \to 0} \frac{1}{x} = \infty\). Contrast \(1/x^{2}\): both sides grow positively, so there we do write \(\lim_{x \to 0} \frac{1}{x^{2}} = \infty\).</p>
      </div>
    </section>
  </div>

  <p>To capture this behavior, we introduce the notation
  \[ \lim_{x \to 0} \frac{1}{x^{2}} = \infty. \]
  The symbol \(\infty\) does not represent a real number; it records that the function's values grow without bound.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.11</span></p>
    <div class="env-body">
      <p>Let \(f\) be defined on both sides of \(a\), except possibly at \(a\) itself. We write
      \[ \lim_{x \to a} f(x) = \infty \]
      if the values of \(f(x)\) can be made arbitrarily large by taking \(x\) sufficiently close to \(a\), with \(x \neq a\). We call such a limit an <em>infinite limit</em>. Similarly,
      \[ \lim_{x \to a} f(x) = -\infty \]
      if the values of \(f(x)\) can be made arbitrarily large negative by taking \(x\) sufficiently close to \(a\), with \(x \neq a\).</p>
    </div>
  </section>

  <!-- expansion:caution — "lim = ∞" records unbounded growth; it does not assert the limit exists [pass: enrichment] [source: Mooculus digInLimitsOfTheFormNonZeroOverZero] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.6</span></p>
    <div class="env-body">
      <p>Writing \(\lim_{x \to a} f(x) = \infty\) does <em>not</em> mean that the limit exists in the ordinary sense. It is shorthand recording a particular way the limit <em>fails</em> to exist as a finite real number: the values of \(f\) grow without bound. The symbol \(\infty\) cannot be added, multiplied, or otherwise manipulated like an ordinary number. Reading “\(= \infty\)” as though it were an ordinary limit value is a common slip.</p>
    </div>
  </section>

  <p>One-sided versions,
  \[ \begin{aligned} \lim_{x \to a^{-}} f(x) &= \infty, &\qquad \lim_{x \to a^{+}} f(x) &= \infty, \\ \lim_{x \to a^{-}} f(x) &= -\infty, &\qquad \lim_{x \to a^{+}} f(x) &= -\infty, \end{aligned} \]
  are defined analogously. The four cases are illustrated in Figure 1.15.</p>

  <figure class="figure" data-fig="one-sided-infinite">
    <figcaption><span class="fig-no">Figure 1.15</span> The four typical one-sided infinite limits.</figcaption>
  </figure>

  <h3 class="subsec-head">Vertical asymptotes</h3>

  <p>Infinite limits are closely related to vertical asymptotes.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.12</span></p>
    <div class="env-body">
      <p>The vertical line \(x = a\) is called a <em>vertical asymptote</em> of the curve \(y = f(x)\) if at least one of the following holds:
      \[ \lim_{x \to a^{-}} f(x) = \pm\infty \qquad \text{or} \qquad \lim_{x \to a^{+}} f(x) = \pm\infty. \]</p>
    </div>
  </section>

  <!-- expansion:strategy — a reusable recipe for locating vertical asymptotes [pass: enrichment] [source: Mooculus digInVerticalAsymptotes] -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">1.3</span><span class="env-name">Locating vertical asymptotes</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Find the candidate points: places where the formula is undefined, the graph breaks, or the expression otherwise looks suspect — though still approachable from within the domain. For a rational function, these are usually the zeros of the denominator.</li>
        <li>At each candidate \(x = a\), examine the one-sided limits. When the expression has the form \(\frac{\text{nonzero}}{0}\), determine the sign of the small denominator on each side to decide between \(+\infty\) and \(-\infty\).</li>
        <li>If at least one one-sided limit is \(+\infty\) or \(-\infty\), the line \(x = a\) is a vertical asymptote. If instead the problematic factor cancels completely and the resulting one-sided limits are finite, then there is no vertical asymptote there.</li>
      </ol>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.23</span></p>
      <div class="env-body">
        <p>Does the curve \(y = \frac{2x}{x - 3}\) have a vertical asymptote?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The denominator is zero only at \(x = 3\), so \(x = 3\) is the only candidate. As \(x \to 3^{+}\), the denominator \(x - 3\) is a small positive number while the numerator \(2x\) is close to \(6\), so
        \[ \lim_{x \to 3^{+}} \frac{2x}{x - 3} = \infty. \]
        As \(x \to 3^{-}\), the denominator is a small negative number while the numerator is still close to \(6\), so
        \[ \lim_{x \to 3^{-}} \frac{2x}{x - 3} = -\infty. \]
        At least one one-sided limit is infinite, so the line \(x = 3\) is a vertical asymptote, as shown in Figure 1.16.</p>
        <figure class="figure" data-fig="vertical-asymptote">
          <figcaption><span class="fig-no">Figure 1.16</span> The graph of \(y = \frac{2x}{x - 3}\) has a vertical asymptote at \(x = 3\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <!-- expansion:example — a zero denominator does not guarantee a vertical asymptote (the failure case) [source: CLP-1 §3.6.1 #1] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.24</span></p>
      <div class="env-body">
        <p>Suppose \(f(x) = \frac{g(x)}{x^{2} - 9}\) for some function \(g\). Must the line \(x = -3\) be a vertical asymptote of \(y = f(x)\)?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>No. The denominator does vanish at \(x = -3\), so \(x = -3\) is a <em>candidate</em> — but whether it is an asymptote depends on the numerator. If \(g(x) = 1\), then \(f(x) = \frac{1}{x^{2} - 9}\) blows up near \(-3\), and \(x = -3\) is a vertical asymptote. But if \(g(x) = x^{2} - 9\), then \(f(x) = 1\) at every point of its domain, and there is no asymptote at all. A zero denominator marks a place to <em>investigate</em> with one-sided limits, not a guaranteed asymptote.</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.25</span></p>
      <div class="env-body">
        <p>Guess the value of \(\lim_{x \to 0^{+}} \ln x\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Since \(\ln x\) is defined only for \(x > 0\), the point \(x = 0\) sits at the boundary of the domain \((0, \infty)\) and can only be approached from within it — that is, from the right. As \(x \to 0^{+}\), the values of \(\ln x\) decrease without bound, so
        \[ \lim_{x \to 0^{+}} \ln x = -\infty. \]
        Therefore \(x = 0\) is a vertical asymptote of the graph of \(y = \ln x\).</p>
        <figure class="figure" data-fig="ln-asymptote">
          <figcaption><span class="fig-no">Figure 1.17</span> The graph of \(y = \ln x\) has a vertical asymptote at \(x = 0\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

</article>
