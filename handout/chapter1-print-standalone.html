<template id="frag-sec-1-5">
<!-- §1.5 Limit Laws and Computational Techniques. Content verbatim from ch01_foundations.tex;
     worked examples E1.5-a/b/c + O1.5-d supplemented from open banks (2026-06-12), audit-approved. -->
<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">1.5</span>Limit Laws and Computational Techniques</h2>
  </header>

  <p>In the previous sections we used tables and graphs to guess the values of limits. We now record algebraic properties that let us compute limits more systematically. These properties can be justified rigorously once we have the precise definition of a limit (see the next section); for now, they provide a reliable tool-kit.</p>

  <h3 class="subsec-head">The limit laws</h3>

  <!-- expansion:intuition — why the limit laws are believable, before the formal statement [pass: enrichment] -->
  <p>Each of these laws says something we already expect. If \(f(x)\) is settling toward \(L\) and \(g(x)\) toward \(M\) as \(x\) nears \(a\), then \(f(x) + g(x)\) ought to settle toward \(L + M\), the product \(f(x)\,g(x)\) toward \(LM\), and so on. In short, the laws assert that combining the functions first and then taking the limit gives the same result as taking the limits first and then combining.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">1.2</span><span class="env-name">Limit laws</span></p>
    <div class="env-body">
      <p>Suppose \(c\) is a constant and both \(\lim_{x \to a} f(x)\) and \(\lim_{x \to a} g(x)\) exist. Then
      \[ \begin{aligned} \lim_{x \to a}\bigl(f(x) + g(x)\bigr) &= \lim_{x \to a} f(x) + \lim_{x \to a} g(x),\\ \lim_{x \to a}\bigl(f(x) - g(x)\bigr) &= \lim_{x \to a} f(x) - \lim_{x \to a} g(x),\\ \lim_{x \to a}\bigl(c \, f(x)\bigr) &= c \lim_{x \to a} f(x),\\ \lim_{x \to a}\bigl(f(x) g(x)\bigr) &= \left(\lim_{x \to a} f(x)\right)\!\left(\lim_{x \to a} g(x)\right). \end{aligned} \]
      If \(\lim_{x \to a} g(x) \neq 0\), then
      \[ \lim_{x \to a} \frac{f(x)}{g(x)} = \frac{\lim_{x \to a} f(x)}{\lim_{x \to a} g(x)}. \]
      Moreover, for every positive integer \(n\),
      \[ \lim_{x \to a} \bigl[f(x)\bigr]^{n} = \left[\lim_{x \to a} f(x)\right]^{n}. \]</p>
    </div>
  </section>

  <p>In words, the limit of a sum / difference / constant multiple / product / integer power is the corresponding combination of the limits, and the limit of a quotient is the quotient of the limits whenever the denominator's limit is not zero.</p>

  <!-- expansion:caution — the quotient law needs a nonzero denominator limit; 0/0 is a signal to simplify, not a verdict [pass: enrichment] [source: CLP-1 §1.4 arithmetic of limits] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.7</span></p>
    <div class="env-body">
      <p>The quotient law applies only when the denominator's limit is <em>nonzero</em>. If \(\lim_{x \to a} g(x) = 0\), the law says nothing, and you may not conclude that the quotient's limit fails to exist or that it takes any particular value. A resulting \(\tfrac{0}{0}\) is a signal to do more work — usually algebraic simplification, as in the examples below — not a verdict about the limit.</p>
    </div>
  </section>

  <p>For now, the laws let us evaluate many limits directly.</p>

  <!-- expansion:example — apply the limit laws abstractly, with no formula for f [source: CLP-1 §1.4 #42] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.26</span></p>
      <div class="env-body">
        <p>Suppose \(\lim_{x \to -1} f(x) = -1\). Evaluate
        \[ \lim_{x \to -1} \frac{x\,f(x) + 3}{2 f(x) + 1}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We never need a formula for \(f\). By the product law, \(\lim_{x \to -1} x f(x) = (-1)(-1) = 1\); by the sum and constant-multiple laws the numerator tends to \(1 + 3 = 4\) and the denominator tends to \(2(-1) + 1 = -1\). The denominator's limit is nonzero, so the quotient law applies:
        \[ \lim_{x \to -1} \frac{x f(x) + 3}{2 f(x) + 1} = \frac{4}{-1} = -4. \]</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Direct substitution</h3>

  <p>A first consequence of the limit laws is that polynomials and rational functions behave in the easiest way possible.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.6</span></p>
    <div class="env-body">
      <p>For every positive integer \(n\),
      \[ \begin{aligned} \lim_{x \to a} x &= a,\\ \lim_{x \to a} x^{n} &= a^{n}. \end{aligned} \]
      Consequently, if \(p(x) = a_{n} x^{n} + a_{n-1} x^{n - 1} + \dots + a_{0}\) is a polynomial, then
      \[ \lim_{x \to a} p(x) = p(a). \]
      If \(r(x)\) is a rational function and \(r(a)\) is defined, then
      \[ \lim_{x \to a} r(x) = r(a). \]</p>
    </div>
  </section>

  <p>For polynomials and rational functions where the denominator does not vanish at \(a\), direct substitution is therefore the fastest route to the limit.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.27</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{x \to 1} \frac{x^{3} + 2x^{2} - 1}{5 - 3x}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The numerator and denominator are polynomials, so their limits at \(x = 1\) are computed by direct substitution:
        \[ \begin{aligned} \lim_{x \to 1}\bigl(x^{3} + 2x^{2} - 1\bigr) &= 1 + 2 - 1 = 2,\\ \lim_{x \to 1}(5 - 3x) &= 5 - 3 = 2. \end{aligned} \]
        The denominator's limit is nonzero, so the quotient law gives
        \[ \lim_{x \to 1} \frac{x^{3} + 2x^{2} - 1}{5 - 3x} = \frac{2}{2} = 1. \]</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Algebraic simplification</h3>

  <p>When direct substitution produces an indeterminate form such as \(\tfrac{0}{0}\), we first simplify the expression and then take the limit.</p>

  <!-- expansion:example — why 0/0 is indeterminate: it can equal anything [source: CLP-1 §1.4 #2, #5] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.28</span></p>
      <div class="env-body">
        <ol class="prompt-list">
          <li>Find functions \(f\) and \(g\) with \(\lim_{x \to 3} f(x) = \lim_{x \to 3} g(x) = 0\) and \(\lim_{x \to 3} \frac{f(x)}{g(x)} = 10\).</li>
          <li>What are the possible values of \(\lim_{x \to 3} \frac{f(x)}{g(x)}\), given only that both \(f\) and \(g\) tend to \(0\)?</li>
        </ol>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ol class="sol-list">
          <li>Take \(f(x) = 10(x - 3)\) and \(g(x) = x - 3\). Both tend to \(0\) at \(3\), yet \(\frac{f(x)}{g(x)} = 10\) wherever it is defined, so the quotient's limit is \(10\).</li>
          <li>Replacing \(10\) by any constant \(c\) gives limit \(c\); choices such as \(f(x) = x - 3\), \(g(x) = (x - 3)^{3}\) give \(\infty\); swapping signs gives \(-\infty\); and \(f(x) = x - 3\), \(g(x) = |x - 3|\) makes the limit fail to exist.</li>
        </ol>
        <p>A \(\tfrac{0}{0}\) form can therefore equal <em>anything</em> — which is exactly why it is called indeterminate, and why we must simplify before judging.</p>
      </div>
    </section>
  </div>

  <!-- [FIGURE-OPPORTUNITY] removable-hole: y = (x-1)/(x^2-1) = 1/(x+1) with open hole at x = 1, showing that cancelling the common factor removes one missing point without changing the limit. Pairs with Ex 1.29–1.31. -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.29</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{x \to 1} \frac{x - 1}{x^{2} - 1}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Direct substitution gives \(\tfrac{0}{0}\), so we simplify:
        \[ \begin{aligned} \frac{x - 1}{x^{2} - 1} &= \frac{x - 1}{(x - 1)(x + 1)}\\ &= \frac{1}{x + 1}, \qquad x \neq 1. \end{aligned} \]
        Therefore
        \[ \lim_{x \to 1} \frac{x - 1}{x^{2} - 1} = \lim_{x \to 1} \frac{1}{x + 1} = \tfrac{1}{2}. \]</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.30</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{t \to 0} \frac{\sqrt{t^{2} + 9} - 3}{t^{2}}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Direct substitution gives \(\tfrac{0}{0}\), so we rationalise the numerator:
        \[ \begin{aligned} \frac{\sqrt{t^{2} + 9} - 3}{t^{2}} \cdot \frac{\sqrt{t^{2} + 9} + 3}{\sqrt{t^{2} + 9} + 3} &= \frac{t^{2} + 9 - 9}{t^{2}\bigl(\sqrt{t^{2} + 9} + 3\bigr)}\\ &= \frac{1}{\sqrt{t^{2} + 9} + 3}, \qquad t \neq 0. \end{aligned} \]
        Therefore
        \[ \lim_{t \to 0} \frac{\sqrt{t^{2} + 9} - 3}{t^{2}} = \lim_{t \to 0} \frac{1}{\sqrt{t^{2} + 9} + 3} = \tfrac{1}{6}. \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — combine fractions before taking the limit (Strategy step 2 in action) [source: CLP-1 §1.4 extra, prob_s1.4.tex:751] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.31</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{t \to \frac{1}{2}} \frac{\frac{1}{3t^{2}} + \frac{1}{t^{2} - 1}}{2t - 1}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Direct substitution gives \(\tfrac{0}{0}\). Combining the two fractions in the numerator over the common denominator \(3t^{2}(t^{2} - 1)\),
        \[ \begin{aligned} \frac{1}{3t^{2}} + \frac{1}{t^{2} - 1} &= \frac{(t^{2} - 1) + 3t^{2}}{3t^{2}(t^{2} - 1)} = \frac{4t^{2} - 1}{3t^{2}(t^{2} - 1)} \\ &= \frac{(2t - 1)(2t + 1)}{3t^{2}(t^{2} - 1)}. \end{aligned} \]
        Dividing by \(2t - 1\) cancels the troublesome factor, so
        \[ \begin{aligned} \lim_{t \to \frac{1}{2}} \frac{\frac{1}{3t^{2}} + \frac{1}{t^{2} - 1}}{2t - 1} &= \lim_{t \to \frac{1}{2}} \frac{2t + 1}{3t^{2}(t^{2} - 1)} \\ &= \frac{2}{\tfrac{3}{4}\bigl(-\tfrac{3}{4}\bigr)} = -\frac{32}{9}. \end{aligned} \]</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Limits of piecewise-defined functions</h3>

  <p>Some limits are easiest to analyse by splitting into cases.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.32</span></p>
      <div class="env-body">
        <p>Evaluate \(\lim_{x \to 0} |x|\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Using the piecewise description
        \[ |x| = \begin{cases} x, & x \ge 0,\\[4pt] -x, & x < 0, \end{cases} \]
        we compute
        \[ \begin{aligned} \lim_{x \to 0^{+}} |x| &= \lim_{x \to 0^{+}} x = 0, \\ \lim_{x \to 0^{-}} |x| &= \lim_{x \to 0^{-}} (-x) = 0. \end{aligned} \]
        Both one-sided limits equal \(0\), so \(\lim_{x \to 0} |x| = 0\).</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.33</span></p>
      <div class="env-body">
        <p>The greatest integer function \([x]\), often also written \(\lfloor x\rfloor\), is the largest integer less than or equal to \(x\), so that \([4] = 4\), \([4.1] = 4\), and \([4.8] = 4\). Determine whether \(\lim_{x \to 3} [x]\) exists.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>As \(x \to 3^{+}\), the values of \(x\) lie just above \(3\), so \([x] = 3\) and \(\lim_{x \to 3^{+}} [x] = 3\). As \(x \to 3^{-}\), the values of \(x\) lie just below \(3\), so \([x] = 2\) and \(\lim_{x \to 3^{-}} [x] = 2\). The two one-sided limits differ, so \(\lim_{x \to 3} [x]\) does not exist.</p>
        <figure class="figure" data-fig="floor-function">
          <figcaption><span class="fig-no">Figure 1.18</span> The greatest integer function \([x]\) has a jump at every integer.</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The squeeze theorem</h3>

  <p>The limit laws require that both constituent limits exist, but sometimes one of the factors has no limit at all. A useful technique is to trap the expression between two simpler functions whose limits agree.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">1.3</span><span class="env-name">Squeeze theorem</span></p>
    <div class="env-body">
      <p>Suppose that
      \[ g(x) \le f(x) \le h(x) \]
      for all \(x\) near \(a\), except possibly at \(x = a\). If
      \[ \lim_{x \to a} g(x) = L, \qquad \lim_{x \to a} h(x) = L, \]
      then \(\lim_{x \to a} f(x) = L\).</p>
    </div>
  </section>

  <figure class="figure" data-fig="squeeze-theorem">
    <figcaption><span class="fig-no">Figure 1.19</span> The squeeze theorem: \(f\) is trapped between \(g\) and \(h\), which share the same limit \(L\).</figcaption>
  </figure>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.34</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{x \to 0} x^{2} \sin\!\left(\frac{1}{x}\right). \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We cannot apply the product law because \(\lim_{x \to 0} \sin(1/x)\) does not exist. Instead, we use the bound
        \[ -1 \le \sin\!\left(\frac{1}{x}\right) \le 1 \]
        valid for all \(x \neq 0\). Multiplying by \(x^{2} \ge 0\),
        \[ -x^{2} \le x^{2} \sin\!\left(\frac{1}{x}\right) \le x^{2}. \]
        Since \(\lim_{x \to 0}(-x^{2}) = 0 = \lim_{x \to 0} x^{2}\), the squeeze theorem yields
        \[ \lim_{x \to 0} x^{2} \sin\!\left(\frac{1}{x}\right) = 0. \]</p>
        <figure class="figure" data-fig="squeeze-x2sin">
          <figcaption><span class="fig-no">Figure 1.20</span> The graph of \(y = x^{2}\sin(1/x)\) squeezed between \(y = -x^{2}\) and \(y = x^{2}\).</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.35</span></p>
      <div class="env-body">
        <p>Evaluate
        \[ \lim_{x \to 0} x \cos\!\left(\frac{1}{x}\right). \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Since \(\left|\cos(1/x)\right| \le 1\) for all \(x \neq 0\),
        \[ \left|x \cos\!\left(\frac{1}{x}\right)\right| \le |x|, \]
        equivalently
        \[ -|x| \le x \cos\!\left(\frac{1}{x}\right) \le |x|. \]
        Since \(\lim_{x \to 0}(-|x|) = 0 = \lim_{x \to 0} |x|\), the squeeze theorem yields
        \[ \lim_{x \to 0} x \cos\!\left(\frac{1}{x}\right) = 0. \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:application — squeeze theorem payoff: the bridge to sin(x)/x and trigonometric derivatives [source: CLP-1 §1.4 squeeze; standard application] -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.5</span></p>
    <div class="env-body">
      <p>The squeeze theorem also plays a central role beyond routine exercises. It is the standard tool for proving the fundamental trigonometric limit \(\lim_{x \to 0} \frac{\sin x}{x} = 1\), where the ratio is trapped between geometric area bounds. That limit, in turn, is what makes the derivative formulas for \(\sin x\) and \(\cos x\) work in Chapter 3.</p>
    </div>
  </section>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">1.4</span><span class="env-name">Computing a limit \(\lim_{x \to a} f(x)\)</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><em>Try direct substitution first.</em> If \(f(a)\) is defined and the expression is a polynomial or rational function with a nonzero denominator at \(a\), then the limit equals \(f(a)\).</li>
        <li><em>If substitution gives an indeterminate form</em> such as \(\tfrac{0}{0}\), simplify algebraically: factor and cancel, rationalise a numerator or denominator, or combine fractions.</li>
        <li><em>For a piecewise function</em>, evaluate the two one-sided limits on the appropriate branches and check whether they agree.</li>
        <li><em>If the expression is trapped between two simpler ones</em> whose limits at \(a\) are known and equal, apply the squeeze theorem.</li>
        <li><em>If the values grow without bound</em>, the limit is \(\pm\infty\) and the line \(x = a\) is a vertical asymptote.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:example — synthesis: force a constant so the limit exists, then compute it [source: CLP-1 §1.4 #43] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.36</span></p>
      <div class="env-body">
        <p>Find the value of the constant \(a\) for which
        \[ \lim_{x \to -2} \frac{x^{2} + a x + 3}{x^{2} + x - 2} \]
        exists, and evaluate the limit for that value of \(a\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The denominator factors as \((x + 2)(x - 1)\) and tends to \(0\) as \(x \to -2\). If the numerator tended to a nonzero number, the quotient would blow up and the limit could not exist; so the numerator must also tend to \(0\): \(4 - 2a + 3 = 0\), giving \(a = \tfrac{7}{2}\). With this \(a\),
        \[ \begin{aligned} \lim_{x \to -2} \frac{x^{2} + \tfrac{7}{2}x + 3}{x^{2} + x - 2} &= \lim_{x \to -2} \frac{(x + 2)\bigl(x + \tfrac{3}{2}\bigr)}{(x + 2)(x - 1)} \\ &= \lim_{x \to -2} \frac{x + \tfrac{3}{2}}{x - 1} = \frac{-\tfrac{1}{2}}{-3} = \frac{1}{6}. \end{aligned} \]
        Notice the flow of reasoning: the <em>existence</em> of the limit forced the value of \(a\), and then the techniques of this section finished the computation.</p>
      </div>
    </section>
  </div>

</article>
</template>

<template id="frag-sec-1-6">
<!-- §1.6 The Precise Definition of a Limit. Content verbatim from ch01_foundations.tex;
     worked examples E1.6-a/b + O1.6-c/d supplemented from open banks + one AI-authored
     (O1.6-d), 2026-06-12, audit-approved. Figure 1.11 -> 1.13. -->
<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">1.6</span>The Precise Definition of a Limit</h2>
  </header>

  <p>From the time of Newton and Leibniz, calculus was remarkably successful at solving problems in geometry, mechanics, and astronomy. For a long time, however, there was also controversy about its logical foundations. Early arguments often relied on infinitesimals — quantities thought of as being extremely small but not described in a fully precise way — and mathematicians continued to ask what it really means to say that \(x\) approaches \(a\) or that \(f(x)\) approaches \(L\). The modern resolution, developed in the nineteenth century, is the \(\varepsilon\)-\(\delta\) definition of a limit, which gave calculus the level of rigor used in modern mathematics.</p>

  <!-- expansion:history — the arithmetisation of analysis: Bolzano, Cauchy, Weierstrass [source: Boyer, A History of the Calculus; Kline, Mathematical Thought from Ancient to Modern Times] -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">1.6</span><span class="env-name">Historical note</span></p>
    <div class="env-body">
      <p>The drive to replace intuitive arguments with arithmetic precision is known as the <em>arithmetisation of analysis</em>. Bolzano anticipated a more rigorous, inequality-based treatment of continuity and convergence, while Cauchy gave limits and continuity a more systematic analytic form. Weierstrass, lecturing at Berlin from the 1860s onward, refined these ideas into the \(\varepsilon\text{-}\delta\) formulation that is essentially the one presented here.</p>
    </div>
  </section>

  <p>In the previous sections we used graphs, tables, and algebraic techniques to study limits, and we stated the limit laws without proof. Those arguments rested on informal phrases such as “\(f(x)\) is close to \(L\)” and “\(x\) is close to \(a\).” To make the arguments rigorous — and, eventually, to prove the limit laws — we need a definition that replaces “close” with numerical precision.</p>

  <!-- expansion:application — read ε and δ as engineering tolerances, a concrete why-it-matters [pass: enrichment] [source: APEX §1.2, x-tolerance = delta, y-tolerance = epsilon] -->
  <p>It helps to read \(\varepsilon\) and \(\delta\) as <em>tolerances</em>. In engineering and manufacturing one specifies how far a finished quantity may stray from its target: an output tolerance \(\varepsilon\) around the desired value \(L\). One then asks how tightly the input must be controlled near \(a\) to keep the result within that tolerance — an input tolerance \(\delta\). The definition below makes this everyday promise precise: control the input closely enough, and the output stays within specification.</p>

  <p>To motivate the definition, consider the function
  \[ f(x) = \begin{cases} 2x - 1, & x \neq 3,\\[4pt] 6, & x = 3. \end{cases} \]
  When \(x\) is close to \(3\) but \(x \neq 3\), the value \(f(x) = 2x - 1\) is close to \(5\). Intuitively, we expect \(\lim_{x \to 3} f(x) = 5\). But how close, exactly? We begin by making the informal phrase “close” numerically precise.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.37</span></p>
      <div class="env-body">
        <p>For the function above, how close must \(x\) be to \(3\) so that \(f(x)\) differs from \(5\) by less than \(0.1\)?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We want \(|f(x) - 5| < 0.1\). For \(x \neq 3\),
        \[ \begin{aligned} |f(x) - 5| &= |(2x - 1) - 5|\\ &= |2x - 6|\\ &= 2 |x - 3|. \end{aligned} \]
        Requiring \(2 |x - 3| < 0.1\) is equivalent to \(|x - 3| < 0.05\). Therefore, if \(0 < |x - 3| < 0.05\), then \(|f(x) - 5| < 0.1\).</p>
      </div>
    </section>
  </div>

  <p>Tightening the tolerance from \(0.1\) to \(0.01\), the same reasoning gives \(|f(x) - 5| < 0.01\) whenever \(0 < |x - 3| < 0.005\). As the tolerance shrinks, so must the neighborhood of \(3\). More generally, for any \(\varepsilon > 0\), the same manipulation gives \(|f(x) - 5| < \varepsilon\) whenever \(0 < |x - 3| < \tfrac{\varepsilon}{2}\); we may therefore take \(\delta = \tfrac{\varepsilon}{2}\). The word <em>arbitrarily</em> in the informal definition means precisely: we can answer the question for <em>every</em> \(\varepsilon > 0\), not just for a few specific tolerances.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.13</span></p>
    <div class="env-body">
      <p>Let \(f\) be a function defined on an open interval containing \(a\), except possibly at \(a\) itself. We say that
      \[ \lim_{x \to a} f(x) = L \]
      if for every \(\varepsilon > 0\) there exists a \(\delta > 0\) such that
      \[ |f(x) - L| < \varepsilon \qquad \text{whenever} \qquad 0 < |x - a| < \delta. \]</p>
      <p class="informal">Informally, we can force \(f(x)\) as close to \(L\) as we like by taking \(x\) close enough to \(a\) (but not equal to \(a\)).</p>
    </div>
  </section>

  <p>Figure 1.21 gives a geometric reading of the definition. If \(x\) is restricted to the punctured interval \((a - \delta, a + \delta)\) with \(x \neq a\), then the corresponding values of \(f(x)\) lie in the target strip \((L - \varepsilon, L + \varepsilon)\). The value \(f(a)\) itself may be different from \(L\): the limit depends only on the behavior of \(f(x)\) when \(x\) is close to \(a\), not on what happens at \(x = a\).</p>

  <figure class="figure" data-fig="precise-limit">
    <figcaption><span class="fig-no">Figure 1.21</span> Geometric interpretation of the \(\varepsilon\)-\(\delta\) definition; \(\delta\) depends on \(\varepsilon\).</figcaption>
  </figure>

  <p>The condition \(0 < |x - a| < \delta\) says that \(x\) lies within distance \(\delta\) of \(a\), but \(x \neq a\). The inequality \(|f(x) - L| < \varepsilon\) says that \(f(x)\) lies within distance \(\varepsilon\) of \(L\). The key phrase is “for every \(\varepsilon > 0\)”: no matter how small a tolerance \(\varepsilon\) we demand, we must be able to find a corresponding \(\delta\).</p>

  <!-- expansion:intuition — the ε-δ definition read as a challenge-and-response game [pass: enrichment] [source: CLP-1 clp_limits_notes §1.7] -->
  <p>It is useful to picture the definition as a challenge-and-response game. A skeptic names a tolerance \(\varepsilon > 0\) — how close to \(L\) they insist \(f(x)\) must be — and our job is to respond with a \(\delta > 0\) that meets the demand: every \(x\) within \(\delta\) of \(a\) (but not equal to \(a\)) is sent to within \(\varepsilon\) of \(L\). The limit equals \(L\) precisely when we can answer <em>every</em> challenge, no matter how small the \(\varepsilon\). This is why \(\varepsilon\) comes first and \(\delta\) second: \(\delta\) is chosen in reply to \(\varepsilon\).</p>

  <!-- expansion:example — diagnose a wrong definition: order of tolerances and direction of implication [source: APEX §1.2 #1, #2] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.38</span></p>
      <div class="env-body">
        <p>What is wrong with the following attempted definition of \(\lim_{x \to a} f(x) = L\)?</p>
        <p><em>“Given any \(\delta > 0\), there exists \(\varepsilon > 0\) such that whenever \(|f(x) - L| < \varepsilon\), we have \(0 < |x - a| < \delta\).”</em></p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Two things are reversed. First, the <em>order of the tolerances</em>: the challenge must come on the \(y\)-side — “given any \(\varepsilon\)” — and \(\delta\) is our response; the attempted version lets us pick the easy quantity after seeing the hard one. Second, the <em>direction of the implication</em>: the definition must say that closeness of \(x\) to \(a\) forces closeness of \(f(x)\) to \(L\), that is, \(0 < |x - a| < \delta\) implies \(|f(x) - L| < \varepsilon\) — not the other way around. Correcting both gives exactly Definition 1.13.</p>
      </div>
    </section>
  </div>

  <p>A first payoff of the \(\varepsilon\)-\(\delta\) definition is that the value of a limit, when it exists, is unambiguous.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">1.7</span><span class="env-name">Uniqueness of limits</span></p>
    <div class="env-body">
      <p>If \(\lim_{x \to a} f(x)\) exists, then it is unique.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose that
      \[ \begin{aligned} \lim_{x \to a} f(x) &= L,\\ \lim_{x \to a} f(x) &= M, \end{aligned} \]
      and that \(L \neq M\). Let \(\varepsilon = \tfrac{|L - M|}{2}\). By the definition of the limit, there exist \(\delta_{1}, \delta_{2} > 0\) such that
      \[ |f(x) - L| < \varepsilon \quad \text{whenever} \quad 0 < |x - a| < \delta_{1}, \]
      and
      \[ |f(x) - M| < \varepsilon \quad \text{whenever} \quad 0 < |x - a| < \delta_{2}. \]
      If \(0 < |x - a| < \min\{\delta_{1}, \delta_{2}\}\), both inequalities hold. By the triangle inequality,
      \[ \begin{aligned} |L - M| &= |L - f(x) + f(x) - M|\\ &\le |L - f(x)| + |f(x) - M|\\ &< 2\varepsilon\\ &= |L - M|, \end{aligned} \]
      which is impossible. Therefore \(L = M\).</p>
    </div>
  </section>

  <p>We now verify several limits directly from the definition, building from the simplest case to one that requires an extra step.</p>

  <!-- expansion:example — a constant function: any δ works (δ need not be a function of ε) [source: APEX §1.2 #3] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.39</span></p>
      <div class="env-body">
        <p>Show from the definition that \(\lim_{x \to 2} 5 = 5\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Given \(\varepsilon > 0\), we need \(|5 - 5| < \varepsilon\) whenever \(0 < |x - 2| < \delta\). But \(|5 - 5| = 0 < \varepsilon\) is <em>always</em> true, no matter what \(x\) does. So any choice of \(\delta\) works; we may simply take \(\delta = \varepsilon\) (or \(\delta = 1\), or anything else). This is the one situation where \(\delta\) need not depend on \(\varepsilon\) at all.</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.40</span></p>
      <div class="env-body">
        <p>Show from the definition that \(\lim_{x \to 3} (4x - 5) = 7\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Given \(\varepsilon > 0\), we seek \(\delta > 0\) with
        \[ |(4x - 5) - 7| < \varepsilon \quad \text{whenever} \quad 0 < |x - 3| < \delta. \]
        Since
        \[ \begin{aligned} |(4x - 5) - 7| &= |4x - 12|\\ &= 4 |x - 3|, \end{aligned} \]
        it is enough to require \(4 |x - 3| < \varepsilon\), i.e. \(|x - 3| < \tfrac{\varepsilon}{4}\). We choose \(\delta = \tfrac{\varepsilon}{4}\); then whenever \(0 < |x - 3| < \delta\),
        \[ \begin{aligned} |(4x - 5) - 7| &= 4 |x - 3|\\ &< 4 \cdot \tfrac{\varepsilon}{4}\\ &= \varepsilon. \end{aligned} \]
        Therefore \(\lim_{x \to 3} (4x - 5) = 7\).</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.41</span></p>
      <div class="env-body">
        <p>Show from the definition that \(\lim_{x \to 1} (x^{2} - 5x + 6) = 2\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Given \(\varepsilon > 0\), we seek \(\delta > 0\) with
        \[ |(x^{2} - 5x + 6) - 2| < \varepsilon \quad \text{whenever} \quad 0 < |x - 1| < \delta. \]
        We first simplify:
        \[ \begin{aligned} |(x^{2} - 5x + 6) - 2| &= |x^{2} - 5x + 4|\\ &= |(x - 1)(x - 4)|. \end{aligned} \]
        The factor \(|x - 4|\) depends on \(x\). To control it, first assume \(|x - 1| < 1\). Then
        \[ \begin{aligned} |x - 1| < 1 &\implies -1 < x - 1 < 1\\ &\implies 0 < x < 2\\ &\implies -4 < x - 4 < -2\\ &\implies |x - 4| < 4. \end{aligned} \]
        So whenever \(|x - 1| < 1\), we have \(|(x - 1)(x - 4)| < 4 |x - 1|\). To force this below \(\varepsilon\), we also require \(4 |x - 1| < \varepsilon\), i.e. \(|x - 1| < \tfrac{\varepsilon}{4}\). Choosing
        \[ \delta = \min\!\left\{1, \tfrac{\varepsilon}{4}\right\}, \]
        we get both inequalities at once, and so
        \[ \begin{aligned} |(x^{2} - 5x + 6) - 2| &= |(x - 1)(x - 4)|\\ &< 4 |x - 1|\\ &< 4 \cdot \tfrac{\varepsilon}{4}\\ &= \varepsilon. \end{aligned} \]
        Therefore \(\lim_{x \to 1} (x^{2} - 5x + 6) = 2\).</p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — δ is never unique; any smaller positive value also works [pass: enrichment] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span><span class="env-num">1.8</span></p>
    <div class="env-body">
      <p>The value of \(\delta\) is never unique. Once a valid \(\delta\) has been found, any smaller positive value also works, because shrinking the input neighborhood can only tighten the conclusion. The goal of an \(\varepsilon\text{-}\delta\) proof is to exhibit <em>one</em> working \(\delta\), not “the” \(\delta\). In Example 1.40, for instance, \(\delta = \varepsilon/5\) works just as well as \(\delta = \varepsilon/4\).</p>
    </div>
  </section>

  <!-- expansion:example — feed a known inequality into the definition: lim sin x = 0 [source: APEX §1.2 #8] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.42</span></p>
      <div class="env-body">
        <p>Using the fact that \(|\sin x| \le |x|\) for all \(x\), show from the definition that \(\lim_{x \to 0} \sin x = 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Given \(\varepsilon > 0\), choose \(\delta = \varepsilon\). If \(0 < |x - 0| < \delta\), then
        \[ |\sin x - 0| = |\sin x| \le |x| < \delta = \varepsilon. \]
        Therefore \(\lim_{x \to 0} \sin x = 0\). The borrowed inequality did all the work: no factoring, no auxiliary bound — the bounding step was handed to us for free.</p>
      </div>
    </section>
  </div>

  <p>The four examples above share a common pattern, which we record as a general strategy.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">1.5</span><span class="env-name">Verifying a limit from the \(\varepsilon\)-\(\delta\) definition</span></p>
    <div class="env-body">
      <p>To show that \(\lim_{x \to a} f(x) = L\):</p>
      <ol class="steps">
        <li>Start with a generic \(\varepsilon > 0\). The task is to find a \(\delta > 0\) (which may depend on \(\varepsilon\)) that makes the definition work.</li>
        <li>Work with the quantity \(|f(x) - L|\) and bound it above by an expression involving \(|x - a|\).</li>
        <li>Choose \(\delta\) so that the bound above is less than \(\varepsilon\) whenever \(|x - a| < \delta\). If the bound contains an auxiliary factor depending on \(x\), first restrict \(x\) to a small neighborhood of \(a\) so that this factor is bounded. Then take \(\delta\) to be the smaller of the neighborhood radius and the \(\varepsilon\)-based bound.</li>
        <li>Conclude that \(0 < |x - a| < \delta\) implies \(|f(x) - L| < \varepsilon\).</li>
      </ol>
    </div>
  </section>

  <p>The \(\varepsilon\)-\(\delta\) machinery also gives precise meaning to the informal definitions of infinite limits from Definition 1.11.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">1.14</span></p>
    <div class="env-body">
      <p>We write
      \[ \lim_{x \to a} f(x) = \infty \]
      if for every positive number \(M\) there exists \(\delta > 0\) such that
      \[ f(x) > M \qquad \text{whenever} \qquad 0 < |x - a| < \delta. \]
      Similarly,
      \[ \lim_{x \to a} f(x) = -\infty \]
      if for every negative number \(N\) there exists \(\delta > 0\) such that
      \[ f(x) < N \qquad \text{whenever} \qquad 0 < |x - a| < \delta. \]</p>
    </div>
  </section>

  <p>Intuitively, \(M\) may be any large positive threshold (such as \(100\), \(100^{100}\), or \(1000^{1000}\)): no matter how large the threshold, \(f(x)\) eventually exceeds it once \(x\) is close enough to \(a\). Likewise, \(N\) may be any negative threshold (such as \(-100\), \(-100^{100}\), or \(-1000^{1000}\)), below which \(f(x)\) is eventually forced.</p>

  <!-- expansion:example — M-δ proof of an infinite limit, the rigorous counterpart of Example 1.21 [source: AI, audit-approved] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">1.43</span></p>
      <div class="env-body">
        <p>Show from the precise definition that
        \[ \lim_{x \to 0} \frac{1}{x^{2}} = \infty. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Given \(M > 0\), choose
        \[ \delta = \frac{1}{\sqrt{M}}. \]
        If \(0 < |x| < \delta\), then \(x^{2} < \delta^{2} = 1/M\), so
        \[ \frac{1}{x^{2}} > M. \]
        Since every threshold \(M\) is eventually exceeded once \(x\) is close enough to \(0\), we have \(\lim_{x \to 0} \frac{1}{x^{2}} = \infty\) — the rigorous counterpart of the informal argument in Example 1.21.</p>
      </div>
    </section>
  </div>

  <p>Finally, the \(\varepsilon\)-\(\delta\) definition gives a precise meaning to a property of functions that recurs throughout later chapters. If \(f\) is defined at every point near \(a\), including at \(a\), and if
  \[ \lim_{x \to a} f(x) = f(a), \]
  then \(f\) is said to be <em>continuous at \(a\)</em>. A systematic study of continuity belongs to a later chapter; we mention the term here because it is expressed directly in terms of limits.</p>

</article>

<script>
(function () {

  function piTex(v) {
    var map = {};

    map[(-PI).toFixed(4)] = "-\\pi";
    map[(-PI / 2).toFixed(4)] = "-\\tfrac{\\pi}{2}";
    map[(PI / 2).toFixed(4)] = "\\tfrac{\\pi}{2}";
    map[PI.toFixed(4)] = "\\pi";
    map[(2 * PI).toFixed(4)] = "2\\pi";

    var id = "pl" + (++uid);
    var parts = [], labels = [];
    function pushLabel(o) { labels.push(o); }

        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.x));

        else if (t.label != null) pushLabel({ px: px, py: ayBase + 6, text: t.label, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
      });
      (cfg.yticks || []).forEach(function(t) {
        var py = SY(t.y);
        parts.push('<line x1="' + (axBase - 3).toFixed(1) + '" y1="' + py.toFixed(1) + '" x2="' + (axBase + 3).toFixed(1) + '" y2="' + py.toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.y));

        else if (t.label != null) pushLabel({ px: axBase - 6, py: py, text: t.label, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });

    (cfg.items || []).forEach(function(it) {

      } else if (it.type === "arrow") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');

})();

    }),

    /* ---------------- §1.6 ---------------- */
    "precise-limit": () => {
      const Lm = 6.150845, Lp = 9.849155;
      return {
        layout: "single",
        panels: [{
          svg: buildPlot({
            w: 460, h: 300, xmin: 0, xmax: 3.8, ymin: 0, ymax: 14,
            pad: { t: 16, r: 18, b: 24, l: 58 }, xlabel: "x", ylabel: "y",
            aria: "Geometric interpretation of the epsilon-delta definition.",
            items: [
              { type: "curve", fn: pow2, domain: [0.45, 2.95], cls: "curve" },
              { type: "curve", fn: pow2, domain: [3.05, 3.45], cls: "curve" },
              { type: "hline", y: Lm, from: 0, to: 3.8, cls: "refline" },
              { type: "hline", y: Lp, from: 0, to: 3.8, cls: "refline" },
              { type: "vline", x: 2.7, cls: "refline" },
              { type: "vline", x: 3.3, cls: "refline" },
              { type: "dot", x: 3, y: 8, hollow: true },
              { type: "dot", x: 3, y: 11.6 },
              { type: "dot", x: 3.3, y: Lp, r: 1.8 },
              { type: "text", x: 2.7, y: 0, tex: "a-\\delta", cls: "a-pt", anchor: "middle", vAnchor: "top", dy: 5 },
              { type: "text", x: 3.02, y: 0, tex: "a", cls: "a-pt", anchor: "middle", vAnchor: "top", dy: 5 },
              { type: "text", x: 3.32, y: 0, tex: "a+\\delta", cls: "a-pt", anchor: "middle", vAnchor: "top", dy: 5 },
              { type: "text", x: 0, y: Lm, tex: "L-\\varepsilon", cls: "a-pt", anchor: "end", dx: -4 },
              { type: "text", x: 0, y: 8, tex: "L", cls: "a-pt", anchor: "end", dx: -4 },
              { type: "text", x: 0, y: Lp, tex: "L+\\varepsilon", cls: "a-pt", anchor: "end", dx: -4 },
            ],
          }),
        }],
      };
    },
  };

  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach((el) => {
      const def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      const { layout, panels } = def();
      let html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = `<div class="figure-art">${panels[0].svg}</div>`;
      } else {
        const cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = `<div class="figure-art ${cls}">` +
          panels.map((p) => `<div class="fig-panel">${p.svg}${p.note ? `<div class="fig-note">${p.note}</div>` : ""}</div>`).join("") +
          `</div>`;
      }
      el.insertAdjacentHTML("afterbegin", html);

      /* Connect per-figure CSS width variables (--fig-1-1 … --fig-1-13)
         defined in :root to this figure's --fig-w so the control panel
         actually takes effect. */
      const figNo = el.querySelector(".fig-no");
      if (figNo) {
        const m = figNo.textContent.match(/Figure\s+(\d+)\.(\d+)/);
        if (m) el.style.setProperty("--fig-w", `var(--fig-${m[1]}-${m[2]})`);
      }

      el.dataset.figDone = "1";
    });
  }

  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 1",
  runningHead: "Chapter 1 · Inverse Functions and Limits",
  fragments: ["sec-intro", "sec-1-1", "sec-1-2", "sec-1-3", "sec-1-4", "sec-1-5", "sec-1-6"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      /* ── Orphan heading prevention ──────────────────────────
         After placing a heading that fits, check whether enough
         room remains for content below it. If the remaining space
         is too small, move the heading to a fresh page so it stays
         with its following content — never stranded at the bottom. */
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        /* Major section headers need more room; minor headings less */
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    /* ── Figure shrink-to-fit ──────────────────────────────────
       When a figure *almost* fits the remaining page space,
       scale the .figure-art only (≥55 %) — caption stays full size.
       Measure art/caption while block is still in the DOM.       */
    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      /* Probe the actual insertion point to account for preceding margins */
      var _probe = document.createElement("div");
      _probe.style.height = "0";
      _probe.style.margin = "0";
      _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;  /* top/bottom margins + gaps */
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em";
        block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;           /* success — art shrunk, caption full size */
        body.removeChild(block);      /* revert and fall through */
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt;
        block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
