<style>
/* ============================================================
   skin-hs.css — inlined + modified: Times New Roman + MathJax
   ============================================================ */
.paper {
  --c-primary: oklch(0.50 0.13 245);
  --c-caution: oklch(0.50 0.155 25);
  --c-aux: oklch(0.55 0.01 260);
  --c-axis: #474b54;
  --ink: #1b1c1f;
  --ink-soft: #565a63;
  --ink-faint: #8a8e98;
  --paper: #ffffff;
  --rule: #e5e7eb;
  --fig-w-pair: 250px;     /* 並排(pair)圖每張的預設寬度（整體一次調） */
  --fig-w-single: 100%;    /* 單張/triple/grid 圖的預設最大寬度（整體一次調） */
  /* 個別覆寫：在任一 <figure> 標籤加 style="--fig-w: 320px" 即可只改那一張 */
  --serif: "New Computer Modern", "Latin Modern Roman", "Times New Roman", Times, Georgia, serif;
  --ui: "Inter", -apple-system, system-ui, sans-serif;
  --a-concept:  oklch(0.50 0.13 55);
  --a-result:   oklch(0.50 0.13 245);
  --a-practice: oklch(0.50 0.13 152);
  --a-aside:    oklch(0.50 0.02 260);
  --a-caution:  oklch(0.50 0.155 25);
  --a-strategy: oklch(0.50 0.13 290);
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: var(--fs-base, 17.5px);
  line-height: var(--lh-base, 1.62);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  box-sizing: border-box;
}
.paper *, .paper *::before, .paper *::after { box-sizing: border-box; }
.paper .page { padding: 52px 58px 64px; max-width: 760px; margin: 0 auto; }
.skin-hs .page { hyphens: auto; -webkit-hyphens: auto; }
.skin-hs p, .skin-hs li { text-align: justify; text-justify: inter-word; }
.paper .ragged { text-align: left; }
.paper p { margin: 0 0 .85em; text-wrap: pretty; }
.paper em { font-style: italic; }
.paper .informal { font-style: italic; color: var(--ink-soft); }
.paper ol { margin: .2em 0 .9em; padding-left: 1.5em; }
.paper li { margin: .35em 0; text-wrap: pretty; }
.paper .warmup { counter-reset: wu; list-style: none; padding-left: 0; }
.paper .warmup > li { counter-increment: wu; position: relative; padding-left: 2.1em; }
.paper .warmup > li::before {
  content: "(" counter(wu, lower-alpha) ")";

  font-family: var(--ui); font-size: .82em; color: var(--ink-faint); line-height: 1.85;
}
.paper mjx-container[display="true"] { margin: .55em 0 !important; overflow-x: auto; overflow-y: hidden; }
.paper mjx-container[display="true"]::-webkit-scrollbar { display: none; }
.paper .qed { display: block; text-align: right; margin: -1.62em 0 0; height: 1.62em; pointer-events: none; }
.paper .qed::after {
  content: ""; display: inline-block; width: .56em; height: .56em;
  border: 1.3px solid var(--ink-soft);
}

.paper .env-body::after { content: ""; display: block; clear: both; }

  margin-top: 2.7em; padding-top: 1.35em;

}
.sheet-body > .sec-head:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
.paper .sec-kicker {

}
.paper .sec-title { font-weight: 600; font-size: 2rem; line-height: 1.12; letter-spacing: -.012em; margin: 0; }

.paper .subsec-head {
  font-family: var(--ui); font-weight: 600; font-size: 1.08rem; margin: 1.9em 0 .65em;

}
.paper .page-break-before { break-before: page; page-break-before: always; }
.paper .subsec-head::before { content: ""; width: 18px; height: 3px; background: var(--c-primary); border-radius: 2px; }
.paper .figure { margin: 1.7em 0; text-align: center; }
.paper .figure-art { display: flex; justify-content: center; }
.paper .figure-art--pair { gap: 26px; }
.paper .fig-svg { width: 100%; max-width: var(--fig-w, var(--fig-w-pair)); height: auto; }
.paper .figure-art:not(.figure-art--pair) .fig-svg { max-width: var(--fig-w, var(--fig-w-single)); }
.paper figcaption {
  font-family: var(--ui); font-size: .8em; line-height: 1.5;

}
.paper .fig-no { font-weight: 600; color: var(--ink); margin-right: .4em; }
.paper figcaption mjx-container { font-size: .95em; }
.paper .axis { stroke: var(--c-axis); stroke-width: 1.25; fill: none; stroke-linecap: round; }
.paper .curve { stroke: var(--c-primary); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.paper .refline { stroke: var(--c-caution); stroke-width: 1.3; stroke-dasharray: 4.5 3.5; fill: none; stroke-linecap: round; opacity: .85; }

.paper .bubble { stroke: var(--c-aux); stroke-width: 1.4; fill: none; }

.paper .fig-svg text { font-family: var(--ui); font-size: 13px; }

/* env blocks */
.skin-hs .env {

.skin-hs .env-definition  { --accent: var(--a-concept); }
.skin-hs .env-theorem, .skin-hs .env-proposition, .skin-hs .env-corollary { --accent: var(--a-result); }

}
.skin-hs .env-num { font-weight: 700; color: var(--accent); font-size: .94em; }
.skin-hs .env-name { font-style: italic; font-weight: 400; color: var(--ink-soft); font-family: var(--serif); font-size: 1em; }
.skin-hs .env-body > p:first-child { margin-top: 0; }
.skin-hs .env-body > :last-child { margin-bottom: 0; }
.skin-hs .env-theorem .env-body, .skin-hs .env-proposition .env-body { font-style: italic; }
.skin-hs .env-theorem .env-body mjx-container, .skin-hs .env-proposition .env-body mjx-container { font-style: normal; }
.skin-hs .env-definition em { font-style: italic; }
.skin-hs .env-remark { color: var(--ink-soft); font-size: .97em; }
.skin-hs .env-remark .env-kicker { background: transparent; color: var(--a-aside); border: 1px solid color-mix(in srgb, var(--a-aside) 45%, var(--paper)); }
.skin-hs .env-proof { --accent: var(--a-result); }
.skin-hs .env-proof .env-kicker {
  background: transparent; color: var(--a-result); font-style: italic; letter-spacing: .04em;
  border: 1px solid color-mix(in srgb, var(--a-result) 45%, var(--paper));
}
.skin-hs .qed-proof::after { border-color: var(--ink); }
.skin-hs .workedexample {
  margin: 1.6em 0; padding-left: 16px;
  border-left: 2.5px solid color-mix(in srgb, var(--a-practice) 38%, var(--paper));
  display: flow-root;
}
.skin-hs .workedexample .env { margin: .7em 0; padding-left: 0; border-left: 0; }
.skin-hs .env-solution .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid color-mix(in srgb, var(--a-practice) 45%, var(--paper)); }
.skin-hs > .env-cont { margin-top: 0; padding-top: .82em; }
.skin-hs > .env:has(+ .env-cont) { margin-bottom: 0; display: flow-root; }
.skin-hs > .env-example:has(+ .env-solution) { margin-bottom: 0; }
.skin-hs > .env-example + .env-solution { margin-top: 0; padding-top: .72em; }
.skin-hs > .env-cont, .skin-hs > .env-example, .skin-hs > .env-solution { display: flow-root; }
.skin-hs .env-exercise .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid var(--a-practice); }
.skin-hs .env-caution, .skin-hs .env-strategy {

  border-left-width: 4px; border-left-style: solid;
}
.skin-hs .env-caution {
  --accent: var(--a-caution);
  background: color-mix(in srgb, var(--a-caution) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-caution) 22%, var(--paper));
  border-left-color: var(--a-caution);
}
.skin-hs .env-strategy {
  --accent: var(--a-strategy);
  background: color-mix(in srgb, var(--a-strategy) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-strategy) 22%, var(--paper));
  border-left-color: var(--a-strategy);
}
.skin-hs .env-caution .env-name, .skin-hs .env-strategy .env-name { color: var(--ink-soft); }
.skin-hs .env-strategy .steps { margin-bottom: 0; }
.skin-hs.vivid .env { border-left-color: color-mix(in srgb, var(--accent) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .workedexample { border-left-color: color-mix(in srgb, var(--a-practice) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .env-kicker { font-size: .64rem; padding: 3.5px 11px; }

/* ============================================================
   print.css — inlined (A4 sheet layout + paginator)
   ============================================================ */
@page { size: A4; margin: 0; }
.sheet {
  position: relative; box-sizing: border-box;
  width: 210mm; height: 297mm;
  padding: 20mm 28mm 20mm 32mm;
  background: #fff; overflow: hidden;
}
.sheet-header {
  position: absolute; top: 11mm; left: 32mm; right: 28mm;
  font: 500 8.5pt "Inter", sans-serif; color: #9aa0ac; letter-spacing: .02em;
}
.sheet-footer {
  position: absolute; bottom: 8.5mm; left: 0; right: 0;
  text-align: center; font: 500 9pt "Inter", sans-serif; color: #82868f;
}
.sheet-body { height: 100%; --accent: oklch(0.50 0.13 245); }
.sheet-body.paper { box-shadow: none; border-radius: 0; max-width: none; background: #fff; }
.sheet-body .page { padding: 0; max-width: none; margin: 0; }
.sheet-body.paper { font-size: 12pt; line-height: 1.55; }
.sheet, .sheet * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.sheet-body > :first-child { margin-top: 0 !important; }
.sheet-body .sec + .sec { border-top: 0; margin-top: 0; padding-top: 0; }
.sheet-body .qed { margin-top: -1.55em; height: 1.55em; }
.sheet-body .env-body::after { display: none; content: none; }
.sheet-body .env-cont { margin-top: 0; }
.sheet-body .env-cont > .env-body > :first-child { margin-top: 0; }
@media screen {
  body { background: #6f727b; margin: 0; }
  .sheet { box-shadow: 0 3px 18px rgba(0,0,0,.3); margin: 9mm auto; }
}
@media print {
  body { background: #fff; margin: 0; }
  .sheet { box-shadow: none; margin: 0; break-after: page; }
  .sheet:last-child { break-after: auto; }
  .print-toolbar, #boot { display: none !important; }
}

/* ============================================================
   page-level
   ============================================================ */
.print-toolbar {
  position: fixed; top: 14px; right: 16px; z-index: 1000;
  display: flex; align-items: center; gap: 10px; font-family: "Inter", system-ui, sans-serif;
}
.print-toolbar button {
  font: 600 13px "Inter", sans-serif; color: #fff; background: oklch(0.50 0.13 245);
  border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer;

}

}

<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Appendix B</div>
    <h1 class="ch-title">Reading Theorems and Proofs</h1>
  </header>

  <p class="lead">Calculus is, for many readers, the first place mathematics is written as a chain of <em>theorems</em> and <em>proofs</em> rather than a list of recipes to run. Reading that language — following an argument, and knowing when you have understood it — is a skill of its own, and one seldom taught head-on. This appendix is a short primer on it: how to take a statement apart (§B.1), the handful of proof shapes that recur (§B.2), the quantifiers that run through analysis (§B.3), the standard steps that seem to come from nowhere (§B.4), and how to read a proof actively rather than let it wash over you (§B.5). Everything is illustrated with small, classic examples — integers, primes, the irrationality of \(\sqrt{2}\) — so nothing here leans on calculus itself. Read it straight through, or reach for a section when a proof stops making sense.</p>

  <p class="para-head">By the end of this appendix, you will be able to:</p>
  <ul>
    <li>take a statement apart into its hypothesis, conclusion, and quantifiers, and tell it apart from its converse;</li>
    <li>recognize the five proof shapes you meet most often — direct, contradiction, counterexample, cases, and induction;</li>
    <li>read the quantifiers \(\forall\) and \(\exists\), negate a quantified statement, and keep their order straight;</li>
    <li>see the purpose behind the standard moves — adding and subtracting a term, splitting an \(\varepsilon\), taking a minimum, and the rest — that otherwise look like rabbits from a hat;</li>
    <li>read a proof actively: checking each step, locating where every hypothesis is used, and separating <em>why</em> a result is true from <em>how</em> it is proved.</li>
  </ul>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">B.1</span>Reading a Statement</h2>
  </header>

  <p>A theorem is a promise, and like any promise it comes with conditions. Before you can follow a proof — let alone trust it — you have to know exactly what is being claimed: what you are handed, what you must produce, and how much the statement really commits to. Reading the statement closely is the first of these skills, and the one that repays itself most often. A surprising share of the confusion inside a proof turns out to be confusion about the statement it is proving.</p>

  <p>Most theorems can be put in the form <em>if \(P\), then \(Q\)</em>. The clause \(P\) is the <em>hypothesis</em> — what you are allowed to assume — and \(Q\) is the <em>conclusion</em> — what you are then obliged to establish. Even a theorem with no visible &ldquo;if&rdquo; usually has this skeleton inside it. &ldquo;Every integer divisible by \(6\) is divisible by \(3\)&rdquo; is the same claim as &ldquo;if an integer \(n\) is divisible by \(6\), then \(n\) is divisible by \(3\)&rdquo; wearing plainer clothes: the word <em>every</em> carries the unstated &ldquo;for all&rdquo;, while the hypothesis — that \(n\) is divisible by \(6\) — hides inside the description of the subject. Learning to hear the <em>if&ndash;then</em> inside an ordinary sentence is half of reading a statement.</p>

  <p>Once a statement is in <em>if \(P\), then \(Q\)</em> form, two rearrangements of it are worth naming — precisely because they are so easily mistaken for the original.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">B.1</span></p>
    <div class="env-body">
      <p>Given an implication <em>if \(P\), then \(Q\)</em>:</p>
      <ul>
        <li>its <em>converse</em> is the implication <em>if \(Q\), then \(P\)</em> — hypothesis and conclusion swapped;</li>
        <li>its <em>contrapositive</em> is the implication <em>if not \(Q\), then not \(P\)</em> — both parts negated <em>and</em> swapped.</li>
      </ul>
    </div>
  </section>

  <p>The contrapositive says the very same thing as the original, read from the other end: if \(Q\) must hold whenever \(P\) does, then a failure of \(Q\) leaves no room for \(P\) — so &ldquo;if \(P\) then \(Q\)&rdquo; and &ldquo;if not \(Q\) then not \(P\)&rdquo; stand or fall together. They are <em>logically equivalent</em> — each is true exactly when the other is — so proving one proves the other, a fact the indirect arguments of §B.2 lean on. The converse is a different matter: it is a genuinely new claim, which may be true or false on its own. Our sample statement &ldquo;if \(n\) is divisible by \(6\), then \(n\) is divisible by \(3\)&rdquo; is true, while its converse &ldquo;if \(n\) is divisible by \(3\), then \(n\) is divisible by \(6\)&rdquo; is false, as \(n = 9\) shows. Its contrapositive &ldquo;if \(n\) is not divisible by \(3\), then \(n\) is not divisible by \(6\)&rdquo; is true again, in lockstep with the original.</p>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The single most common misreading of a theorem is to help yourself to its converse. &ldquo;If \(P\), then \(Q\)&rdquo; hands you \(Q\) whenever you have \(P\); it promises nothing when you instead have \(Q\), and nothing when you merely lack \(P\). A statement and its converse must be proved separately, and either can hold while the other fails. When a result really does run both ways — <em>\(P\) if and only if \(Q\)</em> — that is a strictly stronger claim, and it has to be earned in both directions.</p>
    </div>
  </section>

  <p>Two small words decide the meaning of most statements: <em>for all</em> and <em>there exists</em>. The first, written \(\forall\), claims something about <em>every</em> object in some collection; the second, written \(\exists\), claims only that <em>at least one</em> object works. They rarely announce themselves. &ldquo;Let \(n\) be an integer; then &hellip;&rdquo; is a <em>for all</em> in disguise — the claim must hold no matter which integer you were handed — while &ldquo;the equation has a solution&rdquo; is a <em>there exists</em>. A statement can stack the two, as in &ldquo;for every \(x\) there is a \(y\) such that &hellip;&rdquo;, and then, as §B.3 will insist, the order is not decoration — it changes the meaning. For now the goal is just to notice them: mark every <em>for all</em> and every <em>there exists</em>, stated or disguised, before you read on.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.1</span><span class="env-name">Taking a statement apart</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Find the quantifiers. Rewrite any disguised ones — <em>let</em>, <em>any</em>, <em>some</em>, <em>there is</em> — as an explicit <em>for all</em> or <em>there exists</em>, and note the order in which they come.</li>
        <li>Find the <em>if&ndash;then</em> skeleton: name the hypothesis \(P\) (all you may assume) and the conclusion \(Q\) (all you must show).</li>
        <li>Write down the converse <em>if \(Q\), then \(P\)</em> and ask whether you actually believe it. This is the quickest way to see what the statement does <em>not</em> claim.</li>
        <li>Try the statement on one small object, to be sure you have read it the way its author meant.</li>
      </ol>
      <p class="informal">The whole exercise takes under a minute and heads off the most expensive error there is — proving, or trusting, a different statement than the one in front of you.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.1</span></p>
      <div class="env-body">
        <p>Take the statement apart: <em>for every integer \(n\), if \(n^{2}\) is even, then \(n\) is even.</em></p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ul class="sol-list">
          <li><strong>Quantifier.</strong> A single <em>for every integer \(n\)</em>, with no <em>there exists</em> inside — the claim must hold for each integer at once.</li>
          <li><strong>Hypothesis and conclusion.</strong> With \(n\) fixed, \(P\) is &ldquo;\(n^{2}\) is even&rdquo; and \(Q\) is &ldquo;\(n\) is even&rdquo;.</li>
          <li><strong>Converse.</strong> <em>If \(n\) is even, then \(n^{2}\) is even</em> — a different statement. It happens to be true as well, but that is a separate fact to prove, not something the original grants for free.</li>
          <li><strong>Contrapositive.</strong> <em>If \(n\) is odd, then \(n^{2}\) is odd</em> — equivalent to the original, and, as it turns out, the more convenient direction to attack. Proposition B.1 proves exactly this.</li>
          <li><strong>Small test.</strong> \(n = 6\) gives \(n^{2} = 36\), even, and \(n\) is even — consistent. What the statement forbids is an integer with \(n^{2}\) even yet \(n\) odd, and there is none.</li>
        </ul>
      </div>
    </section>
  </div>

  <p>A statement read this way — quantifiers marked, hypothesis and conclusion named, converse held at arm's length — is one you can prove, or look up, or use with confidence. The rest of this appendix assumes you have done this first; everything else is easier once the claim itself is pinned down.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">B.2</span>The Main Proof Shapes</h2>
  </header>

  <p>A proof is an argument, and arguments come in shapes. A reader who knows the shapes has a head start: recognizing that a proof is, say, an induction or an argument by contradiction tells you what its author is trying to do before you have followed a single line of it. Five shapes cover the great majority of what you meet early on. We name them first, then watch each one at work on a small, classic claim.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.2</span><span class="env-name">Recognizing the shape of a proof</span></p>
    <div class="env-body">
      <ul class="steps">
        <li><strong>Direct.</strong> Assume the hypothesis and move, one justified step at a time, to the conclusion. The default — try it first.</li>
        <li><strong>Contradiction.</strong> Assume the claim <em>fails</em>, and reason until something impossible appears. The tell: an opening like &ldquo;suppose not&rdquo; or &ldquo;assume \(\sqrt{2}\) is rational&rdquo; when the claim says the opposite. A near relative, <em>contraposition</em>, proves &ldquo;if \(P\) then \(Q\)&rdquo; by proving its contrapositive &ldquo;if not \(Q\) then not \(P\)&rdquo; outright — see Proposition B.1.</li>
        <li><strong>Counterexample.</strong> To <em>disprove</em> a <em>for all</em> claim, exhibit one object meeting the hypothesis but breaking the conclusion. Demolishes; never builds.</li>
        <li><strong>Cases.</strong> Split the objects into a few situations that together cover every possibility, and settle each. The tell: &ldquo;if &hellip; ; if instead &hellip;&rdquo;.</li>
        <li><strong>Induction.</strong> For a claim about every positive integer, prove the first case, then show each case forces the next. The tell: a statement indexed by \(n = 1, 2, 3, \ldots\).</li>
      </ul>
    </div>
  </section>

  <p><strong>Direct proof.</strong> The plainest shape assumes the hypothesis and walks, step by justified step, to the conclusion. Most proofs are direct, and it is the shape to try first. Here is one about the odd integers.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">B.1</span></p>
    <div class="env-body">
      <p>If \(n\) is an odd integer, then \(n^{2}\) is odd.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>By definition an odd integer has the form \(n = 2k + 1\) for some integer \(k\). Squaring,
      \[ n^{2} = (2k + 1)^{2} = 4k^{2} + 4k + 1 = 2\bigl(2k^{2} + 2k\bigr) + 1. \]
      The right-hand side is twice an integer plus one, which is exactly what it means to be odd. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>Nothing was assumed but the hypothesis, and each line followed from the one before — the signature of a direct proof. This one does double duty. The same proof also settles &ldquo;if \(n^{2}\) is even, then \(n\) is even&rdquo; — the claim dissected in Example B.1 — because that statement's contrapositive is exactly &ldquo;if \(n\) is odd, then \(n^{2}\) is odd&rdquo;, which we have just proved. A statement and its contrapositive are logically equivalent, so proving the one proves the other. Deliberately proving the contrapositive in place of the original is a standard move of its own, <em>proof by contraposition</em>, and the quiet cousin of the contradiction argument next.</p>

  <p><strong>Proof by contradiction.</strong> Sometimes the cleanest route to a claim is to suppose it false and watch the supposition collapse. To argue by <em>contradiction</em>, assume the claim is false, reason until you reach something impossible — a statement that contradicts a hypothesis, a known fact, or itself — and conclude that the assumption could not have held. Why does that settle the matter? Because a true premise can never force an impossibility: if assuming the claim false leads somewhere that cannot be, then that assumption cannot stand, and the claim must be true. The most famous instance in all of mathematics is barely a paragraph.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">B.2</span></p>
    <div class="env-body">
      <p>\(\sqrt{2}\) is irrational: it cannot be written as a ratio \(a/b\) of integers.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose, to the contrary, that \(\sqrt{2} = a/b\) for integers \(a\) and \(b\) with \(b \neq 0\), and take the fraction in <em>lowest terms</em> — so that \(a\) and \(b\) share no common factor larger than \(1\). Squaring gives \(2 = a^{2}/b^{2}\), that is,
      \[ a^{2} = 2b^{2}. \]
      Then \(a^{2}\) is even, and therefore \(a\) is even — this is the statement dissected in Example B.1, equivalent to the contrapositive we proved as Proposition B.1. Write \(a = 2c\). Substituting, \((2c)^{2} = 2b^{2}\), so \(4c^{2} = 2b^{2}\), and hence \(b^{2} = 2c^{2}\). The same reasoning now applies to \(b\): since \(b^{2}\) is even, \(b\) is even. But then \(a\) and \(b\) are <em>both</em> even, sharing the factor \(2\) — contradicting our arrangement that the fraction was in lowest terms. The assumption that \(\sqrt{2}\) is a ratio of integers is therefore untenable. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>The engine of the argument is the collision at the end: two consequences that cannot both hold. Notice, too, where a hypothesis did its work — reducing the fraction to lowest terms is precisely what turns &ldquo;both even&rdquo; into a contradiction rather than a shrug.</p>

  <p><strong>Disproof by counterexample.</strong> The shapes so far <em>establish</em> claims; the next one <em>demolishes</em> them. A statement of the form <em>for all</em> promises that every object in its range clears some bar. To knock it down, you need just one object that does not — a <em>counterexample</em>.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.2</span></p>
      <div class="env-body">
        <p>Show that the claim <em>every prime number is odd</em> is false.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The claim is a <em>for all</em>: for every prime \(p\), the number \(p\) is odd. To refute it we produce a single prime that is not odd. The number \(2\) is prime — its only positive divisors are \(1\) and itself — and \(2\) is even. So \(2\) meets the hypothesis (it is prime) while breaking the conclusion (it is not odd), and the universal claim collapses.</p>
        <p>Two features make this work and are worth carrying with you. First, <em>one</em> counterexample is enough: proving a <em>for all</em> means handling every case, but disproving it means exhibiting a single failure. Second, the counterexample must be honest — it has to genuinely satisfy the hypothesis (\(2\) really is prime) and genuinely violate the conclusion (\(2\) really is not odd). An object that fails the hypothesis in the first place refutes nothing.</p>
      </div>
    </section>
  </div>

  <p><strong>Proof by cases.</strong> When no single argument reaches every object at once, split the objects into a few situations that <em>together</em> exhaust all possibilities, and settle each on its own. The one demand is completeness: the cases must leave nothing out.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">B.3</span></p>
    <div class="env-body">
      <p>For every integer \(n\), the number \(n^{2} + n\) is even.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Every integer is either even or odd, and we take the two cases in turn. If \(n\) is even, write \(n = 2k\); then
      \[ n^{2} + n = n(n + 1) = 2k(2k + 1), \]
      which is even. If \(n\) is odd, write \(n = 2k + 1\); then \(n + 1 = 2(k + 1)\), so
      \[ n^{2} + n = n(n + 1) = (2k + 1)\cdot 2(k + 1), \]
      even again. The two cases cover every integer, so \(n^{2} + n\) is even in all of them. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>A case split divides the <em>problem</em>, not the claim — the conclusion is the same in every branch. And a shrewd split can sometimes be avoided altogether: here \(n^{2} + n = n(n + 1)\) is a product of two consecutive integers, one of which is always even, which settles the matter in a single line. Seeing when a case analysis collapses to one clean observation is part of reading proofs well.</p>

  <p><strong>Induction.</strong> A claim about <em>every positive integer</em> invites a shape of its own. Induction proves it in two strokes: verify the claim for the first integer, then show that its truth at any stage forces its truth at the next. Like a line of dominoes, the first fall together with &ldquo;each one topples the next&rdquo; brings them all down.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">B.4</span></p>
    <div class="env-body">
      <p>For every positive integer \(n\),
      \[ 1 + 2 + \cdots + n = \frac{n(n + 1)}{2}. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p><em>Base case.</em> For \(n = 1\) the left side is \(1\) and the right side is \(\frac{1 \cdot 2}{2} = 1\); they agree.</p>
      <p><em>Inductive step.</em> Suppose the formula holds for some positive integer \(k\), so that \(1 + 2 + \cdots + k = \frac{k(k + 1)}{2}\). (This supposition is the <em>inductive hypothesis</em>.) Adding the next term \(k + 1\) to both sides,
      \[ \begin{aligned} 1 + 2 + \cdots + k + (k + 1) &= \frac{k(k + 1)}{2} + (k + 1) \\ &= (k + 1)\!\left(\frac{k}{2} + 1\right) = \frac{(k + 1)(k + 2)}{2}, \end{aligned} \]
      which is the formula with \(n = k + 1\). So whenever it holds at \(k\), it holds at \(k + 1\); and since it holds at \(n = 1\), it holds for every positive integer. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>The inductive hypothesis is not cheating: we do not assume what we set out to prove. We assume the statement at one stage only to <em>deduce</em> it at the next, and the base case gets the chain moving. Watching for exactly these two parts — a base case, and a step that carries \(k\) to \(k + 1\) — is how you read, and check, any induction.</p>

  <p>These five — direct, contradiction, counterexample, cases, induction — are enough to recognize the architecture of most proofs you will meet for a good while. A longer proof is usually several of them nested: an induction whose step is a short direct argument, or an argument by contradiction that breaks into cases. Naming the outer shape first, and then the inner ones, turns a wall of text into a plan you can follow.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">B.3</span>A Quantifier Toolbox</h2>
  </header>

  <p>The two quantifiers <em>for all</em> and <em>there exists</em> — \(\forall\) and \(\exists\) — are the grammar of analysis. Nearly every definition and theorem past this point is built from them, often stacked two or three deep, and a statement's whole meaning can turn on how they are arranged. Three skills make that grammar readable: keeping the <em>order</em> of quantifiers straight, <em>negating</em> a quantified statement cleanly, and recognizing the one nested pattern that organizes much of the subject. This section is a short toolbox for all three.</p>

  <p>The order of two <em>unlike</em> quantifiers is not interchangeable, and this is the most valuable single fact about them. Compare:</p>
  <p style="text-align:center;">(i)&ensp;&ensp;for every integer \(x\) there is an integer \(y\) with \(y > x\),</p>
  <p style="text-align:center;">(ii)&ensp;&ensp;there is an integer \(y\) such that for every integer \(x\), \(y > x\).</p>
  <p>Statement (i) is true: given any \(x\), take \(y = x + 1\). Statement (ii) is false: it demands a <em>single</em> \(y\) larger than every integer at once, and there is no largest integer. The two sentences use the same words in the same breath; only the order of &ldquo;for every&rdquo; and &ldquo;there is&rdquo; differs, and that alone carries one from true to false.</p>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>When quantifiers of different type meet, the outer one is in charge, and the inner object may be <em>retuned for each choice</em> of the outer. &ldquo;For every \(x\) there is a \(y\)&rdquo; lets \(y\) depend on \(x\) — a different \(y\) is allowed for each. &ldquo;There is a \(y\) such that for every \(x\)&rdquo; demands one \(y\) that works for all \(x\) simultaneously; it is a far stronger, and usually far rarer, claim. Reading the first as though it were the second — or the reverse — is a classic and costly slip. Always check which quantifier comes first.</p>
    </div>
  </section>

  <p>The second skill is denial. To disprove a quantified statement, or to state what a proof by contradiction must produce, you have to negate it correctly — and there is a mechanical rule that never fails.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.3</span><span class="env-name">Negating a quantified statement</span></p>
    <div class="env-body">
      <ol class="steps">
        <li>Sweep the negation across the quantifiers from left to right, flipping each as it passes: every <em>for all</em> becomes <em>there exists</em>, and every <em>there exists</em> becomes <em>for all</em>.</li>
        <li>When the negation reaches the <em>kernel</em> — the part with no quantifiers left — negate that. An \(=\) becomes \(\neq\); a \(<\) becomes \(\ge\), not \(>\) (the denial of &ldquo;\(a < \varepsilon\)&rdquo; is &ldquo;\(a\) is not less than \(\varepsilon\)&rdquo;, which includes the boundary case \(a = \varepsilon\)); &ldquo;\(P\) and \(Q\)&rdquo; becomes &ldquo;not \(P\) or not \(Q\)&rdquo;, and so on.</li>
        <li>Leave the quantifiers in their original order; only their <em>type</em> flips, never their sequence.</li>
      </ol>
      <p class="informal">In words: to deny that <em>everyone</em> clears the bar is to claim that <em>someone</em> fails it; to deny that <em>someone</em> succeeds is to claim that <em>everyone</em> fails. Negation trades the two quantifiers and moves the finish line.</p>
    </div>
  </section>

  <p>The rule is easiest to trust on short statements, so build up to the long one. A single quantifier flips once: the negation of &ldquo;<em>every</em> integer is even&rdquo; is &ldquo;<em>there is</em> an integer that is not even&rdquo; — true, since \(3\) is one. Two quantifiers flip in turn. Negating the true statement from the start of this section, &ldquo;for every integer \(x\) there is an integer \(y\) with \(y > x\)&rdquo;, sweeps to &ldquo;there is an integer \(x\) such that for every integer \(y\), \(y \le x\)&rdquo; — a largest integer, which is false, exactly as the negation of a true statement should be. The next example carries the same rule to a statement three quantifiers deep, of the kind that runs through analysis; it is handled just as mechanically.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.3</span></p>
      <div class="env-body">
        <p>Negate the following statement, in which \(a_1, a_2, \ldots\) is a fixed sequence of positive numbers (it says the sequence eventually drops below every positive threshold):</p>
        <p style="text-align:center;">for every \(\varepsilon > 0\), there exists an integer \(N\) such that \(a_n < \varepsilon\) for all \(n \ge N\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Flip each quantifier in turn, then negate the kernel:</p>
        <ul class="sol-list">
          <li>&ldquo;for every \(\varepsilon > 0\)&rdquo; becomes &ldquo;there exists \(\varepsilon > 0\)&rdquo;;</li>
          <li>&ldquo;there exists an integer \(N\)&rdquo; becomes &ldquo;for every integer \(N\)&rdquo;;</li>
          <li>&ldquo;for all \(n \ge N\)&rdquo; becomes &ldquo;there exists \(n \ge N\)&rdquo;;</li>
          <li>the kernel \(a_n < \varepsilon\) negates to \(a_n \ge \varepsilon\).</li>
        </ul>
        <p>Assembling the pieces in the same order, the negation reads:</p>
        <p style="text-align:center;">there exists \(\varepsilon > 0\) such that for every integer \(N\)<br>there is some \(n \ge N\) with \(a_n \ge \varepsilon\).</p>
        <p>In words: some fixed threshold \(\varepsilon\) that the sequence meets or exceeds again and again, no matter how far out you look. The quantifiers kept their left-to-right order; only their types flipped, and the final \(<\) became \(\ge\).</p>
      </div>
    </section>
  </div>

  <p>The third skill is recognition. One arrangement of nested quantifiers recurs so relentlessly that it deserves to be known on sight. It has the shape</p>

  <p style="text-align:center;">for every \(\varepsilon > 0\) there is a \(\delta > 0\) such that [some closeness holds].</p>

  <p>Read it as a contest. A skeptic names a tolerance \(\varepsilon\) — how close is &ldquo;close enough&rdquo; — and may drive it as small as they please. Your task is to answer, for that \(\varepsilon\), with a \(\delta\) that secures the required closeness. Because \(\varepsilon\) is chosen first, your \(\delta\) is <em>allowed to depend on it</em>: a stricter tolerance may call for a smaller \(\delta\). The statement is true precisely when you have a winning reply to <em>every</em> challenge, however small \(\varepsilon\) is pushed. You have, in fact, already read a statement of exactly this shape — the one you negated in Example B.3, where the response to each \(\varepsilon\) was an index \(N\), and the required closeness was that every term from the \(N\)-th onward falls below \(\varepsilon\). This &ldquo;for every tolerance, there is a response&rdquo; template is the skeleton of the definitions of limit, continuity, and convergence, and of the many proofs resting on them. When you meet it, ask at once: what plays the part of the challenge, what response must you supply, and how may the response lean on the challenge? Finding the right \(\delta\) in terms of \(\varepsilon\) is usually the entire game.</p>

  <p>Negation and recognition now close a loop. To deny such a statement — to claim the closeness cannot always be met — is, by the negation rule, to assert that <em>there is one stubborn \(\varepsilon > 0\) for which every proposed \(\delta\) fails</em>. That single-\(\varepsilon\) form is exactly the target of any argument that something is <em>not</em> continuous, or a sequence does <em>not</em> converge: pin the one tolerance no response can satisfy, and the claim is refuted.</p>

  <p>Quantifiers are terse, but their terseness is precision, not shorthand: they fix exactly which objects a claim ranges over, in what order those objects may be chosen, and what it would take to deny the claim. Read them slowly, mark their order, and know how to flip them — and a large part of analysis stops looking like code and starts reading like sentences.</p>

</article>
</template>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">B.4</span>Steps That Come From Nowhere</h2>
  </header>

  <p>Every reader of proofs meets the same frustration sooner or later: a line appears that seems conjured from thin air. A term is added and subtracted for no visible reason; a threshold is defined as the minimum of two others; a tolerance is carved into thirds; a brand-new function is introduced that the statement never mentioned. These steps look like inspiration, but they are not — they are standard moves, a short catalogue of them, each with a fixed purpose. Once you can name the move, the question &ldquo;how would anyone think of that?&rdquo; turns into the far smaller &ldquo;ah, that one again — what is it buying here?&rdquo;</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.4</span><span class="env-name">A catalogue of standard steps</span></p>
    <div class="env-body">
      <ul class="steps">
        <li><strong>Add and subtract a term.</strong> Rewrite \(a - c\) as \((a - b) + (b - c)\) for a convenient \(b\). Legal because the inserted terms cancel; used to compare two quantities through an intermediate you can actually control.</li>
        <li><strong>Split the tolerance.</strong> To force a sum of \(k\) terms below \(\varepsilon\), keep each term below \(\varepsilon/k\). Legal because \(k \cdot (\varepsilon/k) = \varepsilon\); used whenever an estimate breaks into several pieces. The &ldquo;\(3\varepsilon\)&rdquo; you see in print is this move with \(k = 3\).</li>
        <li><strong>Take a minimum (or maximum).</strong> To meet two &ldquo;small enough&rdquo; conditions at once, set \(\delta = \min\{\delta_1, \delta_2\}\); for two &ldquo;large enough&rdquo; conditions, set \(N = \max\{N_1, N_2\}\). Legal because the minimum is \(\le\) each of the two (and the maximum \(\ge\) each); used to satisfy several thresholds with a single one.</li>
        <li><strong>Introduce an auxiliary function.</strong> Build a helper the statement never mentioned — often the difference \(h = f - g\) — so that a tool you already have applies to it. Legal because you are free to define what you like; used to turn an unfamiliar problem into a familiar one.</li>
        <li><strong>Without loss of generality.</strong> Assume the convenient one of several interchangeable cases. Legal exactly when a relabeling carries the other cases onto the one you kept; used to avoid writing the same argument twice.</li>
      </ul>
    </div>
  </section>

  <p>The first two moves travel together so often that it is worth seeing them combined. The setting is the most common one in analysis: we want to know that two quantities are close, but we can only measure closeness through intermediate steps.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.4</span></p>
      <div class="env-body">
        <p>Suppose four numbers satisfy \(|a - b| < \tfrac{\varepsilon}{3}\), \(|b - c| < \tfrac{\varepsilon}{3}\), and \(|c - d| < \tfrac{\varepsilon}{3}\). Show that \(|a - d| < \varepsilon\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We have no direct grip on \(a - d\), so we manufacture one by inserting the intermediate values \(b\) and \(c\) — adding and subtracting each:
        \[ a - d = (a - b) + (b - c) + (c - d). \]
        This costs nothing, since the inserted terms cancel, but the right-hand side is now built from the three differences we <em>can</em> bound. By the triangle inequality \(|x + y| \le |x| + |y|\), applied twice,
        \[ |a - d| \le |a - b| + |b - c| + |c - d| < \frac{\varepsilon}{3} + \frac{\varepsilon}{3} + \frac{\varepsilon}{3} = \varepsilon. \]
        Two moves did the work. The <em>add-and-subtract</em> traded one uncontrollable quantity for a sum of controllable ones; the <em>split into thirds</em> arranged for three pieces, each held below \(\varepsilon/3\), to total exactly \(\varepsilon\). Together they are the skeleton of every argument that chains approximations — \(a\) near \(b\) near \(c\) near \(d\), and therefore \(a\) near \(d\) — with the tolerance shared out among the links.</p>
      </div>
    </section>
  </div>

  <p>The third move settles a different recurring difficulty: two requirements that each demand their own threshold.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.5</span></p>
      <div class="env-body">
        <p>Suppose one quantity is under control whenever \(|x| < \delta_1\), and a second whenever \(|x| < \delta_2\), where \(\delta_1\) and \(\delta_2\) are both positive. Produce a single \(\delta > 0\) that brings both under control at once.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Take \(\delta = \min\{\delta_1, \delta_2\}\), the smaller of the two thresholds — and \(\delta > 0\), since \(\delta_1\) and \(\delta_2\) are both positive. If \(|x| < \delta\), then \(|x| < \delta \le \delta_1\), so the first condition holds, and \(|x| < \delta \le \delta_2\), so the second holds too. One threshold, chosen as the stricter of the two, secures both.</p>
        <p>The step \(\delta = \min\{\delta_1, \delta_2\}\) reads like a rabbit from a hat the first time, but it says only this: when two requirements each ask for &ldquo;small enough,&rdquo; obey the stricter and you have obeyed both. Its mirror image uses a <em>maximum</em> — when two conditions each need a threshold <em>exceeded</em>, \(N = \max\{N_1, N_2\}\) clears them together.</p>
      </div>
    </section>
  </div>

  <p>The last two moves of the catalogue are less about estimates and more about reshaping a problem, so a word on each in place of a worked example. An <em>auxiliary function</em> is a helper invented mid-proof to convert an awkward question into a standard one. Faced with a claim comparing two quantities \(f\) and \(g\), a proof will often introduce \(h = f - g\) out of the blue and argue about \(h\) alone: the two-object question &ldquo;is \(f\) always at least \(g\)?&rdquo; becomes the one-object question &ldquo;is \(h\) always at least \(0\)?&rdquo;, which some theorem already in hand can attack. The tell is a function or quantity defined partway through a proof that appears nowhere in the statement — it exists only to be handed to a tool you already own.</p>

  <p><em>Without loss of generality</em> — often abbreviated in speech, though we write it out — trims repeated work. A proof may announce &ldquo;without loss of generality, assume \(a \le b\)&rdquo; and then treat only that case. This is sound exactly when the cases are interchangeable by symmetry: here, if instead \(a > b\), swapping the names of \(a\) and \(b\) turns the situation into the one already handled, so nothing is lost. The move spares you from writing the same argument a second time — but only when the relabeling genuinely leaves the problem unchanged, which is precisely what a careful reader stops to confirm. Invoked over cases that are <em>not</em> symmetric, it quietly skips real work.</p>

  <p>None of these steps is inspiration; each is a reflex with a purpose, and the purposes are few. When a proof does something that seems to come from nowhere, the odds are strong that it is one of these five — or a close cousin — and the useful question is never &ldquo;how would I have thought of that?&rdquo; but &ldquo;which standard move is this, and what is it buying?&rdquo; That question almost always has an answer, and finding it is most of what active reading, the subject of §B.5, amounts to.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">B.5</span>Reading Actively</h2>
  </header>

  <p>A proof is not prose to be read at prose speed. The words on the page are the compressed record of an argument, and following the record is not the same as reconstructing the argument — that takes work the page leaves to you. Reading a proof <em>actively</em> means doing that work deliberately: interrogating each line, testing the machinery, and asking not just whether the proof is correct but why it had to go the way it did. Five habits make the difference, and they are the last tools this appendix has to offer.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.5</span><span class="env-name">Reading a proof actively</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><strong>Check that each step follows.</strong> For every line, name the warrant — a definition, a hypothesis, an earlier line, a result already known. If you cannot say what justifies a step, you have not yet read it.</li>
        <li><strong>Find where each hypothesis is used.</strong> Every assumption in the statement should earn its place at some specific line. A hypothesis that is never used is a warning sign — the proof is incomplete, or the assumption was not needed. Locate the moment each one does its work.</li>
        <li><strong>Test on a small example.</strong> Run the proof's machinery on the smallest concrete case you can find. It exposes a misreading within seconds and turns abstract lines into something you can watch happen.</li>
        <li><strong>Separate <em>why</em> it is true from <em>how</em> it is proved.</strong> The idea and the mechanism are different things. A good proof supplies a rigorous mechanism for an idea you can usually state in one sentence; keep both in view, since each checks the other.</li>
        <li><strong>Watch the direction of every implication.</strong> Note which steps run one way (\(\Rightarrow\)) and which run both (\(\Leftrightarrow\)). Reading a one-way step backward is the commonest way a correct proof is misremembered into a false claim.</li>
      </ol>
    </div>
  </section>

  <p>Habits are learned on examples, so here is a small, complete theorem to practice on. It is famous, one line to state, and its proof is an argument by contradiction of the kind §B.2 laid out.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">B.5</span><span class="env-name">The pigeonhole principle</span></p>
    <div class="env-body">
      <p>If \(n + 1\) objects are distributed among \(n\) boxes, then at least one box contains two or more objects.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose, to the contrary, that no box contains two or more objects — that is, every box contains at most one. Then the total number of objects, counted box by box, is at most
      \[ \underbrace{1 + 1 + \cdots + 1}_{n\ \text{boxes}} = n. \]
      But \(n + 1\) objects were distributed, and \(n + 1 > n\). So the objects both do and do not number more than \(n\) — a contradiction. The assumption fails, and therefore some box contains at least two objects. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Pause</span></p>
    <div class="env-body">
      <p>Before reading on, try the five habits on this proof yourself. Ask:</p>
      <ol class="steps">
        <li>Which line carries the contradiction, and which two facts collide there?</li>
        <li>Where is each hypothesis — the \(n + 1\) objects and the \(n\) boxes — actually used?</li>
        <li>Run the argument on three objects in two boxes: what does it force?</li>
        <li>Is the converse true? If some box holds two objects, must there have been more objects than boxes?</li>
      </ol>
    </div>
  </section>

  <p>Now read that proof the way this section is urging, running the five habits across it in turn.</p>

  <ul class="sol-list">
    <li><strong>Each step follows.</strong> There are only two inequalities to warrant. &ldquo;Total \(\le n\)&rdquo; is justified by the assumption (at most one per box) times \(n\) boxes; &ldquo;\(n + 1 > n\)&rdquo; is arithmetic. Both hold, so the collision between them is real.</li>
    <li><strong>Every hypothesis is used.</strong> The count of boxes, \(n\), is what caps the total at \(n\); the count of objects, \(n + 1\), is what overshoots it. Take away either margin — put \(n\) objects into \(n\) boxes — and the proof correctly stops working, because one-per-box is now possible and there is no contradiction. The inequality \(n + 1 > n\) is the whole engine.</li>
    <li><strong>A small example.</strong> Three objects in two boxes: some box holds two. Thirteen people, twelve months: two of them share a birth month. Running the argument on these makes its inevitability concrete.</li>
    <li><strong>Why versus how.</strong> <em>Why</em> it is true: you cannot fit more things than slots without doubling up somewhere — obvious the moment it is said. <em>How</em> it is proved: assume you could, count the maximum, and watch the count contradict the supply. The proof is the mechanism that makes an obvious idea rigorous; the idea is what makes the mechanism memorable.</li>
    <li><strong>Direction.</strong> The principle runs one way — more objects than boxes \(\Rightarrow\) some box is doubled. It does <em>not</em> run backward, as the Caution below spells out.</li>
  </ul>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>An implication \(P \Rightarrow Q\) is a one-way street. It licenses the move from \(P\) to \(Q\), never from \(Q\) back to \(P\) — that reverse trip is the converse of §B.1, a separate claim needing its own proof. For the pigeonhole principle the converse is plainly false: a box can be doubled without there being more objects than boxes at all, as putting two objects into one of five boxes shows. Only a biconditional \(P \Leftrightarrow Q\), established in both directions, lets you travel either way. As you read, mark each implication with its direction, and never silently promote a \(\Rightarrow\) into a \(\Leftrightarrow\); a good share of confidently misremembered &ldquo;theorems&rdquo; are true ones with the arrow turned the wrong way.</p>
    </div>
  </section>

  <p>These five habits are what separate reading a proof from watching one go past, and they close the circle this appendix opened. To read actively is to take the statement apart (§B.1), recognize the shape of the argument (§B.2), track the quantifiers running through it (§B.3), and name the standard moves it makes (§B.4) — and then to check, test, and question until the argument belongs to you and not only to its author. That is what proof literacy is: not a talent you are born with, but a habit of reading, and it repays every hour you spend on it.</p>

</article>

  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach((el) => {
      const def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      const { layout, panels } = def();
      let html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = `<div class="figure-art">${panels[0].svg}</div>`;
      } else {
        const cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = `<div class="figure-art ${cls}">` +
          panels.map((p) => `<div class="fig-panel">${p.svg}${p.note ? `<div class="fig-note">${p.note}</div>` : ""}</div>`).join("") +
          `</div>`;
      }
      el.insertAdjacentHTML("afterbegin", html);

      /* Connect per-figure CSS width variables (--fig-1-1 … --fig-1-25)
         defined in :root to this figure's --fig-w so the control panel
         actually takes effect. */
      const figNo = el.querySelector(".fig-no");
      if (figNo) {
        const m = figNo.textContent.match(/Figure\s+(\d+)\.(\d+)/);
        if (m) el.style.setProperty("--fig-w", `var(--fig-${m[1]}-${m[2]})`);
      }

      el.dataset.figDone = "1";
    });
  }

  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Appendix B",
  runningHead: "Appendix B · Reading Theorems and Proofs",
  fragments: ["sec-b-1", "sec-b-2", "sec-b-3", "sec-b-4", "sec-b-5"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var shouldBreakBefore = function(block) {
    return block.classList && block.classList.contains("page-break-before") && body.childElementCount > 0;
  };
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    if (shouldBreakBefore(block)) newSheet();
    body.appendChild(block);
    if (fits()) {
      /* ── Orphan heading prevention ──────────────────────────
         After placing a heading that fits, check whether enough
         room remains for content below it. If the remaining space
         is too small, move the heading to a fresh page so it stays
         with its following content — never stranded at the bottom. */
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        /* Major section headers need more room; minor headings less */
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    /* ── Figure shrink-to-fit ──────────────────────────────────
       When a figure *almost* fits the remaining page space,
       scale the .figure-art only (≥55 %) — caption stays full size.
       Measure art/caption while block is still in the DOM.       */
    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      /* Probe the actual insertion point to account for preceding margins */
      var _probe = document.createElement("div");
      _probe.style.height = "0";
      _probe.style.margin = "0";
      _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;  /* top/bottom margins + gaps */
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em";
        block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;           /* success — art shrunk, caption full size */
        body.removeChild(block);      /* revert and fall through */
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt;
        block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
