<script>
/* ============================================================
   figures.js — Chapter 3 figure registry.
   Each entry returns { layout, panels:[{svg, note}] }.
   Most chapter figures use buildPlot() (shared/plot.js) for
   function graphs. buildPlot has NO fill/sector primitive, so
   region-area schematics (e.g. the §3.1 sector inequality) are
   hand-built raw SVG here, inheriting the figure vocabulary
   (.fig-svg, .ptlab, var(--c-primary)/--ink…) from skin-hs.css.
   Labels are kept to single symbols (O, A, B, C, θ, 1); the
   areas and the inequality live in the caption and body prose
   (CONTENT_SPEC §10 "Label economy").
   Appended across sections — never overwrite.
   ============================================================ */
(function () {

  const FIGS = {

    /* §3.1 — Sector inequality on the unit circle.
       Three nested regions in the first quadrant ground the bound
       cos θ ≤ (sin θ)/θ ≤ 1:
         · triangle OAB  (inscribed)         = ½ sin θ
         · sector  OAB   (pie slice)         = ½ θ
         · triangle OAC  (out to tangent A)  = ½ tan θ,   C = (1, tan θ)
       Drawn as three non-overlapping fills (triangle OAB, the
       circular segment chord→arc, the corner arc→tangent) so the
       eye reads OAB ⊆ sector ⊆ OAC directly. The manuscript names
       the corner triangle ABC ( = OAC − OAB ); B lies on segment OC. */
    "sector-inequality": () => {
      const T = 40 * Math.PI / 180;            // display angle θ = 40°
      const R = 120, Ox = 130, Oy = 170;       // circle radius / centre (SVG px, y down)
      const c = Math.cos(T), s = Math.sin(T), t = Math.tan(T);
      const Ax = Ox + R,        Ay = Oy;                 // A = (1, 0)
      const Bx = Ox + R * c,    By = Oy - R * s;         // B = (cos θ, sin θ)
      const Cx = Ox + R,        Cy = Oy - R * t;         // C = (1, tan θ), on tangent at A
      const f1 = (n) => n.toFixed(1);
      const rT = 30;                                     // angle-arc radius near O
      const aEx = Ox + rT, aEy = Oy;                     // angle arc: start on OA
      const aBx = Ox + rT * c, aBy = Oy - rT * s;        //            end toward OB
      const mx = (Ox + Bx) / 2, my = (Oy + By) / 2;      // midpoint of OB (radius "1")

      const svg =
        `<svg viewBox="0 0 300 300" style="width:300px" class="fig-svg" role="img"` +
        ` aria-label="First-quadrant wedge of the unit circle centred at O. The inscribed triangle OAB sits inside the sector OAB, which sits inside the larger triangle OAC reaching the tangent line at A, so that one half sine theta is at most one half theta is at most one half tangent theta.">` +
        // --- region 3: corner outside the circle (arc → tangent), neutral slack ---
        `<path d="M${f1(Ax)},${f1(Ay)} L${f1(Cx)},${f1(Cy)} L${f1(Bx)},${f1(By)} ` +
          `A${R},${R} 0 0 1 ${f1(Ax)},${f1(Ay)} Z" fill="var(--ink)" fill-opacity="0.05" stroke="none"/>` +
        // --- region 2: circular segment (chord AB → arc), lighter primary ---
        `<path d="M${f1(Ax)},${f1(Ay)} A${R},${R} 0 0 0 ${f1(Bx)},${f1(By)} Z" ` +
          `fill="var(--c-primary)" fill-opacity="0.09" stroke="none"/>` +
        // --- region 1: inscribed triangle OAB, primary ---
        `<polygon points="${f1(Ox)},${f1(Oy)} ${f1(Ax)},${f1(Ay)} ${f1(Bx)},${f1(By)}" ` +
          `fill="var(--c-primary)" fill-opacity="0.17" stroke="none"/>` +
        // --- unit circle (context) ---
        `<circle cx="${Ox}" cy="${Oy}" r="${R}" fill="none" stroke="var(--ink-soft)" stroke-width="1"/>` +
        // --- tangent segment A→C (vertical tangent at A) ---
        `<line x1="${f1(Ax)}" y1="${f1(Ay)}" x2="${f1(Cx)}" y2="${f1(Cy)}" stroke="var(--ink)" stroke-width="1.4"/>` +
        // --- ray O→B→C (radius OB extended to the tangent at C) ---
        `<line x1="${f1(Ox)}" y1="${f1(Oy)}" x2="${f1(Cx)}" y2="${f1(Cy)}" stroke="var(--ink)" stroke-width="1.4"/>` +
        // --- radius OA ---
        `<line x1="${f1(Ox)}" y1="${f1(Oy)}" x2="${f1(Ax)}" y2="${f1(Ay)}" stroke="var(--ink)" stroke-width="1.4"/>` +
        // --- chord AB (edge of the inscribed triangle) ---
        `<line x1="${f1(Ax)}" y1="${f1(Ay)}" x2="${f1(Bx)}" y2="${f1(By)}" stroke="var(--ink-soft)" stroke-width="1"/>` +
        // --- right-angle tick at A (tangent ⊥ radius) ---
        `<path d="M${f1(Ax - 9)},${f1(Ay)} L${f1(Ax - 9)},${f1(Ay - 9)} L${f1(Ax)},${f1(Ay - 9)}" ` +
          `fill="none" stroke="var(--ink-soft)" stroke-width="1"/>` +
        // --- angle θ arc at O ---
        `<path d="M${f1(aEx)},${f1(aEy)} A${rT},${rT} 0 0 0 ${f1(aBx)},${f1(aBy)}" ` +
          `fill="none" stroke="var(--ink)" stroke-width="1.1"/>` +
        // --- dots at O, A, B, C ---
        `<circle cx="${f1(Ox)}" cy="${f1(Oy)}" r="2.5" class="dot"/>` +
        `<circle cx="${f1(Ax)}" cy="${f1(Ay)}" r="2.5" class="dot"/>` +
        `<circle cx="${f1(Bx)}" cy="${f1(By)}" r="2.5" class="dot"/>` +
        `<circle cx="${f1(Cx)}" cy="${f1(Cy)}" r="2.5" class="dot"/>` +
        // --- labels (single symbols; areas/inequality in caption + prose) ---
        `<text x="${f1(Ox - 9)}" y="${f1(Oy + 5)}" text-anchor="end" class="ptlab" font-style="italic">O</text>` +
        `<text x="${f1(Ax + 8)}" y="${f1(Ay + 16)}" text-anchor="middle" class="ptlab" font-style="italic">A</text>` +
        `<text x="${f1(Bx - 10)}" y="${f1(By - 6)}" text-anchor="end" class="ptlab" font-style="italic">B</text>` +
        `<text x="${f1(Cx + 9)}" y="${f1(Cy + 4)}" text-anchor="start" class="ptlab" font-style="italic">C</text>` +
        `<text x="${f1(Ox + rT + 9)}" y="${f1(Oy - 7)}" text-anchor="start" class="ptlab" font-style="italic">θ</text>` +
        `<text x="${f1(mx - 11)}" y="${f1(my - 3)}" text-anchor="end" class="ptlab">1</text>` +
        `</svg>`;

      return { layout: "single", panels: [{ svg }] };
    },

    /* §3.2 — The chain rule as a composed mapping.
       Three stacked horizontal axes (input x, intermediate u = g(x),
       output y = f(u)). A small increment h at the aligned base point is
       carried by g to a wider increment at u₀, then by f to a wider one
       still at y₀: the increment widths grow because the two local slopes
       g'(x₀), f'(g(x₀)) multiply. Single-symbol labels (x, u, y, h, x₀, u₀,
       y₀) plus the two arrow factors; the algebra (net stretch f'·g'·h)
       lives in the caption and body prose (CONTENT_SPEC §10). buildPlot has
       no multi-axis / propagation-arrow primitive, so this is raw SVG. */
    "composed-mapping": () => {
      const ax1 = 34, ax2 = 276;                 // axis horizontal extent
      const yIn = 46, yMid = 140, yOut = 234;    // input / intermediate / output axes (SVG px, y down)
      const bx = 92;                             // base points x₀, u₀, y₀ (drawn aligned)
      const inEnd = bx + 26;                     // input increment width = h
      const midEnd = bx + 42;                    // stretched by g'(x₀)   (display ratio ≈ 1.6)
      const outEnd = bx + 63;                    // stretched again by f'(g(x₀))  (≈ 1.5)
      const f1 = (n) => n.toFixed(1);

      const axis = (y) =>                        // axis line with a right arrowhead
        `<line x1="${ax1}" y1="${y}" x2="${ax2}" y2="${y}" stroke="var(--ink)" stroke-width="1.3"/>` +
        `<polygon points="${ax2},${y} ${ax2 - 7},${y - 3.5} ${ax2 - 7},${y + 3.5}" fill="var(--ink)"/>`;
      const inc = (y, xe) =>                      // increment highlight bx → xe
        `<line x1="${bx}" y1="${y}" x2="${f1(xe)}" y2="${y}" stroke="var(--c-primary)" stroke-width="3.6" stroke-linecap="round"/>`;
      const arrow = (x1, y1, x2, y2) =>          // downward map arrow with arrowhead
        `<line x1="${f1(x1)}" y1="${f1(y1)}" x2="${f1(x2)}" y2="${f1(y2)}" stroke="var(--ink-soft)" stroke-width="1.3"/>` +
        `<polygon points="${f1(x2)},${f1(y2)} ${f1(x2 - 3.4)},${f1(y2 - 6.5)} ${f1(x2 + 3.4)},${f1(y2 - 6.5)}" fill="var(--ink-soft)"/>`;

      const svg =
        `<svg viewBox="0 0 300 275" style="width:300px" class="fig-svg" role="img"` +
        ` aria-label="Three stacked horizontal axes: an input axis x, an intermediate axis u equal to g of x, and an output axis y equal to f of u. A small increment h at the base point x-zero is carried by g to a wider increment at u-zero, and by f to a wider increment still at y-zero, so the two slopes multiply.">` +
        // base-point alignment guide
        `<line x1="${bx}" y1="${yIn}" x2="${bx}" y2="${yOut}" stroke="var(--ink-soft)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>` +
        // three axes
        axis(yIn) + axis(yMid) + axis(yOut) +
        // increment highlights (growing widths show the magnification)
        inc(yIn, inEnd) + inc(yMid, midEnd) + inc(yOut, outEnd) +
        // map arrows: g (x → u) and f (u → y)
        arrow(inEnd, yIn + 7, midEnd, yMid - 7) +
        arrow(midEnd, yMid + 7, outEnd, yOut - 7) +
        // 'h' bracket above the input increment
        `<path d="M${bx},${yIn - 7} L${bx},${yIn - 11} L${f1(inEnd)},${yIn - 11} L${f1(inEnd)},${yIn - 7}" ` +
          `fill="none" stroke="var(--ink)" stroke-width="1"/>` +
        // base-point dots
        `<circle cx="${bx}" cy="${yIn}" r="2.5" class="dot"/>` +
        `<circle cx="${bx}" cy="${yMid}" r="2.5" class="dot"/>` +
        `<circle cx="${bx}" cy="${yOut}" r="2.5" class="dot"/>` +
        // axis variable labels
        `<text x="${ax2 - 4}" y="${yIn - 8}" text-anchor="end" class="ptlab" font-style="italic">x</text>` +
        `<text x="${ax2 - 4}" y="${yMid - 8}" text-anchor="end" class="ptlab" font-style="italic">u</text>` +
        `<text x="${ax2 - 4}" y="${yOut - 8}" text-anchor="end" class="ptlab" font-style="italic">y</text>` +
        // 'h' label
        `<text x="${f1((bx + inEnd) / 2)}" y="${yIn - 15}" text-anchor="middle" class="ptlab" font-style="italic">h</text>` +
        // base-point labels
        `<text x="${bx - 7}" y="${yIn + 16}" text-anchor="end" class="ptlab" font-style="italic">x₀</text>` +
        `<text x="${bx - 7}" y="${yMid + 16}" text-anchor="end" class="ptlab" font-style="italic">u₀</text>` +
        `<text x="${bx - 7}" y="${yOut + 16}" text-anchor="end" class="ptlab" font-style="italic">y₀</text>` +
        // magnification factors on the arrows
        `<text x="${f1(midEnd) + 9}" y="${f1((yIn + yMid) / 2) + 3}" text-anchor="start" class="ptlab">× g′(x₀)</text>` +
        `<text x="${f1(outEnd) + 9}" y="${f1((yMid + yOut) / 2) + 3}" text-anchor="start" class="ptlab">× f′(g(x₀))</text>` +
        `</svg>`;

      return { layout: "single", panels: [{ svg }] };
    },

    /* §3.1 — Function-graph squeeze for the fundamental limit (Figure 3.2).
       Three curves near θ = 0: the constant upper bound y = 1, the lower
       bound y = cos θ (dashed), and the trapped quantity y = (sin θ)/θ
       (solid; undefined at 0 → hollow dot, but → 1). The funnel collapses to
       (0, 1): the squeeze forces (sin θ)/θ → 1. The inequality
       cos θ ≤ (sin θ)/θ ≤ 1 lives in the caption (CONTENT_SPEC §10 economy). */
    "squeeze-limit": () => {
      const D = 1.05;
      const cfg = {
        w: 300, h: 196, xmin: -1.18, xmax: 1.18, ymin: 0.45, ymax: 1.07,
        pad: { t: 20, r: 16, b: 22, l: 24 },
        aria: "Near theta equals zero, the constant one on top and cosine theta below both converge to one, squeezing the middle curve sine theta over theta to the value one.",
        xlabel: "\\theta",
        xticks: [{ x: 0 }],
        yticks: [{ y: 1, tex: "1" }],
        items: [
          { type: "hline", y: 1, cls: "refline" },
          { type: "curve", fn: (t) => Math.cos(t), domain: [-D, D], cls: "refline" },
          { type: "curve", fn: (t) => (Math.abs(t) < 1e-6 ? 1 : Math.sin(t) / t), domain: [-D, D], samples: 220, cls: "curve" },
          { type: "dot", x: 0, y: 1, hollow: true },
          { type: "text", x: D, y: Math.sin(D) / D, tex: "\\dfrac{\\sin\\theta}{\\theta}", cls: "a-curve", anchor: "start", dx: 3 },
          { type: "text", x: D, y: Math.cos(D), tex: "\\cos\\theta", cls: "a-ref", anchor: "start", dx: 3, dy: 2 },
        ],
      };
      return { layout: "single", panels: [{ svg: buildPlot(cfg) }] };
    },

    /* §3.1 — The slope of sin x is the height of cos x (Figure 3.3).
       sin x (solid) with short grey tangent segments at x = 0, π/2, π whose
       slopes +1, 0, −1 equal the heights of cos x (dashed) marked by dots at
       the same x. Makes sin' = cos a visible "slope = height" fact and
       anchors the four-step derivative cycle (Remark 3.1). The slope values
       and the correspondence live in the caption. */
    "sin-cos-slope": () => {
      const sin = Math.sin, cos = Math.cos, P = Math.PI;
      const tanSeg = (x0) => { const m = cos(x0), w = 0.6; return { type: "seg", x1: x0 - w, y1: sin(x0) - m * w, x2: x0 + w, y2: sin(x0) + m * w, cls: "axis" }; };
      const cfg = {
        w: 336, h: 198, xmin: -0.5, xmax: 6.75, ymin: -1.4, ymax: 1.45,
        pad: { t: 14, r: 12, b: 22, l: 22 },
        aria: "Graphs of sine x (solid) and cosine x (dashed). Where sine is steepest its tangent slope equals the height of cosine; where sine is flat cosine is zero; where sine falls steepest cosine is minus one.",
        xlabel: "x",
        xticks: [{ x: P / 2 }, { x: P }, { x: 3 * P / 2 }, { x: 2 * P }],
        yticks: [{ y: 1, tex: "1" }, { y: -1, tex: "-1" }],
        items: [
          { type: "curve", fn: (x) => cos(x), domain: [-0.5, 2 * P + 0.25], samples: 300, cls: "refline" },
          { type: "curve", fn: (x) => sin(x), domain: [-0.5, 2 * P + 0.25], samples: 300, cls: "curve" },
          tanSeg(0), tanSeg(P / 2), tanSeg(P),
          { type: "dot", x: 0, y: 1 }, { type: "dot", x: P / 2, y: 0 }, { type: "dot", x: P, y: -1 },
          { type: "text", x: 2.3, y: sin(2.3), tex: "\\sin x", cls: "a-curve", anchor: "middle", dy: -9 },
          { type: "text", x: 4.55, y: cos(4.55), tex: "\\cos x", cls: "a-ref", anchor: "start", dy: 11 },
        ],
      };
      return { layout: "single", panels: [{ svg: buildPlot(cfg) }] };
    },

    /* §3.1 — Simple harmonic motion: s, s', s'' stacked (Figure 3.4).
       Three vertically-stacked panels sharing one t-axis: position s = sin t,
       velocity s' = cos t, acceleration s'' = −sin t. Dashed verticals at
       t = π/2, 3π/2 show position extrema aligning with velocity zeros; the
       bottom panel is the vertical mirror of the top (s'' = −s). Raw SVG —
       buildPlot has no stacked-panel / cross-panel-alignment primitive.
       Single-symbol labels s, s', s''; the relations live in the caption. */
    "shm-triple": () => {
      const L = 50, R = 286, TT = 2 * Math.PI, n = 128, A = 30;
      const TX = (t) => L + (t / TT) * (R - L);
      const f1 = (v) => v.toFixed(1);
      const bands = [
        { yc: 54, fn: (t) => Math.sin(t), lab: "s" },
        { yc: 150, fn: (t) => Math.cos(t), lab: "s′" },
        { yc: 246, fn: (t) => -Math.sin(t), lab: "s″" },
      ];
      let svg =
        '<svg viewBox="0 0 300 300" style="width:300px" class="fig-svg" role="img"' +
        ' aria-label="Three vertically stacked graphs over a common time axis: position s equals sine t on top, velocity s-prime equals cosine t in the middle, and acceleration s-double-prime equals minus sine t at the bottom. Dashed vertical lines mark where the position reaches its extrema and the velocity is zero; the bottom graph is the upside-down mirror of the top.">';
      // alignment verticals at t = π/2 and 3π/2 (position extrema ↔ velocity zeros)
      [Math.PI / 2, 3 * Math.PI / 2].forEach((t) => {
        const x = TX(t);
        svg += '<line x1="' + f1(x) + '" y1="30" x2="' + f1(x) + '" y2="282" class="refline"/>';
      });
      bands.forEach((b) => {
        svg += '<line x1="' + L + '" y1="' + b.yc + '" x2="' + R + '" y2="' + b.yc + '" class="axis"/>';
        let d = "";
        for (let i = 0; i <= n; i++) { const t = TT * (i / n); d += (i ? "L" : "M") + f1(TX(t)) + "," + f1(b.yc - A * b.fn(t)) + " "; }
        svg += '<path d="' + d.trim() + '" class="curve"/>';
        svg += '<text x="14" y="' + (b.yc + 4) + '" text-anchor="middle" class="ptlab" font-style="italic">' + b.lab + '</text>';
      });
      // t-axis tick labels under the bottom band
      [[0, "0"], [Math.PI / 2, "π/2"], [Math.PI, "π"], [3 * Math.PI / 2, "3π/2"], [2 * Math.PI, "2π"]].forEach((p) => {
        svg += '<text x="' + f1(TX(p[0])) + '" y="294" text-anchor="middle" class="ptlab">' + p[1] + '</text>';
      });
      svg += '<text x="' + (R + 6) + '" y="' + (246 + 4) + '" text-anchor="start" class="ptlab" font-style="italic">t</text>';
      svg += '</svg>';
      return { layout: "single", panels: [{ svg }] };
    },

    /* §3.2 — Differentiability as tangent-line approximation (Figure 3.6).
       For a smooth f and its tangent at x₀, the vertical gap at x₀+h is the
       remainder R(h) of Definition 3.1. Two panels at the SAME scale show
       that halving h shrinks the gap far faster than h itself — the visual
       meaning of R(h)/h → 0. A generic convex arc (not a named function, so
       no Chapter 2 result is re-proven). */
    "remainder-tangent": () => {
      const f = (x) => 0.34 * x * x + 0.25;
      const x0 = 1.0, m = 0.68;            // f'(x) = 0.68x → 0.68 at x0 = 1
      const f0 = f(x0), tan = (x) => f0 + m * (x - x0);
      const panel = (h, note) => {
        const xe = x0 + h, fe = f(xe), te = tan(xe);
        const cfg = {
          w: 246, h: 186, xmin: 0, xmax: 2.85, ymin: 0, ymax: 2.65,
          pad: { t: 12, r: 12, b: 24, l: 16 },
          aria: "A smooth curve and its tangent line at x-zero; at x-zero plus h the vertical gap between the curve and the tangent is the remainder R of h, which shrinks faster than h.",
          xticks: [{ x: x0, tex: "x_0" }, { x: xe, tex: "x_0\\!+\\!h" }],
          yticks: [],
          items: [
            { type: "seg", x1: 0.18, y1: tan(0.18), x2: 2.8, y2: tan(2.8), cls: "refline" },
            { type: "curve", fn: f, domain: [0.05, 2.82], cls: "curve" },
            { type: "seg", x1: xe, y1: te, x2: xe, y2: fe, cls: "axis" },
            { type: "dot", x: x0, y: f0 },
            { type: "dot", x: xe, y: te, hollow: true },
            { type: "dot", x: xe, y: fe },
            { type: "text", x: 0.62, y: f(0.62), tex: "f", cls: "a-curve", anchor: "end", dy: -6 },
            { type: "text", x: xe, y: (te + fe) / 2, tex: "R(h)", cls: "a-pt", anchor: "start", dx: 4 },
          ],
        };
        return { svg: buildPlot(cfg), note: note };
      };
      return { layout: "pair", panels: [panel(1.35, "larger h"), panel(0.675, "smaller h")] };
    },

    /* §3.3 — arcsin has vertical tangents at y = ±1 (Figure 3.7).
       The curve y = arcsin y on (−1, 1) steepens toward the endpoints; at
       y = ±1 the tangent is vertical (dashed indicators) and the derivative
       1/√(1−y²) blows up, so the endpoints are hollow (derivative does not
       exist there). A short tangent of slope 1 at the centre (= 1/√(1−0))
       gives contrast. Visualizes the Caution; the open-interval restriction
       is in the caption. NOTE: open interval — endpoints hollow, curve does
       not close on y = ±1. */
    "arcsin-vertical-tangent": () => {
      const P = Math.PI, clamp = (y) => Math.max(-0.99999, Math.min(0.99999, y));
      const cfg = {
        w: 240, h: 336, xmin: -1.25, xmax: 1.25, ymin: -1.8, ymax: 1.8,  // equal aspect (≈82 px/unit both axes) so slope-1 reads as 45° and endpoints look vertical
        pad: { t: 16, r: 14, b: 24, l: 20 },
        aria: "Graph of arcsin y on the open interval from minus one to one. The curve grows steeper toward the endpoints; at y equals plus or minus one its tangent is vertical and the derivative does not exist, so the endpoints are drawn as open circles.",
        xlabel: "y",
        xticks: [{ x: -1, tex: "-1" }, { x: 1, tex: "1" }],
        yticks: [{ y: P / 2 }, { y: -P / 2 }],
        items: [
          { type: "seg", x1: -1, y1: -1.74, x2: -1, y2: -1.08, cls: "refline" },
          { type: "seg", x1: 1, y1: 1.08, x2: 1, y2: 1.74, cls: "refline" },
          { type: "curve", fn: (y) => Math.asin(clamp(y)), domain: [-0.9997, 0.9997], samples: 320, cls: "curve" },
          { type: "seg", x1: -0.62, y1: -0.62, x2: 0.62, y2: 0.62, cls: "axis" },
          { type: "dot", x: 1, y: P / 2, hollow: true },
          { type: "dot", x: -1, y: -P / 2, hollow: true },
          { type: "text", x: -0.6, y: 1.2, tex: "\\arcsin y", cls: "a-curve", anchor: "middle" },
          { type: "text", x: 0.52, y: 1.52, text: "vertical tangent", cls: "a-pt", anchor: "middle", size: 10 },
        ],
      };
      return { layout: "single", panels: [{ svg: buildPlot(cfg) }] };
    },

  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 3 — Chain Rule and Trigonometric Derivatives",
  runningHead: "Chapter 3 · Chain Rule and Trigonometric Derivatives",
  fragments: ["sec-3-1", "sec-3-2", "sec-3-3"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      var _probe = document.createElement("div");
      _probe.style.height = "0"; _probe.style.margin = "0"; _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em"; block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;
        body.removeChild(block);
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var remainingAtInsert = 0;
    if (mode !== "none") {
      var splitProbe = document.createElement("div");
      splitProbe.style.height = "0"; splitProbe.style.margin = "0"; splitProbe.style.padding = "0";
      body.appendChild(splitProbe);
      remainingAtInsert = body.clientHeight - (splitProbe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(splitProbe);
    }
    var want = (mode !== "none" && (blockH > body.clientHeight || remainingAtInsert >= FREE_THRESHOLD));
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
</body>
</html>
