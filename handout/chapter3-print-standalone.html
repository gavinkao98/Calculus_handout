<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Chapter 3</div>
    <h1 class="ch-title">Chain Rule and Trigonometric Derivatives</h1>
  </header>

  <p class="lead">Chapter 2 built the derivative from the ground up — as the limit of a difference quotient — and turned it into a working toolkit: rules for constants, powers, sums, products, quotients, and the exponential. Yet a whole world of functions still lies just out of reach. How fast does \(\sin x\) change? And what is the derivative of a <em>composition</em> such as \(\sqrt{1 + x^{2}}\) or \(\sin(x^{2})\), where one function is fed into another? This chapter supplies the two ideas that complete the differentiation toolkit. First we differentiate the trigonometric functions, which forces us to confront a limit no algebra can crack and to break through it with a piece of geometry. Then we prove the <em>chain rule</em>, the single rule that differentiates any composition, and use it to unlock the derivatives of inverse and implicitly defined functions.</p>

  <p class="para-head">By the end of this chapter, you will be able to:</p>
  <ul>
    <li>differentiate \(\sin x\), \(\cos x\), \(\tan x\), and the other trigonometric functions, and combine them with the rules of Chapter 2;</li>
    <li>state the chain rule and use it to differentiate compositions \(f(g(x))\), including nested ones;</li>
    <li>apply logarithmic differentiation to handle expressions such as \(x^{x}\) and \(f(x)^{g(x)}\);</li>
    <li>derive the derivatives of \(\arcsin x\), \(\arctan x\), and \(\ln x\) from their inverse-function relations.</li>
  </ul>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">3.1</span>Derivatives of the Sine and Cosine Functions</h2>
  </header>

  <!-- expansion:intuition — load-bearing intuition: the trig difference quotient collapses to lim sinθ/θ, a 0/0 algebra cannot touch; geometry breaks it -->
  <p>So far every derivative has yielded to algebra. For a polynomial we expanded \((x + h)^{n}\) and canceled the factor of \(h\); for \(e^{x}\) the power series did the same job. The trigonometric functions are different in kind. Consider the difference quotient for \(\sin x\),
  \[ \frac{\sin(x + h) - \sin x}{h}. \]
  No algebraic identity cancels the \(h\) in the denominator against the numerator — \(\sin(x + h)\) does not break into pieces that conveniently subtract. As we are about to see, the entire computation funnels down to a single limit,
  \[ \lim_{\theta \to 0} \frac{\sin \theta}{\theta}, \]
  which has the indeterminate form \(0/0\) and which no amount of algebra will resolve. To evaluate it we need a genuinely new tool: a geometric comparison of areas on the unit circle, squeezed to a limit. That one limit, once secured, unlocks the derivatives of <em>both</em> \(\sin\) and \(\cos\) — and through them the rest of the trigonometric functions.</p>

  <p>Throughout this section angles are measured in radians; this assumption turns out to be essential, as we note below.</p>

  <h3 class="subsec-head">The difference quotient for sine</h3>

  <p>Fix \(x\) and form the difference quotient for \(f(x) = \sin x\). The decisive algebraic step is the sum-to-product identity \(\sin A - \sin B = 2 \cos\frac{A + B}{2} \sin\frac{A - B}{2}\), applied with \(A = x + h\) and \(B = x\):
  \[ \sin(x + h) - \sin x = 2 \cos\Bigl(x + \tfrac{h}{2}\Bigr) \sin\frac{h}{2}. \]
  Dividing by \(h\) and writing the denominator as \(h = 2 \cdot \tfrac{h}{2}\), to match the \(\tfrac{h}{2}\) inside the sine, gives</p>

  <p>\[ \frac{\sin(x + h) - \sin x}{h} = \cos\Bigl(x + \tfrac{h}{2}\Bigr) \cdot \frac{\sin(h/2)}{h/2}. \]</p>

  <p>As \(h \to 0\), two things happen at once. The factor \(\cos\bigl(x + \tfrac{h}{2}\bigr)\) ought to tend to \(\cos x\) — provided \(\cos\) is continuous — and the factor \(\dfrac{\sin(h/2)}{h/2}\) is exactly \(\dfrac{\sin\theta}{\theta}\) with \(\theta = h/2 \to 0\). So the derivative rests on two facts: that sine and cosine are continuous, and the value of \(\lim_{\theta \to 0}\sin\theta/\theta\). We secure both now.</p>

  <h3 class="subsec-head">A geometric inequality on the unit circle</h3>

  <!-- expansion:intuition — motivate the area comparison before carrying it out -->
  <p>To get a grip on \(\sin\theta/\theta\) for small \(\theta\), we compare three areas on a circle of radius \(1\). Because both \(\theta\) and \(\sin\theta\) reverse sign when \(\theta\) is replaced by \(-\theta\), the ratio \(\sin\theta/\theta\) is unchanged — it is an <em>even</em> function — so it is enough to treat \(\theta > 0\), shrinking to \(0\). Take \(0 < \theta < \tfrac{\pi}{2}\) and look at Figure 3.1.</p>

  <!-- expansion:figure — sector inequality on the unit circle (ROADMAP key figure; registered in exp-ch03/figures.js as "sector-inequality") -->
  <figure class="figure" data-fig="sector-inequality">
    <figcaption><span class="fig-no">Figure 3.1</span> The unit-circle area comparison behind \(\sin\theta \le \theta \le \tan\theta\).</figcaption>
  </figure>

  <p>Here \(A = (1, 0)\) lies on the circle, \(B = (\cos\theta, \sin\theta)\) is the point at angle \(\theta\), and \(C = (1, \tan\theta)\) is where the radius \(OB\), extended, meets the vertical tangent line at \(A\). Three nested regions appear, and their areas are easy to read off:</p>

  <ul>
    <li>the inscribed triangle \(OAB\) has base \(OA = 1\) and height \(\sin\theta\), so its area is \(\tfrac12 \sin\theta\);</li>
    <li>the circular sector \(OAB\) is the fraction \(\theta / (2\pi)\) of a disc of area \(\pi\), so its area is \(\tfrac12 \theta\);</li>
    <li>the larger triangle \(OAC\) has base \(OA = 1\) and height \(AC = \tan\theta\), so its area is \(\tfrac12 \tan\theta\).</li>
  </ul>

  <p>The triangle \(OAB\) lies inside the sector, which lies inside the triangle \(OAC\), so their areas increase in that order:
  \[ \tfrac12 \sin\theta \;\le\; \tfrac12 \theta \;\le\; \tfrac12 \tan\theta. \]
  Equivalently, split the outer triangle as \(OAC = OAB \cup ABC\): the corner piece \(ABC\) is what \(OAC\) adds to the inscribed triangle \(OAB\), and it contains the circular segment between the chord \(AB\) and the arc. Multiplying through by \(2\) gives \(\sin\theta \le \theta \le \tan\theta\). Dividing by \(\sin\theta > 0\) and using \(\tan\theta = \sin\theta/\cos\theta\) turns this into \(1 \le \dfrac{\theta}{\sin\theta} \le \dfrac{1}{\cos\theta}\), and taking reciprocals of these positive quantities reverses the inequalities:
  \[ \cos\theta \;\le\; \frac{\sin\theta}{\theta} \;\le\; 1, \qquad 0 < \theta < \tfrac{\pi}{2}. \tag{1} \]
  In particular \(0 \le \lvert \sin\theta \rvert \le \lvert \theta \rvert\) for \(\lvert \theta \rvert < \tfrac{\pi}{2}\) — a bound we lean on repeatedly below.</p>

  <h3 class="subsec-head">Continuity of sine and cosine</h3>

  <!-- expansion:intuition — why continuity is needed here; cross-ref the Ch1 notion of continuity, do not restate its definition (D3) -->
  <p>The bound \(\lvert \sin\theta \rvert \le \lvert \theta \rvert\) does more than help with the fundamental limit: it is also what makes sine and cosine continuous, in the sense introduced in Chapter 1. Continuity is exactly what the two factors of the difference quotient need in order to settle to their values as \(h \to 0\), so we establish it now.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">3.1</span><span class="env-name">Continuity of sine and cosine</span></p>
    <div class="env-body">
      <p>The functions \(\sin x\) and \(\cos x\) are continuous at every \(x_{0} \in \mathbb{R}\).</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Everything rests on one bound: \(0 \le \lvert \sin\theta \rvert \le \lvert \theta \rvert\) near \(\theta = 0\), from inequality (1). Since \(\lvert \theta \rvert \to 0\) as \(\theta \to 0\), the squeeze theorem (§1.5) forces \(\lvert \sin\theta \rvert \to 0\), so</p>
      <p>\[ \lim_{\theta \to 0} \sin\theta = 0. \]</p>
      <p>Now fix \(x_{0}\). The sum-to-product identities give</p>
      <p>\[ \begin{aligned}
        \cos x - \cos x_{0} &= -2 \sin\frac{x - x_{0}}{2}\, \sin\frac{x + x_{0}}{2}, \\
        \sin x - \sin x_{0} &= \phantom{-}2 \cos\frac{x + x_{0}}{2}\, \sin\frac{x - x_{0}}{2}.
      \end{aligned} \]</p>
      <p>In each line the factor with argument \(\tfrac{x + x_{0}}{2}\) has absolute value at most \(1\), so</p>
      <p>\[ \lvert \cos x - \cos x_{0} \rvert \le 2\Bigl\lvert \sin\tfrac{x - x_{0}}{2} \Bigr\rvert, \qquad \lvert \sin x - \sin x_{0} \rvert \le 2\Bigl\lvert \sin\tfrac{x - x_{0}}{2} \Bigr\rvert. \]</p>
      <p>As \(x \to x_{0}\) the angle \(\tfrac{x - x_{0}}{2} \to 0\), so by the limit just established both right-hand sides tend to \(0\). The squeeze theorem then gives \(\cos x \to \cos x_{0}\) and \(\sin x \to \sin x_{0}\); that is, cosine and sine are continuous at \(x_{0}\).</p>
    </div>
  </section>

  <h3 class="subsec-head">The fundamental limit</h3>

  <!-- expansion:intuition — frame the squeeze payoff -->
  <p>With continuity secured, we can finally squeeze \(\sin\theta/\theta\) to its limit (Figure 3.2).</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">3.2</span><span class="env-name">The fundamental trigonometric limit</span></p>
    <div class="env-body">
      <p>\[ \lim_{\theta \to 0} \frac{\sin\theta}{\theta} = 1. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>For \(0 < \theta < \tfrac{\pi}{2}\), inequality (1) reads \(\cos\theta \le \dfrac{\sin\theta}{\theta} \le 1\). As \(\theta \to 0^{+}\) the upper bound is the constant \(1\), while the lower bound satisfies \(\cos\theta \to \cos 0 = 1\) by the continuity of cosine (Proposition 3.1). The squeeze theorem (§1.5) pins the quantity between them: \(\lim_{\theta \to 0^{+}} \sin\theta/\theta = 1\). Finally \(\sin\theta/\theta\) is even, so its left-hand limit at \(0\) equals its right-hand limit, and the two-sided limit is \(1\) as well.</p>
    </div>
  </section>

  <!-- expansion:figure — the same bound read as a function graph: (sinθ)/θ squeezed between cosθ and 1 (registered in figures.js as "squeeze-limit") -->
  <figure class="figure" data-fig="squeeze-limit">
    <figcaption><span class="fig-no">Figure 3.2</span> A graphical reading of the squeeze in Proposition 3.2: \(\dfrac{\sin\theta}{\theta}\) sits between \(\cos\theta\) and \(1\), with an open circle at \(\theta = 0\).</figcaption>
  </figure>

  <!-- expansion:caution — Proposition 3.2 is a limit statement, not an identity; fixed angles give values far from 1 (Mode C wave-② soft-depth enrichment) [pass: enrichment] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Proposition 3.2 is a statement about the <em>limit</em> as \(\theta \to 0\), not an identity. At a fixed angle the ratio \(\sin\theta/\theta\) is generally not \(1\): at \(\theta = \tfrac{\pi}{2}\) it equals \(\dfrac{\sin(\pi/2)}{\pi/2} = \dfrac{1}{\pi/2} = \dfrac{2}{\pi} \approx 0.64\), and at \(\theta = \pi\) it equals \(\dfrac{0}{\pi} = 0\). The value \(1\) is reached only in the limit, as \(\theta\) shrinks to \(0\).</p>
    </div>
  </section>

  <!-- expansion:caution — the radian convention is essential: sinθ/θ→1, and hence sin'=cos, fails in degrees -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Everything here depends on measuring angles in <em>radians</em>. The sector area \(\tfrac12\theta\) — and with it the limit \(\sin\theta/\theta \to 1\) — uses the radian measure, for which the arc cut off on the unit circle has length exactly \(\theta\). In degrees the limit is not \(1\): since \(x^{\circ} = \tfrac{\pi}{180}x\) radians, one finds \(\lim_{x \to 0}\dfrac{\sin(x^{\circ})}{x} = \dfrac{\pi}{180}\), and so \(\dfrac{d}{dx}\sin(x^{\circ}) = \dfrac{\pi}{180}\cos(x^{\circ})\). The clean formulas of this section, \(\sin' = \cos\) and \(\cos' = -\sin\), hold only in radians.</p>
    </div>
  </section>

  <h3 class="subsec-head">The derivatives of sine and cosine</h3>

  <!-- expansion:intuition — assemble the pieces -->
  <p>With continuity and the fundamental limit in hand, the difference quotient for \(\sin\) all but evaluates itself.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">3.1</span><span class="env-name">Derivative of sine</span></p>
    <div class="env-body">
      <p>\[ \frac{d}{dx}\sin x = \cos x \qquad \text{for all } x \in \mathbb{R}. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Using the form of the difference quotient found above,</p>
      <p>\[ \begin{aligned}
        \frac{d}{dx}\sin x &= \lim_{h \to 0} \frac{\sin(x + h) - \sin x}{h} \\[2pt]
          &= \lim_{h \to 0} \cos\Bigl(x + \tfrac{h}{2}\Bigr) \cdot \frac{\sin(h/2)}{h/2}.
      \end{aligned} \]</p>
      <p>As \(h \to 0\), the first factor tends to \(\cos x\) because cosine is continuous (Proposition 3.1), and the second tends to \(1\) by the fundamental limit (Proposition 3.2), with \(\theta = h/2 \to 0\). The product therefore tends to \(\cos x \cdot 1 = \cos x\).</p>
    </div>
  </section>

  <!-- expansion:intuition — same machinery, second function -->
  <p>Cosine yields to the very same machinery, this time through the companion identity \(\cos A - \cos B = -2 \sin\frac{A + B}{2} \sin\frac{A - B}{2}\).</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">3.2</span><span class="env-name">Derivative of cosine</span></p>
    <div class="env-body">
      <p>\[ \frac{d}{dx}\cos x = -\sin x \qquad \text{for all } x \in \mathbb{R}. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>With \(A = x + h\) and \(B = x\), the identity gives \(\cos(x + h) - \cos x = -2 \sin\bigl(x + \tfrac{h}{2}\bigr) \sin\tfrac{h}{2}\), so</p>
      <p>\[ \frac{\cos(x + h) - \cos x}{h} = -\sin\Bigl(x + \tfrac{h}{2}\Bigr) \cdot \frac{\sin(h/2)}{h/2}. \]</p>
      <p>Letting \(h \to 0\), the factor \(\sin\bigl(x + \tfrac{h}{2}\bigr) \to \sin x\) by continuity (Proposition 3.1) and \(\dfrac{\sin(h/2)}{h/2} \to 1\) by Proposition 3.2, so</p>
      <p>\[ \frac{d}{dx}\cos x = -\sin x \cdot 1 = -\sin x. \]</p>
    </div>
  </section>

  <!-- expansion:figure — sin'=cos as slope=height: tangents of sin x vs heights of cos x (registered in figures.js as "sin-cos-slope") -->
  <figure class="figure" data-fig="sin-cos-slope">
    <figcaption><span class="fig-no">Figure 3.3</span> Tangent slopes on \(y = \sin x\) matching the heights of \(y = \cos x\) at the same \(x\)-values.</figcaption>
  </figure>

  <!-- expansion:example — companion fundamental limit (1−cosθ)/θ → 0 (D2; standard companion to Proposition 3.2) -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.1</span></p>
      <div class="env-body">
        <p>Establish the companion limit \(\displaystyle \lim_{\theta \to 0} \frac{1 - \cos\theta}{\theta} = 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>This is again of the form \(0/0\). Multiplying numerator and denominator by \(1 + \cos\theta\) converts the numerator into something \(\sin\) can handle:</p>
        <p>\[ \begin{aligned}
          \frac{1 - \cos\theta}{\theta}
            &= \frac{(1 - \cos\theta)(1 + \cos\theta)}{\theta\,(1 + \cos\theta)}
             = \frac{1 - \cos^{2}\theta}{\theta\,(1 + \cos\theta)} \\[2pt]
            &= \frac{\sin^{2}\theta}{\theta\,(1 + \cos\theta)}
             = \frac{\sin\theta}{\theta} \cdot \frac{\sin\theta}{1 + \cos\theta}.
        \end{aligned} \]</p>
        <p>As \(\theta \to 0\), the first factor tends to \(1\) by Proposition 3.2, while the second tends to \(\dfrac{0}{1 + 1} = 0\) by the continuity of sine and cosine (Proposition 3.1). The product tends to \(1 \cdot 0 = 0\).</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — tan' (D1, manuscript HW) and sec' (③ pull-in, manuscript HW), both via the quotient rule of §2.5 -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.2</span></p>
      <div class="env-body">
        <p>Using \(\sin' = \cos\) and \(\cos' = -\sin\) together with the quotient rule (§2.5), differentiate (a) \(\tan x\) and (b) \(\sec x\), wherever \(\cos x \ne 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>For (a), write \(\tan x = \dfrac{\sin x}{\cos x}\) and apply the quotient rule:</p>
        <p>\[ \begin{aligned}
          \frac{d}{dx}\tan x
            &= \frac{(\cos x)(\cos x) - (\sin x)(-\sin x)}{\cos^{2} x} \\[2pt]
            &= \frac{\cos^{2} x + \sin^{2} x}{\cos^{2} x}
             = \frac{1}{\cos^{2} x} = \sec^{2} x,
        \end{aligned} \]</p>
        <p>where the Pythagorean identity \(\cos^{2} x + \sin^{2} x = 1\) collapses the numerator.</p>
        <p>For (b), write \(\sec x = \dfrac{1}{\cos x}\). The quotient rule, with the constant numerator \(1\), gives</p>
        <p>\[ \begin{aligned}
          \frac{d}{dx}\sec x
            &= \frac{0 \cdot \cos x - 1 \cdot (-\sin x)}{\cos^{2} x} \\[2pt]
            &= \frac{\sin x}{\cos^{2} x}
             = \frac{1}{\cos x}\cdot\frac{\sin x}{\cos x}
             = \sec x \tan x.
        \end{aligned} \]</p>
        <p>The same technique applied to \(\cot x = \dfrac{\cos x}{\sin x}\) and \(\csc x = \dfrac{1}{\sin x}\) gives \(\dfrac{d}{dx}\cot x = -\csc^{2} x\) and \(\dfrac{d}{dx}\csc x = -\csc x \cot x\) (where \(\sin x \ne 0\)), completing the derivatives of all six trigonometric functions.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — simple harmonic motion uses only sin'/cos' (no chain rule); sets up Remark 3.1 (approved at ③, new type: application) -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.3</span></p>
      <div class="env-body">
        <p>A weight bobbing on a spring has height \(s(t) = \sin t\) above its rest level at time \(t\). Find its velocity \(s'(t)\) and acceleration \(s''(t)\), and describe how the acceleration is related to the height.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Velocity is the derivative of height, and acceleration the derivative of velocity. Differentiating with Theorems 3.1 and 3.2,</p>
        <p>\[ s'(t) = \cos t, \qquad s''(t) = \frac{d}{dt}\cos t = -\sin t. \]</p>
        <p>Thus \(s''(t) = -\sin t = -s(t)\): at every instant the weight accelerates back toward its rest level, by an amount proportional to how far it has strayed. This relation \(s'' = -s\) is the signature of <em>simple harmonic motion</em> (Figure 3.4), and it is no accident that sine and cosine — the functions whose second derivative is their own negative — are precisely the ones that describe oscillation.</p>
      </div>
    </section>
  </div>

  <!-- expansion:figure — SHM: s=sin t, s'=cos t, s''=−sin t stacked; s''=−s mirror (registered in figures.js as "shm-triple") -->
  <figure class="figure" data-fig="shm-triple">
    <figcaption><span class="fig-no">Figure 3.4</span> Simple harmonic motion over one time axis: \(s = \sin t\), \(s' = \cos t\), and \(s'' = -\sin t\).</figcaption>
  </figure>

  <!-- expansion:intuition — the four-fold derivative cycle, a bookend echoing the e^x self-replication remark of §2.4 -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">3.1</span><span class="env-name">The derivative cycle of sine and cosine</span></p>
    <div class="env-body">
      <p>Differentiation sends sine and cosine into each other, with a sign that turns over every second step (Figure 3.3). Writing \(\to\) for one application of \(\dfrac{d}{dx}\),</p>
      <p>\[ \sin x \;\to\; \cos x \;\to\; -\sin x \;\to\; -\cos x \;\to\; \sin x. \]</p>
      <p>After four derivatives we are back where we started, so \(\dfrac{d^{4}}{dx^{4}}\sin x = \sin x\), and likewise for cosine. Where \(e^{x}\) reproduces itself in a single step (§2.4), sine and cosine reproduce themselves in a cycle of four — the same self-renewal that lets \(s'' = -s\) describe an oscillation that never winds down.</p>
    </div>
  </section>

  <!-- expansion:summary — forward-ref to §3.2 (the chain rule), which is what makes sin(g(x)) etc. accessible -->
  <p>We can now differentiate every trigonometric function — but only in its bare form, \(\sin x\) rather than \(\sin(x^{2})\) or \(\sin(3x + 1)\). To reach a function tucked <em>inside</em> another we need a rule for differentiating compositions. That rule, the chain rule, is the business of the next section; with it, the derivatives found here become the seeds of a vast family of new ones.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">3.2</span>The Chain Rule</h2>
  </header>

  <!-- expansion:intuition — load-bearing intuition: rates multiply because local linear approximations compose; this carries the statement, the Leibniz mnemonic, and the proof strategy at once -->
  <p>Section 3.1 gave us the derivatives of the trigonometric functions, but only in their bare form. We can differentiate \(\sin x\), yet nothing so far reaches \(\sin(x^{2})\) or \(\sqrt{1 + x^{2}}\), where one function is fed <em>into</em> another. Chapter 2 supplied rules for sums, products, and quotients — but not for <em>composition</em>, the operation of applying one function to the output of another. The chain rule fills exactly this gap, and it is the rule that finally completes the differentiation toolkit.</p>

  <p>The idea behind it, pictured in Figure 3.5, fits in a single image. Near a point, a differentiable function behaves like its tangent line: it takes a small change in its input and scales it by its slope. The catch is only that this is approximate: there is an error, and it shrinks faster than the change itself. Now chain two such functions together. If \(g\) scales a small increment \(h\) by \(g'(x)\), and \(f\) then scales <em>that</em> by \(f'(g(x))\), the two magnifications stack — the composite scales \(h\) by the product \(f'(g(x))\,g'(x)\). That product is the chain rule, and the proof at the end of this section is nothing more than the careful check that the two error terms, once chained, are still negligible.</p>

  <p>Alongside the chain rule, this section draws on two results that already belong to Chapter 2 — the product rule (§2.5) and the fact that a differentiable function is continuous (§2.3, Theorem 2.1). We take both as established and use them freely, without re-proving them here.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">3.3</span><span class="env-name">The chain rule</span></p>
    <div class="env-body">
      <p>Let \(g\) be differentiable at \(x_{0}\), and let \(f\) be differentiable at \(g(x_{0})\). Then the composition \(P = f \circ g\), given by \(P(x) = f(g(x))\), is differentiable at \(x_{0}\), and</p>
      <p>\[ P'(x_{0}) = f'(g(x_{0}))\, g'(x_{0}). \]</p>
    </div>
  </section>

  <!-- expansion:figure — chain rule as composed mapping (ROADMAP key figure; registered in exp-ch03/figures.js as "composed-mapping") -->
  <figure class="figure" data-fig="composed-mapping">
    <figcaption><span class="fig-no">Figure 3.5</span> The chain rule as a composed mapping: local slope factors accumulate along \(x \mapsto u \mapsto y\).</figcaption>
  </figure>

  <!-- expansion:intuition — the Leibniz form (the working notation), with the mnemonic-not-proof caveat folded in (ROADMAP pitfall) -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">3.2</span><span class="env-name">The Leibniz form</span></p>
    <div class="env-body">
      <p>Writing \(u = g(x)\) for the inner variable and \(y = f(u)\) for the output, the chain rule takes the memorable Leibniz shape</p>
      <p>\[ \frac{dy}{dx} = \frac{dy}{du}\cdot\frac{du}{dx}. \]</p>
      <p>This is the form most often used in practice, and it reads as “the rate of \(y\) per \(x\) equals the rate of \(y\) per \(u\) times the rate of \(u\) per \(x\).” The apparent cancellation of \(du\) is a useful memory aid, but it is <em>not</em> a proof: \(\dfrac{dy}{du}\) and \(\dfrac{du}{dx}\) are limits, not fractions with a common factor to strike out. What actually makes the rule true is the argument given below, where the controlled error terms — not a literal \(du/du = 1\) — do the work.</p>
    </div>
  </section>

  <!-- expansion:strategy — chain-rule decomposition (ROADMAP-assigned; the chapter's first Strategy box) -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">3.1</span><span class="env-name">Differentiating a composition</span></p>
    <div class="env-body">
      <p>To differentiate a composite expression, work from the outside in.</p>
      <ol class="steps">
        <li>Identify the <em>outermost</em> operation — the last thing you would carry out if you evaluated the expression at a number. Call it the outer function \(f\).</li>
        <li>Whatever that operation is applied to is the inner function \(u = g(x)\).</li>
        <li>Differentiate the outer function at the inner one, forming \(f'(g(x))\) — treat the inside as a single block and leave it untouched for now.</li>
        <li>Multiply by the derivative of the inside: the answer is \(f'(g(x))\cdot g'(x)\).</li>
        <li>If the inside is itself a composition, repeat steps 1–4 on it. Every layer contributes one slope factor, and the factors multiply.</li>
      </ol>
      <p>For \(\sqrt{1 + x^{2}}\), the last operation is the square root, so \(f(u) = \sqrt{u}\) and \(g(x) = 1 + x^{2}\); for \(\sin(x^{2})\), the outer function is \(\sin\) and the inner is \(x^{2}\).</p>
    </div>
  </section>

  <h3 class="subsec-head">Why the rule is true</h3>

  <!-- expansion:intuition — bridge: the rule is usable; to prove it we need the remainder form, which packages differentiability as a linear approximation that composes -->
  <p>The rule is already usable — the rest of this section earns it. To prove that the two slopes really do multiply, we need to handle both functions’ linear approximations at once, and for that it helps to repackage what “differentiable” means. Chapter 2 defined \(f\) to be differentiable at \(x_{0}\) when the difference quotient \(\dfrac{f(x_{0}+h) - f(x_{0})}{h}\) has a limit as \(h \to 0\) (§2.2); that limit is \(f'(x_{0})\). The following form says the same thing, but as a statement about approximation by a straight line.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">3.1</span><span class="env-name">Differentiability, remainder form</span></p>
    <div class="env-body">
      <p>A function \(f\) is <em>differentiable</em> at \(x_{0}\) if there is a number \(m\) and a function \(R\) such that</p>
      <p>\[ f(x_{0} + h) = f(x_{0}) + m h + R(h), \qquad \lim_{h \to 0}\frac{R(h)}{h} = 0. \]</p>
      <p>The number \(m\) is the derivative \(f'(x_{0})\).</p>
      <!-- expansion:intuition — informal gloss on the remainder form; the seed's bare Def 2 carries no such gloss -->
      <p class="informal">Informally, \(f(x_{0}+h)\) equals its tangent-line value \(f(x_{0}) + m h\) plus an error \(R(h)\) that dies away faster than \(h\) does — the tangent line is a good fit to first order (Figure 3.6).</p>
    </div>
  </section>

  <!-- expansion:figure — remainder form geometry: curve vs tangent, gap R(h) shrinking faster than h (registered in figures.js as "remainder-tangent") -->
  <figure class="figure" data-fig="remainder-tangent">
    <figcaption><span class="fig-no">Figure 3.6</span> Remainder-form geometry: halving \(h\) makes the vertical error \(R(h)\) much smaller, illustrating \(R(h)/h \to 0\).</figcaption>
  </figure>

  <!-- expansion:intuition — frame the equivalence: the remainder form is not a new notion of derivative, just a repackaging of §2.2 -->
  <p>This is not a new notion of derivative, only a new way of writing the old one.</p>

  <!-- expansion:formula — the equivalence the manuscript only asserts ("easy to see"), here stated as a citable Proposition (proof below) -->
  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">3.3</span><span class="env-name">Equivalence of the two forms</span></p>
    <div class="env-body">
      <p>The limit form of differentiability (§2.2) and the remainder form (Definition 3.1) are equivalent: \(f\) satisfies one at \(x_{0}\) if and only if it satisfies the other, and the number \(m\) is the same in both — namely \(f'(x_{0})\).</p>
    </div>
  </section>

  <!-- expansion:formula — the manuscript states only "it is easy to see that Def 1 and Def 2 are equivalent"; we supply the faithful short bidirectional argument -->
  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose first that the limit form holds, with \(\lim_{h \to 0}\dfrac{f(x_{0}+h) - f(x_{0})}{h} = m\). Define \(R(h) = f(x_{0}+h) - f(x_{0}) - m h\). Then</p>
      <p>\[ \frac{R(h)}{h} = \frac{f(x_{0}+h) - f(x_{0})}{h} - m \;\longrightarrow\; m - m = 0, \]</p>
      <p>so the remainder form holds with this same \(m\). Conversely, suppose the remainder form holds: \(f(x_{0}+h) = f(x_{0}) + m h + R(h)\) with \(R(h)/h \to 0\). Dividing by \(h\),</p>
      <p>\[ \frac{f(x_{0}+h) - f(x_{0})}{h} = m + \frac{R(h)}{h} \;\longrightarrow\; m + 0 = m, \]</p>
      <p>so the limit form holds, again with the same \(m\). The two forms therefore describe the same property and the same derivative.</p>
    </div>
  </section>

  <!-- expansion:intuition — orient the proof before the symbols: write both functions in remainder form, substitute, watch the linear parts multiply, collect the rest into one remainder -->
  <p>With the remainder form available, the chain rule comes out by substitution. We expand \(g\) near \(x_{0}\) and \(f\) near \(g(x_{0})\), each as a linear part plus a small remainder; feeding one into the other, the linear parts multiply to give \(g'(x_{0})f'(g(x_{0}))\,h\), and everything left over gathers into a single remainder. The whole proof is then the one estimate that this leftover still vanishes faster than \(h\).</p>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span><span class="env-name">of Theorem 3.3</span></p>
    <div class="env-body">
      <p>We use the remainder form of differentiability (Definition 3.1), which by Proposition 3.3 is available for any differentiable function. Because \(g\) is differentiable at \(x_{0}\),</p>
      <p>\[ g(x_{0} + h) = g(x_{0}) + m_{1} h + R_{1}(h), \qquad m_{1} = g'(x_{0}), \quad \lim_{h \to 0}\frac{R_{1}(h)}{h} = 0. \]</p>
      <p>Because \(f\) is differentiable at \(g(x_{0})\), we may apply the remainder form to \(f\) with the increment \(m_{1} h + R_{1}(h)\) playing the role of \(h\):</p>
      <p>\[ \begin{aligned}
        P(x_{0}+h)
          &= f\bigl(g(x_{0}+h)\bigr) \\[2pt]
          &= f(g(x_{0})) + m_{2}\bigl[m_{1} h + R_{1}(h)\bigr] + R_{2}\bigl(m_{1} h + R_{1}(h)\bigr),
      \end{aligned} \]</p>
      <p>where \(m_{2} = f'(g(x_{0}))\) and \(\lim_{y \to 0} R_{2}(y)/y = 0\). Collecting the term linear in \(h\) and bundling the rest into a single remainder \(R_{3}\),</p>
      <p>\[ \begin{aligned}
        &P(x_{0}+h) = P(x_{0}) + \bigl(g'(x_{0})\,f'(g(x_{0}))\bigr) h + R_{3}(h), \\[2pt]
        &\qquad R_{3}(h) = m_{2} R_{1}(h) + R_{2}\bigl(m_{1} h + R_{1}(h)\bigr),
      \end{aligned} \]</p>
      <p>using \(f(g(x_{0})) = P(x_{0})\) and \(m_{1} m_{2} = g'(x_{0})f'(g(x_{0})) = f'(g(x_{0}))g'(x_{0})\), the same product in either order. By the remainder form, this says precisely that \(P\) is differentiable at \(x_{0}\) with \(P'(x_{0}) = f'(g(x_{0}))g'(x_{0})\). It remains only to show that</p>
      <p>\[ \lim_{h \to 0}\frac{R_{3}(h)}{h} = 0. \]</p>
      <!-- expansion:formula — the manuscript leaves the splitting and the easy term m₂R₁(h)/h → 0 implicit; we make it explicit -->
      <p>Split the quotient into its two pieces, \(\dfrac{R_{3}(h)}{h} = m_{2}\dfrac{R_{1}(h)}{h} + \dfrac{R_{2}(m_{1} h + R_{1}(h))}{h}\). The first piece is easy: \(m_{2}\) is a constant and \(R_{1}(h)/h \to 0\), so \(m_{2} R_{1}(h)/h \to 0\). We also note for later that \(m_{1} h + R_{1}(h) \to 0\) as \(h \to 0\), since \(m_{1} h \to 0\) and \(R_{1}(h) \to 0\) (the latter because \(R_{1}(h)/h \to 0\)).</p>
      <p>The second piece, \(R_{2}(m_{1} h + R_{1}(h))/h\), is the delicate one. Fix \(\varepsilon > 0\).</p>
      <ul>
        <li>Since \(R_{2}(y)/y \to 0\), there is a \(\delta > 0\) with \(\left\lvert R_{2}(y)/y \right\rvert < \varepsilon\) whenever \(0 < \lvert y \rvert < \delta\).</li>
        <li>Since \(m_{1} h + R_{1}(h) \to 0\), there is an \(\alpha > 0\) with \(\lvert m_{1} h + R_{1}(h) \rvert < \delta\) whenever \(0 < \lvert h \rvert < \alpha\).</li>
      </ul>
      <p>Now fix \(h\) with \(0 < \lvert h \rvert < \alpha\). If \(m_{1} h + R_{1}(h) = 0\), then \(R_{2}(m_{1} h + R_{1}(h)) = R_{2}(0) = 0\) — the remainder relation \(f(g(x_{0}) + y) = f(g(x_{0})) + m_{2} y + R_{2}(y)\) at \(y = 0\) forces \(R_{2}(0) = 0\) — and the quotient is \(0\). Otherwise \(0 < \lvert m_{1} h + R_{1}(h) \rvert < \delta\), and we factor</p>
      <p>\[ \frac{\lvert R_{2}(m_{1} h + R_{1}(h)) \rvert}{\lvert h \rvert} = \frac{\lvert m_{1} h + R_{1}(h) \rvert}{\lvert h \rvert} \cdot \frac{\lvert R_{2}(m_{1} h + R_{1}(h)) \rvert}{\lvert m_{1} h + R_{1}(h) \rvert}. \]</p>
      <!-- expansion:formula — the manuscript jumps straight to the next bound; we supply the two standard steps (the ε bound from the first bullet, and the triangle inequality) it skips -->
      <p>By the first bullet the second factor is less than \(\varepsilon\); and by the triangle inequality the first factor satisfies \(\dfrac{\lvert m_{1} h + R_{1}(h) \rvert}{\lvert h \rvert} = \left\lvert m_{1} + \dfrac{R_{1}(h)}{h} \right\rvert \le \lvert m_{1} \rvert + \dfrac{\lvert R_{1}(h) \rvert}{\lvert h \rvert}\). Hence, in either case,</p>
      <p>\[ \frac{\lvert R_{2}(m_{1} h + R_{1}(h)) \rvert}{\lvert h \rvert} \le \left( \lvert m_{1} \rvert + \frac{\lvert R_{1}(h) \rvert}{\lvert h \rvert} \right)\varepsilon. \]</p>
      <p>Finally, since \(R_{1}(h)/h \to 0\), there is an \(\alpha_{1} \in (0, \alpha)\) with \(\lvert R_{1}(h) \rvert/\lvert h \rvert < 1\) for \(0 < \lvert h \rvert < \alpha_{1}\). For such \(h\),</p>
      <p>\[ \frac{\lvert R_{2}(m_{1} h + R_{1}(h)) \rvert}{\lvert h \rvert} < \bigl( \lvert m_{1} \rvert + 1 \bigr)\varepsilon. \]</p>
      <p>As \(\varepsilon > 0\) was arbitrary and \(\lvert m_{1} \rvert + 1\) is a fixed constant, this second piece tends to \(0\) as well. Combining the two pieces, \(R_{3}(h)/h \to 0\), and the chain rule is proved.</p>
    </div>
  </section>

  <h3 class="subsec-head">Using the rule</h3>

  <!-- expansion:example — single composition; pays off √(1+x²) and sin(x²) promised in the chapter opener; part (b) stages the inner-derivative pitfall -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.4</span></p>
      <div class="env-body">
        <p>Differentiate (a) \(\sqrt{1 + x^{2}}\) and (b) \(\sin(x^{2})\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>For (a), the outermost operation is the square root, so \(f(u) = \sqrt{u} = u^{1/2}\) and \(g(x) = 1 + x^{2}\). By the power rule (Chapter 2), \(f'(u) = \tfrac12 u^{-1/2}\), and \(g'(x) = 2x\). By the chain rule,</p>
        <p>\[ \frac{d}{dx}\sqrt{1 + x^{2}} = \frac{1}{2\sqrt{1 + x^{2}}}\cdot 2x = \frac{x}{\sqrt{1 + x^{2}}}. \]</p>
        <p>For (b), the outer function is sine and the inner is \(x^{2}\), so with \(f'(u) = \cos u\) (Theorem 3.1) and \(g'(x) = 2x\),</p>
        <p>\[ \frac{d}{dx}\sin(x^{2}) = \cos(x^{2})\cdot 2x = 2x\cos(x^{2}). \]</p>
        <p>The factor \(2x\) is the inner derivative; dropping it and writing just \(\cos(x^{2})\) is the single most common chain-rule error, which the Caution below isolates.</p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — the chapter's #1 pitfall (ROADMAP): forgetting the inner derivative -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The most common mistake with the chain rule is to differentiate the outer function and forget the inner derivative — writing \(\dfrac{d}{dx}\sin(g(x)) = \cos(g(x))\) instead of the correct \(\cos(g(x))\cdot g'(x)\). The inner factor \(g'(x)\) — the \(2x\) in \(\sin(x^{2})\) above — is never optional.</p>
    </div>
  </section>

  <!-- expansion:example — a three-layer nested composition (ROADMAP core skill f(g(h(x)))); shows Strategy 3.1 iterated, slopes multiplying down the chain -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.5</span></p>
      <div class="env-body">
        <p>Differentiate \(\sqrt{1 + \sin^{2} x}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>This is a composition three layers deep: the square root of \(1 + \sin^{2} x\), in which \(\sin^{2} x = (\sin x)^{2}\) is itself a composition. Peeling from the outside in, the outer function is \(\sqrt{\,\cdot\,}\) applied to \(u = 1 + \sin^{2} x\); inside, \(\sin^{2} x\) is the square of \(v = \sin x\). Differentiating one layer at a time,</p>
        <p>\[ \begin{aligned}
          \frac{d}{dx}\sqrt{1 + \sin^{2} x}
            &= \frac{1}{2\sqrt{1 + \sin^{2} x}}\cdot \frac{d}{dx}\bigl(1 + \sin^{2} x\bigr) \\[2pt]
            &= \frac{1}{2\sqrt{1 + \sin^{2} x}}\cdot 2\sin x\cdot \cos x \\[2pt]
            &= \frac{\sin x \cos x}{\sqrt{1 + \sin^{2} x}}.
        \end{aligned} \]</p>
        <p>Each layer contributes exactly one factor: \(\tfrac12 u^{-1/2}\) from the square root, \(2\sin x\) from squaring, and \(\cos x\) from the sine. Their product is the derivative — the slopes multiply down the chain, just as Figure 3.5 pictures.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — chain rule × quotient rule: the inner derivative is itself a §2.5 quotient-rule computation (Mode C example supplement) [pass: enrichment] [source: CLP-1 §2.9 Procedural, 2009H variant; stated for x>1, the branch where √((x-1)/(x+2))=√(x-1)/√(x+2) — the function is also differentiable on x<-2] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.6</span></p>
      <div class="env-body">
        <p>Differentiate \(\sqrt{\dfrac{x - 1}{x + 2}}\) for \(x > 1\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The outermost operation is the square root, so by Strategy 3.1 take \(f(u) = \sqrt{u} = u^{1/2}\) with inner function \(u = \dfrac{x - 1}{x + 2}\). The chain rule gives</p>
        <p>\[ \frac{d}{dx}\sqrt{\frac{x - 1}{x + 2}} = \frac{1}{2\sqrt{(x - 1)/(x + 2)}}\cdot\frac{d}{dx}\!\left(\frac{x - 1}{x + 2}\right). \]</p>
        <p>The inner derivative is now a quotient-rule computation (§2.5):</p>
        <p>\[ \frac{d}{dx}\!\left(\frac{x - 1}{x + 2}\right) = \frac{(x + 2)\cdot 1 - (x - 1)\cdot 1}{(x + 2)^{2}} = \frac{3}{(x + 2)^{2}}. \]</p>
        <p>Substituting, and writing \(\dfrac{1}{2\sqrt{(x - 1)/(x + 2)}} = \dfrac{\sqrt{x + 2}}{2\sqrt{x - 1}}\),</p>
        <p>\[ \frac{d}{dx}\sqrt{\frac{x - 1}{x + 2}} = \frac{\sqrt{x + 2}}{2\sqrt{x - 1}}\cdot\frac{3}{(x + 2)^{2}} = \frac{3}{2\sqrt{x - 1}\,(x + 2)^{3/2}} \qquad (x > 1). \]</p>
        <p>The chain rule does not finish the job by itself: the factor it asks for — the derivative of the inside — is a small problem of its own, here a quotient rule.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — chain rule × product rule, with the chain applied to the trigonometric power cos²x = [cos x]² (Mode C example supplement) [pass: enrichment] [source: CLP-1 §2.9 Procedural, 1996D] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.7</span></p>
      <div class="env-body">
        <p>Differentiate \(y = (1 + x^{2})\cos^{2} x\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The outermost operation is a product, so begin with the product rule (§2.5):</p>
        <p>\[ y' = (2x)\cos^{2} x + (1 + x^{2})\,\frac{d}{dx}\bigl(\cos^{2} x\bigr). \]</p>
        <p>The remaining derivative needs the chain rule, since \(\cos^{2} x = [\cos x]^{2}\) is a composition — outer function \((\,\cdot\,)^{2}\), inner function \(\cos x\):</p>
        <p>\[ \frac{d}{dx}\bigl(\cos^{2} x\bigr) = 2\cos x\cdot(-\sin x) = -2\sin x\cos x. \]</p>
        <p>Therefore</p>
        <p>\[ y' = 2x\cos^{2} x - 2(1 + x^{2})\sin x\cos x. \]</p>
        <p>The two rules cooperate: the product rule splits the work into two terms, and the chain rule supplies the slope factor inside the second. Neither alone differentiates this function.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — the Leibniz form as composed rates: signs multiply along a dependency chain (Mode C example supplement; demonstrates Remark 3.2) [pass: enrichment] [source: CLP-1 §2.9 Conceptual] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.8</span></p>
      <div class="env-body">
        <p>In a harbour, the amount of kelp \(K\) depends on the urchin population \(U\) — urchins eat kelp — and \(U\) in turn depends on the otter population \(O\), since otters eat urchins. Use the chain rule to decide whether \(\dfrac{dK}{dO}\) is positive or negative.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Read off the sign of each link first. More urchins means less kelp, so \(K\) decreases as \(U\) increases: \(\dfrac{dK}{dU} < 0\). More otters means fewer urchins, so \(\dfrac{dU}{dO} < 0\). The chain rule in Leibniz form (Remark 3.2) chains the two rates:</p>
        <p>\[ \frac{dK}{dO} = \frac{dK}{dU}\cdot\frac{dU}{dO}. \]</p>
        <p>A product of two negative numbers is positive, so \(\dfrac{dK}{dO} > 0\): more otters ultimately means more kelp. This is the formal version of the two-step argument — otters thin out the urchins, and fewer urchins let the kelp recover — with each \(dy/du\) factor carrying the sign of one link and the signs multiplying along the chain.</p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — forward-ref to §3.3: the chain rule unlocks inverse-function and logarithmic derivatives (D7: named, none worked here) -->
  <p>With the chain rule in hand the differentiation toolkit is essentially complete: any function assembled by composing the elementary functions of Chapters 2 and 3 can now be differentiated mechanically. In the next section the rule does something new — it becomes the key that unlocks derivatives we could not otherwise reach, those of the inverse functions \(\ln x\), \(\arcsin x\), and \(\arctan x\), and, through logarithmic differentiation, of expressions such as \(x^{x}\).</p>

</article>

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">3.3</span>Applications of the Chain Rule</h2>
  </header>

  <!-- expansion:intuition — load-bearing intuition: the chain rule run BACKWARD on a known identity extracts a derivative no direct rule reaches; concrete hook = ln, x^x, arcsin have nothing to attack head-on -->
  <p>Sections 3.1 and 3.2 built the machinery; this section spends it. The chain rule (Theorem 3.3) was advertised as the tool that completes the differentiation toolkit, and here we see why: it reaches a whole family of derivatives that no rule of Chapter 2 can touch directly. We have no formula for \(\ln x\) to differentiate — it is known only as the function that undoes \(e^{x}\). The expression \(x^{x}\) carries its variable in <em>both</em> the base and the exponent, so neither the power rule nor the rule for \(e^{x}\) applies to it. And \(\arcsin\) has no elementary formula at all. Each of these functions is defined only indirectly.</p>

  <p>Yet each one satisfies an <em>identity</em> assembled from functions we already know how to differentiate: \(e^{\ln x} = x\), or \(\ln(x^{x}) = x\ln x\), or \(\arcsin(\sin x) = x\) for \(x \in \bigl[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\bigr]\). That is the whole idea of this section, used over and over: <em>to differentiate a function you cannot attack head-on, differentiate an identity it satisfies, then solve for the derivative you want.</em> It is the chain rule run backward — instead of pushing a known derivative forward through a composition (Strategy 3.1), we apply the chain rule to a known relation and read off the one derivative we do not yet have. The same move handles the inverse functions \(\ln\), \(\arcsin\), \(\arccos\), and \(\arctan\), and, through the closely related trick of <em>logarithmic differentiation</em>, awkward powers like \(x^{x}\).</p>

  <h3 class="subsec-head">The logarithm and logarithmic differentiation</h3>

  <!-- expansion:intuition — D8 forward fence: ln used informally as the inverse of e^x; rigorous construction deferred to Ch4 §4.5 -->
  <p>We begin with the natural logarithm. Throughout this section we use \(\ln x\) informally, as the inverse of the exponential function — the number whose exponential is \(x\), so that \(e^{\ln x} = x\) for every \(x > 0\). This relation is all we need to find its derivative. The rigorous construction of \(\ln x\) as the inverse of \(e^{x}\), together with a proof that it is differentiable, is deferred to Chapter 4 (§4.5), which re-derives the formula below from the ground up.</p>

  <!-- Example 3.9 — manuscript application ① (seed): d/dx ln x = 1/x via the identity e^{ln x}=x -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.9</span></p>
      <div class="env-body">
        <p>Show that \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\) for \(x > 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Start from the identity that defines the logarithm, \(e^{\ln x} = x\), and differentiate both sides with respect to \(x\). The left side is a composition — the outer function is \(\exp\), the inner is \(\ln x\) — so by the chain rule (Theorem 3.3), using \(\dfrac{d}{du}e^{u} = e^{u}\) (Chapter 2, §2.4, Theorem 2.5),</p>
        <p>\[ \frac{d}{dx}\,e^{\ln x} = e^{\ln x}\cdot\frac{d}{dx}\ln x = x\cdot\frac{d}{dx}\ln x, \]</p>
        <p>where the last step uses \(e^{\ln x} = x\) once more. The right side is simply \(\dfrac{d}{dx}x = 1\). Equating the two,</p>
        <p>\[ x\cdot\frac{d}{dx}\ln x = 1, \qquad\text{so}\qquad \frac{d}{dx}\ln x = \frac{1}{x} \quad (x > 0). \]</p>
        <p>The unknown derivative was trapped inside a relation we could differentiate; one application of the chain rule and a division set it free.</p>
      </div>
    </section>
  </div>

  <!-- expansion:intuition — bridge: ln' is not just a formula, it powers a technique for variable exponents -->
  <p>The derivative of the logarithm is more than one more entry in a table — it powers a technique. When a function carries its variable in the exponent, or is a sprawling product and quotient of many factors, taking its logarithm first turns powers into products and products into sums, all of which we can already differentiate. Applying \(\dfrac{d}{dx}\ln\) to both sides and then solving is called <em>logarithmic differentiation</em>.</p>

  <!-- expansion:strategy — logarithmic differentiation (ROADMAP-assigned); the chapter's second Strategy box -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">3.2</span><span class="env-name">Logarithmic differentiation</span></p>
    <div class="env-body">
      <p>To differentiate a complicated positive expression \(y = f(x)\) — especially one with the variable in an exponent:</p>
      <ol class="steps">
        <li>Take natural logarithms of both sides: \(\ln y = \ln f(x)\).</li>
        <li>Simplify the right side with the laws of logarithms — \(\ln(ab) = \ln a + \ln b\), \(\ln\frac{a}{b} = \ln a - \ln b\), \(\ln(a^{b}) = b\ln a\) — until only sums of simple terms remain.</li>
        <li>Differentiate both sides with respect to \(x\). Since \(y\) is a function of \(x\), the left side is \(\dfrac{d}{dx}\ln y = \dfrac{y'}{y}\) by the chain rule.</li>
        <li>Solve for \(y'\) and substitute \(y = f(x)\) back in: \(y' = f(x)\cdot\dfrac{d}{dx}\bigl[\ln f(x)\bigr]\).</li>
      </ol>
      <p>In particular this differentiates any power-of-a-function \(f(x)^{g(x)}\) (with \(f(x) > 0\)): its logarithm is \(g(x)\ln f(x)\); differentiate that, then multiply back by \(f(x)^{g(x)}\). The next example is the cleanest case.</p>
    </div>
  </section>

  <!-- Example 3.10 — manuscript application ② (seed): d/dx x^x by logarithmic differentiation -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.10</span></p>
      <div class="env-body">
        <p>Differentiate \(W(x) = x^{x}\) for \(x > 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>There is no rule for a variable raised to a variable power, so we take logarithms. With \(W = x^{x} > 0\),</p>
        <p>\[ \ln W = \ln\bigl(x^{x}\bigr) = x\ln x. \]</p>
        <p>Differentiate both sides with respect to \(x\). On the left, the chain rule gives \(\dfrac{d}{dx}\ln W = \dfrac{W'}{W}\). On the right, the product rule (Chapter 2, §2.5, Theorem 2.6) together with \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\) (Example 3.9) gives</p>
        <p>\[ \frac{d}{dx}\bigl(x\ln x\bigr) = 1\cdot\ln x + x\cdot\frac{1}{x} = \ln x + 1. \]</p>
        <p>Therefore \(\dfrac{W'}{W} = \ln x + 1\), and solving for \(W'\),</p>
        <p>\[ \frac{d}{dx}x^{x} = W'(x) = W\,(\ln x + 1) = (1 + \ln x)\,x^{x} \quad (x > 0). \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — D9 promotion of manuscript Homework 2(iv): d/dx 2^x. Approved at ③ (2026-06-08). Short: reuses the rewrite-via-e idea. -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.11</span></p>
      <div class="env-body">
        <p>Differentiate \(2^{x}\) for \(x \in \mathbb{R}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Rewrite the base through \(e\). Since \(2 = e^{\ln 2}\), we have \(2^{x} = e^{x\ln 2}\) — a composition with inner function \(x\ln 2\) (a constant times \(x\)) and outer function \(\exp\). By the chain rule, with \(\dfrac{d}{du}e^{u} = e^{u}\),</p>
        <p>\[ \frac{d}{dx}2^{x} = \frac{d}{dx}e^{x\ln 2} = e^{x\ln 2}\cdot\ln 2 = 2^{x}\ln 2. \]</p>
        <p>The same rewrite gives \(\dfrac{d}{dx}a^{x} = a^{x}\ln a\) for any base \(a > 0\). This is also why \(e\) is the <em>natural</em> base: because \(\ln e = 1\), the extra factor disappears, and \(e^{x}\) alone among exponentials is its own derivative.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — D9 promotion of manuscript Homework 2(iii): d/dx (x ln x − x). Approved at ③ (2026-06-08). Short: reuses Example 3.10's (x ln x)' computation. -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.12</span></p>
      <div class="env-body">
        <p>Differentiate \(x\ln x - x\) for \(x > 0\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>We met the first term inside Example 3.10: by the product rule and \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\), we have \(\dfrac{d}{dx}(x\ln x) = \ln x + 1\). The second term has derivative \(1\). Hence</p>
        <p>\[ \frac{d}{dx}\bigl(x\ln x - x\bigr) = (\ln x + 1) - 1 = \ln x \quad (x > 0). \]</p>
        <p>The derivative is exactly \(\ln x\) — so \(x\ln x - x\) is an <em>antiderivative</em> of \(\ln x\), a fact worth filing away for when we turn to integration.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — logarithmic differentiation on a product (Strategy 3.2's second advertised use): take log, products become sums, differentiate term by term (Mode C example supplement) [pass: enrichment] [source: CLP-1 §2.10 Procedural, 5-factor log-diff product (truncated 5→3 factors, log→ln, domain restricted to x>0 so all three log factors stay positive)] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.13</span></p>
      <div class="env-body">
        <p>Differentiate \(y = (x + 1)(x^{2} + 1)^{2}(x^{3} + 1)^{3}\) for \(x > 0\) by logarithmic differentiation.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Differentiating this product directly would mean nesting the product rule again and again. Instead take logarithms. Since \(y > 0\),</p>
        <p>\[ \ln y = \ln\!\bigl[(x + 1)(x^{2} + 1)^{2}(x^{3} + 1)^{3}\bigr]. \]</p>
        <p>The laws of logarithms (Strategy 3.2, step 2) turn the product into a sum and bring each exponent out in front:</p>
        <p>\[ \ln y = \ln(x + 1) + 2\ln(x^{2} + 1) + 3\ln(x^{3} + 1). \]</p>
        <p>Differentiate both sides with respect to \(x\). On the left, \(\dfrac{d}{dx}\ln y = \dfrac{y'}{y}\) by the chain rule; on the right, \(\dfrac{d}{dx}\ln u = \dfrac{u'}{u}\) gives one fraction per factor:</p>
        <p>\[ \frac{y'}{y} = \frac{1}{x + 1} + \frac{2(2x)}{x^{2} + 1} + \frac{3(3x^{2})}{x^{3} + 1} = \frac{1}{x + 1} + \frac{4x}{x^{2} + 1} + \frac{9x^{2}}{x^{3} + 1}. \]</p>
        <p>Solving for \(y'\) and substituting \(y\) back,</p>
        <p>\[ y' = (x + 1)(x^{2} + 1)^{2}(x^{3} + 1)^{3}\left(\frac{1}{x + 1} + \frac{4x}{x^{2} + 1} + \frac{9x^{2}}{x^{3} + 1}\right). \]</p>
        <p>Each factor of the original product contributes exactly one term to the bracket: logarithmic differentiation trades one hard product-rule computation for several easy logarithmic derivatives added together.</p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Derivatives of the inverse trigonometric functions</h3>

  <!-- expansion:intuition — bridge: the same lever, now the identity comes from trigonometry -->
  <p>The logarithm gave way because it is the inverse of \(e^{x}\): we differentiated the relation \(e^{\ln x} = x\). The inverse trigonometric functions yield to exactly the same lever — only now the identity comes from trigonometry. Each inverse function composes with its parent to give an identity, and differentiating that identity by the chain rule isolates the derivative we are after.</p>

  <!-- Example 3.14 — manuscript application ③ (seed): d/dy arcsin y via the composition identity arcsin(sin x)=x; cos x ≥ 0 on the branch fixes the sign of the root -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.14</span></p>
      <div class="env-body">
        <p>Show that \(\dfrac{d}{dy}\arcsin y = \dfrac{1}{\sqrt{1 - y^{2}}}\) for \(y \in (-1, 1)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Recall from Chapter 1 that \(\arcsin\) is the inverse of sine restricted to the branch \(\bigl[-\tfrac{\pi}{2}, \tfrac{\pi}{2}\bigr]\): for \(-1 \le y \le 1\), \(\arcsin y\) is the unique angle \(x\) in that interval with \(\sin x = y\). On this branch the two functions undo each other, so in particular \(\arcsin(\sin x) = x\).</p>
        <p>Differentiate this identity with respect to \(x\). Reading \(x = \arcsin(\sin x)\) as a composition and applying the chain rule (Theorem 3.3), with \(\dfrac{d}{dx}\sin x = \cos x\) (Theorem 3.1),</p>
        <p>\[ 1 = \frac{d}{dx}\arcsin(\sin x) = (\arcsin)'(\sin x)\cdot\cos x, \]</p>
        <p>so \((\arcsin)'(\sin x) = \dfrac{1}{\cos x}\), valid where \(\cos x \neq 0\) — that is, on the <em>open</em> interior \(x \in \bigl(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\bigr)\), where \(\cos x > 0\). Writing \(y = \sin x\), this interior corresponds exactly to \(y \in (-1, 1)\), and there \(\cos x = \sqrt{1 - \sin^{2} x} = \sqrt{1 - y^{2}}\) — the positive root selected by \(\cos x > 0\). Therefore</p>
        <p>\[ \frac{d}{dy}\arcsin y = \frac{1}{\sqrt{1 - y^{2}}} \quad (y \in (-1, 1)). \]</p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — arcsin/arccos derivative domain (ROADMAP pitfall): valid only on the OPEN interval (−1,1); endpoints are vertical tangents -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The formula \(\dfrac{1}{\sqrt{1 - y^{2}}}\) is valid only on the <em>open</em> interval \((-1, 1)\). At the endpoints \(y = \pm 1\) the denominator vanishes: the graph of \(\arcsin\) (and of \(\arccos\) below) has a vertical tangent there (Figure 3.7), so the derivative does not exist. Report these derivatives on the open interval, never the closed one.</p>
    </div>
  </section>

  <!-- expansion:figure — arcsin's vertical tangents at y=±1: derivative blows up, endpoints excluded (registered in figures.js as "arcsin-vertical-tangent"). Figure-opportunity audit (2026-06-21) narrow override of ③'s "no figure": this draws arcsin's own endpoint behaviour — a §3.3 derivative result, NOT the Ch1 reflection ③ excluded. -->
  <figure class="figure" data-fig="arcsin-vertical-tangent">
    <figcaption><span class="fig-no">Figure 3.7</span> Endpoint behavior of \(\arcsin y\): the tangent becomes vertical at \(y = \pm 1\), so the derivative formula applies only on \((-1, 1)\).</figcaption>
  </figure>

  <!-- expansion:example — D9 promotion of manuscript Homework 1: d/dy arccos y, by the same method as Example 3.14. Approved at ③ (2026-06-08). Short, skip-setup; uses the correct identity arccos(cos x)=x (not the manuscript's loose cos⁻¹(cos y)=y). -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.15</span></p>
      <div class="env-body">
        <p>Show that \(\dfrac{d}{dy}\arccos y = \dfrac{-1}{\sqrt{1 - y^{2}}}\) for \(y \in (-1, 1)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The method is exactly that of Example 3.14, now applied to cosine. Recall that \(\arccos\) is the inverse of cosine on the branch \([0, \pi]\), so \(\arccos(\cos x) = x\) there. Differentiating with respect to \(x\), with \(\dfrac{d}{dx}\cos x = -\sin x\) (Theorem 3.2),</p>
        <p>\[ 1 = (\arccos)'(\cos x)\cdot(-\sin x). \]</p>
        <p>Writing \(y = \cos x\): on the <em>open</em> interior \(x \in (0, \pi)\) we have \(\sin x > 0\), so the division by \(-\sin x\) is legitimate and \(\sin x = \sqrt{1 - \cos^{2} x} = \sqrt{1 - y^{2}}\); this interior corresponds to \(y \in (-1, 1)\). Hence</p>
        <p>\[ \frac{d}{dy}\arccos y = \frac{1}{-\sin x} = \frac{-1}{\sqrt{1 - y^{2}}} \quad (y \in (-1, 1)). \]</p>
        <p>The only change from \(\arcsin\) is the minus sign, inherited from \(\cos' = -\sin\); the open-interval restriction of the Caution applies here unchanged.</p>
      </div>
    </section>
  </div>

  <!-- expansion:example — self-authored (③ 2026-06-08): d/dy arctan y, honoring the Ch3 opener + §3.2 forward-ref + ROADMAP core skill; same composition-identity method, using tan'=sec^2 from §3.1 Example 3.2 and the Pythagorean identity -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">3.16</span></p>
      <div class="env-body">
        <p>Show that \(\dfrac{d}{dy}\arctan y = \dfrac{1}{1 + y^{2}}\) for all \(y \in \mathbb{R}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Once more the same lever. Recall that \(\arctan\) is the inverse of tangent on the branch \(\bigl(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\bigr)\), so \(\arctan(\tan x) = x\). Differentiating with respect to \(x\), and using \(\dfrac{d}{dx}\tan x = \sec^{2} x\) (Example 3.2),</p>
        <p>\[ 1 = (\arctan)'(\tan x)\cdot\sec^{2} x, \qquad\text{so}\qquad (\arctan)'(\tan x) = \frac{1}{\sec^{2} x}. \]</p>
        <p>Now write \(y = \tan x\) and use the Pythagorean identity \(\sec^{2} x = 1 + \tan^{2} x = 1 + y^{2}\):</p>
        <p>\[ \frac{d}{dy}\arctan y = \frac{1}{1 + y^{2}}. \]</p>
        <p>Here there is no domain restriction to worry about: as \(x\) ranges over \(\bigl(-\tfrac{\pi}{2}, \tfrac{\pi}{2}\bigr)\), \(y = \tan x\) ranges over all of \(\mathbb{R}\), and \(1 + y^{2}\) never vanishes. Unlike \(\arcsin\) and \(\arccos\), the arctangent is differentiable everywhere.</p>
      </div>
    </section>
  </div>

  <!-- expansion:intuition — unifying takeaway: one lever produced every derivative in the section -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">3.3</span><span class="env-name">One lever for many derivatives</span></p>
    <div class="env-body">
      <p>Look back at what just happened. We never differentiated \(\ln x\), \(x^{x}\), or an inverse trigonometric function <em>directly</em> — there was no rule to do so. In every case we found a known identity the function satisfies — \(e^{\ln x} = x\), \(\ln(x^{x}) = x\ln x\), \(\arcsin(\sin x) = x\) on its branch, and their kin — differentiated it by the chain rule, and solved for the one unknown. The chain rule is not only a tool for pushing derivatives forward through a composition; turned on an identity, it is a lever that pries loose derivatives we could reach in no other way.</p>
    </div>
  </section>

  <h3 class="subsec-head">Chapter summary</h3>

  <!-- expansion:summary — chapter-level summary (ch03's final section): derivative recap + arc of §3.1–§3.3 + forward fence to Ch4 §4.3/§4.5 and the MVT -->
  <p>This section adds the following derivatives to our running table:</p>
  <p>\[ \frac{d}{dx}\ln x = \frac{1}{x}, \qquad \frac{d}{dx}x^{x} = (1 + \ln x)\,x^{x}, \qquad \frac{d}{dx}a^{x} = a^{x}\ln a, \]</p>
  <p>\[ \begin{aligned}
    \frac{d}{dy}\arcsin y &= \frac{1}{\sqrt{1 - y^{2}}}, \\[2pt]
    \frac{d}{dy}\arccos y &= \frac{-1}{\sqrt{1 - y^{2}}}, \\[2pt]
    \frac{d}{dy}\arctan y &= \frac{1}{1 + y^{2}}.
  \end{aligned} \]</p>
  <p>(The logarithmic and power formulas hold for \(x > 0\), the \(a^{x}\) formula for any base \(a > 0\) and all \(x\), and the \(\arcsin\) and \(\arccos\) formulas only on the open interval \(-1 < y < 1\); \(\arctan\) is differentiable for every \(y\).)</p>
  <p>With these, Chapter 3 is complete. It opened by breaking the one limit algebra could not touch, \(\lim_{\theta \to 0}\dfrac{\sin\theta}{\theta}\), with a piece of unit-circle geometry, and read off \(\sin' = \cos\) and \(\cos' = -\sin\) (§3.1). It then proved the chain rule, the rule for compositions that Chapter 2 had been missing (§3.2). Here that rule was turned loose to reach the derivatives of the logarithmic, exponential, and inverse trigonometric functions (§3.3). Together with the algebraic rules of Chapter 2, we can now differentiate essentially every function built by combining and composing the elementary ones.</p>

  <p>Two debts remain, and both were taken on informally. We have used \(\dfrac{d}{dx}e^{x} = e^{x}\) from the casual series argument of Chapter 2, and we have treated \(\ln x\) as the inverse of \(e^{x}\) without ever constructing it. Chapter 4 settles both: it builds \(e^{x}\) rigorously and re-derives its derivative (§4.3), and it proves the Mean Value Theorem (§4.4) — the result that finally lets us define \(\ln x\) as the inverse of the strictly increasing exponential and recover \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\) on solid ground (§4.5).</p>

</article>

<script>
(function () {
  var uid = 0;
  var PI = Math.PI;
  function piTex(v) {
    var map = {};
    map[(-2 * PI).toFixed(4)] = "-2\\pi";
    map[(-PI).toFixed(4)] = "-\\pi";
    map[(-PI / 2).toFixed(4)] = "-\\tfrac{\\pi}{2}";
    map[(PI / 2).toFixed(4)] = "\\tfrac{\\pi}{2}";
    map[PI.toFixed(4)] = "\\pi";
    map[(2 * PI).toFixed(4)] = "2\\pi";
    map[(0).toFixed(4)] = "0";
    var hit = map[v.toFixed(4)];
    if (hit != null) return hit;
    if (Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v)); // plain integers
    return undefined;
  }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
  function anchorTransform(anchor, vAnchor) {
    var tx = anchor === "start" ? "0" : anchor === "end" ? "-100%" : "-50%";
    var ty = vAnchor === "top" ? "0" : vAnchor === "bottom" ? "-100%" : "-50%";
    return "translate(" + tx + "," + ty + ")";
  }
  function buildPlot(cfg) {
    var w = cfg.w, h = cfg.h;
    var pad = Object.assign({ t: 16, r: 18, b: 20, l: 22 }, cfg.pad || {});
    var xmin = cfg.xmin, xmax = cfg.xmax, ymin = cfg.ymin, ymax = cfg.ymax;
    var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
    var SX = function(x) { return pad.l + ((x - xmin) / (xmax - xmin)) * iw; };
    var SY = function(y) { return h - pad.b - ((y - ymin) / (ymax - ymin)) * ih; };
    var id = "pl" + (++uid);
    var parts = [], labels = [];
    function pushLabel(o) { labels.push(o); }
    parts.push('<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:' + w + 'px" class="fig-svg" role="img" aria-label="' + esc(cfg.aria || "graph") + '" preserveAspectRatio="xMidYMid meet">');
    parts.push('<defs><marker id="' + id + 'a" markerWidth="8" markerHeight="8" refX="5.4" refY="2.8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5.4,2.8 L0,5.6" fill="none" stroke="var(--c-axis)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>');
    if (cfg.axes !== false) {
      var x0 = Math.min(Math.max(0, xmin), xmax), y0 = Math.min(Math.max(0, ymin), ymax);
      var ax0 = SX(xmin), ax1 = SX(xmax), ayBase = SY(y0);
      parts.push('<path d="M' + ax0.toFixed(1) + ',' + ayBase.toFixed(1) + ' H' + (ax1 - 1).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      var ay0 = SY(ymin), ay1 = SY(ymax), axBase = SX(x0);
      parts.push('<path d="M' + axBase.toFixed(1) + ',' + ay0.toFixed(1) + ' V' + (ay1 + 1).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      if (cfg.xlabel) pushLabel({ px: ax1 + 1, py: ayBase + 4, tex: cfg.xlabel, anchor: "start", vAnchor: "top", cls: "a-ax", size: 13 });
      if (cfg.ylabel) pushLabel({ px: axBase - 5, py: ay1 + 1, tex: cfg.ylabel, anchor: "end", vAnchor: "top", cls: "a-ax", size: 13 });
      (cfg.xticks || []).forEach(function(t) {
        var px = SX(t.x);
        parts.push('<line x1="' + px.toFixed(1) + '" y1="' + (ayBase - 3).toFixed(1) + '" x2="' + px.toFixed(1) + '" y2="' + (ayBase + 3).toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.x));
        if (tex != null) pushLabel({ px: px, py: ayBase + 6, tex: tex, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: px, py: ayBase + 6, text: t.label, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
      });
      (cfg.yticks || []).forEach(function(t) {
        var py = SY(t.y);
        parts.push('<line x1="' + (axBase - 3).toFixed(1) + '" y1="' + py.toFixed(1) + '" x2="' + (axBase + 3).toFixed(1) + '" y2="' + py.toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.y));
        if (tex != null) pushLabel({ px: axBase - 6, py: py, tex: tex, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: axBase - 6, py: py, text: t.label, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
      });
    }
    (cfg.items || []).forEach(function(it) {
      if (it.type === "curve") {
        var cls = it.cls || "curve", n = it.samples || 240, a = it.domain[0], b = it.domain[1];
        var d = "", pen = false;
        for (var i = 0; i <= n; i++) {
          var x = a + (b - a) * (i / n), y = it.fn(x);
          if (!isFinite(y) || y < ymin - (ymax - ymin) * 0.04 || y > ymax + (ymax - ymin) * 0.04) { pen = false; continue; }
          var px = SX(x).toFixed(2), py = SY(y).toFixed(2);
          d += (pen ? "L" : "M") + px + "," + py + " "; pen = true;
        }
        if (d) parts.push('<path d="' + d.trim() + '" class="' + cls + '"/>');
      } else if (it.type === "vline") {
        parts.push('<line x1="' + SX(it.x).toFixed(1) + '" y1="' + SY(ymin).toFixed(1) + '" x2="' + SX(it.x).toFixed(1) + '" y2="' + SY(ymax).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "hline") {
        var ha = it.from != null ? it.from : xmin, hb = it.to != null ? it.to : xmax;
        parts.push('<line x1="' + SX(ha).toFixed(1) + '" y1="' + SY(it.y).toFixed(1) + '" x2="' + SX(hb).toFixed(1) + '" y2="' + SY(it.y).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "seg") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="' + (it.cls || "curve") + '"/>');
      } else if (it.type === "dot") {
        var r = it.r || 3.0;
        if (it.hollow) parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>');
        else parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" class="dot"/>');
      } else if (it.type === "arrow") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      } else if (it.type === "text") {
        pushLabel({ px: SX(it.x), py: SY(it.y), tex: it.tex, text: it.tex == null ? it.text : null, anchor: it.anchor || "middle", vAnchor: it.vAnchor || "middle", dx: it.dx || 0, dy: it.dy || 0, cls: it.cls || "a-pt", size: it.size });
      }
    });
    if (labels.length) {
      var M = 52;
      var spans = labels.map(function(L) {
        var left = (L.px + (L.dx || 0) + M).toFixed(1);
        var top = (L.py + (L.dy || 0) + M).toFixed(1);
        var tf = anchorTransform(L.anchor, L.vAnchor);
        var fs = L.size ? "font-size:" + L.size + "px;" : "";
        var body = L.tex != null ? "\\(" + L.tex + "\\)" : esc(L.text == null ? "" : L.text);
        return '<span class="fig-lbl ' + (L.cls || "") + '" style="left:' + left + 'px;top:' + top + 'px;transform:' + tf + ';' + fs + '">' + body + '</span>';
      }).join("");
      parts.push('<foreignObject x="' + (-M) + '" y="' + (-M) + '" width="' + (w + 2 * M) + '" height="' + (h + 2 * M) + '" class="fig-fo" requiredExtensions="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml" class="fig-lyr">' + spans + '</div></foreignObject>');
    }
    parts.push('</svg>');
    return parts.join("");
  }
  window.buildPlot = buildPlot;
  window.PIVAL = PI;
})();
</script>
