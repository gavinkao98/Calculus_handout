<style>
/* ============================================================
   skin-hs.css — inlined + modified: Times New Roman + MathJax
   ============================================================ */
.paper {
  --c-primary: oklch(0.50 0.13 245);
  --c-caution: oklch(0.50 0.155 25);
  --c-aux: oklch(0.55 0.01 260);
  --c-axis: #474b54;
  --ink: #1b1c1f;
  --ink-soft: #565a63;
  --ink-faint: #8a8e98;
  --paper: #ffffff;
  --rule: #e5e7eb;
  --fig-w-pair: 250px;     /* 並排(pair)圖每張的預設寬度（整體一次調） */
  --fig-w-single: 100%;    /* 單張/triple/grid 圖的預設最大寬度（整體一次調） */
  /* 個別覆寫：在任一 <figure> 標籤加 style="--fig-w: 320px" 即可只改那一張 */
  --serif: "New Computer Modern", "Latin Modern Roman", "Times New Roman", Times, Georgia, serif;
  --ui: "Inter", -apple-system, system-ui, sans-serif;
  --a-concept:  oklch(0.50 0.13 55);
  --a-result:   oklch(0.50 0.13 245);
  --a-practice: oklch(0.50 0.13 152);
  --a-aside:    oklch(0.50 0.02 260);
  --a-caution:  oklch(0.50 0.155 25);
  --a-strategy: oklch(0.50 0.13 290);
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: var(--fs-base, 17.5px);
  line-height: var(--lh-base, 1.62);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  box-sizing: border-box;
}
.paper *, .paper *::before, .paper *::after { box-sizing: border-box; }
.paper .page { padding: 52px 58px 64px; max-width: 760px; margin: 0 auto; }
.skin-hs .page { hyphens: auto; -webkit-hyphens: auto; }
.skin-hs p, .skin-hs li { text-align: justify; text-justify: inter-word; }
.paper .ragged { text-align: left; }
.paper p { margin: 0 0 .85em; text-wrap: pretty; }
.paper em { font-style: italic; }
.paper .informal { font-style: italic; color: var(--ink-soft); }
.paper ol { margin: .2em 0 .9em; padding-left: 1.5em; }
.paper li { margin: .35em 0; text-wrap: pretty; }
.paper .warmup { counter-reset: wu; list-style: none; padding-left: 0; }
.paper .warmup > li { counter-increment: wu; position: relative; padding-left: 2.1em; }
.paper .warmup > li::before {
  content: "(" counter(wu, lower-alpha) ")";
  position: absolute; left: 0; top: 0;
  font-family: var(--ui); font-size: .82em; color: var(--ink-faint); line-height: 1.85;
}
.paper mjx-container[display="true"] { margin: .55em 0 !important; overflow-x: auto; overflow-y: hidden; }
.paper mjx-container[display="true"]::-webkit-scrollbar { display: none; }
.paper .qed { display: block; text-align: right; margin: -1.62em 0 0; height: 1.62em; pointer-events: none; }
.paper .qed::after {
  content: ""; display: inline-block; width: .56em; height: .56em;
  border: 1.3px solid var(--ink-soft);
}
.paper .env-body > :has(+ .qed) { margin-bottom: 0; display: flow-root; }
.paper .env-body::after { content: ""; display: block; clear: both; }
.paper .sec-head {
  margin-top: 2.7em; padding-top: 1.35em;

}
.sheet-body > .sec-head:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
.paper .sec-kicker {
  font-family: var(--ui); font-size: .7rem; letter-spacing: .14em;
  text-transform: uppercase; color: var(--c-primary); font-weight: 700; margin-bottom: .55em;
}
.paper .sec-title { font-weight: 600; font-size: 2rem; line-height: 1.12; letter-spacing: -.012em; margin: 0; }
.paper .sec-no { color: var(--c-primary); margin-right: .5em; font-weight: 600; }
.paper .subsec-head {
  font-family: var(--ui); font-weight: 600; font-size: 1.08rem; margin: 1.9em 0 .65em;
  display: flex; align-items: center; gap: .55em; color: var(--ink);
}
.paper .page-break-before { break-before: page; page-break-before: always; }
.paper .subsec-head::before { content: ""; width: 18px; height: 3px; background: var(--c-primary); border-radius: 2px; }
.paper .figure { margin: 1.7em 0; text-align: center; }
.paper .figure-art { display: flex; justify-content: center; }
.paper .figure-art--pair { gap: 26px; }
.paper .fig-svg { width: 100%; max-width: var(--fig-w, var(--fig-w-pair)); height: auto; }
.paper .figure-art:not(.figure-art--pair) .fig-svg { max-width: var(--fig-w, var(--fig-w-single)); }
.paper figcaption {
  font-family: var(--ui); font-size: .8em; line-height: 1.5;
  color: var(--ink-soft); margin-top: .7em; text-wrap: pretty;
  max-width: none; text-align: left; display: table; margin-inline: auto;
}
.paper .fig-no { font-weight: 600; color: var(--ink); margin-right: .4em; }
.paper figcaption mjx-container { font-size: .95em; }
.paper .axis { stroke: var(--c-axis); stroke-width: 1.25; fill: none; stroke-linecap: round; }
.paper .curve { stroke: var(--c-primary); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.paper .refline { stroke: var(--c-caution); stroke-width: 1.3; stroke-dasharray: 4.5 3.5; fill: none; stroke-linecap: round; opacity: .85; }
.paper .dot { fill: var(--ink); }
.paper .bubble { stroke: var(--c-aux); stroke-width: 1.4; fill: none; }
.paper .arrow-fwd { stroke: var(--c-primary); stroke-width: 2; fill: none; }
.paper .arrow-bwd { stroke: var(--c-caution); stroke-width: 2; fill: none; }
.paper .fig-svg text { font-family: var(--ui); font-size: 13px; }
.paper .axlab { fill: var(--c-aux); font-style: italic; }
.paper .lab-curve { fill: var(--c-primary); font-style: italic; }
.paper .lab-ref, .paper .lab-ref-b { fill: var(--c-caution); }

.paper .setlab { fill: var(--ink); font-weight: 600; font-size: 14.5px; text-anchor: middle; }

/* env blocks */
.skin-hs .env {
  --accent: var(--a-aside);

.skin-hs .env-definition  { --accent: var(--a-concept); }
.skin-hs .env-theorem, .skin-hs .env-proposition, .skin-hs .env-corollary { --accent: var(--a-result); }
.skin-hs .env-example, .skin-hs .env-solution, .skin-hs .env-exercise { --accent: var(--a-practice); }
.skin-hs .env-remark { --accent: var(--a-aside); }

}

  font-size: .62rem; letter-spacing: .07em; text-transform: uppercase; font-weight: 700;

}
.skin-hs .env-num { font-weight: 700; color: var(--accent); font-size: .94em; }
.skin-hs .env-name { font-style: italic; font-weight: 400; color: var(--ink-soft); font-family: var(--serif); font-size: 1em; }
.skin-hs .env-body > p:first-child { margin-top: 0; }
.skin-hs .env-body > :last-child { margin-bottom: 0; }
.skin-hs .env-theorem .env-body, .skin-hs .env-proposition .env-body { font-style: italic; }
.skin-hs .env-theorem .env-body mjx-container, .skin-hs .env-proposition .env-body mjx-container { font-style: normal; }
.skin-hs .env-definition em { font-style: italic; }
.skin-hs .env-remark { color: var(--ink-soft); font-size: .97em; }
.skin-hs .env-remark .env-kicker { background: transparent; color: var(--a-aside); border: 1px solid color-mix(in srgb, var(--a-aside) 45%, var(--paper)); }
.skin-hs .env-proof { --accent: var(--a-result); }
.skin-hs .env-proof .env-kicker {
  background: transparent; color: var(--a-result); font-style: italic; letter-spacing: .04em;
  border: 1px solid color-mix(in srgb, var(--a-result) 45%, var(--paper));
}
.skin-hs .qed-proof::after { border-color: var(--ink); }
.skin-hs .workedexample {
  margin: 1.6em 0; padding-left: 16px;
  border-left: 2.5px solid color-mix(in srgb, var(--a-practice) 38%, var(--paper));
  display: flow-root;
}
.skin-hs .workedexample .env { margin: .7em 0; padding-left: 0; border-left: 0; }
.skin-hs .env-solution .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid color-mix(in srgb, var(--a-practice) 45%, var(--paper)); }
.skin-hs > .env-cont { margin-top: 0; padding-top: .82em; }
.skin-hs > .env:has(+ .env-cont) { margin-bottom: 0; display: flow-root; }
.skin-hs > .env-example:has(+ .env-solution) { margin-bottom: 0; }
.skin-hs > .env-example + .env-solution { margin-top: 0; padding-top: .72em; }
.skin-hs > .env-cont, .skin-hs > .env-example, .skin-hs > .env-solution { display: flow-root; }
.skin-hs .env-exercise .env-kicker { background: transparent; color: var(--a-practice); border: 1px solid var(--a-practice); }
.skin-hs .env-caution, .skin-hs .env-strategy {
  padding: 15px 20px; border-radius: 8px; margin: 1.4em 0;
  border-left-width: 4px; border-left-style: solid;
}
.skin-hs .env-caution {
  --accent: var(--a-caution);
  background: color-mix(in srgb, var(--a-caution) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-caution) 22%, var(--paper));
  border-left-color: var(--a-caution);
}
.skin-hs .env-strategy {
  --accent: var(--a-strategy);
  background: color-mix(in srgb, var(--a-strategy) 7%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--a-strategy) 22%, var(--paper));
  border-left-color: var(--a-strategy);
}
.skin-hs .env-caution .env-name, .skin-hs .env-strategy .env-name { color: var(--ink-soft); }
.skin-hs .env-strategy .steps { margin-bottom: 0; }
.skin-hs.vivid .env { border-left-color: color-mix(in srgb, var(--accent) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .workedexample { border-left-color: color-mix(in srgb, var(--a-practice) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .env-kicker { font-size: .64rem; padding: 3.5px 11px; }

/* ============================================================
   print.css — inlined (A4 sheet layout + paginator)
   ============================================================ */
@page { size: A4; margin: 0; }
.sheet {
  position: relative; box-sizing: border-box;
  width: 210mm; height: 297mm;
  padding: 20mm 28mm 20mm 32mm;
  background: #fff; overflow: hidden;
}
.sheet-header {
  position: absolute; top: 11mm; left: 32mm; right: 28mm;
  font: 500 8.5pt "Inter", sans-serif; color: #9aa0ac; letter-spacing: .02em;
}
.sheet-footer {
  position: absolute; bottom: 8.5mm; left: 0; right: 0;
  text-align: center; font: 500 9pt "Inter", sans-serif; color: #82868f;
}
.sheet-body { height: 100%; --accent: oklch(0.50 0.13 245); }
.sheet-body.paper { box-shadow: none; border-radius: 0; max-width: none; background: #fff; }
.sheet-body .page { padding: 0; max-width: none; margin: 0; }
.sheet-body.paper { font-size: 12pt; line-height: 1.55; }
.sheet, .sheet * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.sheet-body > :first-child { margin-top: 0 !important; }
.sheet-body .sec + .sec { border-top: 0; margin-top: 0; padding-top: 0; }
.sheet-body .qed { margin-top: -1.55em; height: 1.55em; }
.sheet-body .env-body::after { display: none; content: none; }
.sheet-body .env-cont { margin-top: 0; }
.sheet-body .env-cont > .env-body > :first-child { margin-top: 0; }
@media screen {
  body { background: #6f727b; margin: 0; }
  .sheet { box-shadow: 0 3px 18px rgba(0,0,0,.3); margin: 9mm auto; }
}
@media print {
  body { background: #fff; margin: 0; }
  .sheet { box-shadow: none; margin: 0; break-after: page; }
  .sheet:last-child { break-after: auto; }
  .print-toolbar, #boot { display: none !important; }
}

/* ============================================================
   page-level
   ============================================================ */
.print-toolbar {
  position: fixed; top: 14px; right: 16px; z-index: 1000;
  display: flex; align-items: center; gap: 10px; font-family: "Inter", system-ui, sans-serif;
}
.print-toolbar button {
  font: 600 13px "Inter", sans-serif; color: #fff; background: oklch(0.50 0.13 245);
  border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.25);
}

  font-size: 12px; color: #e8eaf0; background: rgba(0,0,0,.4);
  padding: 6px 11px; border-radius: 999px; backdrop-filter: blur(6px);
}

  font-family: "Inter", system-ui, sans-serif; color: #cdd2dc; background: #6f727b; z-index: 900;
}
#source { position: absolute; left: -10000px; top: 0; width: 683px; }

<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Appendix C</div>
    <h1 class="ch-title">Linear Algebra for Calculus</h1>
  </header>

  <p class="lead">This appendix collects the piece of linear algebra that multivariable calculus leans on — not a full course, but the handful of tools Chapters 12–16 reach for repeatedly. A single number attached to a square array, the <em>determinant</em>, turns out to measure area and volume, fix orientation, and drive the cross product; and — once calculus supplies the derivatives — the same number scales the change-of-variables formula and classifies critical points. These four sections build that one idea and its immediate companions. Read them before the multivariable chapters, or turn to them when those chapters send you; nothing here uses calculus.</p>

  <p class="para-head">By the end of this appendix, you will be able to:</p>
  <ul>
    <li>compute \(2\times 2\) and \(3\times 3\) determinants by cofactor expansion;</li>
    <li>read a determinant as the signed area or volume of the box its columns span, and as the scaling factor of a linear map;</li>
    <li>use orientation and the right-hand rule, and evaluate a cross product and a scalar triple product as determinants;</li>
    <li>classify a two-variable quadratic form as positive definite, negative definite, or indefinite.</li>
  </ul>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">C.1</span>Matrices and Determinants</h2>
  </header>

  <p>A <em>matrix</em> is a rectangular array of numbers, set in brackets and addressed by row and column. A <em>square</em> matrix — as many rows as columns — carries an extra meaning: it encodes a <em>linear map</em>, a rule that sends each vector to another by a fixed pattern of multiplying and adding its entries. Most of what calculus asks of a square matrix is answered by a single number read off it, the <em>determinant</em>, written \(\det A\) or with vertical bars in place of the brackets.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">C.1</span></p>
    <div class="env-body">
      <p>The determinant of a \(2\times 2\) matrix is
      \[ \begin{vmatrix} a & b \\ c & d \end{vmatrix} = ad - bc. \]
      The determinant of a \(3\times 3\) matrix is computed by <em>cofactor expansion along the first row</em>: each entry of the top row times the \(2\times 2\) determinant of what is left when that entry’s row and column are struck out, taken with the alternating signs \(+, -, +\):
      \[ \begin{vmatrix} a_1 & a_2 & a_3 \\ b_1 & b_2 & b_3 \\ c_1 & c_2 & c_3 \end{vmatrix} = a_1\begin{vmatrix} b_2 & b_3 \\ c_2 & c_3 \end{vmatrix} - a_2\begin{vmatrix} b_1 & b_3 \\ c_1 & c_3 \end{vmatrix} + a_3\begin{vmatrix} b_1 & b_2 \\ c_1 & c_2 \end{vmatrix}. \]</p>
    </div>
  </section>

  <p>The determinant is the exact test for whether the map can be undone. When \(\det A \neq 0\), the columns point in genuinely independent directions and the map has an inverse; when \(\det A = 0\), the columns collapse onto a line or plane, the map flattens space, and the information needed to reverse it is lost. The two sections after this one read the <em>size</em> and the <em>sign</em> of this number geometrically; the last turns it on a symmetric matrix. Expansion may be carried out along any row or column with the appropriate sign pattern, so a row or column carrying zeros is the one to choose.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">C.1</span></p>
      <div class="env-body">
        <p>Evaluate \(\begin{vmatrix} 2 & 0 & 1 \\ 1 & 3 & 2 \\ -1 & 1 & 1 \end{vmatrix}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Expand along the first row. Its middle entry is \(0\), so that term vanishes and only two \(2\times 2\) determinants remain:
        \[ 2\begin{vmatrix} 3 & 2 \\ 1 & 1 \end{vmatrix} - 0 + 1\begin{vmatrix} 1 & 3 \\ -1 & 1 \end{vmatrix} = 2\,(3 - 2) + (1 + 3) = 2 + 4 = 6. \]
        The single \(0\) in the top row halved the labour — the reason one scans for a row or column of zeros before expanding.</p>
      </div>
    </section>
  </div>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">C.2</span>The Determinant as Signed Area and Volume</h2>
  </header>

  <p>The determinant is not only an algebraic test for reversibility; it is a <em>measurement</em>. Read the columns of a square matrix as vectors placed tail to tail, and the determinant reports the size — carrying a sign — of the region they span.</p>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">C.1</span><span class="env-name">Determinant as signed measure</span></p>
    <div class="env-body">
      <p>For a \(2\times 2\) matrix with columns \(\mathbf{u}\) and \(\mathbf{v}\),
      \[ \left|\begin{vmatrix} a & b \\ c & d \end{vmatrix}\right| = \text{the area of the parallelogram spanned by } \mathbf{u} = (a, c) \text{ and } \mathbf{v} = (b, d), \]
      and for a \(3\times 3\) matrix the absolute value of the determinant is the volume of the parallelepiped spanned by its three columns. Equivalently, the linear map with matrix \(A\) multiplies every area (in the plane) or volume (in space) by the constant factor \(\lvert\det A\rvert\).</p>
    </div>
  </section>

  <p>The <em>sign</em> that the absolute value discards records <em>orientation</em>. A positive \(2\times 2\) determinant means the second column lies counterclockwise from the first, so the ordered pair keeps the plane’s standard orientation; a negative one means the pair is flipped into its mirror image. In space the sign separates right-handed triples from left-handed ones in the same way — the distinction Section C.3 makes precise.</p>

  <p>This measuring role is what survives into calculus. A smooth change of variables is, examined closely enough, a linear map; the matrix of that map is the <em>Jacobian</em> (Chapter 15), and the reasoning here is exactly what makes \(\lvert\det\rvert\) of the Jacobian the local factor by which the substitution stretches area or volume — the factor that must ride along inside a transformed integral. The determinant is thus the bridge from linear algebra to the change-of-variables formula.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">C.2</span></p>
      <div class="env-body">
        <p>Find the area of the triangle with vertices \(O = (0, 0)\), \(P = (3, 1)\), and \(Q = (1, 4)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The two edges leaving \(O\) are the vectors \(\mathbf{u} = (3, 1)\) and \(\mathbf{v} = (1, 4)\). They span a parallelogram whose area is the absolute determinant
        \[ \left|\begin{vmatrix} 3 & 1 \\ 1 & 4 \end{vmatrix}\right| = |12 - 1| = 11, \]
        and the triangle is half of that, area \(\tfrac{11}{2}\). The determinant came out positive, so \(P\) and \(Q\) run counterclockwise about \(O\); listing the vertices in the opposite order would flip the sign while leaving the area — its absolute value — unchanged.</p>
      </div>
    </section>
  </div>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">C.3</span>Orientation and the Cross Product</h2>
  </header>

  <p>Two independent vectors in the plane span a parallelogram, and Section C.2 measured it. In space a second question joins the size: two vectors lie in a plane, and <em>two</em> opposite directions stand perpendicular to it — which one to name. Fixing that choice consistently is the work of <em>orientation</em>, and the rule that fixes it is the <em>right-hand rule</em>: point the fingers of the right hand along the first vector and curl them toward the second, and the outstretched thumb selects the perpendicular direction. The cross product bundles this choice together with an area into a single vector — and computes it as a determinant.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">C.2</span></p>
    <div class="env-body">
      <p>The <em>cross product</em> of \(\mathbf{a} = (a_1, a_2, a_3)\) and \(\mathbf{b} = (b_1, b_2, b_3)\) is the vector produced by expanding, along its first row, the symbolic determinant whose top row holds the standard basis vectors \(\mathbf{i}, \mathbf{j}, \mathbf{k}\):
      \[ \begin{aligned}
        \mathbf{a} \times \mathbf{b}
          &= \begin{vmatrix} \mathbf{i} & \mathbf{j} & \mathbf{k} \\ a_1 & a_2 & a_3 \\ b_1 & b_2 & b_3 \end{vmatrix} \\[2pt]
          &= (a_2 b_3 - a_3 b_2)\,\mathbf{i} - (a_1 b_3 - a_3 b_1)\,\mathbf{j} + (a_1 b_2 - a_2 b_1)\,\mathbf{k}.
      \end{aligned} \]</p>
    </div>
  </section>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">C.2</span><span class="env-name">Geometry of the cross and triple products</span></p>
    <div class="env-body">
      <p>The vector \(\mathbf{a} \times \mathbf{b}\) is perpendicular to both \(\mathbf{a}\) and \(\mathbf{b}\); when the two are nonzero and nonparallel it is directed by the right-hand rule, and its length
      \[ |\mathbf{a} \times \mathbf{b}| = |\mathbf{a}|\,|\mathbf{b}|\sin\theta \]
      is the area of the parallelogram they span, where \(\theta\) is the angle between them. Parallel vectors span no parallelogram, and there \(\sin\theta = 0\) collapses the product to the zero vector — which has no direction to name. The related <em>scalar triple product</em> is an ordinary determinant,
      \[ \mathbf{a} \cdot (\mathbf{b} \times \mathbf{c}) = \begin{vmatrix} a_1 & a_2 & a_3 \\ b_1 & b_2 & b_3 \\ c_1 & c_2 & c_3 \end{vmatrix}, \]
      whose absolute value is the volume of the parallelepiped spanned by the three vectors — the space version of Proposition C.1 — and whose sign tells whether the ordered triple is right- or left-handed.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">C.3</span></p>
      <div class="env-body">
        <p>Compute \(\mathbf{a} \times \mathbf{b}\) for \(\mathbf{a} = (1, 2, 0)\) and \(\mathbf{b} = (0, 3, 1)\), and then the volume of the box that \(\mathbf{a}\), \(\mathbf{b}\), and \(\mathbf{c} = (1, 0, 2)\) enclose.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Expand the symbolic determinant along its top row:
        \[ \begin{aligned}
          \mathbf{a} \times \mathbf{b}
            &= \begin{vmatrix} \mathbf{i} & \mathbf{j} & \mathbf{k} \\ 1 & 2 & 0 \\ 0 & 3 & 1 \end{vmatrix} \\[2pt]
            &= (2\cdot 1 - 0\cdot 3)\,\mathbf{i} - (1\cdot 1 - 0\cdot 0)\,\mathbf{j} + (1\cdot 3 - 2\cdot 0)\,\mathbf{k} \\[2pt]
            &= (2, -1, 3).
        \end{aligned} \]
        A pair of dot products confirms the perpendicularity: \(\mathbf{a} \cdot (\mathbf{a} \times \mathbf{b}) = 2 - 2 + 0 = 0\) and \(\mathbf{b} \cdot (\mathbf{a} \times \mathbf{b}) = 0 - 3 + 3 = 0\). For the volume, take the scalar triple product
        \[ \mathbf{a} \cdot (\mathbf{b} \times \mathbf{c}) = \begin{vmatrix} 1 & 2 & 0 \\ 0 & 3 & 1 \\ 1 & 0 & 2 \end{vmatrix} = 1\,(6 - 0) - 2\,(0 - 1) + 0 = 8, \]
        so the three edges enclose a parallelepiped of volume \(8\), and the positive sign marks the triple as right-handed.</p>
      </div>
    </section>
  </div>

  <p>The multivariable chapters develop these products in full — the cross product as the source of normal vectors to planes and surfaces (Chapter 12), the triple product wherever an oriented volume is wanted. What this section supplies is their engine: both are determinants, and the right-hand rule is what the determinant’s sign <em>means</em> in space.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">C.4</span>Quadratic Forms and Definiteness</h2>
  </header>

  <p>The determinant read areas and volumes off the columns of a matrix. Turned on a <em>symmetric</em> matrix it does something different but just as useful to calculus: it decides the <em>sign</em> a quadratic expression is forced to keep. This is the algebra behind telling a peak from a valley from a saddle on a surface.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">C.3</span></p>
    <div class="env-body">
      <p>A <em>quadratic form</em> in two variables is an expression
      \[ Q(x, y) = a x^2 + 2b\,xy + c y^2, \]
      carried by the symmetric matrix \(\begin{pmatrix} a & b \\ b & c \end{pmatrix}\), in which the off-diagonal \(b\) is half the coefficient of \(xy\), shared evenly between the two symmetric slots. The form is <em>positive definite</em> if \(Q(x, y) > 0\) for every \((x, y) \neq (0, 0)\), <em>negative definite</em> if \(Q(x, y) < 0\) throughout, and <em>indefinite</em> if it takes both signs.</p>
    </div>
  </section>

  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">C.3</span><span class="env-name">Definiteness test</span></p>
    <div class="env-body">
      <p>Let \(D = ac - b^2\) be the determinant of the symmetric matrix. Then \(Q\) is
      <em>positive definite</em> when \(D > 0\) and \(a > 0\); <em>negative definite</em> when \(D > 0\) and \(a < 0\); and <em>indefinite</em> when \(D < 0\). When \(D = 0\) the form is degenerate and the test is silent.</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Suppose first \(a \neq 0\) and complete the square to absorb the cross-term:
      \[ Q(x, y) = a\left(x + \tfrac{b}{a}\,y\right)^2 + \frac{ac - b^2}{a}\,y^2. \]
      The two coefficients are \(a\) and \(\tfrac{ac - b^2}{a}\). When \(ac - b^2 > 0\) they share the sign of \(a\); the two squares can then never cancel, and \(Q\) holds that single sign everywhere off the origin — definite, positive or negative according to \(a\). When \(ac - b^2 < 0\) the coefficients carry opposite signs, so \(Q\) is positive along one direction and negative along another — indefinite. Assuming \(a \neq 0\) costs nothing in the definite case, since \(D > 0\) forces \(ac > b^2 \ge 0\) and so \(a \neq 0\) already. The one configuration left over is \(a = 0\) with \(D < 0\): then \(D = -b^2 < 0\) forces \(b \neq 0\), and \(Q(x, 1) = 2bx + c\) is linear in \(x\) with nonzero slope, running through both signs — indefinite, as claimed. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>This is exactly the <em>second-derivative test</em> of Chapter 14. There the symmetric matrix is the <em>Hessian</em> of a function \(f(x, y)\) — its array of second partial derivatives — and these same three cases stamp a critical point as a local minimum (positive definite), a local maximum (negative definite), or a saddle (indefinite). The linear algebra is finished here; the calculus that fills the entries with second derivatives waits for Chapter 14.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">C.4</span></p>
      <div class="env-body">
        <p>Classify \(Q(x, y) = 2x^2 + 4xy + 5y^2\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Read off \(a = 2\); the coefficient of \(xy\) is \(4\), so \(b = 2\); and \(c = 5\). The determinant is
        \[ D = ac - b^2 = 2\cdot 5 - 2^2 = 6 > 0, \]
        and \(a = 2 > 0\), so the form is positive definite. Completing the square confirms it: \(2x^2 + 4xy + 5y^2 = 2(x + y)^2 + 3y^2\), a sum of squares that vanishes only at the origin. Had the last coefficient been \(1\) rather than \(5\), the determinant would have been \(D = 2 - 4 = -2 < 0\), and the form indefinite — the algebraic signature of a saddle.</p>
      </div>
    </section>
  </div>

</article>

  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach((el) => {
      const def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      const { layout, panels } = def();
      let html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = `<div class="figure-art">${panels[0].svg}</div>`;
      } else {
        const cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = `<div class="figure-art ${cls}">` +
          panels.map((p) => `<div class="fig-panel">${p.svg}${p.note ? `<div class="fig-note">${p.note}</div>` : ""}</div>`).join("") +
          `</div>`;
      }
      el.insertAdjacentHTML("afterbegin", html);

      /* Connect per-figure CSS width variables (--fig-1-1 … --fig-1-25)
         defined in :root to this figure's --fig-w so the control panel
         actually takes effect. */
      const figNo = el.querySelector(".fig-no");
      if (figNo) {
        const m = figNo.textContent.match(/Figure\s+(\d+)\.(\d+)/);
        if (m) el.style.setProperty("--fig-w", `var(--fig-${m[1]}-${m[2]})`);
      }

      el.dataset.figDone = "1";
    });
  }

  window.hydrateFigures = hydrateFigures;
})();

    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var shouldBreakBefore = function(block) {
    return block.classList && block.classList.contains("page-break-before") && body.childElementCount > 0;
  };
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    if (shouldBreakBefore(block)) newSheet();
    body.appendChild(block);
    if (fits()) {
      /* ── Orphan heading prevention ──────────────────────────
         After placing a heading that fits, check whether enough
         room remains for content below it. If the remaining space
         is too small, move the heading to a fresh page so it stays
         with its following content — never stranded at the bottom. */
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        /* Major section headers need more room; minor headings less */
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    /* ── Figure shrink-to-fit ──────────────────────────────────
       When a figure *almost* fits the remaining page space,
       scale the .figure-art only (≥55 %) — caption stays full size.
       Measure art/caption while block is still in the DOM.       */
    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      /* Probe the actual insertion point to account for preceding margins */
      var _probe = document.createElement("div");
      _probe.style.height = "0";
      _probe.style.margin = "0";
      _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;  /* top/bottom margins + gaps */
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em";
        block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;           /* success — art shrunk, caption full size */
        body.removeChild(block);      /* revert and fall through */
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt;
        block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
</body>
