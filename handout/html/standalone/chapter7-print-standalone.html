       same station after rotation about the x-axis — the solid's silhouette (profile above,
       mirror below, 1.5px), end rims, and the disk = FULL filled ellipse centred on the
       axis, extending below it; radius f(x) arrow, Δx on the slab thickness. */
    "strip-to-disk": function () {
      var f = function (x) { return 1.12 + 0.42 * Math.sin(1.25 * x - 0.35); };
      var left = buildPlot({
        w: 225, h: 175, xmin: -0.15, xmax: 4.35, ymin: -0.4, ymax: 1.95,
        aria: "a region under a curve with one vertical strip at station x",
        xlabel: "x",
        xticks: [{ x: 2.2, tex: "x" }],
        items: [
          { type: "area", fn: f, domain: [0.5, 3.5] },
          { type: "rect", x1: 2.09, x2: 2.31, y0: 0, y1: f(2.2), cls: "rect-lo" },
          { type: "curve", fn: f, domain: [0.5, 3.5] },
          { type: "text", x: 2.62, y: 0.62, tex: "f(x)", anchor: "start", size: 11 }
        ] });
      /* right: oblique swept solid, horizontal axis */
      var W = 225, H = 175, cy = 92;
      var X = function (x) { return 18 + (x - 0.2) * 50; };   /* plot-x -> px */
      var RY = function (v) { return v * 46; };                /* radius -> px (major, vertical) */
      var K = 0.35;                                            /* ellipse aspect */
      function profPath(sgn) {
        var d = "";
        for (var i = 0; i <= 60; i++) { var x = 0.5 + 3.0 * i / 60; d += (i ? "L" : "M") + X(x).toFixed(1) + "," + (cy - sgn * RY(f(x))).toFixed(1) + " "; }
        return d.trim();
      }
      var xs = 2.2, pxs = X(xs), rs = RY(f(xs)), rk = K * rs, thick = 11;
      var r0 = RY(f(0.5)), r1 = RY(f(3.5));
      var arrX = pxs + thick / 2;
      var spans = texLbl(pxs - rk - 4, cy - rs / 2, "f(x)", "end", 11)
                + texLbl(pxs + thick / 2, cy - rs - 16, "\\Delta x", "middle", 11);
      var right = svgOpen(W, H, "the same strip swept about the x axis into a thin disk inside the solid of revolution")
        + '<line x1="6" y1="' + cy + '" x2="' + (W - 8) + '" y2="' + cy + '" class="idline"/>'
        + '<path d="' + profPath(1) + '" class="curve" stroke-width="1.5" fill="none"/>'
        + '<path d="' + profPath(-1) + '" class="curve" stroke-width="1.5" fill="none"/>'
        + '<ellipse cx="' + X(0.5) + '" cy="' + cy + '" rx="' + (K * r0).toFixed(1) + '" ry="' + r0.toFixed(1) + '" class="bubble" fill="none"/>'
        + '<ellipse cx="' + X(3.5) + '" cy="' + cy + '" rx="' + (K * r1).toFixed(1) + '" ry="' + r1.toFixed(1) + '" class="bubble" fill="none"/>'
        /* the disk: thin slab = two ellipses + filled band, full solid outline (exposed cut) */
        + '<ellipse cx="' + (pxs + thick) + '" cy="' + cy + '" rx="' + rk.toFixed(1) + '" ry="' + rs.toFixed(1) + '" class="fill-pos" stroke="var(--c-primary)" stroke-width="1.25"/>'
        + '<rect x="' + pxs + '" y="' + (cy - rs) + '" width="' + thick + '" height="' + (2 * rs) + '" fill="none" stroke="none"/>'
        + '<path d="M' + pxs + ',' + (cy - rs) + ' l' + thick + ',0 M' + pxs + ',' + (cy + rs) + ' l' + thick + ',0" class="bubble"/>'
        + '<ellipse cx="' + pxs + '" cy="' + cy + '" rx="' + rk.toFixed(1) + '" ry="' + rs.toFixed(1) + '" class="fill-pos" stroke="var(--c-primary)" stroke-width="1.25"/>'
        /* radius arrow from the axis to the disk's top rim, drawn AT the station (inside the disk) */
        + '<line x1="' + arrX + '" y1="' + cy + '" x2="' + arrX + '" y2="' + (cy - rs + 1.5) + '" class="axis" marker-end="url(#std-a)"/>'
        /* Δx bracket above the disk */
        + '<path d="M' + pxs + ',' + (cy - rs - 6) + ' v-4 h' + thick + ' v4" fill="none" class="axis"/>'
        + '<defs><marker id="std-a" markerWidth="8" markerHeight="8" refX="5.4" refY="2.8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5.4,2.8 L0,5.6" fill="none" stroke="var(--c-axis)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>'
        + foWrap(W, H, spans) + '</svg>';
      return { layout: "pair", panels: [
        { svg: left, note: "Strip" },
        { svg: right, note: "Disk" }
      ] };
    },

    /* §7.2 Figure 7.8 — pyramid, 2D through-axis fallback (per the pattern consult): apex at
       the origin, central axis along x (idline), base at x=h; cross-section at x with
       HALF-width s(x)/2 against the base's b/2 (half-widths — full sides would falsify the
       ratio); face-on inset square of side s(x). */
    "pyramid-similar": function () {
      return { layout: "single", panels: [{ svg: buildPlot({
        w: 285, h: 205, xmin: -0.55, xmax: 5.1, ymin: -2.6, ymax: 2.35, axes: false,
        aria: "through axis cross-section of a pyramid: apex at the origin, base at x equals h, one interior cross-section with half-width s of x over two",
        items: [
          { type: "hline", y: 0, from: -0.3, to: 4.55, cls: "idline" },
          { type: "seg", x1: 0, y1: 0, x2: 4, y2: 1.5, cls: "curve" },
          { type: "seg", x1: 0, y1: 0, x2: 4, y2: -1.5, cls: "curve" },
          { type: "seg", x1: 4, y1: -1.5, x2: 4, y2: 1.5, cls: "curve" },
          { type: "seg", x1: 2.4, y1: -0.9, x2: 2.4, y2: 0.9, cls: "refline" },
          { type: "seg", x1: 2.62, y1: 0, x2: 2.62, y2: 0.9, cls: "axis" },
          { type: "seg", x1: 2.54, y1: 0, x2: 2.7, y2: 0, cls: "axis" },
          { type: "seg", x1: 2.54, y1: 0.9, x2: 2.7, y2: 0.9, cls: "axis" },
          { type: "seg", x1: 4.18, y1: 0, x2: 4.18, y2: 1.5, cls: "axis" },
          { type: "seg", x1: 4.1, y1: 0, x2: 4.26, y2: 0, cls: "axis" },
          { type: "seg", x1: 4.1, y1: 1.5, x2: 4.26, y2: 1.5, cls: "axis" },
          { type: "dot", x: 0, y: 0, r: 2.4 },
          { type: "text", x: 2.72, y: 0.45, tex: "s(x)/2", anchor: "start", size: 11 },
          { type: "text", x: 4.28, y: 0.75, tex: "b/2", anchor: "start", size: 11 },
          { type: "seg", x1: 0, y1: -1.95, x2: 2.4, y2: -1.95, cls: "axis" },
          { type: "seg", x1: 0, y1: -1.85, x2: 0, y2: -2.05, cls: "axis" },
          { type: "seg", x1: 2.4, y1: -1.85, x2: 2.4, y2: -2.05, cls: "axis" },
          { type: "text", x: 1.2, y: -1.95, tex: "x", size: 11, dy: -10 },
          { type: "seg", x1: 0, y1: -2.42, x2: 4, y2: -2.42, cls: "axis" },
          { type: "seg", x1: 4, y1: -2.32, x2: 4, y2: -2.52, cls: "axis" },
          { type: "seg", x1: 0, y1: -2.32, x2: 0, y2: -2.52, cls: "axis" },
          { type: "text", x: 3.2, y: -2.42, tex: "h", size: 11, dy: 14 },
          /* inset square: width compensates the unequal axis scales (0.9 y-units ≈ 30.7px, so the
             x-width must be 0.9·(34.14/43.36) ≈ 0.709 units for the RENDERED shape to be square —
             the caption's whole claim; caught by the D1–D8 gate as a D5 blocking) */
          { type: "rect", x1: -0.5, x2: 0.209, y0: 1.3, y1: 2.2, cls: "rect-hi" },
          { type: "text", x: -0.145, y: 1.05, tex: "s(x)", size: 11 }
        ] }) }] };
    },

    /* §7.3 Figure 7.10 — strip → shell (upright, y-axis vertical per the pattern): the
       vertical strip at radial distance x sweeps a thin-walled cylindrical shell; radius as
       a RADIAL arrow from the axis (not a station tick), Δx between the two walls; one
       smaller nested shell dotted gray. Front/lower arcs solid, rear/upper dashed. */
    "strip-to-shell": function () {
      var W = 285, H = 205, cx = 128, K = 0.35;
      var d = 92, half = 6, topY = 56, botY = 172;
      var rIn = d - half, rOut = d + half;
      function rimPair(rx, cyE, cls, dashTop) {
        var ry = (K * rx).toFixed(1);
        var right = (cx + rx).toFixed(1), leftp = (cx - rx).toFixed(1);
        var front = '<path d="M' + leftp + ',' + cyE + ' A' + rx + ',' + ry + ' 0 0,0 ' + right + ',' + cyE + '" fill="none" class="' + cls + '"/>';
        var rear = '<path d="M' + leftp + ',' + cyE + ' A' + rx + ',' + ry + ' 0 0,1 ' + right + ',' + cyE + '" fill="none" class="' + (dashTop || "idline") + '"/>';
        return front + rear;
      }
      var spans = texLbl(cx + d * 0.62, 106 + 13, "x", "middle", 12)
                + texLbl(cx + rOut + 7, (topY + botY) / 2, "f(x)", "start", 12)
                + texLbl(cx + d, 25, "\\Delta x", "middle", 11);
      var svg = svgOpen(W, H, "a vertical strip at distance x from the upright axis swept into a thin cylindrical shell, with one smaller shell nested inside")
        + '<line x1="' + cx + '" y1="14" x2="' + cx + '" y2="' + (botY + 18) + '" class="idline"/>'
        /* nested smaller shell (gray dotted): walls + top rim */
        + '<line x1="' + (cx - 48) + '" y1="' + (topY + 26) + '" x2="' + (cx - 48) + '" y2="' + botY + '" class="bubble" stroke-dasharray="2 3"/>'
        + '<line x1="' + (cx + 48) + '" y1="' + (topY + 26) + '" x2="' + (cx + 48) + '" y2="' + botY + '" class="bubble" stroke-dasharray="2 3"/>'
        + '<ellipse cx="' + cx + '" cy="' + (topY + 26) + '" rx="48" ry="' + (K * 48).toFixed(1) + '" fill="none" class="bubble" stroke-dasharray="2 3"/>'
        /* main shell walls (outer + inner) */
        + '<line x1="' + (cx - rOut) + '" y1="' + topY + '" x2="' + (cx - rOut) + '" y2="' + botY + '" class="curve" stroke-width="1.5"/>'
        + '<line x1="' + (cx + rOut) + '" y1="' + topY + '" x2="' + (cx + rOut) + '" y2="' + botY + '" class="curve" stroke-width="1.5"/>'
        + '<line x1="' + (cx - rIn) + '" y1="' + topY + '" x2="' + (cx - rIn) + '" y2="' + botY + '" class="curve" stroke-width="1.25"/>'
        + '<line x1="' + (cx + rIn) + '" y1="' + topY + '" x2="' + (cx + rIn) + '" y2="' + botY + '" class="curve" stroke-width="1.25"/>'
        /* top rims: outer + inner (front solid, rear dashed) */
        + rimPair(rOut, topY, "curve")
        + rimPair(rIn, topY, "curve")
        /* base front arcs */
        + '<path d="M' + (cx - rOut) + ',' + botY + ' A' + rOut + ',' + (K * rOut).toFixed(1) + ' 0 0,0 ' + (cx + rOut) + ',' + botY + '" fill="none" class="bubble"/>'
        /* highlighted strip (the generator) on the right wall */
        + '<rect x="' + (cx + rIn) + '" y="' + topY + '" width="' + (2 * half) + '" height="' + (botY - topY) + '" class="rect-lo"/>'
        /* radius arrow from the axis to the shell mid-surface */
        + '<line x1="' + cx + '" y1="106" x2="' + (cx + d - 2) + '" y2="106" class="axis" marker-end="url(#sts-a)"/>'
        /* Δx bracket above the strip (clear of the rear rim arc) */
        + '<path d="M' + (cx + rIn) + ',37 v-4 h' + (2 * half) + ' v4" fill="none" class="axis"/>'
        + '<defs><marker id="sts-a" markerWidth="8" markerHeight="8" refX="5.4" refY="2.8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5.4,2.8 L0,5.6" fill="none" stroke="var(--c-axis)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>'
        + foWrap(W, H, spans) + '</svg>';
      return { layout: "single", panels: [{ svg: svg }] };
    },

    /* §7.3 Figure 7.12 — the SAME solid sliced both ways (pair; same base geometry, only the
       overlay changes). Base: the solid from rotating {0≤x≤1, 0≤y≤x²} about the y-axis =
       cylinder of radius 1 with a paraboloid bowl carved from the top. Left overlay: one
       horizontal washer at height y (outer 1, inner √y — exposed cut, full solid outlines).
       Right overlay: one vertical shell at radius x, height x². No numeric answer printed. */
    "washer-vs-shell": function () {
      var W = 225, H = 195, cx = 112, K = 0.35;
      var R = 78, botY = 158, topY = 66;
      function base() {
        var s = '<line x1="' + cx + '" y1="16" x2="' + cx + '" y2="' + (botY + 16) + '" class="idline"/>'
          + '<line x1="' + (cx - R) + '" y1="' + topY + '" x2="' + (cx - R) + '" y2="' + botY + '" class="curve" stroke-width="1.5"/>'
          + '<line x1="' + (cx + R) + '" y1="' + topY + '" x2="' + (cx + R) + '" y2="' + botY + '" class="curve" stroke-width="1.5"/>'
          /* top rim of the cylinder */
          + '<path d="M' + (cx - R) + ',' + topY + ' A' + R + ',' + (K * R).toFixed(1) + ' 0 0,0 ' + (cx + R) + ',' + topY + '" fill="none" class="curve" stroke-width="1.25"/>'
          + '<path d="M' + (cx - R) + ',' + topY + ' A' + R + ',' + (K * R).toFixed(1) + ' 0 0,1 ' + (cx + R) + ',' + topY + '" fill="none" class="idline"/>'
          /* base front arc */
          + '<path d="M' + (cx - R) + ',' + botY + ' A' + R + ',' + (K * R).toFixed(1) + ' 0 0,0 ' + (cx + R) + ',' + botY + '" fill="none" class="bubble"/>';
        /* carved paraboloid: interior profile curves from the rim down to the centre bottom */
        var dL = "M" + (cx - R) + "," + topY + " ", dR = "M" + (cx + R) + "," + topY + " ";
        for (var i = 1; i <= 24; i++) {
          var t = i / 24, xr = R * (1 - t);            /* radius shrinks */
          var py = topY + (botY - topY) * (1 - (xr / R) * (xr / R));
          dL += "L" + (cx - xr).toFixed(1) + "," + py.toFixed(1) + " ";
          dR += "L" + (cx + xr).toFixed(1) + "," + py.toFixed(1) + " ";
        }
        return s + '<path d="' + dL.trim() + '" fill="none" class="curve" stroke-width="1.5"/>'
                 + '<path d="' + dR.trim() + '" fill="none" class="curve" stroke-width="1.5"/>';
      }
      /* washer overlay at height y=0.55: py, inner radius √0.55 */
      var yw = 0.55, pyw = botY + (topY - botY) * yw, rw = R * Math.sqrt(yw);
      var washer = '<path d="M' + (cx - R) + ',' + pyw + ' A' + R + ',' + (K * R).toFixed(1) + ' 0 0,0 ' + (cx + R) + ',' + pyw + ' A' + R + ',' + (K * R).toFixed(1) + ' 0 0,1 ' + (cx - R) + ',' + pyw + ' Z M' + (cx - rw).toFixed(1) + ',' + pyw + ' A' + rw.toFixed(1) + ',' + (K * rw).toFixed(1) + ' 0 0,0 ' + (cx + rw).toFixed(1) + ',' + pyw + ' A' + rw.toFixed(1) + ',' + (K * rw).toFixed(1) + ' 0 0,1 ' + (cx - rw).toFixed(1) + ',' + pyw + ' Z" fill-rule="evenodd" class="fill-pos"/>'
        + '<ellipse cx="' + cx + '" cy="' + pyw + '" rx="' + R + '" ry="' + (K * R).toFixed(1) + '" fill="none" stroke="var(--c-primary)" stroke-width="1.25"/>'
        + '<ellipse cx="' + cx + '" cy="' + pyw + '" rx="' + rw.toFixed(1) + '" ry="' + (K * rw).toFixed(1) + '" fill="none" stroke="var(--c-primary)" stroke-width="1.25"/>';
      var spansA = texLbl(cx + R + 6, pyw - 8, "1", "start", 11)
                 + texLbl(cx + rw - 4, pyw + 0.35 * rw + 10, "\\sqrt{y}", "start", 11);
      /* shell overlay at radius x=0.7: height x²=0.49 */
      var xsh = 0.7, dsh = R * xsh, halfsh = 5, hsh = (botY - topY) * xsh * xsh;
      var shellTop = botY - hsh;
      var shell = '<rect x="' + (cx + dsh - halfsh).toFixed(1) + '" y="' + shellTop.toFixed(1) + '" width="' + (2 * halfsh) + '" height="' + hsh.toFixed(1) + '" class="rect-lo"/>'
        + '<line x1="' + (cx - dsh + halfsh).toFixed(1) + '" y1="' + shellTop.toFixed(1) + '" x2="' + (cx - dsh + halfsh).toFixed(1) + '" y2="' + botY + '" class="curve" stroke-width="1.25"/>'
        + '<path d="M' + (cx - dsh).toFixed(1) + ',' + shellTop.toFixed(1) + ' A' + dsh.toFixed(1) + ',' + (K * dsh).toFixed(1) + ' 0 0,0 ' + (cx + dsh).toFixed(1) + ',' + shellTop.toFixed(1) + '" fill="none" class="curve" stroke-width="1.25"/>'
        + '<path d="M' + (cx - dsh).toFixed(1) + ',' + shellTop.toFixed(1) + ' A' + dsh.toFixed(1) + ',' + (K * dsh).toFixed(1) + ' 0 0,1 ' + (cx + dsh).toFixed(1) + ',' + shellTop.toFixed(1) + '" fill="none" class="idline"/>'
        + '<line x1="' + cx + '" y1="' + (botY - 14) + '" x2="' + (cx + dsh - halfsh - 1).toFixed(1) + '" y2="' + (botY - 14) + '" class="axis" marker-end="url(#wvs-a)"/>';
      var spansB = texLbl(cx + dsh / 2, botY - 14 + 11, "x", "middle", 11)
                 + texLbl(cx + dsh + halfsh + 5, shellTop + hsh / 2, "x^{2}", "start", 11);
      var svgA = svgOpen(W, H, "the solid sliced by one horizontal washer at height y") + base() + washer + foWrap(W, H, spansA) + '</svg>';
      var svgB = svgOpen(W, H, "the same solid sliced by one vertical cylindrical shell at radius x") + base() + shell
        + '<defs><marker id="wvs-a" markerWidth="8" markerHeight="8" refX="5.4" refY="2.8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5.4,2.8 L0,5.6" fill="none" stroke="var(--c-axis)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>'
        + foWrap(W, H, spansB) + '</svg>';
      return { layout: "pair", panels: [
        { svg: svgA, note: "Washers" },
        { svg: svgB, note: "Shells" }
      ] };
    },

    /* §7.7 Figure 7.21 — chord → frustum band (pair). Left: the curve with ONE chord
       P_{i−1}P_i. Right: the chord swept about the x-axis into a frustum band — lateral
       surface only (rims open, no caps), the near generator IS the slanted chord, r1 ≠ r2. */
    "chord-to-band": function () {
      var f = function (x) { return 1.6 - 0.34 * (x - 1.9) * (x - 1.9); };
      var x1 = 0.95, x2 = 2.55;
      var left = buildPlot({
        w: 225, h: 165, xmin: 0.1, xmax: 3.6, ymin: -0.3, ymax: 1.95,
        aria: "a curve with one chord between two marked points, the chord visibly below the arc",
        xticks: [{ x: x1, tex: "x_{i-1}" }, { x: x2, tex: "x_i" }],
        items: [
          { type: "seg", x1: x1, y1: 0, x2: x1, y2: f(x1), cls: "idline" },
          { type: "seg", x1: x2, y1: 0, x2: x2, y2: f(x2), cls: "idline" },
          { type: "curve", fn: f, domain: [0.45, 3.3] },
          { type: "seg", x1: x1, y1: f(x1), x2: x2, y2: f(x2), cls: "axis" },
          { type: "dot", x: x1, y: f(x1) }, { type: "dot", x: x2, y: f(x2) }
        ] });
      var W = 225, H = 165, cy = 88, K = 0.35;
      var px1 = 62, px2 = 148, r1 = 46, r2 = 62;
      var spans = texLbl((px1 + px2) / 2 + 4, cy - (r1 + r2) / 2 - 12, "\\ell", "middle", 12);
      var right = svgOpen(W, H, "the chord swept about the x axis into a frustum band: two open rims of different radii joined by the slanted chord")
        + '<line x1="10" y1="' + cy + '" x2="' + (W - 10) + '" y2="' + cy + '" class="idline"/>'
        /* lateral surface fill: near-half rims + generators */
        + '<path d="M' + px1 + ',' + (cy - r1) + ' L' + px2 + ',' + (cy - r2) + ' A' + (K * r2).toFixed(1) + ',' + r2 + ' 0 0,1 ' + px2 + ',' + (cy + r2) + ' L' + px1 + ',' + (cy + r1) + ' A' + (K * r1).toFixed(1) + ',' + r1 + ' 0 0,0 ' + px1 + ',' + (cy - r1) + ' Z" class="fill-area"/>'
        /* rims: near halves solid, far halves dashed (open ends — no caps) */
        + '<path d="M' + px1 + ',' + (cy - r1) + ' A' + (K * r1).toFixed(1) + ',' + r1 + ' 0 0,0 ' + px1 + ',' + (cy + r1) + '" fill="none" class="curve" stroke-width="1.25"/>'
        + '<path d="M' + px1 + ',' + (cy - r1) + ' A' + (K * r1).toFixed(1) + ',' + r1 + ' 0 0,1 ' + px1 + ',' + (cy + r1) + '" fill="none" class="idline"/>'
        + '<path d="M' + px2 + ',' + (cy - r2) + ' A' + (K * r2).toFixed(1) + ',' + r2 + ' 0 0,0 ' + px2 + ',' + (cy + r2) + '" fill="none" class="curve" stroke-width="1.25"/>'
        + '<path d="M' + px2 + ',' + (cy - r2) + ' A' + (K * r2).toFixed(1) + ',' + r2 + ' 0 0,1 ' + px2 + ',' + (cy + r2) + '" fill="none" class="idline"/>'
        /* generators: near (top) = THE chord, emphasized; far (bottom) lighter */
        + '<line x1="' + px1 + '" y1="' + (cy - r1) + '" x2="' + px2 + '" y2="' + (cy - r2) + '" class="curve"/>'
        + '<line x1="' + px1 + '" y1="' + (cy + r1) + '" x2="' + px2 + '" y2="' + (cy + r2) + '" class="curve" stroke-width="1.5"/>'
        + '<circle cx="' + px1 + '" cy="' + (cy - r1) + '" r="2.6" class="dot"/>'
        + '<circle cx="' + px2 + '" cy="' + (cy - r2) + '" r="2.6" class="dot"/>'
        + foWrap(W, H, spans) + '</svg>';
      return { layout: "pair", panels: [
        { svg: left, note: "Chord" },
        { svg: right, note: "Frustum band" }
      ] };
    },

    /* §7.7 Figure 7.22 — sphere zones of equal width (2D profile per the pattern consult):
       circle + horizontal axis; two pairs of vertical cuts of the SAME width w — one
       straddling the equator, one near (but strictly off) the pole; the two cut PROFILE
       ARCS emphasized; vertical radius guides to each arc's midpoint. No areas printed. */
    "zone-bands": function () {
      var W = 265, H = 205, cx = 125, cy = 103, R = 88;
      function arcPath(xa, xb) {
        var ya = -Math.sqrt(R * R - xa * xa), yb = -Math.sqrt(R * R - xb * xb);
        return 'M' + (cx + xa).toFixed(1) + ',' + (cy + ya).toFixed(1) + ' A' + R + ',' + R + ' 0 0,1 ' + (cx + xb).toFixed(1) + ',' + (cy + yb).toFixed(1) + '';
      }
      function cut(xo) {
        var yv = Math.sqrt(R * R - xo * xo);
        return '<line x1="' + (cx + xo) + '" y1="' + (cy - yv - 8).toFixed(1) + '" x2="' + (cx + xo) + '" y2="' + (cy + 14).toFixed(1) + '" class="idline"/>';
      }
      var w = 30, e1 = -15, e2 = 15, p1 = 50, p2 = 80;
      var me = 0, mp = 65;
      var rye = Math.sqrt(R * R - me * me), ryp = Math.sqrt(R * R - mp * mp);
      var spans = texLbl(cx + (e1 + e2) / 2, cy + 26, "w", "middle", 12)
                + texLbl(cx + (p1 + p2) / 2, cy + 26, "w", "middle", 12);
      var svg = svgOpen(W, H, "a circle profile of the sphere with two vertical slabs of equal width, one at the equator and one near the pole, their upper arcs emphasized")
        + '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" class="bubble" fill="none" stroke-width="1.6"/>'
        + '<line x1="' + (cx - R - 16) + '" y1="' + cy + '" x2="' + (cx + R + 16) + '" y2="' + cy + '" class="idline"/>'
        + cut(e1) + cut(e2) + cut(p1) + cut(p2)
        + '<path d="' + arcPath(e1, e2) + '" fill="none" class="curve" stroke-width="2.6"/>'
        + '<path d="' + arcPath(p1, p2) + '" fill="none" class="curve" stroke-width="2.6"/>'
        /* vertical radius guides to each emphasized arc's midpoint */
        + '<line x1="' + (cx + me) + '" y1="' + cy + '" x2="' + (cx + me) + '" y2="' + (cy - rye).toFixed(1) + '" class="bubble" stroke-dasharray="2 3"/>'
        + '<line x1="' + (cx + mp) + '" y1="' + cy + '" x2="' + (cx + mp) + '" y2="' + (cy - ryp).toFixed(1) + '" class="bubble" stroke-dasharray="2 3"/>'
        /* equal-width brackets below the axis */
        + '<path d="M' + (cx + e1) + ',' + (cy + 18) + ' v4 h' + w + ' v-4" fill="none" class="axis"/>'
        + '<path d="M' + (cx + p1) + ',' + (cy + 18) + ' v4 h' + w + ' v-4" fill="none" class="axis"/>'
        + foWrap(W, H, spans) + '</svg>';
      return { layout: "single", panels: [{ svg: svg }] };
    },

    /* §7.7 Figure 7.23 — dual-axis radius readout: the arc y=x² with ONE sample point and TWO
       radius arrows from it — vertical distance f(x) to the x-axis, horizontal distance x to
       the y-axis. Radius = distance to THE axis of rotation; sample point strictly inside. */
    "dual-axis-radius": function () {
      var f = function (x) { return x * x; };
      var xs = 0.72;
      return { layout: "single", panels: [{ svg: buildPlot({
        w: 250, h: 215, xmin: -0.24, xmax: 1.32, ymin: -0.2, ymax: 1.22,
        aria: "the arc y equals x squared with one point and two radius arrows: down to the x axis and across to the y axis",
        xticks: [{ x: 1, tex: "1" }],
        yticks: [{ y: 1, tex: "1" }],
        items: [
          { type: "curve", fn: f, domain: [0, 1.05] },
          { type: "arrow", x1: xs, y1: f(xs), x2: xs, y2: 0.015 },
          { type: "arrow", x1: xs, y1: f(xs), x2: 0.012, y2: f(xs) },
          { type: "dot", x: xs, y: f(xs) },
          { type: "text", x: xs, y: f(xs) / 2, tex: "f(x)", anchor: "start", size: 12, dx: 7 },
          { type: "text", x: xs / 2, y: f(xs), tex: "x", size: 12, dy: -11 },
          { type: "text", x: 1.09, y: 0.92, tex: "y = x^{2}", anchor: "start", size: 12 }
        ] }) }] };
    }

  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 7 — Applications of Integration",
  runningHead: "Chapter 7 · Applications of Integration",
  fragments: ["sec-7-1", "sec-7-2", "sec-7-3", "sec-7-4", "sec-7-5", "sec-7-6", "sec-7-7"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      var _probe = document.createElement("div");
      _probe.style.height = "0"; _probe.style.margin = "0"; _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em"; block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;
        body.removeChild(block);
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var remainingAtInsert = 0;
    if (mode !== "none") {
      var splitProbe = document.createElement("div");
      splitProbe.style.height = "0"; splitProbe.style.margin = "0"; splitProbe.style.padding = "0";
      body.appendChild(splitProbe);
      remainingAtInsert = body.clientHeight - (splitProbe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(splitProbe);
    }
    var want = (mode !== "none" && (blockH > body.clientHeight || remainingAtInsert >= FREE_THRESHOLD));
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
