<article class="sec" lang="en">
  <header class="chapter-head">
    <div class="ch-kicker">Chapter 7</div>
    <h1 class="ch-title">Applications of Integration</h1>
  </header>

  <p class="lead">Chapter 6 built the machine. The definite integral was assembled from Riemann sums, and the Fundamental Theorem of Calculus turned its evaluation into a search for antiderivatives. This chapter puts the machine to work — on the area between two curves, the volume of a solid, the work done by a varying force, the average of a continuously varying quantity, the length of a curve, and the area of a curved surface. Six problems, and one method: <em>slice</em> the quantity into thin pieces, <em>approximate</em> each piece by a product — a value that is nearly constant across the slice, times the slice’s width — <em>sum</em> the pieces, and <em>refine</em>. Every time, the sums are Riemann sums, their limit is a definite integral, and the Fundamental Theorem evaluates it. What is genuinely new in this chapter is therefore not the integration but the setup: deciding what to slice, reading off what each thin slice contributes, and recognizing the resulting limit as an integral we can compute. That modelling step — from a quantity to its integral — is the skill this chapter teaches, and it is the skill that the rest of calculus, from differential equations to the geometry of space, keeps drawing on.</p>

  <p class="para-head">By the end of this chapter, you will be able to:</p>
  <ul>
    <li>compute the area of a region bounded by curves, slicing along either axis;</li>
    <li>compute volumes by cross-sections, by disks and washers, and by cylindrical shells;</li>
    <li>set up and evaluate work integrals for springs, cables, and pumping problems;</li>
    <li>compute the average value of a function and locate a point where it is attained;</li>
    <li>compute the length of a smooth curve and the area of a surface of revolution, and work with the arc length function.</li>
  </ul>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.1</span>Areas Between Curves</h2>
  </header>

  <!-- expansion:intuition — section opener: instantiate the chapter schema with the two-curve strip; the load-bearing idea is that the strip's height is the GAP f−g, and the axis drops out -->
  <p>Chapter 6 measured the region between a curve and the \(x\)-axis. Most regions are not like that: they are trapped between <em>two</em> curves — a curved roof and a curved floor. The chapter’s slicing schema handles them with one adjustment. Cut the region into thin vertical strips. Each strip runs from the lower curve up to the upper one, so its height is not the height of either graph above the axis but the <em>gap</em> between the graphs. Approximate the strip by a rectangle, gap times width; sum; refine. The axis has dropped out of the computation entirely — and that is precisely what makes the method robust.</p>

  <h3 class="subsec-head">The area between two curves</h3>

  <p>Let \(f\) and \(g\) be continuous on \([a, b]\) with \(f(x) \ge g(x)\) for all \(x\) in \([a, b]\), and let \(S\) be the region bounded above by \(y = f(x)\), below by \(y = g(x)\), and on the sides by the vertical lines \(x = a\) and \(x = b\). Divide \([a, b]\) into \(n\) strips of equal width \(\Delta x = \tfrac{b-a}{n}\), and in the \(i\)-th strip pick a sample point \(x_{i}^{*}\). The strip is approximated by a rectangle of width \(\Delta x\) and height \(f(x_{i}^{*}) - g(x_{i}^{*})\), so the region’s area is approximated by the sum</p>
  <p>\[ \sum_{i=1}^{n} \bigl[f(x_{i}^{*}) - g(x_{i}^{*})\bigr]\,\Delta x. \]</p>
  <p>This is a Riemann sum — not for \(f\) or for \(g\), but for the single function \(f - g\). Since \(f - g\) is continuous on \([a, b]\), Theorem 6.1 guarantees that as \(n \to \infty\) these sums converge to \(\int_{a}^{b} \bigl[f(x) - g(x)\bigr]\,dx\), no matter how the sample points are chosen. As in §6.1, we take the common limit as the <em>definition</em> of the area.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — region between two curves with one representative strip, height = the gap f−g, axis crossing the region; registered in chapter7 FIGS as "gap-strip"] -->
  <figure class="figure" data-fig="gap-strip">
    <figcaption><span class="fig-no">Figure 7.1</span> The region between an upper curve and a lower one, cut into vertical strips. The strip’s height is the gap \(f(x_i^{*}) - g(x_i^{*})\) between the graphs — not a height above the axis, which passes through the region without playing any role.</figcaption>
  </figure>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.1</span><span class="env-name">Area between curves</span></p>
    <div class="env-body">
      <p>Let \(f\) and \(g\) be continuous on \([a, b]\) with \(f(x) \ge g(x)\) on \([a, b]\). The <em>area</em> of the region bounded by \(y = f(x)\) above, \(y = g(x)\) below, and the lines \(x = a\) and \(x = b\) is</p>
      <p>\[ A = \int_{a}^{b} \bigl[f(x) - g(x)\bigr]\,dx. \]</p>
    </div>
  </section>

  <p>Two checks tie the definition to what we already have. First, when \(g\) is the zero function and \(f \ge 0\), the region is the one under the graph of \(f\), and the formula collapses to \(\int_{a}^{b} f(x)\,dx\) — Definition 6.1 again. Second, the definition asks only that \(f\) stay <em>above</em> \(g\); neither curve is required to stay above the axis.</p>

  <!-- expansion:intuition — sign-shift invariance: why negativity is harmless once you subtract the graphs; this is the one place the "gap not height" idea earns its formal keep -->
  <p>That second point deserves a moment, because in §6.2 we saw that below the axis an integral counts area <em>negatively</em>. Why does no such caution attach here? Raise both curves by the same constant \(C\) — replace \(f\) by \(f + C\) and \(g\) by \(g + C\) with \(C\) large enough to lift the whole region above the axis. The region merely slides upward, so its area is unchanged; and the integrand is unchanged too, since \((f + C) - (g + C) = f - g\). The subtraction has already discarded the only thing the axis was ever needed for. Subtract the graphs first, and signs take care of themselves.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.1</span></p>
      <div class="env-body">
        <p>Find the area of the region bounded above by \(y = e^{x}\), below by \(y = x\), and on the sides by \(x = 0\) and \(x = 1\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>First confirm which curve is on top throughout the interval: \(e^{x}\) is increasing, so \(e^{x} \ge e^{0} = 1\) on \([0, 1]\), while \(x \le 1\) there; hence \(e^{x} \ge 1 \ge x\) across the whole interval. Definition 7.1 applies with \(f(x) = e^{x}\) and \(g(x) = x\), and the Fundamental Theorem (Theorem 6.4) evaluates the result:</p>
        <p>\[ \begin{aligned}
          A &= \int_{0}^{1} \bigl(e^{x} - x\bigr)\,dx = \left[e^{x} - \frac{x^{2}}{2}\right]_{0}^{1} \\[2pt]
            &= \left(e - \frac{1}{2}\right) - (1 - 0) = e - \frac{3}{2} \approx 1.22.
        \end{aligned} \]<span class="qed"></span></p>
      </div>
    </section>
  </div>

  <p>In Example 7.1 the interval \([a, b]\) was handed to us. More often the region is <em>enclosed</em> by the curves themselves, and the first task is to find where they meet: the intersection points supply the limits of integration.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.2</span></p>
      <div class="env-body">
        <p>Find the area of the region enclosed by the parabolas \(y = x^{2}\) and \(y = 2x - x^{2}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The curves intersect where \(x^{2} = 2x - x^{2}\), that is, \(2x^{2} - 2x = 0\), so \(2x(x - 1) = 0\) and \(x = 0\) or \(x = 1\). The enclosed region lives over the interval \([0, 1]\). To see which parabola is on top there, test a point between the intersections: at \(x = \tfrac{1}{2}\), the first curve gives \(\tfrac{1}{4}\) and the second gives \(1 - \tfrac{1}{4} = \tfrac{3}{4}\). So \(y = 2x - x^{2}\) runs above \(y = x^{2}\), and</p>
        <p>\[ \begin{aligned}
          A &= \int_{0}^{1} \bigl[(2x - x^{2}) - x^{2}\bigr]\,dx = \int_{0}^{1} \bigl(2x - 2x^{2}\bigr)\,dx \\[2pt]
            &= \left[x^{2} - \frac{2x^{3}}{3}\right]_{0}^{1} = 1 - \frac{2}{3} = \frac{1}{3}.
        \end{aligned} \]<span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 (M2 coverage audit addition) tier-supporting — the enclosed lens of Ex 7.2: sides collapsed to the two intersections, which become the limits; registered in chapter7 FIGS as "enclosed-lens"] -->
  <figure class="figure" data-fig="enclosed-lens">
    <figcaption><span class="fig-no">Figure 7.2</span> The region enclosed by \(y = x^{2}\) and \(y = 2x - x^{2}\). No vertical sides are given or needed: the two intersection points close the region by themselves, and they become the limits of integration.</figcaption>
  </figure>

  <h3 class="subsec-head">When the curves cross</h3>

  <p>Definition 7.1 assumes one curve stays on top. When the curves cross inside the interval, the roles of roof and floor swap at each crossing, and the honest quantity to track is the size of the gap, \(\lvert f(x) - g(x)\rvert\). The total area between the graphs is</p>
  <p>\[ A = \int_{a}^{b} \bigl\lvert f(x) - g(x)\bigr\rvert\,dx, \]</p>
  <p>and when the crossings are finitely many — as they are in every example we will meet — we compute it by splitting the interval at the crossings and applying Definition 7.1 on each piece with the curves in their correct local order. This is the same move §6.4 made for total distance: displacement integrates \(v\), but distance travelled integrates \(\lvert v\rvert\), splitting where the velocity changes sign.</p>

  <!-- expansion:caution — the trap: integrating one fixed order straight across a crossing computes a net, not the total; echoes §6.2 signed area / §6.4 displacement-vs-distance -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>If the curves cross inside \([a, b]\), the single integral \(\int_{a}^{b} (f - g)\,dx\) adds <em>signed</em> gaps: pieces where \(g\) is on top count negatively and cancel against the rest, exactly as signed area cancelled in §6.2. An answer that comes out negative, or suspiciously small, usually means a crossing was missed. Find every crossing first; then split, or integrate \(\lvert f - g\rvert\).</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.3</span></p>
      <div class="env-body">
        <p>Find the total area of the region between \(y = \sin x\) and \(y = \cos x\) for \(0 \le x \le \pi/2\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The curves cross where \(\sin x = \cos x\). On \([0, \pi/2)\) the cosine is positive, so we may divide by it: \(\tan x = 1\), giving \(x = \pi/4\); and \(x = \pi/2\) is not a crossing since \(\sin\tfrac{\pi}{2} = 1 \ne 0 = \cos\tfrac{\pi}{2}\). At \(x = 0\) the cosine is on top (\(1 > 0\)), so \(\cos x \ge \sin x\) on \([0, \pi/4]\) and the order swaps on \([\pi/4, \pi/2]\). Split there:</p>
        <p>\[ \begin{aligned}
          A &= \int_{0}^{\pi/4} (\cos x - \sin x)\,dx + \int_{\pi/4}^{\pi/2} (\sin x - \cos x)\,dx \\[2pt]
            &= \bigl[\sin x + \cos x\bigr]_{0}^{\pi/4} + \bigl[-\cos x - \sin x\bigr]_{\pi/4}^{\pi/2} \\[2pt]
            &= \left(\tfrac{\sqrt{2}}{2} + \tfrac{\sqrt{2}}{2}\right) - (0 + 1) + (-0 - 1) + \left(\tfrac{\sqrt{2}}{2} + \tfrac{\sqrt{2}}{2}\right) \\[2pt]
            &= \bigl(\sqrt{2} - 1\bigr) + \bigl(\sqrt{2} - 1\bigr) = 2\sqrt{2} - 2 \approx 0.83.
        \end{aligned} \]</p>
        <p>The two pieces came out equal, and that is no accident: the identity \(\cos x = \sin\bigl(\tfrac{\pi}{2} - x\bigr)\) reflects the second region onto the first across the line \(x = \pi/4\). Symmetries like this are worth a glance before integrating — here, one piece doubled would have done. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — sin vs cos two lobes, roof/floor swap at π/4, mirror symmetry; registered in chapter7 FIGS as "sincos-lobes"] -->
  <figure class="figure" data-fig="sincos-lobes">
    <figcaption><span class="fig-no">Figure 7.3</span> The two lobes between \(y = \cos x\) and \(y = \sin x\) on \([0, \pi/2]\). The roles of roof and floor swap at the crossing \(x = \pi/4\), which is why one fixed order of subtraction would cancel; the identity \(\cos x = \sin\bigl(\tfrac{\pi}{2} - x\bigr)\) makes the second lobe the mirror image of the first.</figcaption>
  </figure>

  <h3 class="subsec-head">Slicing horizontally</h3>

  <p>Nothing privileges vertical strips. If a region is bounded by curves that read more naturally as \(x\) in terms of \(y\) — a left boundary \(x = g(y)\) and a right boundary \(x = f(y)\), with \(f\) and \(g\) continuous on \([c, d]\) and \(f(y) \ge g(y)\) there — slice it horizontally instead. The strip at height \(y\) runs from the left curve to the right one, its length is the gap \(f(y) - g(y)\), and the same limit argument, resting on the same continuity, gives</p>
  <p>\[ A = \int_{c}^{d} \bigl[f(y) - g(y)\bigr]\,dy, \]</p>
  <p>with <em>right minus left</em> in place of top minus bottom. Choosing the slicing direction well can spare real work, as the next example shows.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.4</span></p>
      <div class="env-body">
        <p>Find the area of the region enclosed by the parabolas \(x = y^{2}\) and \(x = 2 - y^{2}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Both curves give \(x\) directly in terms of \(y\): the first opens rightward from the origin, the second opens leftward from \((2, 0)\). They meet where \(y^{2} = 2 - y^{2}\), so \(y^{2} = 1\) and \(y = \pm 1\) — the points \((1, 1)\) and \((1, -1)\). Vertical strips would be awkward here: below \(x = 1\) a strip runs between the two branches of \(x = y^{2}\), beyond it between the branches of \(x = 2 - y^{2}\), forcing a split at \(x = 1\) and square roots throughout. A horizontal strip at height \(y\), by contrast, always enters the region on \(x = y^{2}\) and leaves it on \(x = 2 - y^{2}\). With right minus left,</p>
        <p>\[ A = \int_{-1}^{1} \bigl[(2 - y^{2}) - y^{2}\bigr]\,dy = \int_{-1}^{1} \bigl(2 - 2y^{2}\bigr)\,dy. \]</p>
        <p>The integrand is even, so by Theorem 6.8 the integral is twice its value over \([0, 1]\):</p>
        <p>\[ A = 2\int_{0}^{1} \bigl(2 - 2y^{2}\bigr)\,dy = 2\left[2y - \frac{2y^{3}}{3}\right]_{0}^{1} = 2\left(2 - \frac{2}{3}\right) = \frac{8}{3}. \]<span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — sideways parabolas with one horizontal strip; registered in chapter7 FIGS as "horizontal-slice"] -->
  <figure class="figure" data-fig="horizontal-slice">
    <figcaption><span class="fig-no">Figure 7.4</span> The region enclosed by \(x = y^{2}\) and \(x = 2 - y^{2}\), sliced horizontally. Every horizontal strip enters on one parabola and leaves on the other, whereas a vertical strip would change character at \(x = 1\).</figcaption>
  </figure>

  <!-- expansion:application [source: Stewart ET 9e §6.1 velocity-gap example, adapted] — the gap integrand read physically: area between velocity curves = lead built up; ties to Net Change §6.4, shows the integrand-as-gap reading is not merely geometric -->
  <p>The gap between two curves need not be a geometric height at all. Suppose two runners leave the same start together — positions \(s_{A}(0) = s_{B}(0)\) — and run with continuous velocities \(v_{A} = s_{A}'\) and \(v_{B} = s_{B}'\) satisfying \(v_{A}(t) \ge v_{B}(t)\) over the first \(T\) seconds. Each thin time-slice contributes \(\bigl[v_{A}(t) - v_{B}(t)\bigr]\,\Delta t\) — the little bit of extra ground the faster runner gains during that instant. Since \(s_{A} - s_{B}\) has continuous derivative \(v_{A} - v_{B}\), the Net Change Theorem (Theorem 6.5) gives \(\int_{0}^{T} \bigl[v_{A}(t) - v_{B}(t)\bigr]\,dt = s_{A}(T) - s_{B}(T)\) — the faster runner’s lead at time \(T\). On a shared velocity–time graph, that lead <em>is</em> the area between the two velocity curves. The same reading works for any two rates running side by side — two flow rates, two growth rates — <em>so long as one stays on top</em>: if the rate curves cross, the area between the graphs accumulates the absolute gap \(\int \lvert v_{A} - v_{B}\rvert\), while the net difference is the plain integral — the displacement-versus-distance distinction of §6.4 all over again.</p>

  <!-- expansion:strategy — distill the section's method: the four moves every area-between-curves solution makes (Ex 7.1–7.4 all instantiate them) -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">7.1</span><span class="env-name">Setting up an area integral</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><em>Find the boundaries.</em> Sketch the curves and find every intersection in the range of interest by solving \(f = g\); intersections supply the limits of integration when the region is enclosed.</li>
        <li><em>Choose the slicing direction.</em> Slice so that each strip meets the same two boundary curves throughout: vertically when the boundaries are graphs \(y = f(x)\), \(y = g(x)\); horizontally when they read naturally as \(x\) in terms of \(y\).</li>
        <li><em>Integrate the gap.</em> The integrand is top minus bottom (vertical strips) or right minus left (horizontal strips) — never a height above an axis.</li>
        <li><em>Split at crossings.</em> If the boundary curves swap roles inside the interval, split there; the total area is \(\int \lvert f - g\rvert\), computed piece by piece.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:summary — close §7.1: the section's one move (subtract, then integrate) + hand off to volumes, where the slices become solid slabs; no mechanics of §7.2 -->
  <p>One move carried this whole section: subtract the boundary graphs, and the machinery of Chapter 6 applies to the difference exactly as it stood — Riemann sums, the existence guarantee of Theorem 6.1, evaluation by the Fundamental Theorem. The area between curves is the integral of a gap, and the runners’ race shows the same reading paying off outside geometry. The next section keeps the slicing and changes the dimension: the slices become thin solid slabs, the gap becomes a cross-sectional area, and the same sum-and-refine limit measures volume.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.2</span>Volumes</h2>
  </header>

  <!-- expansion:intuition — section opener: instantiate the chapter schema one dimension up; the strip's gap becomes a slab's face; the only exact volume geometry supplies is the cylinder's -->
  <p>From flat regions we turn to solids, and the slices are now cut from a solid body — the way a loaf of bread is cut into slices. What does geometry give us to work with? For areas it gave rectangles. For volumes it gives the <em>cylinder</em>: a solid with a flat base of area \(A\) swept straight up to height \(h\) has volume \(V = Ah\). (The base need not be a circle — a box is a cylinder over a rectangle.) A curved solid is not a cylinder anywhere; but each <em>thin</em> slice of it very nearly is, and that is all the slicing method needs.</p>

  <h3 class="subsec-head">Volume by cross-sections</h3>

  <p>Let \(S\) be a solid lying between the vertical planes \(x = a\) and \(x = b\). For each \(x\) in \([a, b]\), slice \(S\) by the plane through \(x\) perpendicular to the \(x\)-axis, and write \(A(x)\) for the area of the exposed face — the <em>cross-section</em> at \(x\). Now cut \([a, b]\) into \(n\) subintervals of width \(\Delta x\) and, in the \(i\)-th one, pick a sample point \(x_{i}^{*}\). The slab of \(S\) over that subinterval is nearly a cylinder with base area \(A(x_{i}^{*})\) and thickness \(\Delta x\), so the whole solid is approximated by</p>
  <p>\[ V \approx \sum_{i=1}^{n} A(x_{i}^{*})\,\Delta x, \]</p>
  <p>a Riemann sum for the function \(A\). If \(A\) is continuous, Theorem 6.1 guarantees these sums close on a single limit, independent of every choice made in the slicing. It is that limit we take the volume to <em>be</em>. Note the word: this is a definition, not a theorem. Geometry hands us the volume of a cylinder; that a curved solid’s volume should be the limit of its slab approximations is the modelling step, made once, in the open — just as §6.1 made it for area.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.2</span><span class="env-name">Volume by cross-sections</span></p>
    <div class="env-body">
      <p>Let \(S\) be a solid lying between the planes \(x = a\) and \(x = b\), and suppose its cross-section at \(x\), perpendicular to the \(x\)-axis, has area \(A(x)\), where \(A\) is continuous on \([a, b]\). The <em>volume</em> of \(S\) is</p>
      <p>\[ V = \int_{a}^{b} A(x)\,dx. \]</p>
    </div>
  </section>

  <p>The definition passes its first test at once: if the cross-section never changes — \(A(x) = A\) for all \(x\), as in an actual cylinder lying on its side with \(h = b - a\) — then \(V = \int_{a}^{b} A\,dx = A\,(b - a) = Ah\), the formula we started from. The examples below run harder tests: the definition will be asked to reproduce two volumes that classical geometry already knows.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — generic (non-revolution) solid with one slab, face A(x_i*), Δx bracket, end planes a/b on a dimension line; 2.5D pattern per ch07_25d-pattern-codex-audit; registered in chapter7 FIGS as "slab-face"] -->
  <figure class="figure" data-fig="slab-face">
    <figcaption><span class="fig-no">Figure 7.5</span> A solid sliced like a loaf: the slab at \(x_i^{*}\) is nearly a cylinder — a flat face of area \(A(x_i^{*})\) swept through the small thickness \(\Delta x\), here exaggerated for visibility. The solid is deliberately irregular: nothing in Definition 7.2 asks for symmetry, only for a measurable cross-section at each station between \(a\) and \(b\).</figcaption>
  </figure>

  <!-- expansion:history [source: standard calculus-textbook historical note] — Cavalieri's principle as the classical echo of the definition; one line, non-decorative -->
  <p>The idea is older than the integral. In the seventeenth century Cavalieri argued that two solids whose cross-sections agree at every height must enclose the same volume — <em>Cavalieri’s principle</em>. Definition 7.2 is that principle made quantitative: the volume is determined by, and computed from, the cross-section areas alone.</p>

  <h3 class="subsec-head">Solids of revolution: disks</h3>

  <p>The richest supply of solids with computable cross-sections comes from <em>revolution</em>. Take the region under \(y = f(x)\) from \(a\) to \(b\) (with \(f\) continuous and \(f \ge 0\)) and rotate it about the \(x\)-axis. Each vertical strip of the region sweeps out a thin circular slab — a <em>disk</em> — and the cross-section of the resulting solid at \(x\) is a full circle whose radius is the height of the curve:</p>
  <p>\[ A(x) = \pi \bigl[f(x)\bigr]^{2}. \]</p>
  <p>Definition 7.2 then gives \(V = \int_{a}^{b} \pi \bigl[f(x)\bigr]^{2}\,dx\). No new formula is being introduced here — only a recipe for \(A(x)\).</p>

  <!-- expansion:caution — the radius-reading trap: the disk's radius is the function VALUE, a length read vertically, then swept; students who memorize "πr²" hunt for a horizontal r -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>For rotation about the \(x\)-axis, the disk’s radius at \(x\) is the <em>function value</em> \(f(x)\) — the vertical distance from the axis to the curve, which the rotation then sweeps around. It is not a distance along the \(x\)-axis, and when the axis of rotation moves (as it will shortly), the radius is always measured from <em>that</em> axis, not from a coordinate axis out of habit.</p>
    </div>
  </section>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — strip→disk before/after pair, same station, disk centred on the axis and extending below it; registered in chapter7 FIGS as "strip-to-disk"] -->
  <figure class="figure" data-fig="strip-to-disk">
    <figcaption><span class="fig-no">Figure 7.6</span> The same station twice: a vertical strip of height \(f(x)\), and the thin disk it sweeps out when the region rotates about the \(x\)-axis. The disk’s radius is the function value \(f(x)\), its centre sits on the axis, and the solid extends symmetrically below the axis.</figcaption>
  </figure>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.5</span></p>
      <div class="env-body">
        <p>Show that a sphere of radius \(r\) has volume \(\dfrac{4}{3}\pi r^{3}\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Generate the sphere by rotating the upper half-disk under \(y = \sqrt{r^{2} - x^{2}}\), \(-r \le x \le r\), about the \(x\)-axis. The cross-section at \(x\) is a disk of radius \(\sqrt{r^{2} - x^{2}}\), so</p>
        <p>\[ A(x) = \pi \bigl(\sqrt{r^{2} - x^{2}}\bigr)^{2} = \pi \bigl(r^{2} - x^{2}\bigr), \]</p>
        <p>which is continuous, and Definition 7.2 applies. The integrand is even, so Theorem 6.8 lets us integrate over \([0, r]\) and double:</p>
        <p>\[ \begin{aligned}
          V &= \int_{-r}^{r} \pi \bigl(r^{2} - x^{2}\bigr)\,dx = 2\pi \int_{0}^{r} \bigl(r^{2} - x^{2}\bigr)\,dx \\[2pt]
            &= 2\pi \left[r^{2}x - \frac{x^{3}}{3}\right]_{0}^{r} = 2\pi\cdot\frac{2r^{3}}{3} = \frac{4}{3}\pi r^{3}.
        \end{aligned} \]</p>
        <p>This is the volume formula the Greeks knew — Definition 7.2 has reproduced a fact of classical geometry from nothing but slicing, the same reassurance §6.2 drew from the semicircle in Example 6.6. A definition that agrees with everything already known has earned some trust. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.6</span></p>
      <div class="env-body">
        <p>The region under \(y = \sqrt{x}\) from \(0\) to \(4\) is rotated about the \(x\)-axis. Find the volume of the resulting solid.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The cross-section at \(x\) is a disk of radius \(\sqrt{x}\), with area \(A(x) = \pi (\sqrt{x})^{2} = \pi x\) — continuous on \([0, 4]\). Hence</p>
        <p>\[ V = \int_{0}^{4} \pi x\,dx = \pi \left[\frac{x^{2}}{2}\right]_{0}^{4} = 8\pi. \]</p>
        <p>Squaring the radius <em>before</em> integrating is what makes this integral easy: the square root disappears into the disk area. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Washers</h3>

  <p>Rotate the region <em>between</em> two curves and the solid acquires a hole. If \(f\) and \(g\) are continuous on \([a, b]\) with \(f(x) \ge g(x) \ge 0\), and the region between the graphs is rotated about the \(x\)-axis, the cross-section at \(x\) is an annulus — a <em>washer</em> — with outer radius \(R = f(x)\) and inner radius \(r = g(x)\). Its area is a difference of two disk areas,</p>
  <p>\[ A(x) = \pi \bigl[f(x)\bigr]^{2} - \pi \bigl[g(x)\bigr]^{2} = \pi \Bigl(\bigl[f(x)\bigr]^{2} - \bigl[g(x)\bigr]^{2}\Bigr), \]</p>
  <p>and by the linearity of the integral (Theorem 6.2) the volume splits the same way: the solid with the hole is the full solid minus the hole’s own volume. Where §7.1 subtracted <em>heights</em>, the washer subtracts <em>squared radii</em> — and the order of operations there is a genuine trap.</p>

  <!-- expansion:caution — THE washer trap: subtract squares, not the radii; π(R²−r²) ≠ π(R−r)² -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>A washer’s area is \(\pi\bigl(R^{2} - r^{2}\bigr)\), <em>not</em> \(\pi (R - r)^{2}\): square each radius first, then subtract. Writing \(\pi\bigl(f(x) - g(x)\bigr)^{2}\) — squaring the gap, as if §7.1’s integrand could be recycled — is the most common volume error there is, and it is silent: the integral still computes, just to the wrong number.</p>
    </div>
  </section>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — washer face-on: ring = big disk minus small disk, radii from the axis, interior station 0<r<R; registered in chapter7 FIGS as "washer-annulus"] -->
  <figure class="figure" data-fig="washer-annulus">
    <figcaption><span class="fig-no">Figure 7.7</span> A washer face-on: the ring between an outer circle of radius \(R\) and an inner one of radius \(r\), both measured from the axis of rotation at the centre. Its area is the big disk minus the small one, \(\pi\bigl(R^{2} - r^{2}\bigr)\) — visibly not the disk of radius \(R - r\).</figcaption>
  </figure>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.7</span></p>
      <div class="env-body">
        <p>The region enclosed by \(y = x\) and \(y = x^{2}\) is rotated about the \(x\)-axis. Find the volume of the resulting solid.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The curves meet where \(x = x^{2}\), so \(x = 0\) or \(x = 1\), and between these values \(x \ge x^{2} \ge 0\) (at \(x = \tfrac12\): \(\tfrac12\) against \(\tfrac14\)). Rotating, the line is the outer boundary and the parabola the inner one: \(R = x\), \(r = x^{2}\), giving washers of area \(\pi\bigl(x^{2} - x^{4}\bigr)\). Hence</p>
        <p>\[ V = \int_{0}^{1} \pi \bigl(x^{2} - x^{4}\bigr)\,dx = \pi \left[\frac{x^{3}}{3} - \frac{x^{5}}{5}\right]_{0}^{1} = \pi \left(\frac{1}{3} - \frac{1}{5}\right) = \frac{2\pi}{15}. \]</p>
        <p>Had the same region been rotated about the line \(y = 2\) instead, only where the radii are measured from would change — each becomes a distance to <em>that</em> line, not to a coordinate axis out of habit. The next example carries that change through. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example [pass: enrichment] [source: M4 Mode C gap-check 2026-07-18; §7.2 Layer-1 shifted-axis gap earmarked in brief; authored soln (Stewart ET 9e §6.2 Ex 4 corroborated), sympy-verified V=8π/15] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.8</span></p>
      <div class="env-body">
        <p>The same region — enclosed by \(y = x\) and \(y = x^{2}\) — is now rotated about the horizontal line \(y = 2\). Find the volume of the resulting solid.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The region still runs over \([0, 1]\) with \(y = x\) on top and \(y = x^{2}\) below, and it lies entirely beneath the axis \(y = 2\). Rotating about that line, each radius is a <em>vertical distance to \(y = 2\)</em>. The boundary farther from the axis is now the lower curve \(y = x^{2}\), so it supplies the outer radius \(R = 2 - x^{2}\); the nearer boundary \(y = x\) supplies the inner radius \(r = 2 - x\). The washer at \(x\) has area</p>
        <p>\[ \pi\bigl(R^{2} - r^{2}\bigr) = \pi\bigl[(2 - x^{2})^{2} - (2 - x)^{2}\bigr] = \pi\bigl(x^{4} - 5x^{2} + 4x\bigr), \]</p>
        <p>so</p>
        <p>\[ \begin{aligned}
          V &= \pi\int_{0}^{1} \bigl(x^{4} - 5x^{2} + 4x\bigr)\,dx = \pi\left[\frac{x^{5}}{5} - \frac{5x^{3}}{3} + 2x^{2}\right]_{0}^{1} \\[2pt]
            &= \pi\left(\frac{1}{5} - \frac{5}{3} + 2\right) = \frac{8\pi}{15}.
        \end{aligned} \]</p>
        <p>Rotating the same region about the \(x\)-axis gave \(\tfrac{2\pi}{15}\) (Example 7.7); about \(y = 2\) the solid is different, and larger. The only thing that changed was where the radii were measured from — exactly the discipline the Caution insisted on. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Cross-sections without revolution</h3>

  <p>Definition 7.2 never mentions revolution. Any solid whose cross-sections we can describe is fair game — and for many classical solids the description is a matter of similar triangles.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.9</span></p>
      <div class="env-body">
        <p>Find the volume of a pyramid whose base is a square of side \(b\) and whose height is \(h\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Place the apex at the origin with the pyramid’s central axis along the \(x\)-axis, so the base sits in the plane \(x = h\). The cross-section at \(x\) is a square; write \(s(x)\) for its side. Slicing the pyramid through its axis exposes a triangle with apex at the origin, and for \(0 &lt; x \le h\) the cross-section’s half-width at distance \(x\) relates to the base’s half-width by similar triangles:</p>
        <p>\[ \frac{s(x)/2}{x} = \frac{b/2}{h}, \qquad\text{so}\qquad s(x) = \frac{b}{h}\,x. \]</p>
        <p>At the apex itself \(s(0) = 0\), which the same formula reports — so \(s(x) = \tfrac{b}{h}x\) holds across all of \([0, h]\). Hence \(A(x) = s(x)^{2} = \dfrac{b^{2}}{h^{2}}\,x^{2}\), continuous on \([0, h]\), and</p>
        <p>\[ V = \int_{0}^{h} \frac{b^{2}}{h^{2}}\,x^{2}\,dx = \frac{b^{2}}{h^{2}}\cdot\frac{h^{3}}{3} = \frac{1}{3}\,b^{2}h. \]</p>
        <p>This is the classical one-third rule for pyramids — and the integral shows where the mysterious \(\tfrac13\) comes from: it is \(\int_{0}^{1} u^{2}\,du\), the price of cross-sections that grow like the <em>square</em> of the distance from the apex. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-supporting — pyramid via the 2D through-axis fallback (pattern consult preference): half-widths s(x)/2 and b/2 against the central axis, face-on inset square; registered in chapter7 FIGS as "pyramid-similar"] -->
  <figure class="figure" data-fig="pyramid-similar">
    <figcaption><span class="fig-no">Figure 7.8</span> The pyramid sliced through its central axis: apex at the origin, base at \(x = h\). The exposed triangle carries the whole solution — the half-widths \(s(x)/2\) and \(b/2\) stand over \(x\) and \(h\) in the same ratio — and the inset shows the square cross-section of side \(s(x)\) face-on.</figcaption>
  </figure>

  <!-- expansion:summary — close §7.2: definition passed its tests (cylinder, sphere, pyramid); the skill is finding A(x); forward fence to shells WITHOUT mechanics -->
  <p>The section’s whole content is one definition and a habit. The definition: volume is the integral of cross-sectional area — the slicing schema with the strip’s gap promoted to a slab’s face. The habit: before integrating anything, describe the cross-section — disk, washer, or square — and let its geometry write the integrand. The definition repaid the trust we placed in it by reproducing the cylinder, the sphere, and the pyramid of classical geometry. But perpendicular slices are not always the natural cut: for some solids of revolution every washer requires solving for \(x\) in terms of \(y\), while a different decomposition — into thin cylindrical <em>shells</em> — falls out effortlessly. That method is the next section’s business.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.3</span>Volumes by Cylindrical Shells</h2>
  </header>

  <!-- expansion:intuition — section opener: the motivating failure (washers fight the region); slicing DIRECTION is a choice; instantiate the schema with the nested slice -->
  <p>Try to compute a volume with the last section’s tools and you will sometimes find the region fighting back. Rotate the region under \(y = 2x^{2} - x^{3}\), from \(x = 0\) to \(x = 2\), about the \(y\)-axis. Cross-sections perpendicular to the axis of rotation are washers, so we need the region described from the \(y\)-axis’s point of view: for each height \(y\), which \(x\)-values lie in the region? That means solving \(y = 2x^{2} - x^{3}\) for \(x\) — inverting a cubic, which has no pleasant answer. Yet the region itself could hardly be simpler: read <em>vertically</em>, it is just the strips under a graph. The lesson is that slicing is a <em>choice</em>, and the right choice is the one whose slices see the region simply. This section develops the other natural choice for solids of revolution: keep the vertical strip — the one that reads \(f\) directly — and let the rotation carry it <em>around</em> the axis. The strip sweeps out a thin-walled tube, a <em>cylindrical shell</em>, and the solid is built of nested shells the way a tree trunk is built of rings.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 (M2 coverage audit addition) tier-supporting — the motivating-failure region: horizontal strip fights the cubic, vertical strip reads f directly; registered in chapter7 FIGS as "shell-motivation"] -->
  <figure class="figure" data-fig="shell-motivation">
    <figcaption><span class="fig-no">Figure 7.9</span> The region under \(y = 2x^{2} - x^{3}\) resists perpendicular slicing: a horizontal strip’s two ends lie on the curve, so reading its radii means solving the cubic for \(x\). A vertical strip reads its height \(f(x)\) straight off the graph — the strip the shell method keeps.</figcaption>
  </figure>

  <h3 class="subsec-head">The shell method</h3>

  <p>Let \(f\) be continuous with \(f \ge 0\) on \([a, b]\), where \(0 \le a &lt; b\), and rotate the region under \(y = f(x)\) about the \(y\)-axis. Cut \([a, b]\) into \(n\) strips of width \(\Delta x\) as usual. The strip over \([x_{i-1}, x_i]\), swept around the axis, produces a shell whose inner wall has radius \(x_{i-1}\) and whose outer wall has radius \(x_i\). As in §7.2, the modelling step comes first, and in the open: we take the solid’s volume to be the limit of the volumes of these shell stacks as the strips shrink — the same commitment, made for the same reason, as the slab model of Definition 7.2, only with the slices now nested around the axis instead of stacked along it.</p>

  <p>What makes the shell decomposition so effective is a small algebraic accident. Approximate the shell over \([x_{i-1}, x_i]\) by an <em>annular cylinder</em> — constant height \(f(\bar x_i)\), where \(\bar x_i = \tfrac{1}{2}(x_{i-1} + x_i)\) is the strip’s midpoint. (The approximation is in the height: the solid’s actual wall follows the varying graph, while the cylinder’s wall is flat.) The annular cylinder’s volume we can compute exactly — outer cylinder minus inner hole — and the midpoint makes it collapse:</p>
  <p>\[ \pi x_i^{2}\,f(\bar x_i) - \pi x_{i-1}^{2}\,f(\bar x_i) = \pi\,(x_i + x_{i-1})(x_i - x_{i-1})\,f(\bar x_i) = 2\pi\,\bar x_i\,f(\bar x_i)\,\Delta x, \]</p>
  <p>since \(x_i + x_{i-1} = 2\bar x_i\) and \(x_i - x_{i-1} = \Delta x\). Radius times height times thickness, with a factor \(2\pi\): the shell’s worth is <em>circumference times height times thickness</em>, as if the shell had been slit open and unrolled into a flat slab of length \(2\pi \bar x_i\), height \(f(\bar x_i)\), and thickness \(\Delta x\).</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — strip→shell upright scene (y-axis vertical per the 2.5D pattern), radial arrow for x, Δx between walls, one nested shell dotted; registered in chapter7 FIGS as "strip-to-shell"] -->
  <figure class="figure" data-fig="strip-to-shell">
    <figcaption><span class="fig-no">Figure 7.10</span> The vertical strip at distance \(x\) from the axis, swept into a thin-walled cylindrical shell: radius \(x\) read <em>radially</em> from the axis, height \(f(x)\) read from the graph, thickness \(\Delta x\) between the walls. A shallower shell sits dotted inside — the solid is built of nested tubes, not stacked slices.</figcaption>
  </figure>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — the unrolled shell slab, 2πx̄ᵢ × f(x̄ᵢ) × Δx; as-if register, exactness stays with the midpoint identity display; registered in chapter7 FIGS as "shell-unrolled"] -->
  <figure class="figure" data-fig="shell-unrolled">
    <figcaption><span class="fig-no">Figure 7.11</span> The shell slit open and unrolled, <em>as if</em> its curved wall lay flat: a slab of length \(2\pi\,\bar x_i\) (the circumference), height \(f(\bar x_i)\), and thickness \(\Delta x\). The picture explains where the \(2\pi\) comes from; the exact statement is the midpoint identity displayed above, not the flattening itself.</figcaption>
  </figure>

  <p>Summing the stack gives \(\sum_{i=1}^{n} 2\pi\,\bar x_i\,f(\bar x_i)\,\Delta x\) — and this is precisely a Riemann sum for the function \(2\pi x\,f(x)\), sampled at the midpoints. Definition 6.2 permits <em>any</em> choice of sample point, midpoints included; and since \(2\pi x f(x)\) is continuous on \([a, b]\), Theorem 6.1 guarantees the sums converge to its integral, no matter how the strips shrink. The shell stacks therefore have a limit, and the model hands that limit to the solid:</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">7.1</span><span class="env-name">The shell method</span></p>
    <div class="env-body">
      <p>Let \(f\) be continuous with \(f(x) \ge 0\) on \([a, b]\), where \(0 \le a &lt; b\). The solid obtained by rotating the region under \(y = f(x)\), \(a \le x \le b\), about the \(y\)-axis has volume</p>
      <p>\[ V = \int_{a}^{b} 2\pi x\,f(x)\,dx. \]</p>
    </div>
  </section>

  <!-- expansion:caution — the radius-direction trap: shell radius is the distance to the ROTATION axis (horizontal, for the y-axis), even though the strip itself is vertical; the mirror image of §7.2's caution -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>A shell’s radius is the distance from the strip to the <em>axis of rotation</em> — for rotation about the \(y\)-axis, that is the horizontal coordinate \(x\), even though the strip itself stands vertically. The height, meanwhile, is read from the graph as usual. Keep the two roles separate: radius says how far around the strip travels, height says how tall it is.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.10</span></p>
      <div class="env-body">
        <p>Find the volume of the solid obtained by rotating the region under \(y = 2x^{2} - x^{3}\), from \(x = 0\) to \(x = 2\), about the \(y\)-axis.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>This is the section’s opening problem. First check the theorem’s hypotheses: \(2x^{2} - x^{3} = x^{2}(2 - x)\) is continuous and non-negative on \([0, 2]\) (it vanishes at both ends and is positive between), and the interval sits in \(x \ge 0\). The shell at position \(x\) has radius \(x\) and height \(2x^{2} - x^{3}\), so Theorem 7.1 gives</p>
        <p>\[ \begin{aligned}
          V &= \int_{0}^{2} 2\pi x\,\bigl(2x^{2} - x^{3}\bigr)\,dx = 2\pi \int_{0}^{2} \bigl(2x^{3} - x^{4}\bigr)\,dx \\[2pt]
            &= 2\pi \left[\frac{x^{4}}{2} - \frac{x^{5}}{5}\right]_{0}^{2} = 2\pi\left(8 - \frac{32}{5}\right) = \frac{16\pi}{5}.
        \end{aligned} \]</p>
        <p>The cubic never had to be inverted: the shell integral reads \(f\) exactly as the region presents it. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <p>When the rotated region lies between <em>two</em> graphs, the shell’s height is the gap between them — §7.1’s integrand returning in a new role. The solid is the difference of two under-a-graph solids, so by the linearity of the integral (Theorem 6.2) their shell integrals subtract, and the height \(f(x) - g(x)\) rides in place of \(f(x)\).</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.11</span></p>
      <div class="env-body">
        <p>Find the volume of the solid obtained by rotating the region enclosed by \(y = x\) and \(y = x^{2}\) about the \(y\)-axis.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The region is the one from Example 7.7: between \(x = 0\) and \(x = 1\), with \(y = x\) above and \(y = x^{2}\) below. The shell at position \(x\) has radius \(x\) and height \(x - x^{2}\), so</p>
        <p>\[ V = 2\pi \int_{0}^{1} x\,\bigl(x - x^{2}\bigr)\,dx = 2\pi \int_{0}^{1} \bigl(x^{2} - x^{3}\bigr)\,dx = 2\pi\left(\frac{1}{3} - \frac{1}{4}\right) = \frac{\pi}{6}. \]</p>
        <p>Note what changed from Example 7.7 and what did not. The region is the same, but the axis is different — there we rotated about the \(x\)-axis and sliced into washers; here the \(y\)-axis makes shells natural. Different axis, different solid, different volume. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Washer or shell?</h3>

  <p>Both methods compute volumes of revolution; the craft is in choosing. The washer slices <em>perpendicular</em> to the axis of rotation and asks for the region’s boundaries as seen from that axis; the shell slices <em>parallel</em> to the axis and asks for them as the region naturally presents them. One question settles it: which strip has its length written directly in the given functions?</p>

  <!-- expansion:strategy — distill the method choice; the section's portable decision ritual -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">7.2</span><span class="env-name">Washer or shell?</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><em>Draw both strips.</em> Sketch the region with one strip perpendicular to the axis of rotation (a washer slice) and one parallel to it (a shell slice).</li>
        <li><em>Pick the strip that reads the boundaries directly.</em> If a strip’s ends would require solving \(y = f(x)\) for \(x\) (or vice versa), the other strip is usually the better choice.</li>
        <li><em>Assemble the integrand.</em> Washer: \(\pi\bigl(R^{2} - r^{2}\bigr)\), radii measured from the axis to the far and near boundaries. Shell: \(2\pi\,(\text{radius})(\text{height})\), radius from the axis to the strip, height the boundary gap.</li>
        <li><em>Shifted axis.</em> If the axis of rotation is a line \(x = c\) rather than a coordinate axis, nothing changes except that every radius becomes a distance to that line, \(\lvert x - c\rvert\) — with the region kept entirely on one side of the axis.</li>
      </ol>
    </div>
  </section>

  <p>The two methods had better agree when both apply. The next example runs one solid through both computations.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.12</span></p>
      <div class="env-body">
        <p>The region under \(y = x^{2}\), from \(x = 0\) to \(x = 1\), is rotated about the \(y\)-axis. Find the volume of the resulting solid twice: once by shells, once by washers.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p><em>Shells.</em> The shell at position \(x\) has radius \(x\) and height \(x^{2}\):</p>
        <p>\[ V = 2\pi \int_{0}^{1} x\cdot x^{2}\,dx = 2\pi\cdot\frac{1}{4} = \frac{\pi}{2}. \]</p>
        <p><em>Washers.</em> Slice horizontally at height \(y\), with \(0 \le y \le 1\). The region at that height runs from the parabola out to the line \(x = 1\); since \(x^{2}\) is increasing on \([0, 1]\), solving \(y = x^{2}\) for the boundary honestly gives \(x = \sqrt{y}\) — the sideways description of §7.1. Rotated, the slice is a washer with outer radius \(R = 1\) and inner radius \(r = \sqrt{y}\):</p>
        <p>\[ V = \int_{0}^{1} \pi\bigl(1^{2} - (\sqrt{y})^{2}\bigr)\,dy = \pi \int_{0}^{1} (1 - y)\,dy = \pi\left(1 - \frac{1}{2}\right) = \frac{\pi}{2}. \]</p>
        <p>The two computations slice the same solid in perpendicular directions and meet at the same number, \(\tfrac{\pi}{2}\) — as they must if both models measure the one volume. That this agreement holds in general, for every solid both methods reach, is a fact we are not yet equipped to prove economically; the tools arrive with integration by parts in Chapter 8 and change of variables in Chapter 15. For now, each such pair of computations is its own check. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-supporting — Ex 7.12's solid twice, same base geometry, washer overlay vs shell overlay; no numeric answer printed; registered in chapter7 FIGS as "washer-vs-shell"] -->
  <figure class="figure" data-fig="washer-vs-shell">
    <figcaption><span class="fig-no">Figure 7.12</span> One solid, two slicings — the solid of Example 7.12, a cylinder with a paraboloid bowl carved from its top. A horizontal slice at height \(y\) is a washer from \(\sqrt{y}\) out to \(1\); a vertical slice at radius \(x\) is a shell of height \(x^{2}\). Both decompositions must — and do — measure the same volume.</figcaption>
  </figure>

  <!-- expansion:summary — close §7.3: the choice ritual + the modeling honesty; forward to §7.4 where the schema leaves geometry; no §7.4 mechanics -->
  <p>The section’s addition to the toolkit is not a new integral but a new freedom: the direction of slicing is ours to choose, and Strategy 7.2 turns that choice into a two-line ritual. Underneath, the honesty is the same as ever — a modelling commitment stated once (solids are measured by their shell stacks), an exact computation for each approximating piece, and Chapter 6’s convergence machinery to close the limit. So far the schema has measured geometry: areas, and now volumes three ways. The next section takes it somewhere new — to a quantity from physics that accumulates along a motion rather than across a region — and the slicing will, for the first time, have to decide <em>what</em> to slice.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.4</span>Work</h2>
  </header>

  <!-- expansion:intuition — section opener: the schema leaves geometry; the collision is that force × distance is meaningless the moment force varies; the spring's last centimetre -->
  <p>So far the slicing schema has measured geometry — areas and volumes. This section takes it somewhere new: to <em>work</em>, the physicist’s measure of the effort a force expends in moving something. When a constant force pushes an object through a distance, the work done is simply force times distance. But most forces of interest are not constant. Stretching a spring, you feel the resistance grow: the final centimetre costs more effort than the first, so no single product \(\text{force} \times \text{distance}\) can price the whole stretch. The remedy is the one this chapter keeps applying. Over a <em>thin slice</em> of the motion the force barely changes, the product is honest again, and summing the slices builds an integral.</p>

  <p>We adopt the physics as our modelling input, the way §7.2 adopted the cylinder. When a constant force of magnitude \(F\) moves an object through a distance \(d\) along the force’s own direction, the <em>work done</em> is \(W = Fd\). In SI units force is measured in newtons (N) and distance in metres, so work carries the unit newton-metre, called the <em>joule</em> (J). (Imperial texts measure the same quantity in foot-pounds; we will stay with SI.) When the force varies along the line of motion — say the object moves along the \(x\)-axis from \(a\) to \(b\), pushed by a force whose component along the motion at position \(x\) is \(F(x)\) — we slice \([a, b]\) into strips of width \(\Delta x\), price each strip at \(F(x_i^{*})\,\Delta x\), and pass to the limit. The sums are Riemann sums of \(F\), so for continuous \(F\) Theorem 6.1 supplies the limit, and we take it as the definition.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.3</span><span class="env-name">Work</span></p>
    <div class="env-body">
      <p>Suppose an object moves along the \(x\)-axis from \(x = a\) to \(x = b\), acted on by a force whose component along the direction of motion is \(F(x)\) at position \(x\), with \(F\) continuous on \([a, b]\). The <em>work</em> done by the force is</p>
      <p>\[ W = \int_{a}^{b} F(x)\,dx. \]</p>
    </div>
  </section>

  <p>Read as in §6.4: work is the net change accumulated from its rate, and force is the rate at which work accrues per metre of progress. A force opposing the motion has negative component and contributes negative work — the sign convention comes free with the word <em>component</em>.</p>

  <h3 class="subsec-head">Springs</h3>

  <!-- expansion:application [source: Stewart ET 9e §6.4 / standard physics — Hooke's law as empirical model; applied vs restoring force distinction per ③ advisory] -->
  <p>The classic varying force is a spring’s. <em>Hooke’s law</em> — an empirical model, accurate for stretches that are not too large — says that the force required to hold a spring stretched \(x\) units beyond its natural length is proportional to \(x\):</p>
  <p>\[ F(x) = kx, \]</p>
  <p>where \(k\), the <em>spring constant</em>, measures the spring’s stiffness in newtons per metre. Two readings of the same law are worth separating: \(kx\) is the force <em>we</em> apply to hold the stretch, while the spring itself pulls back with the opposite force \(-kx\). Computing \(\int F\,dx\) with \(F = kx\) therefore prices the work done <em>against</em> the spring — the effort of stretching it.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — F = kx force–displacement graph, work = area under the line, one representative strip (Def 7.3's Riemann reading folded in); registered in chapter7 FIGS as "spring-force-area"] -->
  <figure class="figure" data-fig="spring-force-area">
    <figcaption><span class="fig-no">Figure 7.13</span> Hooke’s law drawn: the applied force \(F = kx\) against the stretch \(x\) beyond natural length. The work of stretching from \(a\) to \(b\) is the shaded area under the force line, accumulated strip by strip — and the strips grow taller toward \(b\), which is why the last centimetre costs the most.</figcaption>
  </figure>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.13</span></p>
      <div class="env-body">
        <p>A force of \(30\) N is required to hold a spring stretched \(0.1\) m beyond its natural length. How much work is done in stretching it from \(0.1\) m to \(0.2\) m beyond its natural length?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Here the slice is a slice of <em>displacement</em>: the moving end of the spring advances from \(x = 0.1\) to \(x = 0.2\), and the force varies as it goes. First pin down the model. Hooke’s law with the given data reads \(30 = k\,(0.1)\), so \(k = 300\) N/m and \(F(x) = 300x\). Then</p>
        <p>\[ W = \int_{0.1}^{0.2} 300x\,dx = 150\bigl[x^{2}\bigr]_{0.1}^{0.2} = 150\,(0.04 - 0.01) = 4.5 \text{ J}. \]</p>
        <p>For comparison, the first \(0.1\) m of stretch, from the natural length, costs only \(150\,(0.01) = 1.5\) J — the same distance at a third of the price. The force grows with the stretch, and the work grows faster than the distance. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Lifting and pumping</h3>

  <p>In the spring problem one object moved and the force on it varied. The next two problems are built differently: a cable, or a tankful of water, is an extended body whose parts each move a <em>different</em> distance. As with the spring, what we compute is work done <em>against</em> a resisting force — here gravity. To raise a slice steadily, the winch or pump applies an upward force whose magnitude equals the slice’s weight, and it is <em>that</em> applied force, pointing along the upward motion, whose work the integrals below price: (the slice’s weight) \(\times\) (the distance <em>it</em> rises). (Gravity itself pulls against the motion and therefore does negative work; overcoming it is what makes lifting require effort.) The force required on any one slice stays constant as it rises; what varies from slice to slice is the journey. So the slicing must follow the structure: slice the <em>material itself</em>, and price each slice’s lift. Deciding what to slice is the whole game, and it is the first sentence of each solution below.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.14</span></p>
      <div class="env-body">
        <p>A \(20\) m cable weighing \(2\) N per metre hangs straight down from a winch. How much work does the winch do in winding the whole cable up to the top?</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Slice the <em>cable</em>. Measure \(x\) downward from the winch, and consider the slice of cable between depths \(x\) and \(x + \Delta x\). Its weight is (weight density) \(\times\) (length) \(= 2\,\Delta x\) newtons — the given \(2\) N/m is already a weight per metre, so no conversion from mass is needed — and to reach the winch this slice must rise the distance \(x\) from its starting depth. Hauling it up steadily, the winch applies an upward force of that same magnitude, \(2\,\Delta x\) newtons, through the distance \(x\), contributing \(2x\,\Delta x\) joules of work against gravity; and the whole cable costs</p>
        <p>\[ W = \int_{0}^{20} 2x\,dx = \bigl[x^{2}\bigr]_{0}^{20} = 400 \text{ J}. \]</p>
        <p>The top of the cable rises almost no distance and contributes almost nothing; the bottom metre rises nearly the full \(20\) m and is the expensive part. The integral prices each slice by its own journey. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-supporting — one cable slice at depth x with its own lift arrow; pairs with the tank figure to show the coordinate direction is a choice; registered in chapter7 FIGS as "cable-slice"] -->
  <figure class="figure" data-fig="cable-slice">
    <figcaption><span class="fig-no">Figure 7.14</span> One slice of the hanging cable, at depth \(x\) below the winch. The winch carries its weight through the distance \(x\) that this slice alone must rise: slices near the bottom travel farthest and cost the most.</figcaption>
  </figure>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.15</span></p>
      <div class="env-body">
        <p>A tank has the shape of an inverted circular cone (vertex at the bottom) of height \(4\) m and top radius \(2\) m. It is filled with water to a depth of \(3\) m. Find the work required to pump all the water out over the top rim. (Water weighs \(\rho g \approx 9800\) N per cubic metre: density \(\rho = 1000\) kg/m³ times \(g = 9.8\) m/s².)</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Slice the <em>water</em>, horizontally — each horizontal sheet of water rises as one piece, while sheets at different depths rise different amounts. Fix the coordinate first: let \(y\) run <em>upward from the vertex</em>, so the tank occupies \(0 \le y \le 4\), the rim sits at \(y = 4\), and the water fills \(0 \le y \le 3\).</p>
        <p>The slab of water at height \(y\), of thickness \(\Delta y\), is a disk. Its radius \(r(y)\) comes from similar triangles in the cone’s side view, exactly as in Example 7.9: \(r(y)/2 = y/4\), so \(r(y) = y/2\). The slab’s volume is \(\pi\,(y/2)^{2}\,\Delta y = \tfrac{\pi}{4}y^{2}\,\Delta y\) cubic metres, so its weight is \(9800\cdot\tfrac{\pi}{4}y^{2}\,\Delta y\) newtons; raising it steadily to the rim takes an upward force of that magnitude acting from height \(y\) to height \(4\), through the lift distance \(4 - y\) metres. Summing the slabs’ work against gravity and refining,</p>
        <p>\[ \begin{aligned}
          W &= \int_{0}^{3} 9800\cdot\frac{\pi}{4}\,y^{2}\,(4 - y)\,dy = 2450\pi \int_{0}^{3} \bigl(4y^{2} - y^{3}\bigr)\,dy \\[2pt]
            &= 2450\pi \left[\frac{4y^{3}}{3} - \frac{y^{4}}{4}\right]_{0}^{3} \\[2pt]
            &= 2450\pi\left(36 - \frac{81}{4}\right) = 2450\pi\cdot\frac{63}{4} \approx 1.2 \times 10^{5} \text{ J}.
        \end{aligned} \]</p>
        <p>Every factor in the integrand earned its place from the slicing: \(\tfrac{\pi}{4}y^{2}\) is the slab’s cross-section (§7.2’s machinery on loan), \(9800\) converts volume to weight, and \(4 - y\) is that slab’s own lift. Note the two different numbers \(3\) and \(4\): the water surface bounds the <em>integral</em>, while the rim height enters the <em>distance</em>. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — conical tank side view: slab at height y (strictly inside 0<y<3), radius y/2, lift 4−y; the 3-vs-4 distinction visible; registered in chapter7 FIGS as "tank-pump"] -->
  <figure class="figure" data-fig="tank-pump">
    <figcaption><span class="fig-no">Figure 7.15</span> The conical tank in side view: vertex at height \(0\), rim at \(4\), water to depth \(3\). The slab at height \(y\) has radius \(y/2\) by similar triangles and rises \(4 - y\) to the rim — the water surface bounds the integral at \(3\), while the rim height \(4\) enters each slab’s distance.</figcaption>
  </figure>

  <!-- expansion:caution — the template trap: spring slices displacement (force varies, distance is dx); cable/tank slice the material (force per slice constant, distance varies); memorizing one template misprices the other -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The three examples hide two different slicings. The spring slices the <em>displacement</em>: one object moves, the applied force on it varies, and \(dx\) is a bit of distance. The cable and the tank slice the <em>material</em>: the force required on each slice is constant (matching its weight), and what varies is the distance that slice travels. Memorizing a single template — “weight times height” or “force times \(dx\)” — will misprice one of the two. Name what is being sliced first; the integrand then assembles itself.</p>
    </div>
  </section>

  <!-- expansion:strategy — distill the section's setup ritual; the units line is the built-in error detector -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">7.3</span><span class="env-name">Setting up a work integral</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><em>Name the slice.</em> Decide what is being cut into thin pieces: the displacement (a varying force on one moving object) or the material itself (each piece moving its own distance).</li>
        <li><em>Price one slice.</em> Write the force on the slice and the distance that slice moves, with units attached to each factor.</li>
        <li><em>Assemble the contribution.</em> The slice’s work is (force) \(\times\) (distance); check that its units come to newton-metres — joules.</li>
        <li><em>Integrate over the slices.</em> The limits of integration describe where the slices <em>are</em> (the stretch traversed, the cable’s depths, the water’s heights) — not necessarily where they end up.</li>
      </ol>
    </div>
  </section>

  <!-- expansion:summary — close §7.4: the schema priced motion; the slice-naming skill; forward to §7.5 (averages) with no mechanics -->
  <p>The schema has now left geometry and priced a motion. Nothing in the machinery changed — the sums were Riemann sums as ever, and Theorem 6.1 closed each limit — but for the first time the slicing had to make a decision about <em>what</em> to slice, and Strategy 7.3 begins there. The next section asks the integral a different kind of question. Instead of accumulating a total — an area, a volume, a number of joules — it will distil a single representative number from a continuously varying function: its average.</p>

</article>
