<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.5</span>Average Value of a Function</h2>
  </header>

  <!-- expansion:intuition — section opener: the collision is that "add them up and divide" has no n for a continuum; sampling settles toward a limit; the integral IS the sum, the width IS the count -->
  <p>The average of finitely many numbers is a familiar recipe: add them, divide by how many there are. Now ask for the average temperature over a day. Temperature varies continuously — there are not finitely many values to add, and no “how many” to divide by. The natural move is to sample: read the thermometer at \(n\) evenly spaced moments and average the readings. Different sampling rates give slightly different answers, but as the sampling grows finer the answers settle toward a single number, and that settling is by now a familiar sight. Write it out. If we sample \(f\) at the points \(x_1, \dots, x_n\) of a regular partition of \([a, b]\), with spacing \(\Delta x = \tfrac{b-a}{n}\), the sampled mean is</p>
  <p>\[ \frac{f(x_1) + \dots + f(x_n)}{n} = \frac{1}{b - a}\sum_{i=1}^{n} f(x_i)\,\Delta x, \]</p>
  <p>since \(\tfrac{1}{n} = \tfrac{\Delta x}{b-a}\). The sampled mean <em>is</em> a Riemann sum, scaled by the interval’s width — so for continuous \(f\), Theorem 6.1 says the means converge, and their limit is an integral. The integral plays the role of “the sum of all the values”, and the width \(b - a\) plays the role of “how many”.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.4</span><span class="env-name">Average value of a function</span></p>
    <div class="env-body">
      <p>Let \(f\) be continuous on \([a, b]\) with \(a &lt; b\). The <em>average value</em> of \(f\) on \([a, b]\) is</p>
      <p>\[ f_{\text{ave}} = \frac{1}{b - a} \int_{a}^{b} f(x)\,dx. \]</p>
    </div>
  </section>

  <p>The geometry behind the formula is worth keeping in view. Rewrite it as \(f_{\text{ave}}\,(b - a) = \int_{a}^{b} f(x)\,dx\): the rectangle over \([a, b]\) with height \(f_{\text{ave}}\) has the same (signed) area as the region under \(f\). The average is the <em>levelling height</em> — pour the region under the graph into a rectangular mould on the same base, and \(f_{\text{ave}}\) is where the surface comes to rest.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — the levelling rectangle: Def 7.4 and Thm 7.2 in one figure; deficit/surplus in contrasting tones, equal areas; crossings at ±1; registered in chapter7 FIGS as "levelling-rectangle"] -->
  <figure class="figure" data-fig="levelling-rectangle">
    <figcaption><span class="fig-no">Figure 7.16</span> Levelling the region under \(y = 1 + x^{2}\) on \([-1, 2]\): the rectangle of height \(f_{\text{ave}}\) holds the same area as the region under the curve — the deficit above the curve on \([-1, 1]\) exactly balances the surplus above the lid on \([1, 2]\), so the levelling rectangle and the region hold the same area.</figcaption>
  </figure>

  <!-- expansion:application [pass: enrichment] [source: M4 Mode C gap-check 2026-07-18; §7.5 sole broken §6.4 loop — average value = average velocity; canon Stewart ET 9e §6.5 standard reading] -->
  <p>One everyday average is already an instance of this. Let \(f = v\) be the velocity of an object moving along a line; then its average value over \([a, b]\) is</p>
  <p>\[ v_{\text{ave}} = \frac{1}{b - a}\int_{a}^{b} v(t)\,dt = \frac{s(b) - s(a)}{b - a}, \]</p>
  <p>since the integral of velocity is the net change in position \(s\) — the Net Change Theorem of §6.4. That last ratio is total displacement over elapsed time: the <em>average velocity</em> of elementary kinematics. The levelling-height rectangle is that familiar average, read now for any continuously varying quantity.</p>

  <!-- expansion:caution — the interval-dependence trap: "the average of f" is meaningless until an interval is named; pairs with Ex 7.17 -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The average value belongs to the <em>pair</em> — a function and an interval — not to the function alone. “The average of \(x^{2}\)” means nothing until the interval is named, and the same function averages differently over different stretches, as the next two examples show side by side.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.16</span></p>
      <div class="env-body">
        <p>Find the average value of \(f(x) = 1 + x^{2}\) on the interval \([-1, 2]\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Here \(a = -1\) and \(b = 2\), so \(b - a = 3\) and</p>
        <p>\[ \begin{aligned}
          f_{\text{ave}} &= \frac{1}{3} \int_{-1}^{2} \bigl(1 + x^{2}\bigr)\,dx = \frac{1}{3}\left[x + \frac{x^{3}}{3}\right]_{-1}^{2} \\[2pt]
            &= \frac{1}{3}\left(\left(2 + \frac{8}{3}\right) - \left(-1 - \frac{1}{3}\right)\right) = \frac{1}{3}\cdot 6 = 2.
        \end{aligned} \]</p>
        <p>The values of \(f\) on \([-1, 2]\) run from \(1\) up to \(5\), and their levelling height is \(2\) — closer to the low end, because the function spends most of the interval below its peak. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.17</span></p>
      <div class="env-body">
        <p>Find the average value of the same function, \(f(x) = 1 + x^{2}\), on the interval \([0, 1]\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Now \(b - a = 1\), and</p>
        <p>\[ f_{\text{ave}} = \int_{0}^{1} \bigl(1 + x^{2}\bigr)\,dx = \left[x + \frac{x^{3}}{3}\right]_{0}^{1} = \frac{4}{3}. \]</p>
        <p>Same function, different interval, different average: on \([0, 1]\) the function never rises above \(2\), and its levelling height drops to \(\tfrac{4}{3}\). The average is a property of \(f\) <em>together with</em> the interval — precisely the caution above. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">The Mean Value Theorem for Integrals</h3>

  <p>In Example 7.16 the average was \(2\), and the function actually <em>takes</em> the value \(2\) — at \(x = \pm 1\), where the curve crosses the top of its levelling rectangle. Is that a coincidence? For a finite list it can easily fail: the average of the two numbers \(1\) and \(3\) is \(2\), which is neither of them. A continuous function has no such escape. Its values form an unbroken range, and the average — trapped between the smallest and largest values — must itself be a value the function passes through. That is the content of the next theorem, and the machinery to prove it is exactly the pair of existence theorems Chapter 4 established for continuous functions on closed intervals.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">7.2</span><span class="env-name">Mean Value Theorem for Integrals</span></p>
    <div class="env-body">
      <p>Let \(f\) be continuous on \([a, b]\) with \(a &lt; b\). Then there is a point \(c\) in \([a, b]\) at which \(f\) takes its average value:</p>
      <p>\[ f(c) = f_{\text{ave}} = \frac{1}{b - a}\int_{a}^{b} f(x)\,dx. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>By the Extreme Value Theorem (Theorem 4.9(a)), \(f\) attains a minimum value \(m = f(x_m)\) and a maximum value \(M = f(x_M)\) at some points \(x_m, x_M\) of \([a, b]\). Since \(m \le f(x) \le M\) on \([a, b]\), the comparison property of the integral (Theorem 6.2, part 4) gives</p>
      <p>\[ m\,(b - a) \le \int_{a}^{b} f(x)\,dx \le M\,(b - a), \]</p>
      <p>and dividing by the positive number \(b - a\) traps the average: \(m \le f_{\text{ave}} \le M\).</p>
      <p>If \(m = M\), the trap is already closed: \(f\) is constant on \([a, b]\), every value equals \(f_{\text{ave}}\), and any \(c\) in \([a, b]\) serves.</p>
      <p>If \(m &lt; M\), let \(\alpha\) be the smaller of \(x_m, x_M\) and \(\beta\) the larger. Then \([\alpha, \beta]\) is a genuine subinterval of \([a, b]\) whose endpoints carry the values \(m\) and \(M\) in one order or the other. Passing to this subinterval is what makes the next step work: the Intermediate Value Theorem needs an interval across which \(f\) runs from \(m\) to \(M\), and the endpoints \(a, b\) need not take those extreme values, whereas \(\alpha, \beta\) do. Since \(f\) is continuous on \([\alpha, \beta]\) and \(f_{\text{ave}}\) lies between its endpoint values, the Intermediate Value Theorem (Theorem 4.9(b)) supplies a point \(c\) in \([\alpha, \beta]\) — hence in \([a, b]\) — with \(f(c) = f_{\text{ave}}\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:formula — the one-line FTC route, per ③ D2: name it, don't run it -->
  <p>There is a second road to the same theorem, worth naming though not travelling: apply the Mean Value Theorem for derivatives (Theorem 4.12) to the accumulation function \(\int_{a}^{x} f(t)\,dt\), whose derivative is \(f\) by the Fundamental Theorem (Theorem 6.3) — the two mean value theorems are the same fact wearing different clothes.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.18</span></p>
      <div class="env-body">
        <p>For \(f(x) = 1 + x^{2}\) on \([-1, 2]\), find every point \(c\) whose existence Theorem 7.2 guarantees.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Example 7.16 computed \(f_{\text{ave}} = 2\). We solve \(f(c) = 2\):</p>
        <p>\[ 1 + c^{2} = 2 \quad\Longleftrightarrow\quad c^{2} = 1 \quad\Longleftrightarrow\quad c = \pm 1, \]</p>
        <p>and both candidates lie in \([-1, 2]\). The theorem promises <em>at least one</em> such point and says nothing about uniqueness — here there are two, one at the interval’s left endpoint and one interior. Geometrically, they are the two crossings between the curve and the top of its levelling rectangle: the rectangle’s lid cuts the graph wherever the function passes through its own average. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close §7.5: what was minted and why it matters ahead; forward to §7.6 with no mechanics -->
  <p>This section added one definition and one theorem, both small and both permanent. The average value \(\tfrac{1}{b-a}\int_a^b f\) is the honest limit of sampled means, and the Mean Value Theorem for Integrals says a continuous function must pass through its own average — the first payoff in this book from owning proved versions of the Extreme and Intermediate Value Theorems. Both results return when integration moves to higher dimensions, where regions replace intervals and the same questions arise again. The remaining two sections return the chapter to geometry, with the subtlest slicing yet: measuring the <em>length</em> of a curve, where the slices are not rectangles at all.</p>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.6</span>Arc Length</h2>
  </header>

  <!-- expansion:intuition — section opener: length has no formula until we make one; chords under-measure but hug; the first non-rectangle slice of the chapter -->
  <p>What is the <em>length</em> of a curve? For segments of straight lines the distance formula answers at once; for anything curved, it is worth admitting that we have no formula at all — not a poor one, none. Physically the answer seems clear: lay a string along the curve, pull it straight, measure it. The mathematical translation of the string is the chapter’s schema with a new kind of slice. Mark points along the curve and join them by <em>chords</em>: the resulting polygonal path can be measured exactly, one distance formula per chord. The polygon cuts corners, so it under-measures every arc it spans — but as the marked points crowd together, the chords hug the curve ever more closely. For the first time this chapter, the slice is not a rectangle: it is a small straight segment standing in for a small piece of bend.</p>

  <p>Make it precise for the graph of a function. Let \(f\) be continuous on \([a, b]\) with \(a &lt; b\), and divide \([a, b]\) by the usual regular partition \(x_0 = a, x_1, \dots, x_n = b\) with spacing \(\Delta x\). The partition marks the points \(P_i = \bigl(x_i, f(x_i)\bigr)\) on the curve, and the inscribed polygon \(P_0 P_1 \cdots P_n\) has length \(\sum_{i=1}^{n} \lvert P_{i-1}P_i\rvert\) — a number we can compute for every \(n\). Refining, we define:</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.5</span><span class="env-name">Arc length</span></p>
    <div class="env-body">
      <p>Let \(f\) be continuous on \([a, b]\), \(a &lt; b\), and let \(P_i = \bigl(x_i, f(x_i)\bigr)\) be the points of the graph over the regular partition of \([a, b]\) into \(n\) pieces. The <em>arc length</em> of the graph of \(f\) from \(P_0\) to \(P_n\) is</p>
      <p>\[ L = \lim_{n \to \infty} \sum_{i=1}^{n} \bigl\lvert P_{i-1}P_i \bigr\rvert, \]</p>
      <p>provided this limit exists as a finite number.</p>
    </div>
  </section>

  <p>Two housekeeping notes. Length is a size, not a signed quantity: no orientation convention accompanies it, and a degenerate “curve” over a single point has length \(0\). And the definition makes the same kind of genuine commitment as Definition 7.2 and the forthcoming Definition 7.6. It declares the polygon limit to be what length <em>means</em> for a graph, with the clause “provided the limit exists” carrying the honesty.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — inscribed polygon, 4 then 8 chords (old nodes kept), regular x-spacing so chord lengths differ, single-bend window; registered in chapter7 FIGS as "polygon-refinement"] -->
  <figure class="figure" data-fig="polygon-refinement">
    <figcaption><span class="fig-no">Figure 7.17</span> Inscribed polygons hugging the curve. With the same horizontal spacing, chords come out long where the curve is steep and short where it is flat; doubling \(n\) keeps the old corners and visibly tightens the fit. The polygon under-measures every arc it cuts.</figcaption>
  </figure>

  <h3 class="subsec-head">The arc length formula</h3>

  <p>When does the limit exist, and what is it? Each chord’s length is governed by how steeply the graph climbs across its strip, so the natural hypothesis is control over the <em>slope</em>. We say \(f\) is <em>smooth on \([a, b]\)</em> — in the standard notation, \(f \in C^{1}([a, b])\) — if \(f\) is differentiable on \([a, b]\) and its derivative \(f'\) is continuous there, the derivatives at the two endpoints being the one-sided ones. Smoothness is exactly the currency the next theorem trades in: it will hand each chord to the Mean Value Theorem and then hand the resulting sum to Chapter 6.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">7.3</span><span class="env-name">Arc Length Formula</span></p>
    <div class="env-body">
      <p>Let \(f\) be smooth on \([a, b]\), \(a &lt; b\). Then the arc length of the graph of \(f\) over \([a, b]\) exists, and</p>
      <p>\[ L = \int_{a}^{b} \sqrt{1 + \bigl[f'(x)\bigr]^{2}}\,dx. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Write \(\Delta y_i = f(x_i) - f(x_{i-1})\) for the rise across the \(i\)-th strip. By the distance formula, the \(i\)-th chord has length</p>
      <p>\[ \bigl\lvert P_{i-1}P_i \bigr\rvert = \sqrt{(\Delta x)^{2} + (\Delta y_i)^{2}}. \]</p>
      <p>The blanket hypothesis pays out locally: since \(f'\) exists on all of \([a, b]\), the function \(f\) is continuous on each closed strip \([x_{i-1}, x_i]\) and differentiable on its interior, which is precisely what the Mean Value Theorem (Theorem 4.12) requires there. It supplies a point \(x_i^{*}\) in \((x_{i-1}, x_i)\) with</p>
      <p>\[ \Delta y_i = f'(x_i^{*})\,\Delta x. \]</p>
      <p>Substituting and pulling the positive factor \(\Delta x\) out of the square root,</p>
      <p>\[ \bigl\lvert P_{i-1}P_i \bigr\rvert = \sqrt{(\Delta x)^{2} + \bigl[f'(x_i^{*})\bigr]^{2}(\Delta x)^{2}} = \sqrt{1 + \bigl[f'(x_i^{*})\bigr]^{2}}\;\Delta x, \]</p>
      <p>so the whole polygon has length</p>
      <p>\[ \sum_{i=1}^{n} \bigl\lvert P_{i-1}P_i \bigr\rvert = \sum_{i=1}^{n} \sqrt{1 + \bigl[f'(x_i^{*})\bigr]^{2}}\;\Delta x. \]</p>
      <p>This is a Riemann sum for the function \(g(x) = \sqrt{1 + [f'(x)]^{2}}\) — with sample points we did not choose ourselves but received from the Mean Value Theorem. That is where the second half of the hypothesis earns its keep: \(f'\) is continuous on \([a, b]\), so \(g\) is continuous there, and Theorem 6.1 guarantees that the Riemann sums of \(g\) converge to \(\int_{a}^{b} g(x)\,dx\) for <em>every</em> choice of sample points (Definition 6.2) — the Mean Value Theorem’s choices included. The polygon lengths therefore converge, and their limit is the integral claimed. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-strong — one proof strip: chord over Δx/Δy_i legs + MVT tangent parallel to the chord (echoes Ch4's MVT figure); registered in chapter7 FIGS as "mvt-chord-strip"] -->
  <figure class="figure" data-fig="mvt-chord-strip">
    <figcaption><span class="fig-no">Figure 7.18</span> One strip of the proof of Theorem 7.3. The chord is the hypotenuse over the legs \(\Delta x\) and \(\Delta y_i\), and the Mean Value Theorem supplies the interior point \(x_i^{*}\) whose tangent runs parallel to the chord — the picture of Theorem 4.12, now put to work strip by strip.</figcaption>
  </figure>

  <p>The integrand deserves a reading of its own. Where the graph runs flat, \(f' = 0\) and \(\sqrt{1 + f'^{2}} = 1\): arc length accrues at the same rate as horizontal distance. Where the graph is steep, the factor grows, and the curve packs more length above each unit of run. The integrand is the local <em>stretch factor</em> converting run into length — never less than \(1\), equal to \(1\) only where the curve is momentarily level.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.19</span></p>
      <div class="env-body">
        <p>Find the length of the curve \(y = x^{3/2}\) from \((0, 0)\) to \((1, 1)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>First the hypothesis: \(f(x) = x^{3/2}\) has \(f'(x) = \tfrac{3}{2}x^{1/2}\), which is continuous on all of \([0, 1]\) — at the left endpoint the one-sided derivative is \(0\), and \(f'\) approaches it continuously — so \(f\) is smooth there and Theorem 7.3 applies:</p>
        <p>\[ L = \int_{0}^{1} \sqrt{1 + \tfrac{9}{4}x}\;dx. \]</p>
        <p>Substitute \(u = 1 + \tfrac{9}{4}x\), so \(du = \tfrac{9}{4}\,dx\) and \(dx = \tfrac{4}{9}\,du\), with limits \(u = 1\) to \(u = \tfrac{13}{4}\):</p>
        <p>\[ \begin{aligned}
          L &= \frac{4}{9}\int_{1}^{13/4} \sqrt{u}\;du = \frac{4}{9}\cdot\frac{2}{3}\Bigl[u^{3/2}\Bigr]_{1}^{13/4} \\[2pt]
            &= \frac{8}{27}\left(\Bigl(\frac{13}{4}\Bigr)^{3/2} - 1\right) = \frac{13\sqrt{13} - 8}{27} \approx 1.44.
        \end{aligned} \]</p>
        <p>A quick sanity check: the straight chord from \((0,0)\) to \((1,1)\) has length \(\sqrt{2} \approx 1.41\), and the curve, which bends away from the chord, is a little longer — as an inscribed polygon with one chord would already predict. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:history [pass: enrichment] [source: M4 Mode C gap-check 2026-07-18; Neile 1657 rectification of the semicubical parabola (MacTutor); Descartes, La Géométrie (Stanford Encyclopedia of Philosophy) — web-verified] -->
  <p>The curve just measured is no arbitrary choice. The graph of \(y = x^{3/2}\) is the <em>semicubical parabola</em> \(y^{2} = x^{3}\), and in 1657 the nineteen-year-old William Neile made it the first algebraic curve ever to have its length computed — a result his teacher Wallis soon published. The feat carried weight because Descartes, in his <em>Géométrie</em>, had judged that the ratio of a curved line to a straight one “cannot be discovered by human minds”; Neile found one such length exactly, the first crack in that verdict.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.20</span></p>
      <div class="env-body">
        <p>Find the length of the curve \(y = \dfrac{x^{3}}{6} + \dfrac{1}{2x}\) from \(x = 1\) to \(x = 2\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>On \([1, 2]\) the function and its derivative \(f'(x) = \tfrac{x^{2}}{2} - \tfrac{1}{2x^{2}}\) are continuous (\(x = 0\) is safely outside the interval), so the formula applies. Squaring and adding \(1\) produces a perfect square:</p>
        <p>\[ \begin{aligned}
          1 + \bigl[f'(x)\bigr]^{2} &= 1 + \frac{x^{4}}{4} - \frac{1}{2} + \frac{1}{4x^{4}} \\[2pt]
            &= \frac{x^{4}}{4} + \frac{1}{2} + \frac{1}{4x^{4}} = \left(\frac{x^{2}}{2} + \frac{1}{2x^{2}}\right)^{2}.
        \end{aligned} \]</p>
        <p>Taking the square root demands a sign check: \(\sqrt{q^{2}} = \lvert q\rvert\), and here \(q = \tfrac{x^{2}}{2} + \tfrac{1}{2x^{2}}\) is a sum of two positive terms on \([1, 2]\), so the absolute value opens without a sign change. Hence</p>
        <p>\[ \begin{aligned}
          L &= \int_{1}^{2} \left(\frac{x^{2}}{2} + \frac{1}{2x^{2}}\right) dx = \left[\frac{x^{3}}{6} - \frac{1}{2x}\right]_{1}^{2} \\[2pt]
            &= \left(\frac{8}{6} - \frac{1}{4}\right) - \left(\frac{1}{6} - \frac{1}{2}\right) = \frac{17}{12}.
        \end{aligned} \]</p>
        <p>The curve was engineered so that \(1 + f'^{2}\) assembles into a square — that is why the answer is exact and tidy. For a curve chosen at random, \(\sqrt{1 + f'^{2}}\) rarely has an antiderivative among the functions we know; Chapter 8 will widen the toolkit, and where even that fails, its numerical methods take over. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:strategy [pass: enrichment] [source: M4 Mode C gap-check 2026-07-18; SPEC §15 item 6 — Examples 7.19/7.20 share the arc-length method; distils the recipe] -->
  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">7.4</span><span class="env-name">Setting up an arc length integral</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><em>Check smoothness.</em> Confirm \(f'\) is continuous on \([a, b]\); at a corner, split the curve and add the lengths of the pieces.</li>
        <li><em>Form the integrand.</em> Write \(1 + \bigl[f'(x)\bigr]^{2}\) and simplify.</li>
        <li><em>Find structure.</em> Look for what makes the root tractable — a substitution (as in Example 7.19) or a perfect square (Example 7.20); most other integrands wait for Chapter 8.</li>
        <li><em>If it is a perfect square, open the root carefully.</em> Writing \(1 + \bigl[f'(x)\bigr]^{2} = q^{2}\), the root is \(\sqrt{q^{2}} = \lvert q\rvert\); confirm the sign of \(q\) on \([a, b]\) before dropping the bars.</li>
        <li><em>Integrate.</em> Evaluate \(\int_{a}^{b}\sqrt{1 + [f'(x)]^{2}}\,dx\); where no elementary antiderivative exists, the length stands as a definite integral for the methods of Chapter 8.</li>
      </ol>
    </div>
  </section>

  <h3 class="subsec-head">The arc length function and the differential \(ds\)</h3>

  <p>Often what is wanted is not one length but length <em>as a running quantity</em> — how far along the curve we have travelled by the time we reach \(x\). For \(f\) smooth on \([a, b]\), define the <em>arc length function</em></p>
  <p>\[ s(x) = \int_{a}^{x} \sqrt{1 + \bigl[f'(t)\bigr]^{2}}\;dt, \qquad a \le x \le b, \]</p>
  <p>which measures the graph from its left end to the point above \(x\); thus \(s(a) = 0\) and \(s(b) = L\). Its integrand is continuous, so Part 1 of the Fundamental Theorem (Theorem 6.3) differentiates it on sight:</p>
  <p>\[ \frac{ds}{dx} = \sqrt{1 + \left(\frac{dy}{dx}\right)^{2}} \;\ge\; 1. \]</p>
  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 (⑤ ADV-FIG-01 marker) tier-supporting — the ds right triangle; caption states mnemonic status per the marker's mandate; registered in chapter7 FIGS as "ds-triangle"] -->
  <figure class="figure" data-fig="ds-triangle">
    <figcaption><span class="fig-no">Figure 7.19</span> The differential triangle: \(ds^{2} = dx^{2} + dy^{2}\). A memory device for the proved formula of Theorem 7.3 — the chord picture shrunk to a point — not a derivation of it.</figcaption>
  </figure>
  <p>The inequality repeats the stretch-factor reading — the curve always accumulates at least as fast as the run beneath it. In the language of differentials from §5.3, the same equation reads</p>
  <p>\[ ds = \sqrt{1 + \left(\frac{dy}{dx}\right)^{2}}\;dx, \]</p>
  <p>and squaring it gives the easily remembered <em>\(ds^{2} = dx^{2} + dy^{2}\)</em> — an infinitesimal Pythagorean theorem, the proof’s chord picture shrunk to a point. Its status is worth being precise about: it is a mnemonic <em>for</em> the proved formula, not a derivation of it — the honest argument is the one Theorem 7.3 already made. As a mnemonic it is excellent, and \(ds\) itself will be the working currency of the next section and of the later chapters that measure along curves.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.21</span></p>
      <div class="env-body">
        <p>Find the arc length function for the curve \(y = \dfrac{x^{2}}{8} - \ln x\), measured from the point \((1, \tfrac{1}{8})\), for \(x \ge 1\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Here \(f'(x) = \tfrac{x}{4} - \tfrac{1}{x}\), continuous for \(x &gt; 0\), so \(f\) is smooth on every interval \([1, x]\). The perfect-square pattern of Example 7.20 repeats:</p>
        <p>\[ 1 + \bigl[f'(t)\bigr]^{2} = 1 + \frac{t^{2}}{16} - \frac{1}{2} + \frac{1}{t^{2}} = \left(\frac{t}{4} + \frac{1}{t}\right)^{2}, \]</p>
        <p>and the bracket \(\tfrac{t}{4} + \tfrac{1}{t}\) is positive for \(t \ge 1\), so the root opens cleanly. Using \(\int \tfrac{1}{t}\,dt = \ln\lvert t\rvert\) from §6.4 — with \(t &gt; 0\) here, so the absolute value is simply \(t\) —</p>
        <p>\[ s(x) = \int_{1}^{x} \left(\frac{t}{4} + \frac{1}{t}\right) dt = \left[\frac{t^{2}}{8} + \ln t\right]_{1}^{x} = \frac{x^{2} - 1}{8} + \ln x. \]</p>
        <p>The checks confirm it: \(s(1) = 0\), as a length measured from the starting point must be; and differentiating returns \(s'(x) = \tfrac{x}{4} + \tfrac{1}{x} = \sqrt{1 + [f'(x)]^{2}}\), the Fundamental Theorem closing the loop. For instance, \(s(2) = \tfrac{3}{8} + \ln 2 \approx 1.07\): by \(x = 2\), just over one unit of curve has unspooled. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:caution — smoothness is the THEOREM's hypothesis, not length's prerequisite: a corner breaks the derivation (MVT step), not the definition; split at the corner -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Smoothness is the hypothesis of the <em>formula</em>, not of length itself. The graph of \(\lvert x\rvert\) on \([-1, 1]\) has a perfectly good length — Definition 7.5 measures it, and splitting at the corner gives \(2\sqrt{2}\) — but Theorem 7.3 cannot be applied across \(x = 0\), where no derivative exists for the Mean Value Theorem to use. At a corner, split the curve and add the pieces.</p>
    </div>
  </section>

  <!-- expansion:summary — close §7.6: definition honest, theorem proved, s and ds minted; ds is the export; graph-scope note + forward refs, no mechanics -->
  <p>The section ran the chapter’s schema at full honesty: a definition that says what length means (chords, refined), a theorem that computes it (the Mean Value Theorem converting each chord, Chapter 6 closing the limit), and a pair of working tools — the arc length function \(s\) and its differential \(ds\). Everything here concerns the graph of a function of \(x\); curves given by parametric equations must wait for Chapter 10, and curves through space for Chapter 13, where \(ds\) will reappear each time in suitably generalized dress. The next section puts \(ds\) straight to work: rotate a smooth curve about an axis, and ask not for the volume enclosed but for the <em>area of the surface</em> swept out.</p>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">7.7</span>Area of a Surface of Revolution</h2>
  </header>

  <!-- expansion:intuition — section opener: the skin, not the filling; the band is the slice with TWO length scales; definition goes through frustum bands built on the arc's chords -->
  <p>Rotating a region about an axis gave us solids and their volumes. Rotate just the <em>curve</em>, and what it sweeps out is a surface — the skin, with none of the filling — and the natural question is its area. The slicing schema will serve once more, but the slice is the subtlest of the chapter. A curved surface cannot be flattened onto a plane (every mapmaker’s complaint about the globe), yet a thin <em>band</em> of it very nearly can. Cut the surface into narrow bands, flatten each, add up. Note what a band involves that no earlier slice did: it is long one way — all the way around the axis — and narrow the other way, along the curve. Two length scales, circumference and slant, and the integrand will have to carry both.</p>

  <h3 class="subsec-head">Cones, frustums, and bands</h3>

  <p>The flattenable model piece is a cone. Slit a cone of base radius \(r\) and slant height \(\ell\) down its side and unroll it: it lies flat as a circular sector of radius \(\ell\) whose arc has length \(2\pi r\) — the rim of the base. By the sector-area formula, its area is \(\tfrac{1}{2}(\text{arc})(\text{radius}) = \tfrac{1}{2}(2\pi r)\,\ell = \pi r \ell\). That is the cone’s lateral area.</p>

  <p>Our bands are not full cones but <em>frustums</em> — cones with their tops cut off. Take a frustum of slant height \(\ell\) with end radii \(r_1 &lt; r_2\). Extending its side to the apex produces two cones with a common vertex, of slant heights \(\ell_1 &lt; \ell_2\) with \(\ell_2 - \ell_1 = \ell\). The shared apex makes the two triangles similar, so \(\tfrac{\ell_1}{r_1} = \tfrac{\ell_2}{r_2}\). Hence \(\ell_2 = \tfrac{r_2}{r_1}\ell_1\). Substituting this into \(\ell_2 - \ell_1 = \ell\) gives \(\ell_1 = \tfrac{r_1\,\ell}{r_2 - r_1}\), and then \(\ell_2 = \tfrac{r_2\,\ell}{r_2 - r_1}\). Subtracting lateral areas,</p>
  <p>\[ \pi r_2 \ell_2 - \pi r_1 \ell_1 = \pi\,\frac{r_2^{2} - r_1^{2}}{r_2 - r_1}\,\ell = \pi\,(r_1 + r_2)\,\ell. \]</p>
  <p>The subtraction divided by \(r_2 - r_1\), so it says nothing about the case \(r_1 = r_2\) — but that case we can check directly: equal radii make the frustum a cylindrical band, which unrolls into a flat rectangle of length \(2\pi r\) and width \(\ell\), with area \(2\pi r \ell = \pi\,(r + r)\,\ell\). The same formula covers both cases, and it is worth compressing: writing \(\bar r = \tfrac{1}{2}(r_1 + r_2)\) for the <em>average radius</em>,</p>
  <p>\[ \text{lateral area of a frustum} = 2\pi\,\bar r\,\ell. \]</p>
  <p>Average radius around, slant height along: the frustum’s area is already “circumference times width”, read at the band’s middle.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 (M2 coverage audit; brief (b) staged but unlanded at M1) tier-strong — the unrolled frustum band = annular sector, midline 2πr̄, width ℓ; compression reading visualized, not re-derived; registered in chapter7 FIGS as "frustum-unrolled"] -->
  <figure class="figure" data-fig="frustum-unrolled">
    <figcaption><span class="fig-no">Figure 7.20</span> The frustum band slit open and unrolled: an annular sector, not a rectangle — its inner and outer edges keep different lengths. The dashed midline arc has length \(2\pi \bar r\), and midline times width \(\ell\) is exactly the band’s area; only the cylinder band (\(r_1 = r_2\)) unrolls into a true rectangle. A picture of the formula the cones already proved, not a second derivation.</figcaption>
  </figure>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-essential — chord→frustum band pair: lateral surface only, rims open, near generator IS the chord, r₁≠r₂; registered in chapter7 FIGS as "chord-to-band"] -->
  <figure class="figure" data-fig="chord-to-band">
    <figcaption><span class="fig-no">Figure 7.21</span> Definition 7.6’s approximant made visible: one chord \(P_{i-1}P_i\) of the curve, and the frustum band it sweeps about the \(x\)-axis. The band’s slant edge <em>is</em> the chord — not the arc — its end radii are the endpoint heights \(f(x_{i-1})\) and \(f(x_i)\), and its slant length is \(\ell = \lvert P_{i-1}P_i\rvert\).</figcaption>
  </figure>

  <h3 class="subsec-head">The surface area of a surface of revolution</h3>

  <p>Now rotate the graph of a continuous \(f \ge 0\) on \([a, b]\), \(a &lt; b\), about the \(x\)-axis. Mark the graph over the regular partition, as in §7.6, at the points \(P_i = \bigl(x_i, f(x_i)\bigr)\). Each chord \(P_{i-1}P_i\), swept around the axis, generates precisely a frustum band: end radii \(f(x_{i-1})\) and \(f(x_i)\), slant height \(\lvert P_{i-1}P_i\rvert\). The frustum formula prices each band exactly, and the sum of the bands approximates the surface. As with arc length, we let the definition say the rest.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">7.6</span><span class="env-name">Surface area of revolution</span></p>
    <div class="env-body">
      <p>Let \(f\) be continuous with \(f \ge 0\) on \([a, b]\), \(a &lt; b\), and let \(P_0, \dots, P_n\) be the points of its graph over the regular partition. The <em>area</em> of the surface obtained by rotating the graph about the \(x\)-axis is</p>
      <p>\[ S = \lim_{n \to \infty} \sum_{i=1}^{n} 2\pi\cdot\frac{f(x_{i-1}) + f(x_i)}{2}\cdot\bigl\lvert P_{i-1}P_i\bigr\rvert, \]</p>
      <p>provided this limit exists as a finite number.</p>
    </div>
  </section>

  <p>For smooth curves the limit not only exists but lands on an integral we can often evaluate — and this time the whole argument closes with tools already in hand.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">7.4</span><span class="env-name">Surface Area Formula</span></p>
    <div class="env-body">
      <p>Let \(f\) be smooth on \([a, b]\) (§7.6) with \(f \ge 0\), \(a &lt; b\). Then the surface area of the surface obtained by rotating the graph of \(f\) about the \(x\)-axis exists, and</p>
      <p>\[ S = \int_{a}^{b} 2\pi\,f(x)\,\sqrt{1 + \bigl[f'(x)\bigr]^{2}}\;dx. \]</p>
    </div>
  </section>

  <p>The proof that follows is the most technical argument in the chapter. On a first reading it is enough to accept Theorem 7.4 and turn to the examples; the derivation is here for completeness, and it rewards a second pass.</p>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span>
    </p>
    <div class="env-body">
      <p>The chord conversion is already paid for: in the proof of Theorem 7.3, the Mean Value Theorem gave, for each strip, a point \(\xi_i\) in \((x_{i-1}, x_i)\) with \(\lvert P_{i-1}P_i\rvert = \sqrt{1 + [f'(\xi_i)]^{2}}\,\Delta x\). The \(i\)-th band’s area is therefore</p>
      <p>\[ 2\pi\cdot\frac{f(x_{i-1}) + f(x_i)}{2}\cdot\sqrt{1 + \bigl[f'(\xi_i)\bigr]^{2}}\;\Delta x, \]</p>
      <p>which reads the curve’s height at the strip’s two <em>ends</em> while reading its slope at the interior point \(\xi_i\). If the height were read at \(\xi_i\) as well, the band sum would be exactly a Riemann sum for \(2\pi f\sqrt{1 + f'^{2}}\); so we estimate the cost of moving the height reading, and show it vanishes in the limit.</p>
      <p>Smoothness makes both \(\lvert f'\rvert\) and \(\sqrt{1 + f'^{2}}\) continuous on \([a, b]\), so by the Extreme Value Theorem (Theorem 4.9(a)) they attain maxima: say \(K = \max \lvert f'\rvert\) and \(B = \max \sqrt{1 + f'^{2}}\). For any point \(u\) in the \(i\)-th strip, the Mean Value Theorem gives \(f(u) - f(\xi_i) = f'(\zeta)\,(u - \xi_i)\) for some \(\zeta\) between them, and \(\lvert f'(\zeta)\rvert \le K\); so it bounds the height drift by the slope bound: \(\lvert f(u) - f(\xi_i)\rvert \le K\,\lvert u - \xi_i\rvert \le K\,\Delta x\). Applying this at \(u = x_{i-1}\) and \(u = x_i\), each of the two endpoint drifts is at most \(K\,\Delta x\), so by the triangle inequality their average is too:</p>
      <p>\[ \left\lvert \frac{f(x_{i-1}) + f(x_i)}{2} - f(\xi_i) \right\rvert \le K\,\Delta x, \]</p>
      <p>so replacing the \(i\)-th band’s height reading changes that term by at most \(2\pi\,(K \Delta x)\,B\,\Delta x\). Across all \(n\) bands the total change is at most</p>
      <p>\[ n \cdot 2\pi K B\,(\Delta x)^{2} = 2\pi K B\,(b - a)\,\Delta x \;\longrightarrow\; 0 \qquad (n \to \infty), \]</p>
      <p>since \(n\,\Delta x = b - a\). The corrected sums \(\sum 2\pi f(\xi_i)\sqrt{1 + [f'(\xi_i)]^{2}}\,\Delta x\) are Riemann sums of the continuous function \(2\pi f \sqrt{1 + f'^{2}}\), and by Theorem 6.1 with Definition 6.2’s any-sample-point clause they converge to its integral. The band sums differ from them by an amount tending to \(0\), so they converge to the same integral — which is the claimed formula. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>The integrand rewards a second look: \(2\pi f(x)\) is the circumference of the circle the point \((x, f(x))\) travels, and \(\sqrt{1 + f'^{2}}\,dx\) is the arc element \(ds\) of §7.6 — the band’s two length scales, around and along, exactly as promised. In the differential shorthand the theorem compresses to</p>
  <p>\[ S = \int 2\pi \rho\;ds, \]</p>
  <p>where \(\rho\) is the distance from the moving point to the axis of rotation. About the \(x\)-axis, \(\rho = y = f(x)\). About the <em>\(y\)</em>-axis, \(\rho = x\), with the curve kept entirely in \(x \ge 0\) (an interval \(0 \le a &lt; b\)). Two things force that restriction: a signed \(x\) would count area negatively, and the two halves of a curve straddling the axis can overlap or re-cover parts of one surface. The general case therefore calls for splitting at the axis and tracking what each piece generates. One principle, two readings — and the same MVT argument, run with the radius \(x\) in place of \(f(x)\), proves the \(y\)-axis version.</p>

  <!-- expansion:caution — the radius-reading trap, closing the chapter's radius discipline: ρ is the distance to the rotation axis, not a memorized pair of formulas -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>Do not memorize \(2\pi y\,ds\) and \(2\pi x\,ds\) as two formulas. There is one: \(2\pi \rho\,ds\), with \(\rho\) the distance from the curve to the <em>axis of rotation</em> — the same discipline that set every washer and shell radius in §§7.2–7.3. Identify the axis first; \(\rho\) follows.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.22</span></p>
      <div class="env-body">
        <p>A <em>zone</em> of a sphere is the band cut from it by two parallel planes. Show that for the sphere of radius \(r\) generated by rotating \(y = \sqrt{r^{2} - x^{2}}\) about the \(x\)-axis, the zone between the planes \(x = a\) and \(x = b\) (where \(-r &lt; a &lt; b &lt; r\)) has area \(2\pi r\,(b - a)\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>On \([a, b]\), safely inside \((-r, r)\), the function \(f(x) = \sqrt{r^{2} - x^{2}}\) is positive and its derivative \(f'(x) = -x/\sqrt{r^{2} - x^{2}}\) is continuous — the curve is smooth there, and Theorem 7.4 applies. Compute the integrand:</p>
        <p>\[ \begin{aligned}
          1 + \bigl[f'(x)\bigr]^{2} &= 1 + \frac{x^{2}}{r^{2} - x^{2}} = \frac{r^{2}}{r^{2} - x^{2}}, \\[2pt]
          \text{so}\qquad f(x)\sqrt{1 + \bigl[f'(x)\bigr]^{2}} &= \sqrt{r^{2} - x^{2}}\cdot\frac{r}{\sqrt{r^{2} - x^{2}}} = r.
        \end{aligned} \]</p>
        <p>The heights and slopes conspire to cancel: where the sphere’s profile is low, it is steep, and the band’s area comes out the same everywhere. Hence</p>
        <p>\[ S = \int_{a}^{b} 2\pi r\,dx = 2\pi r\,(b - a). \]</p>
        <p>The zone’s area depends only on the <em>width</em> \(b - a\) of the slab that cuts it — not on where along the sphere the cut is made. A band of given thickness near a pole has exactly the same area as one at the equator. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:history [source: standard calculus-textbook historical note] — Archimedes' hat-box result: the zone/cylinder correspondence he had without limits; one line, non-decorative -->
  <p>This width-only law is ancient: Archimedes knew that a sphere and its circumscribed cylinder trade areas band for band — slice both by the same pair of parallel planes and the two bands always match, which is why the result is remembered as his <em>hat-box theorem</em>. What the integral adds is the bookkeeping that makes the cancellation visible in two lines.</p>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 (M2 coverage audit addition) tier-supporting — sphere zones of equal width, 2D profile per the pattern consult (Q(e)): two cut-pairs of the same width w, equator vs near-pole (strictly off the poles), emphasized profile arcs + radius guides; registered in chapter7 FIGS as "zone-bands"] -->
  <figure class="figure" data-fig="zone-bands">
    <figcaption><span class="fig-no">Figure 7.22</span> Two slabs of the same width \(w\) cut the sphere’s profile — one at the equator, one out toward the pole, both strictly inside \((-r, r)\). The polar arc is longer and steeper but sits at a smaller radius; the equatorial arc is shorter and flatter at a larger one. Swept about the axis, the two arcs generate zones of <em>equal</em> area: the compensation Example 7.22 computed.</figcaption>
  </figure>

  <!-- expansion:formula — the explicitly-flagged limiting preview to the full sphere; the poles fail the C¹ hypothesis; honest fence to Ch8 -->
  <p>Letting the two cutting planes recede to the poles, \(a \to -r\) and \(b \to r\), the zone areas approach \(2\pi r \cdot 2r = 4\pi r^{2}\) — the classical area of the whole sphere. Honesty requires a flag here: at the poles themselves the profile has vertical tangents, \(f'\) blows up, and Theorem 7.4’s smoothness hypothesis fails on the full interval \([-r, r]\), so the full-sphere value is reached as a <em>limit of zones</em>, not by one application of the theorem. Taming endpoint blow-ups of exactly this kind is the business of improper integrals, in Chapter 8.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">7.23</span></p>
      <div class="env-body">
        <p>The arc of the parabola \(y = x^{2}\) from \((0, 0)\) to \((1, 1)\) is rotated about the \(y\)-axis. Find the area of the resulting surface.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The axis of rotation is the \(y\)-axis, so the radius is \(\rho = x\) — and the arc lives in \(0 \le x \le 1\), on one side of the axis, as the \(y\)-axis form requires. With \(y = x^{2}\), the arc element is \(ds = \sqrt{1 + (2x)^{2}}\,dx = \sqrt{1 + 4x^{2}}\,dx\), so</p>
        <p>\[ S = \int 2\pi\,\rho\;ds = 2\pi \int_{0}^{1} x\,\sqrt{1 + 4x^{2}}\;dx. \]</p>
        <p>Substitute \(u = 1 + 4x^{2}\), \(du = 8x\,dx\), with limits \(u = 1\) to \(u = 5\):</p>
        <p>\[ S = \frac{2\pi}{8}\int_{1}^{5} \sqrt{u}\;du = \frac{\pi}{4}\cdot\frac{2}{3}\Bigl[u^{3/2}\Bigr]_{1}^{5} = \frac{\pi}{6}\bigl(5\sqrt{5} - 1\bigr) \approx 5.33. \]</p>
        <p>Note where each ingredient came from: the radius \(x\) from the axis (not from the curve’s formula), the element \(ds\) from §7.6, and the substitution from §6.5 — three sections cooperating in four lines. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:figure [pass: enrichment] [source: figure-opportunity gate 2026-07-18 tier-supporting — dual-axis radius readout from one sample point; the ρ-discipline drawn; registered in chapter7 FIGS as "dual-axis-radius"] -->
  <figure class="figure" data-fig="dual-axis-radius">
    <figcaption><span class="fig-no">Figure 7.23</span> One point of the arc \(y = x^{2}\), two radii: rotation about the \(x\)-axis reads the vertical distance \(f(x)\), rotation about the \(y\)-axis reads the horizontal distance \(x\). The radius is always the distance to the axis of rotation — one principle, not a memorized pair.</figcaption>
  </figure>

  <h3 class="subsec-head">Chapter summary</h3>

  <p>This chapter took the machine Chapter 6 built and taught it to measure. One schema ran through every section — slice the quantity, approximate each slice by a product, sum, and refine — and each section supplied its own slice. Section 7.1 sliced regions into strips whose height is a <em>gap</em>, defining the area between curves (Definition 7.1) as \(\int_a^b (f - g)\,dx\), with crossings handled by \(\int \lvert f - g\rvert\). Section 7.2 promoted the strip to a solid slab and volume to the integral of cross-sectional area (Definition 7.2), \(V = \int_a^b A(x)\,dx\), with disks and washers as the revolution instances — and the sphere and pyramid of classical geometry recovered as its first dividends. Section 7.3 sliced the other way, parallel to the axis, proving the shell method (Theorem 7.1), \(V = \int_a^b 2\pi x f(x)\,dx\), and distilling the washer-or-shell decision into Strategy 7.2. Section 7.4 left geometry: the work done by a varying force — read through its signed component \(F(x)\) along the motion — is \(W = \int_a^b F(x)\,dx\) (Definition 7.3), and the slicing learned to choose what to slice — displacement, cable, or water. Section 7.5 turned totals into averages, \(f_{\text{ave}} = \frac{1}{b-a}\int_a^b f\,dx\) (Definition 7.4), and proved the Mean Value Theorem for Integrals (Theorem 7.2): a continuous function passes through its own average. Section 7.6 measured the curve itself by refining chords (Definition 7.5) and proved the Arc Length Formula (Theorem 7.3), \(L = \int_a^b \sqrt{1 + [f'(x)]^{2}}\,dx\), minting the arc element \(ds\); and §7.7 wrapped the chords into frustum bands to define surface area (Definition 7.6) and prove the Surface Area Formula (Theorem 7.4), compressed as \(S = \int 2\pi \rho\,ds\).</p>

  <p>Three theorems in the chapter were proved with the machinery of Chapter 4 — the Mean Value Theorem for Integrals leaning on the Extreme and Intermediate Value Theorems, and the two geometric formulas on the Mean Value Theorem — a first sustained payoff from owning those proofs rather than borrowing them. What the chapter leaves owing is plain from its own examples: the integrals that measure lengths and surfaces strain the small table of antiderivatives we possess, and the curves here were chosen to fit the toolkit rather than the other way round. Chapter 8 pays that debt with a systematic account of integration techniques — and with improper integrals, which will also settle the polar flag left in Example 7.22. Farther ahead, \(ds\) returns for parametric curves in Chapter 10 and for space curves in Chapter 13, the average value and the slicing of volumes reappear over two-dimensional regions in Chapter 15, and surfaces return in their full generality in Chapter 16. The slicing schema itself, though, is now complete — it is the way integrals meet the world, and the rest of the book will use it without ceremony.</p>

    /* §7.6 Figure 7.17 — inscribed polygon refinement (pair): the same single-bend curve with
       4 chords, then 8 (old nodes kept: n doubles). Chord endpoints ON the curve at REGULAR
       x-spacing (so chord lengths differ: long where steep, short where flat — the stretch
       factor pre-taught for free). Polygon strictly inside the bend (concave-down window). */
    "polygon-refinement": function () {
      var f = function (x) { var u = (x - 2) / 2.2; return 2.42 * Math.sqrt(Math.max(0, 1 - u * u)); };
      function panel(n) {
        var a = 0.1, b = 3.9, dx = (b - a) / n;
        var items = [{ type: "curve", fn: f, domain: [a, b] }];
        for (var i = 0; i < n; i++) {

        }
        for (var j = 0; j <= n; j++) {
          items.push({ type: "dot", x: a + j * dx, y: f(a + j * dx), r: 2.1 });
        }
        return buildPlot({ w: 235, h: 165, xmin: -0.25, xmax: 4.3, ymin: -0.3, ymax: 2.8,
          aria: "an arch-shaped curve with an inscribed polygon of " + n + " chords", items: items });
      }
      return { layout: "pair", panels: [
        { svg: panel(4), note: "\\(n = 4\\)" },
        { svg: panel(8), note: "\\(n = 8\\)" }
      ] };
    },

        w: 275, h: 205, xmin: 0.45, xmax: 3.75, ymin: 1.05, ymax: 3.0, axes: false,

          { type: "dot", x: xs, y: f(xs) },
