<style>
/* ============================================================
   skin-hs.css — inlined + modified: Times New Roman + MathJax
   ============================================================ */
.paper {
  --c-primary: oklch(0.50 0.13 245);

  --c-aux: oklch(0.55 0.01 260);
  --c-axis: #474b54;
  --ink: #1b1c1f;
  --ink-soft: #565a63;
  --ink-faint: #8a8e98;
  --paper: #ffffff;
  --rule: #e5e7eb;
  --fig-w-pair: 250px;     /* 並排(pair)圖每張的預設寬度（整體一次調） */

  --ui: "Inter", -apple-system, system-ui, sans-serif;
  --a-concept:  oklch(0.50 0.13 55);
  --a-result:   oklch(0.50 0.13 245);
  --a-practice: oklch(0.50 0.13 152);
  --a-aside:    oklch(0.50 0.02 260);
  --a-caution:  oklch(0.50 0.155 25);
  --a-strategy: oklch(0.50 0.13 290);
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: var(--fs-base, 17.5px);
  line-height: var(--lh-base, 1.62);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  box-sizing: border-box;
}
.paper *, .paper *::before, .paper *::after { box-sizing: border-box; }
.paper .page { padding: 52px 58px 64px; max-width: 760px; margin: 0 auto; }
.skin-hs .page { hyphens: auto; -webkit-hyphens: auto; }
.skin-hs p, .skin-hs li { text-align: justify; text-justify: inter-word; }
.paper .ragged { text-align: left; }
.paper p { margin: 0 0 .85em; text-wrap: pretty; }
.paper em { font-style: italic; }
.paper .informal { font-style: italic; color: var(--ink-soft); }
.paper ol { margin: .2em 0 .9em; padding-left: 1.5em; }

.paper .warmup > li::before {
  content: "(" counter(wu, lower-alpha) ")";

.paper .page-break-before { break-before: page; page-break-before: always; }

}

.skin-hs .env-definition em { font-style: italic; }
.skin-hs .env-remark { color: var(--ink-soft); font-size: .97em; }

.skin-hs .env-proof { --accent: var(--a-result); }
.skin-hs .env-proof .env-kicker {

}

.skin-hs .workedexample {
  margin: 1.6em 0; padding-left: 16px;

}
.skin-hs .workedexample .env { margin: .7em 0; padding-left: 0; border-left: 0; }

.skin-hs > .env-cont { margin-top: 0; padding-top: .82em; }

.skin-hs > .env-example:has(+ .env-solution) { margin-bottom: 0; }

.skin-hs > .env-cont, .skin-hs > .env-example, .skin-hs > .env-solution { display: flow-root; }

}
.skin-hs .env-strategy {
  --accent: var(--a-strategy);

}

.skin-hs .env-strategy .steps { margin-bottom: 0; }
.skin-hs.vivid .env { border-left-color: color-mix(in srgb, var(--accent) 70%, var(--paper)); border-left-width: 3px; }
.skin-hs.vivid .workedexample { border-left-color: color-mix(in srgb, var(--a-practice) 70%, var(--paper)); border-left-width: 3px; }

/* ============================================================
   print.css — inlined (A4 sheet layout + paginator)
   ============================================================ */
@page { size: A4; margin: 0; }
.sheet {
  position: relative; box-sizing: border-box;
  width: 210mm; height: 297mm;
  padding: 20mm 28mm 20mm 32mm;
  background: #fff; overflow: hidden;
}
.sheet-header {
  position: absolute; top: 11mm; left: 32mm; right: 28mm;
  font: 500 8.5pt "Inter", sans-serif; color: #9aa0ac; letter-spacing: .02em;
}
.sheet-footer {
  position: absolute; bottom: 8.5mm; left: 0; right: 0;
  text-align: center; font: 500 9pt "Inter", sans-serif; color: #82868f;
}
.sheet-body { height: 100%; --accent: oklch(0.50 0.13 245); }
.sheet-body.paper { box-shadow: none; border-radius: 0; max-width: none; background: #fff; }

.sheet, .sheet * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.sheet-body > :first-child { margin-top: 0 !important; }
.sheet-body .sec + .sec { border-top: 0; margin-top: 0; padding-top: 0; }
.sheet-body .qed { margin-top: -1.55em; height: 1.55em; }
.sheet-body .env-body::after { display: none; content: none; }
.sheet-body .env-cont { margin-top: 0; }
.sheet-body .env-cont > .env-body > :first-child { margin-top: 0; }
@media screen {
  body { background: #6f727b; margin: 0; }
  .sheet { box-shadow: 0 3px 18px rgba(0,0,0,.3); margin: 9mm auto; }
}
@media print {
  body { background: #fff; margin: 0; }
  .sheet { box-shadow: none; margin: 0; break-after: page; }
  .sheet:last-child { break-after: auto; }
  .print-toolbar, #boot { display: none !important; }
}

/* ============================================================
   page-level
   ============================================================ */
.print-toolbar {
  position: fixed; top: 14px; right: 16px; z-index: 1000;

}

  <header class="chapter-head">
    <div class="ch-kicker">Appendix D</div>
    <h1 class="ch-title">The Proof Track</h1>
  </header>

  <p class="lead">A handful of theorems in the main text are stated, used at once, and then have their proofs deferred &mdash; on credit &mdash; to here. The reason is always the same: the result keeps a chapter moving, but its proof is a self-contained analytic construction that would interrupt the line of thought if inserted where the theorem is used. This appendix is the home for those proofs. Nothing in it introduces a new result the chapters depend on: each entry proves a theorem already stated and numbered where it appeared, and you can read it whenever you want the argument behind a result you have been taking on trust.</p>

  <p class="para-head">How to use this appendix:</p>
  <ul>
    <li>find a deferred proof by the number of the theorem it establishes &mdash; entries are indexed by their home theorem, not renumbered;</li>
    <li>use the hypothesis summary in \(\S\)D.1 to see, at a glance, exactly which assumptions each fenced theorem consumes and what deeper fact it rests on;</li>
    <li>read an entry only when you want it &mdash; the main text is self-contained on the <em>statements</em>, and later material never leans on the proofs collected here.</li>
  </ul>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">D.1</span>Using the Proof Track</h2>
  </header>

  <p>The main line of this book proves what it can afford to prove and fences the rest. A <em>fenced</em> theorem is stated in full &mdash; hypotheses, conclusion, and a note on why it holds &mdash; and applied immediately; only its proof is moved here, so that a first reading meets the idea without the machinery. This is a deliberate depth choice rather than an omission: every fenced theorem has a complete proof, and it lives at a fixed address you can always turn to.</p>

  <p>Each fenced theorem carries a short record of the assumptions it actually uses and the deeper facts it leans on. Reading that record tells you exactly what you are trusting when you apply the theorem &mdash; and, just as usefully, what you are <em>not</em> assuming.</p>

  <h3 class="subsec-head">Fenced so far</h3>

  <p><strong>Theorem 4.9(a), the Extreme Value Theorem</strong> &mdash; that a continuous function on a closed interval attains a maximum and a minimum. <em>Uses:</em> continuity, and a <em>closed, bounded</em> interval \([a, b]\); both are essential. <em>Rests on:</em> the completeness of \(\mathbb{R}\) (Theorem 4.1), by way of the least-upper-bound lemma and the Bolzano&ndash;Weierstrass theorem (Theorem 4.4). <em>Proved in</em> \(\S\)D.2.</p>

  <p><strong>Theorem 4.9(b), the Intermediate Value Theorem</strong> &mdash; that a continuous function on \([a, b]\) attains every value between \(f(a)\) and \(f(b)\). <em>Uses:</em> continuity, and an interval domain with no gaps; a jump discontinuity is exactly what would let a value be skipped. <em>Rests on:</em> the completeness of \(\mathbb{R}\) (Theorem 4.1), by repeated bisection. <em>Proved in</em> \(\S\)D.2.</p>

  <p><strong>Theorem 5.5, L’Hôpital’s Rule</strong> &mdash; that an indeterminate quotient \(f/g\) of type \(\tfrac{0}{0}\) or \(\tfrac{\ast}{\infty}\) has the same limit as \(f'/g'\), when that limit exists. <em>Uses:</em> differentiability near the point, \(g' \ne 0\) there, and a genuinely indeterminate form. <em>Rests on:</em> the Generalized Mean Value Theorem (Theorem 5.4). The \(\tfrac{0}{0}\) case at a finite point is proved in \(\S\)5.7; the \(\tfrac{\ast}{\infty}\) and infinite-point cases are <em>proved in</em> \(\S\)D.3.</p>

  <p>This record will lengthen as later chapters fence their own heaviest results &mdash; the characterisation of which functions are integrable, the symmetry of mixed partial derivatives, the general change-of-variables formula, and the integral theorems of vector calculus among them. Each will arrive with its hypotheses named here, so that the cost of trusting it is always in plain view.</p>
</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">D.2</span>The Existence Theorems for Continuous Functions</h2>
  </header>

  <p>Section 4.4 stated the two foundational theorems about a continuous function on a closed interval &mdash; that it attains its extreme values (Theorem 4.9(a), the Extreme Value Theorem) and that it takes every value in between (Theorem 4.9(b), the Intermediate Value Theorem) &mdash; and deferred both proofs to here. Each rests on the completeness of \(\mathbb{R}\) (Theorem 4.1): the statement that every non-decreasing sequence bounded above converges (and its mirror for non-increasing sequences bounded below). The Extreme Value Theorem needs one further consequence of completeness, which we isolate first, because we invoke it by name and it recurs.</p>

  <h3 class="subsec-head">The least upper bound</h3>

  <p>An <em>upper bound</em> of a set \(S \subseteq \mathbb{R}\) is a number that is \(\ge\) every element of \(S\). Completeness guarantees that a set bounded above has a <em>smallest</em> upper bound.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Lemma</span><span class="env-num">D.1</span><span class="env-name">Least upper bound</span></p>
    <div class="env-body">
      <p>Every nonempty set \(S \subseteq \mathbb{R}\) that is bounded above has a <em>least upper bound</em> \(M = \sup S\): a number \(M\) that is an upper bound of \(S\) and satisfies \(M \le B\) for every upper bound \(B\) of \(S\).</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Since \(S\) is nonempty, fix a point \(s_{0} \in S\); since \(S\) is bounded above, fix an upper bound \(B\). Set \(a_{0} = s_{0} - 1\) and \(b_{0} = B\). Then \(a_{0}\) is <em>not</em> an upper bound of \(S\) &mdash; the element \(s_{0}\) exceeds it &mdash; while \(b_{0}\) is; and \(a_{0} < b_{0}\), since \(s_{0} \le B\). We halve this interval repeatedly, preserving that contrast.</p>
      <p>Given \([a_{n}, b_{n}]\) with \(a_{n}\) not an upper bound of \(S\) and \(b_{n}\) an upper bound, let \(m_{n} = \tfrac{1}{2}(a_{n} + b_{n})\). If \(m_{n}\) is an upper bound of \(S\), set \(a_{n+1} = a_{n}\) and \(b_{n+1} = m_{n}\); otherwise set \(a_{n+1} = m_{n}\) and \(b_{n+1} = b_{n}\). In either case \(a_{n+1}\) is still not an upper bound, \(b_{n+1}\) still is, and</p>
      <p>\[ b_{n+1} - a_{n+1} = \tfrac{1}{2}(b_{n} - a_{n}), \qquad \text{so} \qquad b_{n} - a_{n} = \frac{b_{0} - a_{0}}{2^{n}} \to 0. \]</p>
      <p>The sequence \(\{a_{n}\}\) is non-decreasing and bounded above (by \(b_{0}\)), so by Theorem 4.1 it converges to some \(M\). Because \(b_{n} - a_{n} \to 0\), the sequence \(\{b_{n}\}\) converges to the same \(M\). We claim \(M = \sup S\).</p>
      <p><em>\(M\) is an upper bound.</em> For any \(s \in S\) and any \(n\), \(s \le b_{n}\) because \(b_{n}\) is an upper bound; letting \(n \to \infty\) gives \(s \le M\).</p>
      <p><em>\(M\) is the least one.</em> Suppose some \(M' < M\) were also an upper bound. Since \(a_{n} \to M\), there is an \(n\) with \(a_{n} > M'\). But \(a_{n}\) is not an upper bound, so some \(s \in S\) has \(s > a_{n} > M'\), contradicting that \(M'\) bounds \(S\). Hence no upper bound is smaller than \(M\), and \(M = \sup S\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>The mirror statement &mdash; a nonempty set bounded below has a <em>greatest lower bound</em> \(\inf S\) &mdash; follows by applying the lemma to \(\{-s : s \in S\}\).</p>

  <h3 class="subsec-head">The Extreme Value Theorem</h3>

  <p>Recall the statement: if \(f\) is continuous on a closed interval \([a, b]\), then \(f\) attains a maximum and a minimum on \([a, b]\). The proof runs in two stages &mdash; first that the values are bounded, then that the least upper bound is actually reached &mdash; and both stages extract a convergent subsequence with the Bolzano&ndash;Weierstrass theorem (Theorem 4.4).</p>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof of Theorem 4.9(a)</span></p>
    <div class="env-body">
      <p>We show \(f\) attains a maximum; the minimum then follows by applying the result to \(-f\).</p>
      <p><strong>The values are bounded above.</strong> Suppose not. Then for each \(n \in \mathbb{N}\) there is a point \(x_{n} \in [a, b]\) with \(f(x_{n}) > n\). The sequence \(\{x_{n}\}\) lies in \([a, b]\), so it is bounded, and by the Bolzano&ndash;Weierstrass theorem (Theorem 4.4) some subsequence \(x_{n_{k}}\) converges to a point \(\xi\). Since \(a \le x_{n_{k}} \le b\) for every \(k\), the limit satisfies \(\xi \in [a, b]\), so \(f\) is defined and continuous there; continuity gives \(f(x_{n_{k}}) \to f(\xi)\), a finite real number. But \(f(x_{n_{k}}) > n_{k} \to \infty\), so the values cannot approach a finite limit &mdash; a contradiction. Hence \(f\) is bounded above on \([a, b]\).</p>
      <p><strong>The bound is attained.</strong> The set of values \(f([a, b]) = \{\, f(x) : x \in [a, b] \,\}\) is nonempty and bounded above, so by Lemma D.1 it has a least upper bound \(M = \sup f([a, b])\). For each \(n\), the number \(M - \tfrac{1}{n}\) is smaller than \(M\), hence not an upper bound of the values, so there is a point \(x_{n} \in [a, b]\) with</p>
      <p>\[ M - \tfrac{1}{n} < f(x_{n}) \le M. \]</p>
      <p>By Bolzano&ndash;Weierstrass again, some subsequence \(x_{n_{k}} \to x_{M} \in [a, b]\). Continuity gives \(f(x_{n_{k}}) \to f(x_{M})\); but the displayed inequality forces \(f(x_{n_{k}}) \to M\) as \(k \to \infty\), since \(M - \tfrac{1}{n_{k}}\) and \(M\) both tend to \(M\). A sequence has only one limit, so \(f(x_{M}) = M\). Thus \(f\) attains its maximum value \(M\) at the point \(x_{M}\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <h3 class="subsec-head">The Intermediate Value Theorem</h3>

  <p>Recall the statement: if \(f\) is continuous on \([a, b]\) and \(y\) lies between \(f(a)\) and \(f(b)\), then \(f(c) = y\) for some \(c \in [a, b]\). Here completeness enters through bisection: we trap the crossing inside a shrinking interval whose endpoints keep \(y\) bracketed, and the shared limit of those endpoints is the point we want.</p>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof of Theorem 4.9(b)</span></p>
    <div class="env-body">
      <p>If \(y\) equals \(f(a)\) or \(f(b)\) there is nothing to prove, so suppose it lies strictly between them. Relabel so that \(f(a) < y < f(b)\); the opposite case \(f(a) > y > f(b)\) reduces to this one by applying what follows to \(-f\) and \(-y\).</p>
      <p>We keep \(y\) bracketed by the two endpoints, maintaining \(f(a_{n}) \le y \le f(b_{n})\) throughout. Start with \(a_{0} = a\) and \(b_{0} = b\), where \(f(a_{0}) < y < f(b_{0})\). Given \([a_{n}, b_{n}]\) with \(f(a_{n}) \le y \le f(b_{n})\), let \(m_{n} = \tfrac{1}{2}(a_{n} + b_{n})\) and compare \(f(m_{n})\) with \(y\):</p>
      <ul>
        <li>if \(f(m_{n}) = y\), the point \(c = m_{n}\) already satisfies the conclusion, and we stop;</li>
        <li>if \(f(m_{n}) < y\), set \(a_{n+1} = m_{n}\) and \(b_{n+1} = b_{n}\);</li>
        <li>if \(f(m_{n}) > y\), set \(a_{n+1} = a_{n}\) and \(b_{n+1} = m_{n}\).</li>
      </ul>
      <p>Each continuing case preserves \(f(a_{n+1}) \le y \le f(b_{n+1})\) and halves the interval, so \(b_{n} - a_{n} = (b - a)/2^{n} \to 0\). If the process ever stops we are done. Otherwise it produces a non-decreasing \(\{a_{n}\}\) and a non-increasing \(\{b_{n}\}\), both confined to \([a, b]\); by Theorem 4.1 each converges, and since their gap shrinks to \(0\) they share a single limit \(c \in [a, b]\).</p>
      <p>Continuity gives \(f(a_{n}) \to f(c)\) and \(f(b_{n}) \to f(c)\). Passing to the limit in the standing inequality \(f(a_{n}) \le y \le f(b_{n})\) yields</p>
      <p>\[ f(c) \le y \le f(c), \]</p>
      <p>so \(f(c) = y\), as required. <span class="qed qed-proof"></span></p>
    </div>
  </section>

</article>

<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">D.3</span>L’Hôpital’s Rule: the Remaining Cases</h2>
  </header>

  <p>Section 5.7 proved L’Hôpital’s rule (Theorem 5.5) for the form \(\tfrac{0}{0}\) at a finite point, where the trick was to <em>define</em> \(f(a) = g(a) = 0\) and read the ratio off the Generalized Mean Value Theorem. That trick is unavailable when the functions grow without bound, and the argument must instead control an error term by hand. Here we prove the \(\tfrac{\ast}{\infty}\) form, and then reduce the infinite-point cases to the corresponding finite-point cases.</p>

  <h3 class="subsec-head">The \(\tfrac{\ast}{\infty}\) form at a finite point</h3>

  <p>We prove the representative case: \(x \to a^{+}\) at a finite \(a\), with \(g(x) \to +\infty\) and a finite limit \(L = \lim_{x \to a^{+}} f'(x)/g'(x)\). The left-hand version is identical, the case \(g \to -\infty\) follows by replacing \(g\) with \(-g\), and \(L = \pm\infty\) is a routine variant noted at the end.</p>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof of Theorem 5.5 (\(\tfrac{\ast}{\infty}\) case)</span></p>
    <div class="env-body">
      <p>Let \(\varepsilon > 0\). Since \(f'(x)/g'(x) \to L\) as \(x \to a^{+}\), choose a point \(d\) to the right of \(a\) such that</p>
      <p>\[ \left\lvert \frac{f'(t)}{g'(t)} - L \right\rvert < \varepsilon \qquad \text{for all } t \in (a, d). \]</p>
      <p>Fix any \(x \in (a, d)\). On the interval \([x, d]\) the Generalized Mean Value Theorem (Theorem 5.4) supplies a point \(\xi \in (x, d)\) with</p>
      <p>\[ \frac{f(x) - f(d)}{g(x) - g(d)} = \frac{f'(\xi)}{g'(\xi)}, \]</p>
      <p>and since \(\xi \in (a, d)\), the right side lies within \(\varepsilon\) of \(L\). Now split \(f(x)/g(x)\) so this ratio appears:</p>
      <p>\[ \frac{f(x)}{g(x)} = \frac{f(d)}{g(x)} + \frac{f(x) - f(d)}{g(x)} = \frac{f(d)}{g(x)} + \frac{f'(\xi)}{g'(\xi)}\left(1 - \frac{g(d)}{g(x)}\right), \]</p>
      <p>where the last step multiplied and divided by \(g(x) - g(d)\). Write \(f'(\xi)/g'(\xi) = L + \eta\) with \(\lvert \eta \rvert < \varepsilon\). Subtracting \(L\) and grouping,</p>
      <p>\[ \frac{f(x)}{g(x)} - L = \frac{f(d)}{g(x)} - L\,\frac{g(d)}{g(x)} + \eta\left(1 - \frac{g(d)}{g(x)}\right). \]</p>
      <p>The point \(d\) is now fixed, while \(g(x) \to +\infty\) as \(x \to a^{+}\). Hence the first two terms tend to \(0\), and \(g(d)/g(x) \to 0\), so \(\lvert 1 - g(d)/g(x) \rvert \to 1\). Taking the limit superior of the absolute value,</p>
      <p>\[ \limsup_{x \to a^{+}} \left\lvert \frac{f(x)}{g(x)} - L \right\rvert \le 0 + 0 + \varepsilon \cdot 1 = \varepsilon. \]</p>
      <p>Since \(\varepsilon > 0\) was arbitrary, the limit superior is \(0\), which is to say \(\lim_{x \to a^{+}} f(x)/g(x) = L\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p class="informal">Only \(g(x) \to \infty\) was used, never \(f(x) \to \infty\): the rule holds in the form \(\tfrac{\ast}{\infty}\), whatever the numerator does. This is why Theorem 5.5 states the second hypothesis as a condition on \(g\) alone.</p>

  <h3 class="subsec-head">The remaining reductions</h3>

  <ul>
    <li><strong>\(L = \pm\infty\).</strong> The same splitting works with the bound “within \(\varepsilon\) of \(L\)” replaced by “eventually larger than any fixed \(M\)”: if \(f'/g' \to +\infty\), then for \(x\) near \(a\) the ratio \((f(x)-f(d))/(g(x)-g(d))\) exceeds any \(M\), and the correction terms, tending to \(0\) and \(1\), leave \(f(x)/g(x) \to +\infty\).</li>
    <li><strong>\(a = \pm\infty\).</strong> Substitute \(x = 1/t\), so \(x \to +\infty\) becomes \(t \to 0^{+}\). Writing \(F(t) = f(1/t)\) and \(G(t) = g(1/t)\), the chain rule gives \(F'(t)/G'(t) = f'(1/t)/g'(1/t)\) — the \(-1/t^{2}\) factors cancel — so the hypothesis on \(f'/g'\) at \(\infty\) becomes the same hypothesis on \(F'/G'\) at \(0^{+}\). The reduction then follows the form: if the original limit is \(\tfrac{0}{0}\), then \(F, G \to 0\) and the finite-point \(\tfrac{0}{0}\) proof of §5.7 applies to \(F/G\) at \(0^{+}\); if it is \(\tfrac{\ast}{\infty}\), then \(G \to \pm\infty\) and the finite-point \(\tfrac{\ast}{\infty}\) proof above applies. The case \(a = -\infty\) uses \(x = -1/t\).</li>
  </ul>

  <p>With these, Theorem 5.5 holds in full generality: the \(\tfrac{0}{0}\) case from §5.7 and the \(\tfrac{\ast}{\infty}\) and infinite-point cases here, at a finite endpoint or at \(\pm\infty\).</p>

</article>

    "epsilon-delta-dynamic": () => {

  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach((el) => {
      const def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      const { layout, panels } = def();
      let html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = `<div class="figure-art">${panels[0].svg}</div>`;
      } else {
        const cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = `<div class="figure-art ${cls}">` +
          panels.map((p) => `<div class="fig-panel">${p.svg}${p.note ? `<div class="fig-note">${p.note}</div>` : ""}</div>`).join("") +
          `</div>`;
      }
      el.insertAdjacentHTML("afterbegin", html);

      /* Connect per-figure CSS width variables (--fig-1-1 … --fig-1-25)
         defined in :root to this figure's --fig-w so the control panel
         actually takes effect. */
      const figNo = el.querySelector(".fig-no");
      if (figNo) {
        const m = figNo.textContent.match(/Figure\s+(\d+)\.(\d+)/);
        if (m) el.style.setProperty("--fig-w", `var(--fig-${m[1]}-${m[2]})`);
      }

      el.dataset.figDone = "1";
    });
  }

  window.hydrateFigures = hydrateFigures;

  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var shouldBreakBefore = function(block) {
    return block.classList && block.classList.contains("page-break-before") && body.childElementCount > 0;
  };
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    if (shouldBreakBefore(block)) newSheet();
    body.appendChild(block);
    if (fits()) {
      /* ── Orphan heading prevention ──────────────────────────
         After placing a heading that fits, check whether enough
         room remains for content below it. If the remaining space
         is too small, move the heading to a fresh page so it stays
         with its following content — never stranded at the bottom. */
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        /* Major section headers need more room; minor headings less */
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    /* ── Figure shrink-to-fit ──────────────────────────────────
       When a figure *almost* fits the remaining page space,
       scale the .figure-art only (≥55 %) — caption stays full size.
       Measure art/caption while block is still in the DOM.       */
    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      /* Probe the actual insertion point to account for preceding margins */
      var _probe = document.createElement("div");
      _probe.style.height = "0";
      _probe.style.margin = "0";
      _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;  /* top/bottom margins + gaps */
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em";
        block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;           /* success — art shrunk, caption full size */
        body.removeChild(block);      /* revert and fall through */
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt;
        block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
</body>
