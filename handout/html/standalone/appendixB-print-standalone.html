    <h2 class="sec-title"><span class="sec-no">B.6</span>Writing a Proof</h2>
  </header>

  <p>Every section so far has put somebody else’s mathematics in front of you and asked what it was doing. Now the page is blank and the proof is yours. The skills do not change. You still take the statement apart, choose a shape, watch the quantifiers, but they run in the other direction, and one new difficulty appears with them: what you discover and what you write down are not the same thing.</p>

  <p>A proof is not a transcript of everything you tried. It is a carefully arranged argument showing why the conclusion follows from the hypotheses. The false starts, the case that ate an hour before it collapsed, the algebra done three times: none of it belongs on the page, however hard it was won. Discovery is allowed to be a mess; presentation is not. Nearly every beginner’s proof confuses the two in one direction or the other: either the page becomes a diary of the search, or — far more often — the search is so vivid in the author’s mind that half of it never reaches the page at all.</p>

  <p>It is worth saying plainly what rigor asks of you, because it is less than most beginners fear and more than most beginners supply. Rigor does not mean writing out every arithmetic step; a reader who can be trusted with \(6k = 3(2k)\) can be trusted to do it silently. It means that every step doing real logical work carries a reason. The test is never length. The test is whether a stranger can check you, and a stranger cannot, if they must guess the range of a variable, the meaning of a symbol, the definition you unpacked, or the direction in which an implication was used.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.6</span><span class="env-name">From statement to proof</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><strong>Rewrite the statement.</strong> Mark the quantifiers, name the hypothesis, name the conclusion: the work of Strategy B.1. Until you can say what you are given and what you must show, there is nothing to plan.</li>
        <li><strong>Unpack the definitions.</strong> Turn every defined word (<em>even</em>, <em>divisible</em>, <em>rational</em>, <em>prime</em>) into the condition it abbreviates. Definitions are where a proof gets its handles: a word you have not unpacked is a door you have not tried.</li>
        <li><strong>Choose a shape.</strong> Direct first (§B.2). If the hypothesis is awkward to use, or the conclusion is itself a denial, try contraposition or contradiction. If the claim is indexed by \(n = 1, 2, 3, \ldots\), try induction, though a claim can range over every \(n\) and still want some other shape, as Proposition B.5 does. If it asserts that something exists, plan to build it.</li>
        <li><strong>Write a skeleton.</strong> Before any real content, put down the lines you already know: what is fixed, what is assumed, what must be shown, and the sentence that will end it. If you can already see the key claim the argument will have to pass through, add that too. The unknown part of the proof is now a gap of known size.</li>
        <li><strong>Fill every logical gap.</strong> Work through the skeleton giving each step its warrant: a definition, a hypothesis, a result already known, or an earlier line. This is the first habit of Strategy B.5, turned on your own writing.</li>
        <li><strong>Revise for the reader.</strong> Cut what you tried and abandoned, supply what you know and never said. Strategy B.7 is the checklist.</li>
      </ol>
      <p class="informal">Steps 1–4 involve no proving at all. You can plan a proof before you can prove it, and should: the usual alternative is to start writing at the top of the page and hope the argument arrives before the bottom, which is how proofs pick up their worst habit, helping themselves at line one to what is not earned until line ten.</p>
    </div>
  </section>

  <p>The arrangements below cover most of what you will be asked to write, and each has a skeleton worth knowing by heart. They are not forms to fill in — the mathematics still has to be yours — but they settle the shape of the page, which frees your attention for the argument.</p>

  <p><strong>A universal implication.</strong> The commonest task of all: prove that <em>for every \(x\) in \(S\), if \(P(x)\), then \(Q(x)\)</em>. Here \(S\) is whatever collection the claim ranges over (the integers, say) while \(P(x)\) and \(Q(x)\) are the \(P\) and \(Q\) of §B.1, now written with the object they speak about; and \(x \in S\), in the skeleton below, is the usual shorthand for <em>\(x\) is in \(S\)</em>. The skeleton runs</p>

  <ol class="steps">
    <li>Let \(x \in S\) be arbitrary.</li>
    <li>Assume \(P(x)\).</li>
    <li>&hellip; (the argument) &hellip;</li>
    <li>Therefore \(Q(x)\).</li>
    <li>Since \(x\) was arbitrary, the claim holds for every \(x \in S\).</li>
  </ol>

  <p>The first line carries more weight than it appears to. <em>Arbitrary</em> means you are forbidden to choose: you take whatever \(x\) you are handed, and may use nothing about it beyond its membership in \(S\) and the hypothesis \(P(x)\). A proof that quietly helps itself to a convenient \(x\) (an even one, a positive one, a small one) has proved something, but not the claim. The last line is not a flourish either. It is the step that converts one anonymous case into all of them, and it is worth writing precisely because it reminds you to check that you earned it.</p>

  <p><strong>An existence claim.</strong> To prove that <em>there exists an \(x\) in \(S\) with \(P(x)\)</em>, the direct route — and the one to try first — is to hand the reader an object:</p>

  <ol class="steps">
    <li>Let \(x = \cdots\) (or: define \(x\) by \(\cdots\)).</li>
    <li>Then \(x \in S\), because &hellip;</li>
    <li>And \(P(x)\) holds, because &hellip;</li>
    <li>Hence such an \(x\) exists.</li>
  </ol>

  <p>The object you produce is called a <em>witness</em>. Note that it must be checked twice (a witness has to lie in \(S\), and it has to do the job) and that skipping the first check is the standard error. Where the witness came from is nobody’s business: you may have found it by trial, by symmetry, or by luck, and none of that need appear. That it works must appear. &ldquo;Clearly such an \(x\) exists&rdquo; is not an existence proof; it is a promise to write one. (An indirect route exists too: assume that nothing in \(S\) satisfies \(P\), and derive an impossibility. That is §B.2’s contradiction, pointed at an existence claim. It settles that some \(x\) is there without ever saying which, which is why you produce a witness whenever you can.)</p>

  <p><strong>Contraposition, or contradiction.</strong> Two ways of reaching a claim without attacking it head-on, and it matters that you do not blur them. They differ in what the outer argument aims at. To prove <em>if \(P\), then \(Q\)</em> <em>by contraposition</em>, aim at <em>not \(P\)</em>:</p>

  <ol class="steps">
    <li>Assume <em>not \(Q\)</em>.</li>
    <li>&hellip; (the argument) &hellip;</li>
    <li>Therefore <em>not \(P\)</em>.</li>
    <li>That proves the contrapositive, and the contrapositive is the original claim in other words (§B.1).</li>
  </ol>

  <p>Notice that there is no contradiction anywhere in that skeleton, and, for that matter, nothing indirect about the reasoning either. What you have written is a plain direct chain. The indirectness of a contraposition is in <em>what</em> it establishes, not in <em>how</em>: you never laid a finger on the original claim, you proved a different sentence and let §B.1 carry the result across. That is also why the roster of §B.2 stops at five. A contraposition is not a sixth shape, but the first shape aimed at the equivalent sentence.</p>

  <p>To prove that same <em>if \(P\), then \(Q\)</em> <em>by contradiction</em>, aim instead at an impossibility:</p>

  <ol class="steps">
    <li>Suppose the claim fails, that is, suppose \(P\) holds and \(Q\) does not.</li>
    <li>&hellip; (the argument) &hellip;</li>
    <li>But that contradicts <em>(name it)</em>.</li>
    <li>So the claim cannot fail, and therefore it holds.</li>
  </ol>

  <p>Step 1 is where beginners slip, so take it slowly. §B.1 called a theorem a promise; ask what would break this one, and the answer is that \(P\) would have to hold while \(Q\) failed: nothing else would do it. That is Strategy B.3’s second step, its kernel rule, filled in for an implication. And if the claim carries a <em>for every \(x\) in \(S\)</em> in front of it, as the first skeleton did, then Strategy B.3’s first step flips that quantifier as well, and the negation hands you something sharper: <em>one</em> \(x\) in \(S\) for which \(P(x)\) holds and \(Q(x)\) fails. That \(x\) is then what you argue about. Step 3 is the other place to be careful, because &ldquo;this is absurd&rdquo; is not a contradiction. Name what it collides with: a hypothesis, a known fact, or an earlier line.</p>

  <p>The tell, then, is what the outer argument ends with: a contraposition ends with <em>not \(P\)</em> and stops, while a contradiction ends by naming a collision. Either may have anything you please nested inside it (§B.2 noted that shapes combine, and a contraposition whose inner step runs by contradiction is still a contraposition) but the outer aim is one or the other, and your reader needs to know which. Proposition B.1 is the first of these, once you recall the double duty §B.2 pointed out: its direct proof of <em>if \(n\) is odd, then \(n^{2}\) is odd</em> is, read the other way round, a contraposition of <em>if \(n^{2}\) is even, then \(n\) is even</em>. Proposition B.2 is the second. Read the two side by side if the distinction is not yet crisp. Announcing &ldquo;suppose, for contradiction&rdquo; over an argument that merely derives <em>not \(P\)</em> from <em>not \(Q\)</em> is confusing; announcing a contradiction and never naming the contradiction is worse than confusing, because then nothing has been established at all.</p>

  <p>For induction there is a skeleton too, but you have already seen it laid out: the proof of Proposition B.4 names its base case, states its inductive hypothesis in full, and derives the case \(k + 1\) from the case \(k\), in that order. Copy that arrangement. The one rule beginners break is to invoke induction before both parts are done: a base case with no step, or a step with no base case, proves nothing whatever.</p>

  <p>Enough skeletons. The best way to see what separates a draft from a proof is to watch one become the other, so we take a claim you have already met and write it up three times over.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.7</span></p>
      <div class="env-body">
        <p>Write a proof of the statement §B.1 opened with: <em>every integer divisible by \(6\) is divisible by \(3\).</em> Show the planning, a first attempt, and the finished proof.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <ul class="sol-list">
          <li><strong>Planning notes.</strong> These are for you alone, and they are allowed to look like this: <em>Universal implication, one quantifier: for every integer \(n\), if \(n\) is divisible by \(6\) then it is divisible by \(3\). Unpack: divisible by \(6\) means \(n = 6k\), some integer \(k\). Want \(n = 3 \cdot (\text{integer})\). But \(6k = 3 \cdot 2k\). Direct proof; nothing else needed.</em> Scribbled in under a minute, and the proof is already decided: that was the planning half of Strategy B.6, and no proving happened anywhere in it.</li>
          <li><strong>A weak draft.</strong> A first attempt often comes out like this: &ldquo;\(n = 6k\), so \(n = 3(2k)\), done.&rdquo; Every symbol in it is true, and it would earn very little. Where did \(n\) come from? Is it one integer or every integer? Where did \(6k\) come from? The reader is left to supply the definition of divisibility unaided. Why does \(n = 3(2k)\) finish the matter? The reader must know both that \(2k\) is an integer and that this is precisely what it means to be divisible by \(3\). The algebra is right and the argument is missing. This draft is not a bad discovery; it is a bad presentation of a good one.</li>
          <li><strong>The revised proof.</strong> Let \(n\) be an integer, and suppose \(n\) is divisible by \(6\). By the definition of divisibility, there is an integer \(k\) with \(n = 6k\). Then
          \[ n = 6k = 3(2k), \]
          and \(2k\) is an integer, so \(n\) is \(3\) times an integer, which is what it means for \(n\) to be divisible by \(3\). Since \(n\) was an arbitrary integer divisible by \(6\), every integer divisible by \(6\) is divisible by \(3\).</li>
        </ul>
        <p>Count the lines. The finished proof is four sentences where the draft was one, and none of the difference is padding: it supplies the range of \(n\), the definition being unpacked, the reason \(3(2k)\) settles the question, and the step from one \(n\) to all of them. Each is something the reader cannot be asked to supply. This is the whole lesson of the section in one example. A rigorous proof is seldom much longer than a sloppy one. It is the same argument with its reasons attached.</p>
      </div>
    </section>
  </div>

  <p>That example had a single skeleton. More often two are nested, and the next one shows the commonest pairing: a universal claim on the outside whose conclusion is an existence claim on the inside.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.8</span></p>
      <div class="env-body">
        <p>Prove that the sum of two rational numbers is rational. (Recall that a number is <em>rational</em> when it can be written as a ratio \(a/b\) of integers with \(b \neq 0\) — the notion that Proposition B.2 showed \(\sqrt{2}\) escapes.)</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Plan first. The claim is universal on the outside: for all rational \(r\) and \(s\). Its conclusion, <em>\(r + s\) is rational</em>, unpacks into an existence claim: there is a ratio of integers, with nonzero denominator, equal to \(r + s\). So the outer skeleton fixes an arbitrary \(r\) and \(s\), and the inner skeleton owes a witness.</p>
        <p>Let \(r\) and \(s\) be rational numbers. By the definition of a rational number there are integers \(a, b\) with \(b \neq 0\) and \(r = a/b\), and integers \(c, d\) with \(d \neq 0\) and \(s = c/d\). Putting the two over a common denominator,
        \[ r + s = \frac{a}{b} + \frac{c}{d} = \frac{ad + bc}{bd}. \]
        The witness is the fraction \((ad + bc)/(bd)\), and it must now be checked rather than merely displayed. Its numerator \(ad + bc\) is an integer, being a sum of products of integers. Its denominator \(bd\) is an integer for the same reason, and \(bd \neq 0\), because a product of two nonzero integers is nonzero and both \(b \neq 0\) and \(d \neq 0\). So \(r + s\) is a ratio of integers with nonzero denominator, that is, \(r + s\) is rational. Since \(r\) and \(s\) were arbitrary rationals, the sum of any two rational numbers is rational.</p>
        <p>The clause beginners drop is \(bd \neq 0\). It is one line, it is easy, and it is exactly the difference between exhibiting a candidate and verifying a witness: without it we have produced an expression, not a rational number. Notice also where the hypotheses went. The conditions \(b \neq 0\) and \(d \neq 0\) arrived with the definition and did their work in that single clause, and nowhere else. Strategy B.5 taught you to hunt for the line where each hypothesis earns its place when reading; when writing, you are the one who must put it there.</p>
      </div>
    </section>
  </div>

  <p>So much for proofs that work. It is at least as instructive to take apart three that do not. The first two argue for claims that are perfectly true, which is what makes them worth the trouble: an invalid argument for a true statement is the hardest kind of error to see, because nothing at the end looks wrong. The third goes wrong the other way round.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.9</span></p>
      <div class="env-body">
        <p>A student offers the argument below. Find the first step that does not follow, say why, and repair the proof if the claim can be saved.</p>
        <p><em>Claim.</em> For every integer \(n\), if \(n^{2}\) is even, then \(n\) is even.</p>
        <p><em>Proposed proof.</em> If \(n\) is even, then \(n^{2}\) is even. Since \(n^{2}\) is even, \(n\) is even.</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The claim is true (it is the statement dissected in Example B.1) and that is exactly what makes the argument dangerous. It arrives at a correct conclusion by a route that is not allowed.</p>
        <p>The first sentence is unobjectionable, and it is true. Example B.1 flagged it as a separate fact needing its own proof, and that proof is one line: if \(n\) is even then \(n = 2k\) for some integer \(k\), so \(n^{2} = 2(2k^{2})\), which is twice an integer and therefore even. The second sentence is where the argument fails. It takes &ldquo;if \(n\) is even, then \(n^{2}\) is even&rdquo;, receives \(n^{2}\) even, and concludes \(n\) even, traveling the implication backwards, from \(Q\) to \(P\). What that step needs is the <em>converse</em>, &ldquo;if \(n^{2}\) is even, then \(n\) is even&rdquo;, which §B.1 warned is a separate claim requiring its own proof. And it is not just any separate claim: it is the very statement we were asked to prove. The argument assumes what it set out to establish.</p>
        <p>The claim can be saved, and §B.2 already saved it. Prove the contrapositive instead (<em>if \(n\) is odd, then \(n^{2}\) is odd</em>), which is Proposition B.1, proved there directly in three lines. A statement and its contrapositive are logically equivalent, so that proof settles this claim. Notice how little the repair costs and how much it changes: the same two facts about parity, arranged so that every arrow points the way it is used.</p>
        <p>The lesson generalizes past this example. An implication is a one-way street (§B.5). When you have \(Q\) in hand and want \(P\), no theorem of the form \(P \Rightarrow Q\) will carry you there. You need the converse, and the converse has to be earned.</p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.10</span></p>
      <div class="env-body">
        <p>The same request for the argument below.</p>
        <p><em>Claim.</em> For every integer \(n\), the number \(n^{2} + n\) is even.</p>
        <p><em>Proposed proof.</em> \(1^{2} + 1 = 2\), \(2^{2} + 2 = 6\), and \(3^{2} + 3 = 12\) are all even. So \(n^{2} + n\) is even for every integer \(n\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Once again the claim is true (it is Proposition B.3) and once again the argument does not prove it.</p>
        <p>Three integers were checked. The claim ranges over every integer, of which there are infinitely many, and no finite list exhausts them. What the computation supplies is <em>evidence</em>: a good reason to believe the claim, and trying small cases before proving anything is a habit worth keeping. It is the third habit of Strategy B.5. But evidence is not proof. The distance between &ldquo;true in the cases I tried&rdquo; and &ldquo;true in all cases&rdquo; is precisely the distance a proof exists to cross, and here nothing crosses it. Had the three cases been the only integers, the argument would have been complete; the flaw is not the method but the mismatch between three objects and infinitely many.</p>
        <p>Compare Proposition B.3, which proves this claim by splitting into the cases \(n\) even and \(n\) odd. That argument reaches every integer at once, and it does so because the two cases <em>together cover all of them</em>: completeness of the split, not a longer list of examples, is what does the work. Two well-chosen cases beat three thousand well-checked ones.</p>
        <p>The asymmetry here is worth carrying away: short of checking every object the claim ranges over — and over the integers you never can — no number of confirming examples establishes a <em>for all</em>, while a single counterexample destroys one (§B.2). Examples are decisive when they refute; when they confirm, they are evidence, and over the integers never more than that.</p>
      </div>
    </section>
  </div>

  <p>Those two reached true claims by routes that were not open to them. The last of the three reverses the arrangement: every step it puts on the page is valid, and the claim is false.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">B.11</span></p>
      <div class="env-body">
        <p>The same request once more.</p>
        <p><em>Claim.</em> For every positive integer \(n\),
        \[ 1 + 2 + \cdots + n = \frac{n^{2} + n + 2}{2}. \]</p>
        <p><em>Proposed proof.</em> Suppose the formula holds for some positive integer \(k\), so that \(1 + 2 + \cdots + k = \frac{k^{2} + k + 2}{2}\). Adding \(k + 1\) to both sides,
        \[ 1 + 2 + \cdots + k + (k + 1) = \frac{k^{2} + k + 2}{2} + (k + 1) = \frac{k^{2} + 3k + 4}{2}, \]
        which is the formula with \(n = k + 1\), since \((k + 1)^{2} + (k + 1) + 2 = k^{2} + 3k + 4\). So the formula holds for every positive integer \(n\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Read the inductive step as closely as you like; it will not crack. Adding \(k + 1\) to \(\frac{k^{2} + k + 2}{2}\) really does give \(\frac{k^{2} + 3k + 4}{2}\), and that really is what the formula returns at \(n = k + 1\). The algebra is sound, every implication runs the way it is used. The first and fifth habits of Strategy B.5 pass it without a murmur.</p>
        <p>The flaw is not in a line that was written. It is in a line that was never written: there is no base case, and this formula has none to be found. At \(n = 1\) the left side is \(1\) while the right side is \(\frac{1 + 1 + 2}{2} = 2\). The dominoes are standing in a row, each one leaning on the next, and nobody ever pushed the first.</p>
        <p>Set the claim beside Proposition B.4, which proves \(1 + 2 + \cdots + n = \frac{n(n + 1)}{2}\) for the very same sum:
        \[ \frac{n^{2} + n + 2}{2} = \frac{n(n + 1)}{2} + 1. \]
        The formula is the true one plus \(1\), so it fails not merely at \(n = 1\) but at every \(n\) there is. No inductive step could have caught that, and catching it was never the step’s job: the step says only <em>if here, then next</em>, and a formula uniformly one too large keeps that promise perfectly. Only the base case asks whether the chain is fastened to anything. Nor is there anything here to repair, which is where this example parts company with the other two: they were true claims with broken arguments, and this is a false claim. Proposition B.4 already holds the true formula.</p>
        <p>Hence the rule stated when the skeletons were laid out, and worth restating now that you have watched it break: an induction has two parts, and a step with no base case proves nothing whatever. Of the three failures in this section it is the easiest to commit and the hardest to catch by inspection, because there is no bad line in the step to find. Count the parts of an induction before you check its algebra.</p>
      </div>
    </section>
  </div>

  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The subtlest way to break a proof is to assume, somewhere in the middle, the very thing being proved. It seldom looks as blunt as Example B.9; more often it slips in through notation, as when a proof about an unspecified integer \(n\) opens &ldquo;let \(n = 2k\)&rdquo;: a perfectly good line once you know \(n\) is even, and a fatal one while that is still the conclusion. Ask it of every assumption you write: was I <em>given</em> this, or do I <em>want</em> it? A step you want is a step you have yet to earn.</p>
    </div>
  </section>

  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Pause</span></p>
    <div class="env-body">
      <p>Two short claims to write up now, before you read on. Both use a skeleton from the pages above, and for both the skeleton is named for you. The work here is in the writing, not in finding the idea.</p>
      <ol class="steps">
        <li>Prove: <em>if \(a\) and \(b\) are even integers, then \(a + b\) is even.</em> A universal implication: use the first skeleton, and unpack <em>even</em> before you do anything else.</li>
        <li>Prove: <em>for every integer \(n\), there is an integer strictly between \(n\) and \(n + 2\).</em> An existence claim inside a <em>for all</em>: fix an arbitrary \(n\), then produce a witness and check it.</li>
      </ol>
      <p>Write both before reading on. The checklist that follows is what you will run over them, and it is worth arriving at with something of your own in hand.</p>
    </div>
  </section>

  <p>Your draft is written. Now read it as a stranger would, which is a different act from proofreading it: you are not hunting typos but checking whether the argument in your head actually reached the page. The list below is short, and every item on it is a question a reader will ask.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">B.7</span><span class="env-name">Revising your proof</span></p>
    <div class="env-body">
      <ol class="steps">
        <li><strong>Is every variable’s range on the page, and is it clear what is arbitrary?</strong> A reader who cannot tell whether \(n\) is one integer or every integer cannot check a single line that follows.</li>
        <li><strong>Is every definition you leaned on unpacked?</strong> If a word such as <em>even</em> or <em>rational</em> does real work, the condition it abbreviates should appear where it does that work.</li>
        <li><strong>Does every step doing logical work carry a reason?</strong> A definition, a hypothesis, a known result, or an earlier line. <em>Obviously</em> and <em>clearly</em> are not reasons; wherever one appears, either supply the reason or cut the step.</li>
        <li><strong>Is each hypothesis used, and can you point to where?</strong> An unused hypothesis means one of two things, and both are worth knowing: you have proved something stronger than the claim, or you have overlooked something.</li>
        <li><strong>Does every implication run the way you needed it to?</strong> Mark the arrows. A step read backwards is the commonest fatal error there is, and the hardest to catch in your own writing.</li>
        <li><strong>If you claimed existence, did you settle it one way or the other?</strong> If you argued directly, that means producing a witness and running both checks on it: that the object lies in the set, and that it does what was asked. If you argued indirectly, it means negating the existence claim correctly and naming the contradiction you reached.</li>
        <li><strong>If you argued by contradiction, did you name the contradiction?</strong> &ldquo;This is absurd&rdquo; is not a collision. Say which two facts cannot both hold.</li>
        <li><strong>Does your last sentence establish exactly the claim as stated?</strong> Not something near it, and not its converse.</li>
        <li><strong>Can any sentence go without breaking the argument?</strong> If so, let it go. Length is not rigor, and a shorter proof is a proof more people will finish checking.</li>
      </ol>
      <p class="informal">A first draft discovers the argument; revision makes the argument inspectable.</p>
    </div>
  </section>

  <p>Run that list over the two proofs from the Pause above, and then — only then — here are two things to look for, one in each. On the first: what did you call the two even integers? If both came out as \(2k\), you have proved something true but far smaller than the claim, namely that \(a + b\) is even whenever \(a = b\). Two independent objects need two independent names. On the second: did you do more than write down \(n + 1\)? A witness is not verified until you have said why it is an integer and why it lies strictly between \(n\) and \(n + 2\) — item 6, and the item that catches the most first drafts there are.</p>

  <p>Reading and writing proofs are one skill practiced in opposite directions, and the questions do not change when you turn around. §B.5 asked you to find the warrant for every line, locate each hypothesis, and watch the arrows in somebody else’s argument; Strategy B.7 asks exactly that of your own. This is why the two directions belong together: what makes a proof checkable is what makes it writable, and an author who cannot read their own page as a stranger would has no way of knowing whether the argument arrived. Rigor, in the end, is the discipline of leaving nothing load-bearing unsaid: of writing so that someone who does not already believe you, and who cannot ask you what you meant, can rebuild the argument line by line and see for themselves that it holds. That is a craft rather than a talent, and like any craft it is built by writing something, finding out what a reader could not follow, and writing it again.</p>

          aria: "Graph of (x minus 1) over (x squared minus 1), which equals 1 over (x plus 1) except at x = 1, where there is an open hole at height one half.",
          xticks: [{ x: 1, tex: "1" }],
          yticks: [{ y: 0.5, tex: "\\tfrac{1}{2}" }],
          items: [
            { type: "hline", y: 0.5, from: -0.4, to: 1, cls: "refline" },
            { type: "vline", x: 1, cls: "refline" },
            { type: "curve", fn: (x) => 1 / (x + 1), domain: [-0.35, 0.97], samples: 120, cls: "curve" },
            { type: "curve", fn: (x) => 1 / (x + 1), domain: [1.03, 2.7], samples: 120, cls: "curve" },
            { type: "dot", x: 1, y: 0.5, hollow: true },
            { type: "text", x: 2.6, y: 0.62, tex: "y=\\tfrac{x-1}{x^{2}-1}", cls: "a-curve", anchor: "end" },
          ],
        }),
      }],
    }),

    /* §1.6 — ε→δ dynamic: shrink the ε-strip, the responding δ-band shrinks too
       (Figure 1.25). f(x)=2x-1 at a=3, L=5, δ=ε/2 (the §1.6 worked example).
       Two panels at the same window; companion to the static Figure 1.24
       (figure-opportunity audit 2026-06-21). */
    "epsilon-delta-dynamic": () => {
      const f = (x) => 2 * x - 1, a = 3, L = 5;
      const win = { w: 240, h: 220, xmin: 2.3, xmax: 3.7, ymin: 3.6, ymax: 6.4, pad: { t: 12, r: 12, b: 22, l: 26 } };
      const panel = (eps, note) => {
        const d = eps / 2;
        return {
          svg: buildPlot(Object.assign({}, win, {
            aria: "Epsilon-delta box for f of x equals 2x minus 1 at a equals 3: a horizontal strip of half-height epsilon and a vertical band of half-width delta equal to epsilon over 2.",
            xticks: [{ x: a, tex: "a" }],
            yticks: [{ y: L, tex: "L" }],
            items: [
              { type: "hline", y: L + eps, cls: "refline" },
              { type: "hline", y: L - eps, cls: "refline" },
              { type: "vline", x: a - d, cls: "refline" },
              { type: "vline", x: a + d, cls: "refline" },
              { type: "curve", fn: f, domain: [2.3, 3.7], cls: "curve" },
              { type: "dot", x: a, y: L },
            ],
          })),
          note: note,
        };
      };
      return {
        layout: "pair",
        panels: [panel(1, "ε = 1,  δ = ½"), panel(0.4, "ε = 0.4,  δ = 0.2")],
      };
    },

  };

  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach((el) => {
      const def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      const { layout, panels } = def();
      let html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = `<div class="figure-art">${panels[0].svg}</div>`;
      } else {
        const cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = `<div class="figure-art ${cls}">` +
          panels.map((p) => `<div class="fig-panel">${p.svg}${p.note ? `<div class="fig-note">${p.note}</div>` : ""}</div>`).join("") +
          `</div>`;
      }
      el.insertAdjacentHTML("afterbegin", html);

      /* Connect per-figure CSS width variables (--fig-1-1 … --fig-1-25)
         defined in :root to this figure's --fig-w so the control panel
         actually takes effect. */
      const figNo = el.querySelector(".fig-no");
      if (figNo) {
        const m = figNo.textContent.match(/Figure\s+(\d+)\.(\d+)/);
        if (m) el.style.setProperty("--fig-w", `var(--fig-${m[1]}-${m[2]})`);
      }

      el.dataset.figDone = "1";
    });
  }

  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Appendix B",
  runningHead: "Appendix B · Reading and Writing Proofs",
  fragments: ["sec-b-1", "sec-b-2", "sec-b-3", "sec-b-4", "sec-b-5", "sec-b-6"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var shouldBreakBefore = function(block) {
    return block.classList && block.classList.contains("page-break-before") && body.childElementCount > 0;
  };
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    if (shouldBreakBefore(block)) newSheet();
    body.appendChild(block);
    if (fits()) {
      /* ── Orphan heading prevention ──────────────────────────
         After placing a heading that fits, check whether enough
         room remains for content below it. If the remaining space
         is too small, move the heading to a fresh page so it stays
         with its following content — never stranded at the bottom. */
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        /* Major section headers need more room; minor headings less */
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    /* ── Figure shrink-to-fit ──────────────────────────────────
       When a figure *almost* fits the remaining page space,
       scale the .figure-art only (≥55 %) — caption stays full size.
       Measure art/caption while block is still in the DOM.       */
    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      /* Probe the actual insertion point to account for preceding margins */
      var _probe = document.createElement("div");
      _probe.style.height = "0";
      _probe.style.margin = "0";
      _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;  /* top/bottom margins + gaps */
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em";
        block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;           /* success — art shrunk, caption full size */
        body.removeChild(block);      /* revert and fall through */
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt;
        block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
