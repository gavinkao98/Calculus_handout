<article class="sec" lang="en">

  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">6.5</span>The Substitution Rule</h2>
  </header>

  <!-- expansion:intuition — section opener: the table antidifferentiates only bare derivatives; substitution reverses the chain rule to handle an inner function -->
  <p>The table of §6.4 antidifferentiates a function only when it recognizes it as some derivative written plainly. But most integrands wear a disguise: an inner function tucked inside another, the fingerprint of the chain rule. To integrate \(\int 2x\sqrt{1 + x^{2}}\,dx\) there is no table entry — yet the \(2x\) is exactly the derivative of the inside \(1 + x^{2}\), and that is no accident. Running the chain rule backwards strips the disguise. The technique is <em>substitution</em>, and it is the single most useful method of integration.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">6.6</span><span class="env-name">The Substitution Rule</span></p>
    <div class="env-body">
      <p>If \(u = g(x)\) is differentiable and \(f\) is continuous on the range of \(g\), then</p>
      <p>\[ \int f\bigl(g(x)\bigr)\,g'(x)\,dx = \int f(u)\,du. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Let \(F\) be an antiderivative of \(f\), so \(F' = f\). By the chain rule (Theorem 3.3),</p>
      <p>\[ \frac{d}{dx}\,F\bigl(g(x)\bigr) = F'\bigl(g(x)\bigr)\,g'(x) = f\bigl(g(x)\bigr)\,g'(x). \]</p>
      <p>So \(F(g(x))\) is an antiderivative of \(f(g(x))\,g'(x)\), which means \(\int f(g(x))\,g'(x)\,dx = F(g(x)) + C\). On the other side, \(\int f(u)\,du = F(u) + C\), and substituting \(u = g(x)\) turns this into \(F(g(x)) + C\) as well. The two are equal. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <p>In practice the rule is applied through the differential notation of §5.3. Setting \(u = g(x)\) gives \(du = g'(x)\,dx\), and the rule reads as the literal replacement of \(g(x)\) by \(u\) and of \(g'(x)\,dx\) by \(du\). The art is entirely in the choice of \(u\): pick an inner function whose derivative is also present, up to a constant factor.</p>

  <section class="env env-strategy">
    <p class="env-head"><span class="env-kicker">Strategy</span><span class="env-num">6.2</span><span class="env-name">Integration by substitution</span></p>
    <div class="env-body">
      <p>To evaluate an integral by substitution:</p>
      <ol class="steps">
        <li>Choose \(u = g(x)\) — usually an inner function whose derivative \(g'(x)\) also appears in the integrand, up to a constant multiple.</li>
        <li>Compute \(du = g'(x)\,dx\) and rewrite the <em>entire</em> integral in terms of \(u\); every \(x\), the \(dx\) included, must disappear. If it cannot, the choice of \(u\) was wrong.</li>
        <li>Integrate in \(u\) using the table.</li>
        <li>For an indefinite integral, back-substitute \(u = g(x)\). For a definite integral, either back-substitute, or convert the limits to \(u = g(a)\) and \(u = g(b)\) and finish in \(u\) — never leave \(x\)-limits on a \(u\)-integrand.</li>
      </ol>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">6.17</span></p>
      <div class="env-body">
        <p>Find \(\displaystyle\int 2x\sqrt{1 + x^{2}}\,dx\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The inside of the square root is \(1 + x^{2}\), and its derivative \(2x\) stands ready in the integrand. Put \(u = 1 + x^{2}\), so \(du = 2x\,dx\). The integral becomes one the table knows:</p>
        <p>\[ \int 2x\sqrt{1 + x^{2}}\,dx = \int \sqrt{u}\,du = \frac{2}{3}u^{3/2} + C = \frac{2}{3}\bigl(1 + x^{2}\bigr)^{3/2} + C. \]</p>
        <p>Differentiating the answer returns \(2x\sqrt{1 + x^{2}}\), confirming it. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">6.18</span></p>
      <div class="env-body">
        <p>Find \(\displaystyle\int x^{2}\bigl(x^{3} + 1\bigr)^{5}\,dx\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Take \(u = x^{3} + 1\), the inner function; then \(du = 3x^{2}\,dx\). The integrand offers \(x^{2}\,dx\), not \(3x^{2}\,dx\), but the constant is easily supplied: \(x^{2}\,dx = \tfrac{1}{3}\,du\). So</p>
        <p>\[ \int x^{2}\bigl(x^{3} + 1\bigr)^{5}\,dx = \frac{1}{3}\int u^{5}\,du = \frac{1}{3}\cdot\frac{u^{6}}{6} + C = \frac{\bigl(x^{3} + 1\bigr)^{6}}{18} + C. \]</p>
        <p>Only a <em>constant</em> factor may be moved across the integral sign in this way; a missing factor of \(x\) could not be, and would signal a poor choice of \(u\). <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:example [pass: enrichment] [source: mode-c example-supplement gate 2026-07-11 — Layer-2: substitution whose output is a logarithm (∫f'/f=ln|f|), reinforcing the §6.4 ln|x| export; reuses the book's own u=1+x²; authored stem+solution, APEX 06_01 f'/f family corroborates] -->
  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">6.19</span></p>
      <div class="env-body">
        <p>Find \(\displaystyle\int \frac{2x}{1 + x^{2}}\,dx\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The derivative of the denominator is \(2x\), exactly the numerator — the fingerprint of a substitution whose result is a logarithm rather than a power. Put \(u = 1 + x^{2}\), so \(du = 2x\,dx\), and the integral becomes \(\int \tfrac{1}{u}\,du\):</p>
        <p>\[ \int \frac{2x}{1 + x^{2}}\,dx = \int \frac{du}{u} = \ln\lvert u\rvert + C = \ln\bigl(1 + x^{2}\bigr) + C, \]</p>
        <p>where the absolute value is dropped because \(1 + x^{2} > 0\) throughout. This is the pattern \(\int \dfrac{f'(x)}{f(x)}\,dx = \ln\lvert f(x)\rvert + C\): when the numerator is the derivative of the denominator, substitution collapses the integral to the logarithm introduced in §6.4. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Substitution in definite integrals</h3>

  <p>A definite integral can be substituted just as an indefinite one, provided the limits are handled with care. There are two honest options: finish the antiderivative and restore \(x\) before applying the limits, or — usually cleaner — carry the substitution through the limits themselves.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">6.7</span><span class="env-name">Substitution in a definite integral</span></p>
    <div class="env-body">
      <p>If \(g'\) is continuous on \([a, b]\) and \(f\) is continuous on the range of \(g\), then</p>
      <p>\[ \int_{a}^{b} f\bigl(g(x)\bigr)\,g'(x)\,dx = \int_{g(a)}^{g(b)} f(u)\,du. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Let \(F\) be an antiderivative of \(f\). As in Theorem 6.6, \(F(g(x))\) is an antiderivative of \(f(g(x))\,g'(x)\), so by Part 2 of the Fundamental Theorem (Theorem 6.4),</p>
      <p>\[ \begin{aligned}
        \int_{a}^{b} f\bigl(g(x)\bigr)\,g'(x)\,dx &= \Bigl[F\bigl(g(x)\bigr)\Bigr]_{a}^{b} = F\bigl(g(b)\bigr) - F\bigl(g(a)\bigr) \\[2pt]
                                                  &= \Bigl[F(u)\Bigr]_{g(a)}^{g(b)} = \int_{g(a)}^{g(b)} f(u)\,du.
      \end{aligned} \]</p>
      <p>Both sides equal \(F(g(b)) - F(g(a))\); the substitution merely reads the same difference off the \(u\)-axis. <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:caution — the definite-substitution trap: change the limits OR back-substitute, never leave the old x-limits on a u-integrand -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>When a definite integral is converted to \(u\), the limits must be converted too. Writing \(\int_{a}^{b} \dots\,du\) with the <em>original</em> \(x\)-limits still attached to a \(u\)-integrand is a common and costly error: the numbers \(a\) and \(b\) are values of \(x\), not of \(u\). Either change the limits to \(g(a)\) and \(g(b)\) and evaluate in \(u\), or return to \(x\) first and use the original limits — but never blend the two.</p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">6.20</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle\int_{0}^{2} 2x\bigl(1 + x^{2}\bigr)^{3}\,dx\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>Let \(u = 1 + x^{2}\), so \(du = 2x\,dx\). Convert the limits: when \(x = 0\), \(u = 1\); when \(x = 2\), \(u = 5\). The integral passes entirely into \(u\):</p>
        <p>\[ \int_{0}^{2} 2x\bigl(1 + x^{2}\bigr)^{3}\,dx = \int_{1}^{5} u^{3}\,du = \left[\frac{u^{4}}{4}\right]_{1}^{5} = \frac{625 - 1}{4} = 156. \]</p>
        <p>Changing the limits removes any need to return to \(x\); the answer emerges directly from the \(u\)-integral. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <h3 class="subsec-head">Symmetry</h3>

  <!-- expansion:intuition — symmetry as a substitution corollary: even/odd functions over [-a,a] -->
  <p>When the interval is symmetric about the origin, the symmetry of the integrand — if it has any — can halve the work or eliminate it entirely. This is substitution in one of its tidiest applications.</p>

  <!-- expansion:intuition [pass: enrichment] [source: mode-c gap-check 2026-07-11 — Theorem 6.8 had the thinnest formal lead-in; add the even/odd geometric picture (mirror doubles, half-turn cancels) before the u=-x proof] -->
  <p>Picture the two cases. An even function has the same graph on \([-a, 0]\) as on \([0, a]\), mirror-reflected across the vertical axis, so each thin strip on the left has an identical twin on the right — same height, hence the same sign — and the matched signed areas <em>add</em>: the integral is twice the integral over \([0, a]\). An odd function's graph on \([-a, 0]\) is the \([0, a]\) graph turned a half-turn about the origin, so each left strip is the mirror of a right strip carrying the <em>opposite</em> sign; the matched contributions <em>cancel</em> and the integral is zero. The substitution \(u = -x\) below turns this picture into a proof.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">6.8</span><span class="env-name">Integrals of symmetric functions</span></p>
    <div class="env-body">
      <p>Suppose \(f\) is continuous on \([-a, a]\).</p>
      <ol class="steps">
        <li>If \(f\) is <em>even</em> — that is, \(f(-x) = f(x)\) — then \(\displaystyle\int_{-a}^{a} f(x)\,dx = 2\int_{0}^{a} f(x)\,dx\).</li>
        <li>If \(f\) is <em>odd</em> — that is, \(f(-x) = -f(x)\) — then \(\displaystyle\int_{-a}^{a} f(x)\,dx = 0\).</li>
      </ol>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Split at the origin: \(\int_{-a}^{a} f = \int_{-a}^{0} f + \int_{0}^{a} f\). In the first piece substitute \(u = -x\), so \(du = -dx\), and the limits \(x = -a, 0\) become \(u = a, 0\):</p>
      <p>\[ \int_{-a}^{0} f(x)\,dx = \int_{a}^{0} f(-u)\,(-du) = \int_{0}^{a} f(-u)\,du. \]</p>
      <p>If \(f\) is even, \(f(-u) = f(u)\), so this equals \(\int_{0}^{a} f(u)\,du\) and the two pieces add to \(2\int_{0}^{a} f\). If \(f\) is odd, \(f(-u) = -f(u)\), so it equals \(-\int_{0}^{a} f(u)\,du\), which cancels the second piece and leaves \(0\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">6.21</span></p>
      <div class="env-body">
        <p>Evaluate \(\displaystyle\int_{-1}^{1} \bigl(x^{4} + x^{3}\bigr)\,dx\).</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>The integrand splits into an even part and an odd part. Over the symmetric interval \([-1, 1]\), the even \(x^{4}\) doubles its integral over \([0, 1]\), while the odd \(x^{3}\) integrates to zero (Theorem 6.8):</p>
        <p>\[ \int_{-1}^{1} \bigl(x^{4} + x^{3}\bigr)\,dx = 2\int_{0}^{1} x^{4}\,dx + 0 = 2\left[\frac{x^{5}}{5}\right]_{0}^{1} = \frac{2}{5}. \]</p>
        <p>The odd term contributes nothing at all — recognizing it saves the work of integrating it. <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:summary — close §6.5: substitution is the first technique; the rest wait for Ch8. One-line fence, no mechanics. -->
  <p>Substitution is the reverse of the chain rule, and the first entry in the toolkit of integration techniques. It reaches every integrand that hides a single inner function whose derivative is present — a wide class, but not all. Products of unrelated functions, powers of trigonometric functions, and rational functions each need their own device; those techniques, which begin where substitution leaves off, are the business of Chapter 8.</p>

  <h3 class="subsec-head">Chapter summary</h3>

  <p>This chapter built the integral from the ground up and bound it to the derivative. Section 6.1 met the area and distance problems and discovered them to be one limit of Riemann sums. Section 6.2 named that limit the <em>definite integral</em> \(\int_{a}^{b} f(x)\,dx\) (Definition 6.2), established that a continuous integrand is integrable (Theorem 6.1, taken on credit), read the integral as net signed area, and collected its properties (Theorem 6.2). Section 6.3 proved the <em>Fundamental Theorem of Calculus</em>: Part 1 (Theorem 6.3) shows the accumulation function \(\int_{a}^{x} f\) is an antiderivative of \(f\), so differentiating an integral returns the integrand; Part 2 (Theorem 6.4) evaluates any definite integral from a single antiderivative. That the derivative of an accumulated area is the height, and that an area is therefore recovered from an antiderivative, is the hinge on which calculus turns. Section 6.4 gave antiderivatives a notation — the indefinite integral (Definition 6.4) — and a working table, singled out \(\int \tfrac{1}{x}\,dx = \ln\lvert x\rvert + C\), and reread the theorem as the Net Change Theorem (Theorem 6.5). Section 6.5 turned the chain rule around into the Substitution Rule (Theorems 6.6–6.7) and used it to exploit symmetry (Theorem 6.8).</p>

  <p>The results worth carrying forward are few and central:</p>
  <p>\[ \int_{a}^{b} f(x)\,dx = \lim_{n \to \infty} \sum_{i=1}^{n} f(x_{i}^{*})\,\Delta x, \qquad \frac{d}{dx}\int_{a}^{x} f(t)\,dt = f(x), \]</p>
  <p>\[ \int_{a}^{b} f(x)\,dx = F(b) - F(a), \qquad \int \frac{1}{x}\,dx = \ln\lvert x\rvert + C, \]</p>
  <p>\[ \int f\bigl(g(x)\bigr)g'(x)\,dx = \int f(u)\,du. \]</p>

  <p>The debt the chapter leaves to the rest of the book is a single instrument used everywhere. Chapter 7 applies the Fundamental Theorem to areas between curves, volumes, and arc lengths; Chapter 8 extends substitution into a full set of techniques for finding the antiderivatives that evaluation demands; and the integral returns, transformed, in the study of series, of differential equations, and of the calculus of several variables. Every one of those chapters rests on the two theorems proved in §6.3.</p>

</article>

        parts.push('<line x1="' + px.toFixed(1) + '" y1="' + (ayBase - 3).toFixed(1) + '" x2="' + px.toFixed(1) + '" y2="' + (ayBase + 3).toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.x));
        if (tex != null) pushLabel({ px: px, py: ayBase + 6, tex: tex, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: px, py: ayBase + 6, text: t.label, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
      });
      (cfg.yticks || []).forEach(function(t) {
        var py = SY(t.y);
        parts.push('<line x1="' + (axBase - 3).toFixed(1) + '" y1="' + py.toFixed(1) + '" x2="' + (axBase + 3).toFixed(1) + '" y2="' + py.toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.y));
        if (tex != null) pushLabel({ px: axBase - 6, py: py, tex: tex, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: axBase - 6, py: py, text: t.label, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
      });
    }
    (cfg.items || []).forEach(function(it) {
      if (it.type === "curve") {
        var cls = it.cls || "curve", n = it.samples || 240, a = it.domain[0], b = it.domain[1];
        var d = "", pen = false;
        for (var i = 0; i <= n; i++) {
          var x = a + (b - a) * (i / n), y = it.fn(x);
          if (!isFinite(y) || y < ymin - (ymax - ymin) * 0.04 || y > ymax + (ymax - ymin) * 0.04) { pen = false; continue; }
          var px = SX(x).toFixed(2), py = SY(y).toFixed(2);
          d += (pen ? "L" : "M") + px + "," + py + " "; pen = true;
        }
        if (d) parts.push('<path d="' + d.trim() + '" class="' + cls + '"/>');
      } else if (it.type === "vline") {
        parts.push('<line x1="' + SX(it.x).toFixed(1) + '" y1="' + SY(ymin).toFixed(1) + '" x2="' + SX(it.x).toFixed(1) + '" y2="' + SY(ymax).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "hline") {
        var ha = it.from != null ? it.from : xmin, hb = it.to != null ? it.to : xmax;
        parts.push('<line x1="' + SX(ha).toFixed(1) + '" y1="' + SY(it.y).toFixed(1) + '" x2="' + SX(hb).toFixed(1) + '" y2="' + SY(it.y).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "seg") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="' + (it.cls || "curve") + '"/>');
      } else if (it.type === "dot") {
        var r = it.r || 3.0;
        if (it.hollow) parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>');
        else parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" class="dot"/>');
      } else if (it.type === "rect") {
        var rTop = SY(it.y1), rBot = SY(it.y0 != null ? it.y0 : 0), rL = SX(it.x1), rR = SX(it.x2);
        parts.push('<rect x="' + Math.min(rL, rR).toFixed(1) + '" y="' + Math.min(rTop, rBot).toFixed(1) + '" width="' + Math.abs(rR - rL).toFixed(1) + '" height="' + Math.abs(rBot - rTop).toFixed(1) + '" class="' + (it.cls || "fill-area") + '"/>');
      } else if (it.type === "area") {
        var aN = it.samples || 160, aA = it.domain[0], aB = it.domain[1], aBase = (it.base != null ? it.base : 0);
        var aD = "M" + SX(aA).toFixed(2) + "," + SY(aBase).toFixed(2) + " ";
        for (var aI = 0; aI <= aN; aI++) { var aX = aA + (aB - aA) * (aI / aN); aD += "L" + SX(aX).toFixed(2) + "," + SY(it.fn(aX)).toFixed(2) + " "; }
        aD += "L" + SX(aB).toFixed(2) + "," + SY(aBase).toFixed(2) + " Z";
        parts.push('<path d="' + aD.trim() + '" class="' + (it.cls || "fill-area") + '"/>');
      } else if (it.type === "arrow") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      } else if (it.type === "text") {
        pushLabel({ px: SX(it.x), py: SY(it.y), tex: it.tex, text: it.tex == null ? it.text : null, anchor: it.anchor || "middle", vAnchor: it.vAnchor || "middle", dx: it.dx || 0, dy: it.dy || 0, cls: it.cls || "a-pt", size: it.size });
      }
    });
    if (labels.length) {
      var M = 52;
      var spans = labels.map(function(L) {
        var left = (L.px + (L.dx || 0) + M).toFixed(1);
        var top = (L.py + (L.dy || 0) + M).toFixed(1);
        var tf = anchorTransform(L.anchor, L.vAnchor);
        var fs = L.size ? "font-size:" + L.size + "px;" : "";
        var body = L.tex != null ? "\\(" + L.tex + "\\)" : esc(L.text == null ? "" : L.text);
        return '<span class="fig-lbl ' + (L.cls || "") + '" style="left:' + left + 'px;top:' + top + 'px;transform:' + tf + ';' + fs + '">' + body + '</span>';
      }).join("");
      parts.push('<foreignObject x="' + (-M) + '" y="' + (-M) + '" width="' + (w + 2 * M) + '" height="' + (h + 2 * M) + '" class="fig-fo" requiredExtensions="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml" class="fig-lyr">' + spans + '</div></foreignObject>');
    }
    parts.push('</svg>');
    return parts.join("");
  }
  window.buildPlot = buildPlot;
  window.PIVAL = PI;
})();
</script>

   (.fig-svg, .ptlab, var(--c-primary)/--ink…) from skin-hs.css.
   Labels are kept to single symbols (O, A, B, C, θ, 1); the

   (CONTENT_SPEC §10 "Label economy").
   Appended across sections — never overwrite.

(function () {

  const FIGS = {

    /* §6.1 Figure 6.1 — Riemann rectangles under y=x² on [0,1], n=4, left vs right.
       Left endpoints sit BELOW the increasing curve (L₄ under); right endpoints poke
       ABOVE it (R₄ over) — the bracket L₄ < A < R₄. Leftmost left-rectangle has height
       f(0)=0 (absent). Numeric sums 7/32, 15/32 live in Example 6.1 (label economy).
       Uses the ch6 rect fill primitive. */
    "riemann-lr-x2": () => {
      const f = (x) => x * x, dx = 0.25;
      const mk = (side) => {
        const rects = [];
        for (let k = 0; k < 4; k++) {
          const xL = k * dx, xR = (k + 1) * dx, hgt = side === "L" ? f(xL) : f(xR);
          if (hgt > 0) rects.push({ type: "rect", x1: xL, x2: xR, y1: hgt, y0: 0, cls: "rect-sum" });
        }
        return buildPlot({
          w: 250, h: 205, xmin: -0.09, xmax: 1.17, ymin: -0.09, ymax: 1.17,
          xlabel: "x", ylabel: "y", xticks: [{ x: 1, tex: "1" }], yticks: [{ y: 1, tex: "1" }],
          aria: side === "L"
            ? "Four left-endpoint rectangles under the curve y equals x squared on zero to one; each rectangle lies below the curve, so the left sum underestimates the area."
            : "Four right-endpoint rectangles on the curve y equals x squared on zero to one; each rectangle rises above the curve, so the right sum overestimates the area.",
          items: [
            ...rects,
            { type: "curve", fn: f, domain: [0, 1.13], samples: 200 },

       area 1/n, so it shrinks as n grows: the three panels show the bracket closing.
       NO "=1/3" or limit value on the figure (that is Example 6.2's answer — no-spoiler,
       D7). Same curve, same rect fill as Figure 6.1; only n varies across panels. */
    "refinement-rn-x2": () => {
      const f = (x) => x * x;
      const mk = (n) => {
        const dx = 1 / n, rects = [];
        for (let k = 1; k <= n; k++) {
          rects.push({ type: "rect", x1: (k - 1) * dx, x2: k * dx, y1: f(k * dx), y0: 0, cls: "rect-sum" });

          aria: "Right-endpoint rectangles under the curve y equals x squared on zero to one with "
            + n + " strips; each rectangle rises just above the curve, and the total overshoot shrinks as the number of strips grows.",
          items: [
            ...rects,
            { type: "curve", fn: f, domain: [0, 1.12], samples: 200 },
          ],

      };
      return { layout: "triple", panels: [
        { svg: mk(4), note: "n=4" },
        { svg: mk(8), note: "n=8" },

    },

      for (let k = 0; k < 5; k++) segs.push({ type: "seg", x1: pts[k][0], y1: pts[k][1], x2: pts[k + 1][0], y2: pts[k + 1][1], cls: "secant" });

    "minmax-sqrt": () => {

        w: 300, h: 225, xmin: -0.25, xmax: 4.6, ymin: -0.28, ymax: 2.5,

    /* §6.2 Figure 6.5 — the semicircle y=√(1−x²) on [−1,1] (Example 6.6, M4 supplement).

       caption / Example (label economy). Uses the ch6 area fill primitive. */
    "semicircle-area": () => {
      const f = (x) => Math.sqrt(Math.max(1 - x * x, 0));
      const svg = buildPlot({
        w: 300, h: 200, xmin: -1.3, xmax: 1.3, ymin: -0.34, ymax: 1.3,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: -1, tex: "-1" }, { x: 1, tex: "1" }],
        yticks: [{ y: 1, tex: "1" }],
        aria: "The upper half of the unit circle, y equals the square root of one minus x squared, on minus one to one; the shaded semicircular region beneath it has area pi over two, the value of the integral.",
        items: [
          { type: "area", fn: f, domain: [-1, 1], base: 0, cls: "fill-area" },
          { type: "curve", fn: f, domain: [-1, 1], samples: 260 },
          { type: "seg", x1: 0, y1: 0, x2: 0.707, y2: 0.707, cls: "bubble" },
          { type: "dot", x: 0, y: 0, r: 2.2 },
          { type: "text", x: 0.5, y: 0.3, tex: "1", cls: "a-pt", size: 12 },
          { type: "text", x: 0.12, y: 1.12, tex: "y=\\sqrt{1-x^{2}}", anchor: "start", cls: "a-curve", size: 12 },
        ],
      });
      return { layout: "single", panels: [{ svg }] };
    },

  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 6 — Integrals",
  runningHead: "Chapter 6 · Integrals",
  fragments: ["sec-6-1", "sec-6-2", "sec-6-3", "sec-6-4", "sec-6-5"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      var _probe = document.createElement("div");
      _probe.style.height = "0"; _probe.style.margin = "0"; _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em"; block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;
        body.removeChild(block);
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var remainingAtInsert = 0;
    if (mode !== "none") {
      var splitProbe = document.createElement("div");
      splitProbe.style.height = "0"; splitProbe.style.margin = "0"; splitProbe.style.padding = "0";
      body.appendChild(splitProbe);
      remainingAtInsert = body.clientHeight - (splitProbe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(splitProbe);
    }
    var want = (mode !== "none" && (blockH > body.clientHeight || remainingAtInsert >= FREE_THRESHOLD));
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
