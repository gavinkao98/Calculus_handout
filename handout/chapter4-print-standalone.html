  <header class="sec-head">
    <h2 class="sec-title"><span class="sec-no">4.5</span>Monotonicity and the Logarithmic Function</h2>
  </header>

  <!-- expansion:intuition — opener: pick up §4.4's closing fact (e^x strictly increasing ⟹ one-to-one); strict monotonicity is the engine that both builds and powers the inverse; lists the section's program and the two fences it closes (§C-11) -->
  <p>Section 4.4 closed with the fact this section is built on: \(e^{x}\) is strictly increasing on \(\mathbb{R}\), and a strictly increasing function is one-to-one. A one-to-one function can be inverted, and the inverse of the exponential is the function we are after — the <em>natural logarithm</em>. Strict monotonicity is the lever throughout. It does the obvious work of <em>building</em> the inverse, by making each value \(x &gt; 0\) come from exactly one exponent. Less obviously, it also <em>powers</em> everything we then prove about that inverse: the continuity of \(\ln\) and its differentiability are not free gifts that come with the definition. Each needs its own argument, and both arguments reach back to the strict monotonicity of \(e^{x}\). This section defines \(\ln x\), proves it is continuous, and derives \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\) rigorously — this time without assuming in advance that \(\ln\) is differentiable, the assumption Chapter 3 made informally. Along the way it settles two debts left earlier: the informal logarithm of §3.3 and the meaning of \(a^{r}\) for irrational \(r\), deferred back in §4.1.</p>

  <h3 class="subsec-head">Defining the natural logarithm</h3>

  <!-- expansion:intuition — §C-1: the range of e^x is (0,∞); assert with a one-line dependency note (manuscript + legacy both assert, do not prove) -->
  <p>To invert \(e^{x}\) we need to know what values it takes. As \(x\) ranges over \(\mathbb{R}\), \(e^{x}\) is continuous (Theorem 4.6) and runs from \(\lim_{x \to -\infty} e^{x} = 0\) up to \(\lim_{x \to +\infty} e^{x} = +\infty\), passing through every value in between; its range is therefore the open interval \((0, \infty)\). We take this for granted here — the two limits follow from the series and the intermediate values from continuity, but the details would detain us — and read off the consequence we need: for every \(x &gt; 0\) there is exactly one exponent producing it.</p>

  <section class="env env-definition">
    <p class="env-head"><span class="env-kicker">Definition</span><span class="env-num">4.4</span><span class="env-name">Natural logarithm</span></p>
    <div class="env-body">
      <p>For \(x \in (0, \infty)\), the <em>natural logarithm</em> of \(x\), written \(\ln x\), is the unique real number \(a\) satisfying</p>
      <p>\[ e^{a} = x. \]</p>
      <p>Equivalently, \(\ln x\) is the inverse function of \(e^{x}\) on \((0, \infty)\): it is characterized by the two identities</p>
      <p>\[ e^{\ln x} = x \quad (x &gt; 0), \qquad \ln(e^{x}) = x \quad (x \in \mathbb{R}). \]</p>
      <p class="informal">In words, \(\ln x\) is the exponent you must raise \(e\) to in order to land on \(x\). The strict monotonicity of \(e^{x}\) makes that exponent unique; its range being \((0, \infty)\) makes the exponent exist for every positive \(x\).</p>
    </div>
  </section>

  <!-- expansion:caution — §C-2 (ROADMAP pitfall): ln defined only for x>0 -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The logarithm is defined only for \(x &gt; 0\). The symbols \(\ln 0\) and \(\ln(-1)\) have no meaning here: \(\ln 0\) would require \(e^{a} = 0\) and \(\ln(-1)\) would require \(e^{a} = -1\), and neither is possible, because \(e^{a} &gt; 0\) for every real \(a\). Every formula in this section that contains \(\ln x\) silently carries the assumption \(x &gt; 0\).</p>
    </div>
  </section>

  <!-- expansion:figure — Figure 4.5 (§C-3, ROADMAP key figure): e^x / ln x reflection across y=x; registered in chapter4 FIGS as "exp-log-reflection" -->
  <figure class="figure" data-fig="exp-log-reflection">
    <figcaption><span class="fig-no">Figure 4.5</span> The graphs of \(e^{x}\) (blue) and \(\ln x\) (red) are mirror images across the line \(y = x\) (dashed) — the geometric signature of the inverse relation \(\ln(e^{x}) = x\). Reflecting swaps coordinates, sending the point \((0, 1)\) on the exponential to \((1, 0)\) on the logarithm.</figcaption>
  </figure>

  <h3 class="subsec-head">Continuity of the logarithm</h3>

  <!-- expansion:intuition — lead into the continuity proof; the indirect argument leans on strict monotonicity -->
  <p>That \(\ln\) is continuous is not automatic and takes a short argument. The idea is indirect: if some sequence of inputs approached \(x_{0}\) while their logarithms stayed away from \(\ln x_{0}\), then applying the strictly increasing \(e^{x}\) would re-open a fixed gap on the input side — contradicting the very fact that the inputs converged.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">4.13</span></p>
    <div class="env-body">
      <p>\(\ln x\) is continuous at every \(x_{0} &gt; 0\).</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Fix \(x_{0} &gt; 0\) and suppose, for contradiction, that \(\ln\) is <em>not</em> continuous at \(x_{0}\). Then \(\lim_{x \to x_{0}} \ln x\) either fails to exist or exists but differs from \(\ln x_{0}\). In either case the failure is witnessed by a sequence: there is a number \(\delta &gt; 0\) and points \(y_{j} \to x_{0}\) (all in \((0, \infty)\)) with</p>
      <p>\[ \lvert \ln y_{j} - \ln x_{0} \rvert \ge \delta \qquad \text{for every } j = 1, 2, 3, \dots \]</p>
      <p>For each \(j\) this means \(\ln y_{j} \le \ln x_{0} - \delta\) or \(\ln y_{j} \ge \ln x_{0} + \delta\). Apply \(e^{x}\), which is strictly increasing (Example 4.6), to each case. Writing \(y_{j} = e^{\ln y_{j}}\) and \(x_{0} = e^{\ln x_{0}}\):</p>
      <ul>
        <li>if \(\ln y_{j} \le \ln x_{0} - \delta\), then \(x_{0} - y_{j} = e^{\ln x_{0}} - e^{\ln y_{j}} \ge e^{\ln x_{0}} - e^{\ln x_{0} - \delta} &gt; 0\);</li>
        <li>if \(\ln y_{j} \ge \ln x_{0} + \delta\), then \(y_{j} - x_{0} = e^{\ln y_{j}} - e^{\ln x_{0}} \ge e^{\ln x_{0} + \delta} - e^{\ln x_{0}} &gt; 0\).</li>
      </ul>
      <p>Let</p>
      <p>\[ \varepsilon = \min\!\left\{\, e^{\ln x_{0}} - e^{\ln x_{0} - \delta}, \; e^{\ln x_{0} + \delta} - e^{\ln x_{0}} \,\right\} &gt; 0, \]</p>
      <p>a single positive number depending only on \(x_{0}\) and \(\delta\). In both cases \(\lvert y_{j} - x_{0} \rvert = \lvert e^{\ln y_{j}} - e^{\ln x_{0}} \rvert \ge \varepsilon\), so</p>
      <p>\[ \lvert y_{j} - x_{0} \rvert \ge \varepsilon \qquad \text{for every } j. \]</p>
      <p>But this contradicts \(y_{j} \to x_{0}\), which forces \(\lvert y_{j} - x_{0} \rvert\) below \(\varepsilon\) for large \(j\). The assumption of discontinuity is untenable, so \(\lim_{x \to x_{0}} \ln x = \ln x_{0}\) and \(\ln\) is continuous at \(x_{0}\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <h3 class="subsec-head">The derivative of the logarithm</h3>

  <!-- expansion:intuition — lead: contrast with Ch3 §3.3's chain-rule pass; the inverse-function technique extracts the derivative without assuming it -->
  <p>Chapter 3 already wrote down \(\dfrac{d}{dx}\ln x = \dfrac{1}{x}\), but it did so by differentiating \(e^{\ln x} = x\) with the chain rule — which silently <em>assumes</em> \(\ln\) is differentiable. We can now earn the formula honestly. The inverse-function technique flips the logarithm’s difference quotient into a difference quotient for \(e^{x}\), whose derivative we already control, and lets continuity carry the limit across.</p>

  <section class="env env-theorem">
    <p class="env-head"><span class="env-kicker">Theorem</span><span class="env-num">4.14</span></p>
    <div class="env-body">
      <p>For every \(x &gt; 0\),</p>
      <p>\[ \frac{d}{dx}\ln x = \frac{1}{x}. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Fix \(x &gt; 0\) and take \(h \ne 0\) small enough that \(x + h &gt; 0\). Set</p>
      <p>\[ y_{0} = \ln x, \qquad y = \ln(x + h), \]</p>
      <p>so that \(e^{y_{0}} = x\) and \(e^{y} = x + h\); subtracting, \(e^{y} - e^{y_{0}} = (x + h) - x = h\). Substituting this for \(h\) and flipping the quotient,</p>
      <p>\[ \frac{\ln(x + h) - \ln x}{h} = \frac{y - y_{0}}{e^{y} - e^{y_{0}}} = \frac{1}{\dfrac{e^{y} - e^{y_{0}}}{y - y_{0}}}. \]</p>
      <p>The division is legitimate because \(y \ne y_{0}\): the logarithm is strictly increasing, being the inverse of the strictly increasing \(e^{x}\), so \(h \ne 0\) forces \(\ln(x + h) \ne \ln x\).</p>
      <p>Now let \(h \to 0\). By continuity of \(\ln\) (Theorem 4.13), \(y = \ln(x + h) \to \ln x = y_{0}\), and \(y \ne y_{0}\) all the while. The denominator is precisely the difference quotient of \(e^{y}\) at \(y_{0}\), so</p>
      <p>\[ \lim_{h \to 0} \frac{e^{y} - e^{y_{0}}}{y - y_{0}} = \lim_{y \to y_{0}} \frac{e^{y} - e^{y_{0}}}{y - y_{0}} = \left.\frac{d}{dy} e^{y}\right|_{y = y_{0}} = e^{y_{0}} = e^{\ln x} = x, \]</p>
      <p>using \((e^{y})' = e^{y}\) from Theorem 4.8. Taking the reciprocal,</p>
      <p>\[ \frac{d}{dx}\ln x = \lim_{h \to 0} \frac{\ln(x + h) - \ln x}{h} = \frac{1}{x}. \tag{$\ast$} \]</p>
      <p><span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:figure [pass: enrichment] [source: pedagogical synthesis — reciprocal-slope geometry of the inverse-function derivative; registered in chapter4 FIGS as "reciprocal-slope-log"] -->
  <figure class="figure" data-fig="reciprocal-slope-log">
    <figcaption><span class="fig-no">Figure 4.6</span> Why the slope inverts. Reflecting \(e^{x}\) across \(y = x\) turns its tangent at \((\ln 2,\ 2)\), of slope \(e^{\ln 2} = 2\), into the tangent to \(\ln x\) at \((2,\ \ln 2)\) — the mirror image, of reciprocal slope \(\tfrac{1}{2}\). Reflection swaps rise and run, which is exactly \((\ln x)' = 1/e^{\ln x} = 1/x\).</figcaption>
  </figure>

  <!-- expansion:intuition — Remark 4.5 (§C-4, ROADMAP prerequisite): rigorous vs Ch3 chain-rule; closes the §3.3 forward-reference loop -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">4.5</span></p>
    <div class="env-body">
      <p>This closes a loop opened in Chapter 3. There (§3.3) the same formula \((\ln x)' = 1/x\) was obtained quickly by applying the chain rule to \(e^{\ln x} = x\) — a derivation that <em>presupposes</em> \(\ln\) is differentiable. The proof above presupposes no such thing: it extracts differentiability from the difference quotient, using only the continuity of \(\ln\) (Theorem 4.13) and the derivative of \(e^{x}\) (Theorem 4.8). The chain-rule route is faster and perfectly good once differentiability is known; the inverse-function route is the one that establishes differentiability in the first place, and so is the one the foundations rest on.</p>
    </div>
  </section>

  <h3 class="subsec-head">Logarithm laws and general powers</h3>

  <!-- expansion:intuition — lead: harvest the algebraic properties; first one more MVT consequence (§C-5, HW1 → Corollary 4.4) -->
  <p>With the derivative in hand we can read off the algebra of the logarithm. The engine is a single extra consequence of the Mean Value Theorem — the companion of the monotonicity corollary, for the borderline case \(f' = 0\).</p>

  <!-- expansion:formula — Corollary 4.4 (§C-5): HW1, f'=0 ⟹ constant -->
  <section class="env env-corollary">
    <p class="env-head"><span class="env-kicker">Corollary</span><span class="env-num">4.4</span><span class="env-name">Vanishing derivative</span></p>
    <div class="env-body">
      <p>Suppose \(f\) is continuous on \([a, b]\) and differentiable on \((a, b)\). If \(f'(c) = 0\) for every \(c \in (a, b)\), then \(f\) is constant on \([a, b]\).</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Take any two points \(x_{1} &lt; x_{2}\) in \([a, b]\). The Mean Value Theorem (Theorem 4.12) on \([x_{1}, x_{2}]\) supplies a \(c \in (x_{1}, x_{2})\) with</p>
      <p>\[ f(x_{2}) - f(x_{1}) = f'(c)\,(x_{2} - x_{1}) = 0 \cdot (x_{2} - x_{1}) = 0, \]</p>
      <p>so \(f(x_{2}) = f(x_{1})\). As \(x_{1}, x_{2}\) were arbitrary, \(f\) takes a single value throughout \([a, b]\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:formula — Proposition 4.3 (§C-6, add-on taken): HW2 ln(ab)=ln a+ln b promoted to a named result -->
  <section class="env env-proposition">
    <p class="env-head"><span class="env-kicker">Proposition</span><span class="env-num">4.3</span><span class="env-name">Logarithm product law</span></p>
    <div class="env-body">
      <p>For all \(a, b &gt; 0\),</p>
      <p>\[ \ln(ab) = \ln a + \ln b. \]</p>
    </div>
  </section>

  <section class="env env-proof">
    <p class="env-head"><span class="env-kicker">Proof</span></p>
    <div class="env-body">
      <p>Fix \(a &gt; 0\) and define, for \(x &gt; 0\),</p>
      <p>\[ f(x) = \ln(ax) - \ln x. \]</p>
      <p>By the chain rule together with Theorem 4.14,</p>
      <p>\[ f'(x) = a \cdot \frac{1}{ax} - \frac{1}{x} = \frac{1}{x} - \frac{1}{x} = 0 \qquad \text{for every } x &gt; 0. \]</p>
      <p>So \(f'\) vanishes identically. Applying Corollary 4.4 on the closed interval with endpoints \(1\) and any \(x &gt; 0\) gives \(f(x) = f(1)\). But \(f(1) = \ln a - \ln 1 = \ln a\), since \(\ln 1 = 0\) (because \(e^{0} = 1\)). Hence \(f(x) = \ln a\) for all \(x &gt; 0\); that is, \(\ln(ax) - \ln x = \ln a\). Setting \(x = b\) gives \(\ln(ab) - \ln b = \ln a\), which rearranges to \(\ln(ab) = \ln a + \ln b\). <span class="qed qed-proof"></span></p>
    </div>
  </section>

  <!-- expansion:caution [pass: enrichment] [source: pedagogical synthesis — high-frequency logarithm misgeneralisation, guards Proposition 4.3] -->
  <section class="env env-caution">
    <p class="env-head"><span class="env-kicker">Caution</span></p>
    <div class="env-body">
      <p>The product law converts a product <em>inside</em> the logarithm into a sum <em>outside</em> it: \(\ln(ab) = \ln a + \ln b\). It says nothing about a sum inside. In general \(\ln(a + b) \ne \ln a + \ln b\) — take \(a = b = 1\), where the left side is \(\ln 2\) and the right side is \(0\). Likewise \(\ln(a/b)\) is \(\ln a - \ln b\), not \(\ln a / \ln b\). The proof above earns the one identity that holds; it grants no licence to the look-alikes.</p>
    </div>
  </section>

  <!-- expansion:example — Example 4.5 (§C-7, HW4): general powers a^x := e^{x ln a}; closes §4.1's deferred a^r question (D6) -->
  <p>The product law is exactly what is needed to define powers with arbitrary real exponents — the question §4.1 raised about \(a^{r}\) for irrational \(r\) and then deferred.</p>

  <div class="workedexample">
    <section class="env env-example">
      <p class="env-head"><span class="env-kicker">Example</span><span class="env-num">4.7</span><span class="env-name">General powers</span></p>
      <div class="env-body">
        <p>For \(a &gt; 0\), <em>define</em> the power \(a^{x}\) for every real \(x\) by</p>
        <p>\[ a^{x} = e^{x \ln a}. \]</p>
        <p>This agrees with the usual meaning when \(x\) is rational and extends it to all real \(x\). Verify, for \(a, b &gt; 0\), the two exponent laws</p>
        <p>\[ \text{(i)}\quad a^{x} b^{x} = (ab)^{x}, \qquad\qquad \text{(ii)}\quad (a^{x})^{y} = a^{xy} = (a^{y})^{x}. \]</p>
      </div>
    </section>
    <section class="env env-solution">
      <p class="env-head"><span class="env-kicker">Solution</span></p>
      <div class="env-body">
        <p>For <strong>(i)</strong>, multiply and collect exponents with the exponent law for \(e\) (Theorem 4.7), then use the product law just proved:</p>
        <p>\[ a^{x} b^{x} = e^{x \ln a}\, e^{x \ln b} = e^{x \ln a + x \ln b} = e^{x(\ln a + \ln b)} = e^{x \ln(ab)} = (ab)^{x}. \]</p>
        <p>For <strong>(ii)</strong>, first note \(\ln(a^{x}) = \ln\!\left(e^{x \ln a}\right) = x \ln a\), using \(\ln(e^{t}) = t\). Therefore</p>
        <p>\[ (a^{x})^{y} = e^{y \ln(a^{x})} = e^{y \,\cdot\, x \ln a} = e^{xy \ln a} = a^{xy}. \]</p>
        <p>The middle expression \(e^{xy \ln a}\) is symmetric in \(x\) and \(y\), so running the same computation with the roles swapped gives \((a^{y})^{x} = e^{xy \ln a} = a^{xy}\) as well. Hence \((a^{x})^{y} = a^{xy} = (a^{y})^{x}\). <span class="qed"></span></p>
      </div>
    </section>
  </div>

  <!-- expansion:intuition — Remark 4.6 (§C-8, add-on taken): HW3 Cauchy functional equation, one sentence, proof omitted -->
  <section class="env env-remark">
    <p class="env-head"><span class="env-kicker">Remark</span><span class="env-num">4.6</span></p>
    <div class="env-body">
      <p>The exponent law has a converse worth noting: the exponential is the <em>only</em> continuous function \(g \colon \mathbb{R} \to (0, \infty)\) satisfying \(g(x)\,g(y) = g(x + y)\) for all \(x, y\) together with the normalization \(g(1) = e\); the proof is omitted.</p>
    </div>
  </section>

  <h3 class="subsec-head">Why these functions are unavoidable</h3>

  <!-- expansion:application [pass: enrichment] — short capstone (§C-10, add-on taken): exponential growth/decay, half-life; ties the chapter's rigour back to why e^x and ln x matter -->
  <p>The defining feature of the exponential, \((e^{x})' = e^{x}\), is exactly what makes it the right function for any quantity whose rate of change is proportional to its current size. If \(y(t)\) obeys \(y'(t) = k\,y(t)\) for a constant \(k\), then \(y(t) = y(0)\,e^{kt}\) — the model behind population growth (\(k &gt; 0\)), radioactive decay (\(k &lt; 0\)), and continuously compounded interest. The logarithm enters the moment one inverts: for positive quantities and \(k \ne 0\), solving \(y(t) = y_{\ast}\) for the time gives \(t = (\ln y_{\ast} - \ln y(0))/k\). The radioactive half-life \(t_{1/2} = \ln 2 / \lvert k \rvert\) is just the case \(y_{\ast} = y(0)/2\). Everything this chapter built — the series definition, the exponent law, the rigorous derivatives, the inverse construction — is what makes these formulas genuinely well-defined rather than merely suggestive.</p>

  <h3 class="subsec-head">Chapter summary</h3>

  <!-- expansion:summary — §C-9: chapter-level 4-strand summary (this is Chapter 4's final section); distillations matching CONTENT_SPEC §4 -->
  <p>Chapter 4 set out to put \(e^{x}\) and \(\ln x\) on rigorous foundations, replacing the informal handling of Chapters 2 and 3 with theorems and proofs. Four strands ran through it.</p>
  <ul>
    <li><strong>The exponential function.</strong> \(e^{x} := \sum_{n=0}^{\infty} x^{n}/n!\) is defined by a power series (§4.1), shown convergent for every real \(x\) by geometric tail bounds; it is continuous on \(\mathbb{R}\) and obeys the exponent law \(e^{x}e^{y} = e^{x+y}\) (§4.2); and its derivative is itself, \((e^{x})' = e^{x}\), proved with the explicit bound \(\lvert (e^{h}-1)/h - 1 \rvert \le \lvert h \rvert\) for \(\lvert h \rvert &lt; \tfrac{1}{2}\) (§4.3).</li>
    <li><strong>Real-analysis machinery.</strong> The completeness of \(\mathbb{R}\) — monotone bounded sequences converge — underwrites everything; from it follow the equivalence of convergence and the Cauchy condition (via Bolzano–Weierstrass) used to define \(e^{x}\), and the extreme value theorem used to launch the existence theorems.</li>
    <li><strong>Existence theorems for differentiation.</strong> Theorem A locates the vanishing of the derivative at interior extrema; Rolle’s theorem follows; and the Mean Value Theorem follows from Rolle (§4.4). The MVT converts the sign of \(f'\) into monotonicity, and its borderline case \(f' = 0\) into constancy.</li>
    <li><strong>The logarithm.</strong> Because \(e^{x}\) is strictly increasing, it has an inverse \(\ln x\) on \((0, \infty)\) (§4.5); \(\ln\) is continuous, its derivative is \(1/x\), it converts products to sums, and through \(a^{x} = e^{x\ln a}\) it finally gives meaning to arbitrary real powers.</li>
  </ul>
  <p>Every property of \(e^{x}\) and \(\ln x\) borrowed on faith in earlier chapters has now been turned into a theorem with a proof, and later chapters may use these functions freely.</p>

</article>

<script>
(function () {
  var uid = 0;
  var PI = Math.PI;
  function piTex(v) {
    var map = {};
    map[(-2 * PI).toFixed(4)] = "-2\\pi";
    map[(-PI).toFixed(4)] = "-\\pi";
    map[(-PI / 2).toFixed(4)] = "-\\tfrac{\\pi}{2}";
    map[(PI / 2).toFixed(4)] = "\\tfrac{\\pi}{2}";
    map[PI.toFixed(4)] = "\\pi";
    map[(2 * PI).toFixed(4)] = "2\\pi";
    map[(0).toFixed(4)] = "0";
    var hit = map[v.toFixed(4)];
    if (hit != null) return hit;
    if (Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v)); // plain integers
    return undefined;
  }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
  function anchorTransform(anchor, vAnchor) {
    var tx = anchor === "start" ? "0" : anchor === "end" ? "-100%" : "-50%";
    var ty = vAnchor === "top" ? "0" : vAnchor === "bottom" ? "-100%" : "-50%";
    return "translate(" + tx + "," + ty + ")";
  }
  function buildPlot(cfg) {
    var w = cfg.w, h = cfg.h;
    var pad = Object.assign({ t: 16, r: 18, b: 20, l: 22 }, cfg.pad || {});
    var xmin = cfg.xmin, xmax = cfg.xmax, ymin = cfg.ymin, ymax = cfg.ymax;
    var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
    var SX = function(x) { return pad.l + ((x - xmin) / (xmax - xmin)) * iw; };
    var SY = function(y) { return h - pad.b - ((y - ymin) / (ymax - ymin)) * ih; };
    var id = "pl" + (++uid);
    var parts = [], labels = [];
    function pushLabel(o) { labels.push(o); }
    parts.push('<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:' + w + 'px" class="fig-svg" role="img" aria-label="' + esc(cfg.aria || "graph") + '" preserveAspectRatio="xMidYMid meet">');
    parts.push('<defs><marker id="' + id + 'a" markerWidth="8" markerHeight="8" refX="5.4" refY="2.8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5.4,2.8 L0,5.6" fill="none" stroke="var(--c-axis)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>');
    if (cfg.axes !== false) {
      var x0 = Math.min(Math.max(0, xmin), xmax), y0 = Math.min(Math.max(0, ymin), ymax);
      var ax0 = SX(xmin), ax1 = SX(xmax), ayBase = SY(y0);
      parts.push('<path d="M' + ax0.toFixed(1) + ',' + ayBase.toFixed(1) + ' H' + (ax1 - 1).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      var ay0 = SY(ymin), ay1 = SY(ymax), axBase = SX(x0);
      parts.push('<path d="M' + axBase.toFixed(1) + ',' + ay0.toFixed(1) + ' V' + (ay1 + 1).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      if (cfg.xlabel) pushLabel({ px: ax1 + 1, py: ayBase + 4, tex: cfg.xlabel, anchor: "start", vAnchor: "top", cls: "a-ax", size: 13 });
      if (cfg.ylabel) pushLabel({ px: axBase - 5, py: ay1 + 1, tex: cfg.ylabel, anchor: "end", vAnchor: "top", cls: "a-ax", size: 13 });
      (cfg.xticks || []).forEach(function(t) {
        var px = SX(t.x);
        parts.push('<line x1="' + px.toFixed(1) + '" y1="' + (ayBase - 3).toFixed(1) + '" x2="' + px.toFixed(1) + '" y2="' + (ayBase + 3).toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.x));
        if (tex != null) pushLabel({ px: px, py: ayBase + 6, tex: tex, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: px, py: ayBase + 6, text: t.label, anchor: "middle", vAnchor: "top", cls: "a-pt", size: 12 });
      });
      (cfg.yticks || []).forEach(function(t) {
        var py = SY(t.y);
        parts.push('<line x1="' + (axBase - 3).toFixed(1) + '" y1="' + py.toFixed(1) + '" x2="' + (axBase + 3).toFixed(1) + '" y2="' + py.toFixed(1) + '" class="axis"/>');
        var tex = t.tex != null ? t.tex : (t.label != null ? null : piTex(t.y));
        if (tex != null) pushLabel({ px: axBase - 6, py: py, tex: tex, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
        else if (t.label != null) pushLabel({ px: axBase - 6, py: py, text: t.label, anchor: "end", vAnchor: "middle", cls: "a-pt", size: 12 });
      });
    }
    (cfg.items || []).forEach(function(it) {
      if (it.type === "curve") {
        var cls = it.cls || "curve", n = it.samples || 240, a = it.domain[0], b = it.domain[1];
        var d = "", pen = false;
        for (var i = 0; i <= n; i++) {
          var x = a + (b - a) * (i / n), y = it.fn(x);
          if (!isFinite(y) || y < ymin - (ymax - ymin) * 0.04 || y > ymax + (ymax - ymin) * 0.04) { pen = false; continue; }
          var px = SX(x).toFixed(2), py = SY(y).toFixed(2);
          d += (pen ? "L" : "M") + px + "," + py + " "; pen = true;
        }
        if (d) parts.push('<path d="' + d.trim() + '" class="' + cls + '"/>');
      } else if (it.type === "vline") {
        parts.push('<line x1="' + SX(it.x).toFixed(1) + '" y1="' + SY(ymin).toFixed(1) + '" x2="' + SX(it.x).toFixed(1) + '" y2="' + SY(ymax).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "hline") {
        var ha = it.from != null ? it.from : xmin, hb = it.to != null ? it.to : xmax;
        parts.push('<line x1="' + SX(ha).toFixed(1) + '" y1="' + SY(it.y).toFixed(1) + '" x2="' + SX(hb).toFixed(1) + '" y2="' + SY(it.y).toFixed(1) + '" class="' + (it.cls || "refline") + '"/>');
      } else if (it.type === "seg") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="' + (it.cls || "curve") + '"/>');
      } else if (it.type === "dot") {
        var r = it.r || 3.0;
        if (it.hollow) parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>');
        else parts.push('<circle cx="' + SX(it.x).toFixed(1) + '" cy="' + SY(it.y).toFixed(1) + '" r="' + r + '" class="dot"/>');
      } else if (it.type === "arrow") {
        parts.push('<line x1="' + SX(it.x1).toFixed(1) + '" y1="' + SY(it.y1).toFixed(1) + '" x2="' + SX(it.x2).toFixed(1) + '" y2="' + SY(it.y2).toFixed(1) + '" class="axis" marker-end="url(#' + id + 'a)"/>');
      } else if (it.type === "text") {
        pushLabel({ px: SX(it.x), py: SY(it.y), tex: it.tex, text: it.tex == null ? it.text : null, anchor: it.anchor || "middle", vAnchor: it.vAnchor || "middle", dx: it.dx || 0, dy: it.dy || 0, cls: it.cls || "a-pt", size: it.size });
      }
    });
    if (labels.length) {
      var M = 52;
      var spans = labels.map(function(L) {
        var left = (L.px + (L.dx || 0) + M).toFixed(1);
        var top = (L.py + (L.dy || 0) + M).toFixed(1);
        var tf = anchorTransform(L.anchor, L.vAnchor);
        var fs = L.size ? "font-size:" + L.size + "px;" : "";
        var body = L.tex != null ? "\\(" + L.tex + "\\)" : esc(L.text == null ? "" : L.text);
        return '<span class="fig-lbl ' + (L.cls || "") + '" style="left:' + left + 'px;top:' + top + 'px;transform:' + tf + ';' + fs + '">' + body + '</span>';
      }).join("");
      parts.push('<foreignObject x="' + (-M) + '" y="' + (-M) + '" width="' + (w + 2 * M) + '" height="' + (h + 2 * M) + '" class="fig-fo" requiredExtensions="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml" class="fig-lyr">' + spans + '</div></foreignObject>');
    }
    parts.push('</svg>');
    return parts.join("");
  }
  window.buildPlot = buildPlot;
  window.PIVAL = PI;
})();
</script>

        items: [
          { type: "curve", fn: P1, domain: [-2.1, 1.55], samples: 80,  cls: "bubble" },
          { type: "curve", fn: P2, domain: [-2.1, 1.55], samples: 160, cls: "bubble" },
          { type: "curve", fn: P3, domain: [-2.1, 1.55], samples: 160, cls: "bubble" },
          { type: "curve", fn: P4, domain: [-2.1, 1.55], samples: 160, cls: "bubble" },
          { type: "curve", fn: (x) => Math.exp(x), domain: [-2.1, 1.55], samples: 200, cls: "curve" },
          { type: "dot", x: 0, y: 1, r: 2.5 },
          { type: "text", x: 1.5, y: Math.exp(1.5) - 0.05, tex: "e^{x}", cls: "a-curve", anchor: "end", vAnchor: "bottom" },
          { type: "text", x: 1.55, y: P1(1.55), tex: "P_{1}", cls: "a-pt", anchor: "start" }
        ],
        aria: "Polynomial partial sums P k of the exponential series for k = 1 to 4, in gray, rising to meet the smooth blue exponential curve e to the x. All pass through the point (0, 1). Near x = 0 they hug the curve; higher-order sums stay close over a wider range, while for x < 0 the low-order sums oscillate around the curve."
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §4.4 — The Mean Value Theorem: secant vs. parallel interior tangent.
       A generic smooth curve y = f(x) (here one arch of sine, used only as a
       nondescript rising curve — no axis names it) over [a, b]. The dashed gray
       secant (.secant) joins (a, f(a)) and (b, f(b)); the solid caution-coloured
       tangent (.tangent) touches at the interior c where f'(c) equals the secant
       slope, so it is both tangent and parallel by construction. c is found
       numerically. Labels limited to a, c, b plus "secant"/"tangent"; the slopes
       and the (a,f(a))/(b,f(b)) coordinates live in the caption (CONTENT_SPEC 10). */
    "mvt-secant-tangent": () => {
      const f  = (x) => Math.sin(x);
      const fp = (x) => Math.cos(x);
      const a = 0.3, b = 2.3;
      const fa = f(a), fb = f(b);
      const m = (fb - fa) / (b - a);           // secant slope = average rate of change
      let c = a, best = Infinity;              // interior c with f'(c) = m (parallel tangent)
      for (let t = a + 0.002; t < b; t += 0.002) {
        const d = Math.abs(fp(t) - m);
        if (d < best) { best = d; c = t; }
      }
      const fc = f(c), hx = 0.62;              // tangent drawn ± hx in x about c
      const svg = buildPlot({
        w: 320, h: 250,
        xmin: -0.15, xmax: 2.7, ymin: -0.12, ymax: 1.2,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: a, tex: "a" }, { x: c, tex: "c" }, { x: b, tex: "b" }],
        yticks: [],
        items: [
          { type: "curve", fn: f, domain: [-0.05, 2.55], samples: 200, cls: "curve" },
          { type: "seg", x1: a, y1: fa, x2: b, y2: fb, cls: "secant" },
          { type: "seg", x1: c - hx, y1: fc - hx * m, x2: c + hx, y2: fc + hx * m, cls: "tangent" },
          { type: "dot", x: a, y: fa, r: 2.5 },
          { type: "dot", x: b, y: fb, r: 2.5 },
          { type: "dot", x: c, y: fc, r: 2.5 },
          { type: "text", x: 1.7, y: 0.42, text: "secant", cls: "a-pt", anchor: "middle" },
          { type: "text", x: c + hx + 0.03, y: fc + hx * m, text: "tangent", cls: "a-pt", anchor: "start", vAnchor: "middle" }
        ],
        aria: "A smooth curve y = f of x rising over the interval from a to b. A dashed secant line joins the endpoints (a, f(a)) and (b, f(b)). A solid tangent line touches the curve at an interior point c and is parallel to the secant, illustrating the Mean Value Theorem: some interior slope equals the average slope."
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §4.5 — e^x and ln x as reflections across y = x.
       The blue exponential (.curve, --c-primary) and the red logarithm
       (.curve-log, --c-caution) are mirror images across the dashed gray
       identity line y = x (.idline, --c-aux), as the inverse relation
       ln(e^x) = x requires. The point (0,1) on e^x reflects to (1,0) on ln x
       (both dotted). The window is set so the inner box is square and the x
       and y spans are equal (iw == ih, both span 6.3 units), which keeps the
       45-degree reflection honest. Labels limited to the three curves; the
       reflected point pair lives in the caption (CONTENT_SPEC 10). */
    "exp-log-reflection": () => {
      const svg = buildPlot({
        w: 300, h: 296,
        xmin: -2.3, xmax: 4.0, ymin: -2.3, ymax: 4.0,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: 1, tex: "1" }],
        yticks: [{ y: 1, tex: "1" }],
        items: [
          { type: "seg", x1: -2.3, y1: -2.3, x2: 4.0, y2: 4.0, cls: "idline" },
          { type: "curve", fn: (x) => Math.exp(x), domain: [-2.3, 1.4], samples: 200, cls: "curve" },
          { type: "curve", fn: (x) => Math.log(x), domain: [0.1, 4.0], samples: 200, cls: "curve-log" },
          { type: "dot", x: 0, y: 1, r: 2.5 },
          { type: "dot", x: 1, y: 0, r: 2.5 },
          { type: "text", x: 1.35, y: 3.95, tex: "e^{x}", cls: "a-curve", anchor: "end", vAnchor: "bottom" },
          { type: "text", x: 3.95, y: 1.35, tex: "\\ln x", cls: "a-ref", anchor: "start", vAnchor: "top" },
          { type: "text", x: 3.55, y: 3.4, text: "y = x", cls: "a-ax", anchor: "start", vAnchor: "top" }
        ],
        aria: "The blue curve y = e to the x and the red curve y = ln x are reflections of each other across the dashed diagonal line y = x. The point (0, 1) on the exponential curve reflects to the point (1, 0) on the logarithm curve."
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §4.1 — Completeness: a monotone, bounded sequence is forced to converge.
       Discrete terms a_n (dots, not joined — a sequence, not a curve) rise while
       staying under the upper bound M (gray dashed); pinned below M they have
       nowhere to go but toward a limit L (red dashed), which exists because R is
       complete. Illustration of the stated-not-proved Property (Theorem 4.1); the
       concrete instance 3, 3.1, 3.14, … -> pi under M = 4 lives in the caption.
       Labels limited to M and L. */
    "completeness-bound": () => {
      const L = 3, M = 3.5;
      const a = (n) => L - 1.5 * Math.pow(0.62, n);
      const items = [
        { type: "hline", y: M, cls: "idline" },
        { type: "hline", y: L, cls: "refline" },
        { type: "text", x: 7.7, y: M, tex: "M", cls: "a-pt", anchor: "start", vAnchor: "middle" },
        { type: "text", x: 7.7, y: L, tex: "L", cls: "a-ref", anchor: "start", vAnchor: "middle" }
      ];
      for (let n = 1; n <= 7; n++) items.push({ type: "dot", x: n, y: a(n), r: 2.6 });
      const svg = buildPlot({
        w: 322, h: 244,
        xmin: 0, xmax: 8.5, ymin: 1.7, ymax: 3.8,
        xlabel: "n", ylabel: "",
        xticks: [{ x: 1, tex: "1" }, { x: 2, tex: "2" }, { x: 3, tex: "3" }],
        yticks: [],
        items: items,
        aria: "Dots representing the terms of an increasing sequence rise from left to right while staying below a gray dashed horizontal upper bound M. Pinned beneath M, the terms crowd toward a red dashed limit line L just below M, which the completeness of the real numbers guarantees exists."
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §4.4 — Interior extremum (Theorem A): the two-sided squeeze forcing f'(x_M)=0.
       A curve peaking at an interior maximum x_M. From the peak the right secant
       (h>0) slopes down and the left secant (h<0) slopes up (both dashed, gray):
       the right difference quotient stays <=0, the left stays >=0, so the single
       value f'(x_M) is caught between and must be 0 — the horizontal tangent
       (solid). Only works in the open interior, where both one-sided increments
       exist (the endpoint caution). Labels limited to x_M and f'(x_M)=0. */
    "interior-extremum-squeeze": () => {
      const f = (x) => 1 - 0.5 * (x - 1.5) * (x - 1.5);
      const xM = 1.5, hh = 0.8;
      const xr = xM + hh, xl = xM - hh;
      const svg = buildPlot({
        w: 322, h: 244,
        xmin: -0.1, xmax: 3.1, ymin: -0.05, ymax: 1.3,
        xlabel: "x", ylabel: "",
        xticks: [{ x: xM, tex: "x_{M}" }],
        yticks: [],
        items: [
          { type: "curve", fn: f, domain: [0.2, 2.8], samples: 200, cls: "curve" },
          { type: "seg", x1: xM, y1: f(xM), x2: xr, y2: f(xr), cls: "secant" },
          { type: "seg", x1: xl, y1: f(xl), x2: xM, y2: f(xM), cls: "secant" },
          { type: "seg", x1: xM - 0.62, y1: f(xM), x2: xM + 0.62, y2: f(xM), cls: "tangent" },
          { type: "dot", x: xM, y: f(xM), r: 2.6 },
          { type: "dot", x: xr, y: f(xr), r: 2.4 },
          { type: "dot", x: xl, y: f(xl), r: 2.4 },
          { type: "text", x: xM, y: f(xM) + 0.13, tex: "f'(x_{M})=0", cls: "a-pt", anchor: "middle", vAnchor: "bottom" }
        ],
        aria: "A smooth curve rising to an interior maximum at x sub M and falling again. From the peak a dashed secant goes down to the right and another dashed secant comes up from the left; the right difference quotient is at most zero and the left at least zero, trapping the derivative at the peak between them. The solid horizontal tangent at the peak shows that this trapped value is zero."
      });
      return { layout: "single", panels: [{ svg }] };
    },

    /* §4.5 — Why (ln x)' = 1/x: reflection makes the tangent slopes reciprocal.
       e^x (blue) and ln x (red) mirror across y = x (gray dashed). At the mirror
       pair P = (ln 2, 2) on e^x and Q = (2, ln 2) on ln x, the tangents (solid)
       are themselves mirror images: e^x has slope e^{ln 2} = 2 there, so its
       reflection — the tangent to ln at Q — has the reciprocal slope 1/2.
       Reflection swaps rise and run, which is exactly (ln x)' = 1/e^{ln x} = 1/x.
       Equal axis scales keep the 45-degree reflection honest. Labels: three curves. */
    "reciprocal-slope-log": () => {
      const a = Math.log(2);          // P=(a, 2) on e^x, slope e^a = 2; Q=(2, a) on ln x, slope 1/2
      const svg = buildPlot({
        w: 300, h: 296,
        xmin: -0.4, xmax: 3.2, ymin: -0.4, ymax: 3.2,
        xlabel: "x", ylabel: "y",
        xticks: [{ x: 1, tex: "1" }],
        yticks: [{ y: 1, tex: "1" }],
        items: [
          { type: "seg", x1: -0.4, y1: -0.4, x2: 3.2, y2: 3.2, cls: "idline" },
          { type: "curve", fn: (x) => Math.exp(x), domain: [-0.4, 1.18], samples: 200, cls: "curve" },
          { type: "curve", fn: (x) => Math.log(x), domain: [0.08, 3.2], samples: 200, cls: "curve-log" },
          { type: "seg", x1: a - 0.4, y1: 2 - 0.8, x2: a + 0.4, y2: 2 + 0.8, cls: "tangent" },
          { type: "seg", x1: 2 - 0.8, y1: a - 0.4, x2: 2 + 0.8, y2: a + 0.4, cls: "tangent" },
          { type: "dot", x: a, y: 2, r: 2.5 },
          { type: "dot", x: 2, y: a, r: 2.5 },
          { type: "text", x: 1.12, y: 3.05, tex: "e^{x}", cls: "a-curve", anchor: "end", vAnchor: "bottom" },
          { type: "text", x: 3.15, y: 1.18, tex: "\\ln x", cls: "a-ref", anchor: "start", vAnchor: "top" },
          { type: "text", x: 2.46, y: 3.08, text: "y = x", cls: "a-ax", anchor: "start", vAnchor: "bottom" }
        ],
        aria: "The blue curve e to the x and the red curve ln x are mirror images across the dashed line y = x. At the matching pair of points ln 2 comma 2 on the exponential and 2 comma ln 2 on the logarithm, the two solid tangent lines are also mirror images: the steep one on the exponential has slope 2, and its reflection on the logarithm has the reciprocal slope one half. Reflection swaps rise and run, which is why the derivative of ln x is one over x."
      });
      return { layout: "single", panels: [{ svg }] };
    },

  };

  /* ---- hydrateFigures: fills every <figure data-fig="id"> ---- */
  function hydrateFigures(root) {
    (root || document).querySelectorAll("[data-fig]").forEach(function (el) {
      var def = FIGS[el.dataset.fig];
      if (!def || el.dataset.figDone) return;
      var r = def();
      var layout = r.layout, panels = r.panels;
      var html;
      if (layout === "single" && panels.length === 1 && !panels[0].note) {
        html = '<div class="figure-art">' + panels[0].svg + '</div>';
      } else {
        var cls = { pair: "figure-art--pair", triple: "figure-art--triple", grid: "figure-art--grid" }[layout] || "";
        html = '<div class="figure-art ' + cls + '">' +
          panels.map(function (p) {
            return '<div class="fig-panel">' + p.svg + (p.note ? '<div class="fig-note">' + p.note + '</div>' : '') + '</div>';
          }).join("") + '</div>';
      }
      el.insertAdjacentHTML("afterbegin", html);
      el.dataset.figDone = "1";
    });
  }
  window.hydrateFigures = hydrateFigures;
})();
</script>

<!-- Main build script (paginator + MathJax) -->
<script>
var CHAPTER = {
  brand: "Chapter 4 — The Exponential and Logarithmic Functions",
  runningHead: "Chapter 4 · The Exponential and Logarithmic Functions",
  fragments: ["sec-4-1", "sec-4-2", "sec-4-3", "sec-4-4", "sec-4-5"],
};
var FRAGMENTS = CHAPTER.fragments;
var RUNNING_HEAD = CHAPTER.runningHead;

function renderMath(root) {
  if (!root) return Promise.resolve();
  if (window.MathJax && window.MathJax.typesetPromise) {
    return MathJax.typesetPromise([root]).catch(function(e) { console.warn("mathjax", e); });
  }
  return Promise.resolve();
}

function waitFor(test, tries) {
  return new Promise(function(resolve) {
    var n = 0;
    var tick = function() {
      if (test()) return resolve(true);
      if (n++ > (tries || 100)) return resolve(false);
      setTimeout(tick, 50);
    };
    tick();
  });
}

var isHeading = function(el) {
  return el.matches && el.matches(".chapter-head, .sec-head, .subsec-head, .para-head, .env-head");
};

function isDisplayChild(n) {
  if (n.nodeType !== 1) return false;
  var tag = n.tagName && n.tagName.toLowerCase();
  if (tag === "mjx-container" && n.getAttribute("display") === "true") return true;
  if (n.querySelector && n.querySelector('mjx-container[display="true"]')) return true;
  return false;
}

var SPLIT_ENVS = ".env-example, .env-solution, .env-proof, .env-definition, .env-theorem, .env-proposition, .env-corollary";
var DISP_SEL = 'mjx-container[display="true"]';

function liCount(el) { return [].filter.call(el.children, function(x) { return x.tagName === "LI"; }).length; }

function countBodyUnits(bodyEl) {
  var n = 0;
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL)) n += explodeParagraph2(ch);
    else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) n += liCount(ch);
    else n++;
  });
  return n;
}

function isSplittable(block) {
  if (!block.classList) return false;
  if (block.classList.contains("workedexample")) return block.children.length >= 2;
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    return !!b && countBodyUnits(b) > 1;
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL)) {
    return explodeParagraph2(block) > 1;
  }
  return false;
}

function onlyLists(bodyEl) {
  var els = contentKids(bodyEl);
  return els.length > 0 && els.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; });
}

function contentKids(bodyEl) {
  return [].filter.call(bodyEl.children, function(c) {
    return !(c.classList && c.classList.contains("qed")) && (c.textContent.trim() || c.querySelector("*"));
  });
}

function splitMode(block) {
  if (!block.classList) return "none";
  if (block.classList.contains("workedexample")) return block.children.length >= 2 ? "free" : "none";
  if (block.matches(SPLIT_ENVS)) {
    var b = block.querySelector(":scope > .env-body");
    if (!b || countBodyUnits(b) <= 1) return "none";
    var kids = contentKids(b);
    var hasPara = kids.some(function(c) {
      return c.tagName === "P" && c.querySelector(DISP_SEL) && explodeParagraph2(c) > 1;
    });
    if (hasPara || (kids.length >= 2 && !kids.every(function(c) { return c.tagName === "OL" || c.tagName === "UL"; }))) return "free";
    return "list";
  }
  if (block.tagName === "P" && block.querySelector(DISP_SEL) && explodeParagraph2(block) > 1) return "free";
  return "none";
}

function explodeParagraph2(p) {
  var n = 0, hasBuf = false;
  [].forEach.call(p.childNodes, function(node) {
    if (isDisplayChild(node)) {
      if (hasBuf) { n++; hasBuf = false; }
      n++;
    } else if ((node.textContent && node.textContent.trim()) || node.nodeType === 1) {
      hasBuf = true;
    }
  });
  if (hasBuf) n++;
  return n;
}

function explodeParagraph(p) {
  var parts = [], buf = [];
  var flush = function() {
    var hasContent = buf.some(function(n) { return (n.textContent && n.textContent.trim()) || n.nodeType === 1; });
    if (hasContent) {
      var np = document.createElement("p");
      np.className = p.className;
      buf.forEach(function(n) { np.appendChild(n); });
      parts.push(np);
    } else {
      buf.forEach(function(n) { if (n.parentNode) n.parentNode.removeChild(n); });
    }
    buf = [];
  };
  [].slice.call(p.childNodes).forEach(function(node) {
    if (isDisplayChild(node)) { flush(); var np = document.createElement("p"); np.className = p.className; np.appendChild(node); parts.push(np); }
    else { buf.push(node); }
  });
  flush();
  return parts;
}

function listToUnits(listEl) {
  var items = [].filter.call(listEl.children, function(x) { return x.tagName === "LI"; });
  if (items.length < 2) return [listEl];
  var tag = listEl.tagName.toLowerCase();
  return items.map(function(li, i) {
    var nl = document.createElement(tag);
    nl.className = listEl.className;
    if (tag === "ol") nl.setAttribute("start", String(i + 1));
    nl.appendChild(li);
    return nl;
  });
}

function bodyToUnits(bodyEl) {
  var units = [];
  [].forEach.call(bodyEl.children, function(ch) {
    if (ch.tagName === "P" && ch.querySelector(DISP_SEL) && explodeParagraph2(ch) > 1) {
      explodeParagraph(ch).forEach(function(u) { units.push(u); });
    } else if ((ch.tagName === "OL" || ch.tagName === "UL") && liCount(ch) >= 2) {
      listToUnits(ch).forEach(function(u) { units.push(u); });
    } else { units.push(ch); }
  });
  return units;
}

function splitEnvOverflow(env) {
  var bodyEl = env.querySelector(":scope > .env-body");
  if (!bodyEl) return null;
  var kids = bodyToUnits(bodyEl);
  if (kids.length < 2) return null;
  bodyEl.innerHTML = "";
  bodyEl.appendChild(kids.shift());
  var parts = [env];
  kids.forEach(function(k) {
    if (k.classList && k.classList.contains("qed") && parts.length > 0) {
      var prev = parts[parts.length - 1];
      var prevBody = prev.querySelector(":scope > .env-body") || prev.querySelector(".env-body");
      if (prevBody) { prevBody.appendChild(k); return; }
    }
    var cont = document.createElement("section");
    cont.className = env.className + " env-cont";
    var b = document.createElement("div");
    b.className = "env-body";
    b.appendChild(k);
    cont.appendChild(b);
    parts.push(cont);
  });
  return parts;
}

function splitParts(block) {
  if (block.classList.contains("workedexample")) return [].slice.call(block.children);
  if (block.matches(SPLIT_ENVS)) return splitEnvOverflow(block) || [block];
  if (block.tagName === "P") { var ex = explodeParagraph(block); return ex.length > 1 ? ex : [block]; }
  return [block];
}

function paginate(blocks) {
  var pagesEl = document.getElementById("pages");
  pagesEl.innerHTML = "";
  var idx = 0, body = null;
  var newSheet = function() {
    var sheet = document.createElement("div");
    sheet.className = "sheet";
    var header = document.createElement("div");
    header.className = "sheet-header";
    header.textContent = idx === 0 ? "" : RUNNING_HEAD;
    body = document.createElement("div");
    body.className = "sheet-body paper skin-hs vivid";
    var footer = document.createElement("div");
    footer.className = "sheet-footer";
    footer.textContent = String(idx + 1);
    sheet.append(header, body, footer);
    pagesEl.appendChild(sheet);
    idx++;
  };
  newSheet();
  var fits = function() { return body.scrollHeight <= body.clientHeight + 1; };
  var FREE_THRESHOLD = 130;
  var moveToFreshPage = function(block) {
    var carry = null;
    if (body.childElementCount > 0) {
      var last = body.lastElementChild;
      if (last && isHeading(last)) { carry = last; body.removeChild(last); }
      newSheet();
      if (carry) body.appendChild(carry);
    }
    body.appendChild(block);
  };
  var place = function(block) {
    body.appendChild(block);
    if (fits()) {
      if (isHeading(block) && body.childElementCount > 1) {
        var _bRect = block.getBoundingClientRect();
        var _bodyRect = body.getBoundingClientRect();
        var _rem = (_bodyRect.top + body.clientHeight) - _bRect.bottom;
        var _threshold = block.matches(".sec-head, .chapter-head") ? 160 : 100;
        if (_rem < _threshold) {
          body.removeChild(block);
          newSheet();
          body.appendChild(block);
        }
      }
      return;
    }
    var blockH = block.getBoundingClientRect().height;

    var isFigure = block.tagName === "FIGURE" || (block.classList && block.classList.contains("figure"));
    var _figArt = isFigure ? block.querySelector(".figure-art") : null;
    var _artH = 0, _capH = 0;
    if (_figArt) {
      _artH = _figArt.getBoundingClientRect().height;
      var _figCap = block.querySelector("figcaption");
      _capH = _figCap ? _figCap.getBoundingClientRect().height : 0;
    }

    body.removeChild(block);

    if (_figArt && _artH > 0) {
      var _probe = document.createElement("div");
      _probe.style.height = "0"; _probe.style.margin = "0"; _probe.style.padding = "0";
      body.appendChild(_probe);
      var _remaining = body.clientHeight - (_probe.getBoundingClientRect().top - body.getBoundingClientRect().top);
      body.removeChild(_probe);
      var FIG_MIN_SCALE = 0.55;
      var _figMargin = blockH - _artH - _capH;
      var _availForArt = _remaining - _capH - _figMargin;
      var neededScale = _availForArt / _artH;
      if (_availForArt > 60 && neededScale >= FIG_MIN_SCALE && neededScale < 1) {
        var _oZ = _figArt.style.zoom;
        var _oMt = block.style.marginTop, _oMb = block.style.marginBottom;
        _figArt.style.zoom = neededScale;
        block.style.marginTop = "0.3em"; block.style.marginBottom = "0";
        body.appendChild(block);
        if (fits()) return;
        body.removeChild(block);
        _figArt.style.zoom = _oZ;
        block.style.marginTop = _oMt; block.style.marginBottom = _oMb;
      }
    }

    if (block.classList.contains && block.classList.contains("workedexample") && block.children.length >= 2) {
      var lastEl = body.lastElementChild;
      var used = lastEl ? lastEl.getBoundingClientRect().bottom - body.getBoundingClientRect().top : 0;
      var remaining = body.clientHeight - used;
      if (remaining < FREE_THRESHOLD && blockH <= body.clientHeight) {
        moveToFreshPage(block);
        if (fits()) return;
        body.removeChild(block);
      }
      var kids = [].slice.call(block.children);
      var ex = kids[0], sol = kids[1], extra = kids.slice(2);
      block.removeChild(ex);
      var solParts = splitParts(sol);
      body.appendChild(ex);
      if (!fits()) { body.removeChild(ex); moveToFreshPage(ex); }
      var first = solParts[0];
      body.appendChild(first);
      if (!fits()) {
        body.removeChild(first);
        body.removeChild(ex);
        moveToFreshPage(ex);
        body.appendChild(first);
        if (!fits()) { body.removeChild(first); place(first); }
      }
      for (var i = 1; i < solParts.length; i++) place(solParts[i]);
      extra.forEach(place);
      return;
    }
    var mode = splitMode(block);
    var want = (mode !== "none" && blockH > body.clientHeight);
    if (want) { var parts = splitParts(block); if (parts.length > 1) { parts.forEach(place); return; } }
    moveToFreshPage(block);
    if (!fits() && mode !== "none") {
      var parts2 = splitParts(block);
      if (parts2.length > 1) { body.removeChild(block); parts2.forEach(place); }
    }
  };
  blocks.forEach(place);
  return idx;
}

function build() {
  var status = document.getElementById("status");

  /* Load section fragments from inline <template> elements */
  var page = document.getElementById("page");
  var parts = FRAGMENTS.map(function(id) {
    var tpl = document.getElementById("frag-" + id);
    return tpl ? tpl.innerHTML : "";
  });
  page.innerHTML = parts.join("\n");

  if (window.hydrateFigures) window.hydrateFigures(page);

  /* Wait for MathJax to load, then typeset */
  waitFor(function() { return window.MathJax && window.MathJax.typesetPromise; }, 200).then(function(ok) {
    if (!ok) { status.textContent = "MathJax load timeout"; return; }
    return renderMath(page);
  }).then(function() {
    var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    return fontsReady;
  }).then(function() {
    status.textContent = "Paginating …";
    return new Promise(function(r) { setTimeout(r, 60); });
  }).then(function() {
    var blocks = [];
    page.querySelectorAll(":scope > .sec").forEach(function(sec) {
      [].forEach.call(sec.children, function(ch) { blocks.push(ch); });
    });

    var n = paginate(blocks);
    var src = document.getElementById("source");
    if (src) src.remove();

    status.textContent = n + " page" + (n === 1 ? "" : "s") + " · A4";
    var btn = document.getElementById("printBtn");
    btn.disabled = false;
    btn.addEventListener("click", function() { window.print(); });

    var boot = document.getElementById("boot");
    if (boot) boot.remove();
  });
}

window.addEventListener("DOMContentLoaded", build);
</script>
