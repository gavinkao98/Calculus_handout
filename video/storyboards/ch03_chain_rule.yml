  # 25 ------------------------------------------------------- recap (Key Takeaways)
  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    source: "chapter3-print-standalone.html SS3.2 . whole-section synthesis"
    title: "Key Takeaways"
    say: |
      Pull the section together.
      {show point.0} The chain rule differentiates a composition: the outer
      derivative at the inner function, times the inner derivative.
      {show point.1} In Leibniz form, the rates multiply.
      {show point.2} To use it, decompose from the outside in -- every layer
      contributes one slope factor.
      {show point.3} The number-one pitfall is dropping the inner derivative; and
      underneath it all, each function is locally its tangent line, so the local
      slopes multiply.
    points:
      - "Chain rule: $P'(x_0)=f'(g(x_0))\\,g'(x_0)$ --- outer derivative at the inner function, times the inner derivative."
      - "Leibniz form: $\\dfrac{dy}{dx}=\\dfrac{dy}{du}\\cdot\\dfrac{du}{dx}$ --- the rates multiply."
      - "Decompose from the outside in; every layer contributes one slope factor."
      - "Pitfall: never drop the inner derivative $g'(x)$. Why it works: locally each function is its tangent line."
    formulas:
      - "$P'(x_0)=f'(g(x_0))\\,g'(x_0)$"
      - "$\\dfrac{dy}{dx}=\\dfrac{dy}{du}\\cdot\\dfrac{du}{dx}$"

