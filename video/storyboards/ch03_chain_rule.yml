  # 9 ----------------------------------- bridge: repackage "differentiable"
  - id: proof_strategy_bridge
    kind: content
    template: definition_math
    accent: definition
    source: "chapter3-print-standalone.html SS3.2 . Why the rule is true (bridge) + borrowed tools"
    title: "Repackaging the Derivative"
    say: |
      The rule is already usable -- now let's earn it.
      {show statement} To prove the two slopes really multiply, we handle both
      functions' tangent-line approximations at once -- and for that we repackage
      what differentiable means. Two facts we'll lean on without re-proving: the
      product rule, and that a differentiable function is continuous.
      {show math.0} We earlier called $f$ differentiable at $x_0$ when its
      difference quotient has a limit -- and that limit is $f'(x_0)$.
      {show math.1} We're about to say exactly the same thing, only phrased as
      approximation by a straight line.
    statement: "Same derivative, restated as approximation by a line."
    math:
      - "$\\dfrac{f(x_0+h)-f(x_0)}{h}\\ \\longrightarrow\\ f'(x_0)$"
      - { tex: "$\\text{limit form}\\ \\Longleftrightarrow\\ \\text{remainder (line) form}$", anim: highlight }

  # 10 ------------------------------- Definition 3.1: the remainder form
  - id: remainder_form_definition
    kind: content
    template: definition_math
    accent: definition
    source: "chapter3-print-standalone.html SS3.2 . Definition 3.1 (remainder form) + informal gloss"
    title: "Differentiability, Remainder Form"
    say: |
      Here's the form.
      {show statement} We say $f$ is differentiable at $x_0$ if there's a number
      $m$ and a function $R$ with this equation, where the remainder over $h$
      goes to zero.
      {show math.0} The number $m$ is just the derivative, $f'(x_0)$.
      {show math.1} Informally: $f(x_0+h)$ equals its tangent-line value plus an
      error that dies faster than $h$ itself. That "faster than $h$" is the whole
      point -- it's what lets these pieces compose.
    statement: "$f(x_0+h)=f(x_0)+m\\,h+R(h),\\qquad \\displaystyle\\lim_{h\\to 0}\\frac{R(h)}{h}=0.$"
    math:
      - "$m=f'(x_0)$"
      - { tex: "$f(x_0+h)\\approx \\underbrace{f(x_0)+m\\,h}_{\\text{tangent line}}\\ +\\ \\underbrace{R(h)}_{\\text{error}\\,\\ll\\, h}$", anim: highlight }

  # 11 ----------------------------- Figure 3.6: remainder as a first-order fit (HOOK)
  - id: remainder_tangent_figure
    kind: content
    template: graph
    mode: single
    accent: definition
    hook: "animations.ch03_chain_rule_hooks:remainder_tangent"
    source: "chapter3-print-standalone.html SS3.2 . Figure 3.6 (remainder-tangent)"
    title: "The Error Shrinks Faster"
    say: |
      Let's watch that error shrink. Here's the graph of $f$ near $x_0$, hugging
      its tangent line.
      {show gap_Rh} At a nearby point $x_0+h$ the two don't quite agree, and the
      little vertical gap between them is exactly the remainder $R(h)$.
      {show gap_halved} Now halve $h$. The gap doesn't merely halve -- it
      collapses far faster, shrinking to nothing next to $h$. That's the picture
      of the remainder over $h$ going to zero.
      {show local_fact} And this single-curve fact is what's underneath the
      composition: up close, each function is almost its own tangent line, and
      it's those straight-line parts whose slopes multiply.
    axes:
      x_range: [-1, 1, 1]
      y_range: [-1, 1, 1]
      x_length: 6.0
      y_length: 3.2
    plots: []

  # 12 ------------------------- Proposition 3.3 + Proof: the two forms agree
  - id: two_forms_equivalent
    kind: content
    template: theorem_proof
    accent: proposition
    label: "[ proposition ]"
    source: "chapter3-print-standalone.html SS3.2 . Proposition 3.3 + Proof (both directions)"
    title: "The Two Forms Agree"
    say: |
      Before we use this, let's check it's not a new idea -- just the old one
      rewritten.
      {show statement} The claim: the limit form and the remainder form are
      equivalent, with the same $m$.
      {show proof.0} One direction -- if the difference quotient tends to $m$,
      set $R(h)=f(x_0+h)-f(x_0)-mh$; then $R(h)/h$ is that quotient minus $m$,
      which goes to zero.
      {show proof.1} The other way runs backward: divide the remainder equation
      by $h$ and the quotient becomes $m+R(h)/h$, which goes to $m$.
      {show qed} Same property, same derivative -- two ways of saying one thing.
    statement: "Limit form $\\Longleftrightarrow$ remainder form, same $m=f'(x_0)$."
    proof:
      - "$\\tfrac{R(h)}{h}=\\tfrac{f(x_0+h)-f(x_0)}{h}-m\\ \\longrightarrow\\ 0$"
      - "$\\tfrac{f(x_0+h)-f(x_0)}{h}=m+\\tfrac{R(h)}{h}\\ \\longrightarrow\\ m$"
    qed: "same property, same derivative"

  # 13 --------------------- Proof of Theorem 3.3 (1/4): substitute the remainder forms
  - id: proof_setup_substitution
    kind: content
    template: theorem_proof
    accent: theorem
    label: "[ proof of the chain rule ]"
    part: { current: 1, total: 4 }
    source: "chapter3-print-standalone.html SS3.2 . Proof of Theorem 3.3 (substitution, collect, R_3)"
    title: "Why the Slopes Multiply"
    say: |
      Now the proof, and the remainder form does the heavy lifting.
      {show proof.0} Because $g$ is differentiable at $x_0$, write it in
      remainder form, with $m_1=g'(x_0)$.
      {show proof.1} Because $f$ is differentiable at $g(x_0)$, apply its
      remainder form too -- with $m_1 h+R_1(h)$ playing the role of $h$.
      {show proof.2} Collect the part linear in $h$, and sweep everything else
      into a single remainder $R_3$.
      {show qed} Matched against the remainder form, that already gives the
      derivative we want -- provided $R_3(h)/h$ goes to zero. That one limit is
      all that's left.
    statement: "Substitute the remainder forms."
    proof:
      - "$g(x_0+h)=g(x_0)+m_1 h+R_1(h),\\quad m_1=g'(x_0)$"
      - "$P(x_0+h)=f(g(x_0))+m_2\\!\\left[m_1 h+R_1(h)\\right]+R_2\\!\\left(m_1 h+R_1(h)\\right)$"
      - "$=P(x_0)+\\bigl(g'(x_0)f'(g(x_0))\\bigr)h+R_3(h)$"
    qed: "remains: $\\tfrac{R_3(h)}{h}\\to 0$"

  # 14 --------------------- Proof of Theorem 3.3 (2/4): split off the easy piece
  - id: proof_easy_piece
    kind: content
    template: theorem_proof
    accent: theorem
    label: "[ proof of the chain rule ]"
    part: { current: 2, total: 4 }
    source: "chapter3-print-standalone.html SS3.2 . Proof of Theorem 3.3 (split R_3/h; easy piece; inner -> 0)"
    title: "Why the Slopes Multiply"
    say: |
      {show proof.0} Split that quotient into two pieces.
      {show proof.1} The first is easy: $m_2$ is a constant and $R_1(h)/h$ goes
      to zero, so the whole first piece goes to zero.
      {show proof.2} And note for later -- the inner increment $m_1 h+R_1(h)$
      itself goes to zero, since both $m_1 h$ and $R_1(h)$ do.
      {show qed} So the easy piece is settled; everything delicate now lives in
      the second piece.
    statement: "Split the quotient; the first piece is easy."
    proof:
      - "$\\tfrac{R_3(h)}{h}=m_2\\,\\tfrac{R_1(h)}{h}+\\tfrac{R_2(m_1 h+R_1(h))}{h}$"
      - "$m_2\\,\\tfrac{R_1(h)}{h}\\to 0\\quad(m_2\\text{ const},\\ \\tfrac{R_1(h)}{h}\\to 0)$"
      - "$m_1 h+R_1(h)\\to 0\\quad(\\text{noted for later})$"
    qed: "the delicate piece remains"

  # 15 --------------------- Proof of Theorem 3.3 (3/4): the epsilon-delta choices
  - id: proof_delicate_choices
    kind: content
    template: theorem_proof
    accent: theorem
    label: "[ proof of the chain rule ]"
    part: { current: 3, total: 4 }
    source: "chapter3-print-standalone.html SS3.2 . Proof of Theorem 3.3 (choose delta, alpha; zero case)"
    title: "Why the Slopes Multiply"
    say: |
      The second piece is the careful one -- a remainder of $f$ at that wobbling
      inner increment, over $h$. Run an epsilon-delta argument; fix any
      $\varepsilon>0$.
      {show proof.0} Since $R_2(y)/y\to 0$, there's a $\delta$ so the relative
      remainder of $f$ is below $\varepsilon$ for $0<|y|<\delta$.
      {show proof.1} Since the inner increment goes to zero, there's an $\alpha$
      keeping it below $\delta$ for $0<|h|<\alpha$.
      {show proof.2} Take such an $h$. If the inner increment is exactly zero,
      then $R_2(0)=0$ and the piece is just zero.
      {show qed} So only the nonzero case is left.
    statement: "Fix $\\varepsilon>0$ and choose the windows."
    proof:
      - "$\\tfrac{R_2(y)}{y}\\to 0\\ \\Rightarrow\\ \\exists\\,\\delta:\\ \\bigl|\\tfrac{R_2(y)}{y}\\bigr|<\\varepsilon\\ \\ (0<|y|<\\delta)$"
      - "$m_1 h+R_1(h)\\to 0\\ \\Rightarrow\\ \\exists\\,\\alpha:\\ |m_1 h+R_1(h)|<\\delta\\ \\ (0<|h|<\\alpha)$"
      - "$m_1 h+R_1(h)=0\\ \\Rightarrow\\ R_2(0)=0\\ \\Rightarrow\\ \\text{piece}=0$"
    qed: "only the nonzero case remains"

  # 16 --------------------- Proof of Theorem 3.3 (4/4): bound it, and conclude
  - id: proof_delicate_bound
    kind: content
    template: theorem_proof
    accent: theorem
    label: "[ proof of the chain rule ]"
    part: { current: 4, total: 4 }
    source: "chapter3-print-standalone.html SS3.2 . Proof of Theorem 3.3 (factor, triangle bound, alpha_1; QED)"
    title: "Why the Slopes Multiply"
    say: |
      Take the nonzero case.
      {show proof.0} Multiply and divide by the inner increment, splitting the
      piece into two factors.
      {show proof.1} The second factor is below $\varepsilon$ by our choice of
      $\delta$, the first is bounded by the triangle inequality, and shrinking
      the window once more so $|R_1(h)|/|h|<1$ puts the whole piece below
      $(|m_1|+1)\,\varepsilon$.
      {show qed} A fixed constant times $\varepsilon$, and $\varepsilon$ was
      arbitrary -- so this piece vanishes too. Both pieces vanish, $R_3(h)/h$
      goes to zero, and the chain rule is proved.
    statement: "Bound the nonzero case, then let $\\varepsilon\\to 0$."
    proof:
      - "$\\tfrac{|R_2(m_1 h+R_1(h))|}{|h|}=\\tfrac{|m_1 h+R_1(h)|}{|h|}\\cdot\\tfrac{|R_2(m_1 h+R_1(h))|}{|m_1 h+R_1(h)|}$"
      - "$\\le\\left(|m_1|+\\tfrac{|R_1(h)|}{|h|}\\right)\\varepsilon\\ <\\ (|m_1|+1)\\,\\varepsilon$"
    qed: "so $\\tfrac{R_3(h)}{h}\\to 0$ --- proved"

