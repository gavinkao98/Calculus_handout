  # 2 ------------------------------------------ motivation: composition is missing
  - id: why_composition_is_missing
    kind: content
    template: definition_math
    accent: definition
    source: "chapter3-print-standalone.html SS3.2 . opening prose (the missing rule)"
    title: "The Missing Rule"
    say: |
      We can differentiate sine and cosine now -- but only in their bare form.
      {show math.0} We can handle $\sin x$, yet nothing so far reaches
      $\sin(x^2)$ or $\sqrt{1+x^2}$, where one function is fed into another.
      {show math.1} We built rules for sums, products, and quotients -- but
      never for composition, the operation of dropping one function inside
      another.
      {show statement} That is the one gap left, and the chain rule fills it
      exactly -- and with it, the toolkit for differentiation is finally
      complete.
    statement: "Composition is the missing rule --- the chain rule completes the toolkit."
    math:
      - "$\\sin x\\ \\checkmark \\qquad \\sin(x^{2})\\,?\\qquad \\sqrt{1+x^{2}}\\,?$"
      - { tex: "$\\text{sums},\\ \\text{products},\\ \\text{quotients}\\ \\checkmark \\qquad \\text{composition}\\,?$", anim: highlight }

  # 3 ----------------------------------------- intuition: rates multiply
  - id: rates_multiply_intuition
    kind: content
    template: definition_math
    accent: definition
    source: "chapter3-print-standalone.html SS3.2 . opening prose (rates multiply, tangent-line idea)"
    title: "The Whole Idea, in One Picture"
    say: |
      Here's the whole idea in one picture. Near a point, a differentiable
      function behaves like its tangent line -- it scales a small change in its
      input by its slope, with an error that shrinks faster than the change
      does.
      {show math.0} Now chain two together: $g$ scales a small increment $h$ by
      $g'(x)$, and then $f$ scales that by $f'(g(x))$.
      {show statement} The two magnifications stack -- so the composite scales
      $h$ by the product $f'(g(x))\,g'(x)$.
      {show math.1} That's the chain rule; the proof, later, is just checking
      the two small errors stay negligible once chained.
    statement: "Stack two local stretches and the slopes multiply."
    math:
      - "$h \\;\\xrightarrow{\\ g\\ }\\; g'(x)\\,h \\;\\xrightarrow{\\ f\\ }\\; f'(g(x))\\,g'(x)\\,h$"
      - { tex: "$\\text{composite scales }h\\text{ by } f'(g(x))\\,g'(x)$", anim: highlight }

  # 4 ----------------------------------------- Theorem 3.3: the statement
  - id: chain_rule_statement
    kind: content
    template: definition_math
    accent: theorem
    kicker: theorem
    source: "chapter3-print-standalone.html SS3.2 . Theorem 3.3 (the chain rule)"
    title: "The Chain Rule"
    say: |
      Let's state it precisely.
      {show statement} If $g$ is differentiable at $x_0$, and $f$ is
      differentiable at $g(x_0)$, then the composition $P(x)=f(g(x))$ is
      differentiable at $x_0$ too.
      {show math.0} And its derivative is the outer derivative at the inner
      function, times the inner derivative.
      {show math.1} Read it from the inside out. We'll earn this with a proof a
      little later -- for now, let's learn to use it.
    statement: "$g$ differentiable at $x_0$, $f$ at $g(x_0)\\ \\Rightarrow\\ P=f\\circ g$ differentiable at $x_0$."
    math:
      - { tex: "$P'(x_0)=f'(g(x_0))\\,g'(x_0)$", anim: highlight }
      - "$\\underbrace{f'(g(x_0))}_{\\text{outer at inner}}\\;\\cdot\\;\\underbrace{g'(x_0)}_{\\text{inner derivative}}$"

  # 5 ---------------------------- Figure 3.5: the composed mapping (HOOK)
  - id: composed_mapping_figure
    kind: content
    template: graph
    mode: single
    accent: definition
    hook: "animations.ch03_chain_rule_hooks:composed_mapping"
    source: "chapter3-print-standalone.html SS3.2 . Figure 3.5 (composed-mapping)"
    title: "Two Stretches in a Row"
    say: |
      Picture the rule as a relay of two stretches.
      {show inc_h} Start with a small increment $h$ sitting at $x_0$.
      {show stretch_g} The first function $g$ carries it forward and stretches
      it to about $g'(x_0)\,h$, now sitting at $u_0=g(x_0)$.
      {show stretch_f} The second function $f$ stretches that again by its own
      slope there, landing at about $f'(g(x_0))\,g'(x_0)\,h$.
      {show product} Two stretches one after the other -- and stretching by one
      factor then another just multiplies the factors. That's why the
      composite's slope is the product of the two local slopes.
    axes:
      x_range: [-1, 1, 1]
      y_range: [-1, 1, 1]
      x_length: 6.0
      y_length: 3.0
    plots: []

  # 6 ----------------------------------------- Remark 3.2: the Leibniz form
  - id: leibniz_form
    kind: content
    template: definition_math
    accent: proposition
    source: "chapter3-print-standalone.html SS3.2 . Remark 3.2 (the Leibniz form)"
    title: "The Leibniz Form"
    say: |
      There's a second way to write the rule, and it's the one you'll actually
      compute with.
      {show math.0} Name the inner variable $u=g(x)$ and the output $y=f(u)$.
      Then the chain rule takes its memorable shape: the rate of $y$ per $x$
      equals the rate of $y$ per $u$ times the rate of $u$ per $x$.
      {show statement} It looks as though the $du$'s simply cancel -- a handy way
      to remember it, but not a proof.
      {show math.1} These aren't fractions with a common factor to strike out;
      each is a limit. What truly makes the rule work is the error argument
      we're about to give.
    statement: "The cancelling $du$ is a mnemonic, not a proof --- both pieces are limits."
    math:
      - { tex: "$\\dfrac{dy}{dx}=\\dfrac{dy}{du}\\cdot\\dfrac{du}{dx}\\qquad(u=g(x),\\ y=f(u))$", anim: highlight }
      - "$\\dfrac{dy}{du},\\ \\dfrac{du}{dx}\\ \\text{are limits, not fractions}$"

  # 7 --------------------------------------- Strategy 3.1: decompose outside-in
  - id: decomposition_strategy
    kind: content
    template: procedure_steps
    accent: procedure
    source: "chapter3-print-standalone.html SS3.2 . Strategy 3.1 (differentiating a composition)"
    title: "Differentiating a Composition"
    say: |
      Here's a reliable way to take any composition apart -- work from the
      outside in.
      {show math.0} First, spot the outermost operation -- the last thing you'd
      do if you plugged in a number. That's the outer function $f$.
      {show math.1} Whatever it's applied to is the inner function $u=g(x)$.
      {show math.2} Differentiate the outside at the inside, keeping the inside
      whole.
      {show math.3} Then multiply by the inner derivative -- and if the inside is
      itself a composition, just run the steps again. So $\sqrt{1+x^2}$ has outer
      root and inner $1+x^2$; $\sin(x^2)$ has outer sine and inner $x^2$.
    steps:
      - { text: "Find the outermost operation.", math: "f(\\,\\cdot\\,)" }
      - { text: "Name the inside.", math: "u=g(x)" }
      - { text: "Differentiate the outside at the inside.", math: "f'(g(x))" }
      - { text: "Multiply by the inner derivative.", math: "f'(g(x))\\cdot g'(x)" }

  # 8 --------------------------------------------- divider: Act 2 opener
  - id: divider_why
