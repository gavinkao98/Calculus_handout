  # 18 ----------------------------------- Example 3.4: a single composition (a)(b)
  - id: example_single_composition
    kind: content
    template: derivation
    accent: example
    source: "chapter3-print-standalone.html SS3.2 . Example 3.4 (sqrt(1+x^2), sin(x^2))"
    title: "A Single Composition"
    prompt: "Differentiate $\\sqrt{1+x^{2}}$ and $\\sin(x^{2})$."
    say: |
      Time to use it -- two quick ones.
      {show step.0} For $\sqrt{1+x^2}$, the outer is the square root and the
      inner is $1+x^2$: the outer derivative times $2x$ tidies to $x$ over
      $\sqrt{1+x^2}$.
      {show step.1} For $\sin(x^2)$, the outer is sine and the inner is $x^2$:
      cosine of the inside times $2x$.
      {show result} Notice that $2x$ in each -- it's the inner derivative, and
      forgetting it is the single most common slip.
    steps:
      - { math: "\\frac{d}{dx}\\sqrt{1+x^{2}} = \\frac{1}{2\\sqrt{1+x^{2}}}\\cdot 2x = \\frac{x}{\\sqrt{1+x^{2}}}", reason: "outer $u^{1/2}$, inner $1+x^{2}$" }
      - { math: "\\frac{d}{dx}\\sin(x^{2}) = \\cos(x^{2})\\cdot 2x = 2x\\cos(x^{2})", reason: "outer $\\sin$, inner $x^{2}$" }
    result: { math: "\\text{the inner derivative } 2x \\text{ is never optional}", reason: "the common slip" }

  # 19 ----------------------------------------- Caution: the inner derivative
  - id: caution_inner_derivative
    kind: content
    template: callout
    type: caution
    source: "chapter3-print-standalone.html SS3.2 . Caution (forgetting the inner derivative)"
    title: "Never Drop the Inner Derivative"
    say: |
      Let's make that mistake explicit, so you never make it.
      {show body} The most common chain-rule error is to differentiate the outer
      function and then stop -- to write the derivative of $\sin(g(x))$ as just
      $\cos(g(x))$. That's wrong; the right answer carries the inner factor
      $g'(x)$. The $2x$ back in $\sin(x^2)$ is never optional.
    body: "Wrong: $\\dfrac{d}{dx}\\sin(g(x))=\\cos(g(x))$. Right: $\\dfrac{d}{dx}\\sin(g(x))=\\cos(g(x))\\cdot g'(x)$. The inner factor $g'(x)$ --- the $2x$ in $\\sin(x^{2})$ --- is never optional."

  # 20 ----------------------------- Example 3.5: a three-layer nested composition
  - id: example_nested_three_layers
    kind: content
    template: derivation
    accent: example
    source: "chapter3-print-standalone.html SS3.2 . Example 3.5 (sqrt(1+sin^2 x))"
    title: "Three Layers Deep"
    prompt: "Differentiate $\\sqrt{1+\\sin^{2} x}$."
    say: |
      Now let the inside be a composition too -- $\sqrt{1+\sin^2 x}$ is three
      layers deep, since $\sin^2 x$ is itself $(\sin x)^2$.
      {show step.0} The square root gives one over twice itself, times the
      derivative of the inside.
      {show step.1} That inside derivative is the square of $\sin x$, which by the
      chain rule again is $2\sin x\cos x$.
      {show result} Three layers, three factors -- and they simply multiply down
      the chain.
    steps:
      - { math: "\\frac{d}{dx}\\sqrt{1+\\sin^{2}x} = \\frac{1}{2\\sqrt{1+\\sin^{2}x}}\\cdot\\frac{d}{dx}\\!\\left(1+\\sin^{2}x\\right)", reason: "outer: square root" }
      - { math: "= \\frac{1}{2\\sqrt{1+\\sin^{2}x}}\\cdot 2\\sin x\\cos x", reason: "chain rule again" }
    result: { math: "\\frac{d}{dx}\\sqrt{1+\\sin^{2}x} = \\frac{\\sin x\\cos x}{\\sqrt{1+\\sin^{2}x}}", reason: "the factors multiply" }

  # 21 ----------------------- Example 3.6: chain rule times the quotient rule
  - id: example_chain_times_quotient
    kind: content
    template: derivation
    accent: example
    source: "chapter3-print-standalone.html SS3.2 . Example 3.6 (sqrt((x-1)/(x+2)), x>1)"
    title: "When the Inside Is Its Own Problem"
    prompt: "Differentiate $\\sqrt{\\dfrac{x-1}{x+2}}$ for $x>1$."
    say: |
      Sometimes the inner derivative is a small problem of its own.
      {show step.0} The outer is the square root, the inner is the fraction -- so
      the chain rule gives one over twice the root, times the derivative of the
      fraction.
      {show step.1} And that derivative is a quotient rule: it comes out to three
      over $(x+2)$ squared.
      {show result} Tidy the front factor and multiply -- the answer is three
      over twice the product. The chain rule started the job; the quotient rule
      finished the inside.
    steps:
      - { math: "\\frac{d}{dx}\\sqrt{\\frac{x-1}{x+2}} = \\frac{1}{2\\sqrt{(x-1)/(x+2)}}\\cdot\\frac{d}{dx}\\!\\left(\\frac{x-1}{x+2}\\right)", reason: "outer: square root" }
      - { math: "\\frac{d}{dx}\\!\\left(\\frac{x-1}{x+2}\\right) = \\frac{(x+2)-(x-1)}{(x+2)^{2}} = \\frac{3}{(x+2)^{2}}", reason: "quotient rule" }
    result: { math: "= \\frac{\\sqrt{x+2}}{2\\sqrt{x-1}}\\cdot\\frac{3}{(x+2)^{2}} = \\frac{3}{2\\sqrt{x-1}\\,(x+2)^{3/2}}\\quad(x>1)" }

  # 22 ------------------------ Example 3.7: chain rule times the product rule
  - id: example_chain_times_product
    kind: content
    template: derivation
    accent: example
    source: "chapter3-print-standalone.html SS3.2 . Example 3.7 ((1+x^2) cos^2 x)"
    title: "Two Rules Cooperate"
    prompt: "Differentiate $y=(1+x^{2})\\cos^{2}x$."
    say: |
      Same story, a different partner rule.
      {show step.0} The outermost operation is a product, so start with the
      product rule.
      {show step.1} The leftover derivative needs the chain rule, since
      $\cos^2 x$ is $(\cos x)^2$ -- giving minus $2\sin x\cos x$.
      {show result} Put it together. The product rule split the work; the chain
      rule supplied the slope inside the second piece.
    steps:
      - { math: "y' = (2x)\\cos^{2}x + (1+x^{2})\\,\\frac{d}{dx}\\!\\left(\\cos^{2}x\\right)", reason: "product rule" }
      - { math: "\\frac{d}{dx}\\!\\left(\\cos^{2}x\\right) = 2\\cos x\\,(-\\sin x) = -2\\sin x\\cos x", reason: "chain rule on $(\\cos x)^{2}$" }
    result: { math: "y' = 2x\\cos^{2}x - 2(1+x^{2})\\sin x\\cos x", reason: "both rules together" }

  # 23 ------------------------ Example 3.8: Leibniz rates -- signs along a chain
  - id: example_leibniz_rates
    kind: content
    template: derivation
    accent: example
    source: "chapter3-print-standalone.html SS3.2 . Example 3.8 (kelp/urchin/otter, Leibniz)"
    title: "Signs Along a Chain"
    prompt: "Kelp $K$ depends on urchins $U$, and $U$ on otters $O$. Is $\\dfrac{dK}{dO}$ positive or negative?"
    say: |
      Here's the Leibniz form earning its keep. Kelp $K$ depends on the urchins
      $U$ that eat it, and $U$ on the otters $O$ that eat them.
      {show step.0} Read each link: more urchins, less kelp, so $dK/dU$ is
      negative; more otters, fewer urchins, so $dU/dO$ is negative.
      {show step.1} The chain rule chains the two rates.
      {show result} A product of two negatives is positive -- so $dK/dO$ is
      positive: more otters ultimately means more kelp. The signs multiply along
      the chain.
    steps:
      - { math: "\\frac{dK}{dU} < 0, \\qquad \\frac{dU}{dO} < 0", reason: "read each link" }
      - { math: "\\frac{dK}{dO} = \\frac{dK}{dU}\\cdot\\frac{dU}{dO}", reason: "Leibniz form" }
    result: { math: "\\frac{dK}{dO} = (-)\\cdot(-) > 0", reason: "more otters, more kelp" }

