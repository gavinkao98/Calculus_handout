meta:
  id: ch01_inverse_functions
  chapter: "Chapter 1"
  chapter_title: "Inverse Functions and Limits"
  section: "1.1"
  title: "Inverse Functions"
  language: en
  theme: midnight
  voice: Mia
  video: { w: 3840, h: 2160, fps: 60 }   # 4K60 delivery; --quality high renders 1080p for QA
  sections:
    - { id: "1.1", title: "Inverse Functions" }
    - { id: "1.2", title: "Inverse Trigonometric Functions" }
    - { id: "1.3", title: "The Limit of a Function" }
    - { id: "1.4", title: "One-Sided and Infinite Limits" }
    - { id: "1.5", title: "Limit Laws and Computational Techniques" }
    - { id: "1.6", title: "The Precise Definition of a Limit" }

scenes:

  # 0 ---------------------------------------------------------------- intro
  - id: intro
    kind: intro
    tagline: "When can a function be run backwards?"
    duration: 6.0

  # 1 -------------------------------- motivation: the collision that blocks inversion
  #    warmup list + Example 1.2 (both compare f(x)=x with g(x)=x^2)
  - id: when_inversion_fails
    kind: content
    template: value_table
    accent: example
    scene_role: motivation          # opening hook (motivation) -> chipless, not [ table ]
    source: "chapter1-print-standalone.html SS1.1 . warmup list + Example 1.2"
    title: "Can We Go Backwards?"
    reveal: rows
    say: |
      Some functions can be undone, and some cannot. Put two of them side by
      side: the identity $f(x)=x$, and the squaring function $g(x)=x^2$.
      {show row.0} Feed in minus one half. The identity hands back minus one
      half; squaring hands back one quarter.
      {show row.1} Now feed in positive one half. The identity keeps the two
      inputs apart, but squaring sends this one to one quarter as well.
      {show row.2} Zero goes to zero in both columns, for good measure.
      Look down the squaring column: one quarter appears twice. Two different
      inputs, one shared output -- and the moment that happens, there is no
      single way back. That collision is the whole story of this section.
    statement: "Compare $f(x)=x$ with $g(x)=x^2$: can each be undone?"
    header: ["$x$", "$f(x)=x$", "$g(x)=x^2$"]
    rows:
      - ["$-\\tfrac12$", "$-\\tfrac12$", "$\\tfrac14$"]
      - ["$\\tfrac12$", "$\\tfrac12$", "$\\tfrac14$"]
      - ["$0$", "$0$", "$0$"]
    accent_col: 2

  # 2 ----------------------------------------------- divider: Stage 1 opener
  - id: divider_one_to_one
    kind: divider
    accent: definition
    eyebrow: "Stage 1"
    title: "One-to-One Functions"
    subtitle: "What lets a function run backwards."
    ghost: "1"
    progress: { current: 1, total: 3 }
    duration: 4.0

  # 3 ------------------------------------------------ Definition 1.1: one-to-one
  #    Example 1.1 (student IDs) folded into the opening narration.
  - id: one_to_one_definition
    kind: content
    template: definition_math
    accent: definition
    source: "chapter1-print-standalone.html SS1.1 . Definition 1.1; Example 1.1 folded into narration"
    title: "One-to-One"
    say: |
      Here is the property that decides everything, and it has a name:
      one-to-one. Picture a class where no two students share an ID number --
      hand me a number and I can name the student who owns it.
      {show statement} The defining idea is plain: distinct inputs are never
      allowed to collide on a single output.
      {show math.0} In symbols, when $x_1$ and $x_2$ differ, so must $f(x_1)$
      and $f(x_2)$.
      {show math.1} Read the other way, you get the form you actually reach for
      in a proof -- if two outputs are equal, the inputs were equal all along.
    statement: "A function is one-to-one when different inputs always give different outputs."
    math:
      - "$f(x_1) \\ne f(x_2)$ whenever $x_1 \\ne x_2$"
      - { tex: "$f(x_1)=f(x_2) \\implies x_1=x_2$", anim: highlight }

  # 4 ----------------------------------------------------- Example 1.3: shape misleads
  - id: shape_can_mislead
    kind: content
    template: derivation
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . Example 1.3"
    title: "When the Shape Misleads"
    prompt: "Is $h(x)=x^{3}-4x$ one-to-one?"
    say: |
      This next one looks innocent: $h(x)=x^3-4x$. Its graph has the same
      gentle cubic sweep, so you might bet it passes. Let us test the
      definition instead of trusting the picture.
      {show step.0} Start from the formula.
      {show step.1} Factor it completely: pull out an $x$, and what remains is
      a difference of squares.
      {show result} Now the roots are obvious -- zero and two both send $h$ to
      zero, yet they are different inputs, so $h$ is not one-to-one, cubic
      looks and all. Its cousin $x^3+4$, by contrast, climbs steadily and does
      pass. The lesson: when in doubt, test the definition, do not eyeball the
      curve.
    steps:
      - { math: "h(x) = x^3 - 4x", reason: "the function" }
      - { math: "= x(x-2)(x+2)", reason: "factor completely" }
    result: { math: "h(0) = h(2) = 0", reason: "not one-to-one" }   # result reason = mono verdict tag (no LaTeX)

  # 5 ------------------------------- Remark 1.1 + Figure 1.1: horizontal line test
  - id: horizontal_line_test
    kind: content
    template: graph
    mode: 2up
    accent: definition
    source: "chapter1-print-standalone.html SS1.1 . Remark 1.1 (Horizontal line test) + Figure 1.1"
    title: "The Horizontal Line Test"
    say: |
      There is a way to read one-to-one straight off a graph. A horizontal
      line $y=c$ meets the curve wherever the output equals $c$, so counting
      crossings is really counting inputs that share an output.
      {show left.plot.1} Take $y=x^3$ and slide a horizontal line down through
      it: at every height it crosses exactly once.
      {show caption.left} One crossing, one input per output -- the cube
      passes.
      {show right.plot.1} Now the parabola $y=x^2$. Send the same line in at
      height one quarter --
      {show right.plot.2} it crosses here,
      {show right.plot.3} and here again. Two inputs, one output.
      {show caption.right} So the parabola fails.
      {show annotation.0} The whole rule in one line: a function is one-to-one
      exactly when no horizontal line meets its graph more than once.
    left:
      axes: { x_range: [-1.45, 1.45, 0.5], y_range: [-1.95, 1.95, 0.5] }
      plots:
        - { kind: function, expression: "x**3", x_range: [-1.22, 1.22], color_role: secondary, label: "$y=x^3$" }
        - { kind: line, start: [-1.4, 0.5], end: [1.4, 0.5], dashed: true, color_role: warning, reveal: true }
      caption: "One crossing at every height."
      verdict: ok
    right:
      axes:
        x_range: [-1.55, 1.55, 0.5]
        y_range: [-0.35, 2.05, 0.5]
        y_ticks: [{ at: 0.25, label: "$\\tfrac14$" }]   # narration names the height 1/4 -> anchor it
      plots:
        - { kind: function, expression: "x**2", x_range: [-1.4, 1.4], color_role: secondary, label: "$y=x^2$" }
        - { kind: line, start: [-1.5, 0.25], end: [1.5, 0.25], dashed: true, color_role: warning, reveal: true }
        - { kind: point, point: [-0.5, 0.25], hollow: false, color_role: accent, reveal: true }
        - { kind: point, point: [0.5, 0.25], hollow: false, color_role: accent, reveal: true }
      caption: "Two inputs share one output."
      verdict: bad
    annotations:
      - "One-to-one exactly when no horizontal line meets the graph twice."

  # 6 ----------------------------------------------- divider: Stage 2 opener
  - id: divider_inverse
    kind: divider
    accent: definition
    eyebrow: "Stage 2"
    title: "Inverse Functions"
    subtitle: "Constructing the inverse function."
    ghost: "2"
    progress: { current: 2, total: 3 }
    duration: 4.0

  # 7 ------------------------------- Definition 1.2: the inverse function (+ L3 aside)
  #    role-swap intuition prose (expansion:intuition) -> the rail key-idea card.
  - id: inverse_definition
    kind: content
    template: definition_math
    accent: definition
    source: "chapter1-print-standalone.html SS1.1 . Definition 1.2; role-swap prose -> aside"
    title: "The Inverse Function"
    say: |
      Now that we can spot a one-to-one function, we can build the one that
      undoes it. Take $f$ with domain $A$ and range $B$.
      {show statement} Its inverse, written $f^{-1}$, runs the machine in
      reverse: hand it an output of $f$, and it gives back the single input
      that produced it.
      {show math.0} In symbols, $f^{-1}(y)=x$ says exactly the same thing as
      $f(x)=y$ -- one correspondence read in two directions. Notice the swap:
      domain and range trade places, because the outputs of $f$ are precisely
      the inputs of its inverse.
    statement: "The inverse $f^{-1}$ sends each output of $f$ back to the input it came from."
    math:
      - { tex: "$f^{-1}(y)=x \\iff f(x)=y$", anim: highlight }
    aside:
      label: "Key idea"
      accent: secondary
      body: "$f$ asks: given the input $x$, what is the output? The inverse asks it backwards: given that output, which input produced it?"

  # 8 ---------------------------------------- Caution 1.1: inverse is not a reciprocal
  - id: not_a_reciprocal
    kind: content
    template: callout
    type: caution
    number: "1.1"
    source: "chapter1-print-standalone.html SS1.1 . Caution 1.1"
    title: "A Notation Trap"   # rendered as the callout masthead title (2026-06-29 redesign)
    say: |
      One warning before we go on, because this one trips up almost everyone.
      {show body} That little minus-one in $f^{-1}$ is not an exponent. It
      names the inverse function; it does not mean one over $f$. So
      $f^{-1}(x)$ and $1/f(x)$ are different objects -- and the very same
      caution returns when we meet the inverse trig notation a little later.
    body: "The superscript $-1$ in $f^{-1}$ means the inverse function --- not a reciprocal: $f^{-1}(x)\\ne \\dfrac{1}{f(x)}$ in general."

  # 9 ------------------------------------- Theorem 1.1 + Proof: invertible iff one-to-one
  - id: invertible_iff_one_to_one
    kind: content
    template: theorem_proof
    accent: theorem
    source: "chapter1-print-standalone.html SS1.1 . Theorem 1.1 + Proof"
    title: "Invertible Means One-to-One"
    say: |
      This ties the two ideas into a single clean statement.
      {show statement} A function has an inverse exactly when it is one-to-one
      -- the property and the payoff are the same condition.
      {show proof.0} One direction is quick. If an inverse exists and two
      inputs share an output, apply $f^{-1}$ to both sides and the inputs
      collapse to one -- so $f$ was one-to-one.
      {show proof.1} The other direction builds the inverse: when $f$ is
      one-to-one, every output traces back to exactly one input, and that
      back-map is the inverse.
      {show qed} Either way, one-to-one and invertible are two names for the
      same thing.
    statement: "A function has an inverse if and only if it is one-to-one."
    proof:
      - "If $f^{-1}$ exists and $f(x_1)=f(x_2)$, apply $f^{-1}$ to both sides: $x_1=x_2$."
      - "If $f$ is one-to-one, each output $y \\in B$ has a unique source $x$; the map $y \\mapsto x$ is $f^{-1}$."
    qed: "One-to-one and invertible name the same property."

  # 10 -------------------------------------------------- Example 1.4: a first inverse
  #    f(x)=x (its own inverse) folded into narration; g(x)=x^3 worked with a check.
  - id: first_inverses
    kind: content
    template: derivation
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . Example 1.4"
    title: "A First Inverse"
    prompt: "Find the inverse of $g(x)=x^{3}$."
    say: |
      Let us actually compute one. The identity $f(x)=x$ is its own inverse --
      it changes nothing, so undoing it changes nothing either. The cube is
      more interesting.
      {show step.0} Set the output equal to $x$ cubed.
      {show step.1} Solve for the input by taking the cube root of both sides.
      {show result} Swap the names, and the inverse of the cube is the cube
      root.
      {show check} It checks out: cube the cube root and you land back on $x$.
    steps:
      - { math: "y = x^3", reason: "write $y=g(x)$" }
      - { math: "x = \\sqrt[3]{y}", reason: "cube root both sides" }
    result: { math: "\\therefore\\; g^{-1}(x) = \\sqrt[3]{x}", reason: "swap names" }
    check:  { math: "g\\bigl(g^{-1}(x)\\bigr) = \\bigl(\\sqrt[3]{x}\\bigr)^3 = x", reason: "verified" }

  # 11 ------------------------------ Proposition 1.1: the two composition identities
  #    Figure 1.2 (mapping diagram) round-trip intuition folded into narration.
  - id: composition_identities
    kind: content
    template: definition_math
    accent: proposition
    source: "chapter1-print-standalone.html SS1.1 . Proposition 1.1 (+ Figure 1.2 folded into narration)"
    title: "Going and Coming Back"
    say: |
      The defining relation has a tidy consequence: $f$ and its inverse undo
      each other, in either order.
      {show statement} Picture the round trip. Start at an input, travel
      forward by $f$ to its output, then come back by $f^{-1}$ -- you land
      exactly where you began.
      {show math.0} Forward, then back: $f^{-1}$ of $f$ of $x$ returns $x$,
      for every $x$ in the domain.
      {show math.1} And the trip works the other way too: $f$ of $f^{-1}$ of
      $y$ returns $y$, for every $y$ in the range.
    statement: "Composing $f$ and $f^{-1}$ in either order brings you back to the start."
    math:
      - "$f^{-1}\\bigl(f(x)\\bigr) = x \\quad \\text{for all } x \\in A$"
      - "$f\\bigl(f^{-1}(y)\\bigr) = y \\quad \\text{for all } y \\in B$"

  # 12 ---------------------------- reflection across y=x (prose geometric claim)
  - id: reflection_across_y_eq_x
    kind: content
    template: graph
    mode: single
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . reflection prose (graphs of f, f^{-1} mirror across y=x)"
    title: "Mirror Images"
    say: |
      Here is that same fact, drawn. Put the cube and its inverse, the cube
      root, in one picture.
      {show plot.0} The cube climbs steeply.
      {show plot.1} The cube root, its inverse, leans the other way.
      {show plot.2} Lay the line $y=x$ between them, and the two curves are
      exact mirror images across it.
      {show annotation.0} That is the whole geometry of inverses: every point
      $(a,b)$ on one curve has its twin $(b,a)$ on the other.
    axes:
      x_range: [-2.2, 2.2, 1]
      y_range: [-2.2, 2.2, 1]
      x_length: 4.8
      y_length: 4.8
    plots:
      - { kind: function, expression: "x**3", x_range: [-1.3, 1.3], color_role: secondary, label: "$y=x^3$", reveal: true }
      - { kind: function, expression: "cbrt(x)", x_range: [-2.2, 2.2], color_role: accent, label: "$y=\\sqrt[3]{x}$", label_point: [2.05, 0.95], reveal: true }
      - { kind: line, start: [-2.2, -2.2], end: [2.2, 2.2], dashed: true, color_role: muted, label: "$y=x$", label_point: [0.6, 1.85], reveal: true }   # upper-left clear zone: keeps the dashed line off the label
    annotations:
      - "Every point $(a,b)$ on $f$ pairs with $(b,a)$ on $f^{-1}$."

  # 13 ------------------------- Example 1.5 + Figure 1.3: repair by restricting the domain
  - id: restrict_to_invert
    kind: content
    template: graph
    mode: single
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . Example 1.5 + Figure 1.3"
    title: "Repair by Restricting"
    say: |
      The squaring function failed our test on the whole line -- but we can
      repair it. Keep only the inputs from zero onward.
      {show plot.0} On this half, $x$ squared climbs once and never repeats a
      value, so it is one-to-one again.
      {show plot.1} Its inverse is the square root, also living on the inputs
      from zero onward.
      {show plot.2} And there is the mirror line $y=x$, with the pair
      reflected across it once more.
      {show annotation.0} Restrict first, then invert: that one move is exactly
      what tames the trigonometric functions in what comes next.
    axes:
      x_range: [0, 3, 1]
      y_range: [0, 3, 1]
      x_length: 4.8
      y_length: 4.8
    plots:
      - { kind: function, expression: "x**2", x_range: [0, 1.7], color_role: secondary, label: "$y=x^2$", reveal: true }
      - { kind: function, expression: "sqrt(x)", x_range: [0, 2.9], color_role: accent, label: "$y=\\sqrt{x}$", reveal: true }
      - { kind: line, start: [0, 0], end: [2.9, 2.9], dashed: true, color_role: muted, label: "$y=x$", label_point: [2.5, 2.35], reveal: true }
    annotations:
      - "Restrict the domain, and the squaring function turns around."

  # 14 ---------------------------------------------- divider: Stage 3 opener
  - id: divider_finding
    kind: divider
    accent: definition
    eyebrow: "Stage 3"
    title: "Finding the Inverse"
    subtitle: "A recipe for finding any inverse."
    ghost: "3"
    progress: { current: 3, total: 3 }
    duration: 4.0

  # 15 ------------------------- Strategy 1.1: the procedure (+ Remark 1.2, + caution prose)
  - id: inverse_procedure
    kind: content
    template: procedure_steps
    accent: procedure
    source: "chapter1-print-standalone.html SS1.1 . Strategy 1.1 (+ Remark 1.2, + the y=x^2 caution prose)"
    title: "The Recipe"
    say: |
      With a one-to-one function in hand, finding its inverse is a short,
      repeatable recipe.
      {show math.0} First, set the output equal to the formula: write
      $y=f(x)$.
      {show math.1} Second, solve that equation for the input $x$ in terms of
      $y$.
      {show math.2} Third, interchange the names -- rename $x$ as $y$ and $y$
      as $x$ -- and you are reading $y=f^{-1}(x)$, with $x$ back as the
      variable.
      {show worked} One caution: this assumes the function is already
      one-to-one. Run it blindly on $y=x^2$ and step two hands you plus or
      minus a root -- two values, not a function. So always confirm one-to-one
      first, or restrict the domain.
    steps:
      - { text: "Write $y=f(x)$.", math: "y=f(x)" }
      - { text: "Solve for $x$ using $y$.", math: "x=\\cdots" }
      - { text: "Interchange $x$ and $y$.", math: "y=f^{-1}(x)" }
    worked: ["y=x^2", "x=\\pm\\sqrt{y}", "\\text{not a function}"]

  # 16 ------------------------------------------------ Example 1.6: invert a cubic
  - id: invert_a_cubic
    kind: content
    template: derivation
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . Example 1.6"
    title: "Inverting a Cubic"
    prompt: "Find the inverse of $f(x)=x^{3}+2$."
    say: |
      Let us run that recipe on a real function, $f(x)=x^3+2$.
      {show step.0} Set $y$ equal to the formula.
      {show step.1} Subtract two to isolate the cube.
      {show step.2} Take the cube root of both sides to free $x$.
      {show result} Swap the names, and there is the inverse.
      {show check} Feed it back through $f$: the cube and cube root cancel, the
      twos cancel, and you are left with $x$ -- so it is right.
    steps:
      - { math: "y = x^3 + 2", reason: "write $y=f(x)$" }
      - { math: "x^3 = y - 2", reason: "subtract 2" }
      - { math: "x = \\sqrt[3]{y - 2}", reason: "cube root both sides" }
    result: { math: "\\therefore\\; f^{-1}(x) = \\sqrt[3]{x - 2}", reason: "swap names" }
    check:  { math: "f\\bigl(f^{-1}(x)\\bigr) = \\bigl(\\sqrt[3]{x-2}\\bigr)^3 + 2 = x", reason: "verified" }

  # 17 -------------------- Example 1.7: a rational inverse, verified both ways + domains
  - id: invert_a_rational
    kind: content
    template: derivation
    accent: example
    source: "chapter1-print-standalone.html SS1.1 . Example 1.7"
    title: "A Rational Inverse"
    prompt: "Find the inverse of $f(x)=\\dfrac{3}{x-5}$."
    say: |
      Same recipe, now on a rational function: $f(x)=\dfrac{3}{x-5}$.
      {show step.0} Set $y$ equal to it.
      {show step.1} Multiply across and isolate the $x$ part: $x-5$ is three
      over $y$.
      {show step.2} Add five, and the input is five plus three over $y$.
      {show result} Swap the names, over a common denominator, for the inverse.
      {show check} Here is the payoff: composing both ways returns the input,
      exactly as the proposition promised. The domains pair up too -- $f$
      skips $x=5$ and never outputs zero, while its inverse skips $x=0$ and
      never outputs five.
    steps:
      - { math: "y = \\dfrac{3}{x-5}", reason: "write $y=f(x)$" }
      - { math: "x - 5 = \\dfrac{3}{y}", reason: "flip and isolate" }
      - { math: "x = 5 + \\dfrac{3}{y}", reason: "add 5" }
    result: { math: "\\therefore\\; f^{-1}(x) = 5 + \\dfrac{3}{x} = \\dfrac{5x+3}{x}", reason: "swap names" }
    check:  { math: "f\\bigl(f^{-1}(x)\\bigr) = x = f^{-1}\\bigl(f(x)\\bigr)", reason: "both ways" }

  # 18 ----------------------------------- Example 1.8: an everyday (applied) inverse
  - id: temperature_inverse
    kind: content
    template: value_table
    accent: example
    scene_role: example             # Example 1.8 (applied) -> [ example ], not [ table ]
    source: "chapter1-print-standalone.html SS1.1 . Example 1.8"
    title: "An Inverse You Use Every Day"
    reveal: rows
    say: |
      Inverses are not only algebra -- here is one you meet on every
      thermostat. Going one way, $f$ turns a Celsius reading into Fahrenheit.
      {show row.0} Water freezes: zero Celsius is thirty-two Fahrenheit.
      {show row.1} Body temperature, thirty-seven, is about ninety-nine.
      {show row.2} Water boils: one hundred Celsius is two hundred twelve.
      Every row reads forward as $f$. Read it the other way, Fahrenheit back
      to Celsius, and you are running the inverse -- and that is the real
      question it answers: given a Fahrenheit reading, what was the
      temperature in Celsius?
    statement: "$f(t)=\\tfrac{9}{5}t+32$ converts Celsius to Fahrenheit; its inverse $f^{-1}(t)=\\tfrac{5}{9}(t-32)$ runs the table backward."
    header: ["$^{\\circ}\\mathrm{C}$", "$^{\\circ}\\mathrm{F}$"]
    rows:
      - ["$0$", "$32$"]
      - ["$37$", "$98.6$"]
      - ["$100$", "$212$"]
    accent_col: 1

  # 19 ------------------------------------------------------------- recap (Key Takeaways)
  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    source: "chapter1-print-standalone.html SS1.1 . whole-section synthesis"
    title: "Key Takeaways"
    say: |
      Let us gather what this section gave us.
      {show point.0} A function is one-to-one when distinct inputs always land
      on distinct outputs -- and the horizontal line test reads it straight off
      the graph.
      {show point.1} That property is exactly what makes a function invertible.
      Keep the defining relation close: $f^{-1}(y)=x$ is the same statement as
      $f(x)=y$.
      {show point.2} The inverse swaps domain and range, and its graph is the
      mirror image of $f$ across the line $y=x$.
      {show point.3} To build one, solve $y=f(x)$ for $x$ and swap the names --
      after confirming the function is one-to-one, or restricting it until it is.
      {show point.4} And the composition check: $f$ and $f^{-1}$ undo each other
      in either order.
    points:
      - "One-to-one: distinct inputs $\\Rightarrow$ distinct outputs. The horizontal line test reads it off the graph."
      - "Invertibility $\\iff$ one-to-one. Defining relation: $f^{-1}(y)=x \\iff f(x)=y$."
      - "The inverse swaps domain and range; its graph reflects across $y=x$."
      - "To find $f^{-1}$: solve $y=f(x)$ for $x$, swap the names — confirm one-to-one first (or restrict)."
      - "Composition check: $(f^{-1}\\circ f)(x)=x$ and $(f\\circ f^{-1})(x)=x$."

