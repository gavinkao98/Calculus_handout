    tagline: "When can a function be undone?"
    bgm: soft_intro
    duration: 5.8

  # 2 ------------------------------------------- motivation(hook 已接線)
  # hook 動畫:左 f(x)=x 各輸入箭頭依序亮起、各入各位;右 x² 的 ±1/2 兩箭頭
  # 匯聚到同一個 1/4,匯聚瞬間頓一下強調(「兩進一出——回不去」)。
  # 下方 math 欄為無 hook 時的 fallback(刪 hook 行即回靜態版)。
  - id: can_we_go_backwards
    kind: content
    template: definition_math
    accent: definition
    kicker: motivation   # motivation 場景沿用 definition 色系,但 eyebrow 標實情
    hook: "animations.ch01_inverse_functions_hooks:can_we_go_backwards"
    source: "內容稿 u2 can_we_go_backwards"
    title: "Can We Go Backwards?"
    say: |
      Every function is a one-way machine: feed it an input, and it hands you
      an output. This section asks the reverse question -- starting from the
      output, can we recover the input that produced it? Watch two quick cases.
      {show math.0} For $f(x)=x$ on $[0,1]$, every input keeps its own value:
      $0$ stays at $0$, one half stays at one half.
      {show math.1} But for $f(x)=x^2$ on $[-1,1]$, something breaks: both
      $\tfrac12$ and $-\tfrac12$ are sent to $\tfrac14$. In the first case,
      each output points back to exactly one input; in the second, the output
      $\tfrac14$ cannot tell us which input it came from -- and that difference
      is the whole story of this section.
    statement: "Going backwards needs each output to come from exactly one input."
    math:
      - "$f(x)=x$ on $[0,1]$: every input keeps its own value"
      - { tex: "$f(x)=x^2$ on $[-1,1]$: $\\tfrac12,\\ -\\tfrac12 \\mapsto \\tfrac14$", anim: highlight }

  # 3 ------------------------------------------------------ definition: one-to-one
  - id: one_to_one_definition
    kind: content
    template: definition_math
    accent: definition
    source: "內容稿 u3 one_to_one_definition"
    title: "One-to-One Functions"
    say: |
      The property that separates the two cases has a name: one-to-one.
      {show math.0} A function $f$ is one-to-one if $f(x_1) \ne f(x_2)$
      whenever $x_1 \ne x_2$ -- different inputs always produce different
      outputs.
      {show math.1} The same condition can be turned around: if
      $f(x_1) = f(x_2)$, then $x_1 = x_2$. Both forms say the same thing, but
      the second one is the workhorse in computations: assume two outputs
      agree, and deduce that the inputs were equal all along.
    statement: "A function is one-to-one if different inputs always produce different outputs."
    math:
      - "$f(x_1) \\ne f(x_2)$ whenever $x_1 \\ne x_2$"
      - { tex: "$f(x_1) = f(x_2) \\implies x_1 = x_2$", anim: highlight }

  # 4 --------------------------------------- example: student IDs (definition_math 頂著)
  - id: ids_before_algebra
    kind: content
    template: definition_math
    accent: example
    source: "內容稿 u4 ids_before_algebra"
    title: "One-to-One Without Algebra"
    say: |
      Here is the definition at work in a setting with no formulas at all.
      {show math.0} Assign every student in a class an identification number,
      making sure no two students share one. Is the rule sending each student
      to their ID number one-to-one?
      {show math.1} Yes -- distinct students always receive distinct numbers,
      which is precisely the defining condition. The habit worth keeping:
      one-to-one is a question about the matching itself, not about algebra.
    statement: "Each student gets an ID number; no two students share one."
    math:
      - "student $\\longrightarrow$ ID number"
      - { tex: "distinct students $\\Rightarrow$ distinct IDs (one-to-one)", anim: highlight }

  # 5 ------------------------------------------------ example: algebraic check
  - id: checking_with_algebra
    kind: content
    template: example_walkthrough
    accent: example
    source: "內容稿 u5 checking_with_algebra"
    title: "Checking with Algebra"
    say: |
      Now back to the two functions from the opening, this time as a formal
      check.
      {show math.0} On $[0,1]$, the function $f(x)=x$ sends every input to
      itself, so distinct inputs automatically give distinct outputs --
      one-to-one.
      {show math.1} For $g(x)=x^2$ on $[-1,1]$, compute both values:
      $g(\tfrac12)=\tfrac14$, and $g(-\tfrac12)=\tfrac14$ as well.
      {show math.2} Two different inputs share one output, so $g$ is not
      one-to-one.
      {show takeaway} And the consequence matters: no rule can send $\tfrac14$
      back to a single input, so $g$ cannot be reversed on this interval.
    steps:
      - { text: "On $[0,1]$, $f(x)=x$ keeps every input distinct.", math: "f(x)=x,\\ 0\\le x\\le 1", mark: ok }
      - { text: "Evaluate $g(x)=x^2$ at $x=\\pm\\tfrac12$.", math: "g\\!\\left(\\tfrac12\\right)=\\tfrac14=g\\!\\left(-\\tfrac12\\right)", hot: true }
      - { text: "Two different inputs share one output.", math: "\\tfrac12 \\ne -\\tfrac12", mark: bad }
    takeaway: "No rule can send $\\tfrac14$ back to a single input -- $g$ has no inverse on $[-1,1]$."
    takeaway_tone: warn   # 負面結論(不可逆)→ warning 紅

  # 6 -------------------------------------- proposition: horizontal line test(hook 已接線)
  # hook 動畫:兩圖並排(單調 x³ vs x²),同一條水平線同步由上往下 sweep;左圖任何
  # 高度只一交點(綠),右圖掃到 y=c 兩交點(紅)停住、拉虛線回 x 軸。
  # 下方 axes/plots 為無 hook 時的單圖 fallback(刪 hook 行即回靜態版)。
  - id: horizontal_line_test
    kind: content
    template: graph_focus
    accent: proposition
    hook: "animations.ch01_inverse_functions_hooks:horizontal_line_test"
    source: "內容稿 u6 horizontal_line_test"
    title: "The Horizontal Line Test"
    say: |
      There is a way to read one-to-one straight off the graph. A horizontal
      line $y=c$ crosses the graph of $f$ wherever $f(x)=c$, so every crossing
      is one input that produces the output $c$.
      {show annotation.0} That gives the test: a function is one-to-one exactly
      when no horizontal line meets its graph more than once. Two crossings on
      one line would mean two inputs with the same output -- exactly the
      failure we saw with $x^2$. So sweep horizontal lines down the graph and
      count: at most one crossing at every height is what passing looks like.
    axes:
      x_range: [-1.6, 1.6, 0.5]
      y_range: [-0.3, 1.7, 0.5]
      x_length: 6.0
      y_length: 3.6
    plots:
      # x_range 收到 ±1.3:±1.5 時曲線頂超出 y_range 1.7 被硬裁成平頭。
      # label_point 右移離 y 軸(label 以左緣錨定)。
      - { kind: function, expression: "x**2", x_range: [-1.3, 1.3], color_role: secondary, label: "$y=x^2$", label_point: [0.55, 1.42] }
      - { kind: line, start: [-1.6, 0.64], end: [1.6, 0.64], dashed: true, color_role: warning, label: "$y=c$", label_side: right }
      - { kind: point, point: [-0.8, 0.64], hollow: false, color_role: accent }
      - { kind: point, point: [0.8, 0.64], hollow: false, color_role: accent }
    annotations:
      - "One-to-one $\\iff$ no horizontal line meets the graph more than once."

  # 7 ----------------------------------------------- definition: inverse function
  - id: inverse_definition
    kind: content
    template: definition_math
    accent: definition
    source: "內容稿 u7 inverse_definition"
    title: "The Inverse Function"
    say: |
      For a one-to-one function, every output traces back to exactly one input
      -- so the backwards assignment is itself a function. We call it the
      inverse of $f$, written $f^{-1}$.
      {show math.0} If $f$ has domain $A$ and range $B$, then $f^{-1}$ has
      domain $B$ and range $A$, and its rule is the defining relation:
      $f^{-1}(y) = x$ exactly when $f(x) = y$.
      {show math.1} Note the trade: the outputs of $f$ become the inputs of
      $f^{-1}$, and domain and range swap places.
    statement: "The inverse $f^{-1}$ sends each output of $f$ back to the unique input that produced it."
    math:
      - "$f^{-1}(y)=x \\iff f(x)=y$"
      - { tex: "$\\operatorname{dom} f^{-1}=B,\\quad \\operatorname{ran} f^{-1}=A$", anim: highlight }

  # 8 ---------------------------------------------- notation: renaming the variable
  - id: reading_the_notation
    kind: content
    template: definition_math
    accent: definition
    source: "內容稿 u8 reading_the_notation"
    title: "Reading the Notation"
    say: |
      One notational habit before we continue.
      {show math.0} We usually prefer $x$ as the input letter of whatever
      function we are currently studying -- including $f^{-1}$ itself.
      {show math.1} After renaming the variables, the defining relation reads:
      $f^{-1}(x) = y$ exactly when $f(y) = x$. Same statement, new letters --
      and this renaming is the reason the procedure at the end of this section
      will ask us to interchange $x$ and $y$.
    statement: "We may rename the variables so that $x$ is the input of $f^{-1}$ too."
    math:
      - "$f^{-1}(y)=x \\iff f(x)=y$"
      - { tex: "$f^{-1}(x)=y \\iff f(y)=x$", anim: highlight }

  # 9 ------------------------------------------------- theorem: existence (statement)
  - id: inverse_iff_one_to_one
    kind: content
    template: definition_math
    accent: theorem
    source: "內容稿 u9 inverse_iff_one_to_one"
    title: "When Does an Inverse Exist?"
    say: |
      We introduced one-to-one as the property that makes reversing possible;
      the theorem pins that down.
      {show math.0} A function has an inverse if and only if it is one-to-one.
      There are no hidden conditions: the property we can already check -- by
      the definition or by horizontal lines -- is the complete story of
      invertibility. Let us walk through why both directions hold.
    statement: "A function has an inverse if and only if it is one-to-one."
    math:
      - { tex: "$f\\ \\text{has an inverse} \\iff f\\ \\text{is one-to-one}$", anim: highlight }

  # 10 ---------------------------------------------------- proof: both directions
  - id: proof_both_directions
    kind: content
    template: theorem_proof
    accent: theorem
    source: "內容稿 u10 proof_both_directions"
    title: "Proof: Both Directions"
    say: |
      First, suppose $f$ has an inverse.
      {show proof.0} If $f(x_1) = f(x_2)$, apply $f^{-1}$ to both sides --
      $f^{-1}(f(x_1)) = f^{-1}(f(x_2))$ -- and by the defining relation each
      side collapses back to its input, so $x_1 = x_2$. Equal outputs force
      equal inputs: $f$ is one-to-one.
      {show proof.1} Now the converse. Let $f$ be one-to-one with domain $A$
      and range $B$. Every $y$ in $B$ is hit by at least one $x$ in $A$ --
      that is what being the range means -- and one-to-one guarantees at most
      one.
      {show qed} Exactly one input for each output: sending each $y$ to that
      unique $x$ is a well-defined function from $B$ to $A$, and it is
      precisely the inverse of $f$.
    statement: "A function has an inverse if and only if it is one-to-one."
    proof:
      - "($\\Rightarrow$) $f(x_1)=f(x_2) \\;\\Rightarrow\\; f^{-1}\\!\\bigl(f(x_1)\\bigr)=f^{-1}\\!\\bigl(f(x_2)\\bigr) \\;\\Rightarrow\\; x_1=x_2$"
      - "($\\Leftarrow$) each $y\\in B$ has exactly one $x$ with $f(x)=y$; set $f^{-1}(y)=x$"
    qed: "An inverse exists exactly when $f$ is one-to-one."

  # 11 ------------------------------------------------ example: first inverses
  - id: first_inverses
    kind: content
    template: example_walkthrough
    accent: example
    source: "內容稿 u11 first_inverses"
    title: "First Inverses"
    say: |
      Time to find actual inverses, starting small.
      {show math.0} The identity function $f(x)=x$ leaves every input
      untouched, so reversing it changes nothing either: $f$ is its own
      inverse, $f^{-1}(x) = x$.
      {show math.1} Next, $g(x)=x^3$. Write $y = x^3$ and solve for the input:
      $x = \sqrt[3]{y}$,
      {show math.2} so after renaming the variable, $g^{-1}(x) = \sqrt[3]{x}$.
      {show takeaway} And the answer checks out: $g(g^{-1}(x)) =
      (\sqrt[3]{x})^3 = x$ -- feeding the inverse's output back into $g$
      returns exactly where we started.
    steps:
      - { text: "The identity is its own inverse.", math: "f^{-1}(x)=x" }
      - { text: "Solve $y=x^3$ for the input.", math: "x=\\sqrt[3]{y}", hot: true }
      - { text: "Rename the variable.", math: "g^{-1}(x)=\\sqrt[3]{x}" }
    takeaway: "Check by composing: $g(g^{-1}(x))=(\\sqrt[3]{x})^3=x$."
    takeaway_tone: ok   # 正面驗證結論→ success 綠(原模板固定 warning 紅,語意錯)

  # 12 ------------------------------------ proposition: composition identities(hook 已接線)
  # hook 動畫:A/B 兩集合與往返弧;點 x 沿上弧(f)到 f(x)、沿下弧(f⁻¹)回原點閃一下;
  # 第二趟由 B 的 f(x) 反向走一輪。兩恆等式逐拍寫出於圖下方。
  # 下方 math 欄為無 hook 時的 fallback(刪 hook 行即回靜態版)。
  - id: composition_identities
    kind: content
    template: definition_math
    accent: proposition
    hook: "animations.ch01_inverse_functions_hooks:composition_identities"
    source: "內容稿 u12 composition_identities"
    title: "Composition Identities"
    say: |
      That final check was not a coincidence -- it is a law that every inverse
      obeys.
      {show math.0} Because $f^{-1}(y) = x$ means exactly the same thing as
      $f(x) = y$, going forward and then backwards always lands you where you
      started: $f^{-1}(f(x)) = x$ for every $x$ in $A$,
      {show math.1} and in the other direction, $f(f^{-1}(y)) = y$ for every
      $y$ in $B$. In words: $f$ and $f^{-1}$ undo each other, in both orders.
      These two identities are also the practical test -- to certify that a
      claimed inverse is correct, compose the two and watch everything cancel.
    statement: "$f$ and $f^{-1}$ undo each other, in both orders."
    math:
      - "$f^{-1}\\!\\bigl(f(x)\\bigr)=x \\quad\\text{for every } x\\in A$"
      - { tex: "$f\\!\\bigl(f^{-1}(y)\\bigr)=y \\quad\\text{for every } y\\in B$", anim: highlight }

  # 13 ------------------------------------------- visual: reflection(hook 已接線)
  # hook 動畫:場景開於 x³＋y=x 虛線＋(a,b) 點;beat 內 x³ 鏡影沿 y=x「翻摺」
  # 生成 ∛x,接著連接線、(b,a) 點與標籤逐一進場,收在全圖。
  # plots 全列為終態(無 hook 時即靜態版;hook 把 ∛x/連接線/(b,a) 延後進場)。
  - id: graphs_mirror_across_y_x
    kind: content
    template: graph_focus
    accent: example
    hook: "animations.ch01_inverse_functions_hooks:graphs_mirror_across_y_x"
    source: "內容稿 u13 graphs_mirror_across_y_x"
    title: "Mirror Images Across $y=x$"
    say: |
      The algebra of inverses leaves a picture behind. If the point $(a,b)$
      lies on the graph of $f$, then $f(a) = b$, which is the same as
      $f^{-1}(b) = a$ -- so the point $(b,a)$ lies on the graph of $f^{-1}$.
      {show annotation.0} Swapping the two coordinates of a point is exactly a
      reflection across the line $y = x$. So the two graphs are mirror images:
      take $g(x) = x^3$ and its inverse $\sqrt[3]{x}$, fold the plane along
      $y = x$, and each curve lands precisely on the other.
    axes:
      x_range: [-2.2, 2.2, 1]
      y_range: [-2.2, 2.2, 1]
      x_length: 4.6
      y_length: 4.6
    plots:
      # 標籤移位(v2 幀批改):g(x)=x³ 原 [1.05,1.75] 被自己的曲線穿過→移到曲線左側;
      # y=x 原 [-1.5,-1.85] 撞 x³ 下臂→移到虛線左下端點下方,並補 label_role: muted
      # (line label 預設 warning 紅,reference 線應為 muted 灰)。
      - { kind: function, expression: "x**3", x_range: [-1.3, 1.3], color_role: secondary, label: "$g(x)=x^3$", label_point: [-0.55, 1.85] }
      - { kind: function, expression: "cbrt(x)", x_range: [-2.0, 2.0], color_role: accent, label: "$g^{-1}(x)=\\sqrt[3]{x}$", label_point: [1.75, 1.0] }
      - { kind: line, start: [-2.0, -2.0], end: [2.0, 2.0], dashed: true, color_role: muted, label: "$y=x$", label_point: [-1.88, -2.1], label_role: muted }
      - { kind: line, start: [1.1, 1.331], end: [1.331, 1.1], dashed: true, color_role: muted }
      # narration 點名 (a,b)/(b,a),圖上補座標名(value label→text 色,左/下避開曲線)
      - { kind: point, point: [1.1, 1.331], hollow: false, color_role: secondary, label: "$(a,b)$", label_side: left }
      - { kind: point, point: [1.331, 1.1], hollow: false, color_role: accent, label: "$(b,a)$", label_side: down }
    annotations:
      - "$(a,b)$ on $g$ $\\leftrightarrow$ $(b,a)$ on $g^{-1}$: reflection across $y=x$."

  # 14 ------------------------- visual: repair x² by restricting (static; 動畫第二輪)
  # HOOK(第二輪): x² 先整條淡畫,左半 x<0 轉灰退場只留 [0,∞);限定曲線沿 y=x 翻摺生成 √x;
  # 對應點 (2,4)→(4,2) 跨鏡線閃示。本版靜態頂著(限定後曲線＋√x＋y=x 全顯)。
  - id: repair_by_restricting
    kind: content
    template: graph_focus
    accent: example
    source: "內容稿 u14 repair_by_restricting"
    title: "Repairing $x^2$ by Restricting"
    say: |
      Remember $x^2$ -- the very first function that failed us, because
      $\tfrac12$ and $-\tfrac12$ both land on $\tfrac14$. We can repair it.
      Restrict the domain to $[0,\infty)$, keeping only the non-negative
      inputs, and the collision is gone: if $x_1^2 = x_2^2$ with
      $x_1, x_2 \ge 0$, then $x_1 = x_2$.
      {show annotation.0} The restricted function is one-to-one, so now it has
      an inverse. Solving $x = (f^{-1}(x))^2$ and keeping the non-negative root
      gives $f^{-1}(x) = \sqrt{x}$ -- which is exactly why the square-root
      symbol means the positive root: it is defined to undo the restricted
      squaring function. And the move we just made -- restrict first, then
      invert -- is exactly what makes the inverse trigonometric functions
      possible, since sine and cosine are not one-to-one on their own either.
    axes:
      x_range: [-0.5, 4.4, 1]
      y_range: [-0.5, 4.4, 1]
      x_length: 4.6
      y_length: 4.6
    plots:
      - { kind: function, expression: "x**2", x_range: [0, 2.0], color_role: secondary, label: "$y=x^2,\\ x\\ge 0$", label_point: [0.45, 3.6] }
      - { kind: function, expression: "sqrt(x)", x_range: [0, 4.2], color_role: accent, label: "$y=\\sqrt{x}$", label_point: [3.5, 1.25] }
      - { kind: line, start: [-0.5, -0.5], end: [4.4, 4.4], dashed: true, color_role: muted, label: "$y=x$", label_point: [4.0, 4.2], label_role: muted }
      - { kind: line, start: [2.0, 4.0], end: [4.0, 2.0], dashed: true, color_role: muted }
      - { kind: point, point: [2.0, 4.0], hollow: false, color_role: secondary, label: "$(2,4)$", label_side: left }
      - { kind: point, point: [4.0, 2.0], hollow: false, color_role: accent, label: "$(4,2)$", label_side: down }
    annotations:
      - "Restrict $x^2$ to $[0,\\infty)$ and it is one-to-one; its inverse is $\\sqrt{x}$."

  # 15 ----------------------------------------------- procedure: find an inverse
  - id: the_procedure
    kind: content
    template: procedure_steps
    accent: procedure
    source: "內容稿 u15 the_procedure"
    title: "Finding an Inverse: The Procedure"
    say: |
      The cube-root computations secretly followed a recipe, and it works for
      any one-to-one function.
      {show math.0} Step one: write $y = f(x)$.
      {show math.1} Step two: solve this equation for $x$ in terms of $y$.
      {show math.2} Step three: interchange the names $x$ and $y$ -- the
      result reads $y = f^{-1}(x)$. All the real work lives in step two; the
      final swap is just the variable-naming habit we set up earlier.
    steps:
      - { text: "Write the rule as an equation.", math: "y=f(x)" }
      - { text: "Solve this equation for $x$ in terms of $y$.", math: "x=\\text{(expression in } y)" }
      - { text: "Interchange the names $x$ and $y$.", math: "y=f^{-1}(x)" }

  # 16 ------------------------------------- example: inverse of x^3+2 (procedure)
  - id: procedure_in_action
    kind: content
    template: procedure_steps
    accent: example
    source: "內容稿 u16 procedure_in_action"
    title: "Worked Example: $f(x)=x^3+2$"
    say: |
      Same recipe, one notch up: $f(x) = x^3 + 2$.
      {show math.0} From $y = x^3 + 2$, isolate the input --
      {show math.1} $x^3 = y - 2$, then $x = \sqrt[3]{y - 2}$.
      {show math.2} Interchange the names, and the inverse appears:
      $f^{-1}(x) = \sqrt[3]{x - 2}$.
      {show worked} Finally the certificate: $f(f^{-1}(x)) =
      (\sqrt[3]{x-2})^3 + 2 = (x-2) + 2 = x$. Everything cancels back to $x$,
      so this really is the inverse.
    steps:
      - { text: "Write the equation.", math: "y=x^3+2" }
      - { text: "Solve for $x$.", math: "x^3=y-2,\\ \\ x=\\sqrt[3]{y-2}" }
      - { text: "Swap the names.", math: "f^{-1}(x)=\\sqrt[3]{x-2}" }
    worked: ["f\\!\\bigl(f^{-1}(x)\\bigr)=\\bigl(\\sqrt[3]{x-2}\\bigr)^{3}+2", "=(x-2)+2", "=x"]

  # 17 --------------------------------- example: temperature conversion (applied inverse)
  - id: temperature_conversion
    kind: content
    template: example_walkthrough
    accent: example
    source: "內容稿 u17 temperature_conversion"
    title: "An Inverse in the Real World"
    say: |
      One last inverse, and this one means something outside the page. The
      function $f(t) = \tfrac{9}{5}t + 32$ takes a Celsius temperature and
      returns the Fahrenheit reading.
      {show math.0} So what does its inverse do? It runs the conversion
      backwards -- hand it a Fahrenheit number and it gives you the Celsius.
      {show math.1} The recipe is unchanged: solve
      $t = \tfrac{9}{5}f^{-1}(t) + 32$ for the inverse, which gives
      $f^{-1}(t) = \tfrac{5}{9}(t - 32)$.
      {show math.2} And the check is reassuring -- go to Fahrenheit and back,
      $f^{-1}(f(t)) = \tfrac{5}{9}\bigl(\tfrac{9}{5}t + 32 - 32\bigr) = t$,
      landing exactly where we began.
      {show takeaway} Here an inverse is not an abstraction; it is the formula
      on the other side of the thermometer.
    steps:
      - { text: "$f$ converts Celsius to Fahrenheit; its inverse runs backwards.", math: "f(t)=\\tfrac{9}{5}t+32" }
      - { text: "Solve $t=\\tfrac{9}{5}f^{-1}(t)+32$ for the inverse.", math: "f^{-1}(t)=\\tfrac{5}{9}(t-32)", hot: true }
      - { text: "Check by composing back.", math: "f^{-1}\\!\\bigl(f(t)\\bigr)=\\tfrac{5}{9}\\bigl(\\tfrac{9}{5}t\\bigr)=t", mark: ok }
    takeaway: "$f^{-1}$ is the thermometer read backwards: Fahrenheit in, Celsius out."
    takeaway_tone: ok

