      {show formula.0} {show formula.1} The inverse undoes the original --
      $f^{-1}(f(x)) = x$ and $f(f^{-1}(y)) = y$ -- and graphically the two
      curves mirror across $y = x$.
      {show point.2} And to compute one: write $y = f(x)$, solve for $x$,
      then swap the names.
