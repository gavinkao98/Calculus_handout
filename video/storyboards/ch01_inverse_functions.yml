#
# Stage-2 engineering storyboard authored from the HTML handout
# (handout/fragments/ch01/sec-1-1.html; authoritative build
# handout/chapter1-print-standalone.html). Follows CONTENT_METHODOLOGY.md
# (one teaching idea per scene, detail over compression, faithful to the
# handout) and DESIGN.md (template catalog, say/{show} reveal, capacity
# contract). Replaces the deleted practice deck of the same name; it is the
# template system's final validation on real section content.
#
# Decomposition note -- folds (nothing silently dropped):
#   * opening roadmap prose       -> intro / motivation narration
#   * warmup list + Example 1.2   -> scene `when_inversion_fails` (same x, x^2)
#   * Example 1.1 (student IDs)   -> `one_to_one_definition` narration (no math
#                                    payload; the applied pattern is covered by
#                                    Example 1.8, the temperature scene)
#   * Remark 1.2 (x as variable)  -> `inverse_procedure` narration
#   * Caution 1.1 last line (sin) -> `not_a_reciprocal` forward-pointing line
#   * Figure 1.2 (mapping diagram)-> `composition_identities` narration +
#                                    `reflection_across_y_eq_x` carry the geometry
