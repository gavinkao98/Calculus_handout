  # 2 ------------------------------------------ motivation: why "close" needs precision
  - id: why_close_is_not_enough
    kind: content
    template: definition_math
    accent: definition
    source: "§1.6 opener prose (L1334-1337)"
    title: "From Informal to Precise"
    say: |
      For two centuries calculus solved real problems -- orbits, areas, the
      motion of the planets -- while its logical foundations stayed shaky.
      {show math.0} The arguments leaned on infinitesimals, quantities imagined
      as vanishingly small but never pinned down, and on vague phrases like
      "$x$ is close to $a$" and "$f(x)$ is close to $L$." But how close is close?
      {show math.1} The nineteenth century answered by throwing the word "close"
      out entirely and replacing it with a measurable distance. That single move
      is the whole project of this section: make "close" precise enough to
      compute with.
    statement: "For two centuries, close was left undefined. We replace it with a measurable distance."
    math:
      - "informal: $f(x)$ is close to $L$"
      - { tex: "precise: $|f(x) - L| < \\varepsilon$", anim: highlight }

  # 3 -------------------------------------- motivation figure: the limit ignores f(a)
  - id: the_broken_function
    kind: content
    template: graph_focus
    accent: example
    source: "§1.6 motivating function prose (L1339-1347)"
    title: "A Deliberately Broken Function"
    say: |
      Here is a deliberately broken function to sharpen the question. Let
      $f(x)=2x-1$ everywhere except at $x=3$, where we force the value to be $6$.
      As $x$ moves close to $3$, the output $2x-1$ moves close to $5$ -- so we
      expect the limit to be $5$, even though the function's actual value there
      is $6$.
      {show annotation.0} The limit watches how $f$ behaves on the approach, not
      where it lands at the point itself. But "close to $5$" is the very phrase
      we promised to make precise, so let us ask the sharp question: how close
      can we force $f(x)$ to be?
    axes:
      x_range: [0, 5, 1]
      y_range: [0, 8, 2]
      x_length: 6.2
      y_length: 3.7
    plots:
      - { kind: function, expression: "2*x - 1", x_range: [0.5, 4.5], color_role: secondary, label: "$y=2x-1$", label_point: [1.15, 2.35] }
      - { kind: point, point: [3, 5], hollow: true, color_role: accent }              # limit value 5: NOT attained -> hollow
      - { kind: point, point: [3, 6], hollow: false, color_role: warning, label: "$f(3)=6$", label_side: right }   # actual value 6: attained -> solid
    annotations:
      - "The actual value $f(3)=6$ is irrelevant; the approach decides the limit, and that gives $5$."

  # 4 ---------------------------------------- example: the tolerance game (0.1)
  - id: tolerance_game_point_one
    kind: content
    template: example_walkthrough
    accent: example
    source: "§1.6 workedexample, tolerance 0.1 (L1349-1363)"
    title: "A Tolerance, Made Precise"
    say: |
      Let us play it as a game with a number attached.
      {show math.0} Suppose someone demands that $f(x)$ land within $0.1$ of $5$
      -- can we deliver?
      {show math.1} Measure the gap: $|f(x)-5|$ equals $|(2x-1)-5|$, which is
      $|2x-6|$, which is $2|x-3|$.
      {show math.2} So the demand $2|x-3|<0.1$ is just $|x-3|<0.05$.
      {show takeaway} Keep $x$ within $0.05$ of $3$, and $f(x)$ is guaranteed
      within $0.1$ of $5$ -- a precise promise, answered with a precise radius.
    steps:
      - { text: "Demand $f(x)$ within $0.1$ of $5$.", math: "|f(x)-5| < 0.1" }
      - { text: "The gap simplifies.", math: "|f(x)-5| = 2|x-3|", hot: true }
      - { text: "A radius of $0.05$ delivers it.", math: "|x-3| < 0.05", mark: ok }
    takeaway: "A precise demand earns a precise radius."

  # 5 ------------------------------------------ motivation: generalize to every epsilon
  - id: every_tolerance_at_once
    kind: content
    template: definition_math
    accent: definition
    source: "§1.6 generalization prose (L1365)"
    title: "Every Tolerance at Once"
    say: |
      One answered demand is not enough, though.
      {show math.0} Tighten the tolerance to $0.01$ and the very same algebra
      returns $|x-3|<0.005$; halve the tolerance and the radius halves with it.
      {show math.1} The pattern is mechanical: for any tolerance $\varepsilon>0$,
      we get $|f(x)-5|<\varepsilon$ whenever $|x-3|<\tfrac{\varepsilon}{2}$, so the
      choice $\delta=\tfrac{\varepsilon}{2}$ always works. This is what
      "arbitrarily close" really means -- not close for one lucky tolerance, but
      answerable for every $\varepsilon>0$. That little phrase "for every
      $\varepsilon$" is the engine of the definition we are about to write down.
    statement: "Arbitrarily close means the demand can be met for every positive tolerance, not just a chosen few."
    math:
      - "$0.01 \\;\\Rightarrow\\; |x-3| < 0.005$"
      - { tex: "$\\varepsilon \\;\\Rightarrow\\; |x-3| < \\tfrac{\\varepsilon}{2}, \\quad \\delta = \\tfrac{\\varepsilon}{2}$", anim: highlight }

  # 6 ----------------------------------------------- definition: the precise limit
  - id: precise_limit_definition
    kind: content
    template: definition_math
    accent: definition
    source: "§1.6 definition def:limit-precise (L1367-1376)"
    title: "The Precise Definition"
    say: |
      Now we can state it cleanly.
      {show math.0} Let $f$ be defined on an open interval around $a$, except
      possibly at $a$ itself. We say $\lim_{x\to a}f(x)=L$
      {show math.1} if for every $\varepsilon>0$ there exists a $\delta>0$
      {show math.2} such that $|f(x)-L|<\varepsilon$ whenever $0<|x-a|<\delta$.
      Read it as a challenge and a response: you name any tolerance $\varepsilon$,
      however cruelly small, and I must produce a radius $\delta$ that keeps every
      nearby $f(x)$ inside it. If I can always answer, the limit is $L$.
    statement: "For every tolerance around $L$, some radius around $a$ must guarantee it."
    math:
      - "$\\displaystyle \\lim_{x \\to a} f(x) = L$"
      - { tex: "$\\forall\\, \\varepsilon > 0 \\quad \\exists\\, \\delta > 0$", anim: highlight }
      - "$|f(x) - L| < \\varepsilon \\;\\text{ whenever }\\; 0 < |x - a| < \\delta$"

  # 7 ------------------------------------------------ anchor visual: the epsilon-delta tube
  # HOOK(待補):收緊 ε——ε-帶從上下向 L 收窄,δ-帶隨之向 a 收窄(連動),曲線始終夾在框內;
  #            換兩三個遞減 ε 重複,凸顯「ε 你定、δ 來應」「δ 隨 ε 而變」。本節最關鍵動畫。
  - id: epsilon_delta_tube
    kind: content
    template: graph_focus
    accent: definition
    source: "§1.6 geometric reading + figure fig:precise-limit (L1378-1451)"
    title: "Reading the Definition"
    say: |
      The definition hides a clean picture. Mark the target on the vertical axis:
      a horizontal band from $L-\varepsilon$ to $L+\varepsilon$, the strip we want
      the outputs to land in. Mark the inputs on the horizontal axis: a vertical
      band from $a-\delta$ to $a+\delta$, with the single point $a$ punched out.
      {show annotation.0} The definition says exactly this -- as long as $x$ stays
      in the input band, the graph carries it into the target band. And here is
      the part to feel in your bones: shrink the target strip toward $L$, and the
      input interval must shrink too, or the curve escapes the band. The radius
      $\delta$ is not fixed; it answers to $\varepsilon$.
    axes:
      x_range: [0, 4.5, 1]
      y_range: [0, 8, 1]
      x_length: 6.6
      y_length: 4.0
    plots:
      - { kind: function, expression: "2*x - 1", x_range: [0.5, 4.3], color_role: secondary, label: "$y=f(x)$", label_point: [1.2, 2.3] }
      - { kind: line, start: [0, 6], end: [4.5, 6], dashed: true, color_role: warning, label: "$L+\\varepsilon$", label_side: left }
      - { kind: line, start: [0, 4], end: [4.5, 4], dashed: true, color_role: warning, label: "$L-\\varepsilon$", label_side: left }
      - { kind: line, start: [2.5, 0], end: [2.5, 8], dashed: true, color_role: warning, label: "$a-\\delta$", label_side: down }
      - { kind: line, start: [3.5, 0], end: [3.5, 8], dashed: true, color_role: warning, label: "$a+\\delta$", label_side: down }
      - { kind: point, point: [3, 5], hollow: true, color_role: accent }   # x=a excluded (0<|x-a|): the punctured centre
    annotations:
      - "Inputs within $\\delta$ of $a$ land within $\\varepsilon$ of $L$ -- and $\\delta$ must shrink as $\\varepsilon$ does."

  # 8 ----------------------------------- theorem: uniqueness (statement + set the trap)
  - id: uniqueness_statement_and_trap
    kind: content
    template: theorem_proof
    accent: theorem
    source: "§1.6 proposition[Uniqueness] statement + contradiction setup (L1456-1466)"
    title: "Uniqueness of Limits"
    say: |
      The definition earns its keep immediately: it guarantees that a limit, once
      it exists, is unique. Why even worry?
      {show proof.0} Because nothing so far forbids two different numbers $L$ and
      $M$ from both passing the test -- so suppose, for contradiction, that they do.
      {show proof.1} Here is the clever move that breaks it: let $\varepsilon$ be
      half the gap between them, $\varepsilon=\tfrac{|L-M|}{2}$. Since $L\ne M$,
      this $\varepsilon$ is strictly positive, so it is a perfectly legal tolerance
      we are allowed to feed the definition. We have set a trap; the next step
      springs it.
    statement: "If $\\lim_{x\\to a} f(x)$ exists, then it is unique."
    proof:
      - "Suppose two values worked: $\\lim_{x\\to a} f(x) = L$ and $= M$, with $L \\ne M$."
      - "Let $\\varepsilon = \\tfrac{|L-M|}{2}$. Since $L \\ne M$, this $\\varepsilon > 0$ -- a legal tolerance."

  # 9 ----------------------------------- proof: the triangle-inequality contradiction
  - id: uniqueness_proof_triangle
    kind: content
    template: theorem_proof
    accent: theorem
    source: "§1.6 proof (L1474-1483)"
    title: "Why the Gap Must Vanish"
    say: |
      Now spring it.
      {show proof.0} Feed that $\varepsilon$ to each limit: there is a $\delta_1$
      that makes $f(x)$ hug $L$, and a $\delta_2$ that makes it hug $M$.
      {show proof.1} Take any $x$ nearer to $a$ than both -- closer than the
      smaller of $\delta_1$ and $\delta_2$ -- and both promises hold at once.
      {show proof.2} Now watch the gap collapse: $|L-M|$ rewrites as
      $|L-f(x)+f(x)-M|$, which by the triangle inequality is at most
      $|L-f(x)|+|f(x)-M|$, and since each piece is below $\varepsilon$, the total
      is below $2\varepsilon$.
      {show qed} But $2\varepsilon$ was defined to be exactly $|L-M|$. We have
      forced $|L-M|$ to be strictly less than itself -- impossible. The only way
      out is that there was no gap at all: $L=M$.
    statement: "With $\\varepsilon = \\tfrac{|L-M|}{2}$, both limits pin $f(x)$ close at once."
    proof:
      - "Each limit gives a radius: $\\delta_1$ for $L$, $\\delta_2$ for $M$."
      - "For $0 < |x-a| < \\min\\{\\delta_1, \\delta_2\\}$, both gaps are below $\\varepsilon$."
      - "Triangle inequality gives $|L-M| < 2\\varepsilon = |L-M|$."
    qed: "Strictly less than itself -- impossible; hence $L = M$."

  # 10 ---------------------------------------- procedure: the epsilon-delta recipe
  - id: epsilon_delta_recipe
    kind: content
    template: procedure_steps
    accent: procedure
    source: "§1.6 strategy[Verifying a limit from the ε-δ definition] (L1486-1494)"
    title: "Verifying a Limit: the Recipe"
    say: |
      Every verification that follows runs on one recipe.
      {show math.0} Start from a generic $\varepsilon>0$ -- that is the challenge,
      and your job is to manufacture a $\delta$.
      {show math.1} Take the quantity $|f(x)-L|$ and bound it above by something
      times $|x-a|$, because $|x-a|$ is the thing $\delta$ controls.
      {show math.2} Then choose $\delta$ to drive that bound below $\varepsilon$.
      One wrinkle decides the difficulty: if the bound still carries a stray factor
      depending on $x$, first pen $x$ into a small interval around $a$ to cap that
      factor, then take $\delta$ to be the minimum of that interval's radius and
      your $\varepsilon$-based bound.
      {show math.3} The next two examples are exactly this recipe -- once without
      the wrinkle, once with it.
    steps:   # left text stays plain English (no inline $math$): prose wraps uniformly; math lives in the right column
      - { text: "Start from a generic tolerance.", math: "\\varepsilon > 0 \\;\\text{given}" }
      - { text: "Bound the gap by a multiple of the input distance.", math: "|f(x)-L| \\le K\\,|x-a|" }
      - { text: "Choose the radius; take a minimum if a stray factor appears.", math: "\\delta = \\min\\{\\,r,\\; \\varepsilon/K\\,\\}" }
      - { text: "Conclude the implication holds.", math: "0<|x-a|<\\delta \\Rightarrow |f(x)-L|<\\varepsilon" }

  # 11 -------------------------------- example: verify a linear limit (clean, no wrinkle)
  - id: verify_linear_limit
    kind: content
    template: example_walkthrough
    accent: example
    source: "§1.6 workedexample lim(4x-5)=7 (L1496-1519)"
    title: "Verify $\\lim_{x\\to3}(4x-5)=7$"
    say: |
      Take the clean case first: show $\lim_{x\to3}(4x-5)=7$.
      {show math.0} Given a tolerance $\varepsilon$, measure the gap:
      $|(4x-5)-7|$ is $|4x-12|$, which factors as $4|x-3|$.
      {show math.1} We want that under $\varepsilon$, so we demand
      $|x-3|<\tfrac{\varepsilon}{4}$.
      {show math.2} That hands us the choice $\delta=\tfrac{\varepsilon}{4}$:
      whenever $0<|x-3|<\delta$, the gap $4|x-3|$ is below $4\cdot\tfrac{\varepsilon}{4}$,
      exactly $\varepsilon$.
      {show takeaway} The function is linear, there is no stray factor, and
      $\delta$ falls straight out of the algebra.
    steps:
      - { text: "Measure the gap.", math: "|(4x-5)-7| = 4|x-3|", hot: true }
      - { text: "Demand it below the tolerance.", math: "|x-3| < \\varepsilon/4" }
      - { text: "This radius verifies it.", math: "\\delta = \\varepsilon/4", mark: ok }
    takeaway: "Linear, no stray factor -- the radius falls straight out."

  # 12 ------------------------ example: verify a quadratic limit (the min{...} wrinkle)
  # repeat-pattern：第二個同型例,跳過 ε-δ setup,直接進「雜散因子 → 框住 → 取 min」。
  - id: verify_quadratic_limit
    kind: content
    template: example_walkthrough
    accent: example
    source: "§1.6 workedexample lim(x^2-5x+6)=2 (L1521-1556)"
    title: "Verify $\\lim_{x\\to1}(x^2-5x+6)=2$"
    say: |
      Same goal, but now the algebra fights back: show
      $\lim_{x\to1}(x^2-5x+6)=2$.
      {show math.0} The gap is $|x^2-5x+4|$, which factors as $|x-1|\,|x-4|$.
      {show math.1} The first factor is what $\delta$ controls, but the second
      drifts as $x$ moves -- so cap it: insist first that $|x-1|<1$, which traps
      $x$ between $0$ and $2$ and forces $|x-4|<4$.
      {show math.2} Now the gap is below $4|x-1|$, and to push that under
      $\varepsilon$ we also need $|x-1|<\tfrac{\varepsilon}{4}$.
      {show math.3} So take $\delta=\min\{1,\tfrac{\varepsilon}{4}\}$, and both
      demands hold together.
      {show takeaway} The minimum is not a trick; it is the recipe's wrinkle,
      made concrete.
    steps:
      - { text: "Factor the gap.", math: "|x^2-5x+4| = |x-1|\\,|x-4|", hot: true }
      - { text: "Cap the stray factor: take $|x-1|<1$ first.", math: "0<x<2 \\Rightarrow |x-4|<4" }
      - { text: "Force the rest under the tolerance.", math: "|x-1| < \\varepsilon/4" }
      - { text: "Take the minimum of both.", math: "\\delta = \\min\\{1,\\; \\varepsilon/4\\}", mark: ok }
    takeaway: "The minimum is the recipe's wrinkle, made concrete."

  # 13 ----------------------------------------- definition: precise infinite limits
  - id: precise_infinite_limit
    kind: content
    template: definition_math
    accent: definition
    source: "§1.6 definition def:infinite-limit-precise + intuition (L1558-1579)"
    title: "When the Limit Is Infinite"
    say: |
      The same machine handles limits that run off to infinity. We met those
      informally a little earlier; now we can say them precisely.
      {show math.0} We write $\lim_{x\to a}f(x)=\infty$ to mean:
      {show math.1} for every threshold $M>0$, there is a $\delta>0$
      {show math.2} such that $f(x)>M$ whenever $0<|x-a|<\delta$.
      Notice the quantifier has only changed its target -- instead of trapping
      $f$ near a value, we force it above any height you name. Pick $M$ as large
      as you like, a hundred or a googol; once $x$ is close enough to $a$, the
      function clears it.
      {show math.3} The $-\infty$ case is the mirror image: for every negative
      $N$, eventually $f(x)$ drops below it.
    statement: "The same challenge-response, with the target moved to any height."
    math:
      - "$\\displaystyle \\lim_{x \\to a} f(x) = \\infty$"
      - { tex: "$\\forall\\, M > 0 \\quad \\exists\\, \\delta > 0$", anim: highlight }
      - "$f(x) > M \\;\\text{ whenever }\\; 0 < |x - a| < \\delta$"
      - "$(-\\infty):\\;\\; \\forall\\, N < 0,\\;\\; f(x) < N$"

  # 14 --------------------------------------- forward_ref: a glimpse of continuity
  - id: continuity_preview
    kind: content
    template: definition_math
    accent: warning
    source: "§1.6 continuity prose (L1581-1586)"
    title: "A Glimpse Ahead: Continuity"
    say: |
      Before we gather up, the precise definition quietly hands us one more idea.
      Suppose $f$ is defined not just near $a$ but at $a$ as well, and suppose the
      limit equals the actual value:
      {show math.0} $\lim_{x\to a}f(x)=f(a)$.
      {show math.1} When that happens, we say $f$ is continuous at $a$. Look back
      at our broken function -- its limit was $5$ but its value was $6$, so it
      failed exactly this test; continuity is the case where the approach and the
      destination finally agree. A full study of continuity comes later; we name
      it here only because the limit language expresses it so directly.
    statement: "When the limit equals the actual value, the function is continuous there."
    math:
      - "$\\displaystyle \\lim_{x \\to a} f(x) = f(a)$"
      - { tex: "$f \\text{ is continuous at } a$", anim: highlight }

  # 15 ---------------------------------------------------------------- recap
  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    source: "全節綜合"
    title: "Section 1.6 -- Recap"
    say: |
      Let us gather the thread.
      {show point.0} The vague word "close" became a precise contract: for every
      $\varepsilon>0$ there is a $\delta>0$ so that, {show formula.0} whenever
      $0<|x-a|<\delta$, {show formula.1} the output obeys $|f(x)-L|<\varepsilon$.
      {show point.1} The picture to keep is the strip and the interval -- inputs
      within $\delta$ of $a$ are carried into the band within $\varepsilon$ of $L$,
      and $\delta$ always answers to $\varepsilon$.
      {show point.2} The first payoff was uniqueness: a limit, once it exists,
      cannot be two numbers.
      {show point.3} And to verify a limit by hand, bound $|f(x)-L|$ by a multiple
      of $|x-a|$, choose $\delta$, and take a minimum when a stray factor needs
      taming. Every informal limit we computed in the earlier sections now stands
      on this one definition.
    points:   # plain English (no inline $math$): prose wraps at one uniform size; the formulas carry the symbols
      - "The informal idea of close became a precise contract."
      - "A small input interval feeds a small output band."
      - "A limit, once it exists, is unique."
      - "To verify by hand: bound, choose a radius, take a minimum."
    formulas:   # short by convention (recap cards do not wrap/shrink-fit): the two halves of the ε-δ relation
      - "0 < |x-a| < \\delta"
      - "|f(x) - L| < \\varepsilon"

