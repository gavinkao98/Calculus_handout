- id: inverse_function_definition
  kind: content
  template: definition_math
  accent: definition
  source: §1.1 Definition 1.2 + role-swap prose + Caution 1.1 (folded N1)
  title: The Inverse Function
  statement: 'Read the same correspondence backwards: the inverse sends each output of $f$ back to the input it came from.'
  math:
  - tex: $f^{-1}(y)=x \iff f(x)=y$
    anim: highlight
  - $f^{-1}(x)\ne \dfrac{1}{f(x)}$
  say: 'Once a function is one-to-one, we can build a second function that undoes

    it. The idea is simply to read the same correspondence backwards. Where

    f asks "given the input, what is the output?", the inverse asks "given

    that output, which input produced it?" So the outputs of f become the

    inputs of the inverse, and the domain and range trade places.

    {show math.0} We write the inverse as f inverse, and define it like this:

    f inverse of y equals x exactly when f of x equals y.

    {show math.1} One warning about the notation: that negative one means

    inverse function, not a reciprocal. f inverse of x is the inverse

    evaluated at x, which is a completely different thing from one over

    f of x — and the same caution will matter for sine inverse shortly.

    '
- id: inverse_iff_one_to_one
  kind: content
  template: theorem_proof
  accent: theorem
  source: §1.1 Theorem 1.1 + Proof
  title: An Inverse Exists Exactly When One-to-One
  statement: A function has an inverse if and only if it is one-to-one.
  proof:
  - 'If $f$ has an inverse and $f(x_1)=f(x_2)$, apply $f^{-1}$: $x_1=x_2$.'
  - If $f$ is one-to-one, each output $y$ has a unique source $x$; that map is $f^{-1}$.
  qed: So one-to-one and invertible name the same thing.
  say: 'This ties the two halves of the section into one clean statement: a

    function has an inverse if and only if it is one-to-one. One direction is

    quick.

    {show proof.0} Suppose f already has an inverse and f of x sub one equals

    f of x sub two; apply f inverse to both sides — the left collapses to

    x sub one, the right to x sub two, so x sub one equals x sub two, and f

    was one-to-one all along.

    {show proof.1} The other direction builds the inverse: if f is one-to-one,

    then every output y in the range comes from exactly one input x, and

    sending each y back to its unique x is precisely the inverse function.

    {show qed} So "one-to-one" and "invertible" are just two names for the

    same thing.

    '
