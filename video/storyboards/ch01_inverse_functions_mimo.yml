    reason: factor $h(x)=x^3-4x$
  - math: h \text{ is not one-to-one}
    reason: $h(0)=h(2)=0$
    mark: bad
  - math: k(x_1)=k(x_2)\Rightarrow x_1=x_2
    reason: $k(x)=x^3+4$ one-to-one
    mark: ok
  say: 'Here is a case where the formula can fool you. Compare h of x equals

    x cubed minus four x with k of x equals x cubed plus four on the whole

    real line — both look like cousins of x cubed.

    {show step.0} But factor the first: h of x equals x times the quantity

    x minus two, times the quantity x plus two,

    {show step.1} so h of zero and h of two are both zero even though zero and

    two are different inputs; h is not one-to-one.

    {show step.2} The second behaves oppositely: if k of x sub one equals k of

    x sub two, then x sub one cubed equals x sub two cubed, and taking cube

    roots forces x sub one equals x sub two, so k is one-to-one.

    Same general shape, opposite verdicts — when the graph is

    not in front of you, test the definition directly.

    '
