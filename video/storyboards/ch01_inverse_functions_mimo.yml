  - tex: $\text{distinct students}\Rightarrow\text{distinct IDs}$ — one-to-one
    anim: highlight
  say: 'Let us start with a one-to-one function that needs no algebra at all.

    Picture a class where every student is assigned an identification number,

    set up so that no two students ever share a number.

    {show math.0} Let f send each student to their identification number —

    is it one-to-one?

    {show math.1} It is: by construction, two different students always end up

    with two different numbers, so distinct inputs give distinct outputs. That

    is the definition in plain words, before a single equation — no two inputs

    are allowed to collide.

    '
- id: testing_x_and_x_squared
  kind: content
  template: derivation
  accent: example
  source: §1.1 Example 1.2 + 'Now we return to the two…' 橋接
  title: Testing $f(x)=x$ and $g(x)=x^2$
  steps:
  - math: f \text{ is one-to-one}
    reason: $f(x)=x$ on $[0,1]$
    mark: ok
  - math: g(\tfrac12)=\tfrac14=g(-\tfrac12)
    reason: test $g(x)=x^2$ on $[-1,1]$
  - math: g \text{ is not one-to-one}
    reason: two inputs, one output
    mark: bad
  say: 'We met these two at the very start; now let us run them through the

    definition.

    {show step.0} On zero to one, f of x equals x sends every input to itself,

    so different inputs always land on different outputs — f is one-to-one.

    {show step.1} But g of x equals x squared on negative one to one fails,

    and we can pin it down cleanly: g of a half is a quarter, and g of

    negative a half is also a quarter.

    {show step.2} Two different inputs, one shared output — exactly the

    collision the definition rules out.

    So g is not one-to-one on this interval — which is exactly

    why it needs careful handling later.

    '
