- id: the_procedure
  kind: content
  template: procedure_steps
  accent: procedure
  source: 內容稿 u15 the_procedure
  title: 'Finding an Inverse: The Procedure'
  say: 'The cube-root computations secretly followed a recipe, and it works for any one-to-one function. {show math.0} Step one: write y equals f of x. {show math.1} Step two: solve this equation for x in terms of y. {show math.2} Step three: interchange the names x and y -- the result reads y equals f inverse of x. All the real work lives in step two; the final swap is just the variable-naming habit we set up earlier.

    '
  steps:
  - text: Write the rule as an equation.
    math: y=f(x)
  - text: Solve this equation for $x$ in terms of $y$.
    math: x=\text{(expression in } y)
  - text: Interchange the names $x$ and $y$.
    math: y=f^{-1}(x)
- id: procedure_in_action
  kind: content
  template: procedure_steps
  accent: example
  source: 內容稿 u16 procedure_in_action
  title: 'Worked Example: $f(x)=x^3+2$'
  say: 'Same recipe, one notch up: f of x equals x cubed plus two. {show math.0} From y equals x cubed plus two, isolate the input -- {show math.1} x cubed equals y minus two, then x equals the cube root of the quantity y minus two. {show math.2} Interchange the names, and the inverse appears: f inverse of x equals the cube root of the quantity x minus two. {show worked} Finally the certificate: f of f inverse of x equals the cube root of the quantity x minus two, all cubed, plus two; that is x minus two, plus two, which is x. Everything cancels back to x, so this really is the inverse.

    '
  steps:
  - text: Write the equation.
    math: y=x^3+2
  - text: Solve for $x$.
    math: x^3=y-2,\ \ x=\sqrt[3]{y-2}
  - text: Swap the names.
    math: f^{-1}(x)=\sqrt[3]{x-2}
  worked:
  - f\!\bigl(f^{-1}(x)\bigr)=\bigl(\sqrt[3]{x-2}\bigr)^{3}+2
  - =(x-2)+2
  - =x
- id: temperature_conversion
  kind: content
  template: example_walkthrough
  accent: example
  source: 內容稿 u17 temperature_conversion
  title: An Inverse in the Real World
  say: 'One last inverse, and this one means something outside the page. The function f of t equals nine-fifths t plus thirty-two takes a Celsius temperature and returns the Fahrenheit reading. {show math.0} So what does its inverse do? It runs the conversion backwards -- hand it a Fahrenheit number and it gives you the Celsius. {show math.1} The recipe is unchanged: solve t equals nine-fifths times f inverse of t, plus thirty-two, for the inverse, which gives f inverse of t equals five-ninths times the quantity t minus thirty-two. {show math.2} And the check is reassuring -- go to Fahrenheit and back, f inverse of f of t equals five-ninths times the quantity nine-fifths t plus thirty-two minus thirty-two, which is t, landing exactly where we began. {show takeaway} Here an inverse is not an abstraction; it is the formula on the other side of the thermometer.

    '
  steps:
  - text: $f$ converts Celsius to Fahrenheit; its inverse runs backwards.
    math: f(t)=\tfrac{9}{5}t+32
  - text: Solve $t=\tfrac{9}{5}f^{-1}(t)+32$ for the inverse.
    math: f^{-1}(t)=\tfrac{5}{9}(t-32)
    hot: true
  - text: Check by composing back.
    math: f^{-1}\!\bigl(f(t)\bigr)=\tfrac{5}{9}\bigl(\tfrac{9}{5}t\bigr)=t
    mark: ok
  takeaway: '$f^{-1}$ is the thermometer read backwards: Fahrenheit in, Celsius out.'
  takeaway_tone: ok
