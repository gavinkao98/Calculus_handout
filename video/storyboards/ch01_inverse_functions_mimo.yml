  accent: example
  source: 內容稿 u4 ids_before_algebra
  title: One-to-One Without Algebra
  say: 'Here is the definition at work in a setting with no formulas at all. {show math.0} Assign every student in a class an identification number, making sure no two students share one. Is the rule sending each student to their ID number one-to-one? {show math.1} Yes -- distinct students always receive distinct numbers, which is precisely the defining condition. The habit worth keeping: one-to-one is a question about the matching itself, not about algebra.

    '
  statement: Each student gets an ID number; no two students share one.
  math:
  - student $\longrightarrow$ ID number
  - tex: distinct students $\Rightarrow$ distinct IDs (one-to-one)
    anim: highlight
