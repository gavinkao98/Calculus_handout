  accent: definition
  kicker: motivation
  source: §1.1 開節散文 + warmup + 'difference is central' (content unit can_we_run_it_backwards)
  title: Running a Function Backwards
  statement: Forwards is easy. Can we recover the input from the output?
  math:
  - '$f(x)=x$ on $[0,1]$: each output comes from one input'
  - tex: '$g(x)=x^2$: $\tfrac12$ and $-\tfrac12$ both map to $\tfrac14$'
    anim: highlight
  say: 'We know how to run a function forwards — feed it an input, read off the

    output. The real question of this section is whether we can run it

    backwards, recovering the input from the output. Sometimes we can,

    sometimes we can''t, and two quick examples show the difference.

    {show math.0} Take f of x equals x on the interval from zero to one: zero

    goes to zero, a half goes to a half, an eighth goes to an eighth — every

    output traces back to exactly one input, so going backwards is unambiguous.

    {show math.1} Now take f of x equals x squared on the interval from

    negative one to one: a half squares to a quarter, but so does negative a

    half, so the output a quarter came from two different inputs. That

    collision is the whole obstacle — when one output can be traced to two

    inputs, there is no honest way back, and pinning down exactly when that

    never happens is where we begin.

    '
- id: one_to_one_definition
  kind: content
  template: definition_math
  accent: definition
  source: §1.1 Definition 1.1 + 小節 lead-in
  title: One-to-One
  statement: A function is one-to-one when different inputs always give different outputs.
  math:
  - $f(x_1)\ne f(x_2)$ whenever $x_1\ne x_2$
  - tex: $f(x_1)=f(x_2)\implies x_1=x_2$
    anim: highlight
  say: 'A function can be run backwards only when each output comes from exactly

    one input, and that property has a name: one-to-one.

    {show math.0} Formally, that means different inputs always give different

    outputs — f of x sub one is not equal to f of x sub two whenever x sub one

    is not equal to x sub two.

    {show math.1} There is an equivalent form that turns out to be the one you

    actually use in a proof: if f of x sub one equals f of x sub two, then

    x sub one equals x sub two. The two say the same thing from opposite

    sides — the first forbids a collision outright, the second says that if a

    collision did happen, the two inputs must have been equal all along. When

    you need to prove a function is one-to-one, reach for that second form.

    '
