    reason: check by composing
  say: 'Let us compute a couple of inverses.

    {show step.0} Start with f of x equals x — it leaves every input

    untouched, so undoing it does nothing either; f is its own inverse,

    f inverse of x equals x.

    {show step.1} Now g of x equals x cubed: set y equals x cubed, solve to

    get x equals the cube root of y, then rename the variables to land on

    g inverse of x equals the cube root of x.

    {show check} And we can check it — g of its inverse is the cube root of

    x, all cubed, which is just x again.

    Solve for the input, swap the names; that is the move, and

    we are about to make it routine.

    '
- id: composition_identities
  kind: content
  template: definition_math
  hook: animations.ch01_inverse_functions_hooks:composition_identities
  accent: proposition
  source: §1.1 Proposition 1.1 + 'defining relation yields two identities' + Figure 1.2 (fig-map)
  title: Composition Identities
  statement: Undo, then redo — and you are back where you started.
  math:
  - tex: $f^{-1}\bigl(f(x)\bigr)=x \quad\text{for every } x\in A$
    anim: highlight
  - tex: $f\bigl(f^{-1}(y)\bigr)=y \quad\text{for every } y\in B$
    anim: highlight
  say: 'Undoing and then redoing should leave you exactly where you started —

    worth stating outright.

    {show math.0} For a one-to-one f, applying f and then f inverse returns

    the original input: f inverse of f of x equals x for every x in the

    domain.

    {show math.1} Going the other way works too: f of f inverse of y equals y

    for every y in the range. Picture an input x in the set A; f carries it

    across to its output in the set B, and f inverse carries that output right

    back to the same x — a round trip that lands home. Each function is the

    other''s exact undo, in both directions.

    '
