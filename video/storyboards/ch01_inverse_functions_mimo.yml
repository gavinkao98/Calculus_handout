- id: inverse_definition
  kind: content
  template: definition_math
  accent: definition
  source: 內容稿 u7 inverse_definition
  title: The Inverse Function
  say: 'For a one-to-one function, every output traces back to exactly one input -- so the backwards assignment is itself a function. We call it the inverse of f, written f inverse. {show math.0} If f has domain A and range B, then f inverse has domain B and range A, and its rule is the defining relation: f inverse of y equals x exactly when f of x equals y. {show math.1} Note the trade: the outputs of f become the inputs of f inverse, and domain and range swap places.

    '
  statement: The inverse $f^{-1}$ sends each output of $f$ back to the unique input that produced it.
  math:
  - $f^{-1}(y)=x \iff f(x)=y$
  - tex: $\operatorname{dom} f^{-1}=B,\quad \operatorname{ran} f^{-1}=A$
    anim: highlight
- id: reading_the_notation
  kind: content
  template: definition_math
  accent: definition
  source: 內容稿 u8 reading_the_notation
  title: Reading the Notation
  say: 'One notational habit before we continue. {show math.0} We usually prefer x as the input letter of whatever function we are currently studying -- including f inverse itself. {show math.1} After renaming the variables, the defining relation reads: f inverse of x equals y exactly when f of y equals x. Same statement, new letters -- and this renaming is the reason the procedure at the end of this section will ask us to interchange x and y.

    '
  statement: We may rename the variables so that $x$ is the input of $f^{-1}$ too.
  math:
  - $f^{-1}(y)=x \iff f(x)=y$
  - tex: $f^{-1}(x)=y \iff f(y)=x$
    anim: highlight
- id: inverse_iff_one_to_one
  kind: content
  template: definition_math
  accent: theorem
  source: 內容稿 u9 inverse_iff_one_to_one
  title: When Does an Inverse Exist?
  say: 'We introduced one-to-one as the property that makes reversing possible; the theorem pins that down. {show math.0} A function has an inverse if and only if it is one-to-one. There are no hidden conditions: the property we can already check -- by the definition or by horizontal lines -- is the complete story of invertibility. Let us walk through why both directions hold.

    '
  statement: A function has an inverse if and only if it is one-to-one.
  math:
  - tex: $f\ \text{has an inverse} \iff f\ \text{is one-to-one}$
    anim: highlight
- id: proof_both_directions
  kind: content
  template: theorem_proof
  accent: theorem
  source: 內容稿 u10 proof_both_directions
  title: 'Proof: Both Directions'
  say: 'First, suppose f has an inverse. {show proof.0} If f of x sub one equals f of x sub two, apply f inverse to both sides -- f inverse of f of x sub one equals f inverse of f of x sub two -- and by the defining relation each side collapses back to its input, so x sub one equals x sub two. Equal outputs force equal inputs: f is one-to-one. {show proof.1} Now the converse. Let f be one-to-one with domain A and range B. Every y in B is hit by at least one x in A -- that is what being the range means -- and one-to-one guarantees at most one. {show qed} Exactly one input for each output: sending each y to that unique x is a well-defined function from B to A, and it is precisely the inverse of f.

    '
  statement: A function has an inverse if and only if it is one-to-one.
  proof:
  - ($\Rightarrow$) $f(x_1)=f(x_2) \;\Rightarrow\; f^{-1}\!\bigl(f(x_1)\bigr)=f^{-1}\!\bigl(f(x_2)\bigr) \;\Rightarrow\; x_1=x_2$
  - ($\Leftarrow$) each $y\in B$ has exactly one $x$ with $f(x)=y$; set $f^{-1}(y)=x$
  qed: An inverse exists exactly when $f$ is one-to-one.
- id: first_inverses
  kind: content
  template: example_walkthrough
  accent: example
  source: 內容稿 u11 first_inverses
  title: First Inverses
  say: 'Time to find actual inverses, starting small. {show math.0} The identity function f of x equals x leaves every input untouched, so reversing it changes nothing either: f is its own inverse, f inverse of x equals x. {show math.1} Next, g of x equals x cubed. Write y equals x cubed and solve for the input: x equals the cube root of y, {show math.2} so after renaming the variable, g inverse of x equals the cube root of x. {show takeaway} And the answer checks out: g of g inverse of x equals the cube root of x, all cubed, which is x -- feeding the inverse''s output back into g returns exactly where we started.

    '
  steps:
  - text: The identity is its own inverse.
    math: f^{-1}(x)=x
  - text: Solve $y=x^3$ for the input.
    math: x=\sqrt[3]{y}
    hot: true
  - text: Rename the variable.
    math: g^{-1}(x)=\sqrt[3]{x}
  takeaway: 'Check by composing: $g(g^{-1}(x))=(\sqrt[3]{x})^3=x$.'
  takeaway_tone: ok
- id: composition_identities
  kind: content
  template: definition_math
  accent: proposition
  hook: animations.ch01_inverse_functions_hooks:composition_identities
  source: 內容稿 u12 composition_identities
  title: Composition Identities
  say: 'That final check was not a coincidence -- it is a law that every inverse obeys. {show math.0} Because f inverse of y equals x means exactly the same thing as f of x equals y, going forward and then backwards always lands you where you started: f inverse of f of x equals x for every x in A, {show math.1} and in the other direction, f of f inverse of y equals y for every y in B. In words: f and f inverse undo each other, in both orders. These two identities are also the practical test -- to certify that a claimed inverse is correct, compose the two and watch everything cancel.

    '
  statement: $f$ and $f^{-1}$ undo each other, in both orders.
  math:
  - $f^{-1}\!\bigl(f(x)\bigr)=x \quad\text{for every } x\in A$
  - tex: $f\!\bigl(f^{-1}(y)\bigr)=y \quad\text{for every } y\in B$
    anim: highlight
