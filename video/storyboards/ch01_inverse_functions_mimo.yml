  title: Checking with Algebra
  say: 'Now back to the two functions from the opening, this time as a formal check. {show math.0} On the interval from zero to one, the function f of x equals x sends every input to itself, so distinct inputs automatically give distinct outputs -- one-to-one. {show math.1} For g of x equals x squared on the interval from negative one to one, compute both values: g of one half equals one quarter, and g of negative one half equals one quarter as well. {show math.2} Two different inputs share one output, so g is not one-to-one. {show takeaway} And the consequence matters: no rule can send one quarter back to a single input, so g cannot be reversed on this interval.

    '
