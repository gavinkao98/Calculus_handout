  math:
  - '$f(x)=x$ on $[0,1]$: every input keeps its own value'
  - tex: '$f(x)=x^2$ on $[-1,1]$: $\tfrac12,\ -\tfrac12 \mapsto \tfrac14$'
    anim: highlight
- id: one_to_one_definition
  kind: content
  template: definition_math
  accent: definition
  source: 內容稿 u3 one_to_one_definition
  title: One-to-One Functions
  say: 'The property that separates the two cases has a name: one-to-one. {show math.0} A function f is one-to-one if f of x sub one is not equal to f of x sub two whenever x sub one is not equal to x sub two -- different inputs always produce different outputs. {show math.1} The same condition can be turned around: if f of x sub one equals f of x sub two, then x sub one equals x sub two. Both forms say the same thing, but the second one is the workhorse in computations: assume two outputs agree, and deduce that the inputs were equal all along.

    '
  statement: A function is one-to-one if different inputs always produce different outputs.
  math:
  - $f(x_1) \ne f(x_2)$ whenever $x_1 \ne x_2$
  - tex: $f(x_1) = f(x_2) \implies x_1 = x_2$
    anim: highlight
- id: ids_before_algebra
  kind: content
