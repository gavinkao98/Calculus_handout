  title: Can We Go Backwards?
  say: 'Every function is a one-way machine: feed it an input, and it hands you an output. This section asks the reverse question -- starting from the output, can we recover the input that produced it? Watch two quick cases. {show math.0} For f of x equals x on the interval from zero to one, every input keeps its own value: zero stays at zero, one half stays at one half. {show math.1} But for f of x equals x squared on the interval from negative one to one, something breaks: both one half and negative one half are sent to one quarter. In the first case, each output points back to exactly one input; in the second, the output one quarter cannot tell us which input it came from -- and that difference is the whole story of this section.

    '
