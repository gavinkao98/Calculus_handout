    say: "probe. {show math.0}"
  - id: bad_callout
    kind: content
    template: callout
    type: caution
    title: "A trap"
    body: "At $\\theta=\\pi$ the ratio $\\frac{\\sin\\theta}{\\theta}$ is zero."
    say: "probe."
