  accent: recap
  source: 內容稿 u10 recap
  title: Section 1.3 -- Recap
  say: 'Here is the whole section in four ideas. {show point.0} A limit asks what value f of x approaches as x heads toward a -- written the limit of f of x as x approaches a equals L. {show formula.0} {show point.1} It depends only on the behavior near a, never on f of a itself, which may not even be defined. {show point.2} You can read a limit off a graph by following the curve inward from both sides. {show point.3} And when there is no graph, a table of values at inputs creeping toward a will reveal the number the function is approaching.

    '
