  title: From Guessing to Computing
  say: 'Notice what we have been doing: guessing limits by peeking at nearby values, whether off a graph or out of a table. Guessing is a fine start, but it is not a proof, and tables can occasionally mislead. {show math.0} So next we build systematic methods -- rules that compute limits exactly, with no sampling at all. {show math.1} And we sharpen the idea itself: what happens when a function approaches different values from the left and from the right, or grows without bound near a point. The estimate you can make today becomes a calculation you can trust.

    '
