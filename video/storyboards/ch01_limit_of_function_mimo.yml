  accent: example
  source: 內容稿 u8 when_algebra_is_hard · Example 1.18
  title: When the Algebra Is Hard
  reveal: cols
  say: 'One more, where the table really earns its keep. Consider the limit as t approaches zero of the square root of the quantity t squared plus nine, minus three, all over t squared. This time you cannot just factor your way to the answer -- the square root hides what is going on, and at t equals zero it is once again zero over zero. {show col.0} So we let the numbers talk. Sampling t equals negative 0.1, negative 0.01, 0.01, and 0.1, {show col.1} {show col.2} {show col.3} {show col.4} the expression returns about 0.16662, then 0.166666, and back out symmetrically. That is closing in on 0.16666 and so on, which we recognize as one sixth. When the algebra is not obvious, a table of nearby values is a perfectly good way to see where a function is headed. {show col.5}

    '
  statement: Guess $\lim_{t\to 0}\dfrac{\sqrt{t^2+9}-3}{t^2}$ -- again $\tfrac{0}{0}$ at $t=0$.
  header:
  - $t$
  - $-0.1$
  - $-0.01$
  - $0.01$
  - $0.1$
  - $t\to 0$
