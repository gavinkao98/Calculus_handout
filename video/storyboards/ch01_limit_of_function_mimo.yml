  title: A Ratio of Changes
  say: 'Calculus keeps circling back to one question: how fast is something changing right now? Suppose s of t is the position of a moving object at time t. Over the stretch from t to t plus h, its average velocity is the ratio s of the quantity t plus h, minus s of t, all over h -- change in position divided by change in time. But the average speed across an interval is not the speed at a single instant. To pin down that instantaneous velocity, we let h shrink toward zero and watch what the ratio settles on. {show plot.2} {show plot.3} The same move works for any function: the ratio f of y minus f of x, all over the quantity y minus x, measures how f changes between two inputs, {show annotation.0} and we ask what it approaches as y slides toward x without ever reaching it. That question -- what a quantity approaches -- is the idea of a limit.

    '
