- id: estimate_from_a_table
  kind: content
  template: value_table
  accent: example
  source: 內容稿 u7 estimate_from_a_table · Example 1.17
  title: Estimating a Limit from a Table
  reveal: cols
  say: 'What if there is no graph to read? Then we make our own data. Take the limit, as x approaches one, of the quantity x minus one, all over the quantity x squared minus one. Substituting x equals one gives zero over zero -- undefined, no answer there. {show col.0} So instead we sample inputs creeping toward one from both sides: 0.9, 0.99, 0.999, {show col.1} {show col.2} {show col.3} and then 1.001, 1.01, 1.1. {show col.4} {show col.5} {show col.6} Evaluate the expression at each, and the outputs march steadily toward one number -- 0.5263, 0.5025, 0.5003 from the left, and 0.4762, 0.4975, 0.4998 closing in from the right. They are squeezing in on one half, so we read the limit as one half. {show col.7}

    '
  statement: Guess $\lim_{x\to 1}\dfrac{x-1}{x^2-1}$ -- at $x=1$ it is $\tfrac{0}{0}$.
