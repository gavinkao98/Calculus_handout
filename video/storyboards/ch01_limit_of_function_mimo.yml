  source: 內容稿 u5 reading_a_graph · Figure 1.12 (read-limit-graph)
  title: Reading a Limit off a Graph
  say: 'Let us read limits straight off a graph. Three inputs to inspect: x equals negative two, x equals zero, and x equals two. As x approaches negative two from either side, the curve rises toward height one, so the limit there is one. Approaching zero, the curve heads to height zero -- the limit is zero. Now x equals two is the interesting one: from both sides the curve climbs toward height two, and yet the graph marks a solid dot down at the point with coordinates two and negative two, and a hollow dot up at the point with coordinates two and two. {show plot.2} {show plot.3} So f of two is negative two, but the limit ignores the value at the point and reports where the curve was heading. {show annotation.0} The limit as x approaches two is two, even though f of two equals negative two.

    '
  axes:
