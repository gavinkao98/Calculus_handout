- id: the_limit_defined
  kind: content
  template: definition_math
  accent: definition
  source: 內容稿 u3 the_limit_defined
  title: The Limit of a Function
  say: 'Here is the definition that captures "what a function approaches." {show math.0} We say the limit of f of x as x approaches a equals L if f of x can be made arbitrarily close to L whenever x is sufficiently close to a but not equal to a. That last clause is the entire personality of a limit: we care about inputs near a, never about a itself. {show math.1} The same idea has a lighter notation: f of x tends to L as x tends to a. Keep the picture in mind: x creeping toward a along the horizontal axis, while the heights f of x home in on L.

    '
  statement: The limit is $L$ if $f(x)$ stays arbitrarily close to $L$ for every $x$ near $a$ -- but $x\ne a$.
  math:
  - $\lim_{x\to a} f(x) = L$
  - tex: $f(x)\to L \quad\text{as } x\to a$
    anim: highlight
