  # 2 ------------------------------------------- motivation: ratio of changes (secant)
  # HOOK(第二輪): 右點 (y,f(y)) 沿曲線緩緩滑向左定點 (x,f(x))、割線隨之轉動變短;
  # 逼近時頓住、不畫到重合(y≠x,呼應極限「接近但不等於」)。本版靜態頂著(割線＋兩點)。
  - id: ratio_of_changes
    kind: content
    template: graph_focus
    accent: example
    kicker: motivation
    source: "內容稿 u2 ratio_of_changes"
    title: "A Ratio of Changes"
    say: |
      Calculus keeps circling back to one question: how fast is something
      changing right now? Suppose $s(t)$ is the position of a moving object at
      time $t$. Over the stretch from $t$ to $t+h$, its average velocity is the
      ratio $\frac{s(t+h)-s(t)}{h}$ -- change in position divided by change in
      time. But the average speed across an interval is not the speed at a
      single instant. To pin down that instantaneous velocity, we let $h$
      shrink toward zero and watch what the ratio settles on.
      {show plot.2} {show plot.3} The same move works for any function: the
      ratio $\frac{f(y)-f(x)}{y-x}$ measures how $f$ changes between two inputs,
      {show annotation.0} and we ask what it approaches as $y$ slides toward
      $x$ without ever reaching it. That question -- what a quantity approaches
      -- is the idea of a limit.
    axes:
      x_range: [0, 4, 1]
      y_range: [-0.5, 6.5, 2]
      x_length: 6.0
      y_length: 3.8
    plots:
      - { kind: function, expression: "0.4*x**2", x_range: [0.2, 3.9], color_role: secondary, label: '$y=f(x)$', label_point: [0.35, 5.6] }
      - { kind: point, point: [1, 0.4], hollow: false, color_role: accent, label: '$(x,f(x))$', label_side: down }
      - { kind: point, point: [3, 3.6], hollow: false, color_role: accent, label: '$(y,f(y))$', label_side: left, reveal: true }
      - { kind: line, start: [0.6, -0.24], end: [3.5, 4.4], dashed: true, color_role: primary, reveal: true }
    annotations:
      - '$\dfrac{f(y)-f(x)}{y-x}$ -- the slope of the secant line.'

  # 3 ------------------------------------------------------ definition: the limit
  - id: the_limit_defined
    kind: content
    template: definition_math
    accent: definition
    source: "內容稿 u3 the_limit_defined"
    title: "The Limit of a Function"
    say: |
      Here is the definition that captures "what a function approaches."
      {show math.0} We say the limit of $f(x)$ as $x$ approaches $a$ equals
      $L$, written $\lim_{x\to a} f(x) = L$, if $f(x)$ can be made arbitrarily
      close to $L$ whenever $x$ is sufficiently close to $a$ but not equal to
      $a$. That last clause is the entire personality of a limit: we care about
      inputs near $a$, never about $a$ itself.
      {show math.1} The same idea has a lighter notation -- $f(x)\to L$ as
      $x\to a$ -- read "$f(x)$ tends to $L$ as $x$ tends to $a$." Keep the
      picture in mind: $x$ creeping toward $a$ along the horizontal axis, while
      the heights $f(x)$ home in on $L$.
    statement: "The limit is $L$ if $f(x)$ stays arbitrarily close to $L$ for every $x$ near $a$ -- but $x\\ne a$."
    math:
      - '$\lim_{x\to a} f(x) = L$'
      - { tex: '$f(x)\to L \quad\text{as } x\to a$', anim: highlight }

  # 4 ------------------------------- visual: limit vs value (three cases; graph_compare 頂著)
  # HOOK(第二輪): 真正三 panel(f(a)=L / f(a)≠L / undefined),一支標記從兩側沿 x 軸滑向 a,
  # 三圖高度同步收斂到同一條 y=L 虛線。graph_compare 僅兩 panel,第三案(lifted)以 annotation 頂著。
  - id: limit_vs_value
    kind: content
    template: graph_compare
    accent: example
    source: "內容稿 u4 limit_vs_value"
    title: "The Limit Ignores $f(a)$"
    say: |
      Now the subtle part, and it is the heart of this section. A limit looks
      only at the neighborhood of $a$, never at the single point $a$ itself --
      so the value $f(a)$ gets no vote. Look at three functions side by side,
      all approaching the same height $L$ as $x\to a$. In the first, the point
      sits right where you expect, with $f(a) = L$.
      {show caption.left} In the second, someone has lifted that one point off
      the curve, so $f(a)\ne L$.
      {show annotation.0} In the third, the point is missing entirely and
      $f(a)$ is undefined.
      {show caption.right} Three different situations at $a$, yet the limit is
      the same $L$ in every case -- because near $a$, and near is all that
      counts, the three curves are identical.
      {show annotation.1}
    left:
      axes: { x_range: [-0.5, 2.5, 1], y_range: [-0.3, 3.5, 1] }
      plots:
        - { kind: function, expression: "x+1", x_range: [-0.3, 2.3], color_role: secondary, label: '$y=f(x)$', label_point: [-0.3, 0.9] }
        - { kind: point, point: [1, 2], hollow: false, color_role: accent }
      caption: "$f(a)=L$: the point lies on the curve."
    right:
      axes: { x_range: [-0.5, 2.5, 1], y_range: [-0.3, 3.5, 1] }
      plots:
        - { kind: function, expression: "x+1", x_range: [-0.3, 0.93], color_role: secondary, label: '$y=f(x)$', label_point: [-0.3, 0.9] }
        - { kind: function, expression: "x+1", x_range: [1.07, 2.3], color_role: secondary }
        - { kind: point, point: [1, 2], hollow: true, color_role: accent }
      caption: "$f(a)$ undefined: the point is missing."
    annotations:
      - "A third graph lifts that point off the curve: $f(a)\\ne L$."
      - "Near $a$ the three curves match, so the limit is the same $L$."

  # 5 ----------------------------------------------- example: reading a graph (Fig 1.12)
  # HOOK(第二輪): 依序在 x=-2/0/2 放標記沿曲線兩側滑入、虛線引到 y 軸標出 1/0/2;
  # x=2 處停頓 — 逼近虛線停在 y=2(空心點)同時閃下方 y=-2 實心點。本版靜態頂著。
  - id: reading_a_graph
    kind: content
    template: graph_focus
    accent: example
    source: "內容稿 u5 reading_a_graph · Figure 1.12 (read-limit-graph)"
    title: "Reading a Limit off a Graph"
    say: |
      Let us read limits straight off a graph. Three inputs to inspect:
      $x=-2$, $x=0$, and $x=2$. As $x$ approaches $-2$ from either side, the
      curve rises toward height $1$, so the limit there is $1$. Approaching
      $0$, the curve heads to height $0$ -- the limit is zero. Now $x=2$ is the
      interesting one: from both sides the curve climbs toward height $2$, and
      yet the graph marks a solid dot down at $(2,-2)$ and a hollow dot up at
      $(2,2)$.
      {show plot.2} {show plot.3} So $f(2)$ is $-2$, but the limit ignores the
      value at the point and reports where the curve was heading.
      {show annotation.0} The limit as $x\to 2$ is $2$, even though $f(2)$
      equals $-2$.
    axes:
      x_range: [-3.3, 2.9, 1]
      y_range: [-2.7, 2.8, 1]
      x_length: 6.4
      y_length: 4.2
    plots:
      - { kind: function, expression: "-0.0375*x**3 + 0.375*x**2 + 0.4*x", x_range: [-2.8, 1.98], color_role: secondary, label: '$y=f(x)$', label_point: [-2.7, 1.75] }
      - { kind: function, expression: "-0.0375*x**3 + 0.375*x**2 + 0.4*x", x_range: [2.02, 2.7], color_role: secondary }
      - { kind: point, point: [2, 2], hollow: true, color_role: accent, reveal: true }
      - { kind: point, point: [2, -2], hollow: false, color_role: accent, reveal: true }
    annotations:
      - "$\\lim_{x\\to 2} f(x) = 2$, even though $f(2) = -2$."

  # 6 ------------------------------------------ example: build one yourself (reverse skill)
  - id: build_one_yourself
    kind: content
    template: graph_focus
    accent: example
    source: "內容稿 u6 build_one_yourself"
    title: "Building One Yourself"
    say: |
      The same idea, now run backwards: instead of reading a graph, we build
      one. The task is a function with limit $10$ as $x\to 3$, but with
      $f(3) = 0$. Start with any curve that approaches height $10$ at $x=3$ --
      a straight line through $(3,10)$ will do. Then take that single point and
      drag it down to height $0$:
      {show plot.2} a hollow dot at $(3,10)$ to mark where the curve is
      heading,
      {show plot.3} and a solid dot at $(3,0)$ for the actual value. Near
      $x=3$ the curve still approaches $10$, while the relocated point sets
      $f(3) = 0$.
      {show annotation.0} Because the limit and the value are independent,
      nothing stops us from choosing them separately.
    axes:
      x_range: [0, 6, 1]
      y_range: [-1, 13, 2]
      x_length: 6.0
      y_length: 4.2
    plots:
      - { kind: function, expression: "2*x+4", x_range: [0.3, 2.95], color_role: secondary, label: '$y=f(x)$', label_point: [0.3, 7.2] }
      - { kind: function, expression: "2*x+4", x_range: [3.05, 4.5], color_role: secondary }
      - { kind: point, point: [3, 10], hollow: true, color_role: accent, label: '$(3,10)$', label_side: left, reveal: true }
      - { kind: point, point: [3, 0], hollow: false, color_role: accent, label: '$(3,0)$', label_side: down, reveal: true }
    annotations:
      - "$\\lim_{x\\to 3} f(x) = 10$ while $f(3) = 0$ -- limit and value chosen independently."

  # 7 -------------------------------- example: estimate from a table (rational; reveal cols)
  - id: estimate_from_a_table
    kind: content
    template: value_table
    accent: example
    source: "內容稿 u7 estimate_from_a_table · Example 1.17"
    title: "Estimating a Limit from a Table"
    reveal: cols
    say: |
      What if there is no graph to read? Then we make our own data. Take
      $\lim_{x\to 1}\frac{x-1}{x^2-1}$. Substituting $x=1$ gives zero over zero
      -- undefined, no answer there.
      {show col.0} So instead we sample inputs creeping toward $1$ from both
      sides: $0.9$, $0.99$, $0.999$,
      {show col.1} {show col.2} {show col.3} and then $1.001$, $1.01$, $1.1$.
      {show col.4} {show col.5} {show col.6} Evaluate the expression at each,
      and the outputs march steadily toward one number -- $0.5263$, $0.5025$,
      $0.5003$ from the left, and $0.4762$, $0.4975$, $0.4998$ closing in from
      the right.
      They are squeezing in on one half, so we read the limit as $\tfrac12$.
      {show col.7}
    statement: 'Guess $\lim_{x\to 1}\dfrac{x-1}{x^2-1}$ -- at $x=1$ it is $\tfrac{0}{0}$.'
    header: ['$x$', '$0.9$', '$0.99$', '$0.999$', '$1.001$', '$1.01$', '$1.1$', '$x\to 1$']
    rows:
      - ['$\dfrac{x-1}{x^2-1}$', '$0.5263$', '$0.5025$', '$0.5003$', '$0.4998$', '$0.4975$', '$0.4762$', '$\to \tfrac12$']
    accent_col: 7

  # 8 --------------------------- example: when algebra is hard (radical; reveal cols)
  - id: when_algebra_is_hard
    kind: content
    template: value_table
    accent: example
    source: "內容稿 u8 when_algebra_is_hard · Example 1.18"
    title: "When the Algebra Is Hard"
    reveal: cols
    say: |
      One more, where the table really earns its keep. Consider
      $\lim_{t\to 0}\frac{\sqrt{t^2+9}-3}{t^2}$. This time you cannot just
      factor your way to the answer -- the square root hides what is going on,
      and at $t=0$ it is once again zero over zero.
      {show col.0} So we let the numbers talk. Sampling $t = -0.1$, $-0.01$,
      $0.01$, and $0.1$,
      {show col.1} {show col.2} {show col.3} {show col.4} the expression
      returns about $0.16662$, then $0.166666$, and back out symmetrically.
      That is closing in on $0.16666\ldots$, which we recognize as $\tfrac16$.
      When the algebra is not obvious, a table of nearby values is a perfectly
      good way to see where a function is headed.
      {show col.5}
    statement: 'Guess $\lim_{t\to 0}\dfrac{\sqrt{t^2+9}-3}{t^2}$ -- again $\tfrac{0}{0}$ at $t=0$.'
    header: ['$t$', '$-0.1$', '$-0.01$', '$0.01$', '$0.1$', '$t\to 0$']
    rows:
      - ['$\dfrac{\sqrt{t^2+9}-3}{t^2}$', '$0.166620$', '$0.166666$', '$0.166666$', '$0.166620$', '$\to \tfrac16$']
    accent_col: 5

  # 9 -------------------------------------------------- forward_ref: what comes next
  - id: what_comes_next
    kind: content
    template: definition_math
    accent: definition
    kicker: "What Comes Next"
    source: "內容稿 u9 what_comes_next · 收尾 prose"
    title: "From Guessing to Computing"
    say: |
      Notice what we have been doing: guessing limits by peeking at nearby
      values, whether off a graph or out of a table. Guessing is a fine start,
      but it is not a proof, and tables can occasionally mislead.
      {show math.0} So next we build systematic methods -- rules that compute
      limits exactly, with no sampling at all.
      {show math.1} And we sharpen the idea itself: what happens when a
      function approaches different values from the left and from the right, or
      grows without bound near a point. The estimate you can make today becomes
      a calculation you can trust.
    statement: "Guessing is a fine start -- but next we compute exactly, and we sharpen the idea."
    math:
      - 'Compute $\lim_{x\to a} f(x)$ exactly -- no sampling, no guessing'
      - { tex: 'One-sided limits $\lim_{x\to a^{-}} f$, $\lim_{x\to a^{+}} f$, and limits without bound', anim: highlight }

  # 10 ---------------------------------------------------------------- recap
  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    source: "內容稿 u10 recap"
    title: "Section 1.3 -- Recap"
    say: |
      Here is the whole section in four ideas.
      {show point.0} A limit asks what value $f(x)$ approaches as $x$ heads
      toward $a$ -- written $\lim_{x\to a}f(x)=L$.
      {show formula.0} {show point.1} It depends only on the behavior near
      $a$, never on $f(a)$ itself, which may not even be defined.
      {show point.2} You can read a limit off a graph by following the curve
      inward from both sides.
      {show point.3} And when there is no graph, a table of values at inputs
      creeping toward $a$ will reveal the number the function is approaching.
    points:
      - "A limit is the value a function approaches near a point."
      - "It ignores $f(a)$ -- which may even be undefined."
      - "Read it off a graph: follow the curve inward from both sides."
      - "Or estimate it from a table of values at inputs near $a$."
    formulas:
      - "\\lim_{x\\to a} f(x) = L"

  # 11 ---------------------------------------------------------------- outro
  - id: outro
    kind: outro
    source: "內容稿 u11 outro"
    bgm: soft_outro
    duration: 8.0
