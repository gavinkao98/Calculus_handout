  # 2 --------------------------------------- motivation: the trig difference quotient
  - id: why_trig_is_different
    kind: content
    template: definition_math
    accent: definition
    scene_role: motivation          # exposition beat -> chipless (not a definition)
    ref: md:why_trig_is_different
    scaffold: { flag: radians }     # PD4: first use of the radian assumption
    source: "chapter3-print-standalone.html SS3.1 . opening prose (funnels to sin/theta over theta)"
    title: "A Limit No Algebra Can Crack"
    say: |
      Every derivative so far has yielded to algebra. For a polynomial we
      expanded $(x+h)^n$ and the binomial theorem handed us a factor of $h$ to
      cancel; for $e^x$ the power series did the same job. The trigonometric
      functions refuse to play along.
      {show math.0} Write down the difference quotient for $\sin x$ and try the
      usual move. You cannot simply set $h=0$: that gives $\tfrac00$, which
      tells you nothing. And no identity cancels the $h$ in the denominator --
      $\sin(x+h)$ simply does not break into pieces that conveniently subtract.
      {show math.1} As we are about to see, the whole computation funnels down
      to a single limit, the limit of $\sin\theta$ over $\theta$ -- again the
      indeterminate form zero over zero, and one that no algebra will crack.
      {show statement} Prying it open takes a genuinely new tool: a geometric
      comparison of areas on the unit circle. And once we secure that one
      limit, it unlocks the derivatives of both sine and cosine at once. One
      ground rule, though: throughout, angles are measured in radians -- an
      assumption that turns out to be essential.
    statement: "Every trigonometric derivative funnels down to a single limit."
    math:
      - "$\\dfrac{\\sin(x+h)-\\sin x}{h}\\ \\xrightarrow{\\ h=0\\ }\\ \\dfrac{0}{0}\\quad(\\text{no information})$"
      - { tex: "$\\lim_{\\theta\\to 0}\\dfrac{\\sin\\theta}{\\theta}\\quad\\left(\\tfrac{0}{0},\\ \\text{no algebra}\\right)$", anim: highlight }

  # 3 ------------------------------------ derivation: reduce the difference quotient (L2)
  - id: difference_quotient_for_sine
    kind: content
    template: derivation
    accent: definition
    kicker: derivation
    ref: md:difference_quotient_for_sine
    covers: [identity, substitute, divide, factors]     # step.0/1/2 + result (all shown; root reduction)
    scaffold: { motive: "Sum-to-product turns the difference of sines into a product." }
    source: "chapter3-print-standalone.html SS3.1 . The difference quotient for sine (sum-to-product)"
    title: "The Difference Quotient for Sine"
    say: |
      So let us transform that difference quotient instead of fighting it
      head-on. The decisive step is one trigonometric identity -- sum-to-product
      -- which turns a difference of sines into a product.
      {show step.0} Here it is; and a product is exactly what we want, because
      we can pull it apart and take limits one factor at a time.
      {show step.1} Put $A=x+h$ and $B=x$, and the numerator becomes
      $2\cos(x+\tfrac h2)\sin\tfrac h2$.
      {show step.2} Now divide by $h$ -- and here is the small trick that makes
      everything line up: write $h$ as $2$ times $\tfrac h2$, so the denominator
      carries the very $\tfrac h2$ inside the sine. The quotient cleans up to
      $\cos(x+\tfrac h2)$ times $\sin(h/2)$ over $h/2$.
      {show result} Look at what we have: a product of two factors. The first
      slides to $\cos x$, provided cosine is continuous; the second is exactly
      $\sin\theta$ over $\theta$ with $\theta=\tfrac h2$. So the whole derivative
      hangs on just two facts -- continuity, and that fundamental limit. We
      secure both now.
    steps:
      - { math: "\\sin A-\\sin B = 2\\cos\\frac{A+B}{2}\\,\\sin\\frac{A-B}{2}", reason: "sum-to-product" }
      - { math: "\\sin(x+h)-\\sin x = 2\\cos\\!\\left(x+\\frac h2\\right)\\sin\\frac h2", reason: "$A=x+h,\\ B=x$" }
      - { math: "\\frac{\\sin(x+h)-\\sin x}{h} = \\cos\\!\\left(x+\\frac h2\\right)\\cdot\\frac{\\sin(h/2)}{h/2}", reason: "write $h=2\\cdot\\tfrac h2$" }
    result: { math: "\\cos\\!\\left(x+\\frac h2\\right)\\to\\cos x\\quad\\text{and}\\quad \\frac{\\sin(h/2)}{h/2}\\to 1", reason: "continuity + the limit" }

  # 4 ------------------------------------------- divider: Stage 2 opener
  - id: divider_squeeze
    kind: divider
    accent: definition
    eyebrow: "Stage 2"
    title: "A Geometric Squeeze"
    subtitle: "Trapping a ratio between two areas."
    ref: doc:frag-sec-3-1
    scaffold: { problem: "$\\tfrac12\\sin\\theta\\;\\le\\;\\tfrac12\\theta\\;\\le\\;\\tfrac12\\tan\\theta$" }
    ghost: "2"
    progress: { current: 2, total: 4 }
    duration: 4.0

  # 5 ----------------------------- Figure 3.1: nested areas on the unit circle (HOOK, L2)
  - id: sector_inequality
    kind: content
    template: graph
    mode: single
    accent: definition
    hook: "animations.ch03_trig_derivatives_hooks:sector_inequality"
    source: "chapter3-print-standalone.html SS3.1 . Figure 3.1 (sector-inequality) + area prose"
    title: "A Squeeze on the Unit Circle"
    say: |
      Here is that new tool. We compare three areas on a circle of radius one.
      But first, one convenience that saves us half the work. Replacing $\theta$
      by $-\theta$ flips the sign of both $\theta$ and $\sin\theta$, so the
      ratio $\sin\theta/\theta$ is even -- whatever we learn for positive angles
      holds for negative ones, so it is enough to chase $\theta$ down to zero
      from the positive side. Now the geometry. On the unit circle, $A$ is at
      $(1,0)$, $B$ is the point at angle $\theta$, and extending the radius to
      the tangent at $A$ gives $C=(1,\tan\theta)$.
      {show tri_inner} The inner triangle $OAB$ has base one and height
      $\sin\theta$, so its area is one half $\sin\theta$.
      {show sector} The sector $OAB$ is the fraction $\theta$ over $2\pi$ of the
      disc -- area one half $\theta$.
      {show tri_outer} And the outer triangle $OAC$ has height $\tan\theta$, so
      its area is one half $\tan\theta$.
      {show ineq} Each region sits inside the next, so the areas line up in
      order: one half $\sin\theta$, then one half $\theta$, then one half
      $\tan\theta$. The whole argument hangs on that one picture.
    axes:
      x_range: [-0.45, 1.4, 1]
      y_range: [-0.35, 1.65, 1]
      x_length: 5.4
      y_length: 5.4
    plots: []

  # 6 --------------------------------- derivation: areas -> cos t <= sin t/t <= 1 (L2)
  - id: squeeze_to_the_bound
    kind: content
    template: derivation
    accent: definition
    kicker: derivation
    ref: md:squeeze_to_the_bound
    covers: [clear_halves, divide_sin, bound, abs_bound]     # step.0/1 + result + check (all shown)
    scaffold: { motive: "Turn the chain of areas into bounds on $\\sin\\theta/\\theta$." }
    source: "chapter3-print-standalone.html SS3.1 . algebra after Figure 3.1 (inequality 1)"
    title: "Trapping the Ratio"
    say: |
      Now turn that chain of areas into a statement about $\sin\theta/\theta$,
      one careful step at a time.
      {show step.0} Multiply through by $2$ to clear the halves:
      $\sin\theta\le\theta\le\tan\theta$.
      {show step.1} Divide every part by $\sin\theta$, positive here, and
      rewrite $\tan\theta$ as $\sin\theta$ over $\cos\theta$ -- giving $1$ at
      most $\theta$ over $\sin\theta$ at most $1$ over $\cos\theta$.
      {show result} The middle is upside down, so take reciprocals of all three.
      They are positive, and flipping positives reverses the inequalities, so
      the chain turns around: $\cos\theta\le\sin\theta/\theta\le 1$, for $\theta$
      between zero and $\tfrac\pi2$.
      {show check} And pocket one more consequence: from $\sin\theta\le\theta$ we
      also get zero at most $|\sin\theta|$ at most $|\theta|$ near zero -- a
      bound we lean on twice in a moment.
    steps:
      - { math: "\\sin\\theta \\;\\le\\; \\theta \\;\\le\\; \\tan\\theta", reason: "multiply areas by $2$" }
      - { math: "1 \\;\\le\\; \\frac{\\theta}{\\sin\\theta} \\;\\le\\; \\frac{1}{\\cos\\theta}", reason: "$\\div\\sin\\theta$, $\\tan=\\tfrac{\\sin}{\\cos}$" }
    result: { math: "\\cos\\theta \\;\\le\\; \\frac{\\sin\\theta}{\\theta} \\;\\le\\; 1 \\qquad (0<\\theta<\\frac{\\pi}{2})", reason: "reciprocate -- reverses" }
    check:  { math: "0 \\;\\le\\; \\lvert\\sin\\theta\\rvert \\;\\le\\; \\lvert\\theta\\rvert", reason: "kept for later" }

  # 7 ------------------- Proposition 3.1 (part 1/2): statement + lim sin theta = 0
  - id: continuity_statement_sin_limit
    kind: content
    template: theorem_proof
    accent: proposition
    label: "[ proposition ]"
    part: { current: 1, total: 2 }
    ref: md:continuity_statement_sin_limit
    covers: [bound, squeeze, qed]     # proof.0/1 + qed; bound recaps squeeze_to_the_bound.abs_bound
    scaffold: { motive: "The bound is the key to continuity — first prove $\\sin\\theta\\to 0$." }
    source: "chapter3-print-standalone.html SS3.1 . Proposition 3.1 (statement) + Proof (sin theta -> 0)"
    title: "Sine and Cosine Are Continuous"
    say: |
      That little bound does more than help with the limit -- it is the key to
      continuity. And continuity here means something concrete: nudge the angle
      a little, and sine and cosine move only a little; they never jump. We even
      have the tool that says so -- on the unit circle the half-chord
      $\sin\theta$ is always shorter than the arc $\theta$ above it, which is
      just $|\sin\theta|\le|\theta|$ read geometrically.
      {show statement} So here is the claim, made precise: $\sin x$ and $\cos x$
      are continuous at every real $x_0$.
      {show proof.0} Build it from the ground up. Since zero at most
      $|\sin\theta|$ at most $|\theta|$, and $|\theta|$ itself goes to zero,
      {show proof.1} the squeeze theorem forces $\sin\theta\to 0$.
      {show qed} That single limit is the seed; the full continuity grows
      straight out of it, which is what we do next.
    statement: "$\\sin x,\\ \\cos x$ are continuous at every $x_0$."
    proof:
      - "$0\\le|\\sin\\theta|\\le|\\theta|$ (chord $\\le$ arc)"
      - "$|\\theta|\\to 0$, squeeze $\\Rightarrow\\ \\sin\\theta\\to 0$"
    qed: "$\\lim_{\\theta\\to 0}\\sin\\theta = 0$"

  # 8 ------------------- Proposition 3.1 (part 2/2): sum-to-product argument -> continuity
  - id: continuity_argument
    kind: content
    template: theorem_proof
    accent: proposition
    label: "[ proof, cont. ]"
    part: { current: 2, total: 2 }
    ref: md:continuity_argument
    covers: [cos_identity, sin_identity, bound, qed]     # proof.0/1/2 + qed (all shown)
    scaffold: { motive: "Turn $\\sin\\theta\\to 0$ into full continuity, everywhere." }
    source: "chapter3-print-standalone.html SS3.1 . Proposition 3.1 . Proof (sum-to-product bound + squeeze)"
    title: "Sine and Cosine Are Continuous"
    say: |
      {show statement} Now turn that seed into full continuity. Fix a point
      $x_0$, and ask how much $\cos x$ and $\sin x$ can change as $x$ moves
      toward it.
      {show proof.0} Sum-to-product answers both at once. For cosine,
      $\cos x-\cos x_0$ is $-2\sin\tfrac{x-x_0}{2}\sin\tfrac{x+x_0}{2}$;
      {show proof.1} and for sine, $\sin x-\sin x_0$ is
      $2\cos\tfrac{x+x_0}{2}\sin\tfrac{x-x_0}{2}$. In each, the half-sum factor
      never exceeds one in size.
      {show proof.2} Drop it to its largest size, one, and both differences are
      bounded by the same thing -- twice $|\sin\tfrac{x-x_0}{2}|$.
      {show qed} Now let $x\to x_0$: the half-angle goes to zero, so that bound
      collapses to zero. Squeeze one last time, and $\cos x\to\cos x_0$,
      $\sin x\to\sin x_0$ -- both continuous everywhere.
    statement: "Fix $x_0$: how far can $\\cos x,\\ \\sin x$ move?"
    proof:
      - "$\\cos x-\\cos x_0=-2\\sin\\frac{x-x_0}{2}\\,\\sin\\frac{x+x_0}{2}$"
      - "$\\sin x-\\sin x_0=\\phantom{-}2\\cos\\frac{x+x_0}{2}\\,\\sin\\frac{x-x_0}{2}$"
      - "$|\\cos x-\\cos x_0|,\\ |\\sin x-\\sin x_0|\\le 2|\\sin\\frac{x-x_0}{2}|$"
    qed: "$x\\to x_0\\ \\Rightarrow\\ \\cos x\\to\\cos x_0,\\ \\sin x\\to\\sin x_0$"

  # 9 --------------------------- Proposition 3.2 + Proof: the fundamental limit = 1 (L2)
  - id: fundamental_limit
    kind: content
    template: theorem_proof
    accent: proposition
    label: "[ proposition ]"
    ref: md:fundamental_limit
    covers: [bound, squeeze, qed]     # proof.0/1 + qed; bound recaps squeeze_to_the_bound.bound (ineq (1))
    scaffold: { motive: "Close the limit $\\sin\\theta/\\theta\\to 1$ the whole section is built on." }
    source: "chapter3-print-standalone.html SS3.1 . Proposition 3.2 + Proof"
    title: "The Fundamental Limit"
    say: |
      Now we can finally close the limit that started all of this.
      {show statement} The claim is as clean as it gets: $\sin\theta$ over
      $\theta$ tends to one as $\theta\to 0$.
      {show proof.0} And we already built the trap. For $\theta$ between zero and
      $\tfrac\pi2$, the ratio is pinned between a floor and a ceiling:
      $\cos\theta\le\sin\theta/\theta\le 1$.
      {show proof.1} The ceiling is the constant one. The floor is $\cos\theta$,
      which tends to one now that we know cosine is continuous -- so the squeeze
      pins the ratio to one from the right.
      {show qed} And because the ratio is even, its left limit matches its right,
      so the two-sided limit is one as well. That is the keystone.
    statement: "$\\lim_{\\theta\\to 0}\\frac{\\sin\\theta}{\\theta}=1$"
    proof:
      - "$\\cos\\theta\\le\\frac{\\sin\\theta}{\\theta}\\le 1\\quad(0<\\theta<\\frac{\\pi}{2})$"
      - "$\\cos\\theta\\to 1\\ \\Rightarrow\\ \\frac{\\sin\\theta}{\\theta}\\to 1$"
    qed: "even $\\Rightarrow$ two-sided limit $=1$"

  # 10 ------------------------------------- Figure 3.2: the squeeze as a graph (stock)
  - id: squeeze_graph
    kind: content
    template: graph
    mode: single
    accent: definition
    ref: md:squeeze_graph
    source: "chapter3-print-standalone.html SS3.1 . Figure 3.2 (squeeze-limit)"
    title: "The Squeeze, Drawn"
    say: |
      It helps to picture that squeeze.
      {show plot.0} Here runs $\cos\theta$, the dashed floor.
      {show plot.1} And the ceiling -- the constant line at height one.
      {show plot.2} Between them, the ratio $\sin\theta$ over $\theta$, caught in
      the narrowing gap. As $\theta$ slides toward zero the floor rises to one
      and the ceiling already is one, so the curve is squeezed right to one.
      {show plot.3} Notice the open circle at $\theta=0$: the ratio is undefined
      there, zero over zero.
      {show annotation.0} So what equals one is the limit -- the height the curve
      is forced toward, not a value it ever takes.
    axes:
      x_range: [-1.5, 1.5, 0.5]
      y_range: [0, 1.18, 0.5]
      y_ticks: [{ at: 1, label: "$1$" }]
      x_length: 6.4
      y_length: 3.6
    plots:
      - { kind: function, expression: "cos(x)", x_range: [-1.5, 1.5], color_role: muted, dashed: true, label: "$\\cos\\theta$", reveal: true }
      - { kind: line, start: [-1.5, 1], end: [1.5, 1], color_role: secondary, label: "$1$", label_point: [1.25, 1.08], reveal: true }
      - { kind: function, expression: "sin(x)/x", x_range: [-1.5, 1.5], color_role: accent, label: "$\\dfrac{\\sin\\theta}{\\theta}$", label_point: [0.95, 0.86], reveal: true }
      - { kind: point, point: [0, 1], hollow: true, hollow_reason: "ratio undefined at theta=0 (0/0)", color_role: accent, reveal: true }
    annotations:
      - "Trapped between $\\cos\\theta$ and $1$, the ratio is forced to $1$ -- undefined at $\\theta=0$."

  # 11 --------------------------------------- Caution: a limit, not an identity
  - id: limit_not_identity
    kind: content
    template: callout
    type: caution
    ref: md:limit_not_identity
    source: "chapter3-print-standalone.html SS3.1 . Caution (limit not identity)"
    title: "A Limit, Not an Identity"
    say: |
      One caution, because this result is easy to over-read.
      {show body} The statement is about the limit as $\theta\to 0$ -- not an
      identity. At a fixed angle the ratio is generally not one: at
      $\theta=\tfrac\pi2$ it is two over $\pi$, about $0.64$, and at $\theta=\pi$
      it is zero. The value one is reached only in the limit.
    body: "The limit as $\\theta\\to 0$ is not an identity. At a fixed angle, $\\sin\\theta/\\theta$ is generally not $1$: at $\\theta=\\tfrac{\\pi}{2}$ it is $2/\\pi\\approx 0.64$, and at $\\theta=\\pi$ it is $0$."

  # 12 -------------------------------------------- Caution: radians are essential
  - id: radians_essential
    kind: content
    template: callout
    type: caution
    ref: md:radians_essential
    source: "chapter3-print-standalone.html SS3.1 . Caution (radian convention)"
    title: "Why Radians"
    say: |
      A second caution, and this one is structural.
      {show body} Everything here depends on radians. The sector area one half
      $\theta$ -- and with it the limit -- uses radian measure. Switch to degrees
      and the limit is $\pi$ over $180$, not one, so the derivative drags that
      factor along. The clean formulas $\sin'=\cos$ and $\cos'=-\sin$ hold only
      in radians.
    body: "Everything here needs radians. In degrees, $\\sin(x^{\\circ})/x \\to \\pi/180$, so $\\tfrac{d}{dx}\\sin(x^{\\circ})=\\tfrac{\\pi}{180}\\cos(x^{\\circ})$ --- the clean $\\sin'=\\cos$ holds only in radians."

  # 13 ----------------------------------------- divider: Stage 3 opener
  - id: divider_derivatives
    kind: divider
    accent: definition
    eyebrow: "Stage 3"
    title: "The Two Derivatives"
    subtitle: "Assembling the pieces."
    ref: doc:frag-sec-3-1
    scaffold: { problem: "$\\dfrac{d}{dx}\\sin x=\\;?\\qquad\\dfrac{d}{dx}\\cos x=\\;?$" }
    ghost: "3"
