    say: |
      Stack the three graphs over one time axis and the relationship jumps out.
      {show g_s} On top, the height $s=\sin t$.
      {show g_v} In the middle, the velocity $s'=\cos t$.
      {show g_a} On the bottom, the acceleration $s''=-\sin t$. Watch where the
      height hits a peak or a trough -- there the velocity passes through zero,
      because at the extremes the weight momentarily stops.
      {show mirror} And hold the bottom graph against the top: it is the top one
      flipped upside down. That is $s''=-s$, drawn -- the very picture of an
      oscillation.
