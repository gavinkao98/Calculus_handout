  # 14 ------------------ Theorem 3.1 + Proof (part 1/2): definition -> reduced form
  - id: derivative_of_sine
    kind: content
    template: theorem_proof
    accent: theorem
    part: { current: 1, total: 2 }
    ref: md:derivative_of_sine
    covers: [def, reduced]     # def restored (sweep fix -- SC1 def cleared); split for capacity
    scaffold: { motive: "Cash in continuity and the limit — sine's derivative falls out." }
    source: "chapter3-print-standalone.html SS3.1 . Theorem 3.1 + Proof"
    title: "The Derivative of Sine"
    say: |
      Now the payoff, and it falls into our hands.
      {show statement} The claim: the derivative of $\sin x$ is $\cos x$, for
      every real $x$.
      {show proof.0} Start from the definition -- the derivative is the limit
      of the difference quotient.
      {show proof.1} But we already did the hard algebra: that quotient is
      $\cos(x+\tfrac h2)$ times $\sin(h/2)$ over $h/2$.
    statement: "$\\frac{d}{dx}\\sin x = \\cos x$"
    proof:
      - "$\\frac{d}{dx}\\sin x=\\lim_{h\\to 0}\\frac{\\sin(x+h)-\\sin x}{h}$"
      - "$=\\lim_{h\\to 0}\\cos\\!\\left(x+\\frac h2\\right)\\frac{\\sin(h/2)}{h/2}$"

  # 14b ----------------- Theorem 3.1 + Proof (part 2/2): take the limit -> cos x
  - id: derivative_of_sine_finish
    kind: content
    template: theorem_proof
    accent: theorem
    part: { current: 2, total: 2 }
    ref: md:derivative_of_sine
    covers: [limits, qed]
    scaffold: { motive: "Send $h\\to 0$: continuity and the fundamental limit finish it." }
    source: "chapter3-print-standalone.html SS3.1 . Theorem 3.1 + Proof"
    title: "The Derivative of Sine"
    say: |
      {show proof.0} Let $h\to 0$: the first factor tends to $\cos x$ by
      continuity, the second to one by the fundamental limit.
      {show qed} A continuous thing times a limit -- the product is $\cos x$
      times one, just $\cos x$.
    statement: "$\\frac{d}{dx}\\sin x = \\cos x$"
    proof:
      - "$\\cos\\!\\left(x+\\frac h2\\right)\\to\\cos x,\\quad \\frac{\\sin(h/2)}{h/2}\\to 1$"
    qed: "$\\Rightarrow\\ \\cos x\\cdot 1=\\cos x$"

  # 15 ------------------ Theorem 3.2 + Proof (part 1/2): companion identity -> divided form
  - id: derivative_of_cosine
    kind: content
    template: theorem_proof
    accent: theorem
    part: { current: 1, total: 2 }
    ref: md:derivative_of_cosine
    covers: [companion_identity, divide]     # split for capacity
    scaffold: { motive: "Same machinery, companion identity — now cosine." }
    source: "chapter3-print-standalone.html SS3.1 . Theorem 3.2 + Proof"
    title: "The Derivative of Cosine"
    say: |
      Cosine falls to the very same machinery -- only the identity changes, so
      we go quickly.
      {show statement} The claim: the derivative of $\cos x$ is $-\sin x$.
      {show proof.0} This time use the companion sum-to-product formula.
      {show proof.1} The same division by $h$ turns the difference quotient into
      $-\sin(x+\tfrac h2)$ times $\sin(h/2)$ over $h/2$.
    statement: "$\\frac{d}{dx}\\cos x = -\\sin x$"
    proof:
      - "$\\cos A-\\cos B=-2\\sin\\frac{A+B}{2}\\,\\sin\\frac{A-B}{2}$"
      - "$\\frac{\\cos(x+h)-\\cos x}{h}=-\\sin\\!\\left(x+\\frac h2\\right)\\frac{\\sin(h/2)}{h/2}$"

  # 15b ----------------- Theorem 3.2 + Proof (part 2/2): take the limit -> -sin x
  - id: derivative_of_cosine_finish
    kind: content
    template: theorem_proof
    accent: theorem
    part: { current: 2, total: 2 }
    ref: md:derivative_of_cosine
    covers: [limits, qed]     # explicit limits reveal (sweep fix -- symmetry with sine)
    scaffold: { motive: "Send $h\\to 0$: the same two tools, one extra minus sign." }
    source: "chapter3-print-standalone.html SS3.1 . Theorem 3.2 + Proof"
    title: "The Derivative of Cosine"
    say: |
      {show proof.0} Send $h$ to zero: the sine factor tends to $\sin x$ by
      continuity, the second to one by the fundamental limit.
      {show qed} The leading minus sign comes along -- leaving $-\sin x$. Same
      two tools, one extra minus sign.
    statement: "$\\frac{d}{dx}\\cos x = -\\sin x$"
    proof:
      - "$-\\sin\\!\\left(x+\\frac h2\\right)\\to-\\sin x,\\quad \\frac{\\sin(h/2)}{h/2}\\to 1$"
    qed: "$\\Rightarrow\\ -\\sin x\\cdot 1=-\\sin x$"

