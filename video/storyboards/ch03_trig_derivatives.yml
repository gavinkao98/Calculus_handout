  # 23 -------------------------------- forward-ref: toward the chain rule (no section no.)
  - id: toward_the_chain_rule
    kind: content
    template: definition_math
    accent: definition
    scene_role: forward-ref         # exposition beat -> chipless (not a definition)
    ref: md:toward_the_chain_rule
    scaffold: { motive: "We can do bare trig functions -- but not yet composed ones." }
    source: "chapter3-print-standalone.html SS3.1 . closing prose (forward-ref to the chain rule)"
    title: "Toward the Chain Rule"
    say: |
      We can now differentiate every trigonometric function -- but only in its
      bare form.
      {show statement} We can handle $\sin x$, yet not $\sin(x^2)$ or
      $\sin(3x+1)$, where the angle is itself a function tucked inside.
      {show math.0} To reach a function buried inside another, we need one more
      rule -- a way to differentiate a composition. That is the chain rule, and
      it is what comes next; with it, every derivative we found today becomes the
      seed of a whole family more.
    statement: "We can differentiate $\\sin x$ --- but not yet $\\sin(x^{2})$ or $\\sin(3x+1)$."
    math:
      - { tex: "$\\sin x\\ \\checkmark \\qquad \\sin(x^{2})\\ ? \\qquad \\sin(3x+1)\\ ?$", anim: highlight }

  # 24 ------------------------------------------------------------- recap (Key Takeaways)
  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    ref: md:recap
    refs: { points.0: md:recap, points.1: md:recap, points.2: md:recap, points.3: md:recap }
    source: "chapter3-print-standalone.html SS3.1 . whole-section synthesis"
    title: "Key Takeaways"
    say: |
      Pull the section together.
      {show point.0} Everything grew from one limit: $\sin\theta$ over $\theta$
      tends to one, cracked by squeezing areas on the unit circle.
      {show point.1} That limit, with continuity, gave the two derivatives at the
      heart of the section -- sine differentiates to cosine, cosine to negative
      sine.
      {show point.2} From those two, the quotient rule delivered all the other
      trig derivatives -- tangent, cotangent, secant, cosecant.
      {show point.3} And keep the cycle in mind -- four derivatives of sine or
      cosine bring you home -- with the fine print that it all depends on
      radians.
    points:
      - "Fundamental limit: $\\sin\\theta/\\theta \\to 1$ as $\\theta\\to 0$, proved by squeezing areas on the unit circle."
      - "Two core derivatives: $\\sin'=\\cos$ and $\\cos'=-\\sin$."
      - "The quotient rule delivers all six trig derivatives: $\\tan,\\cot,\\sec,\\csc$."
      - "Derivatives of $\\sin$ and $\\cos$ cycle with period four; the entire framework requires radians."

