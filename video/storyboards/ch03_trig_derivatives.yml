  # 19 -------------------------------- Example 3.1: the companion limit (1-cos t)/t -> 0
  - id: companion_limit
    kind: content
    template: derivation
    accent: example
    ref: md:companion_limit
    covers: [conjugate, split, evaluate]     # step.0/1 + result (all shown)
    scaffold: { motive: "Bank a companion limit: $(1-\\cos\\theta)/\\theta\\to 0$." }
    source: "chapter3-print-standalone.html SS3.1 . Example 3.1 (companion limit)"
    title: "A Companion Limit"
    prompt: "Establish the companion limit $(1-\\cos\\theta)/\\theta \\to 0$ as $\\theta \\to 0$."
    say: |
      The fundamental limit has a companion worth knowing: $(1-\cos\theta)$ over
      $\theta$ tends to zero. It is again zero over zero, so we need a way in.
      {show step.0} Multiply top and bottom by the conjugate $1+\cos\theta$; the
      numerator becomes a difference of squares, $1-\cos^2\theta$.
      {show step.1} And $1-\cos^2\theta$ is just $\sin^2\theta$, so the whole
      thing splits into $\sin\theta$ over $\theta$ times $\sin\theta$ over
      $1+\cos\theta$.
      {show result} Let $\theta\to 0$: the first factor goes to one, the second
      to zero over two. One times zero is zero.
    steps:
      - { math: "\\frac{1-\\cos\\theta}{\\theta} = \\frac{(1-\\cos\\theta)(1+\\cos\\theta)}{\\theta\\,(1+\\cos\\theta)} = \\frac{1-\\cos^{2}\\theta}{\\theta\\,(1+\\cos\\theta)}", reason: "multiply by $1+\\cos\\theta$" }
      - { math: "= \\frac{\\sin^{2}\\theta}{\\theta\\,(1+\\cos\\theta)} = \\frac{\\sin\\theta}{\\theta}\\cdot\\frac{\\sin\\theta}{1+\\cos\\theta}", reason: "$1-\\cos^{2}\\theta=\\sin^{2}\\theta$" }
    result: { math: "\\longrightarrow\\ 1\\cdot\\frac{0}{1+1} = 0", reason: "the limit, then continuity" }

  # 20a ------------------- Example 3.2 (part 1/2): tan' and sec' via the quotient rule
  - id: all_six_tan_sec
    kind: content
    template: derivation
    accent: example
    part: { current: 1, total: 2 }
    ref: md:all_six_trig_derivatives
    covers: [tan_quotient, tan_result, sec_setup, sec_result]     # step.0/1/2 + result
    scaffold: { motive: "From $\\sin,\\cos$, the quotient rule gives the other four." }
    source: "chapter3-print-standalone.html SS3.1 . Example 3.2 (tan', sec')"
    title: "All Six Derivatives"
    prompt: "Differentiate $\\tan x$ and $\\sec x$."
    say: |
      With sine and cosine in hand, the other four cost almost nothing -- just
      the quotient rule.
      {show step.0} Take $\tan x=\sin x$ over $\cos x$. The quotient rule gives
      this.
      {show step.1} The numerator is $\cos^2 x+\sin^2 x$, which is one -- so the
      derivative of $\tan x$ is $\sec^2 x$.
      {show step.2} Secant is the same idea on $1$ over $\cos x$: the quotient
      rule, with a constant on top, gives this.
      {show result} Clean it up, and secant's derivative is $\sec x\tan x$.
    steps:
      - { math: "\\frac{d}{dx}\\tan x = \\frac{(\\cos x)(\\cos x)-(\\sin x)(-\\sin x)}{\\cos^{2} x}", reason: "quotient rule on $\\tfrac{\\sin x}{\\cos x}$" }
      - { math: "= \\frac{\\cos^{2} x+\\sin^{2} x}{\\cos^{2} x} = \\frac{1}{\\cos^{2} x} = \\sec^{2} x", reason: "Pythagorean identity" }
      - { math: "\\frac{d}{dx}\\sec x = \\frac{0\\cdot\\cos x-1\\cdot(-\\sin x)}{\\cos^{2} x}", reason: "quotient rule on $\\tfrac{1}{\\cos x}$" }
    result: { math: "= \\frac{\\sin x}{\\cos^{2} x} = \\sec x\\tan x" }

  # 20b ------------------- Example 3.2 (part 2/2): cot' and csc' -- the same move
  - id: all_six_cot_csc
    kind: content
    template: derivation
    accent: example
    part: { current: 2, total: 2 }
    ref: md:all_six_trig_derivatives
    covers: [cot_setup, cot_result, csc_setup, csc_result]     # step.0/1/2 + result
    scaffold: { motive: "The same quotient rule finishes $\\cot x$ and $\\csc x$." }
    source: "chapter3-print-standalone.html SS3.1 . Example 3.2 (cot', csc')"
    title: "All Six Derivatives"
    prompt: "And the same rule on $\\cot x$ and $\\csc x$."
    say: |
      The last two run exactly the same way.
      {show step.0} Take $\cot x=\cos x$ over $\sin x$. The quotient rule gives
      this.
      {show step.1} The numerator is minus the quantity $\sin^2 x+\cos^2 x$,
      again one -- so $\cot x$ differentiates to $-\csc^2 x$.
      {show step.2} And $\csc x$ is $1$ over $\sin x$: the same rule lands this.
      {show result} Cleaned up, that is $-\csc x\cot x$ -- and all six are done,
      every one built on $\sin'=\cos$ and $\cos'=-\sin$.
    steps:
      - { math: "\\frac{d}{dx}\\cot x = \\frac{(-\\sin x)(\\sin x)-(\\cos x)(\\cos x)}{\\sin^{2} x}", reason: "quotient rule on $\\tfrac{\\cos x}{\\sin x}$" }
      - { math: "= \\frac{-(\\sin^{2} x+\\cos^{2} x)}{\\sin^{2} x} = -\\frac{1}{\\sin^{2} x} = -\\csc^{2} x", reason: "Pythagorean identity" }
      - { math: "\\frac{d}{dx}\\csc x = \\frac{0\\cdot\\sin x-1\\cdot\\cos x}{\\sin^{2} x}", reason: "quotient rule on $\\tfrac{1}{\\sin x}$" }
    result: { math: "= -\\frac{\\cos x}{\\sin^{2} x} = -\\csc x\\cot x" }

  # 21 ------------------------------- Example 3.3: simple harmonic motion (s'' = -s)
  - id: shm_compute
    kind: content
    template: derivation
    accent: example
    ref: md:shm_compute
    covers: [height, velocity, acceleration, shm]     # step.0/1/2 + result (all shown)
    scaffold: { motive: "Put the new derivatives to work: a weight on a spring." }
    source: "chapter3-print-standalone.html SS3.1 . Example 3.3 (simple harmonic motion)"
    title: "A Weight on a Spring"
    prompt: "A weight on a spring has height $s(t)=\\sin t$. Find the velocity $s'(t)$ and acceleration $s''(t)$, and relate the acceleration to the height."
    say: |
      Let us put the new derivatives to work on something moving.
      {show step.0} A weight on a spring has height $s(t)=\sin t$.
      {show step.1} Velocity is its derivative, $s'(t)=\cos t$.
      {show step.2} Acceleration is the next derivative, $s''(t)=-\sin t$.
      {show result} But $-\sin t$ is just $-s(t)$ -- at every instant the weight
      is pushed back toward rest. That relation, $s''=-s$, is the signature of
      simple harmonic motion; sine and cosine are exactly the functions that
      describe it.
    steps:
      - { math: "s(t) = \\sin t", reason: "height" }
      - { math: "s'(t) = \\cos t", reason: "velocity" }
      - { math: "s''(t) = -\\sin t", reason: "acceleration" }
    result: { math: "s''(t) = -\\sin t = -\\,s(t)", reason: "simple harmonic motion" }

