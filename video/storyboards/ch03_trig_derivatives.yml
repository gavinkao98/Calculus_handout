      {show tan_0} At $x=0$ it is climbing at slope one.
      {show tan_halfpi} At $x=\tfrac\pi2$, the top of the hump, the tangent is
      flat -- slope zero.
      {show tan_pi} At $x=\pi$ it is falling at slope minus one.
      {show plot.1} Now lay $y=\cos x$ on top,
      {show cos_dots} and read its heights at those same points: one, zero,
      minus one. They match exactly -- the slope of sine is the height of
      cosine, the theorem drawn.
