- id: uniqueness_statement_and_trap
  kind: content
  template: theorem_proof
  accent: theorem
  source: §1.6 proposition[Uniqueness] statement + contradiction setup (L1456-1466)
  title: Uniqueness of Limits
  say: 'The definition earns its keep immediately: it guarantees that a limit, once it exists, is unique. Why even worry? {show proof.0} Because nothing so far forbids two different numbers L and M from both passing the test -- so suppose, for contradiction, that they do. {show proof.1} Here is the clever move that breaks it: let epsilon be half the gap between them, epsilon equals the absolute value of L minus M, over two. Since L is not equal to M, this epsilon is strictly positive, so it is a perfectly legal tolerance we are allowed to feed the definition. We have set a trap; the next step springs it.

    '
  statement: If $\lim_{x\to a} f(x)$ exists, then it is unique.
  proof:
  - 'Suppose two values worked: $\lim_{x\to a} f(x) = L$ and $= M$, with $L \ne M$.'
  - Let $\varepsilon = \tfrac{|L-M|}{2}$. Since $L \ne M$, this $\varepsilon > 0$ -- a legal tolerance.
- id: uniqueness_proof_triangle
  kind: content
  template: theorem_proof
  accent: theorem
  source: §1.6 proof (L1474-1483)
  title: Why the Gap Must Vanish
  say: 'Now spring it. {show proof.0} Feed that epsilon to each limit: there is a delta sub one that makes f of x hug L, and a delta sub two that makes it hug M. {show proof.1} Take any x nearer to a than both -- closer than the smaller of delta sub one and delta sub two -- and both promises hold at once. {show proof.2} Now watch the gap collapse: the absolute value of L minus M rewrites as the absolute value of the quantity L minus f of x plus f of x minus M, which by the triangle inequality is at most the absolute value of L minus f of x, plus the absolute value of f of x minus M, and since each piece is below epsilon, the total is below two epsilon. {show qed} But two epsilon was defined to be exactly the absolute value of L minus M. We have forced the absolute value of L minus M to be strictly less than itself -- impossible. The only way out is that there was no gap at all: L equals M.

    '
  statement: With $\varepsilon = \tfrac{|L-M|}{2}$, both limits pin $f(x)$ close at once.
  proof:
  - 'Each limit gives a radius: $\delta_1$ for $L$, $\delta_2$ for $M$.'
  - For $0 < |x-a| < \min\{\delta_1, \delta_2\}$, both gaps are below $\varepsilon$.
  - Triangle inequality gives $|L-M| < 2\varepsilon = |L-M|$.
  qed: Strictly less than itself -- impossible; hence $L = M$.
- id: epsilon_delta_recipe
  kind: content
  template: procedure_steps
  accent: procedure
  source: §1.6 strategy[Verifying a limit from the ε-δ definition] (L1486-1494)
  title: 'Verifying a Limit: the Recipe'
  say: 'Every verification that follows runs on one recipe. {show math.0} Start from a generic epsilon greater than zero -- that is the challenge, and your job is to manufacture a delta. {show math.1} Take the quantity, the absolute value of f of x minus L, and bound it above by something times the absolute value of x minus a, because the absolute value of x minus a is the thing delta controls. {show math.2} Then choose delta to drive that bound below epsilon. One wrinkle decides the difficulty: if the bound still carries a stray factor depending on x, first pen x into a small interval around a to cap that factor, then take delta to be the minimum of that interval''s radius and your epsilon-based bound. {show math.3} The next two examples are exactly this recipe -- once without the wrinkle, once with it.

    '
  steps:
  - text: Start from a generic tolerance.
    math: \varepsilon > 0 \;\text{given}
  - text: Bound the gap by a multiple of the input distance.
    math: '|f(x)-L| \le K\,|x-a|'
  - text: Choose the radius; take a minimum if a stray factor appears.
    math: \delta = \min\{\,r,\; \varepsilon/K\,\}
  - text: Conclude the implication holds.
    math: 0<|x-a|<\delta \Rightarrow |f(x)-L|<\varepsilon
- id: verify_linear_limit
  kind: content
  template: example_walkthrough
  accent: example
  source: §1.6 workedexample lim(4x-5)=7 (L1496-1519)
  title: Verify $\lim_{x\to3}(4x-5)=7$
  say: 'Take the clean case first: show the limit of four x minus five as x approaches three equals seven. {show math.0} Given a tolerance epsilon, measure the gap: the absolute value of the quantity four x minus five, minus seven is the absolute value of four x minus twelve, which factors as four times the absolute value of x minus three. {show math.1} We want that under epsilon, so we demand the absolute value of x minus three is less than epsilon over four. {show math.2} That hands us the choice delta equals epsilon over four: whenever zero is less than the absolute value of x minus three, which is less than delta, the gap four times the absolute value of x minus three is below four times epsilon over four, exactly epsilon. {show takeaway} The function is linear, there is no stray factor, and delta falls straight out of the algebra.

    '
  steps:
  - text: Measure the gap.
    math: '|(4x-5)-7| = 4|x-3|'
    hot: true
  - text: Demand it below the tolerance.
    math: '|x-3| < \varepsilon/4'
  - text: This radius verifies it.
    math: \delta = \varepsilon/4
    mark: ok
  takeaway: Linear, no stray factor -- the radius falls straight out.
- id: verify_quadratic_limit
  kind: content
  template: example_walkthrough
  accent: example
  source: §1.6 workedexample lim(x^2-5x+6)=2 (L1521-1556)
  title: Verify $\lim_{x\to1}(x^2-5x+6)=2$
  say: 'Same goal, but now the algebra fights back: show the limit of x squared minus five x plus six as x approaches one equals two. {show math.0} The gap is the absolute value of x squared minus five x plus four, which factors as the absolute value of x minus one, times the absolute value of x minus four. {show math.1} The first factor is what delta controls, but the second drifts as x moves -- so cap it: insist first that the absolute value of x minus one is less than one, which traps x between zero and two and forces the absolute value of x minus four to be less than four. {show math.2} Now the gap is below four times the absolute value of x minus one, and to push that under epsilon we also need the absolute value of x minus one to be less than epsilon over four. {show math.3} So take delta equals the minimum of one and epsilon over four, and both demands hold together. {show takeaway} The minimum is not a trick; it is the recipe''s wrinkle, made concrete.

    '
  steps:
  - text: Factor the gap.
    math: '|x^2-5x+4| = |x-1|\,|x-4|'
    hot: true
  - text: 'Cap the stray factor: take $|x-1|<1$ first.'
    math: 0<x<2 \Rightarrow |x-4|<4
  - text: Force the rest under the tolerance.
    math: '|x-1| < \varepsilon/4'
  - text: Take the minimum of both.
    math: \delta = \min\{1,\; \varepsilon/4\}
    mark: ok
  takeaway: The minimum is the recipe's wrinkle, made concrete.
- id: precise_infinite_limit
  kind: content
  template: definition_math
  accent: definition
  source: §1.6 definition def:infinite-limit-precise + intuition (L1558-1579)
  title: When the Limit Is Infinite
  say: 'The same machine handles limits that run off to infinity. We met those informally a little earlier; now we can say them precisely. {show math.0} We write the limit of f of x as x approaches a equals infinity to mean: {show math.1} for every threshold M greater than zero, there is a delta greater than zero {show math.2} such that f of x is greater than M whenever zero is less than the absolute value of x minus a, which is less than delta. Notice the quantifier has only changed its target -- instead of trapping f near a value, we force it above any height you name. Pick M as large as you like, a hundred or a googol; once x is close enough to a, the function clears it. {show math.3} The negative infinity case is the mirror image: for every negative N, eventually f of x drops below it.

    '
  statement: The same challenge-response, with the target moved to any height.
  math:
  - $\displaystyle \lim_{x \to a} f(x) = \infty$
  - tex: $\forall\, M > 0 \quad \exists\, \delta > 0$
    anim: highlight
  - $f(x) > M \;\text{ whenever }\; 0 < |x - a| < \delta$
  - $(-\infty):\;\; \forall\, N < 0,\;\; f(x) < N$
- id: continuity_preview
  kind: content
  template: definition_math
  accent: warning
  source: §1.6 continuity prose (L1581-1586)
  title: 'A Glimpse Ahead: Continuity'
  say: 'Before we gather up, the precise definition quietly hands us one more idea. Suppose f is defined not just near a but at a as well, and suppose the limit equals the actual value: {show math.0} the limit of f of x as x approaches a equals f of a. {show math.1} When that happens, we say f is continuous at a. Look back at our broken function -- its limit was five but its value was six, so it failed exactly this test; continuity is the case where the approach and the destination finally agree. A full study of continuity comes later; we name it here only because the limit language expresses it so directly.

    '
  statement: When the limit equals the actual value, the function is continuous there.
  math:
  - $\displaystyle \lim_{x \to a} f(x) = f(a)$
  - tex: $f \text{ is continuous at } a$
    anim: highlight
