- id: why_close_is_not_enough
  kind: content
  template: definition_math
  accent: definition
  source: §1.6 opener prose (L1334-1337)
  title: From Informal to Precise
  say: 'For two centuries calculus solved real problems -- orbits, areas, the motion of the planets -- while its logical foundations stayed shaky. {show math.0} The arguments leaned on infinitesimals, quantities imagined as vanishingly small but never pinned down, and on vague phrases like "x is close to a" and "f of x is close to L." But how close is close? {show math.1} The nineteenth century answered by throwing the word "close" out entirely and replacing it with a measurable distance. That single move is the whole project of this section: make "close" precise enough to compute with.

    '
  statement: For two centuries, close was left undefined. We replace it with a measurable distance.
  math:
  - 'informal: $f(x)$ is close to $L$'
  - tex: 'precise: $|f(x) - L| < \varepsilon$'
    anim: highlight
- id: the_broken_function
  kind: content
  template: graph_focus
  accent: example
  source: §1.6 motivating function prose (L1339-1347)
  title: A Deliberately Broken Function
  say: 'Here is a deliberately broken function to sharpen the question. Let f of x equal two x minus one everywhere except at x equals three, where we force the value to be six. As x moves close to three, the output two x minus one moves close to five -- so we expect the limit to be five, even though the function''s actual value there is six. {show annotation.0} The limit watches how f behaves on the approach, not where it lands at the point itself. But "close to five" is the very phrase we promised to make precise, so let us ask the sharp question: how close can we force f of x to be?

    '
