- id: tolerance_game_point_one
  kind: content
  template: example_walkthrough
  accent: example
  source: §1.6 workedexample, tolerance 0.1 (L1349-1363)
  title: A Tolerance, Made Precise
  say: 'Let us play it as a game with a number attached. {show math.0} Suppose someone demands that f of x land within zero point one of five -- can we deliver? {show math.1} Measure the gap: the absolute value of f of x minus five equals the absolute value of the quantity two x minus one, minus five, which is the absolute value of two x minus six, which is two times the absolute value of x minus three. {show math.2} So the demand that two times the absolute value of x minus three is less than zero point one is just the absolute value of x minus three is less than zero point zero five. {show takeaway} Keep x within zero point zero five of three, and f of x is guaranteed within zero point one of five -- a precise promise, answered with a precise radius.

    '
  steps:
  - text: Demand $f(x)$ within $0.1$ of $5$.
    math: '|f(x)-5| < 0.1'
  - text: The gap simplifies.
    math: '|f(x)-5| = 2|x-3|'
    hot: true
  - text: A radius of $0.05$ delivers it.
    math: '|x-3| < 0.05'
    mark: ok
  takeaway: A precise demand earns a precise radius.
- id: every_tolerance_at_once
  kind: content
  template: definition_math
  accent: definition
  source: §1.6 generalization prose (L1365)
  title: Every Tolerance at Once
  say: 'One answered demand is not enough, though. {show math.0} Tighten the tolerance to zero point zero one and the very same algebra returns the absolute value of x minus three is less than zero point zero zero five; halve the tolerance and the radius halves with it. {show math.1} The pattern is mechanical: for any tolerance epsilon greater than zero, we get the absolute value of f of x minus five is less than epsilon whenever the absolute value of x minus three is less than epsilon over two, so the choice delta equals epsilon over two always works. This is what "arbitrarily close" really means -- not close for one lucky tolerance, but answerable for every epsilon greater than zero. That little phrase "for every epsilon" is the engine of the definition we are about to write down.

    '
  statement: Arbitrarily close means the demand can be met for every positive tolerance, not just a chosen few.
  math:
  - $0.01 \;\Rightarrow\; |x-3| < 0.005$
  - tex: $\varepsilon \;\Rightarrow\; |x-3| < \tfrac{\varepsilon}{2}, \quad \delta = \tfrac{\varepsilon}{2}$
    anim: highlight
- id: precise_limit_definition
  kind: content
  template: definition_math
  accent: definition
  source: §1.6 definition def:limit-precise (L1367-1376)
  title: The Precise Definition
  say: 'Now we can state it cleanly. {show math.0} Let f be defined on an open interval around a, except possibly at a itself. We say the limit of f of x as x approaches a equals L {show math.1} if for every epsilon greater than zero there exists a delta greater than zero {show math.2} such that the absolute value of f of x minus L is less than epsilon whenever zero is less than the absolute value of x minus a, which is less than delta. Read it as a challenge and a response: you name any tolerance epsilon, however cruelly small, and I must produce a radius delta that keeps every nearby f of x inside it. If I can always answer, the limit is L.

    '
  statement: For every tolerance around $L$, some radius around $a$ must guarantee it.
  math:
  - $\displaystyle \lim_{x \to a} f(x) = L$
  - tex: $\forall\, \varepsilon > 0 \quad \exists\, \delta > 0$
    anim: highlight
  - $|f(x) - L| < \varepsilon \;\text{ whenever }\; 0 < |x - a| < \delta$
