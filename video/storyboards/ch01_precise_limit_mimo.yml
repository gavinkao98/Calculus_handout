  title: Section 1.6 -- Recap
  say: 'Let us gather the thread. {show point.0} The vague word "close" became a precise contract: for every epsilon greater than zero there is a delta greater than zero so that, {show formula.0} whenever zero is less than the absolute value of x minus a, which is less than delta, {show formula.1} the output obeys the absolute value of f of x minus L is less than epsilon. {show point.1} The picture to keep is the strip and the interval -- inputs within delta of a are carried into the band within epsilon of L, and delta always answers to epsilon. {show point.2} The first payoff was uniqueness: a limit, once it exists, cannot be two numbers. {show point.3} And to verify a limit by hand, bound the absolute value of f of x minus L by a multiple of the absolute value of x minus a, choose delta, and take a minimum when a stray factor needs taming. Every informal limit we computed in the earlier sections now stands on this one definition.

