  scaffold:
    motive: Turn $\sin\theta\to 0$ into full continuity, everywhere.
  source: chapter3-print-standalone.html SS3.1 . Proposition 3.1 . Proof (sum-to-product bound + squeeze)
  title: Sine and Cosine Are Continuous
  say: '{show statement} Now turn that seed into full continuity. Fix a point

    x sub zero, and ask how much cosine x and sine x can change as x moves

    toward it.

    {show proof.0} Sum-to-product answers both at once. For cosine, cosine x

    minus cosine x sub zero is negative two sine of the quantity x minus x sub

    zero, over two, times sine of the quantity x plus x sub zero, over two;

    {show proof.1} and for sine, sine x minus sine x sub zero is two cosine of

    the quantity x plus x sub zero, over two, times sine of the quantity x

    minus x sub zero, over two. In each, the half-sum factor never exceeds one

    in size.

    {show proof.2} Drop it to its largest size, one, and both differences are

    bounded by the same thing -- twice the absolute value of sine of the

    quantity x minus x sub zero, over two.

    {show qed} Now let x go to x sub zero: the half-angle goes to zero, so that

    bound collapses to zero. Squeeze one last time, and cosine x goes to cosine

    x sub zero, sine x goes to sine x sub zero -- both continuous everywhere.

    '
  statement: 'Fix $x_0$: how far can $\cos x,\ \sin x$ move?'
  proof:
  - $\cos x-\cos x_0=-2\sin\frac{x-x_0}{2}\,\sin\frac{x+x_0}{2}$
  - $\sin x-\sin x_0=\phantom{-}2\cos\frac{x+x_0}{2}\,\sin\frac{x-x_0}{2}$
  - $|\cos x-\cos x_0|,\ |\sin x-\sin x_0|\le 2|\sin\frac{x-x_0}{2}|$
  qed: $x\to x_0\ \Rightarrow\ \cos x\to\cos x_0,\ \sin x\to\sin x_0$
