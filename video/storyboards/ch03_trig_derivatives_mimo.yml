- id: why_trig_is_different
  kind: content
  template: definition_math
  accent: definition
  scene_role: motivation
  ref: md:why_trig_is_different
  scaffold:
    flag: radians
  source: chapter3-print-standalone.html SS3.1 . opening prose (funnels to sin/theta over theta)
  title: A Limit No Algebra Can Crack
  say: 'Every derivative so far has yielded to algebra. For a polynomial we

    expanded the quantity x plus h, to the n, and the binomial theorem handed

    us a factor of h to cancel; for e to the x the power series did the same

    job. The trigonometric functions refuse to play along.

    {show math.0} Write down the difference quotient for sine x and try the

    usual move. You cannot simply set h equal to zero: that gives zero over

    zero, which tells you nothing. And no identity cancels the h in the

    denominator -- sine of the quantity x plus h simply does not break into

    pieces that conveniently subtract.

    {show math.1} As we are about to see, the whole computation funnels down

    to a single limit, the limit of sine theta over theta -- again the

    indeterminate form zero over zero, and one that no algebra will crack.

    {show statement} Prying it open takes a genuinely new tool: a geometric

    comparison of areas on the unit circle. And once we secure that one limit,

    it unlocks the derivatives of both sine and cosine at once. One ground

    rule, though: throughout, angles are measured in radians -- an assumption

    that turns out to be essential.

    '
  statement: Every trigonometric derivative funnels down to a single limit.
  math:
  - $\dfrac{\sin(x+h)-\sin x}{h}\ \xrightarrow{\ h=0\ }\ \dfrac{0}{0}\quad(\text{indeterminate})$
  - tex: $\lim_{\theta\to 0}\dfrac{\sin\theta}{\theta}\quad\left(\tfrac{0}{0},\ \text{no algebra}\right)$
    anim: highlight
- id: difference_quotient_for_sine
  kind: content
  template: derivation
  accent: definition
  kicker: derivation
  ref: md:difference_quotient_for_sine
  covers:
  - identity
  - substitute
  - divide
  - factors
  scaffold:
    motive: Sum-to-product turns the difference of sines into a product.
  source: chapter3-print-standalone.html SS3.1 . The difference quotient for sine (sum-to-product)
  title: The Difference Quotient for Sine
  say: 'So let us transform that difference quotient instead of fighting it

    head-on. The decisive step is one trigonometric identity -- sum-to-product

    -- which turns a difference of sines into a product.

    {show step.0} Here it is; and a product is exactly what we want, because

    we can pull it apart and take limits one factor at a time.

    {show step.1} Put A equals x plus h and B equals x, and the numerator

    becomes two cosine of the quantity x plus one half h, times sine of h over

    two.

    {show step.2} Now divide by h -- and here is the small trick that makes

    everything line up: write h as two times h over two, so the denominator

    carries the very h over two inside the sine. The quotient cleans up to

    cosine of the quantity x plus one half h, times sine of h over two, all

    over h over two.

    {show result} Look at what we have: a product of two factors. The first

    slides to cosine x, provided cosine is continuous; the second is exactly

    sine theta over theta with theta equals h over two. So the whole derivative

    hangs on just two facts -- continuity, and that fundamental limit. We

    secure both now.

    '
  steps:
  - math: \sin A-\sin B = 2\cos\frac{A+B}{2}\,\sin\frac{A-B}{2}
    reason: sum-to-product
  - math: \sin(x+h)-\sin x = 2\cos\!\left(x+\frac h2\right)\sin\frac h2
    reason: $A=x+h,\ B=x$
  - math: \frac{\sin(x+h)-\sin x}{h} = \cos\!\left(x+\frac h2\right)\cdot\frac{\sin(h/2)}{h/2}
    reason: write $h=2\cdot\tfrac h2$
  result:
    math: \cos\!\left(x+\frac h2\right)\to\cos x\quad\text{and}\quad \frac{\sin(h/2)}{h/2}\to 1
    reason: continuity + the limit
