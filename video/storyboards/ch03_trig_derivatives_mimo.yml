- id: companion_limit
  kind: content
  template: derivation
  accent: example
  ref: md:companion_limit
  covers:
  - conjugate
  - split
  - evaluate
  scaffold:
    motive: 'Bank a companion limit: $(1-\cos\theta)/\theta\to 0$.'
  source: chapter3-print-standalone.html SS3.1 . Example 3.1 (companion limit)
  title: A Companion Limit
  prompt: Establish the companion limit $(1-\cos\theta)/\theta \to 0$ as $\theta \to 0$.
  say: 'The fundamental limit has a companion worth knowing: the quantity one minus

    cosine theta, over theta tends to zero. It is again zero over zero, so we

    need a way in.

    {show step.0} Multiply top and bottom by the conjugate one plus cosine

    theta; the numerator becomes a difference of squares, one minus cosine

    squared theta.

    {show step.1} And one minus cosine squared theta is just sine squared

    theta, so the whole thing splits into sine theta over theta times sine

    theta over the quantity one plus cosine theta.

    {show result} Let theta go to zero: the first factor goes to one, the

    second to zero over two. One times zero is zero.

    '
  steps:
  - math: \frac{1-\cos\theta}{\theta} = \frac{(1-\cos\theta)(1+\cos\theta)}{\theta\,(1+\cos\theta)} = \frac{1-\cos^{2}\theta}{\theta\,(1+\cos\theta)}
    reason: multiply by $1+\cos\theta$
  - math: = \frac{\sin^{2}\theta}{\theta\,(1+\cos\theta)} = \frac{\sin\theta}{\theta}\cdot\frac{\sin\theta}{1+\cos\theta}
    reason: $1-\cos^{2}\theta=\sin^{2}\theta$
  result:
    math: \longrightarrow\ 1\cdot\frac{0}{1+1} = 0
    reason: the limit, then continuity
- id: all_six_tan_sec
  kind: content
  template: derivation
  accent: example
  part:
    current: 1
    total: 2
  ref: md:all_six_trig_derivatives
  covers:
  - tan_quotient
  - tan_result
  - sec_setup
  - sec_result
  scaffold:
    motive: From $\sin,\cos$, the quotient rule gives the other four.
  source: chapter3-print-standalone.html SS3.1 . Example 3.2 (tan', sec')
  title: All Six Derivatives
  prompt: Differentiate $\tan x$ and $\sec x$.
  say: 'With sine and cosine in hand, the other four cost almost nothing -- just

    the quotient rule.

    {show step.0} Take tangent x equals sine x over cosine x. The quotient rule

    gives this.

    {show step.1} The numerator is cosine squared x plus sine squared x, which

    is one -- so the derivative of tangent x is secant squared x.

    {show step.2} Secant is the same idea on one over cosine x: the quotient

    rule, with a constant on top, gives this.

    {show result} Clean it up, and secant''s derivative is secant x tangent x.

    '
  steps:
  - math: \frac{d}{dx}\tan x = \frac{(\cos x)(\cos x)-(\sin x)(-\sin x)}{\cos^{2} x}
    reason: quotient rule on $\tfrac{\sin x}{\cos x}$ ($\cos x\neq 0$)
  - math: = \frac{\cos^{2} x+\sin^{2} x}{\cos^{2} x} = \frac{1}{\cos^{2} x} = \sec^{2} x
    reason: Pythagorean identity
  - math: \frac{d}{dx}\sec x = \frac{0\cdot\cos x-1\cdot(-\sin x)}{\cos^{2} x}
    reason: quotient rule on $\tfrac{1}{\cos x}$
  result:
    math: = \frac{\sin x}{\cos^{2} x} = \sec x\tan x
- id: all_six_cot_csc
  kind: content
  template: derivation
  accent: example
  part:
    current: 2
    total: 2
  ref: md:all_six_trig_derivatives
  covers:
  - cot_setup
  - cot_result
  - csc_setup
  - csc_result
  scaffold:
    motive: The same quotient rule finishes $\cot x$ and $\csc x$.
  source: chapter3-print-standalone.html SS3.1 . Example 3.2 (cot', csc')
  title: All Six Derivatives
  prompt: And the same rule on $\cot x$ and $\csc x$.
  say: 'The last two run exactly the same way.

    {show step.0} Take cotangent x equals cosine x over sine x. The quotient

    rule gives this.

    {show step.1} The numerator is minus the quantity sine squared x plus

    cosine squared x, again one -- so cotangent x differentiates to negative

    cosecant squared x.

    {show step.2} And cosecant x is one over sine x: the same rule lands this.

    {show result} Cleaned up, that is negative cosecant x cotangent x -- and

    all six are done, every one built on sine prime equals cosine and cosine

    prime equals negative sine.

    '
  steps:
  - math: \frac{d}{dx}\cot x = \frac{(-\sin x)(\sin x)-(\cos x)(\cos x)}{\sin^{2} x}
    reason: quotient rule on $\tfrac{\cos x}{\sin x}$ ($\sin x\neq 0$)
  - math: = \frac{-(\sin^{2} x+\cos^{2} x)}{\sin^{2} x} = -\frac{1}{\sin^{2} x} = -\csc^{2} x
    reason: Pythagorean identity
  - math: \frac{d}{dx}\csc x = \frac{0\cdot\sin x-1\cdot\cos x}{\sin^{2} x}
    reason: quotient rule on $\tfrac{1}{\sin x}$
  result:
    math: = -\frac{\cos x}{\sin^{2} x} = -\csc x\cot x
- id: shm_compute
  kind: content
  template: derivation
  accent: example
  ref: md:shm_compute
  covers:
  - height
  - velocity
  - acceleration
  - shm
  scaffold:
    motive: 'Put the new derivatives to work: a weight on a spring.'
  source: chapter3-print-standalone.html SS3.1 . Example 3.3 (simple harmonic motion)
  title: A Weight on a Spring
  prompt: A weight on a spring has height $s(t)=\sin t$. Find the velocity $s'(t)$ and acceleration $s''(t)$, and relate the acceleration to the height.
  say: 'Let us put the new derivatives to work on something moving.

    {show step.0} A weight on a spring has height s of t equals sine t.

    {show step.1} Velocity is its derivative, s prime of t equals cosine t.

    {show step.2} Acceleration is the next derivative, s double prime of t

    equals negative sine t.

    {show result} But negative sine t is just negative s of t -- at every

    instant the weight is pushed back toward rest. That relation, s double

    prime equals negative s, is the signature of simple harmonic motion; sine

    and cosine are exactly the functions that describe it.

    '
  steps:
  - math: s(t) = \sin t
    reason: height
  - math: s'(t) = \cos t
    reason: velocity
  - math: s''(t) = -\sin t
    reason: acceleration
  result:
    math: s''(t) = -\sin t = -\,s(t)
    reason: simple harmonic motion
