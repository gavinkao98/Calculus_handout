  hook: animations.ch03_trig_derivatives_hooks:sector_inequality
  source: chapter3-print-standalone.html SS3.1 . Figure 3.1 (sector-inequality) + area prose
  title: A Squeeze on the Unit Circle
  say: 'Here is that new tool. We compare three areas on a circle of radius one.

    But first, one convenience that saves us half the work. Replacing theta by

    negative theta flips the sign of both theta and sine theta, so the ratio

    sine theta over theta is even -- whatever we learn for positive angles

    holds for negative ones, so it is enough to chase theta down to zero from

    the positive side. Now the geometry. On the unit circle, A is at the point

    with coordinates one and zero, B is the point at angle theta, and extending

    the radius to the tangent at A gives C equals the point with coordinates

    one and tangent theta.

    {show tri_inner} The inner triangle O A B has base one and height sine

    theta, so its area is one half sine theta.

    {show sector} The sector O A B is the fraction theta over two pi of the

    disc -- area one half theta.

    {show tri_outer} And the outer triangle O A C has height tangent theta, so

    its area is one half tangent theta.

    {show ineq} Each region sits inside the next, so the areas line up in

    order: one half sine theta, then one half theta, then one half tangent

    theta. The whole argument hangs on that one picture.

    '
  axes:
    x_range:
    - -0.45
    - 1.4
    - 1
    y_range:
    - -0.35
    - 1.65
    - 1
    x_length: 5.4
