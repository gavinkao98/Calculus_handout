- id: derivative_of_sine
  kind: content
  template: theorem_proof
  accent: theorem
  ref: md:derivative_of_sine
  covers:
  - def
  - reduced
  - limits
  - qed
  scaffold:
    motive: Cash in continuity and the limit — sine's derivative falls out.
  source: chapter3-print-standalone.html SS3.1 . Theorem 3.1 + Proof
  title: The Derivative of Sine
  say: 'Now the payoff, and it falls into our hands.

    {show statement} The claim: the derivative of sine x is cosine x, for every

    real x.

    {show proof.0} Start from the definition -- the derivative is the limit of

    the difference quotient.

    {show proof.1} But we already did the hard algebra: that quotient is cosine

    of the quantity x plus one half h, times sine of h over two, all over h

    over two.

    {show proof.2} Let h go to zero: the first factor tends to cosine x by

    continuity, the second to one by the fundamental limit.

    {show qed} A continuous thing times a limit -- the product is cosine x

    times one, just cosine x.

    '
  statement: $\frac{d}{dx}\sin x = \cos x$
  proof:
  - $\frac{d}{dx}\sin x=\lim_{h\to 0}\frac{\sin(x+h)-\sin x}{h}$
  - $=\lim_{h\to 0}\cos\!\left(x+\frac h2\right)\frac{\sin(h/2)}{h/2}$
  - $\cos\!\left(x+\frac h2\right)\to\cos x,\quad \frac{\sin(h/2)}{h/2}\to 1$
  qed: $\Rightarrow\ \cos x\cdot 1=\cos x$
- id: derivative_of_cosine
  kind: content
  template: theorem_proof
  accent: theorem
  ref: md:derivative_of_cosine
  covers:
  - companion_identity
  - divide
  - limits
  - qed
  scaffold:
    motive: Same machinery, companion identity — now cosine.
  source: chapter3-print-standalone.html SS3.1 . Theorem 3.2 + Proof
  title: The Derivative of Cosine
  say: 'Cosine falls to the very same machinery -- only the identity changes, so we

    go quickly.

    {show statement} The claim: the derivative of cosine x is negative sine x.

    {show proof.0} This time use the companion sum-to-product formula.

    {show proof.1} The same division by h turns the difference quotient into

    negative sine of the quantity x plus one half h, times sine of h over two,

    all over h over two.

    {show proof.2} Send h to zero: the sine factor tends to sine x by

    continuity, the second to one by the fundamental limit.

    {show qed} The leading minus sign comes along -- leaving negative sine x.

    Same two tools, one extra minus sign.

    '
  statement: $\frac{d}{dx}\cos x = -\sin x$
  proof:
  - $\cos A-\cos B=-2\sin\frac{A+B}{2}\,\sin\frac{A-B}{2}$
  - $\frac{\cos(x+h)-\cos x}{h}=-\sin\!\left(x+\frac h2\right)\frac{\sin(h/2)}{h/2}$
  - $-\sin\!\left(x+\frac h2\right)\to-\sin x,\quad \frac{\sin(h/2)}{h/2}\to 1$
  qed: $\Rightarrow\ -\sin x\cdot 1=-\sin x$
