- id: derivative_cycle
  kind: content
  template: definition_math
  accent: remark
  hook: animations.ch03_trig_derivatives_hooks:derivative_cycle
  scene_role: remark
  ref: md:derivative_cycle
  scaffold:
    motive: 'Step back: what pattern do these two derivatives make together?'
  source: chapter3-print-standalone.html SS3.1 . Remark 3.1 (derivative cycle)
  title: The Derivative Cycle
  say: 'Step back and watch the pattern these two derivatives make.

    {show statement} Differentiation sends sine and cosine into each other,

    with a minus sign that turns over every second step.

    {show math.0} Writing an arrow for one derivative: sine x to cosine x to

    negative sine x to negative cosine x, and back to sine x.

    {show math.1} Four derivatives and you are home -- the fourth derivative of

    sine is sine again. Where e to the x reproduces itself in a single step,

    these do it in a cycle of four: the self-renewal that lets them oscillate

    forever without winding down.

    '
  statement: Differentiation cycles sine and cosine, with a sign flip every second step.
  math:
  - tex: $\sin x \;\to\; \cos x \;\to\; -\sin x \;\to\; -\cos x \;\to\; \sin x$
    anim: highlight
  - $\dfrac{d^{4}}{dx^{4}}\sin x = \sin x \qquad\text{vs.}\qquad \dfrac{d}{dx}e^{x}=e^{x}$
