- id: toward_the_chain_rule
  kind: content
  template: definition_math
  accent: definition
  hook: animations.ch03_trig_derivatives_hooks:toward_the_chain_rule
  scene_role: forward-ref
  ref: md:toward_the_chain_rule
  scaffold:
    motive: We can do bare trig functions -- but not yet composed ones.
  source: chapter3-print-standalone.html SS3.1 . closing prose (forward-ref to the chain rule)
  title: Toward the Chain Rule
  say: 'We can now differentiate every trigonometric function -- but only in its

    bare form.

    {show statement} We can handle sine x, yet not sine of x squared or sine of

    the quantity three x plus one, where the angle is itself a function tucked

    inside.

    {show math.0} To reach a function buried inside another, we need one more

    rule -- a way to differentiate a composition. That is the chain rule, and

    it is what comes next; with it, every derivative we found today becomes the

    seed of a whole family more.

    '
  statement: We can differentiate $\sin x$ --- but not yet $\sin(x^{2})$ or $\sin(3x+1)$.
  math:
  - tex: $\sin x\ \checkmark \qquad \sin(x^{2})\ ? \qquad \sin(3x+1)\ ?$
    anim: highlight
- id: recap
  kind: content
