  title: Height, Velocity, Acceleration
  say: 'Stack the three graphs over one time axis and the relationship jumps out.

    {show g_s} On top, the height s equals sine t.

    {show g_v} In the middle, the velocity s prime equals cosine t.

    {show g_a} On the bottom, the acceleration s double prime equals negative

    sine t. Watch where the height hits a peak or a trough -- there the

    velocity passes through zero, because at the extremes the weight

    momentarily stops.

    {show mirror} And hold the bottom graph against the top: it is the top one

    flipped upside down. That is s double prime equals negative s, drawn -- the

    very picture of an oscillation.

