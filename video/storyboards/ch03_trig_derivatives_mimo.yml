  scaffold:
    motive: Turn the chain of areas into bounds on $\sin\theta/\theta$.
  source: chapter3-print-standalone.html SS3.1 . algebra after Figure 3.1 (inequality 1)
  title: Trapping the Ratio
  say: 'Now turn that chain of areas into a statement about sine theta over theta,

    one careful step at a time.

    {show step.0} Multiply through by two to clear the halves: sine theta at

    most theta at most tangent theta.

    {show step.1} Divide every part by sine theta, positive here, and rewrite

    tangent theta as sine theta over cosine theta -- giving one at most theta

    over sine theta at most one over cosine theta.

    {show result} The middle is upside down, so take reciprocals of all three.

    They are positive, and flipping positives reverses the inequalities, so the

    chain turns around: cosine theta at most sine theta over theta at most one,

    for theta between zero and pi over two.

    {show check} And pocket one more consequence: from sine theta at most theta

    we also get zero at most the absolute value of sine theta at most the

    absolute value of theta near zero -- a bound we lean on twice in a moment.

    '
  steps:
  - math: \sin\theta \;\le\; \theta \;\le\; \tan\theta
    reason: multiply areas by $2$
  - math: 1 \;\le\; \frac{\theta}{\sin\theta} \;\le\; \frac{1}{\cos\theta}
    reason: $\div\sin\theta$, $\tan=\tfrac{\sin}{\cos}$
  result:
    math: \cos\theta \;\le\; \frac{\sin\theta}{\theta} \;\le\; 1 \qquad (0<\theta<\frac{\pi}{2})
    reason: reciprocate -- reverses
  check:
    math: 0 \;\le\; \lvert\sin\theta\rvert \;\le\; \lvert\theta\rvert
    reason: kept for later
