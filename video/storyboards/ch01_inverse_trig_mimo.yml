- id: branch_conventions
  kind: content
  template: example_walkthrough
  accent: example
  source: 內容稿 u16 branch_conventions
  title: A Branch Is a Choice
  say: 'There is a subtlety hiding in those last three definitions: the branch we pick is a choice, not a law, and different texts choose differently. This text picks the branches that make the later differentiation formulas come out simplest, but you will meet other conventions in the wild — and the choice has visible consequences. Consider f of x equals arcsine of x plus arccosecant of x. {show math.0} Arcsine needs the absolute value of x to be at most one while arccosecant needs the absolute value of x to be at least one, so the only inputs satisfying both are x equals one and x equals negative one. {show math.1} At x equals one, both terms equal pi over two, so f of one equals pi. {show math.2} At x equals negative one, under this text''s convention arccosecant of negative one equals three pi over two, and with arcsine of negative one equals negative pi over two we again get f of negative one equals pi — so f is the constant pi on its two-point domain. {show math.3} But under a different common convention, arccosecant of negative one would be negative pi over two, which makes f of negative one equals negative pi instead. {show takeaway} Same expression, different answer — which is exactly why a text fixes its conventions explicitly, and why you should always check the one in front of you.

    '
  steps:
  - text: 'Both terms restrict the domain: $|x|\le 1$ and $|x|\ge 1$.'
    math: \operatorname{dom} f = \{-1,\ 1\}
  - text: At $x=1$, both terms are $\tfrac{\pi}{2}$.
    math: f(1)=\tfrac{\pi}{2}+\tfrac{\pi}{2}=\pi
  - text: At $x=-1$, this text's convention $\arccsc(-1)=\tfrac{3\pi}{2}$.
    math: f(-1)=-\tfrac{\pi}{2}+\tfrac{3\pi}{2}=\pi
  - text: A different convention $\arccsc(-1)=-\tfrac{\pi}{2}$ flips it.
    math: f(-1)=-\pi
  takeaway: Same expression, different convention, different answer.
  takeaway_tone: warn
