  title: The Inverse Tangent
  say: 'Tangent is the third we invert, and it brings a new twist. We restrict it to the open interval from negative pi over two to pi over two, where it climbs without ever repeating — but unlike sine and cosine, tangent shoots off toward infinity at the ends, so it takes every real value. {show math.0} That flips the domain story: arctangent of x equals y means the tangent of y equals x with y strictly between negative pi over two and pi over two, and its domain is all real numbers — any ratio at all has an angle. {show math.1} Its range is the open interval from negative pi over two to pi over two, which it approaches but never reaches. {show math.2} The identities follow the usual pattern: the tangent of arctangent of x equals x for every real x, and arctangent of the tangent of x equals x on the open restricted interval. So arctangent takes the entire number line and gently squeezes it into a band less than half a turn wide.

    '
