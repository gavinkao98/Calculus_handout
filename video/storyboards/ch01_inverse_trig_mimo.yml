- id: signs_from_range
  kind: content
  template: example_walkthrough
  accent: example
  source: 內容稿 u13 signs_from_range
  title: Signs Come From the Range
  say: 'When the inputs go negative, signs are where people slip — but the range of the inverse function settles every sign for you. Start with the sine of arccosine of negative one half. {show math.0} Since arccosine always lands in the interval from zero to pi, a negative input forces the angle into the second quadrant: arccosine of negative one half equals two pi over three, and its sine is the square root of three, divided by two. {show math.1} The same triangle method handles secant of arctangent of ten: opposite ten, adjacent one, hypotenuse the square root of one hundred one, so the secant is the square root of one hundred one. {show math.2} Now the delicate one: the tangent of arcsine of negative the quantity two times the square root of five, all over five. Here arcsine of a negative number lands in the fourth quadrant, where cosine is positive — so the cosine of theta equals one over the square root of five and the tangent of theta equals negative two. {show takeaway} Notice we never guessed a sign: each one came straight from the range of the inverse function.

    '
