  source: 內容稿 u10 domain_of_composition
  title: Domains of Compositions
  say: 'When inverse trig functions get composed with ordinary ones, the interesting question is often the domain. Take f of x equals arcsine of the cosine of x. Whatever x is, the cosine of x always lands in the interval from negative one to one — and the interval from negative one to one is exactly what arcsine accepts. {show math.0} So every real number is allowed: the domain of f is all real numbers. Now flip the order: h of x equals the sine of arccosine of x. Here the inner function arccosine demands an input in the interval from negative one to one, and its output is an angle, which sine is happy to take. {show math.1} So the domain of h is the interval from negative one to one. {show takeaway} The rule worth keeping: the domain of a composition is set by what the inner function accepts and whether its outputs are legal for the outer one.

