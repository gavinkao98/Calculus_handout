  title: The Inverse Sine
  say: 'Now we can name the inverse. The inverse sine function, written arcsine of x, takes a number between negative one and one and returns the angle on our restricted branch whose sine is that number. {show math.0} Stated precisely: arcsine of x equals y means exactly that the sine of y equals x and y lies in the interval from negative pi over two to pi over two. {show math.1} So its domain is the interval from negative one to one — the only ratios a sine can produce — and its range is that restricted interval of angles. {show math.2} One warning about notation: arcsine of x is often written sine to the minus one of x, but that superscript minus one does not mean a reciprocal. Sine to the minus one of x is an angle; one over the sine of x is a number. Whenever a source writes sine to the minus one, read the context to see which one is meant.

    '
