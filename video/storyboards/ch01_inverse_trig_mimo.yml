  title: Evaluating $\arcsin$
  say: 'Let us evaluate two expressions. First, arcsine of one half: we want the angle in the interval from negative pi over two to pi over two whose sine is one half. {show math.0} That is pi over six, so arcsine of one half equals pi over six. The second is more telling: the tangent of arcsine of one third. We are not asked for the angle itself, only for its tangent — so let us draw a right triangle. {show math.1} Call the angle theta, with the sine of theta equal to one third; that puts the side opposite theta at one and the hypotenuse at three. {show math.2} By the Pythagorean theorem the adjacent side is the square root of the quantity nine minus one, which equals two times the square root of two. {show math.3} Now tangent is opposite over adjacent, so the tangent of arcsine of one third equals one divided by the quantity two times the square root of two. {show takeaway} That triangle move — turn the inverse trig value into a labelled right triangle, then read off whatever ratio you need — is the workhorse of this whole section.

    '
