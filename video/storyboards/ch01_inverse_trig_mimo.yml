  source: 內容稿 u6 arcsin_identities
  title: Composition Identities for $\arcsin$
  say: 'Because arcsine undoes the restricted sine, the two compose back to give the input — but watch the fine print on where each holds. {show math.0} One way, the sine of arcsine of x equals x for every x in the interval from negative one to one: take a ratio, find its angle, take the sine, and you are back to the ratio. {show math.1} The other way, arcsine of the sine of x equals x — but only when x already lives in the restricted range from negative pi over two to pi over two. That asymmetry between the two is not a slip of the pen, and the next case shows exactly why it is there.

    '
