  title: Simplifying $\cos(\arctan x)$
  say: 'The triangle method really shines when the input is a variable instead of a number. Let us simplify the cosine of arctangent of x for any x. {show math.0} Set y equals arctangent of x, so the tangent of y equals x with y in the open interval from negative pi over two to pi over two. {show math.1} One route is the Pythagorean identity one plus tangent squared y equals secant squared y, which gives secant squared y equals one plus x squared; since y is in that interval, cosine is positive, so secant y equals the square root of the quantity one plus x squared and the cosine of y equals one over the square root of the quantity one plus x squared. The triangle says the same thing at a glance: opposite side x, adjacent side one, hypotenuse the square root of the quantity one plus x squared, and cosine is adjacent over hypotenuse. {show math.2} Either way, the cosine of arctangent of x equals one over the square root of the quantity one plus x squared — {show takeaway} a messy composition collapsing to one clean expression in x, the kind of simplification you will reach for constantly once derivatives enter the picture.

