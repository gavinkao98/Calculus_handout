  title: When $\arcsin(\sin x)$ Is Not $x$
  say: 'Here is what happens when the inner angle sits outside the restricted range. Take x equals pi. {show math.0} Its sine is zero, so arcsine of the sine of pi equals arcsine of zero — and arcsine always hands back the angle in the interval from negative pi over two to pi over two, which is zero, not pi. {show math.1} So arcsine of the sine of pi equals zero. {show math.2} The reason is structural: arcsine can only ever return an angle from its own narrow range, so feed it the sine of a far-away angle and it gives back the one angle in range that shares that sine. {show takeaway} The habit to build: before simplifying arcsine of the sine of x, check whether x is already in the range — if it is not, the answer is the in-range angle with the same sine, not x itself.

