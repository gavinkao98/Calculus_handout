  - text: (a) $\arccos(-\tfrac12)$ lands in $[0,\pi]$ — the second quadrant.
    math: \arccos\!\left(-\tfrac12\right)=\tfrac{2\pi}{3},\ \ \sin=\tfrac{\sqrt{3}}{2}
  - text: '(b) Triangle for $\arctan 10$: opp $10$, adj $1$, hyp $\sqrt{101}$.'
