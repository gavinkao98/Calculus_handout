scenes:

  - id: definition
    kind: content
    template: definition_math
    accent: definition
    title: "When Is a Function One-to-One?"
    statement: "A function $f$ is one-to-one when distinct inputs always land on distinct outputs --- no two arrows ever meet."
    say: |
      A function is one-to-one when distinct inputs always land on distinct outputs.
      {show math.0} In symbols, equal outputs force equal inputs.
      {show math.1} Equivalently, distinct inputs give distinct outputs.
    math:
      - "f(x_1) = f(x_2) \\;\\Longrightarrow\\; x_1 = x_2"
      - { tex: "x_1 \\ne x_2 \\;\\Longrightarrow\\; f(x_1) \\ne f(x_2)", anim: highlight }

  - id: theorem
    kind: content
    template: theorem_proof
    accent: theorem
    title: "An Inverse Exists Exactly When One-to-One"
    statement: "A function has an inverse if and only if it is one-to-one."
    say: |
      Here is the bridge between one-to-one and invertible.
      {show proof.0} If an inverse exists, equal outputs apply the inverse to force equal inputs.
      {show proof.1} If one-to-one, each output has one source, and sending it back is the inverse.
      {show qed} So the two ideas name the same thing.
    proof:
      - "If $f$ has an inverse and $f(x_1)=f(x_2)$, apply $f^{-1}$ to get $x_1=x_2$ --- so $f$ is one-to-one."
      - "If $f$ is one-to-one, each output $y$ has exactly one source $x$. Send $y$ back to it --- that rule is $f^{-1}$."
    qed: "So one-to-one and invertible name the same thing."

  - id: callout
    kind: content
    template: callout
    type: caution
    number: "1.1"
    say: |
      {show body} A caution about inverse notation.
    body: "The superscript $-1$ in $f^{-1}$ means the inverse function --- not a reciprocal. The reciprocal $\\bigl(f(x)\\bigr)^{-1} = \\dfrac{1}{f(x)}$ is a different object entirely."

  - id: derivation
    kind: content
    template: derivation
    accent: example
    title: "Inverting $f(x) = x^3 + 2$"
    say: |
      Let us invert this cubic.
      {show step.0} Write $y$ equals $f$ of $x$.
      {show step.1} Subtract two.
      {show step.2} Cube root both sides.
      {show result} Swap the names to read off the inverse.
      {show check} And verify the round trip lands on $x$.
    steps:
      - { math: "y = x^3 + 2", reason: "write $y=f(x)$" }
      - { math: "x^3 = y - 2", reason: "subtract 2" }
      - { math: "x = \\sqrt[3]{\\,y - 2\\,}", reason: "cube root both sides" }
    result: { math: "\\therefore\\; f^{-1}(x) = \\sqrt[3]{\\,x - 2\\,}", reason: "swap names" }
    check: { math: "f\\!\\left(f^{-1}(x)\\right) = \\left(\\sqrt[3]{x-2}\\right)^{3} + 2 = x", reason: "verified" }

  - id: procedure
    kind: content
    template: procedure_steps
    accent: procedure
    title: "Finding an Inverse, Step by Step"
    say: |
      Here is the recipe for inverting a function.
      {show math.0} Write $y$ equals $f$ of $x$.
      {show math.1} Solve for $x$ in terms of $y$.
      {show math.2} Then interchange the names.
      {show worked} A worked example, end to end.
    steps:
      - { text: "Write $y=f(x)$.", math: "y=f(x)" }
      - { text: "Solve for $x$ in terms of $y$.", math: "x=\\cdots" }
      - { text: "Interchange the names $x$ and $y$.", math: "y=f^{-1}(x)" }
    worked: ["f(x)=2x+3", "y=2x+3", "x=\\tfrac{y-3}{2}", "f^{-1}(x)=\\tfrac{x-3}{2}"]

  - id: recap
    kind: content
    template: recap_cards
    accent: recap
    title: "Inverses --- What to Carry Forward"
    say: |
      Let us gather the key ideas.
      {show point.0} One-to-one means distinct inputs give distinct outputs.
      {show point.1} Invertible exactly when one-to-one.
      {show point.2} The inverse reflects across the line $y=x$.
      {show point.3} To find it, solve and swap.
      {show formula.0} Remember the defining equivalence.
      {show formula.1} The round trip is the identity.
      {show formula.2} And the inverse is not a reciprocal.
    points:
      - "One-to-one: distinct inputs give distinct outputs."
      - "A function is invertible exactly when it is one-to-one."
      - "The inverse swaps domain and range; its graph reflects across $y=x$."
      - "To find it: solve $y=f(x)$ for $x$, then swap names."
    formulas:
      - "f^{-1}(y)=x \\iff f(x)=y"
      - "f^{-1}\\!\\left(f(x)\\right)=x"
      - "f^{-1} \\ne \\dfrac{1}{f}"

  - id: outro
    kind: outro
    end_slate:
      label: "end of section 1.1"
      title: "Inverse Functions"
    next_section: "1.2"
    next_title: "Inverse Trigonometric Functions"

  - id: divider
    kind: divider
    accent: definition
    eyebrow: "Chapter 2"
    title: "Derivatives"
    subtitle: "How fast is it changing --- and what the slope of a curve really means."
    ghost: "2"
    progress: { current: 2, total: 5 }
