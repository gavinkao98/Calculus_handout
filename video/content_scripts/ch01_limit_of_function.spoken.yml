ratio_of_changes: |
  Calculus keeps circling back to one question: how fast is something changing right now? Suppose s of t is the position of a moving object at time t. Over the stretch from t to t plus h, its average velocity is the ratio s of the quantity t plus h, minus s of t, all over h -- change in position divided by change in time. But the average speed across an interval is not the speed at a single instant. To pin down that instantaneous velocity, we let h shrink toward zero and watch what the ratio settles on. {show plot.2} {show plot.3} The same move works for any function: the ratio f of y minus f of x, all over the quantity y minus x, measures how f changes between two inputs, {show annotation.0} and we ask what it approaches as y slides toward x without ever reaching it. That question -- what a quantity approaches -- is the idea of a limit.

the_limit_defined: |
  Here is the definition that captures "what a function approaches." {show math.0} We say the limit of f of x as x approaches a equals L if f of x can be made arbitrarily close to L whenever x is sufficiently close to a but not equal to a. That last clause is the entire personality of a limit: we care about inputs near a, never about a itself. {show math.1} The same idea has a lighter notation: f of x tends to L as x tends to a. Keep the picture in mind: x creeping toward a along the horizontal axis, while the heights f of x home in on L.

limit_vs_value: |
  Now the subtle part, and it is the heart of this section. A limit looks only at the neighborhood of a, never at the single point a itself -- so the value f of a gets no vote. Look at three functions side by side, all approaching the same height L as x approaches a. In the first, the point sits right where you expect, with f of a equals L. {show caption.left} In the second, someone has lifted that one point off the curve, so f of a is not equal to L. {show annotation.0} In the third, the point is missing entirely and f of a is undefined. {show caption.right} Three different situations at a, yet the limit is the same L in every case -- because near a, and near is all that counts, the three curves are identical. {show annotation.1}

reading_a_graph: |
  Let us read limits straight off a graph. Three inputs to inspect: x equals negative two, x equals zero, and x equals two. As x approaches negative two from either side, the curve rises toward height one, so the limit there is one. Approaching zero, the curve heads to height zero -- the limit is zero. Now x equals two is the interesting one: from both sides the curve climbs toward height two, and yet the graph marks a solid dot down at the point with coordinates two and negative two, and a hollow dot up at the point with coordinates two and two. {show plot.2} {show plot.3} So f of two is negative two, but the limit ignores the value at the point and reports where the curve was heading. {show annotation.0} The limit as x approaches two is two, even though f of two equals negative two.

build_one_yourself: |
  The same idea, now run backwards: instead of reading a graph, we build one. The task is a function with limit ten as x approaches three, but with f of three equals zero. Start with any curve that approaches height ten at x equals three -- a straight line through the point with coordinates three and ten will do. Then take that single point and drag it down to height zero: {show plot.2} a hollow dot at the point with coordinates three and ten to mark where the curve is heading, {show plot.3} and a solid dot at the point with coordinates three and zero for the actual value. Near x equals three the curve still approaches ten, while the relocated point sets f of three equals zero. {show annotation.0} Because the limit and the value are independent, nothing stops us from choosing them separately.

estimate_from_a_table: |
  What if there is no graph to read? Then we make our own data. Take the limit, as x approaches one, of the quantity x minus one, all over the quantity x squared minus one. Substituting x equals one gives zero over zero -- undefined, no answer there. {show col.0} So instead we sample inputs creeping toward one from both sides: 0.9, 0.99, 0.999, {show col.1} {show col.2} {show col.3} and then 1.001, 1.01, 1.1. {show col.4} {show col.5} {show col.6} Evaluate the expression at each, and the outputs march steadily toward one number -- 0.5263, 0.5025, 0.5003 from the left, and 0.4762, 0.4975, 0.4998 closing in from the right. They are squeezing in on one half, so we read the limit as one half. {show col.7}

when_algebra_is_hard: |
  One more, where the table really earns its keep. Consider the limit as t approaches zero of the square root of the quantity t squared plus nine, minus three, all over t squared. This time you cannot just factor your way to the answer -- the square root hides what is going on, and at t equals zero it is once again zero over zero. {show col.0} So we let the numbers talk. Sampling t equals negative 0.1, negative 0.01, 0.01, and 0.1, {show col.1} {show col.2} {show col.3} {show col.4} the expression returns about 0.16662, then 0.166666, and back out symmetrically. That is closing in on 0.16666 and so on, which we recognize as one sixth. When the algebra is not obvious, a table of nearby values is a perfectly good way to see where a function is headed. {show col.5}

what_comes_next: |
  Notice what we have been doing: guessing limits by peeking at nearby values, whether off a graph or out of a table. Guessing is a fine start, but it is not a proof, and tables can occasionally mislead. {show math.0} So next we build systematic methods -- rules that compute limits exactly, with no sampling at all. {show math.1} And we sharpen the idea itself: what happens when a function approaches different values from the left and from the right, or grows without bound near a point. The estimate you can make today becomes a calculation you can trust.

recap: |
  Here is the whole section in four ideas. {show point.0} A limit asks what value f of x approaches as x heads toward a -- written the limit of f of x as x approaches a equals L. {show formula.0} {show point.1} It depends only on the behavior near a, never on f of a itself, which may not even be defined. {show point.2} You can read a limit off a graph by following the curve inward from both sides. {show point.3} And when there is no graph, a table of values at inputs creeping toward a will reveal the number the function is approaching.
