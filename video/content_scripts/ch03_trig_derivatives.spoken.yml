why_trig_is_different: |
  Every derivative so far has yielded to algebra. For a polynomial we
  expanded the quantity x plus h, to the n, and the binomial theorem handed
  us a factor of h to cancel; for e to the x the power series did the same
  job. The trigonometric functions refuse to play along.
  {show math.0} Write down the difference quotient for sine x and try the
  usual move. You cannot simply set h equal to zero: that gives zero over
  zero, which tells you nothing. And no identity cancels the h in the
  denominator -- sine of the quantity x plus h simply does not break into
  pieces that conveniently subtract.
  {show math.1} As we are about to see, the whole computation funnels down
  to a single limit, the limit of sine theta over theta -- again the
  indeterminate form zero over zero, and one that no algebra will crack.
  {show statement} Prying it open takes a genuinely new tool: a geometric
  comparison of areas on the unit circle. And once we secure that one limit,
  it unlocks the derivatives of both sine and cosine at once. One ground
  rule, though: throughout, angles are measured in radians -- an assumption
  that turns out to be essential.

difference_quotient_for_sine: |
  So let us transform that difference quotient instead of fighting it
  head-on. The decisive step is one trigonometric identity -- sum-to-product
  -- which turns a difference of sines into a product.
  {show step.0} Here it is; and a product is exactly what we want, because
  we can pull it apart and take limits one factor at a time.
  {show step.1} Put A equals x plus h and B equals x, and the numerator
  becomes two cosine of the quantity x plus one half h, times sine of h over
  two.
  {show step.2} Now divide by h -- and here is the small trick that makes
  everything line up: write h as two times h over two, so the denominator
  carries the very h over two inside the sine. The quotient cleans up to
  cosine of the quantity x plus one half h, times sine of h over two, all
  over h over two.
  {show result} Look at what we have: a product of two factors. The first
  slides to cosine x, provided cosine is continuous; the second is exactly
  sine theta over theta with theta equals h over two. So the whole derivative
  hangs on just two facts -- continuity, and that fundamental limit. We
  secure both now.

sector_inequality: |
  Here is that new tool. We compare three areas on a circle of radius one.
  But first, one convenience that saves us half the work. Replacing theta by
  negative theta flips the sign of both theta and sine theta, so the ratio
  sine theta over theta is even -- whatever we learn for positive angles
  holds for negative ones, so it is enough to chase theta down to zero from
  the positive side. Now the geometry. On the unit circle, A is at the point
  with coordinates one and zero, B is the point at angle theta, and extending
  the radius to the tangent at A gives C equals the point with coordinates
  one and tangent theta.
  {show tri_inner} The inner triangle O A B has base one and height sine
  theta, so its area is one half sine theta.
  {show sector} The sector O A B is the fraction theta over two pi of the
  disc -- area one half theta.
  {show tri_outer} And the outer triangle O A C has height tangent theta, so
  its area is one half tangent theta.
  {show ineq} Each region sits inside the next, so the areas line up in
  order: one half sine theta, then one half theta, then one half tangent
  theta. The whole argument hangs on that one picture.

squeeze_to_the_bound: |
  Now turn that chain of areas into a statement about sine theta over theta,
  one careful step at a time.
  {show step.0} Multiply through by two to clear the halves: sine theta at
  most theta at most tangent theta.
  {show step.1} Divide every part by sine theta, positive here, and rewrite
  tangent theta as sine theta over cosine theta -- giving one at most theta
  over sine theta at most one over cosine theta.
  {show result} The middle is upside down, so take reciprocals of all three.
  They are positive, and flipping positives reverses the inequalities, so the
  chain turns around: cosine theta at most sine theta over theta at most one,
  for theta between zero and pi over two.
  {show check} And pocket one more consequence: from sine theta at most theta
  we also get zero at most the absolute value of sine theta at most the
  absolute value of theta near zero -- a bound we lean on twice in a moment.

continuity_statement_sin_limit: |
  That little bound does more than help with the limit -- it is the key to
  continuity. And continuity here means something concrete: nudge the angle
  a little, and sine and cosine move only a little; they never jump. We even
  have the tool that says so -- on the unit circle the half-chord sine theta
  is always shorter than the arc theta above it, which is just the absolute
  value of sine theta at most the absolute value of theta read geometrically.
  {show statement} So here is the claim, made precise: sine x and cosine x
  are continuous at every real x sub zero.
  {show proof.0} Build it from the ground up. Since zero at most the absolute
  value of sine theta at most the absolute value of theta, and the absolute
  value of theta itself goes to zero,
  {show proof.1} the squeeze theorem forces sine theta to go to zero.
  {show qed} That single limit is the seed; the full continuity grows
  straight out of it, which is what we do next.

continuity_argument: |
  {show statement} Now turn that seed into full continuity. Fix a point
  x sub zero, and ask how much cosine x and sine x can change as x moves
  toward it.
  {show proof.0} Sum-to-product answers both at once. For cosine, cosine x
  minus cosine x sub zero is negative two sine of the quantity x minus x sub
  zero, over two, times sine of the quantity x plus x sub zero, over two;
  {show proof.1} and for sine, sine x minus sine x sub zero is two cosine of
  the quantity x plus x sub zero, over two, times sine of the quantity x
  minus x sub zero, over two. In each, the half-sum factor never exceeds one
  in size.
  {show proof.2} Drop it to its largest size, one, and both differences are
  bounded by the same thing -- twice the absolute value of sine of the
  quantity x minus x sub zero, over two.
  {show qed} Now let x go to x sub zero: the half-angle goes to zero, so that
  bound collapses to zero. Squeeze one last time, and cosine x goes to cosine
  x sub zero, sine x goes to sine x sub zero -- both continuous everywhere.

fundamental_limit: |
  Now we can finally close the limit that started all of this.
  {show statement} The claim is as clean as it gets: sine theta over theta
  tends to one as theta goes to zero.
  {show proof.0} And we already built the trap. For theta between zero and
  pi over two, the ratio is pinned between a floor and a ceiling: cosine
  theta at most sine theta over theta at most one.
  {show proof.1} The ceiling is the constant one. The floor is cosine theta,
  which tends to one now that we know cosine is continuous -- so the squeeze
  pins the ratio to one from the right.
  {show qed} And because the ratio is even, its left limit matches its right,
  so the two-sided limit is one as well. That is the keystone.

squeeze_graph: |
  It helps to picture that squeeze.
  {show plot.0} Here runs cosine theta, the dashed floor.
  {show plot.1} And the ceiling -- the constant line at height one.
  {show plot.2} Between them, the ratio sine theta over theta, caught in the
  narrowing gap. As theta slides toward zero the floor rises to one and the
  ceiling already is one, so the curve is squeezed right to one.
  {show plot.3} Notice the open circle at theta equals zero: the ratio is
  undefined there, zero over zero.
  {show annotation.0} So what equals one is the limit -- the height the curve
  is forced toward, not a value it ever takes.

limit_not_identity: |
  One caution, because this result is easy to over-read.
  {show body} The statement is about the limit as theta goes to zero -- not
  an identity. At a fixed angle the ratio is generally not one: at theta
  equals pi over two it is two over pi, about zero point six four, and at
  theta equals pi it is zero. The value one is reached only in the limit.

radians_essential: |
  A second caution, and this one is structural.
  {show body} Everything here depends on radians. The sector area one half
  theta -- and with it the limit -- uses radian measure. Switch to degrees
  and the limit is pi over one hundred eighty, not one, so the derivative
  drags that factor along. The clean formulas sine prime equals cosine and
  cosine prime equals negative sine hold only in radians.

derivative_of_sine: |
  Now the payoff, and it falls into our hands.
  {show statement} The claim: the derivative of sine x is cosine x, for every
  real x.
  {show proof.0} Start from the definition -- the derivative is the limit of
  the difference quotient.
  {show proof.1} But we already did the hard algebra: that quotient is cosine
  of the quantity x plus one half h, times sine of h over two, all over h
  over two.
  {show proof.2} Let h go to zero: the first factor tends to cosine x by
  continuity, the second to one by the fundamental limit.
  {show qed} A continuous thing times a limit -- the product is cosine x
  times one, just cosine x.

derivative_of_cosine: |
  Cosine falls to the very same machinery -- only the identity changes, so we
  go quickly.
  {show statement} The claim: the derivative of cosine x is negative sine x.
  {show proof.0} This time use the companion sum-to-product formula.
  {show proof.1} The same division by h turns the difference quotient into
  negative sine of the quantity x plus one half h, times sine of h over two,
  all over h over two.
  {show proof.2} Send h to zero: the sine factor tends to sine x by
  continuity, the second to one by the fundamental limit.
  {show qed} The leading minus sign comes along -- leaving negative sine x.
  Same two tools, one extra minus sign.

slope_equals_height: |
  Here is what that theorem looks like on the graph.
  {show plot.0} Draw y equals sine x, and check the slope of its tangent at a
  few points.
  {show tan_0} At x equals zero it is climbing at slope one.
  {show tan_halfpi} At x equals pi over two, the top of the hump, the tangent
  is flat -- slope zero.
  {show tan_pi} At x equals pi it is falling at slope minus one.
  {show plot.1} Now lay y equals cosine x on top,
  {show cos_dots} and read its heights at those same points: one, zero, minus
  one. They match exactly -- the slope of sine is the height of cosine, the
  theorem drawn.

derivative_cycle: |
  Step back and watch the pattern these two derivatives make.
  {show statement} Differentiation sends sine and cosine into each other,
  with a minus sign that turns over every second step.
  {show math.0} Writing an arrow for one derivative: sine x to cosine x to
  negative sine x to negative cosine x, and back to sine x.
  {show math.1} Four derivatives and you are home -- the fourth derivative of
  sine is sine again. Where e to the x reproduces itself in a single step,
  these do it in a cycle of four: the self-renewal that lets them oscillate
  forever without winding down.

companion_limit: |
  The fundamental limit has a companion worth knowing: the quantity one minus
  cosine theta, over theta tends to zero. It is again zero over zero, so we
  need a way in.
  {show step.0} Multiply top and bottom by the conjugate one plus cosine
  theta; the numerator becomes a difference of squares, one minus cosine
  squared theta.
  {show step.1} And one minus cosine squared theta is just sine squared
  theta, so the whole thing splits into sine theta over theta times sine
  theta over the quantity one plus cosine theta.
  {show result} Let theta go to zero: the first factor goes to one, the
  second to zero over two. One times zero is zero.

all_six_tan_sec: |
  With sine and cosine in hand, the other four cost almost nothing -- just
  the quotient rule.
  {show step.0} Take tangent x equals sine x over cosine x. The quotient rule
  gives this.
  {show step.1} The numerator is cosine squared x plus sine squared x, which
  is one -- so the derivative of tangent x is secant squared x.
  {show step.2} Secant is the same idea on one over cosine x: the quotient
  rule, with a constant on top, gives this.
  {show result} Clean it up, and secant's derivative is secant x tangent x.

all_six_cot_csc: |
  The last two run exactly the same way.
  {show step.0} Take cotangent x equals cosine x over sine x. The quotient
  rule gives this.
  {show step.1} The numerator is minus the quantity sine squared x plus
  cosine squared x, again one -- so cotangent x differentiates to negative
  cosecant squared x.
  {show step.2} And cosecant x is one over sine x: the same rule lands this.
  {show result} Cleaned up, that is negative cosecant x cotangent x -- and
  all six are done, every one built on sine prime equals cosine and cosine
  prime equals negative sine.

shm_compute: |
  Let us put the new derivatives to work on something moving.
  {show step.0} A weight on a spring has height s of t equals sine t.
  {show step.1} Velocity is its derivative, s prime of t equals cosine t.
  {show step.2} Acceleration is the next derivative, s double prime of t
  equals negative sine t.
  {show result} But negative sine t is just negative s of t -- at every
  instant the weight is pushed back toward rest. That relation, s double
  prime equals negative s, is the signature of simple harmonic motion; sine
  and cosine are exactly the functions that describe it.

shm_stacked_graphs: |
  Stack the three graphs over one time axis and the relationship jumps out.
  {show g_s} On top, the height s equals sine t.
  {show g_v} In the middle, the velocity s prime equals cosine t.
  {show g_a} On the bottom, the acceleration s double prime equals negative
  sine t. Watch where the height hits a peak or a trough -- there the
  velocity passes through zero, because at the extremes the weight
  momentarily stops.
  {show mirror} And hold the bottom graph against the top: it is the top one
  flipped upside down. That is s double prime equals negative s, drawn -- the
  very picture of an oscillation.

toward_the_chain_rule: |
  We can now differentiate every trigonometric function -- but only in its
  bare form.
  {show statement} We can handle sine x, yet not sine of x squared or sine of
  the quantity three x plus one, where the angle is itself a function tucked
  inside.
  {show math.0} To reach a function buried inside another, we need one more
  rule -- a way to differentiate a composition. That is the chain rule, and
  it is what comes next; with it, every derivative we found today becomes the
  seed of a whole family more.

recap: |
  Pull the section together.
  {show point.0} Everything grew from one limit: sine theta over theta tends
  to one, cracked by squeezing areas on the unit circle.
  {show point.1} That limit, with continuity, gave the two derivatives at the
  heart of the section -- sine differentiates to cosine, cosine to negative
  sine.
  {show point.2} From those two, the quotient rule delivered all the other
  trig derivatives -- tangent, cotangent, secant, cosecant.
  {show point.3} And keep the cycle in mind -- four derivatives of sine or
  cosine bring you home -- with the fine print that it all depends on radians.
