can_we_go_backwards: |
  Every function is a one-way machine: feed it an input, and it hands you an output. This section asks the reverse question -- starting from the output, can we recover the input that produced it? Watch two quick cases. {show math.0} For f of x equals x on the interval from zero to one, every input keeps its own value: zero stays at zero, one half stays at one half. {show math.1} But for f of x equals x squared on the interval from negative one to one, something breaks: both one half and negative one half are sent to one quarter. In the first case, each output points back to exactly one input; in the second, the output one quarter cannot tell us which input it came from -- and that difference is the whole story of this section.

one_to_one_definition: |
  The property that separates the two cases has a name: one-to-one. {show math.0} A function f is one-to-one if f of x sub one is not equal to f of x sub two whenever x sub one is not equal to x sub two -- different inputs always produce different outputs. {show math.1} The same condition can be turned around: if f of x sub one equals f of x sub two, then x sub one equals x sub two. Both forms say the same thing, but the second one is the workhorse in computations: assume two outputs agree, and deduce that the inputs were equal all along.

ids_before_algebra: |
  Here is the definition at work in a setting with no formulas at all. {show math.0} Assign every student in a class an identification number, making sure no two students share one. Is the rule sending each student to their ID number one-to-one? {show math.1} Yes -- distinct students always receive distinct numbers, which is precisely the defining condition. The habit worth keeping: one-to-one is a question about the matching itself, not about algebra.

checking_with_algebra: |
  Now back to the two functions from the opening, this time as a formal check. {show math.0} On the interval from zero to one, the function f of x equals x sends every input to itself, so distinct inputs automatically give distinct outputs -- one-to-one. {show math.1} For g of x equals x squared on the interval from negative one to one, compute both values: g of one half equals one quarter, and g of negative one half equals one quarter as well. {show math.2} Two different inputs share one output, so g is not one-to-one. {show takeaway} And the consequence matters: no rule can send one quarter back to a single input, so g cannot be reversed on this interval.

horizontal_line_test: |
  There is a way to read one-to-one straight off the graph. A horizontal line y equals c crosses the graph of f wherever f of x equals c, so every crossing is one input that produces the output c. {show annotation.0} That gives the test: a function is one-to-one exactly when no horizontal line meets its graph more than once. Two crossings on one line would mean two inputs with the same output -- exactly the failure we saw with x squared. So sweep horizontal lines down the graph and count: at most one crossing at every height is what passing looks like.

inverse_definition: |
  For a one-to-one function, every output traces back to exactly one input -- so the backwards assignment is itself a function. We call it the inverse of f, written f inverse. {show math.0} If f has domain A and range B, then f inverse has domain B and range A, and its rule is the defining relation: f inverse of y equals x exactly when f of x equals y. {show math.1} Note the trade: the outputs of f become the inputs of f inverse, and domain and range swap places.

reading_the_notation: |
  One notational habit before we continue. {show math.0} We usually prefer x as the input letter of whatever function we are currently studying -- including f inverse itself. {show math.1} After renaming the variables, the defining relation reads: f inverse of x equals y exactly when f of y equals x. Same statement, new letters -- and this renaming is the reason the procedure at the end of this section will ask us to interchange x and y.

inverse_iff_one_to_one: |
  We introduced one-to-one as the property that makes reversing possible; the theorem pins that down. {show math.0} A function has an inverse if and only if it is one-to-one. There are no hidden conditions: the property we can already check -- by the definition or by horizontal lines -- is the complete story of invertibility. Let us walk through why both directions hold.

proof_both_directions: |
  First, suppose f has an inverse. {show proof.0} If f of x sub one equals f of x sub two, apply f inverse to both sides -- f inverse of f of x sub one equals f inverse of f of x sub two -- and by the defining relation each side collapses back to its input, so x sub one equals x sub two. Equal outputs force equal inputs: f is one-to-one. {show proof.1} Now the converse. Let f be one-to-one with domain A and range B. Every y in B is hit by at least one x in A -- that is what being the range means -- and one-to-one guarantees at most one. {show qed} Exactly one input for each output: sending each y to that unique x is a well-defined function from B to A, and it is precisely the inverse of f.

first_inverses: |
  Time to find actual inverses, starting small. {show math.0} The identity function f of x equals x leaves every input untouched, so reversing it changes nothing either: f is its own inverse, f inverse of x equals x. {show math.1} Next, g of x equals x cubed. Write y equals x cubed and solve for the input: x equals the cube root of y, {show math.2} so after renaming the variable, g inverse of x equals the cube root of x. {show takeaway} And the answer checks out: g of g inverse of x equals the cube root of x, all cubed, which is x -- feeding the inverse's output back into g returns exactly where we started.

composition_identities: |
  That final check was not a coincidence -- it is a law that every inverse obeys. {show math.0} Because f inverse of y equals x means exactly the same thing as f of x equals y, going forward and then backwards always lands you where you started: f inverse of f of x equals x for every x in A, {show math.1} and in the other direction, f of f inverse of y equals y for every y in B. In words: f and f inverse undo each other, in both orders. These two identities are also the practical test -- to certify that a claimed inverse is correct, compose the two and watch everything cancel.

graphs_mirror_across_y_x: |
  The algebra of inverses leaves a picture behind. If the point with coordinates a and b lies on the graph of f, then f of a equals b, which is the same as f inverse of b equals a -- so the point with coordinates b and a lies on the graph of f inverse. {show annotation.0} Swapping the two coordinates of a point is exactly a reflection across the line y equals x. So the two graphs are mirror images: take g of x equals x cubed and its inverse, the cube root of x, fold the plane along the line y equals x, and each curve lands precisely on the other.

repair_by_restricting: |
  Remember x squared -- the very first function that failed us, because one half and negative one half both land on one quarter. We can repair it. Restrict the domain to the interval from zero to infinity, keeping only the non-negative inputs, and the collision is gone: if x sub one squared equals x sub two squared, with x sub one and x sub two both greater than or equal to zero, then x sub one equals x sub two. {show annotation.0} The restricted function is one-to-one, so now it has an inverse. Solving x equals f inverse of x, all squared, and keeping the non-negative root gives f inverse of x equals the square root of x -- which is exactly why the square-root symbol means the positive root: it is defined to undo the restricted squaring function. And the move we just made -- restrict first, then invert -- is exactly what makes the inverse trigonometric functions possible, since sine and cosine are not one-to-one on their own either.

the_procedure: |
  The cube-root computations secretly followed a recipe, and it works for any one-to-one function. {show math.0} Step one: write y equals f of x. {show math.1} Step two: solve this equation for x in terms of y. {show math.2} Step three: interchange the names x and y -- the result reads y equals f inverse of x. All the real work lives in step two; the final swap is just the variable-naming habit we set up earlier.

procedure_in_action: |
  Same recipe, one notch up: f of x equals x cubed plus two. {show math.0} From y equals x cubed plus two, isolate the input -- {show math.1} x cubed equals y minus two, then x equals the cube root of the quantity y minus two. {show math.2} Interchange the names, and the inverse appears: f inverse of x equals the cube root of the quantity x minus two. {show worked} Finally the certificate: f of f inverse of x equals the cube root of the quantity x minus two, all cubed, plus two; that is x minus two, plus two, which is x. Everything cancels back to x, so this really is the inverse.

temperature_conversion: |
  One last inverse, and this one means something outside the page. The function f of t equals nine-fifths t plus thirty-two takes a Celsius temperature and returns the Fahrenheit reading. {show math.0} So what does its inverse do? It runs the conversion backwards -- hand it a Fahrenheit number and it gives you the Celsius. {show math.1} The recipe is unchanged: solve t equals nine-fifths times f inverse of t, plus thirty-two, for the inverse, which gives f inverse of t equals five-ninths times the quantity t minus thirty-two. {show math.2} And the check is reassuring -- go to Fahrenheit and back, f inverse of f of t equals five-ninths times the quantity nine-fifths t plus thirty-two minus thirty-two, which is t, landing exactly where we began. {show takeaway} Here an inverse is not an abstraction; it is the formula on the other side of the thermometer.

recap: |
  Here is the whole section in four moves. {show point.0} A function is one-to-one when different inputs never share an output -- and on a graph, horizontal lines detect exactly that. {show point.1} A function has an inverse precisely when it is one-to-one, with domain and range trading places. {show formula.0} {show formula.1} The inverse undoes the original -- f inverse of f of x equals x and f of f inverse of y equals y -- and graphically the two curves mirror across the line y equals x. {show point.2} And to compute one: write y equals f of x, solve for x, then swap the names.

