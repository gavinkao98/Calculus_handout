angle_from_ratio: |
  Picture a ramp rising at a steady slope, and suppose you know that slope exactly — it climbs one unit for every two it runs forward. A natural question follows: what angle does the ramp make with the ground? You know the ratio; you want the angle back. That is the whole job of the inverse trigonometric functions. {show math.0} The ordinary trig functions turn an angle into a ratio — feed in an angle, read off a sine or a tangent. {show math.1} The inverse functions run that backwards: hand them a ratio, and they return the angle that produced it. From the slope of a ramp we recover its inclination; from the sides of a right triangle we recover its angles. Before we can build these inverses, though, there is one obstacle to clear.

trig_not_one_to_one: |
  The obstacle is that none of the trig functions is one-to-one. Look at the sine curve running across the whole number line: it rises and falls forever, so a single horizontal line slices through it again and again. {show annotation.0} Many different angles share the very same sine — and a function whose outputs each come from many inputs simply cannot be run backwards. The cure is one we have seen before for functions that fail this way: cut the domain down to a single stretch on which the function never repeats a value. On that restricted piece the function is one-to-one, so it has an inverse. We will make this one move — restrict, then invert — for each trig function in turn.

restrict_sine: |
  Let us carry that out for sine. The standard branch to keep is the interval from negative pi over two to pi over two. On that piece the sine curve climbs steadily from negative one up to one, hitting every value in between exactly once — so it is one-to-one there, and its outputs fill the range from negative one to one. {show annotation.0} That restricted, well-behaved branch is the sine we will actually invert. Other intervals would serve in principle, but this one is centred on the origin and symmetric about zero, which is why it became the standard choice.

arcsin_definition: |
  Now we can name the inverse. The inverse sine function, written arcsine of x, takes a number between negative one and one and returns the angle on our restricted branch whose sine is that number. {show math.0} Stated precisely: arcsine of x equals y means exactly that the sine of y equals x and y lies in the interval from negative pi over two to pi over two. {show math.1} So its domain is the interval from negative one to one — the only ratios a sine can produce — and its range is that restricted interval of angles. {show math.2} One warning about notation: arcsine of x is often written sine to the minus one of x, but that superscript minus one does not mean a reciprocal. Sine to the minus one of x is an angle; one over the sine of x is a number. Whenever a source writes sine to the minus one, read the context to see which one is meant.

arcsin_identities: |
  Because arcsine undoes the restricted sine, the two compose back to give the input — but watch the fine print on where each holds. {show math.0} One way, the sine of arcsine of x equals x for every x in the interval from negative one to one: take a ratio, find its angle, take the sine, and you are back to the ratio. {show math.1} The other way, arcsine of the sine of x equals x — but only when x already lives in the restricted range from negative pi over two to pi over two. That asymmetry between the two is not a slip of the pen, and the next case shows exactly why it is there.

when_arcsin_sin_breaks: |
  Here is what happens when the inner angle sits outside the restricted range. Take x equals pi. {show math.0} Its sine is zero, so arcsine of the sine of pi equals arcsine of zero — and arcsine always hands back the angle in the interval from negative pi over two to pi over two, which is zero, not pi. {show math.1} So arcsine of the sine of pi equals zero. {show math.2} The reason is structural: arcsine can only ever return an angle from its own narrow range, so feed it the sine of a far-away angle and it gives back the one angle in range that shares that sine. {show takeaway} The habit to build: before simplifying arcsine of the sine of x, check whether x is already in the range — if it is not, the answer is the in-range angle with the same sine, not x itself.

arcsin_evaluate: |
  Let us evaluate two expressions. First, arcsine of one half: we want the angle in the interval from negative pi over two to pi over two whose sine is one half. {show math.0} That is pi over six, so arcsine of one half equals pi over six. The second is more telling: the tangent of arcsine of one third. We are not asked for the angle itself, only for its tangent — so let us draw a right triangle. {show math.1} Call the angle theta, with the sine of theta equal to one third; that puts the side opposite theta at one and the hypotenuse at three. {show math.2} By the Pythagorean theorem the adjacent side is the square root of the quantity nine minus one, which equals two times the square root of two. {show math.3} Now tangent is opposite over adjacent, so the tangent of arcsine of one third equals one divided by the quantity two times the square root of two. {show takeaway} That triangle move — turn the inverse trig value into a labelled right triangle, then read off whatever ratio you need — is the workhorse of this whole section.

arccos_definition: |
  Cosine needs the same repair, but on a different stretch. Cosine is not one-to-one either, and the branch we keep is the interval from zero to pi — where the curve runs steadily downhill from one to negative one. On that branch every value is hit once, so we can invert it. {show math.0} The inverse cosine, arccosine of x, is defined by arccosine of x equals y exactly when the cosine of y equals x and zero is less than or equal to y is less than or equal to pi; {show math.1} its domain is again the interval from negative one to one and its range is the interval from zero to pi. {show math.2} The composition identities read just like the ones for sine: the cosine of arccosine of x equals x on the interval from negative one to one, and arccosine of the cosine of x equals x as long as x stays in the interval from zero to pi. Same idea as before — only the interval of angles has moved.

domain_of_composition: |
  When inverse trig functions get composed with ordinary ones, the interesting question is often the domain. Take f of x equals arcsine of the cosine of x. Whatever x is, the cosine of x always lands in the interval from negative one to one — and the interval from negative one to one is exactly what arcsine accepts. {show math.0} So every real number is allowed: the domain of f is all real numbers. Now flip the order: h of x equals the sine of arccosine of x. Here the inner function arccosine demands an input in the interval from negative one to one, and its output is an angle, which sine is happy to take. {show math.1} So the domain of h is the interval from negative one to one. {show takeaway} The rule worth keeping: the domain of a composition is set by what the inner function accepts and whether its outputs are legal for the outer one.

principal_value_trap: |
  One more trap, and it carries the single most important idea about these functions. An object starts moving at time t equals ten, bobbing so that its height afterwards is the cosine of t. True or false: it is at height one at the time t equals arccosine of one? The answer is false. The equation cosine t equals one holds at infinitely many times — t equals zero, two pi, four pi, and so on — but arccosine does not return all of them. {show annotation.0} It returns only its single principal value in the interval from zero to pi, which is t equals zero. And t equals zero is before the object is even moving. An inverse trig function hands back one angle, never the whole family of solutions. The object really is up at height one — at t equals four pi, six pi, and the multiples of two pi that fall after it starts moving — but arccosine of one equals zero is none of those.

arctan_definition: |
  Tangent is the third we invert, and it brings a new twist. We restrict it to the open interval from negative pi over two to pi over two, where it climbs without ever repeating — but unlike sine and cosine, tangent shoots off toward infinity at the ends, so it takes every real value. {show math.0} That flips the domain story: arctangent of x equals y means the tangent of y equals x with y strictly between negative pi over two and pi over two, and its domain is all real numbers — any ratio at all has an angle. {show math.1} Its range is the open interval from negative pi over two to pi over two, which it approaches but never reaches. {show math.2} The identities follow the usual pattern: the tangent of arctangent of x equals x for every real x, and arctangent of the tangent of x equals x on the open restricted interval. So arctangent takes the entire number line and gently squeezes it into a band less than half a turn wide.

signs_from_range: |
  When the inputs go negative, signs are where people slip — but the range of the inverse function settles every sign for you. Start with the sine of arccosine of negative one half. {show math.0} Since arccosine always lands in the interval from zero to pi, a negative input forces the angle into the second quadrant: arccosine of negative one half equals two pi over three, and its sine is the square root of three, divided by two. {show math.1} The same triangle method handles secant of arctangent of ten: opposite ten, adjacent one, hypotenuse the square root of one hundred one, so the secant is the square root of one hundred one. {show math.2} Now the delicate one: the tangent of arcsine of negative the quantity two times the square root of five, all over five. Here arcsine of a negative number lands in the fourth quadrant, where cosine is positive — so the cosine of theta equals one over the square root of five and the tangent of theta equals negative two. {show takeaway} Notice we never guessed a sign: each one came straight from the range of the inverse function.

simplify_cos_arctan: |
  The triangle method really shines when the input is a variable instead of a number. Let us simplify the cosine of arctangent of x for any x. {show math.0} Set y equals arctangent of x, so the tangent of y equals x with y in the open interval from negative pi over two to pi over two. {show math.1} One route is the Pythagorean identity one plus tangent squared y equals secant squared y, which gives secant squared y equals one plus x squared; since y is in that interval, cosine is positive, so secant y equals the square root of the quantity one plus x squared and the cosine of y equals one over the square root of the quantity one plus x squared. The triangle says the same thing at a glance: opposite side x, adjacent side one, hypotenuse the square root of the quantity one plus x squared, and cosine is adjacent over hypotenuse. {show math.2} Either way, the cosine of arctangent of x equals one over the square root of the quantity one plus x squared — {show takeaway} a messy composition collapsing to one clean expression in x, the kind of simplification you will reach for constantly once derivatives enter the picture.

remaining_inverses: |
  Three inverse trig functions remain — inverse cosecant, inverse secant, and inverse cotangent — and they are built in exactly the same spirit, just used less often. {show row.0} {show row.1} {show row.2} Each one inverts its trig function on a chosen branch. {show row.3} {show row.4} Inverse cosecant and inverse secant take inputs whose absolute value is at least one — that is, everything from negative infinity to negative one, together with one to infinity — because cosecant and secant never produce values strictly between negative one and one. {show row.5} Inverse cotangent, like inverse tangent, accepts every real number. Rather than memorize six separate boxes, it is cleaner to lay all six inverse functions side by side and compare what they accept and what interval of angles they return.

branch_conventions: |
  There is a subtlety hiding in those last three definitions: the branch we pick is a choice, not a law, and different texts choose differently. This text picks the branches that make the later differentiation formulas come out simplest, but you will meet other conventions in the wild — and the choice has visible consequences. Consider f of x equals arcsine of x plus arccosecant of x. {show math.0} Arcsine needs the absolute value of x to be at most one while arccosecant needs the absolute value of x to be at least one, so the only inputs satisfying both are x equals one and x equals negative one. {show math.1} At x equals one, both terms equal pi over two, so f of one equals pi. {show math.2} At x equals negative one, under this text's convention arccosecant of negative one equals three pi over two, and with arcsine of negative one equals negative pi over two we again get f of negative one equals pi — so f is the constant pi on its two-point domain. {show math.3} But under a different common convention, arccosecant of negative one would be negative pi over two, which makes f of negative one equals negative pi instead. {show takeaway} Same expression, different answer — which is exactly why a text fixes its conventions explicitly, and why you should always check the one in front of you.

recap: |
  Here is the whole section in four moves. {show point.0} First, a trig function is not one-to-one, so we restrict it to a single branch and invert that — sine on the interval from negative pi over two to pi over two, cosine on the interval from zero to pi, tangent on the open interval between. {show point.1} Second, each inverse returns just one angle, the principal value inside its range — never the whole family of solutions. {show formula.0} {show formula.1} Third, the composition identities undo the functions, but arcsine of the sine of x and its cousins only give back x when x already sits in the restricted range. {show point.2} And fourth, to evaluate a composition, build a right triangle from the inverse trig value and read off the ratio you need — and let the range of the inverse fix every sign.
