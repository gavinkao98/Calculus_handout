# Convention adopted for this symbol-heavy section (not yet in the §2 table):
#   |x - a|        -> "the absolute value of x minus a"
#   |(2x-1) - 5|   -> "the absolute value of the quantity two x minus one, minus five"
#   0 < |x-a| < d  -> "zero is less than the absolute value of x minus a, which is less than delta"
#   epsilon, delta -> "epsilon", "delta";  d_1,d_2 -> "delta sub one", "delta sub two"

why_close_is_not_enough: |
  For two centuries calculus solved real problems -- orbits, areas, the motion of the planets -- while its logical foundations stayed shaky. {show math.0} The arguments leaned on infinitesimals, quantities imagined as vanishingly small but never pinned down, and on vague phrases like "x is close to a" and "f of x is close to L." But how close is close? {show math.1} The nineteenth century answered by throwing the word "close" out entirely and replacing it with a measurable distance. That single move is the whole project of this section: make "close" precise enough to compute with.

the_broken_function: |
  Here is a deliberately broken function to sharpen the question. Let f of x equal two x minus one everywhere except at x equals three, where we force the value to be six. As x moves close to three, the output two x minus one moves close to five -- so we expect the limit to be five, even though the function's actual value there is six. {show annotation.0} The limit watches how f behaves on the approach, not where it lands at the point itself. But "close to five" is the very phrase we promised to make precise, so let us ask the sharp question: how close can we force f of x to be?

tolerance_game_point_one: |
  Let us play it as a game with a number attached. {show math.0} Suppose someone demands that f of x land within zero point one of five -- can we deliver? {show math.1} Measure the gap: the absolute value of f of x minus five equals the absolute value of the quantity two x minus one, minus five, which is the absolute value of two x minus six, which is two times the absolute value of x minus three. {show math.2} So the demand that two times the absolute value of x minus three is less than zero point one is just the absolute value of x minus three is less than zero point zero five. {show takeaway} Keep x within zero point zero five of three, and f of x is guaranteed within zero point one of five -- a precise promise, answered with a precise radius.

every_tolerance_at_once: |
  One answered demand is not enough, though. {show math.0} Tighten the tolerance to zero point zero one and the very same algebra returns the absolute value of x minus three is less than zero point zero zero five; halve the tolerance and the radius halves with it. {show math.1} The pattern is mechanical: for any tolerance epsilon greater than zero, we get the absolute value of f of x minus five is less than epsilon whenever the absolute value of x minus three is less than epsilon over two, so the choice delta equals epsilon over two always works. This is what "arbitrarily close" really means -- not close for one lucky tolerance, but answerable for every epsilon greater than zero. That little phrase "for every epsilon" is the engine of the definition we are about to write down.

precise_limit_definition: |
  Now we can state it cleanly. {show math.0} Let f be defined on an open interval around a, except possibly at a itself. We say the limit of f of x as x approaches a equals L {show math.1} if for every epsilon greater than zero there exists a delta greater than zero {show math.2} such that the absolute value of f of x minus L is less than epsilon whenever zero is less than the absolute value of x minus a, which is less than delta. Read it as a challenge and a response: you name any tolerance epsilon, however cruelly small, and I must produce a radius delta that keeps every nearby f of x inside it. If I can always answer, the limit is L.

epsilon_delta_tube: |
  The definition hides a clean picture. Mark the target on the vertical axis: a horizontal band from L minus epsilon to L plus epsilon, the strip we want the outputs to land in. Mark the inputs on the horizontal axis: a vertical band from a minus delta to a plus delta, with the single point a punched out. {show annotation.0} The definition says exactly this -- as long as x stays in the input band, the graph carries it into the target band. And here is the part to feel in your bones: shrink the target strip toward L, and the input interval must shrink too, or the curve escapes the band. The radius delta is not fixed; it answers to epsilon.

uniqueness_statement_and_trap: |
  The definition earns its keep immediately: it guarantees that a limit, once it exists, is unique. Why even worry? {show proof.0} Because nothing so far forbids two different numbers L and M from both passing the test -- so suppose, for contradiction, that they do. {show proof.1} Here is the clever move that breaks it: let epsilon be half the gap between them, epsilon equals the absolute value of L minus M, over two. Since L is not equal to M, this epsilon is strictly positive, so it is a perfectly legal tolerance we are allowed to feed the definition. We have set a trap; the next step springs it.

uniqueness_proof_triangle: |
  Now spring it. {show proof.0} Feed that epsilon to each limit: there is a delta sub one that makes f of x hug L, and a delta sub two that makes it hug M. {show proof.1} Take any x nearer to a than both -- closer than the smaller of delta sub one and delta sub two -- and both promises hold at once. {show proof.2} Now watch the gap collapse: the absolute value of L minus M rewrites as the absolute value of the quantity L minus f of x plus f of x minus M, which by the triangle inequality is at most the absolute value of L minus f of x, plus the absolute value of f of x minus M, and since each piece is below epsilon, the total is below two epsilon. {show qed} But two epsilon was defined to be exactly the absolute value of L minus M. We have forced the absolute value of L minus M to be strictly less than itself -- impossible. The only way out is that there was no gap at all: L equals M.

epsilon_delta_recipe: |
  Every verification that follows runs on one recipe. {show math.0} Start from a generic epsilon greater than zero -- that is the challenge, and your job is to manufacture a delta. {show math.1} Take the quantity, the absolute value of f of x minus L, and bound it above by something times the absolute value of x minus a, because the absolute value of x minus a is the thing delta controls. {show math.2} Then choose delta to drive that bound below epsilon. One wrinkle decides the difficulty: if the bound still carries a stray factor depending on x, first pen x into a small interval around a to cap that factor, then take delta to be the minimum of that interval's radius and your epsilon-based bound. {show math.3} The next two examples are exactly this recipe -- once without the wrinkle, once with it.

verify_linear_limit: |
  Take the clean case first: show the limit of four x minus five as x approaches three equals seven. {show math.0} Given a tolerance epsilon, measure the gap: the absolute value of the quantity four x minus five, minus seven is the absolute value of four x minus twelve, which factors as four times the absolute value of x minus three. {show math.1} We want that under epsilon, so we demand the absolute value of x minus three is less than epsilon over four. {show math.2} That hands us the choice delta equals epsilon over four: whenever zero is less than the absolute value of x minus three, which is less than delta, the gap four times the absolute value of x minus three is below four times epsilon over four, exactly epsilon. {show takeaway} The function is linear, there is no stray factor, and delta falls straight out of the algebra.

verify_quadratic_limit: |
  Same goal, but now the algebra fights back: show the limit of x squared minus five x plus six as x approaches one equals two. {show math.0} The gap is the absolute value of x squared minus five x plus four, which factors as the absolute value of x minus one, times the absolute value of x minus four. {show math.1} The first factor is what delta controls, but the second drifts as x moves -- so cap it: insist first that the absolute value of x minus one is less than one, which traps x between zero and two and forces the absolute value of x minus four to be less than four. {show math.2} Now the gap is below four times the absolute value of x minus one, and to push that under epsilon we also need the absolute value of x minus one to be less than epsilon over four. {show math.3} So take delta equals the minimum of one and epsilon over four, and both demands hold together. {show takeaway} The minimum is not a trick; it is the recipe's wrinkle, made concrete.

precise_infinite_limit: |
  The same machine handles limits that run off to infinity. We met those informally a little earlier; now we can say them precisely. {show math.0} We write the limit of f of x as x approaches a equals infinity to mean: {show math.1} for every threshold M greater than zero, there is a delta greater than zero {show math.2} such that f of x is greater than M whenever zero is less than the absolute value of x minus a, which is less than delta. Notice the quantifier has only changed its target -- instead of trapping f near a value, we force it above any height you name. Pick M as large as you like, a hundred or a googol; once x is close enough to a, the function clears it. {show math.3} The negative infinity case is the mirror image: for every negative N, eventually f of x drops below it.

continuity_preview: |
  Before we gather up, the precise definition quietly hands us one more idea. Suppose f is defined not just near a but at a as well, and suppose the limit equals the actual value: {show math.0} the limit of f of x as x approaches a equals f of a. {show math.1} When that happens, we say f is continuous at a. Look back at our broken function -- its limit was five but its value was six, so it failed exactly this test; continuity is the case where the approach and the destination finally agree. A full study of continuity comes later; we name it here only because the limit language expresses it so directly.

recap: |
  Let us gather the thread. {show point.0} The vague word "close" became a precise contract: for every epsilon greater than zero there is a delta greater than zero so that, {show formula.0} whenever zero is less than the absolute value of x minus a, which is less than delta, {show formula.1} the output obeys the absolute value of f of x minus L is less than epsilon. {show point.1} The picture to keep is the strip and the interval -- inputs within delta of a are carried into the band within epsilon of L, and delta always answers to epsilon. {show point.2} The first payoff was uniqueness: a limit, once it exists, cannot be two numbers. {show point.3} And to verify a limit by hand, bound the absolute value of f of x minus L by a multiple of the absolute value of x minus a, choose delta, and take a minimum when a stray factor needs taming. Every informal limit we computed in the earlier sections now stands on this one definition.
